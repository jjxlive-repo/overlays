<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Top Gifter Overlay</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=DM+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 860px;
  height: 240px;
  overflow: hidden;
  background: transparent;
  pointer-events: none;
}

/* ── Connection dot ── */
#status-dot {
  position: fixed;
  top: 6px; right: 6px;
  width: 10px; height: 10px;
  border-radius: 50%;
  background: #444;
  box-shadow: 0 0 0 2px rgba(0,0,0,.5);
  transition: background .4s;
  z-index: 100;
}
#status-dot.connected { background: #22c55e; box-shadow: 0 0 6px #22c55e99; }

/* ── Particle canvas ── */
#particles {
  position: fixed; inset: 0;
  pointer-events: none;
  z-index: 50;
}

/* ── Root scene ── */
#scene {
  width: 860px;
  height: 240px;
  display: flex;
  align-items: stretch;
  padding: 14px 16px 14px 14px;
  gap: 12px;
  opacity: 0;
  transition: opacity .6s;
}
#scene.visible { opacity: 1; }


/* ════════════════════════════════════════════════════════
   FEATURED HERO CARD
   ════════════════════════════════════════════════════════ */
#featured {
  width: 230px;
  flex-shrink: 0;
  position: relative;
  border-radius: 18px;
  overflow: hidden;

  /* Layered dark-to-vivid gradient */
  background:
    linear-gradient(160deg,
      #0A0118 0%,
      #1A0335 30%,
      #3B0764 65%,
      #5B21B6 100%
    );

  /* Multi-layer border glow */
  border: 2px solid #9333EA;
  box-shadow:
    0 0 0 1px #4C1D9544,
    0 0 18px #7C3AED88,
    0 0 40px #4C1D9544,
    inset 0 1px 0 rgba(232,121,249,.15),
    inset 0 -1px 0 rgba(0,0,0,.4);

  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  padding: 12px 14px 10px;
}

/* Gold accent line at top */
#featured::before {
  content: '';
  position: absolute;
  top: 0; left: 20%; right: 20%;
  height: 2px;
  background: linear-gradient(90deg, transparent, #F59E0B, transparent);
  border-radius: 0 0 4px 4px;
}

/* Shimmer on new king */
#featured::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(105deg,
    transparent 35%, rgba(255,255,255,.08) 50%, transparent 65%);
  background-size: 200% 100%;
  background-position: 200% 0;
  pointer-events: none;
  border-radius: 16px;
}
#featured.shimmer::after {
  animation: shimmer .65s ease-out forwards;
}
@keyframes shimmer {
  from { background-position: 200% 0; }
  to   { background-position: -200% 0; }
}

/* Time-frame label */
#feat-tf-label {
  font-family: 'DM Sans', sans-serif;
  font-size: 9.5px;
  font-weight: 800;
  color: #F59E0B;
  text-transform: uppercase;
  letter-spacing: 2px;
  line-height: 1;
  opacity: .9;
}

/* Crown */
#feat-crown {
  font-size: 26px;
  line-height: 1;
  filter: drop-shadow(0 0 8px #F59E0B) drop-shadow(0 2px 4px #00000099);
}
#featured.crown-in #feat-crown {
  animation: crown-drop .55s cubic-bezier(.34,1.56,.64,1);
}
@keyframes crown-drop {
  0%   { transform: translateY(-20px) scale(.5) rotate(-12deg); opacity: 0; }
  100% { transform: translateY(0) scale(1) rotate(0deg); opacity: 1; }
}

/* Avatar */
#feat-avatar {
  width: 52px; height: 52px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Boogaloo', cursive;
  font-size: 24px;
  color: #fff;
  overflow: hidden;
  flex-shrink: 0;
  border: 2.5px solid rgba(255,255,255,.25);
  box-shadow: 0 2px 10px rgba(0,0,0,.5);
}
#feat-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }

/* Name — the big deal */
#feat-name {
  font-family: 'Boogaloo', cursive;
  font-size: 30px;
  color: #FAF5FF;
  line-height: 1;
  text-align: center;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 100%;
  text-shadow: 0 2px 10px rgba(0,0,0,.6);
  letter-spacing: .3px;
}

/* Amount */
#feat-amount {
  font-family: 'DM Sans', sans-serif;
  font-weight: 800;
  font-size: 14px;
  color: #E879F9;
  letter-spacing: .4px;
  text-shadow: 0 0 8px #E879F966;
}

/* Platform chip */
.plat-chip {
  font-family: 'DM Sans', sans-serif;
  font-weight: 800;
  font-size: 9px;
  border-radius: 4px;
  padding: 2px 6px;
  line-height: 1.4;
  letter-spacing: .6px;
  text-transform: uppercase;
}
.plat-tiktok   { background: #EE1D52; color: #fff; }
.plat-youtube  { background: #FF0000; color: #fff; }
.plat-direct   { background: #22c55e; color: #fff; }
.plat-unknown  { background: #44415a; color: #ccc; }


/* ════════════════════════════════════════════════════════
   RANKED SECTION
   ════════════════════════════════════════════════════════ */
#ranked-wrap {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 6px;
  min-width: 0;
}

#ranked-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 2px;
}

#ranked-label {
  font-family: 'DM Sans', sans-serif;
  font-size: 9.5px;
  font-weight: 800;
  color: #9333EA;
  text-transform: uppercase;
  letter-spacing: 2px;
}

#ranked-tf-label {
  font-family: 'DM Sans', sans-serif;
  font-size: 9px;
  font-weight: 600;
  color: #5B21B6;
  letter-spacing: .5px;
}

/* The meter itself */
#ranked-meter {
  flex: 1;
  display: flex;
  align-items: stretch;
  background: #07020F;
  border: 1.5px solid #3B1A6B;
  border-radius: 14px;
  overflow: hidden;
  position: relative;
  box-shadow: inset 0 2px 6px rgba(0,0,0,.6), 0 2px 12px rgba(0,0,0,.4);
}

/* Dividers between segments */
.seg-divider {
  width: 1px;
  background: rgba(0,0,0,.5);
  flex-shrink: 0;
  align-self: stretch;
}

/* Each segment */
.segment {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 8px 8px 6px;
  overflow: hidden;
  position: relative;
  transition: flex-grow .75s cubic-bezier(.34,1.56,.64,1);
  min-width: 60px;  /* floor: always readable even at small share */
}

/* Inset shine at top of each segment */
.segment::before {
  content: '';
  position: absolute;
  top: 0; left: 10%; right: 10%;
  height: 1px;
  background: rgba(255,255,255,.08);
}

/* Colour palette: rank 2–6 */
.seg-c0 { background: linear-gradient(170deg, #3B1270 0%, #6D28D9 100%); }
.seg-c1 { background: linear-gradient(170deg, #2E0D5C 0%, #5B21B6 100%); }
.seg-c2 { background: linear-gradient(170deg, #230B4A 0%, #4C1D95 100%); }
.seg-c3 { background: linear-gradient(170deg, #1A0838 0%, #3B1A6B 100%); }
.seg-c4 { background: linear-gradient(170deg, #110526 0%, #2E1065 100%); }

/* Rank badge — top-left */
.seg-rank {
  position: absolute;
  top: 5px; left: 6px;
  font-family: 'Boogaloo', cursive;
  font-size: 11px;
  color: rgba(255,255,255,.35);
  line-height: 1;
}

/* Platform badge — top-right */
.seg-plat {
  position: absolute;
  top: 5px; right: 5px;
  font-family: 'DM Sans', sans-serif;
  font-weight: 800;
  font-size: 7.5px;
  border-radius: 3px;
  padding: 1.5px 3.5px;
  letter-spacing: .4px;
  text-transform: uppercase;
  line-height: 1.3;
}

/* Avatar inside segment */
.seg-avatar {
  width: 34px; height: 34px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Boogaloo', cursive;
  font-size: 15px;
  color: #fff;
  overflow: hidden;
  flex-shrink: 0;
  border: 2px solid rgba(255,255,255,.18);
  margin-bottom: 4px;
}
.seg-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }

.seg-name {
  font-family: 'DM Sans', sans-serif;
  font-weight: 700;
  font-size: 13px;
  color: rgba(255,255,255,.92);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 100%;
  line-height: 1.1;
}

.seg-amount {
  font-family: 'DM Sans', sans-serif;
  font-weight: 700;
  font-size: 11px;
  color: #C084FC;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 100%;
  margin-top: 1px;
}

/* Narrow: hide name + amount, show only rank + avatar */
.segment.narrow .seg-name,
.segment.narrow .seg-amount { display: none; }

/* Very narrow: also hide avatar text label if present */
.segment.very-narrow .seg-avatar { width: 26px; height: 26px; font-size: 12px; }

/* Empty state */
#meter-empty {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  color: #3B1A6B;
  letter-spacing: .5px;
}
</style>
</head>
<body>

<div id="status-dot"></div>
<canvas id="particles"></canvas>

<div id="scene">

  <!-- ── Featured hero card ── -->
  <div id="featured">
    <div id="feat-tf-label">TOP TODAY</div>
    <div id="feat-crown">👑</div>
    <div id="feat-avatar">?</div>
    <div id="feat-name">—</div>
    <div id="feat-amount"></div>
    <div class="plat-chip plat-unknown" id="feat-plat">—</div>
  </div>

  <!-- ── Ranked meter ── -->
  <div id="ranked-wrap">
    <div id="ranked-header">
      <div id="ranked-label">CONTRIBUTORS</div>
      <div id="ranked-tf-label">TOP TODAY</div>
    </div>
    <div id="ranked-meter">
      <div id="meter-empty">Waiting for gifters…</div>
    </div>
  </div>

</div>

<script src="https://cdn.ably.com/lib/ably.min-2.js"></script>
<script>
/* ── CONFIG ─────────────────────────────────────────── */
const CONFIG = {
  ABLY_KEY:     'Y8e-eA.l0VHlg:aJXsEfu1Be4BYsAeATRMI3w30YAKSs_LyF3DPoesIz0',
  ABLY_CHANNEL: 'splat-overlay',
};

/* ── Particle engine ─────────────────────────────────── */
const canvas = document.getElementById('particles');
const ctx    = canvas.getContext('2d');
canvas.width = 860; canvas.height = 240;

const particles = [];
let   animating = false;

function spawnBurst(x, y) {
  const colors = ['#F59E0B','#E879F9','#A855F7','#FAF5FF','#C084FC','#7C3AED','#FBBF24'];
  for (let i = 0; i < 28; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = 1.5 + Math.random() * 3.5;
    particles.push({
      x, y,
      vx: Math.cos(a) * s, vy: Math.sin(a) * s - .8,
      r: 2.5 + Math.random() * 4,
      color: colors[Math.floor(Math.random() * colors.length)],
      life: 1, decay: .022 + Math.random() * .02,
    });
  }
  if (!animating) { animating = true; requestAnimationFrame(tick); }
}

function tick() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += .1;
    p.life -= p.decay;
    if (p.life <= 0) { particles.splice(i, 1); continue; }
    ctx.globalAlpha = p.life;
    ctx.fillStyle   = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;
  animating = particles.length > 0;
  if (animating) requestAnimationFrame(tick);
}

/* ── Helpers ─────────────────────────────────────────── */
const PLAT_CLS = { tiktok: 'plat-tiktok', youtube: 'plat-youtube', direct: 'plat-direct', unknown: 'plat-unknown' };
const PLAT_LBL = { tiktok: 'TikTok', youtube: 'YouTube', direct: 'Direct', unknown: '—' };
const TF_LBL   = { today: 'TOP TODAY', month: 'TOP THIS MONTH', allTime: 'TOP ALL TIME' };
const PLAT_COLOR = { tiktok: '#BE185D', youtube: '#B91C1C', direct: '#15803D', unknown: '#44415a' };

function initial(name) { return (name || '?').trim()[0].toUpperCase(); }

function setAvatar(el, name, platform, profilePic) {
  if (profilePic) {
    el.innerHTML = `<img src="${profilePic}" alt="">`;
    el.style.background = '#1a1a2e';
  } else {
    el.textContent       = initial(name);
    el.style.background  = PLAT_COLOR[platform] || '#44415a';
  }
}

/* ── State ───────────────────────────────────────────── */
let prevFeatName = null;

/* ── Main render ─────────────────────────────────────── */
function updateDisplay(data) {
  const { featured, ranked, timeFrame } = data || {};
  const scene = document.getElementById('scene');

  if (!featured) { scene.classList.remove('visible'); return; }
  scene.classList.add('visible');

  const tfLabel = TF_LBL[timeFrame] || 'TOP TODAY';

  /* ── Featured ── */
  const isNewKing = featured.name !== prevFeatName;
  prevFeatName = featured.name;

  document.getElementById('feat-tf-label').textContent = tfLabel;
  document.getElementById('feat-name').textContent     = featured.name || '—';
  document.getElementById('feat-amount').textContent   = featured.rawDisplay || '';

  const chip = document.getElementById('feat-plat');
  chip.textContent = PLAT_LBL[featured.platform] || '—';
  chip.className   = 'plat-chip ' + (PLAT_CLS[featured.platform] || 'plat-unknown');

  setAvatar(document.getElementById('feat-avatar'), featured.name, featured.platform, featured.profilePic);

  if (isNewKing) {
    const feat = document.getElementById('featured');
    feat.classList.remove('crown-in', 'shimmer');
    void feat.offsetWidth;
    feat.classList.add('crown-in', 'shimmer');
    spawnBurst(115, 120);
    setTimeout(() => feat.classList.remove('crown-in', 'shimmer'), 900);
  }

  /* ── Time-frame labels ── */
  document.getElementById('ranked-tf-label').textContent = tfLabel;
  document.getElementById('ranked-label').textContent    = 'CONTRIBUTORS';

  /* ── Ranked meter ── */
  const meter = document.getElementById('ranked-meter');
  const empty = document.getElementById('meter-empty');

  if (!ranked || ranked.length === 0) {
    meter.innerHTML = '';
    empty.style.display = 'flex';
    meter.appendChild(empty);
    return;
  }
  empty.style.display = 'none';

  // Build segments with dividers between them
  const segHtml = ranked.map((g, i) => {
    const platCls   = PLAT_CLS[g.platform] || 'plat-unknown';
    const platLbl   = PLAT_LBL[g.platform] || '—';
    const colorCls  = `seg-c${Math.min(i, 4)}`;
    const bg        = PLAT_COLOR[g.platform] || '#44415a';
    const avatarHtml = g.profilePic
      ? `<img src="${g.profilePic}" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`
      : initial(g.name);

    const divider = i > 0 ? '<div class="seg-divider"></div>' : '';

    return `${divider}
    <div class="segment ${colorCls}" style="flex-grow:${g.spendShare}">
      <span class="seg-rank">#${g.rank}</span>
      <span class="seg-plat ${platCls}">${platLbl}</span>
      <div class="seg-avatar" style="background:${bg}">${avatarHtml}</div>
      <div class="seg-name">${g.name}</div>
      <div class="seg-amount">${g.rawDisplay}</div>
    </div>`;
  }).join('');

  meter.innerHTML = segHtml;

  // Classify narrow segments after layout
  requestAnimationFrame(() => {
    meter.querySelectorAll('.segment').forEach(seg => {
      const w = seg.offsetWidth;
      seg.classList.toggle('very-narrow', w < 50);
      seg.classList.toggle('narrow',      w < 80);
    });
  });
}

/* ── Ably ────────────────────────────────────────────── */
const ably    = new Ably.Realtime({ key: CONFIG.ABLY_KEY });
const channel = ably.channels.get(CONFIG.ABLY_CHANNEL);
const dot     = document.getElementById('status-dot');

ably.connection.on('connected',    () => dot.classList.add('connected'));
ably.connection.on('disconnected', () => dot.classList.remove('connected'));
ably.connection.on('failed',       () => dot.classList.remove('connected'));

channel.subscribe('leaderboard', msg => updateDisplay(msg.data));
</script>
</body>
</html>
