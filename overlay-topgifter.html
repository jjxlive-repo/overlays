<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Top Gifter Overlay</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 820px;
  height: 200px;
  overflow: hidden;
  background: transparent;
  pointer-events: none;
}

/* ── Connection dot ── */
#status-dot {
  position: fixed;
  top: 6px;
  right: 6px;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: #555;
  box-shadow: 0 0 0 2px rgba(0,0,0,.4);
  transition: background .4s;
  z-index: 100;
}
#status-dot.connected { background: #22c55e; box-shadow: 0 0 5px #22c55e88; }

/* ── Particle canvas ── */
#particles {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 50;
}

/* ── Root scene ── */
#scene {
  width: 820px;
  height: 200px;
  display: flex;
  align-items: stretch;
  padding: 14px 16px;
  gap: 14px;
  opacity: 0;
  transition: opacity .5s;
}
#scene.visible { opacity: 1; }

/* ════════════════════════════ FEATURED SLOT ══ */
#featured {
  width: 210px;
  flex-shrink: 0;
  background: linear-gradient(145deg, #2E0854 0%, #5B21B6 60%, #7C3AED 100%);
  border: 2px solid #A855F7;
  border-radius: 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  padding: 10px 12px;
  position: relative;
  overflow: hidden;
  box-shadow:
    0 0 0 1px #7C3AED44,
    0 4px 28px #4C1D9566,
    inset 0 1px 0 #E879F920;
}

/* Shimmer sweep on crown-drop */
#featured::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(105deg, transparent 40%, rgba(255,255,255,.07) 50%, transparent 60%);
  background-size: 200% 100%;
  background-position: 200% 0;
  border-radius: 14px;
  pointer-events: none;
}
#featured.shimmer::after {
  animation: shimmer-sweep .7s ease-out forwards;
}
@keyframes shimmer-sweep {
  from { background-position: 200% 0; }
  to   { background-position: -200% 0; }
}

#feat-tf-label {
  font-family: 'DM Sans', sans-serif;
  font-size: 9px;
  font-weight: 700;
  color: #C084FC88;
  text-transform: uppercase;
  letter-spacing: 1.8px;
  line-height: 1;
}

#feat-crown {
  font-size: 22px;
  line-height: 1;
  filter: drop-shadow(0 0 6px #F59E0B);
}
#featured.crown-in #feat-crown {
  animation: crown-in .5s cubic-bezier(.34,1.56,.64,1);
}
@keyframes crown-in {
  0%   { transform: translateY(-14px) scale(.6); opacity: 0; }
  100% { transform: translateY(0)     scale(1);  opacity: 1; }
}

/* Avatar circle */
.avatar {
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Boogaloo', cursive;
  color: #fff;
  font-weight: bold;
  overflow: hidden;
  flex-shrink: 0;
  border: 2px solid rgba(255,255,255,.2);
}
.avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }

#feat-avatar {
  width: 44px;
  height: 44px;
  font-size: 20px;
}

#feat-name {
  font-family: 'Boogaloo', cursive;
  font-size: 24px;
  color: #FAF5FF;
  line-height: 1;
  text-align: center;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 100%;
  text-shadow: 0 2px 6px #00000055;
}

#feat-amount {
  font-family: 'DM Sans', sans-serif;
  font-weight: 700;
  font-size: 12px;
  color: #E879F9;
  letter-spacing: .3px;
}

.plat-chip {
  font-family: 'DM Sans', sans-serif;
  font-weight: 700;
  font-size: 9px;
  border-radius: 4px;
  padding: 2px 5px;
  line-height: 1;
  letter-spacing: .5px;
}
.plat-tiktok   { background: #EE1D52; color: #fff; }
.plat-youtube  { background: #FF0000; color: #fff; }
.plat-direct   { background: #22c55e; color: #fff; }
.plat-unknown  { background: #555;    color: #ccc; }

/* ════════════════════════════ RANKED METER ══ */
#ranked-wrap {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 5px;
  min-width: 0;
}

#ranked-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

#ranked-label {
  font-family: 'DM Sans', sans-serif;
  font-size: 9px;
  font-weight: 700;
  color: #7B2FBE;
  text-transform: uppercase;
  letter-spacing: 1.8px;
}

#ranked-tf-label {
  font-family: 'DM Sans', sans-serif;
  font-size: 9px;
  color: #5B21B666;
  letter-spacing: .5px;
}

#ranked-meter {
  flex: 1;
  display: flex;
  align-items: stretch;
  background: #16082E;
  border: 1.5px solid #3B1A6B55;
  border-radius: 12px;
  overflow: hidden;
  position: relative;
}

/* Segments */
.segment {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 6px 5px;
  overflow: hidden;
  position: relative;
  border-right: 1px solid rgba(0,0,0,.3);
  transition: flex-grow .7s cubic-bezier(.34,1.56,.64,1);
  min-width: 28px; /* enough for rank number even when tiny share */
}
.segment:last-child { border-right: none; }

/* Rank number top */
.seg-rank {
  font-family: 'Boogaloo', cursive;
  font-size: 9px;
  color: rgba(255,255,255,.4);
  line-height: 1;
  position: absolute;
  top: 4px;
  left: 5px;
}

/* Platform icon top-right of segment */
.seg-plat {
  position: absolute;
  top: 4px;
  right: 4px;
  font-family: 'DM Sans', sans-serif;
  font-weight: 700;
  font-size: 7px;
  border-radius: 3px;
  padding: 1px 3px;
  letter-spacing: .3px;
}

/* Avatar in segment */
.seg-avatar {
  width: 28px;
  height: 28px;
  font-size: 13px;
  margin-bottom: 3px;
}

.seg-name {
  font-family: 'DM Sans', sans-serif;
  font-weight: 600;
  font-size: 10px;
  color: rgba(255,255,255,.85);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 100%;
  line-height: 1.1;
}

.seg-amount {
  font-family: 'DM Sans', sans-serif;
  font-weight: 700;
  font-size: 9px;
  color: #C084FC;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 100%;
}

/* Hide text when segment is very narrow */
.segment.narrow .seg-name,
.segment.narrow .seg-amount { display: none; }

/* Segment colour palette — index 0 = rank #2 */
.seg-color-0 { background: linear-gradient(160deg, #5B21B6 0%, #7C3AED 100%); }
.seg-color-1 { background: linear-gradient(160deg, #4C1D95 0%, #6D28D9 100%); }
.seg-color-2 { background: linear-gradient(160deg, #3B1A6B 0%, #5B21B6 100%); }
.seg-color-3 { background: linear-gradient(160deg, #2E1065 0%, #4C1D95 100%); }
.seg-color-4 { background: linear-gradient(160deg, #1E0A42 0%, #3B0764 100%); }

/* Empty meter */
#meter-empty {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'DM Sans', sans-serif;
  font-size: 11px;
  color: #3B1A6B;
}
</style>
</head>
<body>

<div id="status-dot"></div>
<canvas id="particles"></canvas>

<div id="scene">
  <!-- Featured -->
  <div id="featured">
    <div id="feat-tf-label">TOP TODAY</div>
    <div id="feat-crown">👑</div>
    <div class="avatar" id="feat-avatar">?</div>
    <div id="feat-name">—</div>
    <div id="feat-amount"></div>
    <div class="plat-chip plat-unknown" id="feat-plat">—</div>
  </div>

  <!-- Ranked meter -->
  <div id="ranked-wrap">
    <div id="ranked-header">
      <div id="ranked-label">CONTRIBUTORS</div>
      <div id="ranked-tf-label">TOP TODAY</div>
    </div>
    <div id="ranked-meter">
      <div id="meter-empty">Waiting for data…</div>
    </div>
  </div>
</div>

<script src="https://cdn.ably.com/lib/ably.min-2.js"></script>
<script>
const CONFIG = {
  ABLY_KEY:     'Y8e-eA.l0VHlg:aJXsEfu1Be4BYsAeATRMI3w30YAKSs_LyF3DPoesIz0',
  ABLY_CHANNEL: 'splat-overlay',
};

// ── Particle canvas ──────────────────────────────────
const canvas = document.getElementById('particles');
const ctx    = canvas.getContext('2d');
canvas.width  = 820;
canvas.height = 200;

const particles = [];
let animating   = false;

function spawnBurst(x, y) {
  const colors = ['#F59E0B','#E879F9','#A855F7','#FAF5FF','#C084FC','#7C3AED'];
  for (let i = 0; i < 22; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1.2 + Math.random() * 3;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - .8,
      r: 2.5 + Math.random() * 3.5,
      color: colors[Math.floor(Math.random() * colors.length)],
      life: 1,
      decay: .025 + Math.random() * .02,
    });
  }
  if (!animating) requestAnimationFrame(tick);
}

function tick() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += .1;
    p.life -= p.decay;
    if (p.life <= 0) { particles.splice(i, 1); continue; }
    ctx.globalAlpha = p.life;
    ctx.fillStyle   = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  animating = particles.length > 0;
  if (animating) requestAnimationFrame(tick);
}

// ── Helpers ──────────────────────────────────────────
const PLAT_CLASSES = {
  tiktok:  'plat-tiktok',
  youtube: 'plat-youtube',
  direct:  'plat-direct',
  unknown: 'plat-unknown',
};
const PLAT_LABELS = {
  tiktok:  'TikTok',
  youtube: 'YouTube',
  direct:  'Direct',
  unknown: '—',
};
const TF_LABELS = {
  today:   'TOP TODAY',
  month:   'TOP THIS MONTH',
  allTime: 'TOP ALL TIME',
};
const AVATAR_BG = ['#7C3AED','#6D28D9','#5B21B6','#4C1D95','#3B1A6B'];
const PLAT_AVATAR_COLOR = {
  tiktok:  '#EE1D52',
  youtube: '#FF0000',
  direct:  '#22c55e',
  unknown: '#555',
};

function avatarBg(platform) {
  return PLAT_AVATAR_COLOR[platform] || '#555';
}

function initial(name) {
  return (name || '?').trim()[0].toUpperCase();
}

function buildAvatar(el, name, platform, profilePic, size) {
  el.style.width  = size + 'px';
  el.style.height = size + 'px';
  el.style.fontSize = Math.round(size * .44) + 'px';
  if (profilePic) {
    el.innerHTML = `<img src="${profilePic}" alt="">`;
    el.style.background = '#333';
  } else {
    el.innerHTML = initial(name);
    el.style.background = avatarBg(platform);
  }
}

// ── State ────────────────────────────────────────────
let prevFeaturedName = null;

// ── Render ───────────────────────────────────────────
function updateDisplay(data) {
  const scene = document.getElementById('scene');
  const { featured, ranked, timeFrame } = data || {};

  if (!featured) {
    scene.classList.remove('visible');
    return;
  }
  scene.classList.add('visible');

  const tfLabel = TF_LABELS[timeFrame] || 'TOP TODAY';

  // ── Featured slot ──
  const isNewKing = featured.name !== prevFeaturedName;
  prevFeaturedName = featured.name;

  document.getElementById('feat-tf-label').textContent = tfLabel;
  document.getElementById('feat-name').textContent     = featured.name || '—';
  document.getElementById('feat-amount').textContent   = featured.rawDisplay || '';

  const featPlat = document.getElementById('feat-plat');
  featPlat.textContent  = PLAT_LABELS[featured.platform] || '—';
  featPlat.className    = 'plat-chip ' + (PLAT_CLASSES[featured.platform] || 'plat-unknown');

  buildAvatar(
    document.getElementById('feat-avatar'),
    featured.name, featured.platform, featured.profilePic, 44
  );

  if (isNewKing) {
    const feat = document.getElementById('featured');
    feat.classList.remove('crown-in', 'shimmer');
    void feat.offsetWidth;
    feat.classList.add('crown-in', 'shimmer');
    setTimeout(() => feat.classList.remove('crown-in', 'shimmer'), 800);
    spawnBurst(105, 100); // center of featured slot
  }

  // ── Ranked tf label ──
  document.getElementById('ranked-tf-label').textContent = tfLabel;

  // ── Ranked meter ──
  const meter = document.getElementById('ranked-meter');
  const empty = document.getElementById('meter-empty');

  if (!ranked || ranked.length === 0) {
    meter.innerHTML = '';
    meter.appendChild(empty);
    empty.style.display = 'flex';
    return;
  }
  empty.style.display = 'none';

  meter.innerHTML = ranked.map((g, i) => {
    const pct     = (g.spendShare * 100).toFixed(1);
    const platCls = PLAT_CLASSES[g.platform] || 'plat-unknown';
    const platLbl = PLAT_LABELS[g.platform]  || '—';
    const colorCls = `seg-color-${Math.min(i, 4)}`;
    const bg      = avatarBg(g.platform);
    const initLetter = initial(g.name);
    const avatarHtml = g.profilePic
      ? `<img src="${g.profilePic}" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`
      : initLetter;

    return `
      <div class="segment ${colorCls}" style="flex-grow:${g.spendShare}" data-name="${g.name}">
        <span class="seg-rank">#${g.rank}</span>
        <span class="seg-plat ${platCls}">${platLbl}</span>
        <div class="avatar seg-avatar" style="background:${bg};font-size:13px;width:28px;height:28px;">${avatarHtml}</div>
        <div class="seg-name">${g.name}</div>
        <div class="seg-amount">${g.rawDisplay}</div>
      </div>
    `;
  }).join('');

  // Mark narrow segments (< 60px) after layout
  requestAnimationFrame(() => {
    meter.querySelectorAll('.segment').forEach(seg => {
      seg.classList.toggle('narrow', seg.offsetWidth < 60);
    });
  });
}

// ── Ably ─────────────────────────────────────────────
const ably    = new Ably.Realtime({ key: CONFIG.ABLY_KEY });
const channel = ably.channels.get(CONFIG.ABLY_CHANNEL);
const dot     = document.getElementById('status-dot');

ably.connection.on('connected',    () => dot.classList.add('connected'));
ably.connection.on('disconnected', () => dot.classList.remove('connected'));
ably.connection.on('failed',       () => dot.classList.remove('connected'));

channel.subscribe('leaderboard', msg => {
  updateDisplay(msg.data);
});
</script>
</body>
</html>
