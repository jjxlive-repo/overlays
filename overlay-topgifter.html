<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Top Gifter Overlay</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 540px;
  height: 300px;
  overflow: hidden;
  background: transparent;
  pointer-events: none;
}

/* ── Connection dot ── */
#status-dot {
  position: fixed;
  top: 8px;
  right: 8px;
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: #555;
  box-shadow: 0 0 0 2px rgba(0,0,0,.4);
  transition: background .4s;
  z-index: 100;
}
#status-dot.connected { background: #22c55e; box-shadow: 0 0 6px #22c55e88; }

/* ── Root scene ── */
#scene {
  width: 540px;
  height: 300px;
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 16px 20px 14px;
}

/* ── Hidden state ── */
#scene.hidden { opacity: 0; }

/* ── #1 Card ── */
#card-1 {
  width: 100%;
  position: relative;
  background: linear-gradient(135deg, #3B0764 0%, #5B1A8A 40%, #7B2FBE 100%);
  border: 2px solid #C084FC;
  border-radius: 18px;
  padding: 14px 18px 14px 22px;
  display: flex;
  align-items: center;
  gap: 14px;
  box-shadow:
    0 0 0 1px #A855F755,
    0 4px 24px #7B2FBE66,
    inset 0 1px 0 #E879F930;
  transform: scale(1);
  transition: transform .3s cubic-bezier(.34,1.56,.64,1);
}

#card-1.pop {
  animation: card-pop .5s cubic-bezier(.34,1.56,.64,1);
}

@keyframes card-pop {
  0%   { transform: scale(1); }
  40%  { transform: scale(1.06); }
  100% { transform: scale(1); }
}

/* Crown */
#crown-wrap {
  position: relative;
  flex-shrink: 0;
  width: 52px;
  height: 52px;
  display: flex;
  align-items: center;
  justify-content: center;
}

#crown-icon {
  font-size: 42px;
  line-height: 1;
  filter: drop-shadow(0 0 8px #F59E0B) drop-shadow(0 2px 4px #00000088);
  transform-origin: center bottom;
  display: block;
}

#card-1.crown-drop #crown-icon {
  animation: crown-drop .6s cubic-bezier(.34,1.56,.64,1);
}

@keyframes crown-drop {
  0%   { transform: translateY(-30px) rotate(-15deg) scale(.6); opacity: 0; }
  60%  { transform: translateY(4px) rotate(4deg) scale(1.15); opacity: 1; }
  100% { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
}

/* #1 text area */
#card-1-text {
  flex: 1;
  min-width: 0;
}

#rank-label-1 {
  font-family: 'Boogaloo', cursive;
  font-size: 13px;
  color: #C084FC;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  line-height: 1;
  margin-bottom: 3px;
}

#name-1 {
  font-family: 'Boogaloo', cursive;
  font-size: 32px;
  color: #FAF5FF;
  line-height: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  text-shadow: 0 2px 8px #00000066;
  transition: opacity .25s;
}

#amount-1 {
  font-family: 'DM Sans', sans-serif;
  font-weight: 700;
  font-size: 15px;
  color: #E879F9;
  margin-top: 4px;
  letter-spacing: .3px;
}

/* Glow ring behind #1 */
#card-1::before {
  content: '';
  position: absolute;
  inset: -4px;
  border-radius: 20px;
  background: transparent;
  box-shadow: 0 0 0 0 #A855F700;
  transition: box-shadow .4s;
  pointer-events: none;
}

#card-1.crown-drop::before {
  animation: ring-flash .6s ease-out;
}

@keyframes ring-flash {
  0%   { box-shadow: 0 0 0 0 #F59E0BCC; }
  40%  { box-shadow: 0 0 24px 8px #F59E0B66; }
  100% { box-shadow: 0 0 0 0 #F59E0B00; }
}

/* ── #2 Card ── */
#card-2 {
  width: 88%;
  align-self: flex-end;
  margin-right: 0;
  background: linear-gradient(135deg, #1e1230 0%, #2d1754 100%);
  border: 1.5px solid #7B2FBE66;
  border-radius: 13px;
  padding: 9px 14px 9px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  box-shadow: 0 2px 12px #00000044;
  opacity: .88;
}

#rank-badge-2 {
  font-family: 'Boogaloo', cursive;
  font-size: 17px;
  color: #A855F7;
  flex-shrink: 0;
  width: 26px;
  text-align: center;
}

#name-2 {
  font-family: 'DM Sans', sans-serif;
  font-weight: 600;
  font-size: 17px;
  color: #C084FC;
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

#amount-2 {
  font-family: 'DM Sans', sans-serif;
  font-weight: 700;
  font-size: 13px;
  color: #7B2FBE;
  flex-shrink: 0;
}

/* ── Particle canvas ── */
#particles {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 50;
}

/* ── Empty state ── */
#empty {
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  color: #7B2FBE88;
  display: none;
}
</style>
</head>
<body>

<div id="status-dot"></div>
<canvas id="particles"></canvas>

<div id="scene" class="hidden">
  <!-- #1 card -->
  <div id="card-1">
    <div id="crown-wrap">
      <span id="crown-icon">👑</span>
    </div>
    <div id="card-1-text">
      <div id="rank-label-1">TOP GIFTER</div>
      <div id="name-1">—</div>
      <div id="amount-1">$0.00</div>
    </div>
  </div>

  <!-- #2 card -->
  <div id="card-2">
    <div id="rank-badge-2">#2</div>
    <div id="name-2">—</div>
    <div id="amount-2">$0.00</div>
  </div>
</div>

<script src="https://cdn.ably.com/lib/ably.min-2.js"></script>
<script>
const CONFIG = {
  ABLY_KEY:     'Y8e-eA.l0VHlg:aJXsEfu1Be4BYsAeATRMI3w30YAKSs_LyF3DPoesIz0',
  ABLY_CHANNEL: 'splat-overlay',
};

// ── State ──────────────────────────────────────────────
let currentTop1Name = null;

// ── DOM refs ───────────────────────────────────────────
const scene    = document.getElementById('scene');
const dot      = document.getElementById('status-dot');
const card1    = document.getElementById('card-1');
const name1El  = document.getElementById('name-1');
const amt1El   = document.getElementById('amount-1');
const name2El  = document.getElementById('name-2');
const amt2El   = document.getElementById('amount-2');
const canvas   = document.getElementById('particles');
const ctx      = canvas.getContext('2d');

canvas.width  = 540;
canvas.height = 300;

// ── Particles ──────────────────────────────────────────
const particles = [];

function spawnBurst() {
  const cx = card1.offsetLeft + card1.offsetWidth * 0.15;
  const cy = card1.offsetTop  + card1.offsetHeight * 0.5;

  const colors = ['#F59E0B','#E879F9','#A855F7','#FAF5FF','#C084FC'];
  for (let i = 0; i < 28; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1.5 + Math.random() * 3.5;
    particles.push({
      x: cx, y: cy,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 1,
      r: 3 + Math.random() * 4,
      color: colors[Math.floor(Math.random() * colors.length)],
      life: 1,
      decay: .022 + Math.random() * .018,
    });
  }
  if (!animating) requestAnimationFrame(tickParticles);
}

let animating = false;
function tickParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += .12;
    p.life -= p.decay;
    if (p.life <= 0) { particles.splice(i, 1); continue; }
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  if (particles.length) { animating = true; requestAnimationFrame(tickParticles); }
  else animating = false;
}

// ── Display update ─────────────────────────────────────
function fmt(n) {
  return '$' + Number(n).toFixed(2);
}

function updateDisplay(top) {
  if (!top || top.length === 0) {
    scene.classList.add('hidden');
    return;
  }

  scene.classList.remove('hidden');
  const [first, second] = top;

  const newTop1 = first ? first.name : null;
  const isNewKing = newTop1 && newTop1 !== currentTop1Name;
  currentTop1Name = newTop1;

  // Update #1
  name1El.textContent = first ? first.name : '—';
  amt1El.textContent  = first ? fmt(first.amount) : '$0.00';

  // Update #2
  if (second) {
    document.getElementById('card-2').style.visibility = 'visible';
    name2El.textContent = second.name;
    amt2El.textContent  = fmt(second.amount);
  } else {
    document.getElementById('card-2').style.visibility = 'hidden';
  }

  // Crown animation on new #1
  if (isNewKing) {
    card1.classList.remove('crown-drop', 'pop');
    void card1.offsetWidth; // reflow
    card1.classList.add('crown-drop', 'pop');
    spawnBurst();
    setTimeout(() => card1.classList.remove('crown-drop', 'pop'), 700);
  }
}

// ── Ably ───────────────────────────────────────────────
const ably    = new Ably.Realtime({ key: CONFIG.ABLY_KEY });
const channel = ably.channels.get(CONFIG.ABLY_CHANNEL);

ably.connection.on('connected', () => dot.classList.add('connected'));
ably.connection.on('disconnected', () => dot.classList.remove('connected'));
ably.connection.on('failed', () => dot.classList.remove('connected'));

channel.subscribe('leaderboard', msg => {
  const { top } = msg.data || {};
  updateDisplay(top);
});
</script>
</body>
</html>
