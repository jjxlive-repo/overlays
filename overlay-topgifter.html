<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080,height=1920,initial-scale=1.0">
<title>Top Gifter Vertical Overlay</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=DM+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 1080px;
  height: 1920px;
  overflow: hidden;
  background: transparent;
  pointer-events: none;
  font-family: 'DM Sans', system-ui, sans-serif;
}
:root {
  --purple: #a855f7;
  --purple2: #7c3aed;
  --hot: #e879f9;
  --gold: #fbbf24;
  --white: #faf5ff;
  --dark: #12051f;
  --tiktok: #ee1d52;
  --youtube: #ff0000;
  --direct: #22c55e;
}
#status-dot {
  position: fixed;
  top: 18px;
  right: 18px;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: #444;
  box-shadow: 0 0 0 3px rgba(0,0,0,.45);
  z-index: 200;
}
#status-dot.connected { background: #22c55e; box-shadow: 0 0 12px #22c55e, 0 0 0 3px rgba(0,0,0,.45); }
#particles {
  position: fixed;
  inset: 0;
  width: 1080px;
  height: 1920px;
  z-index: 80;
}
#stage {
  position: fixed;
  inset: 0;
  width: 1080px;
  height: 1920px;
}
/* Idle carousel lives in the bottom-right safe area. The tracker decides what slot is pinned/enabled. */
#idle-card {
  position: absolute;
  right: 54px;
  bottom: 78px;
  width: 390px;
  min-height: 186px;
  border-radius: 34px;
  padding: 22px 24px 20px;
  background:
    radial-gradient(circle at 22% 10%, rgba(232,121,249,.28), transparent 36%),
    linear-gradient(150deg, rgba(10,1,24,.94), rgba(50,10,94,.92) 58%, rgba(91,33,182,.9));
  border: 3px solid rgba(192,132,252,.85);
  box-shadow:
    0 0 24px rgba(168,85,247,.7),
    0 16px 48px rgba(0,0,0,.5),
    inset 0 1px 0 rgba(255,255,255,.18);
  opacity: 0;
  transform: translateY(28px) scale(.96);
  transition: opacity .55s ease, transform .55s cubic-bezier(.2,1.2,.2,1), filter .25s;
  z-index: 20;
}
#idle-card.visible { opacity: 1; transform: translateY(0) scale(1); }
#idle-card.micro-alert { animation: microJiggle 5s ease both; }
#idle-card::before {
  content: '';
  position: absolute;
  inset: -2px;
  border-radius: 34px;
  background: linear-gradient(115deg, transparent 25%, rgba(255,255,255,.24), transparent 55%);
  background-size: 220% 100%;
  opacity: 0;
  pointer-events: none;
}
#idle-card.micro-alert::before { animation: shimmerSweep 1s ease 0s 4; opacity: 1; }
@keyframes microJiggle {
  0%,100% { transform: translateY(0) scale(1); filter: drop-shadow(0 0 0 rgba(232,121,249,0)); }
  4%,12%,20% { transform: translate(-8px,-5px) rotate(-1.4deg) scale(1.035); }
  8%,16%,24% { transform: translate(8px,3px) rotate(1.4deg) scale(1.035); }
  30%,88% { transform: translateY(0) scale(1.025); filter: drop-shadow(0 0 24px rgba(232,121,249,.8)); }
}
@keyframes shimmerSweep { from { background-position: 220% 0; } to { background-position: -220% 0; } }
.idle-topline {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 10px;
}
#idle-label {
  font-size: 20px;
  font-weight: 900;
  color: var(--gold);
  letter-spacing: 2.2px;
  text-transform: uppercase;
  text-shadow: 0 0 10px rgba(251,191,36,.45);
}
.plat-chip {
  font-size: 17px;
  font-weight: 900;
  border-radius: 999px;
  padding: 5px 11px;
  color: #fff;
  letter-spacing: .8px;
  text-transform: uppercase;
  box-shadow: inset 0 1px 0 rgba(255,255,255,.25);
}
.plat-tiktok { background: var(--tiktok); }
.plat-youtube { background: var(--youtube); }
.plat-direct { background: var(--direct); }
.plat-unknown { background: #5b5568; }
#idle-name {
  font-family: 'Boogaloo', cursive;
  font-size: 58px;
  line-height: .96;
  color: var(--white);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  text-shadow: 0 4px 14px rgba(0,0,0,.7), 0 0 22px rgba(232,121,249,.45);
}
#idle-amount {
  margin-top: 6px;
  font-size: 26px;
  font-weight: 900;
  color: var(--hot);
  letter-spacing: .5px;
}
#idle-sub {
  margin-top: 6px;
  font-size: 16px;
  color: rgba(250,245,255,.7);
  font-weight: 700;
}
#alert-wrap {
  position: absolute;
  inset: 0;
  display: grid;
  place-items: center;
  z-index: 60;
  opacity: 0;
  transform: scale(.4);
  transition: opacity .18s ease;
}
#alert-wrap.active {
  opacity: 1;
  animation: alertIn 6.2s cubic-bezier(.2,1.25,.2,1) forwards;
}
#alert-wrap.big.active { animation-duration: 6.8s; }
#alert-wrap.loud.active, #alert-wrap.third.active, #alert-wrap.mega.active { animation-duration: 7.4s; }
@keyframes alertIn {
  0% { transform: translate(300px,680px) scale(.22) rotate(8deg); opacity: 0; }
  10% { transform: translate(0,0) scale(1.08) rotate(-2deg); opacity: 1; }
  17% { transform: translate(0,0) scale(1) rotate(0); opacity: 1; }
  82% { transform: translate(0,0) scale(1) rotate(0); opacity: 1; }
  100% { transform: translate(0,80px) scale(.72) rotate(-4deg); opacity: 0; }
}
.splat {
  position: relative;
  width: 620px;
  min-height: 390px;
  padding: 76px 58px 60px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  filter: drop-shadow(0 22px 42px rgba(0,0,0,.6)) drop-shadow(0 0 42px rgba(232,121,249,.75));
}
.splat::before {
  content: '';
  position: absolute;
  inset: 0;
  z-index: -1;
  background:
    radial-gradient(circle at 15% 23%, #e879f9 0 8%, transparent 8.5%),
    radial-gradient(circle at 84% 20%, #c084fc 0 10%, transparent 10.5%),
    radial-gradient(circle at 92% 68%, #7c3aed 0 13%, transparent 13.5%),
    radial-gradient(circle at 17% 77%, #a855f7 0 15%, transparent 15.5%),
    radial-gradient(circle at 48% 50%, #8617d6 0 48%, transparent 49%);
  clip-path: polygon(50% 0%, 58% 17%, 82% 7%, 76% 30%, 100% 37%, 78% 52%, 94% 75%, 66% 69%, 56% 100%, 43% 73%, 18% 92%, 24% 62%, 0 55%, 22% 40%, 7% 15%, 36% 24%);
  transform: rotate(-3deg);
  animation: splatPulse 1s ease-in-out infinite alternate;
}
.splat::after {
  content: '';
  position: absolute;
  inset: -40px;
  z-index: -2;
  background: radial-gradient(circle, rgba(232,121,249,.32), transparent 62%);
  animation: glowPulse 1.25s ease-in-out infinite alternate;
}
@keyframes splatPulse { from { transform: rotate(-3deg) scale(1); } to { transform: rotate(2deg) scale(1.035); } }
@keyframes glowPulse { from { opacity: .45; transform: scale(.92); } to { opacity: .95; transform: scale(1.08); } }
#alert-wrap.big .splat { width: 760px; min-height: 480px; }
#alert-wrap.loud .splat { width: 880px; min-height: 560px; }
#alert-wrap.third .splat { width: 980px; min-height: 640px; }
#alert-wrap.mega .splat { width: 1040px; min-height: 980px; }
.alert-kicker {
  font-size: 28px;
  font-weight: 900;
  color: var(--gold);
  letter-spacing: 4px;
  text-transform: uppercase;
  text-shadow: 0 0 18px rgba(251,191,36,.8), 0 4px 8px rgba(0,0,0,.55);
}
.alert-name {
  font-family: 'Boogaloo', cursive;
  font-size: 94px;
  line-height: .88;
  color: #fff;
  max-width: 100%;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  text-shadow: 0 6px 20px rgba(0,0,0,.72), 0 0 34px rgba(255,255,255,.34);
  margin-top: 12px;
}
.alert-amount {
  font-size: 46px;
  font-weight: 900;
  color: #fff7ad;
  margin-top: 16px;
  text-shadow: 0 0 18px rgba(251,191,36,.9), 0 4px 12px rgba(0,0,0,.65);
}
.alert-platform { margin-top: 16px; }
.alert-message {
  margin-top: 20px;
  max-width: 760px;
  font-size: 30px;
  line-height: 1.16;
  font-weight: 800;
  color: #fff;
  background: rgba(20,4,38,.54);
  border: 2px solid rgba(255,255,255,.24);
  border-radius: 24px;
  padding: 18px 22px;
  text-shadow: 0 2px 8px rgba(0,0,0,.65);
}
#alert-wrap.big .alert-name { font-size: 118px; }
#alert-wrap.big .alert-amount { font-size: 58px; }
#alert-wrap.loud .alert-name { font-size: 138px; }
#alert-wrap.loud .alert-amount { font-size: 70px; }
#alert-wrap.third .alert-name { font-size: 150px; }
#alert-wrap.third .alert-amount { font-size: 78px; }
#alert-wrap.mega .alert-name { font-size: 168px; white-space: normal; }
#alert-wrap.mega .alert-amount { font-size: 92px; }
.starburst {
  position: absolute;
  inset: -120px;
  z-index: -3;
  opacity: .9;
  background: repeating-conic-gradient(from 0deg, rgba(232,121,249,.3) 0 8deg, transparent 8deg 18deg);
  border-radius: 50%;
  animation: spin 6s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.hidden { display: none; }
</style>
</head>
<body>
<div id="status-dot"></div>
<canvas id="particles" width="1080" height="1920"></canvas>
<div id="stage">
  <div id="idle-card">
    <div class="idle-topline">
      <div id="idle-label">TOP TODAY</div>
      <div class="plat-chip plat-unknown" id="idle-platform">—</div>
    </div>
    <div id="idle-name">Waiting…</div>
    <div id="idle-amount">No gifts yet</div>
    <div id="idle-sub">Idle carousel</div>
  </div>

  <div id="alert-wrap" aria-hidden="true">
    <div class="starburst"></div>
    <div class="splat">
      <div class="alert-kicker" id="alert-kicker">SPLAT!</div>
      <div class="alert-name" id="alert-name">—</div>
      <div class="alert-amount" id="alert-amount"></div>
      <div class="alert-platform"><span class="plat-chip plat-unknown" id="alert-platform">—</span></div>
      <div class="alert-message hidden" id="alert-message"></div>
    </div>
  </div>
</div>
<script src="https://cdn.ably.com/lib/ably.min-2.js"></script>
<script>
'use strict';
const CONFIG = {
  ABLY_KEY: 'Y8e-eA.l0VHlg:aJXsEfu1Be4BYsAeATRMI3w30YAKSs_LyF3DPoesIz0',
  ABLY_CHANNEL: 'splat-overlay',
  ROTATE_MS: 6500,
};
const PLAT_CLS = { tiktok:'plat-tiktok', youtube:'plat-youtube', direct:'plat-direct', unknown:'plat-unknown' };
const PLAT_LBL = { tiktok:'TikTok', youtube:'YouTube', direct:'Direct', unknown:'—' };
const SLOT_LABEL = { daily:'TOP TODAY', weekly:'TOP WEEK', monthly:'TOP MONTH', youtube:'TOP YOUTUBE', tiktok:'TOP TIKTOK', custom:'FEATURED' };
const idle = {
  card: document.getElementById('idle-card'),
  label: document.getElementById('idle-label'),
  name: document.getElementById('idle-name'),
  amount: document.getElementById('idle-amount'),
  sub: document.getElementById('idle-sub'),
  platform: document.getElementById('idle-platform'),
};
const alertEls = {
  wrap: document.getElementById('alert-wrap'),
  kicker: document.getElementById('alert-kicker'),
  name: document.getElementById('alert-name'),
  amount: document.getElementById('alert-amount'),
  platform: document.getElementById('alert-platform'),
  message: document.getElementById('alert-message'),
};
let lastGiftrPayload = null;
let slides = [];
let slideIndex = 0;
let rotateTimer = null;
let alertTimer = null;
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
const particles = [];
let animating = false;
function esc(v) {
  const d = document.createElement('div');
  d.textContent = String(v ?? '');
  return d.innerHTML;
}
function setChip(el, platform) {
  const p = (platform || 'unknown').toLowerCase();
  el.textContent = PLAT_LBL[p] || p.toUpperCase();
  el.className = 'plat-chip ' + (PLAT_CLS[p] || 'plat-unknown');
}
function formatGift(g) {
  if (!g) return '';
  if (g.rawDisplay) return g.rawDisplay;
  if (g.type === 'tiktok_coins') return Number(g.amount || 0).toLocaleString() + ' coins';
  if (g.type === 'youtube_jewels') return Number(g.amount || 0).toLocaleString() + ' jewels';
  if (g.type === 'youtube_superchat' || g.type === 'direct_donation') return '$' + Number(g.amount || 0).toFixed(2);
  return Number(g.amount || 0).toLocaleString();
}
function buildSlides(payload) {
  const enabled = payload?.enabledSlots?.length ? payload.enabledSlots : ['daily','weekly','monthly','youtube','tiktok'];
  const out = [];
  if (payload?.custom) out.push({ slot:'custom', ...payload.custom });
  enabled.forEach(slot => {
    if (payload?.[slot]) out.push({ slot, ...payload[slot] });
  });
  return out.filter(Boolean);
}
function renderIdleGift(g, temporaryLabel) {
  idle.card.classList.add('visible');
  idle.label.textContent = temporaryLabel || SLOT_LABEL[g?.slot] || 'TOP GIFTER';
  idle.name.textContent = g?.name || 'Waiting…';
  idle.amount.textContent = g ? formatGift(g) : 'No gifts yet';
  idle.sub.textContent = temporaryLabel ? 'New gift!' : 'Idle carousel';
  setChip(idle.platform, g?.platform || 'unknown');
}
function rotateIdle() {
  if (!slides.length) { renderIdleGift(null); return; }
  renderIdleGift(slides[slideIndex % slides.length]);
  slideIndex++;
}
function scheduleRotation() {
  clearInterval(rotateTimer);
  rotateTimer = setInterval(rotateIdle, CONFIG.ROTATE_MS);
}
function updateGiftrCarousel(payload) {
  lastGiftrPayload = payload || {};
  slides = buildSlides(lastGiftrPayload);
  slideIndex = 0;
  rotateIdle();
  scheduleRotation();
}
function spawnBurst(x, y, count, power) {
  const colors = ['#fbbf24','#e879f9','#a855f7','#faf5ff','#c084fc','#7c3aed','#fff7ad'];
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = (2 + Math.random() * 7) * power;
    particles.push({
      x, y,
      vx: Math.cos(a) * s,
      vy: Math.sin(a) * s - 2 * power,
      r: 3 + Math.random() * 8 * power,
      color: colors[Math.floor(Math.random() * colors.length)],
      life: 1,
      decay: .009 + Math.random() * .018,
    });
  }
  if (!animating) { animating = true; requestAnimationFrame(tick); }
}
function tick() {
  ctx.clearRect(0,0,1080,1920);
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += .16;
    p.life -= p.decay;
    if (p.life <= 0) { particles.splice(i,1); continue; }
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;
  animating = particles.length > 0;
  if (animating) requestAnimationFrame(tick);
}
function tierClass(alert) {
  if (alert?.tier) return alert.tier;
  const usd = Number(alert?.viewerValue || 0);
  const raw = Number(alert?.amount || 0);
  if (usd >= 400) return 'mega';
  if (usd >= 250 || raw >= 25000) return 'third';
  if (usd >= 100 || raw >= 100000) return 'loud';
  if (usd >= 50 || raw >= 5000) return 'big';
  if (usd >= 9.99 || raw >= 1000) return 'center';
  return 'micro';
}
function handleGiftAlert(alert) {
  const cls = tierClass(alert);
  const displayGift = { name: alert.name, amount: alert.amount, type: alert.type, rawDisplay: alert.rawDisplay, platform: alert.platform };
  if (cls === 'micro') {
    renderIdleGift(displayGift, 'NEW GIFT');
    idle.card.classList.remove('micro-alert');
    void idle.card.offsetWidth;
    idle.card.classList.add('micro-alert');
    spawnBurst(880, 1760, 24, .55);
    clearTimeout(alertTimer);
    alertTimer = setTimeout(() => { idle.card.classList.remove('micro-alert'); rotateIdle(); }, 5000);
    return;
  }
  const classList = ['active','center','big','loud','third','mega'];
  alertEls.wrap.classList.remove(...classList);
  alertEls.name.textContent = alert.name || 'Unknown';
  alertEls.amount.textContent = formatGift(alert);
  setChip(alertEls.platform, alert.platform || 'unknown');
  const labels = { center:'BIG SPLAT!', big:'HUGE SPLAT!', loud:'LOUD SPLAT!', third:'MASSIVE SPLAT!', mega:'MAX SPLAT!' };
  alertEls.kicker.textContent = labels[cls] || 'BIG SPLAT!';
  const msg = (alert.message || '').trim();
  if (msg && alert.type === 'youtube_superchat') {
    alertEls.message.textContent = msg;
    alertEls.message.classList.remove('hidden');
  } else {
    alertEls.message.textContent = '';
    alertEls.message.classList.add('hidden');
  }
  void alertEls.wrap.offsetWidth;
  alertEls.wrap.classList.add('active', cls);
  const particlePlan = { center:[90,1], big:[150,1.25], loud:[220,1.55], third:[300,1.8], mega:[420,2.15] }[cls] || [90,1];
  spawnBurst(540, 930, particlePlan[0], particlePlan[1]);
  setTimeout(() => spawnBurst(540, 780, Math.floor(particlePlan[0]*.45), particlePlan[1]*.85), 420);
  clearTimeout(alertTimer);
  alertTimer = setTimeout(() => alertEls.wrap.classList.remove(...classList), cls === 'center' ? 6300 : 7600);
}
/* Legacy leaderboard support: if the old leaderboard event comes in, use it as a fallback idle slide. */
function updateLegacyLeaderboard(data) {
  if (!data?.featured || slides.length) return;
  slides = [{ slot: data.timeFrame || 'daily', ...data.featured }];
  rotateIdle();
  scheduleRotation();
}
const ably = new Ably.Realtime({ key: CONFIG.ABLY_KEY });
const channel = ably.channels.get(CONFIG.ABLY_CHANNEL);
const dot = document.getElementById('status-dot');
ably.connection.on('connected', () => {
  dot.classList.add('connected');
  channel.publish('cmd', 'requestLeaderboard').catch(() => {});
});
ably.connection.on('disconnected', () => dot.classList.remove('connected'));
ably.connection.on('failed', () => dot.classList.remove('connected'));
channel.subscribe('giftr', msg => updateGiftrCarousel(msg.data));
channel.subscribe('giftr-cmd', msg => {
  const cmd = String(msg.data || 'auto');
  if (cmd === 'auto') { updateGiftrCarousel(lastGiftrPayload); return; }
  if (cmd.startsWith('slot:')) {
    const slot = cmd.slice(5);
    const picked = slides.find(s => s.slot === slot) || (lastGiftrPayload && lastGiftrPayload[slot] ? { slot, ...lastGiftrPayload[slot] } : null);
    if (picked) { clearInterval(rotateTimer); renderIdleGift(picked); }
  }
});
channel.subscribe('leaderboard', msg => updateLegacyLeaderboard(msg.data));
channel.subscribe('gift-alert', msg => handleGiftAlert(msg.data));
renderIdleGift(null);
</script>
</body>
</html>
