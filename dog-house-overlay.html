<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Build Jamie's Dog House — Overlay</title>
<!--
  BUILD JAMIE'S DOG HOUSE — community-building overlay (1080x1920 browser source).

  Viewers earn a place in Jamie's yard:
    first chat  → temporary gray "preview" Splatty (capped, TTL) — "this could be you"
    Heart Me    → 5-phase join: heart pulse ack → color-fill activation → move-in →
                  placement bounce + neighbor reactions → callout   (JOIN moment)
    first gift  → FIRST GIFT badge → builder prop → travel to house → hammer taps
                  with structure shake → stage reveal → return      (BUILD moment)
    repeat gift → small/medium/large reaction pool + tiny yard decoration

  The dog house grows through 8 visual stages, each revealed with its own build
  animation (planks slide, walls rise, roof swings, sign drops, lights sequence).
  Everything is DOM/CSS — no canvas, no rAF loop; JS runs on events plus light
  interval schedulers that pause when the tab is hidden or a major event plays.

  EVENT SEQUENCER: all big moments run through a priority queue so animations
  never pile up. Every event gets an instant micro-acknowledgment (heart pulse /
  spot claim in data) even while its full animation waits. 3+ queued Heart Mes
  collapse into a burst ("N NEW SPLATTIES MOVED IN!") with staggered entrances.

  ABLY COST: attaches ONLY to the dedicated low-volume 'dog-house' channel.
  stream-dock does classification + per-user dedup before relaying (~1 msg per
  unique chatter + 1 per Heart Me/gift). This overlay must NEVER attach to the
  shared 'splat-overlay' firehose — Ably bills every delivery to every attached
  client regardless of event-name filters.

  Messages on 'dog-house':
    'dh'        {t:'chat'|'heart'|'gift', u, amount?, kind?, gift?}
    'dh-cmd'    {cmd:'reset'|'clear'|'addSplatty'|'stage'|'emergencyClear', u?, v?}
    'dh-config' {cfg:{...partial CONFIG...}}

  ART ASSETS: illustrated sticker art lives in assets/splatty-house-assets/
  splatty-house/ (project root): 8 doghouse stages sharing one footprint
  (content bottom at canvas y=1042 — measured, baked into HOUSE geometry
  below), splatties in 6 colors x 3 poses (ground/peek/roof), construction
  props, decorations, and a doorway-front mask used for the "resident peeks
  out the door" idle. The overlay probes for the art on load and swaps it in;
  if the folder is missing it falls back to the built-in vector art.
-->
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; height: 1920px; overflow: hidden; background: transparent; }
  body { font-family: 'DM Sans', 'Segoe UI', sans-serif; pointer-events: none; }

  #module {
    position: absolute; left: 0; top: 0;
    transform: translate(var(--mx, 30px), var(--my, 1660px)) scale(var(--msc, 1));
    transform-origin: bottom left;
    width: 0; height: 0;
  }

  /* ── dog house ─────────────────────────────────────────────────────── */
  #house { position: absolute; left: 0; bottom: 0; width: 300px; height: 280px; z-index: 10; transform-origin: 50% 100%; }
  #house svg { width: 100%; height: 100%; display: block; overflow: visible; }
  /* stage art: full 1200-canvas img, geometry set by JS so the measured
     footprint (canvas y=1042) lands exactly on the module ground line */
  #house img.stage-img { position: absolute; display: none; max-width: none; }
  #house img.stage-img.fade { animation: stageFade .55s ease; }
  @keyframes stageFade { from { opacity: 0; transform: scale(.985); } to { opacity: 1; transform: scale(1); } }
  #house.idle-sway { animation: idleSway 2.2s ease-in-out; }
  @keyframes idleSway { 0%,100% { transform: rotate(0); } 30% { transform: rotate(.7deg); } 70% { transform: rotate(-.5deg); } }
  .st { opacity: 0; }
  .st.on { opacity: 1; }
  #house.celebrate { animation: houseBounce .7s ease; }
  @keyframes houseBounce {
    0% { transform: scale(1); } 30% { transform: scale(1.06) rotate(-1deg); }
    55% { transform: scale(.98) rotate(.6deg); } 100% { transform: scale(1); }
  }
  #house.shake { animation: houseShake .28s ease; }
  @keyframes houseShake {
    0%,100% { transform: translateX(0); } 30% { transform: translateX(-3px) rotate(-.5deg); }
    65% { transform: translateX(3px) rotate(.4deg); }
  }

  /* per-stage build reveal animations — playful, with overshoot + settle */
  .st { transform-box: fill-box; transform-origin: 50% 100%; }
  .st.b2 { animation: bFrame .9s cubic-bezier(.2,1.2,.4,1); }
  @keyframes bFrame { 0% { transform: translateX(-46px); opacity: 0; } 60% { transform: translateX(7px); opacity: 1; } 80% { transform: translateX(-3px); } 100% { transform: translateX(0); } }
  .st.b3 { animation: bWall 1s cubic-bezier(.2,1.2,.4,1); }
  @keyframes bWall { 0% { transform: translateY(52px); opacity: 0; } 55% { transform: translateY(-9px); opacity: 1; } 78% { transform: translateY(4px); } 100% { transform: translateY(0); } }
  .st.b4 { transform-origin: 50% 0; animation: bRoof 1.1s cubic-bezier(.2,1.2,.4,1); }
  @keyframes bRoof { 0% { transform: rotate(-9deg) translateY(-34px); opacity: 0; } 55% { transform: rotate(2.5deg) translateY(3px); opacity: 1; } 80% { transform: rotate(-1deg); } 100% { transform: rotate(0) translateY(0); } }
  .st.b5 { transform-origin: 50% 0; animation: bSign .95s cubic-bezier(.2,1.2,.4,1); }
  @keyframes bSign { 0% { transform: translateY(-58px); opacity: 0; } 45% { transform: translateY(4px) rotate(5deg); opacity: 1; } 68% { transform: rotate(-3.5deg); } 86% { transform: rotate(1.6deg); } 100% { transform: rotate(0); } }
  .st.b6 { animation: bYard .85s cubic-bezier(.2,1.2,.4,1); }
  @keyframes bYard { 0% { transform: scale(.4) translateY(16px); opacity: 0; } 65% { transform: scale(1.09); opacity: 1; } 100% { transform: scale(1) translateY(0); } }
  .st.b7 { animation: bFence .85s cubic-bezier(.2,1.2,.4,1); }
  @keyframes bFence { 0% { transform: translateX(30px) scale(.5); opacity: 0; } 65% { transform: translateX(-5px) scale(1.06); opacity: 1; } 100% { transform: translateX(0) scale(1); } }
  .st.b8 { animation: bLights 1.4s ease; }
  @keyframes bLights { 0% { opacity: 0; filter: brightness(.4); } 40% { opacity: 1; filter: brightness(.6); } 60% { filter: brightness(1.7); } 75% { filter: brightness(.9); } 90% { filter: brightness(1.4); } 100% { filter: brightness(1); } }

  /* environmental idles */
  #st5.sign-swing { transform-origin: 50% 0; animation: signSwing 1.6s ease-in-out; }
  @keyframes signSwing { 0%,100% { transform: rotate(0); } 30% { transform: rotate(2.6deg); } 70% { transform: rotate(-2deg); } }
  #st8.light-flicker { animation: lightFlicker 1.2s ease; }
  @keyframes lightFlicker { 0%,100% { filter: brightness(1); } 30% { filter: brightness(1.8); } 50% { filter: brightness(.8); } 65% { filter: brightness(1.5); } }
  #st6.bowl-shine { animation: bowlShine 1.3s ease; }
  @keyframes bowlShine { 0%,100% { filter: brightness(1); } 45% { filter: brightness(1.5) saturate(1.3); } }
  #door-eyes {
    position: absolute; left: 128px; bottom: 26px; width: 44px; height: 20px; z-index: 11;
    opacity: 0; transition: opacity .5s ease; pointer-events: none;
  }
  #door-eyes::before, #door-eyes::after {
    content: ''; position: absolute; top: 0; width: 12px; height: 14px; border-radius: 50%;
    background: #fff;
  }
  #door-eyes::before { left: 5px; } #door-eyes::after { right: 5px; }
  #door-eyes.peek { opacity: .9; }

  /* ── build meter ───────────────────────────────────────────────────── */
  #meter {
    position: absolute; left: 10px; bottom: -26px; width: 280px; height: 14px; z-index: 12;
    background: rgba(20, 12, 40, .55); border: 2px solid rgba(255,255,255,.25);
    border-radius: 8px; overflow: hidden;
  }
  #meter-fill { height: 100%; width: 0%; border-radius: 6px; background: linear-gradient(90deg, #A855F7, #f0abfc); transition: width .5s ease; }
  #meter-label {
    position: absolute; left: 10px; bottom: -48px; width: 280px; text-align: center; z-index: 12;
    font: 800 15px 'DM Sans', sans-serif; color: #fff; white-space: nowrap;
    text-shadow: 0 1px 0 rgba(0,0,0,.85), 0 2px 5px rgba(0,0,0,.6); letter-spacing: .3px;
  }

  /* ── splatties ─────────────────────────────────────────────────────── */
  .splatty {
    position: absolute; width: 60px; height: 60px; margin-left: -30px;
    bottom: 0; will-change: transform, opacity;
  }
  .splatty.travel { transition: left var(--tdur, .9s) cubic-bezier(.2,1.2,.4,1), bottom var(--tdur, .9s) cubic-bezier(.2,1.2,.4,1); }
  .splatty .inner { width: 100%; height: 100%; transform-origin: 50% 100%; position: relative; }
  .splatty svg { width: 100%; height: 100%; overflow: visible; display: block; }
  /* pose sprites are 1200-canvas PNGs with padding — JS sets width/left/bottom
     from measured content bounds so the blob fills the 60px element exactly */
  .splatty img.sp-img { position: absolute; max-width: none; }
  .splatty .inner.bobbing { animation: bob var(--bobDur, 2.6s) ease-in-out var(--bobDelay, 0s) infinite; }
  @keyframes bob { 0%,100% { transform: translateY(0) scale(1,1); } 50% { transform: translateY(-3px) scale(.985,1.015); } }
  .splatty .eyes { animation: blink 5.2s step-end var(--blinkDelay, 0s) infinite; transform-origin: 50% 60%; }
  @keyframes blink { 0%,94%,100% { transform: scaleY(1); } 95%,98% { transform: scaleY(.08); } }

  .splatty.preview { filter: grayscale(1) brightness(1.15); opacity: .6; }
  .splatty.preview::after { content: '💤'; position: absolute; top: -15px; right: -7px; font-size: 15px; opacity: .85; }
  .splatty.activating { animation: activate .7s ease; filter: none; opacity: 1; }
  .splatty.activating::after { content: none; }
  @keyframes activate {
    0% { filter: grayscale(1) brightness(1.6); transform: scale(.82, 1.12); }
    45% { filter: grayscale(.3) brightness(1.35); transform: scale(1.14, .88); }
    100% { filter: none; transform: scale(1); }
  }
  .splatty.fade-in { animation: fadeIn .5s ease; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .splatty.drop-in .inner { animation: dropIn .8s cubic-bezier(.2,1.2,.4,1); }
  @keyframes dropIn { 0% { transform: translateY(-84px); opacity: 0; } 60% { transform: translateY(7px) scale(1.06,.9); opacity: 1; } 80% { transform: translateY(-3px) scale(.97,1.05); } 100% { transform: translateY(0) scale(1); } }
  .splatty.hop-travel .inner { animation: hopTravel .32s ease-in-out 0s 3; }
  @keyframes hopTravel { 0%,100% { transform: translateY(0) scale(1,1); } 40% { transform: translateY(-13px) scale(.94,1.08); } 85% { transform: translateY(1px) scale(1.07,.92); } }
  .splatty.settle .inner { animation: settle .5s cubic-bezier(.2,1.2,.4,1); }
  @keyframes settle { 0% { transform: scale(1.12,.85); } 55% { transform: scale(.94,1.08); } 100% { transform: scale(1,1); } }
  .splatty.leave { transition: opacity .7s ease, left .8s ease-in, bottom .8s ease-in; opacity: 0; }

  /* one-shot reactions (applied to .inner so they stack with travel) */
  .inner.act-hop { animation: actHop .5s cubic-bezier(.2,1.2,.4,1); }
  @keyframes actHop { 0%,100% { transform: translateY(0); } 40% { transform: translateY(-14px) scale(.95,1.06); } 78% { transform: translateY(1px) scale(1.06,.93); } }
  .inner.act-cheer { animation: actCheer .42s ease 0s 3; }
  @keyframes actCheer { 0%,100% { transform: translateY(0) rotate(0); } 50% { transform: translateY(-12px) rotate(5deg); } }
  .inner.act-wave { animation: actWave .9s ease; }
  @keyframes actWave { 0%,100% { transform: rotate(0); } 25% { transform: rotate(-9deg); } 60% { transform: rotate(7deg); } }
  .inner.act-look { animation: actLook 1.6s ease; }
  @keyframes actLook { 0%,100% { transform: translateX(0); } 30% { transform: translateX(-4px) rotate(-4deg); } 70% { transform: translateX(4px) rotate(4deg); } }
  .inner.act-lean { animation: actLean 1.4s ease; }
  @keyframes actLean { 0%,100% { transform: rotate(0); } 45% { transform: rotate(7deg) translateX(3px); } }
  .inner.act-wiggle { animation: actWiggle .7s ease; }
  @keyframes actWiggle { 0%,100% { transform: rotate(0) scale(1,1); } 25% { transform: rotate(-5deg) scale(1.04,.96); } 65% { transform: rotate(5deg) scale(.96,1.04); } }
  .inner.act-duck { animation: actDuck .8s ease; }
  @keyframes actDuck { 0%,100% { transform: scale(1,1); } 35% { transform: scale(1.12,.72) translateY(6px); } }
  .inner.act-tap { animation: actTap .3s ease; }
  @keyframes actTap { 0% { transform: rotate(0); } 40% { transform: rotate(-14deg) translateY(-4px); } 75% { transform: rotate(6deg) translateY(2px); } 100% { transform: rotate(0); } }
  .splatty.glow svg, .splatty.glow img.sp-img { filter: drop-shadow(0 0 8px rgba(240,171,252,.95)); }
  .splatty.aura::before {
    content: ''; position: absolute; inset: -9px; border-radius: 50%;
    border: 3px solid rgba(251,191,36,.85); animation: aura 1s ease-in-out infinite;
  }
  @keyframes aura { 0%,100% { transform: scale(1); opacity: .9; } 50% { transform: scale(1.12); opacity: .5; } }

  .splatty .tag {
    position: absolute; left: 50%; top: -24px; transform: translateX(-50%);
    background: rgba(20,12,40,.8); color: #fff; font: 800 17px 'DM Sans', sans-serif;
    padding: 2px 9px; border-radius: 9px; white-space: nowrap; max-width: 150px;
    overflow: hidden; text-overflow: ellipsis;
    text-shadow: 0 1px 0 rgba(0,0,0,.7);
    opacity: 0; transition: opacity .35s ease;
  }
  .splatty .tag.show { opacity: 1; }
  .splatty .badge {
    position: absolute; left: 50%; top: -46px; transform: translateX(-50%);
    background: linear-gradient(180deg, #fbbf24, #d97706); color: #241300;
    font: 900 15px 'DM Sans', sans-serif; padding: 2px 9px; border-radius: 9px;
    border: 2px solid #fff7e0; white-space: nowrap;
    animation: popBadge .4s cubic-bezier(.2,1.2,.4,1);
  }
  @keyframes popBadge { 0% { transform: translateX(-50%) scale(0); } 70% { transform: translateX(-50%) scale(1.15); } 100% { transform: translateX(-50%) scale(1); } }
  .splatty .prop { position: absolute; right: -12px; top: -8px; font-size: 22px; animation: popBadge .35s ease; }
  .splatty.peek-clip { clip-path: inset(0 0 42% 0); }

  #crowd-chip {
    position: absolute; left: 96px; bottom: 62px; display: none; z-index: 11;
    background: rgba(20,12,40,.8); border: 2px solid rgba(168,85,247,.7);
    color: #fff; font: 900 16px 'DM Sans', sans-serif; padding: 3px 11px; border-radius: 12px;
    white-space: nowrap; text-shadow: 0 1px 0 rgba(0,0,0,.7);
  }

  /* ── transient fx ──────────────────────────────────────────────────── */
  .plank {
    position: absolute; width: 48px; height: 11px; border-radius: 3px; z-index: 45;
    background: linear-gradient(#c98f52, #a9713a); border: 2px solid #6b4423;
    will-change: transform, opacity;
    transition: left 1s ease-in-out, bottom 1s ease-in-out;
  }
  .plank.art { width: 64px; height: 20px; border: none; border-radius: 0; background: none; }
  .plank.art img { width: 100%; height: 100%; object-fit: contain; }
  .splatty .prop img { width: 32px; height: 32px; object-fit: contain; display: block; }
  #door-peeker { position: absolute; z-index: 11; opacity: 0; transition: opacity .5s ease, bottom .6s ease; pointer-events: none; }
  #door-peeker img { max-width: none; position: absolute; }
  #door-mask { position: absolute; z-index: 12; display: none; pointer-events: none; max-width: none; }
  /* Jamie celebrate sticker — pops in beside the house on milestones/large gifts */
  #jamie-react { position: absolute; z-index: 34; opacity: 0; pointer-events: none; transform-origin: 50% 100%; }
  #jamie-react img { max-width: none; position: absolute; }
  #jamie-react.show { animation: jamiePop 2.6s cubic-bezier(.2,1.2,.4,1); }
  @keyframes jamiePop {
    0% { opacity: 0; transform: scale(.3) translateY(20px); }
    12% { opacity: 1; transform: scale(1.08) translateY(-4px); }
    20% { transform: scale(1) translateY(0) rotate(0); }
    32% { transform: rotate(-4deg); } 44% { transform: rotate(3.5deg); }
    56% { transform: rotate(-2.5deg); } 68% { transform: rotate(2deg) ; }
    82% { opacity: 1; transform: rotate(0) scale(1); }
    100% { opacity: 0; transform: scale(.9) translateY(8px); }
  }
  .sparkle { position: absolute; font-size: 21px; animation: spark .9s ease forwards; z-index: 46; }
  @keyframes spark { 0% { transform: translateY(0) scale(.6); opacity: 0; } 25% { opacity: 1; } 100% { transform: translateY(-48px) scale(1.15); opacity: 0; } }
  .heart-pulse { position: absolute; font-size: 26px; z-index: 46; animation: heartPulse .8s ease forwards; }
  @keyframes heartPulse { 0% { transform: scale(.3); opacity: 0; } 35% { transform: scale(1.25); opacity: 1; } 100% { transform: scale(1) translateY(-22px); opacity: 0; } }
  .dust { position: absolute; font-size: 18px; z-index: 44; animation: dust .7s ease forwards; }
  @keyframes dust { 0% { transform: scale(.4); opacity: .9; } 100% { transform: scale(1.7) translateY(-8px); opacity: 0; } }
  .deco { position: absolute; font-size: 20px; animation: popBadge .5s cubic-bezier(.2,1.2,.4,1); z-index: 8; }
  .bone-toss { position: absolute; font-size: 20px; z-index: 46; animation: boneToss 1.2s ease-in forwards; }
  @keyframes boneToss {
    0% { transform: translate(0,0) rotate(0); opacity: 1; }
    50% { transform: translate(60px,-70px) rotate(180deg); }
    100% { transform: translate(120px,6px) rotate(390deg); opacity: 0; }
  }
  #door-glow {
    position: absolute; left: 113px; bottom: 18px; width: 74px; height: 72px; z-index: 9;
    background: radial-gradient(ellipse at 50% 90%, rgba(253,224,71,.85), transparent 70%);
    opacity: 0; transition: opacity .5s ease; border-radius: 50% 50% 0 0;
  }
  #door-glow.on { opacity: 1; }

  /* ── callout ───────────────────────────────────────────────────────── */
  #callout {
    position: absolute; left: 260px; bottom: 305px; transform: translateX(-50%) scale(0); z-index: 60;
    background: rgba(20,12,40,.87); border: 2.5px solid #A855F7; border-radius: 14px;
    color: #fff; font: 800 21px 'DM Sans', sans-serif; padding: 9px 17px;
    width: max-content; max-width: 440px; text-align: center; line-height: 1.3;
    text-shadow: 0 1px 0 rgba(0,0,0,.8);
  }
  #callout.show { animation: coIn .38s cubic-bezier(.2,1.2,.4,1) forwards; }
  @keyframes coIn { 0% { transform: translateX(-50%) scale(.86); opacity: 0; } 60% { transform: translateX(-50%) scale(1.05); opacity: 1; } 100% { transform: translateX(-50%) scale(1); opacity: 1; } }
  #callout.out { animation: coOut .45s ease-in forwards; }
  @keyframes coOut { 0% { transform: translateX(-50%) scale(1) translateY(0); opacity: 1; } 100% { transform: translateX(-50%) scale(.96) translateY(-14px); opacity: 0; } }
  #callout.first-gift { border-color: #fbbf24; box-shadow: 0 0 18px rgba(251,191,36,.5); }
  #callout.milestone { border-color: #f0abfc; box-shadow: 0 0 18px rgba(240,171,252,.55); font-size: 24px; }
  #callout .u { color: #f0abfc; }

  /* ── edit mode guides (never in live output unless enabled) ────────── */
  #edit-guides { display: none; }
  #module.edit #edit-guides { display: block; }
  #edit-wrap { position: absolute; left: -50px; bottom: -155px; width: 720px; height: 520px; border: 2px dashed rgba(168,85,247,.8); z-index: 90; }
  #edit-anchor { position: absolute; left: -6px; bottom: -6px; width: 12px; height: 12px; background: #f43f5e; border-radius: 50%; z-index: 91; }
  .slot-dot {
    position: absolute; width: 14px; height: 14px; margin-left: -7px; border-radius: 50%;
    border: 2px solid #fff; z-index: 92; font: 700 9px sans-serif; color: #fff; text-align: center; line-height: 11px;
  }
  .slot-dot.ground { background: #22c55e; } .slot-dot.yard { background: #3b82f6; }
  .slot-dot.roof { background: #f59e0b; } .slot-dot.peek { background: #a855f7; }

  #conn-dot { position: absolute; left: 4px; top: 4px; width: 8px; height: 8px; border-radius: 50%; background: #ef4444; opacity: .5; }
  #conn-dot.connected { background: #22c55e; }
</style>
</head>
<body>
<div id="conn-dot"></div>
<div id="module">
  <div id="house">
    <svg id="house-svg" viewBox="0 0 300 280" xmlns="http://www.w3.org/2000/svg">
      <g id="st1" class="st">
        <ellipse cx="150" cy="266" rx="132" ry="16" fill="#7c5c3e" opacity=".85"/>
        <ellipse cx="150" cy="263" rx="118" ry="12" fill="#96744e"/>
        <circle cx="70" cy="264" r="4" fill="#6b4e33"/><circle cx="218" cy="267" r="5" fill="#6b4e33"/>
        <circle cx="150" cy="270" r="3.5" fill="#6b4e33"/>
        <g transform="translate(196,236)">
          <rect x="0" y="0" width="42" height="9" rx="3" fill="#a9713a" stroke="#6b4423" stroke-width="2.5"/>
          <rect x="5" y="-8" width="42" height="9" rx="3" fill="#c98f52" stroke="#6b4423" stroke-width="2.5" transform="rotate(-7 26 -3)"/>
        </g>
        <path d="M60 250 L60 130 L150 70 L240 130 L240 250" fill="none" stroke="#fff" stroke-width="3" stroke-dasharray="8 9" opacity=".35"/>
        <g transform="translate(120,206)">
          <rect x="14" y="8" width="6" height="30" fill="#a9713a" stroke="#6b4423" stroke-width="2"/>
          <rect x="-6" y="-6" width="46" height="20" rx="6" fill="#fef3c7" stroke="#6b4423" stroke-width="2.5"/>
          <text x="17" y="8" text-anchor="middle" font-family="'DM Sans',sans-serif" font-weight="900" font-size="9.5" fill="#6b4423">SOON!</text>
        </g>
      </g>
      <g id="st2" class="st">
        <rect x="58" y="128" width="12" height="132" rx="3" fill="#a9713a" stroke="#6b4423" stroke-width="3"/>
        <rect x="230" y="128" width="12" height="132" rx="3" fill="#a9713a" stroke="#6b4423" stroke-width="3"/>
        <path d="M56 136 L150 72 L244 136" fill="none" stroke="#a9713a" stroke-width="12" stroke-linecap="round"/>
        <path d="M56 136 L150 72 L244 136" fill="none" stroke="#6b4423" stroke-width="3" opacity=".6"/>
      </g>
      <g id="st3" class="st">

/* ══ EVENT SEQUENCER — priority queue, burst grouping, micro-acks ══
   Priorities: 1 completion · 2 firstGift · 3 milestone · 4 heartJoin · 5 largeGift
   Data/state updates happen at event arrival; the queue only owns presentation. */
const seq = { q: [], running: false };
let majorActive = false;
function enqueue(pri, kind, payload) {
  seq.q.push({ pri, kind, payload, t: performance.now() });
  seq.q.sort((a, b) => a.pri - b.pri || a.t - b.t);
  pump();
}
async function pump() {
  if (seq.running) return;
  seq.running = true;
  while (seq.q.length) {
    const task = seq.q.shift();
    majorActive = true;
    try { await runTask(task); } catch (e) { console.warn('[dh] task error', e); }
  }
  majorActive = false;
  seq.running = false;
}
async function runTask(task) {
  if (task.kind === 'join') {
    // burst grouping: collapse this + all other queued joins when 3+ are waiting
    const more = seq.q.filter(t => t.kind === 'join');
    if (more.length >= 2) {
      seq.q = seq.q.filter(t => t.kind !== 'join');
      await joinBurst([task.payload, ...more.map(t => t.payload)]);
      return;
    }
    await joinSequence(task.payload);
  }
  else if (task.kind === 'firstGift') await firstGiftSequence(task.payload);
  else if (task.kind === 'milestone') await milestoneSequence(task.payload);
  else if (task.kind === 'largeGift') await largeGiftSequence(task.payload);
  else if (task.kind === 'callout') await callout(task.payload.html, task.payload.cls);
}

  const { u } = p;

  playSound('heartMeJoin');

    el.classList.remove('preview');

/* ── event handlers (data instantly; presentation queued; micro-ack now) ── */
const previewTimers = {};
function onChat(u) {
  const v = viewer(u);
  if (v.joined || v.previewed || !CFG.previews.enabled) return;
  if (previewOrder.length >= CFG.previews.max) {
    const evict = previewOrder.shift();
    if (evict && splatEls[evict] && !viewer(evict).joined) { removeSplatty(evict); delete previewTimers[evict]; }
  }
  v.previewed = true;
  previewOrder.push(u);
  previewTimers[u] = Date.now() + CFG.previews.ttlSec * 1000;
  const el = makeSplatty(u, { preview: true });
  setPos(u, 540 + previewOrder.length * 50, 0, true);
  el.classList.add('fade-in');
  setTimeout(() => el.classList.remove('fade-in'), 550);
  showTag(u, 2200);

}

  const v = viewer(u);

  S.totals.contributors++;
  const i = previewOrder.indexOf(u); if (i >= 0) previewOrder.splice(i, 1);
  delete previewTimers[u];
  if (S.totals.splatties >= CFG.maxSplatties) { v.spot = -1; }

    else if (v.spot >= 0) heartPulseAt(SPOTS[v.spot].x, SPOTS[v.spot].y + 40);

    enqueue(4, 'join', { u });

  const v = viewer(u);
  const isYT = kind === 'youtube' || kind === 'superchat' || kind === 'yt_superchat';
  const coins = isYT ? 0 : (amount || 0);
  const dollars = isYT ? (amount || 0) : 0;
  const valuePts = Math.floor((coins / 100) * CFG.points.per100Coins + dollars * CFG.points.perDollar);
  v.giftCount++; v.coins += coins;
  const isLarge = coins >= CFG.largeGiftCoins || dollars >= CFG.largeGiftDollars;
  if (!v.gifted) {
    v.gifted = true;
    S.totals.firstGifters++;
    const joinedNow = activateData(u, true); // roof priority for first-gifters
    if (!joinedNow && v.spot < 0) { /* already in overflow */ }
    else if (!joinedNow) { /* already placed via heart — keep spot */ }
    if (v.spot < 0 && joinedNow) { crowdOverflow++; updateCrowdChip(); }
    sparkleAt(v.spot >= 0 ? SPOTS[v.spot].x : 150, 40, 3); // micro-ack
    enqueue(2, 'firstGift', { u });
    addPoints(CFG.points.firstGift + valuePts);
  } else {
    addPoints(CFG.points.repeatGift + valuePts);
    if (isLarge) { enqueue(5, 'largeGift', { u }); }
    else {
      // small/medium repeat — immediate lightweight reaction, no queue
      dropDeco();
      const pool = ['act-cheer', 'act-hop', 'act-wave', 'act-wiggle'];
      act(u, pool[hashStr(u + v.giftCount) % pool.length], 1400);
      const el = splatEls[u];
      if (el) { el.classList.add('glow'); showTag(u, 3200); setTimeout(() => el.classList.remove('glow'), 2600); }

        enqueue(6, 'callout', { html: `<span class="u">${escapeHtml(u)}</span> added to Jamie's dog house! 🦴` });
      }

        if (viewer(u).spot >= 0) neighborReact(viewer(u).spot, 'greet');

}

  const pk = $('door-peeker'), mask = $('door-mask');
  pk.style.width = '64px'; pk.style.height = '64px';
  pk.style.left = '117px'; pk.style.bottom = '42px';
  pk.innerHTML = spriteImgHTML(color, 'peek', 64);
  mask.style.display = 'block';
  requestAnimationFrame(() => { pk.style.opacity = '1'; pk.style.bottom = '54px'; });
  setTimeout(() => { pk.style.opacity = '0'; pk.style.bottom = '42px'; }, 2200);
  setTimeout(() => { mask.style.display = 'none'; pk.innerHTML = ''; _doorPeekBusy = false; }, 2900);
}

/* ── Jamie celebrate (art mode): the celebrate sticker pops in beside the
   house, wiggles, and fades — reserved for milestones and large gifts so it
   stays special. Toggle with CFG.jamieReactions if it clashes with live Jamie. ── */
let _jamieBusy = false;
function jamieCelebrate() {
  if (!artMode || !CFG.jamieReactions || CFG.reducedMotion || _jamieBusy) return;
  _jamieBusy = true;
  const j = ART.jamie, boxH = 170, s = boxH / j.bh;
  const el = $('jamie-react');
  el.style.width = Math.round(j.bw * s) + 'px';
  el.style.height = boxH + 'px';
  el.style.left = '318px'; el.style.bottom = '0px';
  el.innerHTML = `<img src="${ART.base}${j.file}"
    style="width:${Math.round(j.cw * s)}px; left:${Math.round(-j.bx * s)}px; bottom:${Math.round(-(1355 - j.y2) * s)}px;">`;
  el.classList.remove('show'); void el.offsetWidth; el.classList.add('show');
  setTimeout(() => { el.classList.remove('show'); el.innerHTML = ''; _jamieBusy = false; }, 2700);
}

/* ── control commands ── */
async function resetSession(animated) {
  seq.q.length = 0;
  if (animated && !CFG.reducedMotion) {
    // soft reset: everyone looks surprised, then heads into/behind the house
    const users = Object.keys(splatEls);
    users.forEach((u, i) => setTimeout(() => act(u, 'act-look', 800), i * 40));
    await sleep(600);
    users.forEach((u, i) => {
      const el = splatEls[u];
      setTimeout(() => { el.classList.add('leave'); setPos(u, 150, 20); }, i * 60);
    });
    await sleep(900 + users.length * 60);
  }
  for (const u in splatEls) removeSplatty(u);
  $('fx-layer').innerHTML = '';
  $('callout').className = '';
  S = { viewers: {}, points: 0, stage: 1, totals: { contributors: 0, heartMes: 0, firstGifters: 0, splatties: 0 } };
  spotTaken.fill(false);
  previewOrder.length = 0;
  for (const k in previewTimers) delete previewTimers[k];
  crowdOverflow = 0; decoCount = 0;
  updateCrowdChip();
  showStagesInstant(1);
  renderMeter();
  markDirty(); saveState();
}
async function clearSplatties() {
  playSound('doorOpen');
  $('door-glow').classList.add('on');
  const users = Object.keys(splatEls);
  users.forEach((u, i) => {
    const el = splatEls[u];
    setTimeout(() => { el.classList.add('leave'); setPos(u, 150, 20); }, i * 70);
  });
  await sleep(800 + users.length * 70);
  $('door-glow').classList.remove('on');
  for (const u in splatEls) removeSplatty(u);
  for (const u in S.viewers) { S.viewers[u].spot = -1; S.viewers[u].joined = false; S.viewers[u].previewed = false; }
  spotTaken.fill(false);
  previewOrder.length = 0;
  S.totals.splatties = 0;
  crowdOverflow = 0; updateCrowdChip();
  markDirty();
}
function emergencyClear() {
  seq.q.length = 0;
  $('fx-layer').innerHTML = '';
  $('door-glow').classList.remove('on');
  const co = $('callout'); co.className = ''; co.innerHTML = '';
  calloutBusy = false;
  for (const u in splatEls) {
    const el = splatEls[u];
    el.querySelectorAll('.badge, .prop').forEach(n => n.remove());
    el.classList.remove('aura', 'glow', 'activating', 'travel', 'hop-travel');
    const v = viewer(u);
    if (v.spot >= 0) setPos(u, SPOTS[v.spot].x, SPOTS[v.spot].y, true);
  }
}

/* ── restore persisted session ── */
function restore() {
  S.stage = stageForPoints(S.points);
  showStagesInstant(S.stage);
  renderMeter();
  let placed = 0;
  for (const u in S.viewers) {
    const v = S.viewers[u];
    v.previewed = false;
    if (!v.joined) continue;
    if (placed >= CFG.maxSplatties) { v.spot = -1; crowdOverflow++; continue; }
    const idx = (v.spot >= 0 && !spotTaken[v.spot]) ? (spotTaken[v.spot] = true, v.spot) : claimSpot(v.gifted);
    v.spot = idx;
    if (idx < 0) { crowdOverflow++; continue; }
    makeSplatty(u);
    setPos(u, SPOTS[idx].x, SPOTS[idx].y, true);
    applySpotStyle(u, idx);
    placed++;
  }
  S.totals.splatties = placed;
  updateCrowdChip();
}

/* ── housekeeping ── */
setInterval(() => {
  const now = Date.now();
  for (const u in previewTimers) {
    if (now > previewTimers[u] && !viewer(u).joined) {
      const el = splatEls[u];
      if (el) { el.classList.add('leave'); setTimeout(() => removeSplatty(u), 750); }
      delete previewTimers[u];
      const i = previewOrder.indexOf(u); if (i >= 0) previewOrder.splice(i, 1);
    }
  }
  saveState();
}, 1000);

/* ── Ably — dedicated 'dog-house' channel ONLY ── */
const ably = new Ably.Realtime({ key: ABLY_KEY });
const ch = ably.channels.get('dog-house');
ch.subscribe('dh', m => {
  const d = m.data || {};
  const u = String(d.u || '').slice(0, 40);
  if (!u) return;
  if (d.t === 'chat') onChat(u);
  else if (d.t === 'heart') onHeart(u);
  else if (d.t === 'gift') onGift(u, +d.amount || 0, d.kind || 'tiktok_coins');
});
ch.subscribe('dh-cmd', m => {
  const d = m.data || {};
  if (d.cmd === 'reset') resetSession(true);
  else if (d.cmd === 'clear') clearSplatties();
  else if (d.cmd === 'emergencyClear') emergencyClear();
  else if (d.cmd === 'addSplatty' && d.u) { const u = String(d.u).slice(0, 40); if (activateData(u, false)) enqueue(4, 'join', { u }); }
  else if (d.cmd === 'stage' && isFinite(d.v)) {
    const target = Math.max(1, Math.min(8, Math.round(d.v)));
    S.points = target <= 1 ? 0 : CFG.stageThresholds[target - 2];
    if (target > S.stage) { S.stage = target; enqueue(target >= 8 ? 1 : 3, 'milestone', { to: target }); }
    else { S.stage = target; showStagesInstant(target); }
    renderMeter(); markDirty();
  }
});
ch.subscribe('dh-config', m => {
  const d = m.data || {};
  if (d.cfg && typeof d.cfg === 'object') {
    deepMerge(CFG, d.cfg);
    saveCfg(); applyCfg(); renderMeter();
  }
});
ably.connection.on('connected',    () => { $('conn-dot').classList.add('connected'); if (ch.state !== 'attached') ch.attach().catch(() => {}); });
ably.connection.on('disconnected', () => $('conn-dot').classList.remove('connected'));
// Browser sources can be frozen/restored on scene switches (bfcache) — Ably
// closes its connection on freeze and does NOT reconnect on restore. Reconnect
// explicitly so the overlay never sits silently deaf after a restore.
window.addEventListener('pageshow', e => { if (e.persisted && ably.connection.state !== 'connected') ably.connect(); });

applyCfg();
restore();
</script>
