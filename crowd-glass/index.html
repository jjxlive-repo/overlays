<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Crowd Glass</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="styles.css">
<script src="https://cdn.ably.com/lib/ably.min-2.js"></script>
</head>
<body>
  <div id="stage">
    <canvas id="cracks-canvas" width="1080" height="1920"></canvas>

    <div id="ui-layer">
      <div id="live-badge" class="badge" data-layout-id="cg-livebadge">&#9679; LIVE</div>

      <div id="viewer-count-badge" class="badge" data-layout-id="cg-viewerbadge">&#128101; <span id="viewer-count-value">0</span></div>

      <div id="impact-tags-layer"></div>

      <div id="bulletproof-badge" class="pill hidden">
        <div id="bulletproof-label">BULLETPROOF</div>
        <div id="bulletproof-timer">00:00</div>
      </div>

      <div id="shatter-overlay" class="hidden">
        <div id="shatter-flash"></div>
        <div id="shatter-text">
          <div id="shatter-main">screen shattered</div>
          <div id="shatter-sub">new viewers broke it</div>
        </div>
      </div>

      <div id="cta-area" data-layout-id="cg-cta">
        <div id="cta-main">NEXT VIEWER CRACKS THE SCREEN</div>
        <div id="cta-sub">GIFTS REPAIR IT</div>
      </div>

      <div id="bottom-left" data-layout-id="cg-integrity">
        <div id="integrity-row">
          <div id="integrity-text">INTEGRITY <span id="integrity-value">100</span>%</div>
          <div id="integrity-bar"><div id="integrity-fill"></div></div>
        </div>
        <div id="hits-remaining-text">-- more hits shatters it</div>

        <div id="recent-hitters">
          <div id="recent-hitters-label">Recent hits</div>
          <div id="recent-hitters-list"></div>
        </div>
      </div>

      <div id="debug-panel" class="hidden">
        <div>integrity: <span id="dbg-integrity">100</span></div>
        <div>cracks: <span id="dbg-cracks">0</span></div>
        <div>bulletproof: <span id="dbg-bulletproof">off</span></div>
        <div>last event: <span id="dbg-last-event">none</span></div>
        <div>ws: <span id="dbg-ws-status">connecting</span></div>
        <div>ably: <span id="dbg-ably-status">connecting</span></div>
      </div>
    </div>
  </div>

<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
