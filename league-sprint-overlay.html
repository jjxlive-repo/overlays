<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, height=1920, initial-scale=1.0">
<title>League Sprint Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Bebas+Neue&family=Boogaloo&family=DM+Sans:wght@700&family=Fredoka:wght@500;600;700&family=Nunito:wght@400;600;700;800&family=Caveat:wght@600;700&display=swap" rel="stylesheet">
<script src="https://cdn.ably.com/lib/ably.min-2.js"></script>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 1080px; height: 1920px; overflow: hidden; background: transparent; position: relative; }
/* Ably connection dot — hidden on the broadcast overlay; check league-sprint-control.html
   or stream-dock.html for status. Matches new-here-overlay.html's debug dot. */
#conn-dot {
  display: none;
  position: fixed; top: 12px; right: 12px;
  width: 12px; height: 12px; border-radius: 50%;
  background: #555; z-index: 9999;
  transition: background .3s, box-shadow .3s;
}
:root {
  --ls-card-radius: 16px;
  --ls-card-shadow: 0 9px 18px rgba(0,0,0,.34);
  --ls-card-bg: #2a1830;
  --ls-card-text: #fff7ec;
  --ls-card-muted: rgba(255,241,224,0.78);
  --ls-card-ring: #E8926B;
  --ls-rarity-d: #c9a5a5;
  --ls-rarity-c: #efb783;
  --ls-rarity-b: #c9d0db;
  --ls-rarity-a: #FFC940;
  --ls-league-d: #c9a5a5;
  --ls-league-c: #efb783;
  --ls-league-b: #c9d0db;
  --ls-league-a: #FFC940;
  --ls-ink: #1a1118;
  --ls-accent-purple: #8e71d4;
  --ls-accent-cyan: #80c7de;
  --ls-chrome: #0B0D16;
  --ls-panel: #1D1830;
  --ls-panel-mid: #211A35;
  --ls-track: #14101C;
  --ls-positive: #7FE0C4;
  --ls-negative: #E8926B;
  --ls-bar-height: 110px;
  --ls-bottom-shelf-height: 177px;
  --ls-popup-card-width: 240px;
  --ls-shelf-name-size: 17px;
  --ls-shelf-rank-size: 24px;
  --ls-shelf-title-size: 18px;
  /* Global legibility multiplier for League of Splatties text, adjustable live from the
     stream dock (Splat Cards Layout -> Text Size). Base px values below were bumped up
     from the original tiny (8-11px) sizes as the new default; this var lets the streamer
     scale everything further up/down on top of that new baseline. */
  --ls-font-scale: 1;
}

/* ══════════════════════════════════════════════════════════════════════
   LEAGUE OF SPLATTIES — DEDICATED ZONES
   Region map (source of truth): 1080x1920 canvas.
     Top Camera Region     y:   0 –  450  (#lsTopRegion)
     Middle Splat Bar      y: 450 –  560  (#leagueSprintBar, 110px — see its own block)
     Main Gameplay Region  y: 560 – 1743  MUST STAY CLEAR of League elements
     Bottom Splat Info Strip y:1743 – 1920 (#leagueBottomShelf, 177px — see its own block)
   These zones are independent of #gift-bar/#bar-info/gifter-slide layout so Splat
   Cards never resizes, reserves space in, or competes with the gift/milk bar.
   ══════════════════════════════════════════════════════════════════════ */
#lsTopRegion {
  position: absolute; top: 0; left: 0; width: 1080px; height: 450px;
  pointer-events: none; z-index: 41;
}
/* RETIRED (see build note below) — zones 2/3/4 no longer receive routed content.
   Kept in the DOM per spec ("if removing DOM is risky, keep hidden/disabled") but
   force-hidden here so nothing can accidentally show through. */
#lsPlayerWindow, #lsSystemWindow, #lsActivityPanel { display: none !important; }
.ls-mini-window {
  position: absolute; top: 24px; width: 340px; height: 210px;
  display: flex; flex-direction: column; gap: 6px;
  padding: 12px 16px; border-radius: 16px; overflow: hidden;
  background: linear-gradient(180deg, var(--ls-panel-mid), var(--ls-panel));
  box-shadow: 0 14px 30px rgba(0,0,0,.4);
  font-family: 'Nunito', sans-serif; color: var(--ls-card-text);
  opacity: 0; transform: translateY(-6px); transition: opacity 220ms ease, transform 260ms cubic-bezier(.34,1.56,.64,1);
}
.ls-mini-window.visible { opacity: 1; transform: translateY(0); }
#lsPlayerWindow { left: 24px; border: 1px solid rgba(232,146,107,.55); }
#lsSystemWindow { left: 380px; border: 1px solid rgba(255,201,64,.55); }
.ls-mini-window-label {
  display: inline-flex; align-self: flex-start; align-items: center; height: 20px; padding: 0 9px;
  border-radius: 999px; font: 800 10px/1 'Nunito', sans-serif; letter-spacing: .08em; text-transform: uppercase;
  background: rgba(8,8,16,.5);
}
#lsPlayerWindow .ls-mini-window-label { color: #FFDCC4; border: 1px solid rgba(232,146,107,.5); }
#lsSystemWindow .ls-mini-window-label { color: #FFE8A8; border: 1px solid rgba(255,201,64,.5); }
.ls-mini-window-body { flex: 1; min-height: 0; display: flex; align-items: center; gap: 10px; }
.ls-mini-window-thumb { flex: 0 0 auto; }
.ls-mini-window-copy { min-width: 0; display: flex; flex-direction: column; gap: 2px; }
.ls-mini-window-title {
  font: 800 15px/1.15 'Fredoka', sans-serif; color: #fff7ec;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.ls-mini-window-sub {
  font: 700 11px/1.2 'Nunito', sans-serif; color: rgba(255,241,224,.72);
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
#lsPlayerWindow.is-empty .ls-mini-window-title,
#lsSystemWindow.is-empty .ls-mini-window-title { color: rgba(255,241,224,.5); }
/* Compact art thumb used inside the Player Window (show/pull/rebirth) — reuses the
   card's .ls-art/.ls-art img rendering (object-fit: contain, never cropped) but pinned
   to a small, fixed footprint so it fits the 340x210px mini-window. */
.ls-mini-window-thumb { display: flex; flex-direction: row; align-items: center; gap: 4px; }
.ls-mini-window-thumb .ls-art { width: 64px; height: 54px; margin: 0; border-radius: 8px; }
.ls-mini-window-thumb-rank {
  font: 800 11px/1 'Fredoka', sans-serif; color: var(--ls-card-ring, #E8926B);
  text-align: center; text-transform: uppercase;
}
.ls-mini-window-thumb.is-pair { gap: 6px; }
.ls-mini-window-thumb.is-pair .ls-art { width: 46px; height: 40px; }
.ls-mini-window-thumb-arrow { font: 800 13px/1 'Nunito', sans-serif; color: rgba(255,241,224,.6); }
/* Real card component (frame border + art + rank chip) embedded in the Player Window,
   instead of a bare art sprite — makes a card reveal actually look like a card. */
.ls-mini-window-thumb--card { display: block; }
.ls-mini-window-thumb--card .ls-card-micro { margin: 0; }
/* Optional right-side activity readout — sits above #bar-info's own slot (top:132px) so
   the two never overlap even though they share the same horizontal band. */
#lsActivityPanel {
  position: absolute; top: 20px; left: 726px; width: 300px; height: 100px;
  padding: 8px 12px; border-radius: 12px; overflow: hidden;
  background: rgba(11,13,22,.72); border: 1px solid rgba(255,255,255,.1);
  font: 700 11px/1.35 'Nunito', sans-serif; color: rgba(243,232,210,.82);
  display: flex; flex-direction: column-reverse; gap: 3px;
}
#lsActivityPanel .ls-activity-line { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
#lsActivityPanel.is-empty { opacity: 0; }
/* Quiet micro-pill lane for cooldown / invalid target / rebirth closed / no card /
   already has card — errors/cooldowns only, tiny + low-motion. Moved out of the
   middle bar and down to the transition strip just above the bottom combat/card
   zones (canvas y ~1662-1690) so it never competes with the bar or the fight area. */
#lsMicroPills {
  position: absolute; left: 50%; top: 1662px; transform: translateX(-50%);
  display: flex; gap: 6px; z-index: 30; pointer-events: none;
}
.ls-micro-pill {
  display: inline-flex; align-items: center; height: 24px; padding: 0 12px;
  border-radius: 999px; font: 800 calc(12px * var(--ls-font-scale))/1 'Nunito', sans-serif; letter-spacing: .04em; text-transform: uppercase;
  background: rgba(8,8,16,.82); border: 1px solid rgba(255,255,255,.16); color: rgba(243,232,210,.9);
  box-shadow: 0 4px 10px rgba(0,0,0,.35);
  animation: lsMicroPillIn 180ms ease both;
}
.ls-micro-pill.is-error { border-color: rgba(232,146,107,.7); color: #FFE7D7; }
@keyframes lsMicroPillIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

/* Player Window content target. Used to fill a compact, fixed-size top-region window
   (see #lsPlayerWindow) instead of floating a giant card over the main gameplay area. */
#leagueCardPopupZone {
  position: relative; width: 100%; height: 100%; pointer-events: none;
}
#leagueCardPopupZone .ls-popup-shell {
  opacity: 0; transform: translateY(4px);
  transition: opacity 200ms ease, transform 220ms cubic-bezier(.34,1.56,.64,1);
  width: 100%; height: 100%;
}
#leagueCardPopupZone.visible .ls-popup-shell { opacity: 1; transform: translateY(0); }
.ls-popup-kicker {
  display: inline-flex; align-items: center; margin: 0 0 8px 8px;
  height: 24px; padding: 0 10px; border-radius: 999px;
  background: rgba(8,16,28,.82); border: 1px solid rgba(245,244,239,.18);
  color: var(--ls-card-text); font: 800 12px/1 'Nunito', sans-serif;
  letter-spacing: .08em; text-transform: uppercase; box-shadow: var(--ls-card-shadow);
}

/* Middle bar now owns exactly two lanes: zone 5 (state/timer) and the merged
   zone 6-7 Target Rows / Boss Field region. The old 3rd lane (event log / leaders
   ticker) is retired from the bar entirely — see #lsCardDock and .ls-target-rows
   / .ls-boss-field below. */
#leagueSprintBar {
  /* Was `inset:0` inside gift-bar.html's #gift-bar (position:absolute; top:450px; left:0;
     width:1080px). Now a top-level body element, so the position is spelled out explicitly
     to land in the same place (see region map: Middle Splat Bar y:450-560px). */
  position: absolute; top: 450px; left: 0; width: 1080px; height: var(--ls-bar-height);
  display: grid; grid-template-columns: 260px minmax(0, 1fr); align-items: center;
  gap: 10px; padding: 10px 28px; pointer-events: none; z-index: 22;
  color: var(--ls-card-text); font-family: 'Nunito', sans-serif;
  background:
    linear-gradient(90deg, rgba(11,13,22,.94), rgba(29,24,48,.88), rgba(11,13,22,.94)),
    repeating-linear-gradient(90deg, rgba(243,232,210,.08) 0 2px, transparent 2px 13px);
  border-top: 1px solid rgba(255,255,255,.14);
  border-bottom: 1px solid rgba(232,146,107,.58);
  box-shadow: 0 12px 34px rgba(0,0,0,.28);
  transition: opacity .24s ease, filter .24s ease;
}
/* The live text strip is a static/persistent stream title, not a passive alert —
   it shouldn't dim the Splat Cards bar. Just shift the bar's content down to the
   bottom edge so the two don't visually collide. */
.live-strip-active #leagueSprintBar { align-items: end; padding-bottom: 7px; }
#gift-bar.ep-passive-active #leagueSprintBar { opacity: .08; filter: blur(.35px); }
#gift-bar.alert-active #leagueSprintBar {
  opacity: .08;
}
#gift-bar.alert-active #bar-info,
#gift-bar.alert-active #gb-bar-text,
#gift-bar.alert-active #live-text-strip {
  opacity: 0 !important;
}
/* A live duel/fight animation always wins — never let the passive/alert/live-strip
   states fade it out. Those other elements should shift or fade themselves instead
   of dimming the fight that's actively playing. */
#gift-bar.ep-passive-active #leagueSprintBar.ls-duel-active,
#gift-bar.alert-active #leagueSprintBar.ls-duel-active {
  opacity: 1;
  filter: none;
}
/* The middle Splat bar owns two lanes only: state/timer and the target/boss field.
   Gifter/explainer slides are pinned to the top-camera region and never reserve bar space. */
#gift-bar.gift-info-visible #leagueSprintBar,
#gift-bar.ls-right-panel-visible #leagueSprintBar {
  padding: 10px 28px;
  grid-template-columns: 260px minmax(0, 1fr);
  gap: 10px;
}
#gift-bar.gift-info-visible #leagueSprintBar.ls-duel-active,
#gift-bar.ls-right-panel-visible #leagueSprintBar.ls-duel-active {
  grid-template-columns: 260px minmax(0, 1fr);
}
#gift-bar.gift-info-visible #leagueSprintStatus,
#gift-bar.ls-right-panel-visible #leagueSprintStatus {
  padding: 8px 12px;
}
#gift-bar.ep-passive-active #leagueSprintCenter {
  opacity: .72;
}
/* ══ League of Splatties HUD (left zone) — a branded mini-game status block, not plain
   utility text: badge title, round number, and a big high-contrast countdown timer. ══ */
#leagueSprintStatus {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-width: 0; width: 100%; height: 92px; padding: 8px 12px; gap: 2px;
  border-radius: 14px;
  background: linear-gradient(180deg, rgba(42,24,48,.90), rgba(20,16,28,.92));
  border: 1px solid rgba(232,146,107,.58);
  box-shadow: 0 8px 22px rgba(0,0,0,.32), 0 0 0 1px rgba(255,255,255,.03) inset;
}
.ls-hud-badge {
  color: #FFC940; font: 800 calc(clamp(13px, 1.3vw, 16px) * var(--ls-font-scale))/1.15 'Fredoka', sans-serif;
  letter-spacing: .085em; text-transform: uppercase; text-align: center;
  text-shadow: 0 1px 6px rgba(0,0,0,.75), 0 0 14px rgba(251,191,36,.4);
  white-space: nowrap; max-width: 100%; overflow: hidden; text-overflow: ellipsis;
}
.ls-hud-round {
  color: rgba(255,241,224,.9); font: 800 calc(13px * var(--ls-font-scale))/1 'Nunito', sans-serif;
  letter-spacing: .08em; text-transform: uppercase;
}
.ls-hud-timer {
  display: flex; flex-direction: column; align-items: center; gap: 0; margin-top: 3px;
}
.ls-hud-timer-digits {
  color: #fff7ec; font: 700 calc(clamp(28px, 3vw, 36px) * var(--ls-font-scale))/1 'Fredoka', sans-serif;
  font-variant-numeric: tabular-nums; letter-spacing: .02em;
  text-shadow: 0 2px 8px rgba(0,0,0,.8), 0 0 16px rgba(128,199,222,.5);
}
.ls-hud-timer-label {
  color: rgba(255,241,224,.78); font: 800 calc(11px * var(--ls-font-scale))/1.2 'Nunito', sans-serif;
  letter-spacing: .09em; text-transform: uppercase;
}
/* ══ Zones 6-7 merged: Target Rows (scouting) or Boss Field (boss encounters),
   exactly one visible at a time via .mode-target / .mode-boss on #leagueSprintCenter.
   Retired: the old center notice/idle-highlight rotation and the separate event-log /
   leaders-ticker lanes — see #lsCardDock (zone 11) and #lsDuelResultPill for where
   card events and duel results now go instead. ══ */
#leagueSprintCenter {
  position: relative; min-width: 0; height: 92px; padding: 8px 16px; border-radius: 14px;
  background: linear-gradient(180deg, rgba(35,26,50,.92), rgba(13,12,24,.92));
  border: 1px solid rgba(232,146,107,.34);
  box-shadow: 0 8px 22px rgba(0,0,0,.34), inset 0 1px 0 rgba(255,255,255,.05);
  display: flex; align-items: center; justify-content: center; overflow: hidden;
  transition: opacity .24s ease, filter .24s ease;
}
#leagueSprintCenter .ls-target-rows,
#leagueSprintCenter .ls-boss-field { width: 100%; height: 100%; }
#leagueSprintCenter.mode-boss .ls-target-rows { display: none; }
#leagueSprintCenter:not(.mode-boss) .ls-boss-field { display: none; }
/* Target Rows — one league row visible at a time (auto-rotates D/C/B/A every ~10s
   via the same timer the old rankings marquee used), compact scouting/targeting
   only, not a full leaderboard. */
.ls-target-rows { display: flex; align-items: center; gap: 14px; }
.ls-target-rows-league {
  flex: 0 0 auto; display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-width: 60px; align-self: stretch; border-radius: 10px; gap: 2px;
  background: color-mix(in srgb, var(--ls-league-color, var(--ls-league-d)) 22%, transparent);
  border: 1px solid color-mix(in srgb, var(--ls-league-color, var(--ls-league-d)) 55%, transparent);
}
.ls-target-rows-league-label {
  font: 900 calc(15px * var(--ls-font-scale))/1 'Fredoka', sans-serif; letter-spacing: .04em;
  color: color-mix(in srgb, var(--ls-league-color, var(--ls-league-d)) 80%, #fff7ec 20%);
}
.ls-target-rows-league-sub { font: 800 calc(10px * var(--ls-font-scale))/1 'Nunito', sans-serif; color: rgba(255,241,224,.65); text-transform: uppercase; }
.ls-target-rows-list { flex: 1; min-width: 0; display: flex; align-items: center; gap: 10px; overflow: hidden; }
.ls-target-chip { flex: 0 0 auto; display: flex; flex-direction: column; align-items: center; gap: 3px; width: 54px; }
.ls-target-chip .ls-art { width: 38px; height: 34px; margin: 0; border-radius: 6px; }
.ls-target-chip-name { font: 800 calc(10px * var(--ls-font-scale))/1.1 'Nunito', sans-serif; color: var(--ls-card-text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 54px; }
.ls-target-chip-num {
  font: 900 calc(11px * var(--ls-font-scale))/1 'Fredoka', sans-serif; color: #08101c; background: #FFC940;
  border-radius: 999px; padding: 1px 6px; min-width: 16px; text-align: center;
}
.ls-target-rows-empty { color: rgba(255,241,224,.6); font: 800 calc(13px * var(--ls-font-scale))/1.3 'Nunito', sans-serif; text-transform: uppercase; letter-spacing: .05em; }
/* Boss Field — squad chips on the left, boss card + HP bar on the right. */
.ls-boss-field { display: flex; align-items: center; gap: 10px; }
.ls-boss-squad { flex: 1; min-width: 0; display: flex; align-items: center; gap: 6px; overflow: hidden; }
.ls-boss-squad .ls-target-chip { width: 40px; }
.ls-boss-squad .ls-art { width: 30px; height: 26px; }
.ls-boss-arrow { flex: 0 0 auto; color: #FFC940; font: 900 calc(18px * var(--ls-font-scale))/1 'Fredoka', sans-serif; }
.ls-boss-card { flex: 0 0 auto; display: flex; flex-direction: column; align-items: center; gap: 2px; min-width: 130px; }
.ls-boss-name { font: 900 calc(15px * var(--ls-font-scale))/1.1 'Fredoka', sans-serif; color: #fff7ec; text-transform: uppercase; letter-spacing: .03em; }
.ls-boss-level { font: 800 calc(11px * var(--ls-font-scale))/1 'Nunito', sans-serif; color: rgba(255,241,224,.7); text-transform: uppercase; }
.ls-boss-hp { width: 100%; height: 8px; border-radius: 999px; background: rgba(245,244,239,.16); overflow: hidden; border: 1px solid rgba(245,244,239,.18); margin-top: 2px; }
.ls-boss-hp-fill { height: 100%; background: linear-gradient(90deg, #F43F5E, #FF9F45); transition: width 360ms ease; }
.ls-boss-hp-text { font: 800 calc(11px * var(--ls-font-scale))/1 'Nunito', sans-serif; color: rgba(255,241,224,.8); margin-top: 1px; }
/* Fight animation takes visual priority: while a duel occupies the bottom fight
   strip, dim the scout/boss field slightly so it reads as secondary. */
#leagueSprintBar.ls-duel-active #leagueSprintCenter { opacity: .55; }

   and 10 are merged into #lsDuelPreview, which now fills the whole strip left of the
   narrow zone-11 Card Event Dock (positioned separately below, anchored far right —
   see #lsCardDock). #lsRecentChallengers is retired entirely (no idle recap) — when no
   duel is live, #lsDuelPreview shows a live player-count join prompt instead
   (see renderDuelIdleState). */
#leagueBottomShelf {
  position: absolute; top: 1743px; left: 16px;
  width: calc(1080px - 32px - 176px); height: var(--ls-bottom-shelf-height);
  display: flex; pointer-events: none; z-index: 38;
  background: linear-gradient(90deg, rgba(11,13,22,.90), rgba(29,24,48,.78), rgba(11,13,22,.86));
  border: 1px solid rgba(255,255,255,.14); border-radius: 10px; box-shadow: var(--ls-card-shadow);
}
#lsDuelPreview {
  position: relative; width: 100%; height: 100%; min-width: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: flex-end; gap: 6px; overflow: visible;
  padding: 0 14px 18px;
}
#lsRecentChallengers { display: none; }
.ls-zone-title {
  color: var(--ls-card-text); font: 700 var(--ls-shelf-title-size)/1.2 'Fredoka', sans-serif;
  letter-spacing: .1em; text-transform: uppercase;
}
.ls-zone-sub { color: var(--ls-card-muted); font: 800 10px/1 'Nunito', sans-serif; letter-spacing: .06em; text-transform: uppercase; margin-top: 1px; }
.ls-zone-empty { color: var(--ls-card-muted); font: 800 10px/1.3 'Nunito', sans-serif; letter-spacing: .06em; text-transform: uppercase; text-align: center; }
/* Fight scene, scoped to the duel-preview column. The card row is bottom-anchored
   (#lsDuelPreview uses justify-content:flex-end + overflow:visible) so card bottoms
   stay flush against the bottom edge of the strip while the names banner + combat
   caption chip are free to sit above the row, extending past the strip's nominal top
   edge — the same "may run taller than its box" allowance zone 11 already has.
   .ls-duel-wrap is display:flex (row-wrap); flex:0 0 100% forces the names/caption
   lines onto their own full-width rows instead of squeezing into the card row. */
#lsDuelPreview .ls-duel-wrap { position: relative; transform: none; gap: 6px; filter: none; z-index: 1; flex-wrap: wrap; align-items: flex-end; }
#lsDuelPreview .ls-duel-names {
  position: static; transform: none; margin-bottom: 0; min-width: 0; max-width: 320px;
  height: 22px; padding: 0 10px; font-size: calc(12px * var(--ls-font-scale)); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  flex: 0 0 100%; order: -2;
}
#lsDuelPreview .ls-duel-card { width: 132px; min-height: 176px; }
/* Bigger, more legible portrait duel card. */
#lsDuelPreview .ls-card-mini { width: 124px; height: 168px; padding: 6px 6px 8px; }
#lsDuelPreview .ls-card-mini .ls-owner { top: 6px; left: 6px; right: 6px; height: 20px; font-size: calc(12px * var(--ls-font-scale)); line-height: 20px; }
#lsDuelPreview .ls-card-mini .ls-card-top { margin-top: 26px; }
#lsDuelPreview .ls-card-mini .ls-type-icon { display: none; }
#lsDuelPreview .ls-card-mini .ls-rank { min-width: 32px; height: 20px; font-size: calc(15px * var(--ls-font-scale)); padding: 0 6px; }
#lsDuelPreview .ls-card-mini .ls-art { width: 92px; height: 92px; margin: 6px auto 0; }
#lsDuelPreview .ls-card-mini .ls-power,
#lsDuelPreview .ls-card-mini .ls-card-footer { display: none; }
#lsDuelPreview .ls-vs { font-size: calc(20px * var(--ls-font-scale)); }
/* Combat/flavor caption — the "what happened" line — as a chip ABOVE the cards
   (order:-1, between the names banner and the card row), not below them. */
#lsDuelPreview .ls-duel-flavor {
  position: static; transform: none; margin: 0; max-width: 320px;
  white-space: normal; text-align: center; font-size: calc(13px * var(--ls-font-scale)); padding: 6px 16px;
  flex: 0 0 100%; order: -1;
}
#lsDuelPreview .ls-hp { bottom: -6px; height: 6px; }
#lsDuelPreview .ls-damage { top: -22px; right: -6px; font-size: calc(16px * var(--ls-font-scale)); padding: 3px 9px; }
/* +DP / -DP delta badge: bumped to the top of the local stacking context and made
   much more visible (bigger, brighter, thicker border) per feedback that it was
   getting lost against the card art. */
#lsDuelPreview .ls-delta-badge {
  bottom: -16px; height: 26px; min-width: 74px; font-size: calc(15px * var(--ls-font-scale)); z-index: 9999;
  border-width: 2px; box-shadow: 0 4px 0 rgba(0,0,0,.85), 0 0 16px rgba(255,201,64,.55);
}
#lsDuelPreview[data-queue]:not([data-queue=""])::after {
  content: attr(data-queue);
  position: absolute; top: 6px; right: 8px;
  color: rgba(255,201,64,.85); font: 900 8px/1 'Nunito', sans-serif; letter-spacing: .08em; text-transform: uppercase;
}
/* Idle state (no live duel): live player count + join prompt, replacing the old
   Recent Challengers recap entirely. */
.ls-idle-cta { display: flex; flex-direction: column; align-items: center; gap: 2px; }
.ls-idle-cta-count {
  color: #FFC940; font: 900 calc(34px * var(--ls-font-scale))/1 'Fredoka', sans-serif; text-shadow: 0 2px 8px rgba(0,0,0,.7), 0 0 16px rgba(255,201,64,.35);
}
.ls-idle-cta-label {
  color: rgba(255,241,224,.85); font: 800 calc(13px * var(--ls-font-scale))/1 'Nunito', sans-serif; letter-spacing: .08em; text-transform: uppercase; margin-top: 2px;
}
.ls-idle-cta-cmd {
  margin-top: 6px; color: #fff7ec; font: 800 calc(14px * var(--ls-font-scale))/1 'Fredoka', sans-serif; letter-spacing: .03em;
  padding: 5px 16px; border-radius: 999px; background: rgba(168,85,247,.22); border: 1px solid rgba(232,121,249,.5);
}
/* Rankings Slideshow — reuses the shelf card renderer (renderCard('micro')) but at a
   slower, clearer rotation instead of a marquee blur. */
.ls-shelf-title { color: var(--ls-card-text); font: 700 var(--ls-shelf-title-size)/1.2 'Fredoka', sans-serif; letter-spacing: .1em; text-transform: uppercase; }
.ls-shelf-sub { margin-top: 2px; color: var(--ls-card-muted); font: 800 10px/1 'Nunito', sans-serif; letter-spacing: .06em; text-transform: uppercase; }
.ls-shelf-list { display: flex; align-items: center; gap: 10px; min-width: 0; overflow: hidden; margin-top: 4px; }
#lsRankingsSlideshow .ls-card-micro { width: 74px; height: 70px; }

/* ══ ZONE 11 — Narrow Card Event Dock (repurposed #leagueSprintEvent DOM node).
   Single card-width, far right of the bottom strip, anchored independently of
   #leagueBottomShelf so it can run taller than the 177px fight strip. Art-forward:
   one card event at a time (pull / show / rebirth / promotion / champion / boss
   reward), queued, never a text log. ══ */
#leagueSprintEvent {
  position: absolute; right: 16px; top: 1690px; width: 160px; height: 230px;
  display: flex !important; flex-direction: column; align-items: center; justify-content: center;
  gap: 6px; padding: 10px 8px; border-radius: 12px; pointer-events: none; z-index: 39;
  background: linear-gradient(180deg, rgba(42,24,48,.94), rgba(20,16,28,.96));
  border: 1px solid rgba(232,146,107,.5); box-shadow: var(--ls-card-shadow);
  opacity: 0; transform: translateY(6px);
  transition: opacity 200ms ease, transform 220ms cubic-bezier(.34,1.56,.64,1);
}
#leagueSprintEvent.visible { opacity: 1; transform: translateY(0); }
/* Rebirth results are the one card-dock event that gets a bigger, louder treatment —
   still bottom-right and still clear of the Duel Stage / Duel Result Pill (only the
   height grows, upward, never the width), but bigger art/fonts and a gold glow so the
   gamble result reads as a big deal. */
#leagueSprintEvent.is-rebirth-result {
  height: 300px; padding: 14px 10px; gap: 8px;
  border: 2px solid rgba(255,201,64,.85);
  box-shadow: 0 0 0 4px rgba(255,201,64,.14), 0 14px 30px rgba(0,0,0,.5), var(--ls-card-shadow);
  transform: translateY(0) scale(1.06);
  transform-origin: bottom right;
}
#leagueSprintEvent.is-rebirth-result.visible { transform: translateY(0) scale(1.06); }
.ls-card-dock-kicker {
  display: inline-flex; align-items: center; height: 20px; padding: 0 9px;
  border-radius: 999px; background: rgba(8,8,16,.6); border: 1px solid rgba(255,241,224,.16);
  color: #FFC940; font: 800 calc(11px * var(--ls-font-scale))/1 'Nunito', sans-serif; letter-spacing: .06em; text-transform: uppercase;
}
#leagueSprintEvent.is-rebirth-result .ls-card-dock-kicker { height: 24px; padding: 0 12px; font-size: calc(13px * var(--ls-font-scale)); }
.ls-card-dock-title {
  font: 800 calc(14px * var(--ls-font-scale))/1.2 'Fredoka', sans-serif; color: #fff7ec; text-align: center;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
#leagueSprintEvent.is-rebirth-result .ls-card-dock-title { font-size: calc(18px * var(--ls-font-scale)); }
.ls-card-dock-sub {
  font: 700 calc(11px * var(--ls-font-scale))/1.2 'Nunito', sans-serif; color: rgba(255,241,224,.75); text-align: center;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
#leagueSprintEvent.is-rebirth-result .ls-card-dock-sub { font-size: calc(14px * var(--ls-font-scale)); color: #FFE7D7; }
.ls-card-dock-rebirth { display: flex; align-items: center; gap: 3px; }
.ls-card-dock-rebirth .ls-art { width: 30px; height: 26px; margin: 0; }
#leagueSprintEvent.is-rebirth-result .ls-card-dock-rebirth .ls-art { width: 42px; height: 36px; }
.ls-card-dock-rebirth-arrow { font: 800 calc(13px * var(--ls-font-scale))/1 'Nunito', sans-serif; color: rgba(255,241,224,.65); }
#leagueSprintEvent.is-rebirth-result .ls-card-dock-rebirth-arrow { font-size: calc(16px * var(--ls-font-scale)); }
#leagueSprintEvent.is-rebirth-result .ls-mini-window-thumb--card { transform: scale(1.15); }

/* ══ Duel Result Pill — slim headline above the fight strip, results only. Never
   overlaps zone 8 (micro pills, positioned above it) or the fight strip (below it). ══ */
#lsDuelResultPill {
  position: absolute; left: 50%; top: 1700px; transform: translate(-50%, 6px);
  min-width: 200px; max-width: 620px; height: 36px; padding: 0 22px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 999px; background: rgba(8,16,28,.92); border: 1px solid rgba(255,201,64,.5);
  color: #fff7ec; font: 800 calc(15px * var(--ls-font-scale))/1 'Fredoka', sans-serif; letter-spacing: .03em; text-transform: uppercase;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  box-shadow: 0 8px 18px rgba(0,0,0,.4); z-index: 37; pointer-events: none;
  opacity: 0; transition: opacity 180ms ease, transform 200ms cubic-bezier(.34,1.56,.64,1);
}
#lsDuelResultPill.visible { opacity: 1; transform: translate(-50%, 0); }
#lsDuelResultPill.is-error { border-color: rgba(232,146,107,.72); color: #FFE7D7; }

.ls-card {
  --ls-league-color: var(--ls-league-d);
  --ls-rarity-outline: var(--ls-rarity-d);
  position: relative; overflow: hidden; color: var(--ls-card-text);
  background: var(--ls-card-bg);
  border: 2px solid var(--ls-card-ring); border-radius: var(--ls-card-radius);
  box-shadow: var(--ls-card-shadow), inset 0 0 0 1px rgba(255,241,224,.07);
  font-family: 'Nunito', sans-serif;
}
.ls-card::before {
  content: "";
  position: absolute;
  inset: 0;
  z-index: 0;
  background-image: repeating-radial-gradient(circle, rgba(255,241,224,0.08) 0 1.2px, transparent 1.2px 9px);
  pointer-events: none;
}
.ls-card > * { position: relative; z-index: 1; }
.ls-card[data-league="D"] { --ls-league-color: var(--ls-league-d); --ls-rarity-outline: var(--ls-rarity-d); }
.ls-card[data-league="C"] { --ls-league-color: var(--ls-league-c); --ls-rarity-outline: var(--ls-rarity-c); }
.ls-card[data-league="B"] { --ls-league-color: var(--ls-league-b); --ls-rarity-outline: var(--ls-rarity-b); }
.ls-card[data-league="A"] { --ls-league-color: var(--ls-league-a); --ls-rarity-outline: var(--ls-rarity-a); }
.ls-card.is-king { overflow: visible; }
.ls-card.is-king::after {
  content: "CROWN CHAMPION";
  position: absolute; top: -11px; left: 50%; transform: translateX(-50%);
  height: 20px; min-width: 106px; padding: 0 10px; display: flex; align-items: center; justify-content: center;
  border-radius: 999px; background: linear-gradient(90deg, #e2bf62, #fff0a8, #e2bf62);
  border: 1px solid rgba(255,255,255,.62); color: #241904;
  font-size: 8px; font-weight: 900; letter-spacing: .08em; z-index: 9;
  box-shadow: 0 0 18px rgba(226,191,98,.55), 0 2px 8px rgba(0,0,0,.5);
}
.ls-card.is-league-leader {
  box-shadow: var(--ls-card-shadow), 0 0 0 2px rgba(255,247,236,.16), 0 0 20px color-mix(in srgb, var(--ls-league-color) 42%, transparent);
}
.ls-leader-badge {
  position: absolute; top: 6px; left: 50%; transform: translateX(-50%);
  z-index: 8; height: 17px; padding: 0 7px; display: flex; align-items: center; justify-content: center;
  border-radius: 999px; background: var(--ls-league-color); color: var(--ls-ink);
  font: 900 7px/1 'Fredoka', sans-serif; letter-spacing: .08em; text-transform: uppercase;
  box-shadow: 0 1px 8px rgba(0,0,0,.55);
}
.ls-card-popup .ls-leader-badge { top: 32px; height: 20px; font-size: 8px; }
.ls-card-popup { width: var(--ls-popup-card-width); min-height: 342px; padding: 11px; }
.ls-card-mini { width: 112px; height: 150px; padding: 6px 6px 8px; border-radius: 10px; }
.ls-card-micro { width: 96px; height: 128px; padding: 6px; border-radius: 10px; }
.ls-card-featured { width: 132px; }
.ls-card-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.ls-rank {
  display: inline-flex; align-items: center; justify-content: center; min-width: 36px; height: 26px;
  padding: 0 8px; border-radius: 9px; background: color-mix(in srgb, var(--ls-league-color) 72%, #fff7ec 28%); color: var(--ls-ink);
  border: 1px solid rgba(26,17,24,.28);
  font: 700 18px/1 'Fredoka', sans-serif; box-shadow: inset 0 1px 0 rgba(255,255,255,.45), 0 1px 4px rgba(0,0,0,.35);
}
.ls-rank::before {
  content: "◇";
  margin-right: 3px;
  font-size: .82em;
  line-height: 1;
  color: color-mix(in srgb, var(--ls-league-color) 56%, #fff7ec 44%);
  text-shadow: 0 1px 0 rgba(26,17,24,.25);
}
.ls-card-mini .ls-rank { min-width: 30px; height: 20px; font-size: 17px; padding: 0 6px; border-radius: 6px; }
.ls-card-micro .ls-rank { min-width: 24px; height: 18px; font-size: 15px; padding: 0 5px; border-radius: 5px; }
.ls-card-mini .ls-card-top { margin-top: 22px; justify-content: center; gap: 6px; }
/* Pips read fine on the big popup card but just add clutter/overflow risk on the
   narrow portrait mini card — rank chip + type icon already convey the info. */
.ls-card-mini .ls-pips { display: none; }
.ls-pips, .ls-fragments { display: flex; gap: 3px; align-items: center; }
.ls-pip, .ls-fragment { width: 7px; height: 7px; border-radius: 999px; background: rgba(245,244,239,.24); }
.ls-pip.is-filled { background: var(--ls-league-color); box-shadow: 0 0 8px rgba(245,244,239,.2); }
.ls-fragment { width: 10px; height: 10px; border-radius: 2px; transform: rotate(45deg); border: 1px solid rgba(245,244,239,.32); }
.ls-fragment.is-filled { background: #FAF5FF; border-color: #FAF5FF; box-shadow: 0 0 8px rgba(250,245,255,.55); }
.ls-type-icon {
  width: 25px; height: 25px; border-radius: 8px; display: grid; place-items: center;
  color: var(--ls-ink); background: color-mix(in srgb, var(--ls-league-color) 72%, #fff7ec 28%); font-size: 16px; font-weight: 800;
  border: 1px solid rgba(26,17,24,.26);
}
.ls-card-mini .ls-type-icon, .ls-card-micro .ls-type-icon { width: 20px; height: 20px; border-radius: 6px; font-size: 13px; }
.ls-owner {
  margin-top: 7px; max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  color: #fff7ec; font-size: 16px; font-weight: 800; font-family: 'Nunito', sans-serif;
}
.ls-card-mini .ls-owner {
  position: absolute; top: 6px; left: 7px; right: 7px; z-index: 6;
  margin: 0; height: 18px; font-size: 11px; line-height: 18px; text-align: center;
  background: rgba(26,17,24,.76); border: 1px solid rgba(255,241,224,.10); border-radius: 7px; padding: 0 4px;
  text-shadow: 0 1px 5px rgba(0,0,0,1);
}
.ls-card-micro .ls-owner { margin-top: 3px; font-size: calc(12px * var(--ls-font-scale)); text-align: center; }
.ls-art {
  position: relative; margin: 9px auto 8px; width: 176px; height: 166px; border-radius: 12px;
  overflow: visible; display: grid; place-items: center;
  background: transparent;
  border: 0;
}
.ls-art img {
  width: 100%; height: 100%; object-fit: contain; object-position: center bottom; display: block;
  filter:
    drop-shadow(2.5px 0 0 var(--ls-rarity-outline))
    drop-shadow(-2.5px 0 0 var(--ls-rarity-outline))
    drop-shadow(0 2.5px 0 var(--ls-rarity-outline))
    drop-shadow(0 -2.5px 0 var(--ls-rarity-outline))
    drop-shadow(1.8px 1.8px 0 var(--ls-rarity-outline))
    drop-shadow(-1.8px -1.8px 0 var(--ls-rarity-outline))
    drop-shadow(1.8px -1.8px 0 var(--ls-rarity-outline))
    drop-shadow(-1.8px 1.8px 0 var(--ls-rarity-outline))
    saturate(1.18) contrast(1.08)
    drop-shadow(0 5px 8px rgba(0,0,0,.42));
}
.ls-art.is-missing img { display: none; }
.ls-art-placeholder {
  display: none; text-align: center; padding: 10px; color: var(--ls-card-muted);
  font-size: 12px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
}
.ls-art.is-missing .ls-art-placeholder { display: block; }
/* On the big popup/rebirth cards, a missing art file shouldn't look like an empty
   box — make the fallback text large and bright enough to actually read on stream. */
.ls-card-popup .ls-art.is-missing .ls-art-placeholder {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  width: 100%; height: 100%; font-size: 18px; font-weight: 900; letter-spacing: .06em;
  color: #FAF5FF; line-height: 1.3; text-shadow: 0 2px 8px rgba(0,0,0,.7);
}
/* Vertical/portrait card art: centered in normal flow (not corner-pinned) so the
   full illustration always has room and is never clipped by the card's overflow:hidden. */
.ls-card-mini .ls-art { position: static; width: 82px; height: 84px; margin: 4px auto 4px; border-radius: 8px; }
.ls-card-mini .ls-art-placeholder { font-size: 8px; }
.ls-card-micro .ls-art { width: 70px; height: 70px; margin: 4px auto 4px; border-radius: 8px; }
.ls-card-micro .ls-art-placeholder { font-size: 8px; }
/* Layered rank art sizing fix: final creator art stays inside the dynamic card renderer. */
.ls-card-popup .ls-art { width: 190px; height: 228px; margin: 7px auto 7px; }
.ls-card-popup .ls-art img { object-fit: contain; object-position: center bottom; }
.ls-card-mini .ls-art img { object-fit: contain; object-position: center bottom; }
.ls-card-micro .ls-art img { object-fit: contain; object-position: center bottom; }

/* Bottom shelf cards are tiny; give rank + username their own readable footer.
   The username floats ABOVE the card frame (not overlaid on top of it) so the
   league-leader/champion chips — which live just inside the card's top edge —
   never cover it. */
.ls-shelf-list .ls-card-micro {
  display: grid;
  grid-template-rows: 1fr 30px;
  width: 126px;
  height: 126px;
  padding: 6px;
  margin-top: 26px;
  overflow: visible;
}
.ls-shelf-list .ls-card-micro .ls-card-top {
  position: absolute;
  left: 7px;
  right: 34px;
  bottom: 7px;
  height: 24px;
  z-index: 5;
  justify-content: flex-start;
  gap: 4px;
  overflow: hidden;
}
.ls-shelf-list .ls-card-micro .ls-rank {
  min-width: 34px;
  height: 23px;
  font-size: var(--ls-shelf-rank-size);
  flex: 0 0 auto;
  box-shadow: 0 1px 6px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.45);
}
.ls-shelf-list .ls-card-micro .ls-duel-num {
  position: absolute;
  bottom: 7px;
  right: 7px;
  z-index: 6;
  min-width: 22px;
  height: 20px;
  padding: 0 5px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 6px;
  background: rgba(42,24,48,.94);
  border: 1px solid rgba(255,241,224,.46);
  color: #fff7ec;
  font: 900 13px/1 'Fredoka', sans-serif;
  box-shadow: 0 1px 6px rgba(0,0,0,.55);
}
.ls-shelf-list .ls-card-micro .ls-owner {
  position: absolute;
  left: 7px;
  right: 7px;
  top: -24px;
  z-index: 6;
  margin: 0;
  height: 20px;
  color: #fff7ec;
  font: 900 var(--ls-shelf-name-size)/20px 'Nunito', sans-serif;
  text-align: center;
  background: rgba(42,24,48,.88);
  border: 1px solid rgba(255,241,224,.13);
  border-radius: 6px;
  padding: 0 4px;
  text-shadow: 0 1px 4px rgba(0,0,0,1), 0 0 8px rgba(0,0,0,.85);
}
/* Champion crown sits above the card too — stack the username above that instead
   of letting the two collide. */
.ls-shelf-list .ls-card-micro.is-king .ls-owner { top: -46px; }
.ls-shelf-list .ls-card-micro::before {
  content: "";
  position: absolute;
  left: 0;
  right: 0;
  bottom: 0;
  height: 38px;
  z-index: 4;
  background: linear-gradient(180deg, transparent, rgba(42,24,48,.94) 36%, rgba(42,24,48,.98));
}
.ls-shelf-list .ls-card-micro .ls-art {
  width: 104px;
  height: 76px;
  margin: 6px auto 0;
  border-radius: 8px;
  z-index: 1;
}
.ls-shelf-list .ls-card-micro .ls-chip,
.ls-shelf-list .ls-card-micro .ls-badge-line,
.ls-shelf-list .ls-card-micro .ls-flex-line,
.ls-shelf-list .ls-card-micro .ls-title-line {
  display: none;
}

.ls-character-line { font: 700 24px/1 'Fredoka', sans-serif; color: #fff7ec; text-transform: uppercase; letter-spacing:.01em; }
.ls-type-label { color: var(--ls-card-muted); font: 800 10px/1 'Nunito', sans-serif; letter-spacing: .10em; text-transform: uppercase; }
.ls-power { margin-top: 6px; color: #fff7ec; font: 700 28px/1 'Fredoka', sans-serif; }
.ls-card-mini .ls-power { position: static; text-align: center; font-size: 14px; margin: 0 0 2px; }
.ls-card-footer { margin-top: 10px; display: flex; align-items: center; justify-content: space-between; gap: 8px; min-height: 24px; }
.ls-card-mini .ls-card-footer { justify-content: center; margin-top: 2px; min-height: 18px; }
.ls-chip {
  display: inline-flex; align-items: center; gap: 5px; max-width: 118px; height: 22px; padding: 0 8px;
  border-radius: 999px; background: rgba(245,244,239,.10); border: 1px solid rgba(245,244,239,.16);
  color: var(--ls-card-text); font-size: 10px; font-weight: 800; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.ls-title-line { margin-top: 5px; color: #FFC940; font: 800 11px/1 'Nunito', sans-serif; letter-spacing: .08em; text-transform: uppercase; text-align: center; }
.ls-flex-line { margin-top: 5px; color: var(--ls-card-muted); font: 800 10px/1.2 'Nunito', sans-serif; letter-spacing: .05em; text-align: center; text-transform: uppercase; }
.ls-badge-line { margin-top: 5px; display: flex; flex-wrap: wrap; justify-content: center; gap: 3px; }
.ls-badge-mini { max-width: 74px; padding: 2px 5px; border-radius: 999px; background: rgba(232,146,107,.20); border: 1px solid rgba(232,146,107,.48); color: #ffe4c7; font: 800 8px/1 'Nunito', sans-serif; letter-spacing: .04em; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ls-card-mini .ls-chip { height: 16px; max-width: 55px; padding: 0 5px; font-size: 9px; }
.ls-card-micro .ls-chip { height: 14px; max-width: 24px; padding: 0 4px; font-size: 9px; }

.ls-rank-marquee {
  width: 100%; height: 46px; overflow: hidden; display: flex; align-items: center;
  border-radius: 999px; background: rgba(8,16,28,.76); border: 1px solid rgba(192,132,252,.36);
  box-shadow: inset 0 0 22px rgba(168,85,247,.12);
}
.ls-rank-board {
  width: min(620px, 100%); min-height: 74px; padding: 8px 10px;
  display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 7px;
  border-radius: 12px; background: rgba(8,16,28,.82); border: 1px solid rgba(192,132,252,.36);
  box-shadow: 0 10px 24px rgba(0,0,0,.32), inset 0 0 22px rgba(168,85,247,.12);
  animation: lsRankBoardIn 420ms ease both;
}
.ls-rank-row {
  min-width: 0; height: 26px; padding: 0 8px; display: flex; align-items: center; gap: 7px;
  border-radius: 999px; background: rgba(245,244,239,.08); border: 1px solid rgba(245,244,239,.13);
  color: #fff7ec; font: 900 11px/1 'Nunito', sans-serif; letter-spacing: .035em; white-space: nowrap;
}
.ls-rank-row-name { min-width: 0; overflow: hidden; text-overflow: ellipsis; }
.ls-rank-row[data-move="up"] { border-color: rgba(128,199,222,.62); box-shadow: 0 0 14px rgba(128,199,222,.18); }

<body>
<div id="conn-dot"></div>

<!-- ══ League of Splatties — Top Camera Region (0-450px): two fixed compact windows,
     never a floating popup over the main gameplay area. ══ -->
<div id="lsTopRegion">
  <div id="lsPlayerWindow" class="ls-mini-window is-empty" data-ls-zone="player-window">
    <div class="ls-mini-window-label">PLAYER</div>
    <div id="leagueCardPopupZone"></div>
  </div>
  <div id="lsSystemWindow" class="ls-mini-window is-empty" data-ls-zone="system-window">

<!-- Middle Splat Bar (450-560px) — was nested inside gift-bar.html's #gift-bar; now a
     top-level, self-positioned element (see #leagueSprintBar CSS: top:450px explicit,
     replacing the old `inset:0` that relied on #gift-bar as its positioned ancestor). -->
<div id="leagueSprintBar">
  <div id="leagueSprintStatus"><div class="ls-hud-badge">🫟 LEAGUE OF SPLATTIES</div><div class="ls-hud-round">ROUND 3</div><div class="ls-hud-timer"><span class="ls-hud-timer-digits">08:42</span><span class="ls-hud-timer-label">UNTIL LEAGUE RESET</span></div></div>
  <div id="leagueSprintCenter"><div class="ls-target-rows"><div class="ls-target-rows-empty">SCOUTING…</div></div></div>
</div>

</div>
<!-- Retired as a visible column (zone 9 merged into zone 10 / #lsDuelPreview above) —
     kept in the DOM only because the JS still holds a reference to it; force-hidden
     via CSS. #lsRankingsSlideshow is reparented at init into #leagueSprintCenter as
     the Boss Field panel (zone 6-7). -->
<div id="lsRecentChallengers" data-ls-zone="recent-challengers"></div>
<div id="lsRankingsSlideshow" data-ls-zone="rankings-slideshow"></div>

<!-- Zone 8 — Micro Pills: tiny error/cooldown pills, moved out of the middle bar to
     sit just above the bottom combat/card strip. -->

<!-- Duel Result Pill: slim headline above the fight strip, results only. -->

<!-- Zone 11 — Narrow Card Event Dock (repurposed #leagueSprintEvent node): single
     card-width, anchored far right of the bottom strip, art-forward, one event at a
     time. -->
<div id="leagueSprintEvent" data-ls-zone="card-event-dock"></div>
<script>
// Tracks the shared mission-strip's last-known visibility (published by stream-dock.html
// on 'mission-strip-config'). Mirrors gift-bar.html's own window._missionStripEnabled —
// see setMissionStripText() below for why this matters (the .ls-command-strip CSS class
// force-shows the strip, so it must only be requested when the strip is meant to be up).
let _missionStripEnabled = true;

// ── System Window (top camera region) + Micro Pills ──────────────────────
// Renders League "system" events (rebirth window, promotion/demotion, champion changes,
// cooldown/denied/open/closed, phase/state changes) into #lsSystemWindow, and routine
// low-stakes command feedback (cooldown, invalid command, no target, etc.) into
// #lsMicroPills. Called extensively from inside the LEAGUE_SPRINT engine below (e.g.
// showMicroPill() at several event-handling sites) — this block sat just above
// gift-bar.html's LEAGUE_SPRINT const and was caught by a re-grep during removal from
// gift-bar.html rather than being in the original extraction snapshot's line inventory.
const LS_SYSTEM_ICONS = {
  rebirth:'♻️', promotion:'⬆️', demotion:'⬇️', cooldown:'⏳',
  denied:'🚫', open:'🔓', closed:'🔒', state:'⚙️', event:'⚡', champion:'👑'
};
let lsSystemWindowTimer=null;
function renderSystemWindow(kicker, title, sub, kind, ms=4200){
  const win=document.getElementById('lsSystemWindow');
  const body=document.getElementById('lsSystemWindowBody');
  if(!win||!body)return;
  clearTimeout(lsSystemWindowTimer);
  const icon=LS_SYSTEM_ICONS[kind]||LS_SYSTEM_ICONS.event;
  body.innerHTML=`
    <div class="ls-mini-window-thumb" style="font-size:30px;line-height:1;">${icon}</div>
    <div class="ls-mini-window-copy">
      <div class="ls-mini-window-title">${title||''}</div>
      <div class="ls-mini-window-sub">${sub||''}</div>
    </div>`;
  const labelEl=win.querySelector('.ls-mini-window-label');
  if(labelEl)labelEl.textContent=kicker||'SYSTEM';
  win.classList.remove('is-empty');
  win.classList.add('visible');
  if(ms>0)lsSystemWindowTimer=setTimeout(hideSystemWindow, ms);
}
function hideSystemWindow(){
  clearTimeout(lsSystemWindowTimer);
  document.getElementById('lsSystemWindow')?.classList.remove('visible');
}
function showMicroPill(text, kind='info'){
  const wrap=document.getElementById('lsMicroPills');
  if(!wrap||!text)return;
  const pill=document.createElement('div');
  pill.className='ls-micro-pill'+(kind==='error'?' is-error':'');
  pill.textContent=text;
  wrap.appendChild(pill);
  while(wrap.children.length>3)wrap.removeChild(wrap.firstChild);
  setTimeout(()=>{
    pill.style.transition='opacity 200ms ease';
    pill.style.opacity='0';
    setTimeout(()=>pill.remove(), 220);
  }, 2000);
}
function showSplatPanelTakeover(title, detail, note, ms=5200){
  // Kept as a compatibility wrapper — existing call sites are unchanged.
  renderSystemWindow('SYSTEM', title || 'Splat Cards', [detail, note].filter(Boolean).join('  '), 'event', ms);
}

const LEAGUE_SPRINT = (() => {
  const characters = {
    wekka: { label: 'Wekka', type: 'defender' },
    layla: { label: 'Layla', type: 'attacker' },
    kinz: { label: 'Kinz', type: 'balanced' },
    jasper: { label: 'Jasper', type: 'gambler' },
    jamie: { label: 'Jamie', type: 'escapist' }
  };
  const typeLabels = {
    defender: { label: 'Defender', fallback: 'SH' },
    attacker: { label: 'Attacker', fallback: 'AT' },

      if (!target) {

        return true;
      }

      const winner = playerWins ? card : target;
      const loser = playerWins ? target : card;
      const boostedWinner = updateCard(winner, {
        power: Number(winner.power || 0) + 45,

        battleStepsClimbed: Number(winner.battleStepsClimbed || 0) + 1
      });
      if (userKey(winner.username) === userKey(card.username)) Object.assign(card, boostedWinner);
      if (userKey(winner.username) === userKey(target.username)) Object.assign(target, boostedWinner);
      playDuelTimeline({
        attacker: card,
        defender: target,
        message: `${normalizeUsername(username)} duels ${target.username}`,
        beats: [
          { type:'announce', label:'FACE OFF', text:`${card.username} vs ${target.username}`, delayMs:900 },
          { type:'strike', target: playerWins ? 'defender' : 'attacker', damage:24, attackerHp: playerWins ? 82 : 54, defenderHp: playerWins ? 54 : 82, label:'OPENING HIT', delayMs:1100 },
          { type:'final', target: playerWins ? 'defender' : 'attacker', damage:45, attackerHp: playerWins ? 82 : 0, defenderHp: playerWins ? 0 : 82, label:'FINAL HIT', delayMs:1200 }
        ],
        result: {
          winnerId: winner.ownerId,
          loserId: loser.ownerId,

      // Local demo-engine mirror of the real rebirth mechanic: pay 20% DP up front for a
      // random 1/3-each shot at rank up / rank down / no change, only between rounds.
      const oldCard = Object.assign({}, card);
      const cost = Math.max(1, Math.round(Number(card.power || 0) * 0.20));
      if (Number(card.power || 0) < cost) {
        emitVisualEvent('REBIRTH_DENIED', { username, card, reason: `need ${cost} DP to gamble` });
        return true;
      }
      const types = Object.keys(typeLabels);
      const currentTypeIndex = Math.max(0, types.indexOf(card.type));
      const newType = types[(currentTypeIndex + 1 + Math.abs(hashString(username)) % (types.length - 1)) % types.length];
      const roll = Math.random();
      const direction = roll < (1 / 3) ? 1 : roll < (2 / 3) ? -1 : 0;
      const newRank = direction > 0 ? shiftRank(card.currentRank, 1) : direction < 0 ? shiftRank(card.currentRank, -1) : card.currentRank;

    // zones 6-7 are the Target Rows / Boss Field board, not a message-spam destination.
    if (d.message && !d.event && !d.action) {

    if (!d.action && d.type && eventMeta[d.type]) emitVisualEvent(d.type, d);
    if (!d.action && d.eventType && eventMeta[d.eventType]) emitVisualEvent(d.eventType, Object.assign({}, d, { type: d.eventType }));

      if (type === 'REBIRTH_SUCCESS' && d.oldCard) {

        attacker,
        defender,
        message: d.message || d.event || `${attacker?.username || 'player'} vs ${defender?.username || 'player'}`,
        beats: [

window.LeagueSprintCards = LEAGUE_SPRINT;
// Ably subscriptions (giftsChannel 'league-sprint', chatChannel 'league-sprint-chat' /
// 'chat-message' / 'milk-event', ablyChannel 'splat-card-layout', giftsChannel
// 'league-sprint-state') are registered inside connectAbly() below, alongside the
// detach-by-default toggle wiring, instead of unconditionally at parse time.

function applySplatCardLayout(d) {
  if (!d) return;
  // NOTE: this used to also reposition/scale gift-bar.html's own #gift-bar and #bar-lines
  // as a side effect (they shared the same 'splat-card-layout' payload's top/scale fields).
  // Those elements don't exist on this page anymore — only League's own elements are
  // touched here. Visibility is now handled by the league-sprint-toggle attach/detach
  // pattern (see connectAbly() below), not by a `d.hidden` flag on this channel.
  const shelf = document.getElementById('leagueBottomShelf');
  // NOTE: shelfTop/shelfScale free-position controls were removed as part of the
  // structural rebuild — the Bottom Splat Info Strip is now a fixed 177px region
  // (source-of-truth region map) anchored with a safety margin above the canvas edge.
  // Letting a stale saved dock value move/scale it here previously caused it to clip
  // off the bottom of the canvas. Text-size controls below are still honored.
  // Gifter Highlight owns #bar-info positioning/size through gifter-slides-config.
  // Older Splat Cards side-panel values are intentionally ignored here so one
  // layout control cannot silently move the gifter slide window.
  if (shelf) {
    if (typeof d.shelfNameSize === 'number') shelf.style.setProperty('--ls-shelf-name-size', Math.max(9, Math.min(30, d.shelfNameSize)) + 'px');
    if (typeof d.shelfRankSize === 'number') shelf.style.setProperty('--ls-shelf-rank-size', Math.max(12, Math.min(34, d.shelfRankSize)) + 'px');
    if (typeof d.shelfTitleSize === 'number') shelf.style.setProperty('--ls-shelf-title-size', Math.max(10, Math.min(30, d.shelfTitleSize)) + 'px');
  }
  // Splat Cards center notice box — primary/secondary text sizes + helper line visibility.
  const sprintBarEl = document.getElementById('leagueSprintBar');
  if (sprintBarEl) {
    if (typeof d.noticePrimarySize === 'number') sprintBarEl.style.setProperty('--ls-notice-primary-size', Math.max(18, Math.min(40, d.noticePrimarySize)) + 'px');
    if (typeof d.noticeSecondarySize === 'number') sprintBarEl.style.setProperty('--ls-notice-secondary-size', Math.max(11, Math.min(26, d.noticeSecondarySize)) + 'px');
  }
  if (d.noticeHelperVisible !== undefined) window.LeagueSprintCards?.setNoticeHelperVisible?.(!!d.noticeHelperVisible);
  if (d.noticeTest) window.LeagueSprintCards?.testNotice?.();
  // Global League of Splatties text-size multiplier (mission strip, HUD, target rows/boss

  // already bumped up for legibility; this just scales further from that new baseline.
  if (typeof d.fontScale === 'number') {

    document.documentElement.style.setProperty('--ls-font-scale', String(scale));
  }

function applyLeagueSprintState(d) {
  if (!d) return;
  const round = Math.max(1, Number(d.round) || 1);
  const remaining = Math.max(0, Number(d.remainingSec) || 0);
  // Only forward a real `event` string — this handler runs on every second-by-second

  const msg = {
    round, remainingSec: remaining,

    phase: d.phase || (remaining <= 0 ? 'results' : 'active')

// ═══════════════════════════════════════════════════════════════════
// ABLY ADAPTER — detach-by-default, toggle-on. Follows the exact pattern used by
// new-here-overlay.html (see its connectAbly()/attachMain()/detachMain()): own
// Ably.Realtime client, own splat-chat/splat-gifts attachments (mirrored in lockstep
// with the main channel), and a tiny always-attached 'league-sprint-toggle' channel
// that carries only the on/off command so this overlay costs zero Ably messages while
// off. On connect, it asks the toggle channel for current state in case the control
// page's setting changed while this overlay was closed/reloaded.
// ═══════════════════════════════════════════════════════════════════
const ABLY_KEY = 'Y8e-eA.l0VHlg:aJXsEfu1Be4BYsAeATRMI3w30YAKSs_LyF3DPoesIz0';
const ABLY_CH  = 'splat-overlay';

  function attachMain() {
    OVERLAY_ENABLED = true;
    document.body.style.display = 'block';
    if (_lsAttached) return; // idempotent — ignore a repeat "on"

    ablyChannel.attach().catch(() => {});
    chatChannel.attach().catch(() => {});
    giftsChannel.attach().catch(() => {});
  }
  function detachMain() {
    OVERLAY_ENABLED = false;
    document.body.style.display = 'none';
    _lsAttached = false;

    chatChannel.detach().catch(() => {});

    if (msg.data && msg.data.enabled) attachMain(); else detachMain();
  });

  // ── Card engine + duel/round state (moved from gift-bar.html) ──
  giftsChannel.subscribe('league-sprint', msg => LEAGUE_SPRINT.handleMessage(msg?.data));
  chatChannel.subscribe('league-sprint-chat', msg => LEAGUE_SPRINT.handleChatMessage(msg?.data));
  chatChannel.subscribe('chat-message', msg => LEAGUE_SPRINT.handleChatMessage(msg?.data));
  // Real chat traffic rides the 'milk-event' comment stream-dock.html already publishes
  // for the hype meter (see publishMilk()) — this is League reading Milk Bar's own data,
  // a deliberate cross-feature dependency, not something to cut. Costs zero extra Ably
  // messages since 'milk-event' is already flowing for the hype meter / New Here pile.
  chatChannel.subscribe('milk-event', msg => LEAGUE_SPRINT.handleChatMessage(msg?.data));
  ablyChannel.subscribe('splat-card-layout', msg => applySplatCardLayout(msg?.data));
  giftsChannel.subscribe('league-sprint-state', msg => applyLeagueSprintState(msg?.data));

  // Tracks the shared mission strip's visibility so setMissionStripText() (in the engine
  // above) doesn't force it back on with .ls-command-strip after stream-dock.html/
  // league-sprint-control.html explicitly hid it. Read-only here — this file never
  // publishes the `visible` field itself, only `text`/`commandStrip`.
  ablyChannel.subscribe('mission-strip-config', msg => {
    if (msg.data && msg.data.visible !== undefined) _missionStripEnabled = !!msg.data.visible;
  });

  // Registered once, outside the 'connected' handler, so reconnects don't stack intervals

    const s = stateChange.current;
