<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Giftr Bar</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Bebas+Neue&family=DM+Sans:wght@700&display=swap" rel="stylesheet">
<script src="https://cdn.ably.com/lib/ably.min-2.js"></script>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 1080px; height: 1920px;
  overflow: hidden; background: transparent;
}

/* ─── PARTICLE CANVAS ─── */
#particle-canvas {
  position: absolute; top: 0; left: 0;
  width: 1080px; height: 1920px;
  pointer-events: none; z-index: 50;
}

/* ─── SCREEN PULSE (tier 4+) ─── */
#screen-pulse {
  position: absolute; inset: 0;
  pointer-events: none; z-index: 8;
  opacity: 0; transition: opacity 0.35s ease;
}

/* ═══════════════════════════════════════════════════════
   BAR
   #giftr-bar → overflow:visible so the giant name/amount
   text bleeds above & below the 50px bar height.
   All background elements live in #bar-bg-layer which
   keeps overflow:hidden so only text overflows.
═══════════════════════════════════════════════════════ */
#giftr-bar {
  position: absolute;
  top: 450px; left: 0;
  width: 1080px; height: 50px;
  overflow: visible;   /* ← text intentionally bleeds out */
  opacity: 0; transition: opacity 0.6s ease;
  z-index: 10;
}
#giftr-bar.visible { opacity: 1; }

/* Background elements — clipped to 50px bar */
#bar-bg-layer {
  position: absolute; inset: 0;
  overflow: hidden;
}
#bar-bg {
  position: absolute; inset: 0;
  background: rgba(5, 0, 14, 0.68); /* semi-transparent glass */
  z-index: 0;
}
#bar-wash {
  position: absolute; inset: 0;
  transition: background 1s ease;
  z-index: 1; pointer-events: none;
}
#bar-edge-top, #bar-edge-bot {
  position: absolute; left: 0; right: 0;
  height: 1px; transition: background 1s ease;
  z-index: 4; pointer-events: none;
}
#bar-edge-top { top: 0; }
#bar-edge-bot { bottom: 2px; }

#bar-sweep {
  position: absolute; inset: 0;
  pointer-events: none; z-index: 6;
  opacity: 0; will-change: transform, opacity;
}
#bar-sweep.flash { animation: barSweep 0.55s ease-in-out forwards; }
@keyframes barSweep {
  0%   { opacity: 0; transform: translateX(-110%); }
  35%  { opacity: 1; }
  100% { opacity: 0; transform: translateX(110%);  }
}

#bar-progress {
  position: absolute; bottom: 0; left: 0;
  height: 2px; width: 0%;
  transition: background 1s ease;
  z-index: 5; border-radius: 0 1px 1px 0;
}

/* Diagonal glint flare — periodic shine sweep */
#bar-shimmer-flare {
  position: absolute; inset: 0;
  background: linear-gradient(115deg,
    transparent 15%, rgba(255,255,255,0.20) 50%, transparent 85%);
  background-size: 260% 100%;
  background-position: -260% 0;
  pointer-events: none; z-index: 7;
  animation: barFlareSweep 5s ease-in-out infinite;
}
@keyframes barFlareSweep {
  0%   { background-position: -260% 0; opacity: 0; }
  8%   { opacity: 1; }
  50%  { background-position: 260% 0; opacity: 0; }
  100% { background-position: 260% 0; opacity: 0; }
}

/* Shimmer border — outside bar-bg-layer so outer glow bleeds */
#bar-border {
  position: absolute; inset: 0;
  z-index: 8; pointer-events: none;
  animation: barBorderShimmer 5s linear infinite;
}
@keyframes barBorderShimmer {
  0%   { box-shadow: inset 0 0 0 1px rgba(192,132,252,0.82), 0 0 10px rgba(192,132,252,0.22); }
  20%  { box-shadow: inset 0 0 0 1px rgba(232,121,249,0.96), 0 0 18px rgba(232,121,249,0.34); }
  40%  { box-shadow: inset 0 0 0 1px rgba(105,201,208,0.82), 0 0 10px rgba(105,201,208,0.22); }
  60%  { box-shadow: inset 0 0 0 1px rgba(238, 29, 82,0.88), 0 0 14px rgba(238, 29, 82,0.28); }
  80%  { box-shadow: inset 0 0 0 1px rgba(168, 85,247,0.88), 0 0 14px rgba(168, 85,247,0.28); }
  100% { box-shadow: inset 0 0 0 1px rgba(192,132,252,0.82), 0 0 10px rgba(192,132,252,0.22); }
}

/* ═══════════════════════════════════════════════════════
   BAR FRAMES — new layout:
   Left 2/3  → giant NAME + AMOUNT  (overflow: visible)
   Right 1/3 → compact platform/slot info (overflow: hidden)

   Name at 90px bleeds ~20px above & below the 50px bar.
   Amount at 58px bleeds ~4px above & below.
   This creates the "bursting out of the banner" effect.
═══════════════════════════════════════════════════════ */
.bar-frame {
  position: absolute; inset: 0;
  display: flex; align-items: center;
  overflow: visible;
  z-index: 3; opacity: 0;
  transition: opacity 0.42s ease;
  pointer-events: none;
}
.bar-frame.active { opacity: 1; }

/* Left ~69% — hero name + amount, overflow visible */
.bar-left {
  flex: 1; min-width: 0;
  display: flex; align-items: center;
  padding: 0 16px 0 18px;
  gap: 20px;
  overflow: visible;
}

/* 90px in a 50px bar → bleeds 20px top and bottom */
.bar-name-big {
  font-family: 'Anton', sans-serif;
  font-size: 90px; line-height: 1;
  text-transform: uppercase; color: #ffffff;
  letter-spacing: 1px; white-space: nowrap;
  text-shadow:
    0 3px 18px rgba(0,0,0,0.95),
    0 1px 5px  rgba(0,0,0,0.85),
    0 0 40px   rgba(255,255,255,0.06);
  overflow: visible; flex-shrink: 1;
}

/* 58px → bleeds ~4px top and bottom */
.bar-amount-big {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 58px; letter-spacing: 4px;
  white-space: nowrap; flex-shrink: 0;
  overflow: visible;
  /* colour set inline via platform edge */
}

/* Right ~31% — compact info, stays inside 50px bar */
.bar-right-info {
  width: 330px; flex-shrink: 0;
  height: 50px; overflow: hidden;
  display: flex; flex-direction: column;
  align-items: flex-end; justify-content: center;
  padding: 0 16px; gap: 3px;
  background: rgba(0,0,0,0.14);
  border-left: 1px solid rgba(255,255,255,0.06);
}

.bar-plat {
  font-family: 'DM Sans', sans-serif;
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.10em; text-transform: uppercase;
  padding: 2px 7px; border-radius: 4px;
  white-space: nowrap; line-height: 17px; flex-shrink: 0;
}
.plat-tiktok  { color: #69C9D0; background: rgba(105,201,208,0.16); border: 1px solid rgba(105,201,208,0.30); }
.plat-youtube { color: #FF6B6B; background: rgba(255, 80, 80,0.16); border: 1px solid rgba(255, 80, 80,0.30); }
.plat-direct,
.plat-default { color: #C084FC; background: rgba(192,132,252,0.16); border: 1px solid rgba(192,132,252,0.30); }

.bar-slot-lbl {
  font-family: 'DM Sans', sans-serif;
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.09em; text-transform: uppercase;
  color: rgba(255,255,255,0.36); white-space: nowrap;
}

/* ═══════════════════════════════════════════════════════
   GIFT PANEL
   Launches from bar (transform-origin: top center).
   Semi-transparent glass + shimmering border.
═══════════════════════════════════════════════════════ */
#gift-panel {
  position: absolute;
  transform-origin: top center;
  z-index: 20;
  overflow: hidden;
  pointer-events: none;
  border-radius: 18px;
  display: none;
}
#gift-panel.show {
  display: block;
  animation: panelIn 0.58s cubic-bezier(.34,1.56,.64,1) forwards;
}
#gift-panel.hide {
  display: block;
  animation: panelOut 0.38s ease-in forwards;
}

/* Tier sizes — centered on 1080px canvas, anchored at/near bar */
#gift-panel[data-tier="2"] { top: 500px; left: 200px; width: 680px;  height: 580px;  }
#gift-panel[data-tier="3"] { top: 500px; left: 110px; width: 860px;  height: 830px;  }
#gift-panel[data-tier="4"] { top: 490px; left:  40px; width: 1000px; height: 1100px; }
#gift-panel[data-tier="5"] { top: 450px; left:  10px; width: 1060px; height: 1400px; }
#gift-panel[data-tier="6"] { top: 440px; left:   0px; width: 1080px; height: 1480px; }

@keyframes panelIn {
  0%   { opacity: 0; transform: scaleY(0)    scaleX(0.70); }
  55%  { opacity: 1; transform: scaleY(1.04) scaleX(1.01); }
  100% { opacity: 1; transform: scaleY(1)    scaleX(1);    }
}
@keyframes panelOut {
  0%   { opacity: 1; transform: scaleY(1)    scaleX(1);    }
  100% { opacity: 0; transform: scaleY(0.06) scaleX(0.65); }
}

#panel-bg {
  position: absolute; inset: 0;
  border-radius: 18px; z-index: 0;
}
#panel-glow {
  position: absolute; inset: -35px;
  border-radius: 52px; filter: blur(44px); z-index: 0;
  animation: glowPulse 2.4s ease-in-out infinite;
}
@keyframes glowPulse {
  0%, 100% { opacity: 0.42; filter: blur(44px); }
  50%       { opacity: 0.72; filter: blur(60px); }
}
#panel-stripe {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px; z-index: 4;
  border-radius: 18px 18px 0 0;
}

/* Shimmer border ring — cycling color inset shadow */
#panel-border {
  position: absolute; inset: 0;
  border-radius: 18px; z-index: 7;
  pointer-events: none;
  animation: panelBorderShimmer 5s linear infinite;
}
@keyframes panelBorderShimmer {
  0%   { box-shadow: inset 0 0 0 1.5px rgba(192,132,252,0.80); }
  20%  { box-shadow: inset 0 0 0 1.5px rgba(232,121,249,0.95); }
  40%  { box-shadow: inset 0 0 0 1.5px rgba(105,201,208,0.80); }
  60%  { box-shadow: inset 0 0 0 1.5px rgba(238, 29, 82,0.85); }
  80%  { box-shadow: inset 0 0 0 1.5px rgba(168, 85,247,0.85); }
  100% { box-shadow: inset 0 0 0 1.5px rgba(192,132,252,0.80); }
}

/* Diagonal glint sweep across panel surface */
#panel-shimmer-sweep {
  position: absolute; inset: 0;
  border-radius: 18px; z-index: 6; pointer-events: none;
  background: linear-gradient(115deg,
    transparent 20%, rgba(255,255,255,0.06) 50%, transparent 80%);
  background-size: 260% 100%;
  animation: panelFlareSweep 7s ease-in-out infinite;
}
@keyframes panelFlareSweep {
  0%   { background-position: -260% 0; opacity: 0; }
  8%   { opacity: 1; }
  42%  { background-position: 260% 0; opacity: 0; }
  100% { background-position: 260% 0; opacity: 0; }
}

/* Semi-transparent glass backgrounds */
#gift-panel[data-platform="tiktok"]  #panel-bg {
  background: linear-gradient(160deg, rgba(16,4,26,0.74) 0%, rgba(28,10,38,0.80) 100%);
  border: 1px solid rgba(105,201,208,0.20);
  backdrop-filter: blur(18px);
}
#gift-panel[data-platform="youtube"] #panel-bg {
  background: linear-gradient(160deg, rgba(20,4,4,0.74) 0%, rgba(38,8,6,0.80) 100%);
  border: 1px solid rgba(255,80,80,0.20);
  backdrop-filter: blur(18px);
}
#gift-panel[data-platform="direct"]  #panel-bg,
#gift-panel[data-platform="default"] #panel-bg {
  background: linear-gradient(160deg, rgba(14,4,28,0.74) 0%, rgba(22,8,46,0.80) 100%);
  border: 1px solid rgba(192,132,252,0.20);
  backdrop-filter: blur(18px);
}

/* Glow colours */
#gift-panel[data-platform="tiktok"]  #panel-glow { background: radial-gradient(ellipse at 50% 20%, #69C9D0, #EE1D52 52%, transparent 72%); }
#gift-panel[data-platform="youtube"] #panel-glow { background: radial-gradient(ellipse at 50% 20%, #FF6B6B, #CC0000 52%, transparent 72%); }
#gift-panel[data-platform="direct"]  #panel-glow,
#gift-panel[data-platform="default"] #panel-glow { background: radial-gradient(ellipse at 50% 20%, #E879F9, #7B2FBE 52%, transparent 72%); }

/* Panel content */
#panel-content {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 50px 60px; z-index: 8;
  opacity: 0; transition: opacity 0.4s ease;
}
#panel-content.show { opacity: 1; }

#panel-plat-badge {
  font-family: 'DM Sans', sans-serif;
  font-size: 15px; font-weight: 700;
  letter-spacing: 0.14em; text-transform: uppercase;
  padding: 5px 20px; border-radius: 6px;
  margin-bottom: 22px; flex-shrink: 0;
}
#panel-plat-badge.plat-tiktok  { color: #69C9D0; background: rgba(105,201,208,0.13); border: 1px solid rgba(105,201,208,0.38); }
#panel-plat-badge.plat-youtube { color: #FF6B6B; background: rgba(255,80,80,0.13);   border: 1px solid rgba(255,80,80,0.38);   }
#panel-plat-badge.plat-direct,
#panel-plat-badge.plat-default { color: #C084FC; background: rgba(192,132,252,0.13); border: 1px solid rgba(192,132,252,0.38); }

#gift-name {
  font-family: 'Anton', sans-serif;
  text-transform: uppercase; color: #ffffff;
  text-align: center; letter-spacing: 3px; line-height: 0.92;
  text-shadow: 0 4px 26px rgba(0,0,0,0.9), 0 0 60px rgba(255,255,255,0.07);
  width: 100%; overflow: hidden;
  text-overflow: ellipsis; white-space: nowrap; flex-shrink: 0;
}
#gift-panel[data-tier="2"] #gift-name { font-size: 68px; }
#gift-panel[data-tier="3"] #gift-name { font-size: 90px; }
#gift-panel[data-tier="4"] #gift-name { font-size: 114px; }
#gift-panel[data-tier="5"] #gift-name { font-size: 136px; }
#gift-panel[data-tier="6"] #gift-name { font-size: 154px; }

#gift-divider {
  width: 56%; height: 2px; border-radius: 1px;
  margin: 16px 0; flex-shrink: 0;
}

#gift-amount {
  font-family: 'Bebas Neue', sans-serif;
  letter-spacing: 6px; text-align: center; flex-shrink: 0;
}
#gift-panel[data-tier="2"] #gift-amount { font-size: 52px; }
#gift-panel[data-tier="3"] #gift-amount { font-size: 70px; }
#gift-panel[data-tier="4"] #gift-amount { font-size: 88px; }
#gift-panel[data-tier="5"] #gift-amount { font-size: 108px; }
#gift-panel[data-tier="6"] #gift-amount { font-size: 126px; }

#gift-panel[data-platform="tiktok"]  #gift-amount { color: #69C9D0; text-shadow: 0 0 50px rgba(105,201,208,0.65); }
#gift-panel[data-platform="youtube"] #gift-amount { color: #FF6B6B; text-shadow: 0 0 50px rgba(255,80,80,0.65);   }
#gift-panel[data-platform="direct"]  #gift-amount,
#gift-panel[data-platform="default"] #gift-amount { color: #C084FC; text-shadow: 0 0 50px rgba(192,132,252,0.65); }

#panel-tier-label {
  font-family: 'DM Sans', sans-serif;
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.22em; text-transform: uppercase;
  color: rgba(255,255,255,0.20);
  margin-top: 18px; flex-shrink: 0;
}

#gift-message {
  font-family: 'DM Sans', sans-serif;
  font-weight: 700; font-size: 22px;
  color: rgba(255,255,255,0.76);
  text-align: center; line-height: 1.45;
  margin-top: 18px; padding: 14px 22px;
  background: rgba(255,255,255,0.06);
  border-radius: 10px; width: 100%;
  max-height: 130px; overflow: hidden;
  display: none; flex-shrink: 0;
}
#gift-message.show { display: block; }
#gift-panel[data-tier="4"] #gift-message,
#gift-panel[data-tier="5"] #gift-message,
#gift-panel[data-tier="6"] #gift-message { font-size: 28px; max-height: 170px; }

/* ─── TIER 1 SHIMMER ─── */
#tier1-shimmer {
  position: absolute; top: 450px; left: 0;
  width: 1080px; height: 50px;
  pointer-events: none; z-index: 15;
  background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.22) 50%, transparent 100%);
  opacity: 0;
}
#tier1-shimmer.active { animation: t1Shimmer 0.85s ease-in-out 3 forwards; }
@keyframes t1Shimmer {
  0%   { opacity: 0; transform: translateX(-110%); }
  25%  { opacity: 1; }
  75%  { opacity: 1; }
  100% { opacity: 0; transform: translateX(110%);  }
}

/* ─── STATUS DOT ─── */
#status-dot {
  position: absolute; top: 454px; left: 6px;
  width: 6px; height: 6px;
  border-radius: 50%; background: #444;
  z-index: 30; transition: background 0.3s;
}
#status-dot.connected  { background: #22c55e; box-shadow: 0 0 5px rgba(34,197,94,0.7); }
#status-dot.connecting { background: #eab308; }
</style>
</head>
<body>

<canvas id="particle-canvas" width="1080" height="1920"></canvas>
<div id="screen-pulse"></div>

<div id="giftr-bar">
  <!-- Background layer — clipped to 50px bar -->
  <div id="bar-bg-layer">
    <div id="bar-bg"></div>
    <div id="bar-wash"></div>
    <div id="bar-edge-top"></div>
    <div id="bar-edge-bot"></div>
    <div id="bar-sweep"></div>
    <div id="bar-progress"></div>
    <div id="bar-shimmer-flare"></div>
  </div>
  <!-- Border lives outside bg-layer so outer glow can bleed -->
  <div id="bar-border"></div>
  <!-- Frames overflow the bar bounds (name/amount too tall) -->
  <div class="bar-frame" id="frame-a"></div>
  <div class="bar-frame" id="frame-b"></div>
</div>

<div id="gift-panel">
  <div id="panel-bg"></div>
  <div id="panel-glow"></div>
  <div id="panel-stripe"></div>
  <div id="panel-shimmer-sweep"></div>
  <div id="panel-border"></div>
  <div id="panel-content">
    <div id="panel-plat-badge"></div>
    <div id="gift-name"></div>
    <div id="gift-divider"></div>
    <div id="gift-amount"></div>
    <div id="panel-tier-label"></div>
    <div id="gift-message"></div>
  </div>
</div>

<div id="tier1-shimmer"></div>
<div id="status-dot"></div>

<script>
/* ══ CONFIG ══════════════════════════════════════════════ */
const CONFIG = {
  ROTATE_MS:    5000,
  ABLY_KEY:     'Y8e-eA.l0VHlg:aJXsEfu1Be4BYsAeATRMI3w30YAKSs_LyF3DPoesIz0',
  ABLY_CHANNEL: 'splat-overlay',
};

/*
  Tiers by gift amount:
    Coins/Jewels: <50=skip  <1k=T1  <5k=T2  <25k=T3  <100k=T4  <250k=T5  250k+=T6
    USD:          <$1=skip  <$10=T1 <$50=T2 <$100=T3 <$250=T4  <$400=T5  $400+=T6
*/
const TIER_CONFIG = [
  null,
  { duration:  5000, barOnly: true,  particles:   0 }, // T1 bar shimmer
  { duration:  6500, barOnly: false, particles:  40 }, // T2 small panel
  { duration:  7500, barOnly: false, particles:  80 }, // T3 mid panel
  { duration:  9000, barOnly: false, particles: 150 }, // T4 large panel
  { duration: 11000, barOnly: false, particles: 250 }, // T5 full column
  { duration: 13000, barOnly: false, particles: 400 }, // T6 god tier
];

const TIER_LABELS = ['','','FEATURED GIFT','BIG GIFT','MEGA GIFT','LEGENDARY GIFT','⚡ GOD TIER ⚡'];

const SLOT_DEFS = [
  { key: 'daily',   label: 'Daily Top Gifter'   },
  { key: 'weekly',  label: 'Weekly Top Gifter'  },
  { key: 'monthly', label: 'Monthly Top Gifter' },
  { key: 'youtube', label: 'Top YouTube Gifter' },
  { key: 'tiktok',  label: 'Top TikTok Gifter'  },
  { key: 'custom',  label: 'Featured Gifter'    },
];

const PLAT_COLORS = {
  tiktok:  {
    wash: 'rgba(105,201,208,0.07)', edge: '#69C9D0', sweep: 'rgba(105,201,208,0.22)',
    particles: ['#69C9D0','#EE1D52','#ffffff','#ff80ab','#00eeff'],
    pulse: 'rgba(105,201,208,0.22)',
  },
  youtube: {
    wash: 'rgba(255, 80, 80,0.07)', edge: '#FF6B6B', sweep: 'rgba(255, 80, 80,0.22)',
    particles: ['#FF6B6B','#FF0000','#ffffff','#ffcc00','#ff4444'],
    pulse: 'rgba(255,80,80,0.22)',
  },
  direct:  {
    wash: 'rgba(192,132,252,0.07)', edge: '#C084FC', sweep: 'rgba(192,132,252,0.22)',
    particles: ['#C084FC','#E879F9','#ffffff','#A855F7','#FAF5FF'],
    pulse: 'rgba(192,132,252,0.22)',
  },
  default: {
    wash: 'rgba(192,132,252,0.07)', edge: '#C084FC', sweep: 'rgba(192,132,252,0.22)',
    particles: ['#C084FC','#E879F9','#ffffff','#A855F7','#FAF5FF'],
    pulse: 'rgba(192,132,252,0.22)',
  },
};

/* ══ STATE ══════════════════════════════════════════════ */
let leaderboard  = {};
let activeSlots  = SLOT_DEFS.slice(0, 5);
let currentIdx   = 0;
let rotateTimer  = null;
let progressAnim = null;
let pinned       = false;
let frameActive  = 'a';
let alertQueue   = [];
let alertActive  = false;
let panelOpen    = false;
let alertTimeout = null;
let panelTimer   = null;

/* ══ UTILS ══════════════════════════════════════════════ */
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtAmount(amount, type) {
  const n = Number(amount) || 0;
  if (type === 'tiktok_coins')      return n.toLocaleString() + ' COINS';
  if (type === 'youtube_jewels')    return n.toLocaleString() + ' JEWELS';
  if (type === 'youtube_superchat') return '$' + (Number.isInteger(n) ? n.toLocaleString() : n.toFixed(2));
  if (type === 'direct_donation')   return '$' + (Number.isInteger(n) ? n.toLocaleString() : n.toFixed(2));
  return n.toLocaleString();
}
function platKey(p) { return ['tiktok','youtube','direct'].includes(p) ? p : 'default'; }
function platLabel(p) {
  if (p === 'tiktok')  return '♪ TikTok';
  if (p === 'youtube') return '▶ YouTube';
  if (p === 'direct')  return '💚 Direct';
  return '🎁 Gift';
}
function getTier(amount, type) {
  const n = Number(amount) || 0;
  if (type === 'tiktok_coins' || type === 'youtube_jewels') {
    if (n < 50)     return 0;
    if (n < 1000)   return 1;
    if (n < 5000)   return 2;
    if (n < 25000)  return 3;
    if (n < 100000) return 4;
    if (n < 250000) return 5;
    return 6;
  }
  if (n < 1)   return 0;
  if (n < 10)  return 1;
  if (n < 50)  return 2;
  if (n < 100) return 3;
  if (n < 250) return 4;
  if (n < 400) return 5;
  return 6;
}

/* ══ PARTICLES ══════════════════════════════════════════ */
const pCanvas = document.getElementById('particle-canvas');
const pCtx    = pCanvas.getContext('2d');
let   pList   = [];
let   pRaf    = null;

function emitParticles(tier, plat) {
  const cfg = TIER_CONFIG[tier];
  if (!cfg || cfg.particles === 0) return;
  const colors = PLAT_COLORS[plat].particles;
  for (let i = 0; i < cfg.particles; i++) {
    const fullCircle = tier >= 4;
    const angle = fullCircle
      ? Math.random() * Math.PI * 2
      : Math.PI * 0.25 + Math.random() * Math.PI * 0.5;
    const speed = (3 + Math.random() * tier * 3.4) * (0.55 + Math.random() * 0.9);
    pList.push({
      x: 480 + Math.random() * 120, y: 455 + Math.random() * 30,
      vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
      color: colors[Math.floor(Math.random() * colors.length)],
      size:  2.5 + Math.random() * tier * 1.7,
      life:  0.7 + Math.random() * 0.3,
      decay: 0.0028 + Math.random() * (0.006 / Math.max(tier, 1)),
      type: Math.random() < 0.55 ? 'rect' : 'circle',
      rot: Math.random() * Math.PI * 2, rotV: (Math.random() - 0.5) * 0.13,
    });
  }
  if (!pRaf) pTick();
}

function emitTier1Sparks(plat) {
  const colors = PLAT_COLORS[plat].particles;
  for (let i = 0; i < 18; i++) {
    const a = Math.random() * Math.PI * 2, sp = 1.5 + Math.random() * 3.5;
    pList.push({
      x: 100 + Math.random() * 880, y: 465 + Math.random() * 16,
      vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 1,
      color: colors[Math.floor(Math.random() * colors.length)],
      size: 1.8 + Math.random() * 2.5, life: 1,
      decay: 0.020 + Math.random() * 0.015,
      type: 'circle', rot: 0, rotV: 0,
    });
  }
  if (!pRaf) pTick();
}

function pTick() {
  pCtx.clearRect(0, 0, 1080, 1920);
  pList = pList.filter(p => p.life > 0.015);
  for (const p of pList) {
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.22; p.vx *= 0.992;
    p.life -= p.decay; p.rot += p.rotV;
    pCtx.save();
    pCtx.globalAlpha = Math.max(0, Math.min(1, p.life));
    pCtx.fillStyle   = p.color;
    pCtx.translate(p.x, p.y); pCtx.rotate(p.rot);
    if (p.type === 'rect') { pCtx.fillRect(-p.size*.5, -p.size, p.size, p.size*2); }
    else { pCtx.beginPath(); pCtx.arc(0,0,p.size/2,0,Math.PI*2); pCtx.fill(); }
    pCtx.restore();
  }
  pCtx.globalAlpha = 1;
  pRaf = pList.length ? requestAnimationFrame(pTick) : null;
}

function clearParticles() {
  pList = [];
  if (pRaf) { cancelAnimationFrame(pRaf); pRaf = null; }
  pCtx.clearRect(0, 0, 1080, 1920);
}

/* ══ SCREEN PULSE ════════════════════════════════════════ */
function triggerScreenPulse(plat, tier) {
  if (tier < 4) return;
  const pc = PLAT_COLORS[plat];
  const sp = document.getElementById('screen-pulse');
  const sz = (tier - 3) * 65;
  function pulse(delay) {
    setTimeout(() => {
      sp.style.boxShadow = `inset 0 0 ${sz}px ${sz*.55}px ${pc.pulse}`;
      sp.style.opacity   = '1';
      setTimeout(() => { sp.style.opacity = '0'; }, 700);
    }, delay);
  }
  pulse(0);
  if (tier >= 5) pulse(1300);
  if (tier >= 6) pulse(2500);
}

/* ══ PROGRESS LINE ═══════════════════════════════════════ */
function startProgress(durationMs) {
  if (progressAnim) { cancelAnimationFrame(progressAnim); progressAnim = null; }
  const bar = document.getElementById('bar-progress');
  const start = performance.now();
  bar.style.width = '0%';
  function tick(now) {
    const pct = Math.min(100, ((now - start) / durationMs) * 100);
    bar.style.width = pct + '%';
    progressAnim = pct < 100 ? requestAnimationFrame(tick) : null;
  }
  progressAnim = requestAnimationFrame(tick);
}

/* ══ BAR FRAME BUILDER ═══════════════════════════════════
   Left 2/3: giant name + amount (overflows bar height)
   Right 1/3: compact platform + slot label
══════════════════════════════════════════════════════════ */
function buildFrameHTML(slotDef, entry) {
  const plat = entry ? platKey(entry.platform) : 'default';
  const pc   = PLAT_COLORS[plat];
  const name = entry?.name ?? '—';
  const amt  = entry ? fmtAmount(entry.amount, entry.type) : '';

  return `
    <div class="bar-left">
      <span class="bar-name-big">${esc(name.toUpperCase())}</span>
      <span class="bar-amount-big" style="color:${pc.edge};text-shadow:0 0 28px ${pc.edge}55;">${esc(amt)}</span>
    </div>
    <div class="bar-right-info">
      <span class="bar-plat plat-${plat}">${esc(platLabel(entry?.platform))}</span>
      <span class="bar-slot-lbl">${esc(slotDef.label)}</span>
    </div>
  `;
}

/* ══ SHOW SLOT ═══════════════════════════════════════════ */
function showSlot(idx, overrideEntry, overrideLabel) {
  let slotDef, entry, doProgress = true;
  if (overrideEntry) {
    slotDef    = { key: 'alert', label: overrideLabel ?? 'JUST GIFTED' };
    entry      = overrideEntry;
    doProgress = false;
  } else {
    if (!activeSlots.length) return;
    currentIdx = ((idx % activeSlots.length) + activeSlots.length) % activeSlots.length;
    slotDef    = activeSlots[currentIdx];
    entry      = leaderboard[slotDef.key] ?? null;
  }

  const plat = entry ? platKey(entry.platform) : 'default';
  const pc   = PLAT_COLORS[plat];

  const nextKey = frameActive === 'a' ? 'b' : 'a';
  document.getElementById('frame-' + nextKey).innerHTML = buildFrameHTML(slotDef, entry);

  document.getElementById('bar-wash').style.background =
    `linear-gradient(180deg, ${pc.wash} 0%, rgba(5,0,14,0) 100%)`;
  document.getElementById('bar-edge-top').style.background =
    `linear-gradient(90deg, transparent 0%, ${pc.edge} 50%, transparent 100%)`;
  document.getElementById('bar-edge-bot').style.background =
    `linear-gradient(90deg, transparent 10%, ${pc.edge}88 50%, transparent 90%)`;
  document.getElementById('bar-progress').style.background = pc.edge;

  const sweep = document.getElementById('bar-sweep');
  sweep.style.background = `linear-gradient(90deg, transparent, ${pc.sweep}, transparent)`;
  sweep.classList.remove('flash');
  void sweep.offsetWidth;
  sweep.classList.add('flash');

  setTimeout(() => {
    document.getElementById('frame-' + nextKey).classList.add('active');
    document.getElementById('frame-' + frameActive).classList.remove('active');
    frameActive = nextKey;
  }, 90);

  if (doProgress) startProgress(CONFIG.ROTATE_MS);
}

/* ══ ROTATION ════════════════════════════════════════════ */
function startRotation() {
  stopRotation();
  if (!activeSlots.length) return;
  rotateTimer = setInterval(() => {
    if (!pinned && !alertActive) showSlot(currentIdx + 1);
  }, CONFIG.ROTATE_MS);
}
function stopRotation() {
  if (rotateTimer)  { clearInterval(rotateTimer); rotateTimer = null; }
  if (progressAnim) { cancelAnimationFrame(progressAnim); progressAnim = null; }
}

/* ══ GIFTR DATA HANDLER ══════════════════════════════════ */
function onGiftrData(data) {
  leaderboard = {};
  let hasAny  = false;
  SLOT_DEFS.forEach(def => {
    if (data[def.key]) { leaderboard[def.key] = data[def.key]; hasAny = true; }
  });
  const enabled = Array.isArray(data.enabledSlots)
    ? data.enabledSlots
    : ['daily','weekly','monthly','youtube','tiktok'];
  activeSlots = SLOT_DEFS.filter(d => {
    if (d.key === 'custom') return !!data.custom;
    return enabled.includes(d.key);
  });
  const bar = document.getElementById('giftr-bar');
  if (!hasAny || !activeSlots.length) {
    bar.classList.remove('visible'); stopRotation(); return;
  }
  bar.classList.add('visible');
  if (currentIdx >= activeSlots.length) currentIdx = 0;
  if (!alertActive) { showSlot(currentIdx); startRotation(); }
}

/* ══ GIFT ALERT SYSTEM ═══════════════════════════════════ */
function onGiftAlert(data) {
  const tier = getTier(data.amount, data.type);
  if (tier === 0) return;
  alertQueue.push({ ...data, tier });
  if (!alertActive) runNextAlert();
}

function runNextAlert() {
  if (!alertQueue.length) {
    alertActive = false;
    if (activeSlots.length) showSlot(currentIdx);
    startRotation(); return;
  }
  alertActive = true;
  showAlert(alertQueue.shift());
}

function showAlert(alert) {
  const { name, amount, type, platform, note, tier } = alert;
  const plat = platKey(platform);
  const pc   = PLAT_COLORS[plat];
  const cfg  = TIER_CONFIG[tier];

  stopRotation();
  clearTimeout(alertTimeout);
  clearTimeout(panelTimer);

  showSlot(currentIdx, { name, amount, type, platform: plat }, 'JUST GIFTED');

  if (tier === 1) {
    panelOpen = false;
    const shimmer = document.getElementById('tier1-shimmer');
    shimmer.classList.remove('active');
    void shimmer.offsetWidth;
    shimmer.classList.add('active');
    emitTier1Sparks(plat);
    alertTimeout = setTimeout(dismissAlert, cfg.duration);
    return;
  }

  panelOpen = true;
  const panel   = document.getElementById('gift-panel');
  const content = document.getElementById('panel-content');

  panel.dataset.tier     = String(tier);
  panel.dataset.platform = plat;

  document.getElementById('panel-stripe').style.background =
    `linear-gradient(90deg, transparent, ${pc.edge}, transparent)`;

  const badge = document.getElementById('panel-plat-badge');
  badge.className   = 'plat-' + plat;
  badge.textContent = platLabel(platform);

  document.getElementById('gift-name').textContent        = name.toUpperCase();
  document.getElementById('gift-amount').textContent      = fmtAmount(amount, type);
  document.getElementById('panel-tier-label').textContent = TIER_LABELS[tier] ?? '';
  document.getElementById('gift-divider').style.background =
    `linear-gradient(90deg, transparent, ${pc.edge}, transparent)`;

  const msgEl = document.getElementById('gift-message');
  if (note && type === 'youtube_superchat') {
    msgEl.textContent = note; msgEl.classList.add('show');
  } else {
    msgEl.textContent = ''; msgEl.classList.remove('show');
  }

  content.classList.remove('show');
  panel.className = 'show';
  panelTimer = setTimeout(() => content.classList.add('show'), 380);

  emitParticles(tier, plat);
  triggerScreenPulse(plat, tier);
  alertTimeout = setTimeout(dismissAlert, cfg.duration);
}

function dismissAlert() {
  clearTimeout(alertTimeout);
  clearTimeout(panelTimer);
  clearParticles();

  if (panelOpen) {
    panelOpen = false;
    const panel   = document.getElementById('gift-panel');
    const content = document.getElementById('panel-content');
    content.classList.remove('show');
    setTimeout(() => {
      panel.className = 'hide';
      let done = false;
      const cleanup = () => {
        if (done) return; done = true;
        panel.className = '';
        panel.dataset.tier = '';
        panel.dataset.platform = '';
        runNextAlert();
      };
      panel.addEventListener('animationend', cleanup, { once: true });
      setTimeout(cleanup, 550);
    }, 150);
  } else {
    runNextAlert();
  }
}

/* ══ GIFTR CMD ═══════════════════════════════════════════ */
function onGiftrCmd(data) {
  const cmd = String(data ?? '');
  if (cmd === 'auto') {
    pinned = false;
    if (!alertActive) startRotation();
  } else if (cmd.startsWith('slot:')) {
    const key = cmd.slice(5);
    const idx = activeSlots.findIndex(s => s.key === key);
    if (idx >= 0) { pinned = true; stopRotation(); showSlot(idx); }
  }
}

/* ══ ABLY ════════════════════════════════════════════════ */
(function initAbly() {
  try {
    const client  = new Ably.Realtime({ key: CONFIG.ABLY_KEY });
    const channel = client.channels.get(CONFIG.ABLY_CHANNEL);
    const dot     = document.getElementById('status-dot');
    function setDot(cls) { dot.className = cls; }
    client.connection.on('connected',    () => setDot('connected'));
    client.connection.on('disconnected', () => setDot(''));
    client.connection.on('connecting',   () => setDot('connecting'));
    client.connection.once('connected', () => {
      channel.publish('cmd', 'requestLeaderboard').catch(() => {});
    });
    channel.subscribe('giftr',      msg => onGiftrData(msg.data));
    channel.subscribe('gift-alert', msg => onGiftAlert(msg.data));
    channel.subscribe('giftr-cmd',  msg => onGiftrCmd(msg.data));
  } catch(e) { console.warn('[Ably] init failed:', e); }
})();
</script>
