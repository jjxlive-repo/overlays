<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Giftr — Top Gifters</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Bebas+Neue&family=DM+Sans:wght@700&display=swap" rel="stylesheet">
<script src="https://cdn.ably.com/lib/ably.min-2.js"></script>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 350px;
  height: 350px;
  overflow: hidden;
  background: transparent;
}

/* ── Glow ring ── */
#card-glow {
  position: absolute;
  inset: -3px;
  border-radius: 15px;
  background: var(--glow-grad, linear-gradient(135deg, #7B2FBE, #E879F9));
  transition: background 0.8s ease;
  animation: pulse 3s ease-in-out infinite;
  z-index: 0;
}
@keyframes pulse {
  0%, 100% { opacity: 1;    filter: blur(0);   }
  50%       { opacity: 0.5; filter: blur(3px); }
}

/* ── Card ── */
#card-wrap {
  position: relative;
  width: 350px;
  height: 350px;
}
#card {
  position: absolute;
  inset: 3px;
  border-radius: 12px;
  overflow: hidden;
  background: #05000e;
  z-index: 1;
}

/* ── Slot ── */
.slot {
  position: absolute;
  inset: 0;
  opacity: 0;
  transition: opacity 0.45s ease;
  will-change: opacity;
}
.slot.active { opacity: 1; }

/* Profile pic — full bleed blurred bg */
.slot-pic {
  position: absolute;
  inset: -8px;
  background-size: cover;
  background-position: center top;
  filter: blur(14px) brightness(0.5) saturate(1.3);
  z-index: 0;
}

/* Platform colour veil */
.slot-veil {
  position: absolute;
  inset: 0;
  z-index: 1;
}
.slot[data-platform="tiktok"]  .slot-veil {
  background: linear-gradient(150deg, rgba(105,201,208,0.15) 0%, rgba(238,29,82,0.08) 100%),
              linear-gradient(to bottom, rgba(0,0,0,0.35) 0%, rgba(0,0,0,0.65) 100%);
}
.slot[data-platform="youtube"] .slot-veil {
  background: linear-gradient(150deg, rgba(255,30,30,0.18) 0%, rgba(150,0,0,0.08) 100%),
              linear-gradient(to bottom, rgba(0,0,0,0.35) 0%, rgba(0,0,0,0.65) 100%);
}
.slot[data-platform="direct"]  .slot-veil,
.slot[data-platform="default"] .slot-veil {
  background: linear-gradient(150deg, rgba(168,85,247,0.15) 0%, rgba(232,121,249,0.07) 100%),
              linear-gradient(to bottom, rgba(0,0,0,0.35) 0%, rgba(0,0,0,0.65) 100%);
}

/* ── Content ── */
.slot-content {
  position: absolute;
  inset: 0;
  z-index: 2;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 14px 14px 34px; /* bottom room for dots */
  gap: 8px;
}

/* Position label — no icon, just text */
.slot-label {
  font-family: 'DM Sans', sans-serif;
  font-weight: 700;
  font-size: 30px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.92);
  text-align: center;
  text-shadow: 0 2px 12px rgba(0,0,0,0.95);
  line-height: 1;
}

/* Name — hero */
.slot-name {
  font-family: 'Anton', sans-serif;
  text-transform: uppercase;
  color: #ffffff;
  text-align: center;
  width: 100%;
  line-height: 0.9;
  letter-spacing: -1px;
  text-shadow: 0 3px 16px rgba(0,0,0,0.95), 3px 3px 0 rgba(0,0,0,0.4);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* Divider */
.slot-line {
  width: 80%;
  height: 2px;
  border-radius: 1px;
}
.slot[data-platform="tiktok"]  .slot-line { background: linear-gradient(90deg, transparent, #69C9D0 40%, #69C9D0 60%, transparent); }
.slot[data-platform="youtube"] .slot-line { background: linear-gradient(90deg, transparent, #FF5555 40%, #FF5555 60%, transparent); }
.slot[data-platform="direct"]  .slot-line,
.slot[data-platform="default"] .slot-line { background: linear-gradient(90deg, transparent, #C084FC 40%, #C084FC 60%, transparent); }

/* Amount */
.slot-amount {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 72px;
  letter-spacing: 4px;
  text-align: center;
  line-height: 1;
}
.slot[data-platform="tiktok"]  .slot-amount { color: #69C9D0; text-shadow: 0 0 24px rgba(105,201,208,0.5), 0 2px 8px rgba(0,0,0,0.9); }
.slot[data-platform="youtube"] .slot-amount { color: #FF6B6B; text-shadow: 0 0 24px rgba(255,80,80,0.5),   0 2px 8px rgba(0,0,0,0.9); }
.slot[data-platform="direct"]  .slot-amount,
.slot[data-platform="default"] .slot-amount { color: #C084FC; text-shadow: 0 0 24px rgba(192,132,252,0.5), 0 2px 8px rgba(0,0,0,0.9); }

/* ── Nav dots ── */
#nav-dots {
  position: absolute;
  bottom: 12px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  align-items: center;
  gap: 7px;
  z-index: 10;
}
.nav-dot {
  height: 8px;
  width: 8px;
  border-radius: 4px;
  background: rgba(255,255,255,0.2);
  transition: width 0.3s ease, background 0.3s ease;
}
.nav-dot.active {
  width: 26px;
  background: rgba(255,255,255,0.8);
}

/* ── Status dot ── */
#status-dot {
  position: absolute;
  top: 8px;
  right: 9px;
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: #444;
  z-index: 20;
  transition: background 0.3s;
}
#status-dot.connected  { background: #22c55e; box-shadow: 0 0 5px rgba(34,197,94,0.7); }
#status-dot.connecting { background: #eab308; }

/* ── No-data ── */
#no-data {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(5,0,14,0.9);
  border-radius: 12px;
  z-index: 30;
  transition: opacity 0.4s;
}
#no-data.hidden { opacity: 0; pointer-events: none; }
.no-data-text {
  font-family: 'DM Sans', sans-serif;
  font-weight: 700;
  font-size: 20px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.2);
}
</style>
</head>
<body>
<div id="card-wrap">
  <div id="card-glow"></div>

  <div id="card">
    <div id="slot-container"></div>

    <div id="nav-dots"><!-- built by JS --></div>

    <div id="no-data">
      <div class="no-data-text">Waiting for data</div>
    </div>
  </div>

  <div id="status-dot"></div>
</div>

<script>
/* ══ CONFIG ══════════════════════════════════════════════ */
const CONFIG = {
  ROTATE_MS:    5000,
  ABLY_KEY:     'Y8e-eA.l0VHlg:aJXsEfu1Be4BYsAeATRMI3w30YAKSs_LyF3DPoesIz0',
  ABLY_CHANNEL: 'splat-overlay',
};

// All possible slots — activeSlots is the live filtered subset
const SLOT_DEFS = [
  { key: 'daily',   label: 'Daily Top Gifter'   },
  { key: 'weekly',  label: 'Weekly Top Gifter'  },
  { key: 'monthly', label: 'Monthly Top Gifter' },
  { key: 'youtube', label: 'Top YouTube Gifter' },
  { key: 'tiktok',  label: 'Top TikTok Gifter'  },
  { key: 'custom',  label: 'Featured Gifter'    }, // only added when custom entry exists
];

const GLOW = {
  tiktok:  'linear-gradient(135deg, #69C9D0, #EE1D52)',
  youtube: 'linear-gradient(135deg, #FF2020, #FF8800)',
  direct:  'linear-gradient(135deg, #7B2FBE, #E879F9)',
  default: 'linear-gradient(135deg, #7B2FBE, #E879F9)',
};

/* ══ STATE ══════════════════════════════════════════════ */
let leaderboard  = {};
let activeSlots  = SLOT_DEFS.slice(0, 5); // default all standard slots
let currentIdx   = 0;
let rotateTimer  = null;
let pinned       = false;

// Canvas context for measuring Anton font width before render
let _ctx = null;
function canvasWidth(text, sizePx) {
  if (!_ctx) _ctx = Object.assign(document.createElement('canvas'),{width:1,height:1}).getContext('2d');
  _ctx.font = `${sizePx}px Anton`;
  return _ctx.measureText(text).width;
}

/* ══ HELPERS ════════════════════════════════════════════ */
function platformOf(e) {
  if (!e) return 'default';
  const p = (e.platform || '').toLowerCase();
  const t = (e.type     || '').toLowerCase();
  if (p === 'youtube' || t.startsWith('youtube')) return 'youtube';
  if (p === 'tiktok'  || t.startsWith('tiktok'))  return 'tiktok';
  if (p === 'direct'  || t === 'direct_donation') return 'direct';
  return 'default';
}

function fmtAmount(amount, type) {
  if (!amount) return '—';
  const n = Number(amount);
  if (type === 'tiktok_coins')   return n.toLocaleString() + ' COINS';
  if (type === 'youtube_jewels') return n.toLocaleString() + ' JEWELS';
  if (type === 'youtube_superchat' || type === 'direct_donation')
    return '$' + (Number.isInteger(n) ? n.toLocaleString() : n.toFixed(2));
  return n.toLocaleString();
}

// Find largest font size (px) where text fits within maxW pixels
const SIZE_STEPS = [130, 110, 90, 74, 60, 48, 38, 28, 20];
function bestFontSize(name, maxW) {
  const text = (name || '').toUpperCase();
  for (const sz of SIZE_STEPS) {
    if (canvasWidth(text, sz) <= maxW) return sz + 'px';
  }
  return '18px';
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ══ DOM FIT — shrinks any still-overflowing names after render ══ */
function fitNames() {
  requestAnimationFrame(() => {
    const cardW = document.getElementById('card').offsetWidth;
    const maxW  = cardW - 28; // 14px padding each side
    document.querySelectorAll('.slot-name').forEach(el => {
      // Walk size down until it fits
      let sz = parseInt(el.style.fontSize) || 60;
      while (el.scrollWidth > maxW && sz > 18) {
        sz -= 2;
        el.style.fontSize = sz + 'px';
      }
    });
  });
}

/* ══ NAV DOTS ═══════════════════════════════════════════ */
function rebuildDots() {
  const wrap = document.getElementById('nav-dots');
  wrap.innerHTML = '';
  activeSlots.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'nav-dot' + (i === currentIdx ? ' active' : '');
    wrap.appendChild(d);
  });
}

function updateDots() {
  document.querySelectorAll('.nav-dot').forEach((d, i) => d.classList.toggle('active', i === currentIdx));
}

/* ══ BUILD SLOTS ════════════════════════════════════════ */
function buildSlots() {
  const container = document.getElementById('slot-container');
  container.innerHTML = '';

  activeSlots.forEach((meta, i) => {
    const entry = leaderboard[meta.key] || null;
    const plat  = platformOf(entry);

    const slot = document.createElement('div');
    slot.className = 'slot' + (i === currentIdx ? ' active' : '');
    slot.dataset.platform = plat;

    const pic = document.createElement('div');
    pic.className = 'slot-pic';
    if (entry && entry.profilePic) {
      pic.style.backgroundImage = `url(${JSON.stringify(entry.profilePic)})`;
    } else {
      pic.style.filter = 'none';
      const fallback = { tiktok:'linear-gradient(145deg,#04090a,#0c001a)', youtube:'linear-gradient(145deg,#110000,#0e0003)', default:'linear-gradient(145deg,#080012,#0b001a)' };
      pic.style.background = fallback[plat] || fallback.default;
    }

    const veil = document.createElement('div');
    veil.className = 'slot-veil';

    const content = document.createElement('div');
    content.className = 'slot-content';

    const cardW = document.getElementById('card').offsetWidth || 344;
    const maxW  = cardW - 28;

    if (entry && entry.name) {
      content.innerHTML = `
        <div class="slot-label">${esc(meta.label)}</div>
        <div class="slot-name" style="font-size:${bestFontSize(entry.name, maxW)}">${esc(entry.name.toUpperCase())}</div>
        <div class="slot-line"></div>
        <div class="slot-amount">${fmtAmount(entry.amount, entry.type)}</div>
      `;
    } else {
      content.innerHTML = `
        <div class="slot-label" style="opacity:0.3">${esc(meta.label)}</div>
        <div class="slot-name" style="font-size:60px;opacity:0.15">— —</div>
      `;
    }

    slot.appendChild(pic);
    slot.appendChild(veil);
    slot.appendChild(content);
    container.appendChild(slot);
  });

  // DOM correction pass after render
  fitNames();
}

/* ══ ROTATION ═══════════════════════════════════════════ */
function updateGlow() {
  const meta  = activeSlots[currentIdx];
  const entry = meta ? leaderboard[meta.key] : null;
  document.getElementById('card-glow').style.background = GLOW[platformOf(entry)] || GLOW.default;
}

function showSlot(idx) {
  // Clamp to valid range
  if (idx >= activeSlots.length) idx = 0;
  document.querySelectorAll('.slot').forEach((s, i) => s.classList.toggle('active', i === idx));
  currentIdx = idx;
  updateDots();
  updateGlow();
}

function startRotation() {
  clearInterval(rotateTimer);
  pinned = false;
  rotateTimer = setInterval(() => showSlot((currentIdx + 1) % activeSlots.length), CONFIG.ROTATE_MS);
}

function pinSlot(key) {
  const idx = activeSlots.findIndex(s => s.key === key);
  if (idx === -1) return;
  clearInterval(rotateTimer);
  rotateTimer = null;
  pinned = true;
  showSlot(idx);
}

/* ══ DATA ═══════════════════════════════════════════════ */
function onGiftrData(data) {
  leaderboard = data || {};

  // Rebuild active slot list from enabledSlots + optional custom
  const enabled = Array.isArray(data.enabledSlots)
    ? data.enabledSlots
    : ['daily','weekly','monthly','youtube','tiktok'];

  activeSlots = SLOT_DEFS.filter(d => d.key !== 'custom' && enabled.includes(d.key));
  if (data.custom && data.custom.name) {
    // Inject custom entry into leaderboard and add slot def
    leaderboard['custom'] = data.custom;
    activeSlots.push({ key: 'custom', label: 'Featured Gifter' });
  }

  const hasAny = activeSlots.some(m => leaderboard[m.key] && leaderboard[m.key].name);
  document.getElementById('no-data').classList.toggle('hidden', hasAny);

  // Keep currentIdx in bounds
  if (currentIdx >= activeSlots.length) currentIdx = 0;

  rebuildDots();
  buildSlots();
  showSlot(currentIdx);
  if (hasAny && !pinned && !rotateTimer) startRotation();
}

/* ══ ABLY ═══════════════════════════════════════════════ */
function setStatus(cls) { document.getElementById('status-dot').className = cls; }

const ably = new Ably.Realtime({ key: CONFIG.ABLY_KEY });
const ch   = ably.channels.get(CONFIG.ABLY_CHANNEL);

ably.connection.on('connected', () => {
  setStatus('connected');
  ch.publish('cmd', 'requestLeaderboard').catch(() => {});
});
ably.connection.on('disconnected', () => setStatus('connecting'));
ably.connection.on('connecting',   () => setStatus('connecting'));
ably.connection.on('failed',       () => setStatus(''));

ch.subscribe('giftr', msg => onGiftrData(msg.data));

ch.subscribe('giftr-cmd', msg => {
  const cmd = (msg.data || '').toString();
  if (cmd === 'auto') {
    if (activeSlots.length) startRotation();
  } else if (cmd.startsWith('slot:')) {
    pinSlot(cmd.slice(5));
  }
});
</script>
</body>
</html>
