<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Giftr Bar</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Bebas+Neue&family=DM+Sans:wght@700&display=swap" rel="stylesheet">
<script src="https://cdn.ably.com/lib/ably.min-2.js"></script>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 1080px;
  height: 1920px;
  overflow: hidden;
  background: transparent;
}

/* ─────────────── BAR ─────────────── */
#giftr-bar {
  position: absolute;
  top: 450px;
  left: 0;
  width: 1080px;
  height: 50px;
  overflow: hidden;
  opacity: 0;
  transition: opacity 0.6s ease;
}
#giftr-bar.visible { opacity: 1; }

/* Dark glass background */
#bar-bg {
  position: absolute;
  inset: 0;
  background: rgba(5, 0, 14, 0.86);
  z-index: 0;
}

/* Platform colour wash — fades between platforms */
#bar-wash {
  position: absolute;
  inset: 0;
  transition: background 1s ease;
  z-index: 1;
  pointer-events: none;
}

/* Top & bottom edge accent lines */
#bar-edge-top, #bar-edge-bot {
  position: absolute;
  left: 0; right: 0;
  height: 1px;
  transition: background 1s ease;
  z-index: 4;
  pointer-events: none;
}
#bar-edge-top { top: 0; }
#bar-edge-bot { bottom: 2px; } /* 2px above progress line */

/* Sweep flash on every slot transition */
#bar-sweep {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 6;
  opacity: 0;
  will-change: transform, opacity;
}
#bar-sweep.flash {
  animation: barSweep 0.55s ease-in-out forwards;
}
@keyframes barSweep {
  0%   { opacity: 0;   transform: translateX(-110%); }
  35%  { opacity: 1;                                 }
  100% { opacity: 0;   transform: translateX(110%);  }
}

/* Progress line — fills across bottom over ROTATE_MS */
#bar-progress {
  position: absolute;
  bottom: 0; left: 0;
  height: 2px;
  width: 0%;
  transition: background 1s ease;
  z-index: 5;
  border-radius: 0 1px 1px 0;
}

/* ─────────────── CONTENT FRAMES ─────────────── */
/* Two frames — crossfade between them */
.bar-frame {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  padding: 0 56px 0 14px; /* right pad leaves room for dots */
  gap: 0;
  z-index: 3;
  opacity: 0;
  transition: opacity 0.42s ease;
  pointer-events: none;
}
.bar-frame.active { opacity: 1; }

/* Left accent strip — platform colour */
.bar-accent {
  width: 3px;
  height: 28px;
  border-radius: 2px;
  flex-shrink: 0;
  margin-right: 12px;
}

/* Platform badge pill */
.bar-plat {
  font-family: 'DM Sans', sans-serif;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 2px 8px;
  border-radius: 4px;
  flex-shrink: 0;
  margin-right: 10px;
  white-space: nowrap;
  line-height: 18px;
}
.plat-tiktok  { color: #69C9D0; background: rgba(105,201,208,0.16); border: 1px solid rgba(105,201,208,0.30); }
.plat-youtube { color: #FF6B6B; background: rgba(255, 80, 80,0.16); border: 1px solid rgba(255, 80, 80,0.30); }
.plat-direct,
.plat-default { color: #C084FC; background: rgba(192,132,252,0.16); border: 1px solid rgba(192,132,252,0.30); }

/* Vertical separator */
.bar-sep {
  width: 1px;
  height: 22px;
  background: rgba(255,255,255,0.12);
  flex-shrink: 0;
  margin: 0 12px;
}

/* Slot label */
.bar-label {
  font-family: 'DM Sans', sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.42);
  flex-shrink: 0;
  white-space: nowrap;
}

/* Name — hero */
.bar-name {
  font-family: 'Anton', sans-serif;
  font-size: 26px;
  text-transform: uppercase;
  color: #ffffff;
  letter-spacing: 2px;
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  text-shadow: 0 2px 10px rgba(0,0,0,0.8);
  min-width: 0;
}

/* Amount */
.bar-amount {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 23px;
  letter-spacing: 3px;
  flex-shrink: 0;
  margin-left: 12px;
  white-space: nowrap;
}
.amt-tiktok  { color: #69C9D0; text-shadow: 0 0 18px rgba(105,201,208,0.55); }
.amt-youtube { color: #FF6B6B; text-shadow: 0 0 18px rgba(255, 80, 80,0.55); }
.amt-direct,
.amt-default { color: #C084FC; text-shadow: 0 0 18px rgba(192,132,252,0.55); }

/* ─────────────── NAV DOTS ─────────────── */
#bar-dots {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  display: flex;
  align-items: center;
  gap: 5px;
  z-index: 10;
}
.bar-dot {
  height: 5px;
  width: 5px;
  border-radius: 3px;
  background: rgba(255,255,255,0.18);
  transition: width 0.3s ease, background 0.3s ease;
  flex-shrink: 0;
}
.bar-dot.active {
  width: 16px;
  background: rgba(255,255,255,0.72);
}

/* ─────────────── STATUS DOT ─────────────── */
#status-dot {
  position: absolute;
  top: 454px; /* 4px inside bar top */
  left: 6px;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #444;
  z-index: 30;
  transition: background 0.3s;
}
#status-dot.connected  { background: #22c55e; box-shadow: 0 0 5px rgba(34,197,94,0.7); }
#status-dot.connecting { background: #eab308; }
</style>
</head>
<body>

<div id="giftr-bar">
  <div id="bar-bg"></div>
  <div id="bar-wash"></div>
  <div id="bar-edge-top"></div>
  <div id="bar-edge-bot"></div>
  <div id="bar-sweep"></div>

  <!-- Two frames that crossfade -->
  <div class="bar-frame" id="frame-a"></div>
  <div class="bar-frame" id="frame-b"></div>

  <div id="bar-dots"></div>
  <div id="bar-progress"></div>
</div>

<div id="status-dot"></div>

<script>
/* ══ CONFIG ══════════════════════════════════════════════ */
const CONFIG = {
  ROTATE_MS:    5000,
  ABLY_KEY:     'Y8e-eA.l0VHlg:aJXsEfu1Be4BYsAeATRMI3w30YAKSs_LyF3DPoesIz0',
  ABLY_CHANNEL: 'splat-overlay',
};

const SLOT_DEFS = [
  { key: 'daily',   label: 'Daily Top Gifter'   },
  { key: 'weekly',  label: 'Weekly Top Gifter'  },
  { key: 'monthly', label: 'Monthly Top Gifter' },
  { key: 'youtube', label: 'Top YouTube Gifter' },
  { key: 'tiktok',  label: 'Top TikTok Gifter'  },
  { key: 'custom',  label: 'Featured Gifter'    },
];

const PLAT_COLORS = {
  tiktok:  { wash: 'rgba(105,201,208,0.07)', edge: '#69C9D0', sweep: 'rgba(105,201,208,0.22)' },
  youtube: { wash: 'rgba(255, 80, 80,0.07)', edge: '#FF6B6B', sweep: 'rgba(255, 80, 80,0.22)' },
  direct:  { wash: 'rgba(192,132,252,0.07)', edge: '#C084FC', sweep: 'rgba(192,132,252,0.22)' },
  default: { wash: 'rgba(192,132,252,0.07)', edge: '#C084FC', sweep: 'rgba(192,132,252,0.22)' },
};

/* ══ STATE ══════════════════════════════════════════════ */
let leaderboard  = {};
let activeSlots  = SLOT_DEFS.slice(0, 5);
let currentIdx   = 0;
let rotateTimer  = null;
let progressAnim = null;
let pinned       = false;
let frameActive  = 'a';

/* ══ UTILS ══════════════════════════════════════════════ */
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtAmount(amount, type) {
  const n = Number(amount) || 0;
  if (type === 'tiktok_coins')      return n.toLocaleString() + ' COINS';
  if (type === 'youtube_jewels')    return n.toLocaleString() + ' JEWELS';
  if (type === 'youtube_superchat') return '$' + (Number.isInteger(n) ? n.toLocaleString() : n.toFixed(2));
  if (type === 'direct_donation')   return '$' + (Number.isInteger(n) ? n.toLocaleString() : n.toFixed(2));
  return n.toLocaleString();
}

function platKey(platform) {
  return ['tiktok','youtube','direct'].includes(platform) ? platform : 'default';
}

function platLabel(platform) {
  if (platform === 'tiktok')  return 'TikTok';
  if (platform === 'youtube') return 'YouTube';
  if (platform === 'direct')  return 'Direct';
  return 'Gift';
}

/* ══ PROGRESS LINE ══════════════════════════════════════ */
function startProgress(durationMs) {
  if (progressAnim) { cancelAnimationFrame(progressAnim); progressAnim = null; }
  const bar   = document.getElementById('bar-progress');
  const start = performance.now();
  bar.style.width = '0%';

  function tick(now) {
    const pct = Math.min(100, ((now - start) / durationMs) * 100);
    bar.style.width = pct + '%';
    if (pct < 100) progressAnim = requestAnimationFrame(tick);
    else progressAnim = null;
  }
  progressAnim = requestAnimationFrame(tick);
}

/* ══ FRAME CONTENT ══════════════════════════════════════ */
function buildFrameHTML(slotDef, entry) {
  const plat     = entry ? platKey(entry.platform) : 'default';
  const pc       = PLAT_COLORS[plat];
  const platLbl  = entry ? platLabel(entry.platform) : '';
  const name     = entry?.name ?? '—';
  const amt      = entry ? fmtAmount(entry.amount, entry.type) : '';

  return `
    <div class="bar-accent" style="background:${pc.edge}"></div>
    <span class="bar-plat plat-${plat}">${esc(platLbl)}</span>
    <div class="bar-sep"></div>
    <span class="bar-label">${esc(slotDef.label)}</span>
    <div class="bar-sep"></div>
    <span class="bar-name">${esc(name.toUpperCase())}</span>
    <div class="bar-sep"></div>
    <span class="bar-amount amt-${plat}">${esc(amt)}</span>
  `;
}

/* ══ SHOW SLOT ══════════════════════════════════════════ */
function showSlot(idx) {
  if (!activeSlots.length) return;
  currentIdx = ((idx % activeSlots.length) + activeSlots.length) % activeSlots.length;

  const slotDef   = activeSlots[currentIdx];
  const entry     = leaderboard[slotDef.key] ?? null;
  const plat      = entry ? platKey(entry.platform) : 'default';
  const pc        = PLAT_COLORS[plat];

  // Fill the inactive frame
  const nextKey = frameActive === 'a' ? 'b' : 'a';
  document.getElementById('frame-' + nextKey).innerHTML = buildFrameHTML(slotDef, entry);

  // Platform visuals
  document.getElementById('bar-wash').style.background =
    `linear-gradient(180deg, ${pc.wash} 0%, rgba(5,0,14,0) 100%)`;
  document.getElementById('bar-edge-top').style.background =
    `linear-gradient(90deg, transparent 0%, ${pc.edge} 50%, transparent 100%)`;
  document.getElementById('bar-edge-bot').style.background =
    `linear-gradient(90deg, transparent 10%, ${pc.edge}88 50%, transparent 90%)`;
  document.getElementById('bar-progress').style.background = pc.edge;

  // Sweep flash
  const sweep = document.getElementById('bar-sweep');
  sweep.style.background = `linear-gradient(90deg, transparent, ${pc.sweep}, transparent)`;
  sweep.classList.remove('flash');
  void sweep.offsetWidth; // force reflow
  sweep.classList.add('flash');

  // Crossfade after brief delay so sweep leads the content change
  setTimeout(() => {
    document.getElementById('frame-' + nextKey).classList.add('active');
    document.getElementById('frame-' + frameActive).classList.remove('active');
    frameActive = nextKey;
  }, 90);

  updateDots();
  startProgress(CONFIG.ROTATE_MS);
}

/* ══ DOTS ══════════════════════════════════════════════ */
function updateDots() {
  document.getElementById('bar-dots').innerHTML = activeSlots
    .map((_, i) => `<div class="bar-dot${i === currentIdx ? ' active' : ''}"></div>`)
    .join('');
}

/* ══ ROTATION ══════════════════════════════════════════ */
function startRotation() {
  stopRotation();
  if (!activeSlots.length) return;
  rotateTimer = setInterval(() => {
    if (!pinned) showSlot(currentIdx + 1);
  }, CONFIG.ROTATE_MS);
}

function stopRotation() {
  if (rotateTimer)  { clearInterval(rotateTimer); rotateTimer = null; }
  if (progressAnim) { cancelAnimationFrame(progressAnim); progressAnim = null; }
}

/* ══ DATA HANDLER ══════════════════════════════════════ */
function onGiftrData(data) {
  leaderboard = {};
  let hasAny  = false;

  SLOT_DEFS.forEach(def => {
    if (data[def.key]) { leaderboard[def.key] = data[def.key]; hasAny = true; }
  });

  const enabled = Array.isArray(data.enabledSlots)
    ? data.enabledSlots
    : ['daily','weekly','monthly','youtube','tiktok'];

  activeSlots = SLOT_DEFS.filter(d => {
    if (d.key === 'custom') return !!data.custom;
    return enabled.includes(d.key);
  });

  const bar = document.getElementById('giftr-bar');

  if (!hasAny || !activeSlots.length) {
    bar.classList.remove('visible');
    stopRotation();
    return;
  }

  bar.classList.add('visible');
  if (currentIdx >= activeSlots.length) currentIdx = 0;
  showSlot(currentIdx);
  startRotation();
}

/* ══ ABLY ══════════════════════════════════════════════ */
(function initAbly() {
  try {
    const client  = new Ably.Realtime({ key: CONFIG.ABLY_KEY });
    const channel = client.channels.get(CONFIG.ABLY_CHANNEL);
    const dot     = document.getElementById('status-dot');

    function setDot(cls) { dot.className = cls; }
    client.connection.on('connected',    () => setDot('connected'));
    client.connection.on('disconnected', () => setDot(''));
    client.connection.on('connecting',   () => setDot('connecting'));

    // Request fresh data on connect
    client.connection.once('connected', () => {
      channel.publish('cmd', 'requestLeaderboard').catch(() => {});
    });

    channel.subscribe('giftr', msg => onGiftrData(msg.data));

    channel.subscribe('giftr-cmd', msg => {
      const cmd = String(msg.data ?? '');
      if (cmd === 'auto') {
        pinned = false;
        startRotation();
      } else if (cmd.startsWith('slot:')) {
        const key = cmd.slice(5);
        const idx = activeSlots.findIndex(s => s.key === key);
        if (idx >= 0) {
          pinned = true;
          stopRotation();
          showSlot(idx);
        }
      }
    });

  } catch(e) {
    console.warn('[Ably] init failed:', e);
  }
})();
</script>
</body>
</html>
