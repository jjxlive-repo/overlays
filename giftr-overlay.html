<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Giftr — Top Gifters Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Bebas+Neue&family=DM+Sans:wght@500;700&display=swap" rel="stylesheet">
<script src="https://cdn.ably.com/lib/ably.min-2.js"></script>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 800px;
  height: 800px;
  overflow: hidden;
  background: transparent;
}

#scene {
  width: 800px;
  height: 800px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

/* ─── Outer glow border ring ─── */
#card-glow {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 800px;
  height: 800px;
  border-radius: 44px;
  background: var(--glow-grad, linear-gradient(135deg, #7B2FBE 0%, #E879F9 100%));
  transition: background 0.9s ease;
  animation: pulse-border 3s ease-in-out infinite;
  z-index: 0;
}
@keyframes pulse-border {
  0%, 100% { opacity: 1;   filter: blur(0px);  }
  50%       { opacity: 0.6; filter: blur(3px);  }
}

/* ─── Card ─── */
#card {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 900px;
  height: 900px;
  border-radius: 36px;
  overflow: hidden;
  background: #05000e;
  z-index: 1;
}

/* ─── Slot base ─── */
.slot {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 56px 68px 108px;
  opacity: 0;
  transition: opacity 0.55s ease;
  will-change: opacity;
}
.slot.active { opacity: 1; }

/* ─── Slot backgrounds (platform-specific) ─── */
.slot-bg {
  position: absolute;
  inset: 0;
  z-index: 0;
}
.slot[data-platform="tiktok"] .slot-bg {
  background:
    radial-gradient(ellipse 70% 55% at 50% 38%, rgba(105,201,208,0.14) 0%, transparent 70%),
    radial-gradient(ellipse 50% 40% at 82% 78%, rgba(238,29,82,0.09) 0%, transparent 60%),
    linear-gradient(155deg, #04090a 0%, #060010 45%, #080004 100%);
}
.slot[data-platform="youtube"] .slot-bg {
  background:
    radial-gradient(ellipse 70% 55% at 50% 38%, rgba(255,40,40,0.16) 0%, transparent 70%),
    radial-gradient(ellipse 40% 35% at 18% 78%, rgba(255,100,0,0.07) 0%, transparent 60%),
    linear-gradient(155deg, #110000 0%, #0e0003 45%, #060000 100%);
}
.slot[data-platform="direct"] .slot-bg,
.slot[data-platform="default"] .slot-bg {
  background:
    radial-gradient(ellipse 70% 55% at 50% 38%, rgba(168,85,247,0.14) 0%, transparent 70%),
    radial-gradient(ellipse 40% 35% at 82% 78%, rgba(232,121,249,0.07) 0%, transparent 60%),
    linear-gradient(155deg, #080012 0%, #0b001a 45%, #050010 100%);
}

/* subtle dot grid */
.slot-grid {
  position: absolute;
  inset: 0;
  z-index: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.018) 1px, transparent 1px);
  background-size: 44px 44px;
}

/* ─── Content layer ─── */
.slot-content {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 100%;
}

/* Category row */
.slot-cat-row {
  display: flex;
  align-items: center;
  gap: 18px;
  width: 100%;
  margin-bottom: 38px;
}
.slot-cat-line {
  flex: 1;
  height: 1px;
  background: rgba(255,255,255,0.12);
}
.slot-cat-label {
  font-family: 'DM Sans', sans-serif;
  font-weight: 1000;
  font-size: 36px;
  letter-spacing: 11px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.5);
  white-space: nowrap;
  text-shadow: 0 1px 12px rgba(0,0,0,0.9);
}

/* Big floating icon */
.slot-icon {
  font-size: 60px;
  margin-bottom: 22px;
  filter: drop-shadow(0 0 22px rgba(255,255,255,0.25));
  animation: icon-float 4.5s ease-in-out infinite;
}
@keyframes icon-float {
  0%, 100% { transform: translateY(0px);  }
  50%       { transform: translateY(-8px); }
}

/* Platform badge */
.slot-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 5px 20px;
  border-radius: 100px;
  font-family: 'DM Sans', sans-serif;
  font-weight: 700;
  font-size: 26px;
  letter-spacing: 7px;
  text-transform: uppercase;
  margin-bottom: 30px;
}
.slot[data-platform="tiktok"] .slot-badge {
  background: rgba(105,201,208,0.1);
  border: 1px solid rgba(105,201,208,0.35);
  color: #69C9D0;
}
.slot[data-platform="youtube"] .slot-badge {
  background: rgba(255,40,40,0.1);
  border: 1px solid rgba(255,80,80,0.35);
  color: #FF6B6B;
}
.slot[data-platform="direct"] .slot-badge,
.slot[data-platform="default"] .slot-badge {
  background: rgba(168,85,247,0.1);
  border: 1px solid rgba(168,85,247,0.35);
  color: #C084FC;
}

/* Name — chunky, readable */
.slot-name {
  font-family: 'Anton', sans-serif;
  font-size: 100px; /* overridden by JS for long names */
  text-transform: uppercase;
  color: #ffffff;
  text-align: center;
  width: 100%;
  line-height: 0.92;
  letter-spacing: -1px;
  text-shadow:
    0 0 80px rgba(255,255,255,0.12),
    0 3px 28px rgba(0,0,0,0.95),
    4px 4px 0 rgba(0,0,0,0.45);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  margin-bottom: 30px;
}

/* Divider */
.slot-divider {
  display: flex;
  align-items: center;
  gap: 18px;
  width: 100%;
  margin-bottom: 26px;
}
.slot-div-line {
  flex: 1;
  height: 1.5px;
}
.slot[data-platform="tiktok"]  .slot-div-line { background: linear-gradient(90deg, transparent, rgba(105,201,208,0.45), transparent); }
.slot[data-platform="youtube"] .slot-div-line { background: linear-gradient(90deg, transparent, rgba(255,80,80,0.45),   transparent); }
.slot[data-platform="direct"]  .slot-div-line,
.slot[data-platform="default"] .slot-div-line { background: linear-gradient(90deg, transparent, rgba(168,85,247,0.45), transparent); }

.slot-div-gem { font-size: 14px; opacity: 0.6; }

/* Amount */
.slot-amount {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 70px;
  letter-spacing: 7px;
  text-align: center;
  line-height: 1;
}
.slot[data-platform="tiktok"]  .slot-amount {
  color: #69C9D0;
  text-shadow: 0 0 50px rgba(105,201,208,0.45), 0 2px 12px rgba(0,0,0,0.9);
}
.slot[data-platform="youtube"] .slot-amount {
  color: #FF6B6B;
  text-shadow: 0 0 50px rgba(255,80,80,0.45),   0 2px 12px rgba(0,0,0,0.9);
}
.slot[data-platform="direct"]  .slot-amount,
.slot[data-platform="default"] .slot-amount {
  color: #C084FC;
  text-shadow: 0 0 50px rgba(168,85,247,0.45),  0 2px 12px rgba(0,0,0,0.9);
}

/* ─── Nav dots (pill style) ─── */
#nav-dots {
  position: absolute;
  bottom: 42px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  align-items: center;
  gap: 12px;
  z-index: 10;
}
.nav-dot {
  height: 8px;
  width: 8px;
  border-radius: 4px;
  background: rgba(255,255,255,0.18);
  transition: width 0.35s ease, background 0.35s ease;
}
.nav-dot.active {
  width: 32px;
  background: rgba(255,255,255,0.82);
}

/* ─── No-data screen ─── */
#no-data {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 18px;
  background: rgba(5,0,14,0.88);
  border-radius: 36px;
  z-index: 20;
  transition: opacity 0.5s ease;
}
#no-data.hidden { opacity: 0; pointer-events: none; }
.no-data-icon { font-size: 60px; }
.no-data-text {
  font-family: 'DM Sans', sans-serif;
  font-weight: 700;
  font-size: 18px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.25);
}

/* ─── Status dot ─── */
#status-dot {
  position: absolute;
  top: 18px;
  right: 18px;
  width: 13px;
  height: 13px;
  border-radius: 50%;
  background: #444;
  z-index: 200;
  transition: background 0.3s, box-shadow 0.3s;
}
#status-dot.connected    { background: #22c55e; box-shadow: 0 0 8px rgba(34,197,94,0.6); }
#status-dot.connecting   { background: #eab308; }
</style>
</head>
<body>
<div id="scene">
  <!-- Glow ring behind card -->
  <div id="card-glow"></div>

  <!-- Main card -->
  <div id="card">
    <div id="slot-container"><!-- filled by JS --></div>

    <div id="nav-dots">
      <div class="nav-dot active"></div>
      <div class="nav-dot"></div>
      <div class="nav-dot"></div>
      <div class="nav-dot"></div>
      <div class="nav-dot"></div>
    </div>

    <div id="no-data">
      <div class="no-data-icon">⏳</div>
      <div class="no-data-text">Waiting for data</div>
    </div>
  </div>

  <div id="status-dot"></div>
</div>

<script>
/* ══════════════════════════════════════════
   CONFIG — edit here if needed
══════════════════════════════════════════ */
const CONFIG = {
  ROTATE_MS:    5000,   // ms between slot rotations
  ABLY_KEY:     'Y8e-eA.l0VHlg:aJXsEfu1Be4BYsAeATRMI3w30YAKSs_LyF3DPoesIz0',
  ABLY_CHANNEL: 'splat-overlay',
};

/* ── Slot metadata ── */
const SLOTS = [
  { key: 'daily',   label: 'Daily Top Gifter',   icon: '🌟' },
  { key: 'weekly',  label: 'Weekly Top Gifter',  icon: '📅' },
  { key: 'monthly', label: 'Monthly Top Gifter', icon: '🏆' },
  { key: 'youtube', label: 'Top YouTube Gifter', icon: '▶' },
  { key: 'tiktok',  label: 'Top TikTok Gifter',  icon: '♪' },
];

/* ── Glow gradients per platform ── */
const GLOW = {
  tiktok:  'linear-gradient(135deg, #69C9D0 0%, #EE1D52 100%)',
  youtube: 'linear-gradient(135deg, #FF2222 0%, #FF8C00 100%)',
  direct:  'linear-gradient(135deg, #7B2FBE 0%, #E879F9 100%)',
  default: 'linear-gradient(135deg, #7B2FBE 0%, #E879F9 100%)',
};

/* ── State ── */
let leaderboard = {};
let currentIdx  = 0;
let rotateTimer = null;

/* ════════════════════════════════════════
   HELPERS
════════════════════════════════════════ */
function platformOf(entry) {
  if (!entry) return 'default';
  const p = (entry.platform || '').toLowerCase();
  const t = (entry.type     || '').toLowerCase();
  if (p === 'youtube' || t.startsWith('youtube')) return 'youtube';
  if (p === 'tiktok'  || t.startsWith('tiktok'))  return 'tiktok';
  if (p === 'direct'  || t === 'direct_donation') return 'direct';
  return 'default';
}

function badgeText(plat) {
  const map = { tiktok: '♪  TikTok', youtube: '▶  YouTube', direct: '✦  Direct', default: '✦  Gift' };
  return map[plat] || map.default;
}

function fmtAmount(amount, type) {
  if (!amount) return '—';
  const n = Number(amount);
  if (type === 'tiktok_coins')    return n.toLocaleString() + ' COINS';
  if (type === 'youtube_jewels')  return n.toLocaleString() + ' JEWELS';
  if (type === 'youtube_superchat' || type === 'direct_donation') {
    return '$' + (Number.isInteger(n) ? n.toLocaleString() : n.toFixed(2));
  }
  return n.toLocaleString();
}

function nameFontSize(name) {
  const l = (name || '').length;
  if (l <= 7)  return '104px';
  if (l <= 10) return '88px';
  if (l <= 13) return '72px';
  if (l <= 17) return '58px';
  return '46px';
}

function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

/* ════════════════════════════════════════
   SLOT BUILDING
════════════════════════════════════════ */
function buildSlots() {
  const container = document.getElementById('slot-container');
  container.innerHTML = '';

  SLOTS.forEach((meta, i) => {
    const entry = leaderboard[meta.key] || null;
    const plat  = platformOf(entry);

    const slot = document.createElement('div');
    slot.className      = 'slot' + (i === currentIdx ? ' active' : '');
    slot.dataset.platform = plat;

    if (entry && entry.name) {
      slot.innerHTML = `
        <div class="slot-bg"></div>
        <div class="slot-grid"></div>
        <div class="slot-content">
          <div class="slot-cat-row">
            <div class="slot-cat-line"></div>
            <div class="slot-cat-label">${esc(meta.label)}</div>
            <div class="slot-cat-line"></div>
          </div>
          <div class="slot-icon">${meta.icon}</div>
          <div class="slot-badge">${badgeText(plat)}</div>
          <div class="slot-name" style="font-size:${nameFontSize(entry.name)}">${esc(entry.name.toUpperCase())}</div>
          <div class="slot-divider">
            <div class="slot-div-line"></div>
            <span class="slot-div-gem">◆</span>
            <div class="slot-div-line"></div>
          </div>
          <div class="slot-amount">${fmtAmount(entry.amount, entry.type)}</div>
        </div>
      `;
    } else {
      slot.innerHTML = `
        <div class="slot-bg"></div>
        <div class="slot-grid"></div>
        <div class="slot-content">
          <div class="slot-cat-row">
            <div class="slot-cat-line"></div>
            <div class="slot-cat-label">${esc(meta.label)}</div>
            <div class="slot-cat-line"></div>
          </div>
          <div class="slot-icon" style="opacity:0.25">${meta.icon}</div>
          <div class="slot-name" style="font-size:44px;opacity:0.18">— —</div>
        </div>
      `;
    }

    container.appendChild(slot);
  });
}

/* ════════════════════════════════════════
   ROTATION
════════════════════════════════════════ */
function updateDots() {
  document.querySelectorAll('.nav-dot').forEach((d, i) => {
    d.classList.toggle('active', i === currentIdx);
  });
}

function updateGlow() {
  const entry = leaderboard[SLOTS[currentIdx].key];
  const plat  = platformOf(entry);
  document.getElementById('card-glow').style.background = GLOW[plat] || GLOW.default;
}

function showSlot(idx) {
  const slots = document.querySelectorAll('.slot');
  slots.forEach((s, i) => s.classList.toggle('active', i === idx));
  currentIdx = idx;
  updateDots();
  updateGlow();
}

function nextSlot() {
  showSlot((currentIdx + 1) % SLOTS.length);
}

let pinned = false; // true = manual slot pinned, auto-rotation paused

function startRotation() {
  clearInterval(rotateTimer);
  pinned = false;
  rotateTimer = setInterval(nextSlot, CONFIG.ROTATE_MS);
}

function pinSlot(key) {
  const idx = SLOTS.findIndex(s => s.key === key);
  if (idx === -1) return;
  clearInterval(rotateTimer);
  rotateTimer = null;
  pinned = true;
  showSlot(idx);
}

/* ════════════════════════════════════════
   DATA
════════════════════════════════════════ */
function onGiftrData(data) {
  leaderboard = data || {};
  const hasAny = SLOTS.some(m => leaderboard[m.key] && leaderboard[m.key].name);
  const noData = document.getElementById('no-data');
  noData.classList.toggle('hidden', hasAny);

  buildSlots();
  showSlot(currentIdx);
  if (hasAny && !rotateTimer) startRotation();
}

/* ════════════════════════════════════════
   ABLY
════════════════════════════════════════ */
function setStatus(cls) {
  document.getElementById('status-dot').className = cls;
}

const ably = new Ably.Realtime({ key: CONFIG.ABLY_KEY });
const ch   = ably.channels.get(CONFIG.ABLY_CHANNEL);

ably.connection.on('connected', () => {
  setStatus('connected');
  // Ask tracker to push current leaderboard
  ch.publish('cmd', 'requestLeaderboard').catch(() => {});
});
ably.connection.on('disconnected', () => setStatus('connecting'));
ably.connection.on('connecting',   () => setStatus('connecting'));
ably.connection.on('failed',       () => setStatus(''));

// Leaderboard data
ch.subscribe('giftr', msg => onGiftrData(msg.data));

// Manual slot pin commands from tracker controller
ch.subscribe('giftr-cmd', msg => {
  const cmd = msg.data || '';
  if (cmd === 'auto') {
    // Resume auto-rotation
    const hasAny = SLOTS.some(m => leaderboard[m.key] && leaderboard[m.key].name);
    if (hasAny) startRotation();
  } else if (cmd.startsWith('slot:')) {
    const key = cmd.slice(5); // e.g. 'daily', 'youtube'
    pinSlot(key);
  }
});
</script>
</body>
</html>
