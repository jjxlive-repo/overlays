<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Giftr Bar</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Bebas+Neue&family=DM+Sans:wght@700&display=swap" rel="stylesheet">
<script src="https://cdn.ably.com/lib/ably.min-2.js"></script>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 1080px; height: 1920px; overflow: hidden; background: transparent; }

/* ─── PARTICLE CANVAS ─── */
#particle-canvas {
  position: absolute; top: 0; left: 0;
  width: 1080px; height: 1920px;
  pointer-events: none; z-index: 50;
}

/* ─── SCREEN PULSE ─── */
#screen-pulse {
  position: absolute; inset: 0;
  pointer-events: none; z-index: 8;
  opacity: 0; transition: opacity 0.35s ease;
}

/* ═══════════════════════════════════════════════════════
   BAR — 50px tall, centered bar bg shown only on right
   third in idle. On alert, bg clips open to full width.
   Hero text (overflow:visible) explodes left on alert.
═══════════════════════════════════════════════════════ */
#giftr-bar {
  position: absolute; top: 450px; left: 0;
  width: 1080px; height: 50px;
  overflow: visible;
  opacity: 0; transition: opacity 0.6s ease;
  z-index: 10;
}
#giftr-bar.visible { opacity: 1; }

/* Background layer — clips via inset(), revealing only right third in idle */
#bar-bg-layer {
  position: absolute; inset: 0;
  overflow: hidden;
  clip-path: inset(0 0 0 720px round 6px 0 0 6px);
  transition: clip-path 0.55s cubic-bezier(.34,1.56,.64,1);
}
#giftr-bar.alert-active #bar-bg-layer {
  clip-path: inset(0 0 0 0px round 0px);
}

#bar-bg {
  position: absolute; inset: 0;
  background: rgba(5, 0, 14, 0.72);
}
#bar-wash {
  position: absolute; inset: 0;
  transition: background 1s ease; pointer-events: none;
}
#bar-edge-top, #bar-edge-bot {
  position: absolute; left: 0; right: 0;
  height: 1px; transition: background 1s ease; pointer-events: none;
}
#bar-edge-top { top: 0; }
#bar-edge-bot { bottom: 2px; }
#bar-progress {
  position: absolute; bottom: 0; left: 0;
  height: 2px; width: 0%; transition: background 1s ease;
  border-radius: 0 1px 1px 0;
}
#bar-shimmer-flare {
  position: absolute; inset: 0;
  background: linear-gradient(115deg, transparent 15%, rgba(255,255,255,0.20) 50%, transparent 85%);
  background-size: 260% 100%; background-position: -260% 0; pointer-events: none;
  animation: barFlareSweep 5s ease-in-out infinite;
}
@keyframes barFlareSweep {
  0%   { background-position: -260% 0; opacity: 0; }
  8%   { opacity: 1; }
  50%  { background-position: 260% 0; opacity: 0; }
  100% { background-position: 260% 0; opacity: 0; }
}
#bar-border {
  position: absolute; inset: 0;
  animation: barBorderShimmer 5s linear infinite;
  pointer-events: none;
}
@keyframes barBorderShimmer {
  0%   { box-shadow: inset 0 0 0 1px rgba(192,132,252,0.82), 0 0 10px rgba(192,132,252,0.22); }
  20%  { box-shadow: inset 0 0 0 1px rgba(232,121,249,0.96), 0 0 18px rgba(232,121,249,0.34); }
  40%  { box-shadow: inset 0 0 0 1px rgba(105,201,208,0.82), 0 0 10px rgba(105,201,208,0.22); }
  60%  { box-shadow: inset 0 0 0 1px rgba(238,29,82,0.88),   0 0 14px rgba(238,29,82,0.28);   }
  80%  { box-shadow: inset 0 0 0 1px rgba(168,85,247,0.88),  0 0 14px rgba(168,85,247,0.28);  }
  100% { box-shadow: inset 0 0 0 1px rgba(192,132,252,0.82), 0 0 10px rgba(192,132,252,0.22); }
}
/* bar-sweep — flash across bg on slot change */
#bar-sweep {
  position: absolute; inset: 0;
  pointer-events: none; opacity: 0; will-change: transform, opacity;
}
#bar-sweep.flash { animation: barSweep 0.55s ease-in-out forwards; }
@keyframes barSweep {
  0%   { opacity: 0; transform: translateX(-110%); }
  35%  { opacity: 1; }
  100% { opacity: 0; transform: translateX(110%); }
}

/* ─── BAR HERO PANEL — left 2/3, overflow visible, slides in on alert ─── */
#bar-hero {
  position: absolute; left: 0; top: 0;
  width: 720px; height: 50px;
  overflow: visible;
  display: flex; align-items: center;
  gap: 18px; padding: 0 20px 0 18px;
  opacity: 0;
  transform: translateX(-22px);
  transition: opacity 0.38s ease 0.08s, transform 0.48s cubic-bezier(.34,1.56,.64,1) 0.06s;
  pointer-events: none;
}
#giftr-bar.alert-active #bar-hero {
  opacity: 1; transform: translateX(0);
}
/* 90px Anton in 50px bar — bleeds ~20px above/below */
#bar-hero-name {
  font-family: 'Anton', sans-serif;
  font-size: 90px; line-height: 1;
  text-transform: uppercase; color: #fff;
  letter-spacing: 1px; white-space: nowrap;
  text-shadow: 0 3px 18px rgba(0,0,0,0.95), 0 0 40px rgba(255,255,255,0.06);
  overflow: visible; flex-shrink: 1; min-width: 0;
}
/* 58px Bebas — bleeds ~4px above/below */
#bar-hero-amount {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 58px; letter-spacing: 4px;
  white-space: nowrap; flex-shrink: 0; overflow: visible;
}

/* ─── BAR INFO — right 1/3, always 360px, content crossfades ─── */
#bar-info {
  position: absolute; right: 0; top: 0;
  width: 360px; height: 50px;
  overflow: hidden;
  display: flex; flex-direction: column;
  align-items: flex-end; justify-content: center;
  padding: 0 14px; gap: 3px;
  transition: opacity 0.3s ease;
}
/* SLOT TITLE — larger and more visible */
#bar-slot-title {
  font-family: 'DM Sans', sans-serif;
  font-size: 14px; font-weight: 700;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: rgba(255,255,255,0.92);
  white-space: nowrap;
}
#bar-info-row {
  display: flex; align-items: baseline;
  gap: 8px; max-width: 100%;
}
#bar-info-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px; letter-spacing: 2px;
  color: #fff; white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis; max-width: 200px;
}
#bar-info-amount {
  font-family: 'DM Sans', sans-serif;
  font-size: 13px; font-weight: 700;
  letter-spacing: 0.06em; white-space: nowrap;
  border-radius: 4px; padding: 1px 5px;
  transition: background 0.4s ease, box-shadow 0.4s ease, color 0.6s ease;
}
#bar-info-amount.monthly-shimmer {
  background: rgba(192,132,252,0.14);
  animation: monthlyGlow 1.4s ease-in-out infinite;
}
@keyframes monthlyGlow {
  0%,100% { box-shadow: 0 0 6px rgba(192,132,252,0.25); }
  50%     { box-shadow: 0 0 22px rgba(232,121,249,0.70), 0 0 40px rgba(168,85,247,0.35); }
}
#bar-plat-badge {
  font-family: 'DM Sans', sans-serif;
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.10em; text-transform: uppercase;
  padding: 2px 7px; border-radius: 4px;
  white-space: nowrap; line-height: 17px;
}
.plat-tiktok  { color: #69C9D0; background: rgba(105,201,208,0.16); border: 1px solid rgba(105,201,208,0.30); }
.plat-youtube { color: #FF6B6B; background: rgba(255,80,80,0.16);   border: 1px solid rgba(255,80,80,0.30);   }
.plat-direct,
.plat-default { color: #C084FC; background: rgba(192,132,252,0.16); border: 1px solid rgba(192,132,252,0.30); }

/* ═══════════════════════════════════════════════════════
   SPLAT GIFT PANEL
   Virtual canvas: top=490px (=1920-1430), height=1430px
   Center: x=540, y=490+715=1205px
   All tiers center at same point, just different sizes.
   Shape: organic blob via border-radius.
   Animation: scale(0)→scale(1) from center.
═══════════════════════════════════════════════════════ */
#gift-panel {
  position: absolute;
  left: 540px; top: 1205px;
  /* width/height set per tier via data-tier */
  transform: translate(-50%, -50%) scale(0);
  transform-origin: center center;
  pointer-events: none;
  display: none; z-index: 20;
  overflow: hidden;
}
#gift-panel.show {
  display: block;
  animation: splatIn 0.62s cubic-bezier(.34,1.56,.64,1) forwards;
}
#gift-panel.hide {
  display: block;
  animation: splatOut 0.40s ease-in forwards;
}
@keyframes splatIn {
  0%   { transform: translate(-50%,-50%) scale(0);    opacity: 0; }
  55%  { transform: translate(-50%,-50%) scale(1.07); opacity: 1; }
  100% { transform: translate(-50%,-50%) scale(1);    opacity: 1; }
}
@keyframes splatOut {
  0%   { transform: translate(-50%,-50%) scale(1); opacity: 1; }
  100% { transform: translate(-50%,-50%) scale(0); opacity: 0; }
}

/* Tier sizes — all centered at (540, 1205) */
/* T2 bottom: 1205+225=1430  top: 1205-225=980  → fine */
#gift-panel[data-tier="2"] {
  width: 440px; height: 430px; margin-left: -220px; margin-top: -215px;
  border-radius: 56% 44% 38% 62% / 44% 66% 34% 56%;
}
/* T3 bottom: 1205+305=1510  top: 900 */
#gift-panel[data-tier="3"] {
  width: 620px; height: 600px; margin-left: -310px; margin-top: -300px;
  border-radius: 42% 58% 64% 36% / 58% 38% 62% 42%;
}
/* T4 bottom: 1205+415=1620  top: 790 */
#gift-panel[data-tier="4"] {
  width: 820px; height: 800px; margin-left: -410px; margin-top: -400px;
  border-radius: 64% 36% 48% 52% / 42% 56% 44% 58%;
}
/* T5 bottom: 1205+490=1695  top: 715 */
#gift-panel[data-tier="5"] {
  width: 980px; height: 960px; margin-left: -490px; margin-top: -480px;
  border-radius: 52% 48% 36% 64% / 56% 40% 60% 44%;
}
/* T6 bottom: 1205+570=1775  top: 635 */
#gift-panel[data-tier="6"] {
  width: 1060px; height: 1100px; margin-left: -530px; margin-top: -550px;
  border-radius: 44% 56% 58% 42% / 38% 62% 38% 62%;
}

/* Inner bg — purple splat gradient for all tiers */
#panel-bg {
  position: absolute; inset: 0;
  border-radius: inherit;
}
/* Platform-tinted purple gradients */
#gift-panel[data-platform="tiktok"] #panel-bg {
  background: radial-gradient(ellipse at 42% 38%,
    #9B59D0 0%, #6B20A0 28%, #3B0764 65%, #180530 100%);
  backdrop-filter: blur(16px);
  border: 1px solid rgba(105,201,208,0.18);
}
#gift-panel[data-platform="youtube"] #panel-bg {
  background: radial-gradient(ellipse at 42% 38%,
    #A04590 0%, #7B2FBE 28%, #3B0764 65%, #180530 100%);
  backdrop-filter: blur(16px);
  border: 1px solid rgba(255,80,80,0.18);
}
#gift-panel[data-platform="direct"] #panel-bg,
#gift-panel[data-platform="default"] #panel-bg {
  background: radial-gradient(ellipse at 42% 38%,
    #A855F7 0%, #7B2FBE 28%, #3B0764 65%, #180530 100%);
  backdrop-filter: blur(16px);
  border: 1px solid rgba(192,132,252,0.22);
}

/* Outer glow ring — behind the panel */
#panel-glow {
  position: absolute;
  inset: -50px; border-radius: inherit;
  filter: blur(55px); z-index: -1;
  animation: glowPulse 2.4s ease-in-out infinite;
}
@keyframes glowPulse {
  0%,100% { opacity: 0.45; }
  50%     { opacity: 0.80; }
}
#gift-panel[data-platform="tiktok"]  #panel-glow { background: radial-gradient(ellipse at center, rgba(105,201,208,0.55), rgba(168,85,247,0.50) 55%, transparent 75%); }
#gift-panel[data-platform="youtube"] #panel-glow { background: radial-gradient(ellipse at center, rgba(255,80,80,0.50),  rgba(168,85,247,0.50) 55%, transparent 75%); }
#gift-panel[data-platform="direct"]  #panel-glow,
#gift-panel[data-platform="default"] #panel-glow { background: radial-gradient(ellipse at center, rgba(232,121,249,0.55), rgba(120,20,200,0.55) 55%, transparent 75%); }

/* Shimmer border on panel */
#panel-border {
  position: absolute; inset: 0;
  border-radius: inherit; pointer-events: none;
  animation: panelBorderShimmer 5s linear infinite;
}
@keyframes panelBorderShimmer {
  0%   { box-shadow: inset 0 0 0 1.5px rgba(192,132,252,0.80); }
  20%  { box-shadow: inset 0 0 0 1.5px rgba(232,121,249,0.95); }
  40%  { box-shadow: inset 0 0 0 1.5px rgba(105,201,208,0.80); }
  60%  { box-shadow: inset 0 0 0 1.5px rgba(238,29,82,0.85);   }
  80%  { box-shadow: inset 0 0 0 1.5px rgba(168,85,247,0.85);  }
  100% { box-shadow: inset 0 0 0 1.5px rgba(192,132,252,0.80); }
}
#panel-shimmer-sweep {
  position: absolute; inset: 0;
  border-radius: inherit; pointer-events: none;
  background: linear-gradient(115deg, transparent 20%, rgba(255,255,255,0.07) 50%, transparent 80%);
  background-size: 260% 100%;
  animation: panelFlareSweep 7s ease-in-out infinite;
}
@keyframes panelFlareSweep {
  0%   { background-position: -260% 0; opacity: 0; }
  8%   { opacity: 1; }
  42%  { background-position: 260% 0; opacity: 0; }
  100% { background-position: 260% 0; opacity: 0; }
}

/* Panel content */
#panel-content {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 50px 60px;
  opacity: 0; transition: opacity 0.4s ease;
  z-index: 5;
}
#panel-content.show { opacity: 1; }

#panel-plat-badge {
  font-family: 'DM Sans', sans-serif;
  font-size: 14px; font-weight: 700;
  letter-spacing: 0.14em; text-transform: uppercase;
  padding: 5px 20px; border-radius: 6px;
  margin-bottom: 22px; flex-shrink: 0;
}
#panel-plat-badge.plat-tiktok  { color: #69C9D0; background: rgba(105,201,208,0.13); border: 1px solid rgba(105,201,208,0.38); }
#panel-plat-badge.plat-youtube { color: #FF6B6B; background: rgba(255,80,80,0.13);   border: 1px solid rgba(255,80,80,0.38);   }
#panel-plat-badge.plat-direct,
#panel-plat-badge.plat-default { color: #C084FC; background: rgba(192,132,252,0.13); border: 1px solid rgba(192,132,252,0.38); }

#gift-name {
  font-family: 'Anton', sans-serif;
  text-transform: uppercase; color: #fff;
  text-align: center; letter-spacing: 3px; line-height: 0.92;
  text-shadow: 0 4px 26px rgba(0,0,0,0.9), 0 0 60px rgba(255,255,255,0.07);
  width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex-shrink: 0;
}
#gift-panel[data-tier="2"] #gift-name { font-size: 62px; }
#gift-panel[data-tier="3"] #gift-name { font-size: 82px; }
#gift-panel[data-tier="4"] #gift-name { font-size: 108px; }
#gift-panel[data-tier="5"] #gift-name { font-size: 128px; }
#gift-panel[data-tier="6"] #gift-name { font-size: 148px; }

#gift-divider {
  width: 54%; height: 2px; border-radius: 1px;
  margin: 16px 0; flex-shrink: 0;
}
#gift-amount {
  font-family: 'Bebas Neue', sans-serif;
  letter-spacing: 6px; text-align: center; flex-shrink: 0;
}
#gift-panel[data-tier="2"] #gift-amount { font-size: 50px; }
#gift-panel[data-tier="3"] #gift-amount { font-size: 66px; }
#gift-panel[data-tier="4"] #gift-amount { font-size: 84px; }
#gift-panel[data-tier="5"] #gift-amount { font-size: 104px; }
#gift-panel[data-tier="6"] #gift-amount { font-size: 120px; }
#gift-panel[data-platform="tiktok"]  #gift-amount { color: #69C9D0; text-shadow: 0 0 50px rgba(105,201,208,0.65); }
#gift-panel[data-platform="youtube"] #gift-amount { color: #FF6B6B; text-shadow: 0 0 50px rgba(255,80,80,0.65);   }
#gift-panel[data-platform="direct"]  #gift-amount,
#gift-panel[data-platform="default"] #gift-amount { color: #C084FC; text-shadow: 0 0 50px rgba(192,132,252,0.65); }

#panel-tier-label {
  font-family: 'DM Sans', sans-serif;
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.22em; text-transform: uppercase;
  color: rgba(255,255,255,0.22); margin-top: 18px; flex-shrink: 0;
}
#gift-message {
  font-family: 'DM Sans', sans-serif;
  font-weight: 700; font-size: 22px;
  color: rgba(255,255,255,0.76);
  text-align: center; line-height: 1.45;
  margin-top: 18px; padding: 14px 22px;
  background: rgba(255,255,255,0.06); border-radius: 10px;
  width: 100%; max-height: 130px; overflow: hidden;
  display: none; flex-shrink: 0;
}
#gift-message.show { display: block; }
#gift-panel[data-tier="4"] #gift-message,
#gift-panel[data-tier="5"] #gift-message,
#gift-panel[data-tier="6"] #gift-message { font-size: 28px; max-height: 160px; }

/* ─── TIER 1 SHIMMER ─── */
#tier1-shimmer {
  position: absolute; top: 450px; left: 0;
  width: 1080px; height: 50px;
  pointer-events: none; z-index: 15;
  background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.22) 50%, transparent 100%);
  opacity: 0;
}
#tier1-shimmer.active { animation: t1Shimmer 0.85s ease-in-out 3 forwards; }
@keyframes t1Shimmer {
  0%   { opacity: 0; transform: translateX(-110%); }
  25%  { opacity: 1; }
  75%  { opacity: 1; }
  100% { opacity: 0; transform: translateX(110%); }
}

/* ─── STATUS DOT — hidden on the broadcast overlay; check stream-dock.html for status ─── */
#status-dot {
  display: none;
  position: absolute; top: 456px; left: 8px;
  width: 6px; height: 6px; border-radius: 50%;
  background: #444; z-index: 30; transition: background 0.3s;
}
#status-dot.connected  { background: #22c55e; box-shadow: 0 0 5px rgba(34,197,94,0.7); }
#status-dot.connecting { background: #eab308; }
</style>
</head>
<body>

<canvas id="particle-canvas" width="1080" height="1920"></canvas>
<div id="screen-pulse"></div>

<div id="giftr-bar">
  <!-- Background layer — clipped to right third in idle, full width on alert -->
  <div id="bar-bg-layer">
    <div id="bar-bg"></div>
    <div id="bar-wash"></div>
    <div id="bar-edge-top"></div>
    <div id="bar-edge-bot"></div>
    <div id="bar-progress"></div>
    <div id="bar-shimmer-flare"></div>
    <div id="bar-sweep"></div>
    <div id="bar-border"></div>
  </div>
  <!-- Hero: giant name + amount, slides in on alert (overflow visible) -->
  <div id="bar-hero">
    <span id="bar-hero-name"></span>
    <span id="bar-hero-amount"></span>
  </div>
  <!-- Info: always-visible right third, compact slot info -->
  <div id="bar-info">
    <div id="bar-slot-title"></div>
    <div id="bar-info-row">
      <span id="bar-info-name"></span>
      <span id="bar-info-amount"></span>
    </div>
    <div id="bar-plat-badge"></div>
  </div>
</div>

<!-- Splat panel — centered at (540, 1205) always -->
<div id="gift-panel">
  <div id="panel-glow"></div>
  <div id="panel-bg"></div>
  <div id="panel-shimmer-sweep"></div>
  <div id="panel-border"></div>
  <div id="panel-content">
    <div id="panel-plat-badge"></div>
    <div id="gift-name"></div>
    <div id="gift-divider"></div>
    <div id="gift-amount"></div>
    <div id="panel-tier-label"></div>
    <div id="gift-message"></div>
  </div>
</div>

<div id="tier1-shimmer"></div>
<div id="status-dot"></div>

<script>
/* ══ CONFIG ══════════════════════════════════════════════ */
const CONFIG = {
  ROTATE_MS:    5000,
  MONTHLY_LINGER_MS: 3500,
  ABLY_KEY:     'Y8e-eA.l0VHlg:aJXsEfu1Be4BYsAeATRMI3w30YAKSs_LyF3DPoesIz0',
  ABLY_CHANNEL: 'splat-overlay',
};

const TIER_CONFIG = [
  null,
  { duration:  5000, barOnly: true,  particles:   0 }, // T1
  { duration:  6500, barOnly: false, particles:  40 }, // T2
  { duration:  7500, barOnly: false, particles:  80 }, // T3
  { duration:  9000, barOnly: false, particles: 150 }, // T4
  { duration: 11000, barOnly: false, particles: 250 }, // T5
  { duration: 13000, barOnly: false, particles: 400 }, // T6
];
const TIER_LABELS = ['','','FEATURED GIFT','BIG GIFT','MEGA GIFT','LEGENDARY GIFT','⚡ GOD TIER ⚡'];

const SLOT_DEFS = [
  { key: 'daily',   label: 'Daily Top Gifter'   },
  { key: 'weekly',  label: 'Weekly Top Gifter'  },
  { key: 'monthly', label: 'Monthly Top Gifter' },
  { key: 'youtube', label: 'Top YouTube Gifter' },
  { key: 'tiktok',  label: 'Top TikTok Gifter'  },
  { key: 'custom',  label: 'Featured Gifter'    },
];

const PLAT_COLORS = {
  tiktok:  { wash: 'rgba(105,201,208,0.08)', edge: '#69C9D0', sweep: 'rgba(105,201,208,0.22)', particles: ['#69C9D0','#EE1D52','#ffffff','#ff80ab','#00eeff'], pulse: 'rgba(105,201,208,0.22)' },
  youtube: { wash: 'rgba(255,80,80,0.08)',   edge: '#FF6B6B', sweep: 'rgba(255,80,80,0.22)',   particles: ['#FF6B6B','#FF0000','#ffffff','#ffcc00','#ff4444'], pulse: 'rgba(255,80,80,0.22)'   },
  direct:  { wash: 'rgba(192,132,252,0.08)', edge: '#C084FC', sweep: 'rgba(192,132,252,0.22)', particles: ['#C084FC','#E879F9','#ffffff','#A855F7','#FAF5FF'], pulse: 'rgba(192,132,252,0.22)' },
  default: { wash: 'rgba(192,132,252,0.08)', edge: '#C084FC', sweep: 'rgba(192,132,252,0.22)', particles: ['#C084FC','#E879F9','#ffffff','#A855F7','#FAF5FF'], pulse: 'rgba(192,132,252,0.22)' },
};

/* ══ STATE ═══════════════════════════════════════════════ */
let leaderboard = {};
let activeSlots = SLOT_DEFS.slice(0, 5);
let currentIdx  = 0;
let rotateTimer = null;
let progressAnim = null;
let pinned      = false;
let alertQueue  = [];
let alertActive = false;
let panelOpen   = false;
let alertTimeout = null;
let panelTimer  = null;
let infoFadeTimer = null;

/* ══ UTILS ═══════════════════════════════════════════════ */
function esc(s) { return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtAmount(amount, type) {
  const n = Number(amount) || 0;
  if (type === 'tiktok_coins')      return n.toLocaleString() + ' COINS';
  if (type === 'youtube_jewels')    return n.toLocaleString() + ' JEWELS';
  if (type === 'youtube_superchat') return '$' + (Number.isInteger(n) ? n.toLocaleString() : n.toFixed(2));
  if (type === 'direct_donation')   return '$' + (Number.isInteger(n) ? n.toLocaleString() : n.toFixed(2));
  return n.toLocaleString();
}
function platKey(p) { return ['tiktok','youtube','direct'].includes(p) ? p : 'default'; }
function platLabel(p) {
  if (p === 'tiktok')  return '♪ TikTok';
  if (p === 'youtube') return '▶ YouTube';
  if (p === 'direct')  return '💚 Direct';
  return '🎁 Gift';
}
function getTier(amount, type) {
  const n = Number(amount) || 0;
  if (type === 'tiktok_coins' || type === 'youtube_jewels') {
    if (n < 50)     return 0; if (n < 1000)   return 1;
    if (n < 5000)   return 2; if (n < 25000)  return 3;
    if (n < 100000) return 4; if (n < 250000) return 5;
    return 6;
  }
  if (n < 1)   return 0; if (n < 10)  return 1;
  if (n < 50)  return 2; if (n < 100) return 3;
  if (n < 250) return 4; if (n < 400) return 5;
  return 6;
}

/* ══ PARTICLES ═══════════════════════════════════════════ */
const pCanvas = document.getElementById('particle-canvas');
const pCtx    = pCanvas.getContext('2d');
let pList = [], pRaf = null;

function emitParticles(tier, plat) {
  const cfg = TIER_CONFIG[tier];
  if (!cfg || cfg.particles === 0) return;
  const colors = PLAT_COLORS[plat].particles;
  for (let i = 0; i < cfg.particles; i++) {
    const full  = tier >= 4;
    const angle = full ? Math.random()*Math.PI*2 : Math.PI*0.25+Math.random()*Math.PI*0.5;
    const speed = (3 + Math.random()*tier*3.4) * (0.55 + Math.random()*0.9);
    pList.push({ x: 480+Math.random()*120, y: 455+Math.random()*30,
      vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed,
      color: colors[Math.floor(Math.random()*colors.length)],
      size: 2.5+Math.random()*tier*1.7, life: 0.7+Math.random()*0.3,
      decay: 0.0028+Math.random()*(0.006/Math.max(tier,1)),
      type: Math.random()<0.55?'rect':'circle', rot: Math.random()*Math.PI*2, rotV: (Math.random()-0.5)*0.13 });
  }
  if (!pRaf) pTick();
}

function emitTier1Sparks(plat) {
  const colors = PLAT_COLORS[plat].particles;
  for (let i = 0; i < 18; i++) {
    const a = Math.random()*Math.PI*2, sp = 1.5+Math.random()*3.5;
    pList.push({ x: 100+Math.random()*880, y: 465+Math.random()*16,
      vx: Math.cos(a)*sp, vy: Math.sin(a)*sp-1,
      color: colors[Math.floor(Math.random()*colors.length)],
      size: 1.8+Math.random()*2.5, life: 1, decay: 0.020+Math.random()*0.015,
      type: 'circle', rot: 0, rotV: 0 });
  }
  if (!pRaf) pTick();
}

function pTick() {
  pCtx.clearRect(0,0,1080,1920);
  pList = pList.filter(p => p.life > 0.015);
  for (const p of pList) {
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.22; p.vx *= 0.992;
    p.life -= p.decay; p.rot += p.rotV;
    pCtx.save();
    pCtx.globalAlpha = Math.max(0, Math.min(1, p.life));
    pCtx.fillStyle = p.color;
    pCtx.translate(p.x, p.y); pCtx.rotate(p.rot);
    if (p.type === 'rect') { pCtx.fillRect(-p.size*.5, -p.size, p.size, p.size*2); }
    else { pCtx.beginPath(); pCtx.arc(0,0,p.size/2,0,Math.PI*2); pCtx.fill(); }
    pCtx.restore();
  }
  pCtx.globalAlpha = 1;
  pRaf = pList.length ? requestAnimationFrame(pTick) : null;
}
function clearParticles() {
  pList = [];
  if (pRaf) { cancelAnimationFrame(pRaf); pRaf = null; }
  pCtx.clearRect(0,0,1080,1920);
}

/* ══ SCREEN PULSE ════════════════════════════════════════ */
function triggerScreenPulse(plat, tier) {
  if (tier < 4) return;
  const pc = PLAT_COLORS[plat];
  const sp = document.getElementById('screen-pulse');
  const sz = (tier-3)*65;
  function pulse(delay) {
    setTimeout(() => {
      sp.style.boxShadow = `inset 0 0 ${sz}px ${sz*.55}px ${pc.pulse}`;
      sp.style.opacity = '1';
      setTimeout(() => { sp.style.opacity = '0'; }, 700);
    }, delay);
  }
  pulse(0);
  if (tier >= 5) pulse(1300);
  if (tier >= 6) pulse(2500);
}

/* ══ PROGRESS LINE ═══════════════════════════════════════ */
function startProgress(ms) {
  if (progressAnim) { cancelAnimationFrame(progressAnim); progressAnim = null; }
  const bar = document.getElementById('bar-progress');
  const start = performance.now();
  bar.style.width = '0%';
  function tick(now) {
    const pct = Math.min(100, ((now-start)/ms)*100);
    bar.style.width = pct+'%';
    progressAnim = pct < 100 ? requestAnimationFrame(tick) : null;
  }
  progressAnim = requestAnimationFrame(tick);
}

/* ══ BAR INFO UPDATE — crossfade content ═════════════════ */
function setBarInfo(title, name, amtText, amtColor, platText, platClass, monthly) {
  const info = document.getElementById('bar-info');
  clearTimeout(infoFadeTimer);
  info.style.opacity = '0';
  infoFadeTimer = setTimeout(() => {
    document.getElementById('bar-slot-title').textContent = title;
    document.getElementById('bar-info-name').textContent  = name;
    const amtEl = document.getElementById('bar-info-amount');
    amtEl.textContent = amtText;
    amtEl.style.color = amtColor;
    amtEl.classList.toggle('monthly-shimmer', !!monthly);
    const badge = document.getElementById('bar-plat-badge');
    badge.textContent = platText; badge.className = 'bar-plat ' + platClass;
    info.style.opacity = '1';
  }, 260);
}

/* ══ SHOW SLOT — idle bar rotation ══════════════════════ */
function showSlot(idx) {
  if (!activeSlots.length) return;
  currentIdx = ((idx % activeSlots.length) + activeSlots.length) % activeSlots.length;
  const slotDef = activeSlots[currentIdx];
  const entry   = leaderboard[slotDef.key] ?? null;
  const plat    = entry ? platKey(entry.platform) : 'default';
  const pc      = PLAT_COLORS[plat];

  setBarInfo(
    slotDef.label.toUpperCase(),
    entry?.name ? entry.name.toUpperCase() : '—',
    entry ? fmtAmount(entry.amount, entry.type) : '',
    pc.edge,
    platLabel(entry?.platform),
    'bar-plat plat-' + plat,
    false
  );

  // colour accents
  document.getElementById('bar-wash').style.background =
    `linear-gradient(180deg, ${pc.wash} 0%, rgba(5,0,14,0) 100%)`;
  document.getElementById('bar-edge-top').style.background =
    `linear-gradient(90deg, transparent 0%, ${pc.edge} 50%, transparent 100%)`;
  document.getElementById('bar-edge-bot').style.background =
    `linear-gradient(90deg, transparent 10%, ${pc.edge}88 50%, transparent 90%)`;
  document.getElementById('bar-progress').style.background = pc.edge;
  const sweep = document.getElementById('bar-sweep');
  sweep.style.background = `linear-gradient(90deg, transparent, ${pc.sweep}, transparent)`;
  sweep.classList.remove('flash'); void sweep.offsetWidth; sweep.classList.add('flash');

  startProgress(CONFIG.ROTATE_MS);
}

/* ══ ROTATION ════════════════════════════════════════════ */
function startRotation() {
  stopRotation();
  if (!activeSlots.length) return;
  rotateTimer = setInterval(() => { if (!pinned && !alertActive) showSlot(currentIdx+1); }, CONFIG.ROTATE_MS);
}
function stopRotation() {
  if (rotateTimer)  { clearInterval(rotateTimer); rotateTimer = null; }
  if (progressAnim) { cancelAnimationFrame(progressAnim); progressAnim = null; }
}

/* ══ GIFTR DATA ══════════════════════════════════════════ */
function onGiftrData(data) {
  leaderboard = {};
  let hasAny = false;
  SLOT_DEFS.forEach(def => { if (data[def.key]) { leaderboard[def.key] = data[def.key]; hasAny = true; } });
  const enabled = Array.isArray(data.enabledSlots)
    ? data.enabledSlots : ['daily','weekly','monthly','youtube','tiktok'];
  activeSlots = SLOT_DEFS.filter(d => d.key === 'custom' ? !!data.custom : enabled.includes(d.key));
  const bar = document.getElementById('giftr-bar');
  if (!hasAny || !activeSlots.length) { bar.classList.remove('visible'); stopRotation(); return; }
  bar.classList.add('visible');
  if (currentIdx >= activeSlots.length) currentIdx = 0;
  if (!alertActive) { showSlot(currentIdx); startRotation(); }
}

/* ══ GIFT ALERT SYSTEM ═══════════════════════════════════ */
const MAX_ALERT_QUEUE = 8;
function onGiftAlert(data) {
  const tier = getTier(data.amount, data.type);
  if (tier === 0) return;
  alertQueue.push({ ...data, tier });
  while (alertQueue.length > MAX_ALERT_QUEUE) alertQueue.shift();
  if (!alertActive) runNextAlert();
}

function runNextAlert() {
  if (!alertQueue.length) {
    alertActive = false;
    runMonthlyMoment();
    return;
  }
  alertActive = true;
  showAlert(alertQueue.shift());
}

function showAlert(alert) {
  const { name, amount, type, platform, message, tier } = alert;
  const safeName = name || 'Someone';
  const plat = platKey(platform);
  const pc   = PLAT_COLORS[plat];
  const cfg  = TIER_CONFIG[tier];

  stopRotation();
  clearTimeout(alertTimeout);
  clearTimeout(panelTimer);

  // ── Bar: update "JUST GIFTED" info in right section ──
  setBarInfo('JUST GIFTED', safeName.toUpperCase(), fmtAmount(amount, type), pc.edge, platLabel(platform), 'bar-plat plat-'+plat, false);

  if (tier === 1) {
    // T1: bar-only shimmer, no panel
    panelOpen = false;
    const shimmer = document.getElementById('tier1-shimmer');
    shimmer.classList.remove('active'); void shimmer.offsetWidth; shimmer.classList.add('active');
    emitTier1Sparks(plat);
    alertTimeout = setTimeout(dismissAlert, cfg.duration);
    return;
  }

  // T2-T6: hero text explodes from bar + splat panel
  panelOpen = true;

  // Update hero name/amount and expand bar
  document.getElementById('bar-hero-name').textContent = safeName.toUpperCase();
  const heroAmt = document.getElementById('bar-hero-amount');
  heroAmt.textContent = fmtAmount(amount, type);
  heroAmt.style.color = pc.edge;
  heroAmt.style.textShadow = `0 0 28px ${pc.edge}55`;
  document.getElementById('giftr-bar').classList.add('alert-active');

  // Color accents
  document.getElementById('bar-wash').style.background = `linear-gradient(180deg,${pc.wash} 0%,rgba(5,0,14,0) 100%)`;
  document.getElementById('bar-edge-top').style.background = `linear-gradient(90deg,transparent,${pc.edge},transparent)`;
  document.getElementById('bar-edge-bot').style.background = `linear-gradient(90deg,transparent 10%,${pc.edge}88 50%,transparent 90%)`;

  // Splat panel setup
  const panel   = document.getElementById('gift-panel');
  const content = document.getElementById('panel-content');
  panel.dataset.tier = String(tier);
  panel.dataset.platform = plat;

  const badge = document.getElementById('panel-plat-badge');
  badge.className = 'plat-'+plat; badge.textContent = platLabel(platform);
  document.getElementById('gift-name').textContent = safeName.toUpperCase();
  document.getElementById('gift-amount').textContent = fmtAmount(amount, type);
  document.getElementById('panel-tier-label').textContent = TIER_LABELS[tier] ?? '';
  document.getElementById('gift-divider').style.background = `linear-gradient(90deg,transparent,${pc.edge},transparent)`;
  const msgEl = document.getElementById('gift-message');
  if (message && type === 'youtube_superchat') { msgEl.textContent = message; msgEl.classList.add('show'); }
  else { msgEl.textContent = ''; msgEl.classList.remove('show'); }

  content.classList.remove('show');
  panel.className = 'show';
  panelTimer = setTimeout(() => content.classList.add('show'), 380);

  emitParticles(tier, plat);
  triggerScreenPulse(plat, tier);
  alertTimeout = setTimeout(dismissAlert, cfg.duration);
}

function dismissAlert() {
  clearTimeout(alertTimeout); clearTimeout(panelTimer);
  clearParticles();

  // Collapse bar hero
  document.getElementById('giftr-bar').classList.remove('alert-active');

  if (panelOpen) {
    panelOpen = false;
    const panel = document.getElementById('gift-panel');
    const content = document.getElementById('panel-content');
    content.classList.remove('show');
    setTimeout(() => {
      panel.className = 'hide';
      let done = false;
      const cleanup = () => {
        if (done) return; done = true;
        panel.className = ''; panel.dataset.tier = ''; panel.dataset.platform = '';
        runNextAlert();
      };
      panel.addEventListener('animationend', cleanup, { once: true });
      setTimeout(cleanup, 500);
    }, 150);
  } else {
    runNextAlert();
  }
}

/* ══ MONTHLY MOMENT — post-alert bar state ═══════════════ */
function runMonthlyMoment() {
  const monthly = leaderboard.monthly;
  if (!monthly) { resumeFromAlert(); return; }
  const plat = platKey(monthly.platform);
  const pc   = PLAT_COLORS[plat];
  setBarInfo('MONTHLY TOTAL', monthly.name.toUpperCase(), fmtAmount(monthly.amount, monthly.type), pc.edge, platLabel(monthly.platform), 'bar-plat plat-'+plat, true);
  document.getElementById('bar-wash').style.background = `linear-gradient(180deg,${pc.wash} 0%,rgba(5,0,14,0) 100%)`;
  document.getElementById('bar-edge-top').style.background = `linear-gradient(90deg,transparent,${pc.edge},transparent)`;
  setTimeout(resumeFromAlert, CONFIG.MONTHLY_LINGER_MS);
}

function resumeFromAlert() {
  document.getElementById('bar-info-amount').classList.remove('monthly-shimmer');
  if (activeSlots.length) showSlot(currentIdx);
  startRotation();
}

/* ══ GIFTR CMD ═══════════════════════════════════════════ */
function onGiftrCmd(data) {
  const cmd = String(data ?? '');
  if (cmd === 'auto') { pinned = false; if (!alertActive) startRotation(); }
  else if (cmd.startsWith('slot:')) {
    const key = cmd.slice(5);
    const idx = activeSlots.findIndex(s => s.key === key);
    if (idx >= 0) { pinned = true; stopRotation(); showSlot(idx); }
  }
}

/* ══ ABLY ════════════════════════════════════════════════ */
(function initAbly() {
  try {
    const client  = new Ably.Realtime({ key: CONFIG.ABLY_KEY });
    const channel = client.channels.get(CONFIG.ABLY_CHANNEL);
    const dot = document.getElementById('status-dot');
    client.connection.on('connected',    () => { dot.className = 'connected'; });
    client.connection.on('disconnected', () => { dot.className = ''; });
    client.connection.on('connecting',   () => { dot.className = 'connecting'; });
    // .on (not .once) so a reconnect after a network blip also re-requests fresh data —
    // otherwise the leaderboard silently goes stale for the rest of the stream.
    client.connection.on('connected', () => channel.publish('cmd','requestLeaderboard').catch(()=>{}));
    channel.subscribe('giftr',      msg => onGiftrData(msg.data));
    channel.subscribe('gift-alert', msg => onGiftAlert(msg.data));
    channel.subscribe('giftr-cmd',  msg => onGiftrCmd(msg.data));
  } catch(e) { console.warn('[Ably] init failed:', e); }
})();
</script>
