<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timeout Box — Overlay</title>
<!--
  TIMEOUT BOX — a slim, standalone "penalty box" overlay, driven from stream-dock.

  Add it as an OBS/TikTok-Studio Browser Source (1080×1920, transparent BG). It is
  independent of the New Here balloon game: the dock's Timeout control publishes
  `timeout-box-cmd` on the shared Ably channel; timed-out viewers float up from the
  bottom (out of chat) into the box with a sad face + countdown, and deflate back
  down when their time runs out or they're released.

  Position/size via URL params: ?x=540&y=520&scale=1&cols=3&title=TIME%20OUT
-->
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700;800&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
<script src="https://cdn.ably.com/lib/ably.min-2.js"></script>
<style>
  html, body { margin: 0; padding: 0; background: transparent; overflow: hidden; }
  #c { position: fixed; inset: 0; width: 100vw; height: 100vh; }
  /* tiny backend-connection dot (bottom-left), matches the other overlays */
  #conn { position: fixed; left: 8px; bottom: 8px; width: 8px; height: 8px; border-radius: 50%; background: #555; }
</style>
</head>
<body>
<canvas id="c" width="1080" height="1920"></canvas>
<div id="conn"></div>
<script>
'use strict';
const ABLY_KEY = 'Y8e-eA.l0VHlg:aJXsEfu1Be4BYsAeATRMI3w30YAKSs_LyF3DPoesIz0';
const ABLY_CH  = 'splat-overlay';
const W = 1080, H = 1920;

// ── Config ───────────────────────────────────────────────────────
// Layout is driven live from the stream-dock (sliders publish `timeout-box-config`)
// and persisted here so the OBS source keeps its last layout even if it loads
// before the dock. URL params still win on first load for one-off setups.
const QS = new URLSearchParams(location.search);
function qnum(k, d) { const v = parseFloat(QS.get(k)); return isFinite(v) ? v : d; }
const CFG_STORAGE = 'timeoutBox.cfg.v1';
let BOX_X = 540, BOX_Y = 470, BOX_SCALE = 1, BOX_COLS = 3, BOX_TITLE = 'TIME OUT';
(function loadCfg() {
  try {
    const c = JSON.parse(localStorage.getItem(CFG_STORAGE) || 'null');
    if (c) {
      if (isFinite(c.x)) BOX_X = +c.x;
      if (isFinite(c.y)) BOX_Y = +c.y;
      if (isFinite(c.scale)) BOX_SCALE = +c.scale;
      if (isFinite(c.cols)) BOX_COLS = +c.cols;
      if (typeof c.title === 'string' && c.title.trim()) BOX_TITLE = c.title;
    }
  } catch (e) {}
  if (QS.has('x')) BOX_X = qnum('x', BOX_X);
  if (QS.has('y')) BOX_Y = qnum('y', BOX_Y);
  if (QS.has('scale')) BOX_SCALE = qnum('scale', BOX_SCALE);
  if (QS.has('cols')) BOX_COLS = qnum('cols', BOX_COLS);
  if (QS.get('title')) BOX_TITLE = QS.get('title');
  BOX_SCALE = Math.max(0.3, BOX_SCALE);
  BOX_COLS = Math.max(1, Math.round(BOX_COLS));
})();
function saveCfg() { try { localStorage.setItem(CFG_STORAGE, JSON.stringify({ x: BOX_X, y: BOX_Y, scale: BOX_SCALE, cols: BOX_COLS, title: BOX_TITLE })); } catch (e) {} }
function applyCfg(c) {
  if (!c) return;
  if (isFinite(c.x)) BOX_X = +c.x;
  if (isFinite(c.y)) BOX_Y = +c.y;
  if (isFinite(c.scale)) BOX_SCALE = Math.max(0.3, +c.scale);
  if (isFinite(c.cols)) BOX_COLS = Math.max(1, Math.round(+c.cols));
  if (typeof c.title === 'string' && c.title.trim()) BOX_TITLE = c.title;
  saveCfg();
}
const CELL_W = 184, CELL_H = 208, ROWS_MAX = 3;
const PER_PAGE = () => BOX_COLS * ROWS_MAX;

const YT = { body: '#DC2626', accent: '#F87171', plate: '#2a0808', plateTx: '#FECACA', plateStroke: '#F87171' };
const TK = { body: '#2563EB', accent: '#38BDF8', plate: '#081026', plateTx: '#BFDBFE', plateStroke: '#38BDF8' };
function pal(src) { return src === 'tiktok' ? TK : YT; }

// Each timed-out balloon gets one of these grumpy moods (picked at spawn).
const FACES = ['cry', 'tantrum', 'sullen', 'welling', 'angry'];
const INK = '#23052e';
function pickFace() { return FACES[Math.floor(Math.random() * FACES.length)]; }

const STORAGE = 'timeoutBox.v1';
const ENTER_K = 0.10, EXIT_MS = 1500;
let people = [];   // {key, username, source, until, enterAt, exitAt, bumpAt, y, bx, targetX, targetY, slot, visible, bobPhase}
let _page = 0, _pageAt = 0;
let ch = null, _statusTimer = null;

// ── Helpers ──────────────────────────────────────────────────────
function norm(u)  { return String(u || '').trim().replace(/^@+/, ''); }
function canon(s) { s = String(s || '').toLowerCase(); return (s === 'tt' || s === 'tiktok') ? 'tiktok' : (s === 'yt' || s === 'youtube') ? 'youtube' : 'youtube'; }
function keyOf(u, s) { return canon(s) + ':' + norm(u).toLowerCase(); }
function fmt(ms) {
  const t = Math.max(0, Math.ceil(ms / 1000)), h = Math.floor(t / 3600), m = Math.floor((t % 3600) / 60), s = t % 60;
  return h > 0 ? `${h}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}` : `${m}:${String(s).padStart(2, '0')}`;
}
function activePeople() { return people.filter(p => !p.exitAt); }
function remainMs(p) { return Math.max(0, (Number(p.until) || 0) - Date.now()); }

function save() {
  try { localStorage.setItem(STORAGE, JSON.stringify(activePeople().map(p => ({ username: p.username, source: p.source, until: p.until })))); } catch (e) {}
}
function load() {
  try {
    const arr = JSON.parse(localStorage.getItem(STORAGE) || '[]');
    const now = Date.now();
    for (const r of arr) if ((+r.until || 0) > now) addPerson(r.username, r.source, 0, +r.until, true);
  } catch (e) {}
}

// ── State ops (cumulative, like the impound corner) ──────────────
function addPerson(username, source, seconds, absUntil, silent) {
  const u = norm(username), s = canon(source);
  if (!u) return;
  const key = keyOf(u, s);
  const now = Date.now();
  let p = people.find(x => x.key === key && !x.exitAt);
  const until = absUntil != null ? +absUntil : Math.max(now, p ? p.until : now) + (Number(seconds) || 0) * 1000;
  if (until <= now && !p) return;
  if (p) { p.until = until; p.bumpAt = performance.now(); }
  else {
    p = { key, username: u, source: s, until, enterAt: performance.now(), exitAt: 0, bumpAt: -1e9,
          y: H + 220, bx: BOX_X, targetX: BOX_X, targetY: H + 220, slot: -1, visible: false,
          bobPhase: Math.random() * 6.283, face: pickFace() };
    people.push(p);
  }
  if (!silent) { save(); scheduleStatus(); }
}
function releasePerson(username, source) {
  const p = people.find(x => x.key === keyOf(username, source) && !x.exitAt);
  if (p) { p.exitAt = performance.now(); p.until = 0; save(); scheduleStatus(); }
}
function releaseAll() { activePeople().forEach(p => { p.exitAt = performance.now(); p.until = 0; }); save(); scheduleStatus(); }

// ── Slot layout ──────────────────────────────────────────────────
function slotPos(i) {
  const col = i % BOX_COLS, row = Math.floor(i / BOX_COLS);
  return { x: BOX_X + (col - (BOX_COLS - 1) / 2) * CELL_W * BOX_SCALE, y: BOX_Y + row * CELL_H * BOX_SCALE };
}

// ── Tick (expiry + slotting + easing) ────────────────────────────
function tick() {
  const rnow = performance.now(), enow = Date.now();
  let changed = false;
  for (const p of people) if (!p.exitAt && (Number(p.until) || 0) <= enow) { p.exitAt = rnow; p.until = 0; changed = true; }
  const before = people.length;
  people = people.filter(p => !(p.exitAt && rnow - p.exitAt > EXIT_MS));
  if (people.length !== before) changed = true;

  const act = activePeople().sort((a, b) => (b.until - a.until) || (a.enterAt - b.enterAt)); // longest first, stable
  const pages = Math.max(1, Math.ceil(act.length / PER_PAGE()));
  if (pages > 1 && rnow - _pageAt > 6000) { _page = (_page + 1) % pages; _pageAt = rnow; }
  if (_page >= pages) _page = 0;
  const start = _page * PER_PAGE();
  act.forEach((p, i) => { p.visible = (i >= start && i < start + PER_PAGE()); p.slot = p.visible ? (i - start) : -1; });

  for (const p of people) {
    if (p.exitAt) { p.targetY = H + 240; }                                   // deflate back down out of frame
    else if (p.visible) { const s = slotPos(p.slot); p.targetX = s.x; p.targetY = s.y; } // float up into the box
    else { p.targetX = BOX_X; p.targetY = -240; }                            // off-page: wait above until shown
    p.bx += (p.targetX - p.bx) * 0.12;
    p.y  += (p.targetY - p.y) * ENTER_K;
  }
  if (changed) { save(); scheduleStatus(); }
}

// ── Drawing ──────────────────────────────────────────────────────
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y); ctx.arcTo(x + w, y, x + w, y + h, r); ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r); ctx.arcTo(x, y, x + w, y, r); ctx.closePath();
}
// Draw one of several grumpy expressions inside a balloon of radius r, centered at (0,0).
// t = performance.now() (for animated tears/blinks/steam), ph = per-balloon phase offset,
// bodyCol = balloon body color (used to paint half-lidded "sullen" eyelids).
function drawFace(ctx, r, face, t, ph, bodyCol) {
  ctx.save();
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  const ex = r * 0.33, ey = -r * 0.05;

  if (face === 'angry') {
    // narrowed eyes
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.ellipse(-ex, ey + r * 0.02, r * 0.19, r * 0.13, 0, 0, 6.283); ctx.fill();
    ctx.beginPath(); ctx.ellipse(ex, ey + r * 0.02, r * 0.19, r * 0.13, 0, 0, 6.283); ctx.fill();
    ctx.fillStyle = INK;
    ctx.beginPath(); ctx.arc(-ex + r * 0.02, ey + r * 0.03, r * 0.095, 0, 6.283); ctx.fill();
    ctx.beginPath(); ctx.arc(ex - r * 0.02, ey + r * 0.03, r * 0.095, 0, 6.283); ctx.fill();
    // heavy brows driving down toward the center (V)
    ctx.strokeStyle = INK; ctx.lineWidth = r * 0.11;
    ctx.beginPath(); ctx.moveTo(-r * 0.56, -r * 0.30); ctx.lineTo(-r * 0.12, -r * 0.10); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(r * 0.56, -r * 0.30); ctx.lineTo(r * 0.12, -r * 0.10); ctx.stroke();
    // deep scowl
    ctx.lineWidth = r * 0.085;
    ctx.beginPath(); ctx.moveTo(-r * 0.28, r * 0.52); ctx.quadraticCurveTo(0, r * 0.30, r * 0.28, r * 0.52); ctx.stroke();
    // hot-cheek anger flush ticks
    ctx.strokeStyle = 'rgba(248,113,113,0.9)'; ctx.lineWidth = r * 0.05;
    for (let s = -1; s <= 1; s += 2) { ctx.beginPath(); ctx.moveTo(s * r * 0.62, r * 0.02); ctx.lineTo(s * r * 0.62, r * 0.16); ctx.stroke(); }

  } else if (face === 'cry') {
    // squeezed-shut eyes (upward arcs)
    ctx.strokeStyle = INK; ctx.lineWidth = r * 0.08;
    ctx.beginPath(); ctx.arc(-ex, ey + r * 0.06, r * 0.18, Math.PI * 1.15, Math.PI * 1.85); ctx.stroke();
    ctx.beginPath(); ctx.arc(ex, ey + r * 0.06, r * 0.18, Math.PI * 1.15, Math.PI * 1.85); ctx.stroke();
    // raised worried brows
    ctx.lineWidth = r * 0.06;
    ctx.beginPath(); ctx.moveTo(-r * 0.52, -r * 0.36); ctx.quadraticCurveTo(-r * 0.33, -r * 0.46, -r * 0.16, -r * 0.34); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(r * 0.52, -r * 0.36); ctx.quadraticCurveTo(r * 0.33, -r * 0.46, r * 0.16, -r * 0.34); ctx.stroke();
    // wailing open mouth + tongue
    ctx.fillStyle = '#3b0a18';
    ctx.beginPath(); ctx.ellipse(0, r * 0.5, r * 0.2, r * 0.16, 0, 0, 6.283); ctx.fill();
    ctx.fillStyle = '#ef6d8a';
    ctx.beginPath(); ctx.ellipse(0, r * 0.58, r * 0.11, r * 0.06, 0, 0, 6.283); ctx.fill();
    // gushing tear streams (animated droplets falling from both eyes)
    ctx.fillStyle = '#7dbefb';
    for (let s = -1; s <= 1; s += 2) {
      for (let k = 0; k < 3; k++) {
        const prog = ((t / 650 + k / 3 + (s > 0 ? 0.15 : 0)) % 1);
        const dy = r * 0.18 + prog * r * 0.95, rr = r * 0.09 * (1 - prog * 0.4);
        ctx.globalAlpha = 0.85 * (1 - prog * 0.5);
        ctx.beginPath(); ctx.ellipse(s * ex, dy, rr * 0.7, rr, 0, 0, 6.283); ctx.fill();
      }
    }
    ctx.globalAlpha = 1;

  } else if (face === 'tantrum') {
    // scrunched-tight eyes (downward arcs)
    ctx.strokeStyle = INK; ctx.lineWidth = r * 0.085;
    ctx.beginPath(); ctx.arc(-ex, ey - r * 0.02, r * 0.17, Math.PI * 0.15, Math.PI * 0.85); ctx.stroke();
    ctx.beginPath(); ctx.arc(ex, ey - r * 0.02, r * 0.17, Math.PI * 0.15, Math.PI * 0.85); ctx.stroke();
    // furious down-brows
    ctx.lineWidth = r * 0.10;
    ctx.beginPath(); ctx.moveTo(-r * 0.56, -r * 0.34); ctx.lineTo(-r * 0.14, -r * 0.16); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(r * 0.56, -r * 0.34); ctx.lineTo(r * 0.14, -r * 0.16); ctx.stroke();
    // screaming mouth with a row of top teeth
    ctx.fillStyle = '#3b0a18'; roundRect(ctx, -r * 0.26, r * 0.34, r * 0.52, r * 0.30, r * 0.10); ctx.fill();
    ctx.fillStyle = '#fff'; roundRect(ctx, -r * 0.26, r * 0.34, r * 0.52, r * 0.09, r * 0.04); ctx.fill();
    // red-faced flush
    ctx.fillStyle = 'rgba(248,113,113,0.5)';
    for (let s = -1; s <= 1; s += 2) { ctx.beginPath(); ctx.ellipse(s * r * 0.6, r * 0.14, r * 0.14, r * 0.10, 0, 0, 6.283); ctx.fill(); }
    // steam puffs rising from the sides
    ctx.fillStyle = 'rgba(255,255,255,0.55)';
    for (let s = -1; s <= 1; s += 2) {
      const pf = ((t / 500 + (s > 0 ? 0.5 : 0)) % 1);
      ctx.globalAlpha = 0.5 * (1 - pf);
      ctx.beginPath(); ctx.arc(s * r * 0.5, -r * 0.5 - pf * r * 0.4, r * 0.09 * (0.6 + pf * 0.6), 0, 6.283); ctx.fill();
    }
    ctx.globalAlpha = 1;

  } else if (face === 'welling') {
    // big glossy watery eyes, with an occasional blink
    const blink = ((t / 1000 + ph) % 3.4), closed = blink > 3.24;
    if (closed) {
      ctx.strokeStyle = INK; ctx.lineWidth = r * 0.06;
      ctx.beginPath(); ctx.moveTo(-ex - r * 0.2, ey + r * 0.02); ctx.lineTo(-ex + r * 0.2, ey + r * 0.02); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(ex - r * 0.2, ey + r * 0.02); ctx.lineTo(ex + r * 0.2, ey + r * 0.02); ctx.stroke();
    } else {
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(-ex, ey, r * 0.24, 0, 6.283); ctx.fill();
      ctx.beginPath(); ctx.arc(ex, ey, r * 0.24, 0, 6.283); ctx.fill();
      ctx.fillStyle = INK;
      ctx.beginPath(); ctx.arc(-ex, ey + r * 0.03, r * 0.15, 0, 6.283); ctx.fill();
      ctx.beginPath(); ctx.arc(ex, ey + r * 0.03, r * 0.15, 0, 6.283); ctx.fill();
      // water welling along the lower lid (not yet falling)
      ctx.fillStyle = 'rgba(147,197,253,0.75)';
      ctx.beginPath(); ctx.ellipse(-ex, ey + r * 0.16, r * 0.2, r * 0.07, 0, 0, Math.PI); ctx.fill();
      ctx.beginPath(); ctx.ellipse(ex, ey + r * 0.16, r * 0.2, r * 0.07, 0, 0, Math.PI); ctx.fill();
      // shiny catch-lights
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(-ex - r * 0.06, ey - r * 0.05, r * 0.05, 0, 6.283); ctx.fill();
      ctx.beginPath(); ctx.arc(ex - r * 0.06, ey - r * 0.05, r * 0.05, 0, 6.283); ctx.fill();
    }
    // worried brows
    ctx.strokeStyle = INK; ctx.lineWidth = r * 0.06;
    ctx.beginPath(); ctx.moveTo(-r * 0.54, -r * 0.40); ctx.lineTo(-r * 0.18, -r * 0.30); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(r * 0.54, -r * 0.40); ctx.lineTo(r * 0.18, -r * 0.30); ctx.stroke();
    // trembling frown (quivers held-back tears)
    const q = Math.sin(t / 70 + ph) * r * 0.015;
    ctx.lineWidth = r * 0.07;
    ctx.beginPath(); ctx.moveTo(-r * 0.22, r * 0.5 + q); ctx.quadraticCurveTo(0, r * 0.34 - q, r * 0.22, r * 0.5 - q); ctx.stroke();

  } else { // sullen
    // eye whites + low pupils, then paint the top half over with body color for heavy lids
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(-ex, ey + r * 0.02, r * 0.18, 0, 6.283); ctx.fill();
    ctx.beginPath(); ctx.arc(ex, ey + r * 0.02, r * 0.18, 0, 6.283); ctx.fill();
    ctx.fillStyle = INK;
    ctx.beginPath(); ctx.arc(-ex, ey + r * 0.08, r * 0.10, 0, 6.283); ctx.fill();
    ctx.beginPath(); ctx.arc(ex, ey + r * 0.08, r * 0.10, 0, 6.283); ctx.fill();
    ctx.fillStyle = bodyCol || '#444';
    ctx.beginPath(); ctx.ellipse(-ex, ey + r * 0.02, r * 0.2, r * 0.2, 0, Math.PI, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(ex, ey + r * 0.02, r * 0.2, r * 0.2, 0, Math.PI, Math.PI * 2); ctx.fill();
    // heavy lid creases
    ctx.strokeStyle = INK; ctx.lineWidth = r * 0.055;
    ctx.beginPath(); ctx.moveTo(-ex - r * 0.2, ey + r * 0.02); ctx.lineTo(-ex + r * 0.2, ey + r * 0.02); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(ex - r * 0.2, ey + r * 0.02); ctx.lineTo(ex + r * 0.2, ey + r * 0.02); ctx.stroke();
    // flat, faintly down-turned brows
    ctx.lineWidth = r * 0.06;
    ctx.beginPath(); ctx.moveTo(-r * 0.52, -r * 0.26); ctx.lineTo(-r * 0.16, -r * 0.23); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(r * 0.52, -r * 0.26); ctx.lineTo(r * 0.16, -r * 0.23); ctx.stroke();
    // small pouty mouth
    ctx.lineWidth = r * 0.07;
    ctx.beginPath(); ctx.moveTo(-r * 0.16, r * 0.48); ctx.quadraticCurveTo(0, r * 0.42, r * 0.16, r * 0.48); ctx.stroke();
  }
  ctx.restore();
}
function drawSad(ctx, x, y, r, p, squish, bob) {
  const c = pal(p.source);
  ctx.save();
  // tantrum balloons shake side to side (but not while deflating away)
  const shx = (p.face === 'tantrum' && squish < 0.05) ? Math.sin(performance.now() / 45 + (p.bobPhase || 0)) * r * 0.06 : 0;
  ctx.translate(x + shx, y + bob);
  const sx = 1 + 0.22 * squish, sy = 1 - 0.42 * squish; // deflate: widen + flatten
  ctx.scale(sx, sy);
  // soft shadow
  ctx.save(); ctx.globalAlpha = 0.28; ctx.fillStyle = '#0c0a12';
  ctx.beginPath(); ctx.ellipse(0, r * 1.05, r * 0.85, r * 0.2, 0, 0, 6.283); ctx.fill(); ctx.restore();
  // body
  ctx.fillStyle = c.body;
  ctx.beginPath(); ctx.ellipse(0, 0, r, r * 1.06, 0, 0, 6.283); ctx.fill();
  { const g = ctx.createLinearGradient(0, -r, 0, r);
    g.addColorStop(0, 'rgba(255,255,255,0.14)'); g.addColorStop(0.5, 'rgba(255,255,255,0)'); g.addColorStop(1, 'rgba(12,10,18,0.34)');
    ctx.fillStyle = g; ctx.beginPath(); ctx.ellipse(0, 0, r, r * 1.06, 0, 0, 6.283); ctx.fill(); }
  // gloss
  { const g = ctx.createRadialGradient(-r * 0.32, -r * 0.36, 0, -r * 0.32, -r * 0.36, r * 0.5);
    g.addColorStop(0, 'rgba(255,255,255,0.5)'); g.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = g; ctx.beginPath(); ctx.ellipse(-r * 0.3, -r * 0.34, r * 0.32, r * 0.24, 0, 0, 6.283); ctx.fill(); }
  // grumpy face (varies by mood)
  drawFace(ctx, r, p.face || 'sullen', performance.now(), p.bobPhase || 0, c.body);
  // knotted tie at the bottom
  ctx.fillStyle = c.body; ctx.beginPath(); ctx.moveTo(-r * 0.14, r * 1.02); ctx.lineTo(r * 0.14, r * 1.02); ctx.lineTo(0, r * 1.2); ctx.closePath(); ctx.fill();
  ctx.restore();
}
function drawLabel(ctx, cx, cy, p, alpha) {
  const c = pal(p.source);
  ctx.save();
  ctx.globalAlpha = alpha;
  // name pill (with drop shadow so it reads over video)
  ctx.font = `700 ${Math.round(22 * BOX_SCALE)}px Fredoka, sans-serif`;
  const nm = p.username, tw = ctx.measureText(nm).width, pw = Math.max(60, tw + 22), ph = 30 * BOX_SCALE;
  ctx.save(); ctx.shadowColor = 'rgba(0,0,0,0.6)'; ctx.shadowBlur = 6; ctx.shadowOffsetY = 2;
  ctx.fillStyle = c.plate; roundRect(ctx, cx - pw / 2, cy - ph, pw, ph, ph / 2); ctx.fill(); ctx.restore();
  ctx.strokeStyle = c.plateStroke; ctx.lineWidth = 2; roundRect(ctx, cx - pw / 2, cy - ph, pw, ph, ph / 2); ctx.stroke();
  ctx.fillStyle = c.plateTx; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(nm, cx, cy - ph / 2);
  ctx.restore();
}
function drawTimer(ctx, cx, cy, p, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.shadowColor = 'rgba(0,0,0,0.85)'; ctx.shadowBlur = 4; ctx.shadowOffsetY = 1;
  ctx.font = `700 ${Math.round(24 * BOX_SCALE)}px Fredoka, sans-serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.lineWidth = 4; ctx.strokeStyle = '#111827';
  const t = fmt(remainMs(p));
  ctx.strokeText(t, cx, cy); ctx.shadowBlur = 0; ctx.fillStyle = '#fff'; ctx.fillText(t, cx, cy);
  ctx.restore();
}
function drawHeader(ctx, count) {
  const sc = BOX_SCALE;
  ctx.save();
  ctx.translate(BOX_X, BOX_Y - 78 * sc); ctx.rotate(-0.03); ctx.scale(sc, sc);
  ctx.font = '800 30px Fredoka, sans-serif';
  const bw = Math.max(220, ctx.measureText(BOX_TITLE).width + 48), bh = 50;
  ctx.fillStyle = 'rgba(17,24,39,0.72)'; roundRect(ctx, -bw / 2, -bh / 2, bw, bh, 10); ctx.fill();
  ctx.save(); roundRect(ctx, -bw / 2, -bh / 2 - 9, bw, 9, 3); ctx.clip();
  for (let x = -bw / 2 - 14; x < bw / 2 + 14; x += 22) { ctx.fillStyle = (((x / 22) | 0) & 1) ? '#F59E0B' : '#1f2937'; ctx.fillRect(x, -bh / 2 - 9, 13, 9); }
  ctx.restore();
  ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.shadowColor = 'rgba(0,0,0,0.7)'; ctx.shadowBlur = 4;
  ctx.fillText(BOX_TITLE, 0, 1);
  ctx.shadowBlur = 0; ctx.font = '700 15px "Space Grotesk", sans-serif'; ctx.fillStyle = '#FDBA74';
  ctx.fillText(`${count} IN TIME OUT`, 0, bh / 2 + 14);
  ctx.restore();
}
const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
function frame() {
  tick();
  ctx.clearRect(0, 0, W, H);
  const rnow = performance.now();
  const act = activePeople();
  if (act.length || people.some(p => p.exitAt)) drawHeader(ctx, act.length);
  // back-to-front by y
  const all = people.slice().sort((a, b) => a.y - b.y);
  for (const p of all) {
    const exiting = !!p.exitAt;
    const squish = exiting ? Math.min(1, (rnow - p.exitAt) / 420) : 0;
    const bump = rnow - (p.bumpAt || -1e9);
    const wob = (bump >= 0 && bump < 300) ? Math.sin(bump / 300 * Math.PI) * 6 : 0; // small +time nudge
    const bob = Math.sin(rnow / 900 + p.bobPhase) * 4 - wob;
    const r = 56 * BOX_SCALE * (exiting ? (1 - 0.12 * squish) : 1);
    drawSad(ctx, p.bx, p.y, r, p, squish, bob);
    const alpha = exiting ? Math.max(0, 1 - squish) : Math.min(1, Math.max(0, (H - p.y) / 300));
    if (alpha > 0.02 && p.y < H + 40) {
      drawLabel(ctx, p.bx, p.y + bob - r - 12 * BOX_SCALE, p, alpha);
      drawTimer(ctx, p.bx, p.y + bob + r + 26 * BOX_SCALE, p, alpha);
    }
  }
  requestAnimationFrame(frame);
}

// ── Ably ─────────────────────────────────────────────────────────
function scheduleStatus() { if (_statusTimer) return; _statusTimer = setTimeout(() => { _statusTimer = null; publishStatus(); }, 250); }
function publishStatus() {
  if (!ch) return;
  ch.publish('timeout-box-status', { people: activePeople().map(p => ({ username: p.username, source: p.source, until: p.until })) }).catch(() => {});
}
function connect() {
  const client = new Ably.Realtime({ key: ABLY_KEY });
  ch = client.channels.get(ABLY_CH);
  ch.subscribe('timeout-box-cmd', msg => {
    const d = msg.data || {};
    if (d.action === 'add') addPerson(d.username, d.source, d.seconds != null ? d.seconds : (Number(d.minutes) || 0) * 60, d.until);
    else if (d.action === 'release') releasePerson(d.username, d.source);
    else if (d.action === 'release-all') releaseAll();
  });
  ch.subscribe('timeout-box-config', msg => applyCfg(msg.data || {}));
  ch.subscribe('timeout-box-request', () => publishStatus());
  const dot = document.getElementById('conn');
  client.connection.on(sc => { if (dot) dot.style.background = sc.current === 'connected' ? '#3b82f6' : (sc.current === 'connecting' ? '#facc15' : '#555'); });
  client.connection.on('connected', () => publishStatus());
  window.__timeoutBox = { get people() { return people; }, add: addPerson, release: releasePerson, releaseAll };
}

load();
connect();
requestAnimationFrame(frame);
// State-only fallback so timers/animation keep advancing even if rAF is throttled
// in a backgrounded/unfocused tab (OBS sources render normally and are unaffected).
setInterval(tick, 250);
</script>
