<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Top Splatty — Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.ably.com/lib/ably.min-2.js"></script>
<style>
  /* ══════════════════════════════════════════════════════════════
     TOP SPLATTY — two-throne battle overlay for the camera/game seam
     1080×1920 · transparent · TikTok Studio URL overlay
     ══════════════════════════════════════════════════════════════ */
  html, body {
    width: 1080px; height: 1920px;
    margin: 0; padding: 0;
    overflow: hidden;
    background: transparent;
  }
  #scene {
    position: relative;
    width: 1080px; height: 1920px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Boogaloo', cursive;
    overflow: hidden;
  }
  #scene * { box-sizing: border-box; }
  img { -webkit-user-drag: none; user-select: none; }

  /* ── connection dot ── */
  #conn-dot {
    position: absolute; top: 14px; left: 1052px;
    width: 13px; height: 13px; border-radius: 50%;
    background: #666; border: 2px solid rgba(0,0,0,.35);
    z-index: 99; transition: background .3s;
  }
  #conn-dot.connected { background: #35d97b; }

  /* ── thin seam rail (pure CSS — no PNG) ── */
  #rail {
    position: absolute; left: 0; width: 1080px; z-index: 5;
    background: linear-gradient(180deg, #7FE8F2 0%, #4CC3F7 55%, #2b9fd4 100%);
    border-top: 4px solid #1A0A2A; border-bottom: 4px solid #1A0A2A;
    box-shadow: 0 3px 0 rgba(26,10,42,.35);
    pointer-events: none;
  }

  /* ── sides ── */
  .side { position: absolute; z-index: 8; }
  .ped-wrap {
    position: absolute; z-index: 10;
    transition: transform .8s cubic-bezier(.34,1.2,.64,1);
  }
  .ped-img {
    position: absolute; object-fit: contain;
    transition: filter .5s, opacity .5s;
  }
  .ped-wrap.open .ped-img { filter: grayscale(.9) brightness(.75); opacity: .8; }
  .ped-wrap.open .crown-img { opacity: .45; filter: saturate(.4); }

  .char-wrap {
    position: absolute; z-index: 12;
    transform-origin: 50% 100%;
  }
  .char-wrap.hidden-char { display: none; }
  /* new skin art is trimmed tight — bottom-anchor it in the box; the old
     generic canvas has ~15% empty margin below the feet (.gen-art shifts it) */
  .char-img {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    object-position: 50% 100%;
    transform-origin: 50% 100%;
  }
  .char-wrap.gen-art .char-img { top: 15.5%; }
  .char-flip .char-img { scale: -1 1; }   /* the `scale` property survives transform animations */
  .char-wrap.single .char-img { animation: tsBreathe 2.6s ease-in-out infinite; }
  @keyframes tsBreathe {
    0%, 100% { transform: none; }
    50% { transform: translateY(3px) scaleY(.965); }
  }

  /* real art keeps its aspect ratio */
  .char-img, .proj, .fx, .ped-img, .crown-img,
  .splat-decal, #chance .chance-pointer { object-fit: contain; }

  /* squash-and-shake states applied on the wrap so frames keep playing */
  .char-wrap.wobble { animation: tsWobble .7s ease-out; }
  @keyframes tsWobble {
    0% { transform: rotate(0deg); }
    18% { transform: rotate(-9deg) translateX(-10px); }
    40% { transform: rotate(7deg) translateX(8px); }
    62% { transform: rotate(-4deg) translateX(-5px); }
    82% { transform: rotate(2deg) translateX(2px); }
    100% { transform: rotate(0deg); }
  }
  .char-wrap.knockback-left  { animation: tsKbL .8s cubic-bezier(.2,.9,.3,1); }
  .char-wrap.knockback-right { animation: tsKbR .8s cubic-bezier(.2,.9,.3,1); }
  @keyframes tsKbL {
    0% { transform: translateX(0) scaleY(1); }
    22% { transform: translateX(-34px) scaleY(.82) scaleX(1.12); }
    55% { transform: translateX(-18px) scaleY(1.06); }
    100% { transform: translateX(0) scaleY(1); }
  }
  @keyframes tsKbR {
    0% { transform: translateX(0) scaleY(1); }
    22% { transform: translateX(34px) scaleY(.82) scaleX(1.12); }
    55% { transform: translateX(18px) scaleY(1.06); }
    100% { transform: translateX(0) scaleY(1); }
  }
  .char-wrap.fall-left  { animation: tsFallL 1s cubic-bezier(.5,0,.8,.4) forwards; }
  .char-wrap.fall-right { animation: tsFallR 1s cubic-bezier(.5,0,.8,.4) forwards; }
  @keyframes tsFallL {
    0%   { transform: translate(0,0) rotate(0deg); opacity: 1; }
    100% { transform: translate(-260px, 420px) rotate(-160deg); opacity: 0; }
  }
  @keyframes tsFallR {
    0%   { transform: translate(0,0) rotate(0deg); opacity: 1; }
    100% { transform: translate(260px, 420px) rotate(160deg); opacity: 0; }
  }
  .char-wrap.arrive { animation: tsArrive .65s cubic-bezier(.34,1.56,.64,1); }
  @keyframes tsArrive {
    0% { transform: translateY(-190px) scaleY(1.15); opacity: 0; }
    60% { transform: translateY(0) scaleY(.8) scaleX(1.15); opacity: 1; }
    100% { transform: translateY(0) scaleY(1); }
  }

  .crown-img {
    position: absolute; z-index: 14; pointer-events: none;
    animation: tsCrownBob 2.6s ease-in-out infinite;
  }
  @keyframes tsCrownBob {
    0%,100% { transform: translateY(0) rotate(-6deg); }
    50% { transform: translateY(-7px) rotate(4deg); }
  }

  /* ── champ plate — cream sticker with wonky corners, per the layout mock ── */
  .plate {
    position: absolute; z-index: 14;
    display: flex; align-items: center; gap: 8px;
    background: #FFF6D8;
    border: 5px solid #1A0A2A;
    box-shadow: 0 6px 0 rgba(26,10,42,.85);
    padding: 0 14px;
    transition: border-color .3s, box-shadow .3s;
  }
  #side-youtube .plate { border-radius: 26px 14px 24px 16px; transform: rotate(-2deg); }
  #side-tiktok  .plate { border-radius: 16px 26px 14px 24px; transform: rotate(2deg); }
  .plate .p-name {
    overflow: hidden; white-space: nowrap; flex: 1 1 auto; min-width: 0;
    font-size: 23px; color: #3B0764; line-height: 1;
  }
  .plate .p-amt {
    flex: none; font-size: 23px; color: var(--side-amt, #3B0764); line-height: 1;
    white-space: nowrap;
  }
  .plate .p-icon { width: 24px; height: 24px; object-fit: contain; flex: none; display: block; position: relative; }
  .p-icon.icon-jewel, .t-icon.icon-jewel { top: 3px; }    /* the two PNGs have different padding */
  .p-icon.icon-coin,  .t-icon.icon-coin  { top: -1px; }
  .plate.gold-flash {
    border-color: #FFD25A;
    box-shadow: 0 0 16px rgba(255,210,90,.95), 0 6px 0 rgba(26,10,42,.85);
  }

  /* marquee — only when the name overflows (JS sets --dist + .scroll) */
  .m-scroll { display: inline-block; }
  .scroll .m-scroll { animation: tsMarquee 5.5s ease-in-out infinite alternate; }
  @keyframes tsMarquee { from { transform: translateX(0); } to { transform: translateX(var(--dist, -40px)); } }

  /* ── challenger ticket — dark bar with a %-to-steal fill, per the mock ── */
  .ticket {
    position: absolute; z-index: 13;
    background: #2A0845;
    border: 4px solid var(--side-edge, #7B2FBE);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 5px 0 rgba(26,10,42,.55);
    transition: filter .6s, border-color .6s;
  }
  .ticket .t-fill {
    position: absolute; left: 0; top: 0; height: 100%;
    background: var(--side-fill, rgba(123,47,190,.5));
    transition: width .7s cubic-bezier(.2,.9,.3,1);
  }
  .ticket .t-row {
    position: absolute; inset: 0;
    display: flex; align-items: center; gap: 7px;
    padding: 0 11px;
  }
  .ticket .t-name {
    overflow: hidden; white-space: nowrap; flex: 1 1 auto; min-width: 0;
    font-size: 16px; color: var(--tick-name, #E9DEFB); line-height: 1;
  }
  .ticket .t-amt { flex: none; font-size: 19px; color: #FFF6D8; white-space: nowrap; line-height: 1; }
  .ticket .t-icon { width: 22px; height: 22px; object-fit: contain; flex: none; display: block; position: relative; }
  .ticket .t-crown { font-size: 14px; line-height: 1; flex: none; }
  .ticket.dim { filter: grayscale(1) brightness(.72); border-color: #4a4356; }
  .ticket.empty { visibility: hidden; }
  .ticket.steal-hold { border-color: #FFD25A; }

  /* ── fan crowd — one little cheering splatty per unique gifter (max 3) ── */
  .fan {
    position: absolute; z-index: 9; object-fit: contain;
    pointer-events: none;
    transform-origin: 50% 100%;
    animation: tsFanCheer 2.2s ease-in-out infinite;
  }
  .fan.f2 { animation-delay: .4s; }
  .fan.f3 { animation-delay: .9s; }
  .fan.mirror { scale: -1 1; }
  @keyframes tsFanCheer {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-4px) scaleY(1.03); }
  }
  .fan.hop { animation: tsFanHop .55s cubic-bezier(.34,1.56,.64,1); }
  @keyframes tsFanHop {
    0% { transform: translateY(0); }
    40% { transform: translateY(-16px) scaleY(1.08); }
    70% { transform: translateY(2px) scaleY(.92); }
    100% { transform: translateY(0); }
  }
  .fan.hype { animation: tsFanHype .9s cubic-bezier(.34,1.56,.64,1); }
  @keyframes tsFanHype {
    0% { transform: translateY(0) rotate(0); }
    30% { transform: translateY(-26px) rotate(-8deg) scaleY(1.1); }
    55% { transform: translateY(0) scaleY(.9); }
    75% { transform: translateY(-12px) rotate(6deg); }
    100% { transform: translateY(0); }
  }

  /* ── empty-throne tag ── */
  .open-tag {
    position: absolute; z-index: 14; text-align: center;
    background: rgba(26,10,42,.78);
    border: 2.5px dashed #C084FC; border-radius: 14px;
    color: #E9DEFB; font-size: 17px; letter-spacing: 1.5px;
    padding: 5px 10px 7px; line-height: 1.15;
  }
  .open-tag small { display: block; font-size: 12px; letter-spacing: .5px; color: #C084FC; }

  /* ── STOLE IT! burst ── */
  .steal-burst {
    position: absolute; z-index: 26;
    background: #FFD25A; color: #1A0A2A;
    border: 3.5px solid #1A0A2A; border-radius: 999px;
    font-size: 24px; letter-spacing: 1px; padding: 5px 16px;
    white-space: nowrap;
    opacity: 0; pointer-events: none;
    transform-origin: 50% 100%;
  }
  .steal-burst.show { animation: tsBurst 1.8s cubic-bezier(.34,1.56,.64,1) forwards; }
  @keyframes tsBurst {
    0% { opacity: 0; transform: scale(.4) rotate(-8deg); }
    14% { opacity: 1; transform: scale(1.15) rotate(3deg); }
    24% { transform: scale(1) rotate(-2deg); }
    82% { opacity: 1; transform: scale(1); }
    100% { opacity: 0; transform: scale(.85) translateY(-14px); }
  }

  .plate.bump { animation: tsBump .45s cubic-bezier(.34,1.56,.64,1); }
  @keyframes tsBump { 0%{transform:scale(1)} 40%{transform:scale(1.14)} 100%{transform:scale(1)} }

  /* crown hop during a crown transfer */
  .crown-img.transfer { animation: tsCrownHop .9s cubic-bezier(.34,1.56,.64,1); }
  @keyframes tsCrownHop {
    0% { transform: translateY(-70px) rotate(-50deg); opacity: 0; }
    55% { transform: translateY(6px) rotate(8deg); opacity: 1; }
    75% { transform: translateY(-4px) rotate(-4deg); }
    100% { transform: translateY(0) rotate(-6deg); }
  }

  .splat-decal {
    position: absolute; z-index: 13; pointer-events: none;
    opacity: 0; transition: opacity .5s;
  }
  .splat-decal.show { opacity: .92; }

  /* ── lane announcements — CSS pill in the center gap, above the rail ── */
  #announce {
    position: absolute; z-index: 30;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none; opacity: 0;
  }
  #announce.show { animation: tsAnnounce var(--ann-ms, 2000ms) cubic-bezier(.2,.9,.3,1) forwards; }
  @keyframes tsAnnounce {
    0% { opacity: 0; transform: scale(.6) translateY(16px); }
    10% { opacity: 1; transform: scale(1.06) translateY(0); }
    15% { transform: scale(1); }
    88% { opacity: 1; transform: scale(1); }
    100% { opacity: 0; transform: scale(.92) translateY(-10px); }
  }
  #announce .ann-text {
    text-align: center;
    background: rgba(26,10,42,.88);
    border: 3px solid #C084FC; border-radius: 999px;
    padding: 7px 22px 9px;
    font-size: 27px; line-height: 1.05; color: #FAF5FF; letter-spacing: 1px;
    max-width: 100%;
  }
  #announce.kind-steal .ann-text { color: #FFE277; border-color: #FFD25A; font-size: 30px; }
  #announce.kind-compare .ann-text { color: #9FE8FF; }
  #announce.kind-whiff .ann-text { color: #C9BFD8; }

  /* ── chance spinner — 3-slot reel in the center gap, on the rail ── */
  #chance {
    position: absolute; z-index: 32; opacity: 0; pointer-events: none;
  }
  #chance.show { opacity: 1; animation: tsChanceIn .18s ease-out; }
  @keyframes tsChanceIn { from { transform: scale(.7); } to { transform: scale(1); } }
  #chance .chance-caption {
    position: absolute; left: 0; right: 0; text-align: center;
    font-size: 19px; color: #FFF6D8; letter-spacing: .5px;
    text-shadow: 0 2px 0 #1A0A2A, 0 0 10px rgba(0,0,0,.8);
    white-space: nowrap;
  }
  #chance .chance-reel {
    position: absolute; left: 0; right: 0; bottom: 0;
    display: flex; align-items: stretch; justify-content: center; gap: 0;
    background: linear-gradient(180deg, #efe0ff, #d9bcff);
    border: 3.5px solid #1A0A2A; border-radius: 16px;
    overflow: hidden;
  }
  #chance .chance-reel.has-art { background: none; border: none; border-radius: 0; }
  #chance .chance-reel.has-art .slot.mid { background: none; border-left: none; border-right: none; }
  #chance .chance-reel-bg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: fill; }
  #chance .slot {
    position: relative; z-index: 2; flex: 1;
    display: flex; align-items: center; justify-content: center;
    font-size: 17px; letter-spacing: 1px; color: #8a76ad;
    white-space: nowrap; overflow: hidden; padding: 0 4px;
  }
  #chance .slot.mid {
    flex: 1.5; font-size: 24px; color: #7B2FBE;
    background: rgba(255,255,255,.65);
    border-left: 2.5px solid #1A0A2A; border-right: 2.5px solid #1A0A2A;
  }
  #chance .chance-pointer {
    position: absolute; z-index: 3; object-fit: contain;
  }
  #chance.landed .slot.mid { animation: tsLanded .35s cubic-bezier(.34,1.56,.64,1); color: #c8342c; }
  @keyframes tsLanded { 0%{transform:scale(.7)} 55%{transform:scale(1.25)} 100%{transform:scale(1)} }

  /* ── projectiles / fx ── */
  #proj-layer { position: absolute; inset: 0; z-index: 20; pointer-events: none; overflow: visible; }
  #fx-layer   { position: absolute; inset: 0; z-index: 22; pointer-events: none; overflow: visible; }
  .proj { position: absolute; will-change: transform; }
  .fx   { position: absolute; will-change: transform, opacity; }

  /* ── debug ── */
  #debug-seam {
    position: absolute; left: 0; width: 1080px; height: 2px;
    background: rgba(0,255,255,.6); z-index: 90; display: none;
  }
  #debug-hud {
    position: absolute; top: 40px; left: 20px; z-index: 90; display: none;
    font-family: 'DM Sans', sans-serif; font-size: 15px; color: #9FE8FF;
    background: rgba(10,2,20,.7); padding: 8px 12px; border-radius: 8px;
    white-space: pre;
  }
  body.debug #debug-seam, body.debug #debug-hud { display: block; }
</style>
</head>
<body>
<div id="scene">
  <div id="rail"></div>

  <div id="side-youtube" class="side"></div>
  <div id="side-tiktok" class="side"></div>

  <div id="fans-youtube"></div>
  <div id="fans-tiktok"></div>

  <div id="proj-layer"></div>
  <div id="fx-layer"></div>

  <div id="announce">
    <div class="ann-text"></div>
  </div>

  <div id="chance">
    <div class="chance-caption"></div>
    <div class="chance-reel">
      <img class="chance-reel-bg" alt="">
      <div class="slot pre"></div>
      <div class="slot mid">…</div>
      <div class="slot post"></div>
    </div>
    <img class="chance-pointer" alt="">
  </div>

  <div id="debug-seam"></div>
  <div id="debug-hud"></div>
  <div id="conn-dot" title="Ably connection"></div>
</div>

<script>
/* ════════════════════════════════════════════════════════════════
   TOP SPLATTY — overlay logic
   Receives real gifts from stream-dock's 'gift-alert' Ably broadcast
   (channel: splat-overlay) and commands from top-splatty-control.html
   via the 'top-splatty' message name on the same channel.
   ════════════════════════════════════════════════════════════════ */

const CONFIG = {
  /* ── Assets ──
     Base URL of the art package. Relative path works when the overlay
     and assets/ live in the same GitHub Pages repo. Any missing file
     automatically falls back to a generated placeholder so the whole
     mechanic runs before the final art is uploaded. */
  ASSET_BASE: 'assets/top-splatty/',

  /* ── Layout ── */
  SEAM_Y: 940,            // px from top where camera bottom meets game top (controller-adjustable)
  UI_SCALE: 1.0,          // scales pedestals/characters/info blocks (controller-adjustable)
  MAX_LIFT: 24,           // px each throne cluster rises/sinks for the height comparison
  NECK_AND_NECK: 0.12,    // if normalized totals are within 12% → treat as even

  /* ── Value normalization (hidden score for cross-platform compare only —
        USD is NEVER rendered on screen) ── */
  COIN_TO_USD: 0.005,     // TikTok coin → USD-ish
  JEWEL_TO_USD: 0.005,    // YouTube jewel → USD-ish
  /* YouTube side is locked to jewels. Superchats are IGNORED by default so no
     dollar value ever appears; flip to true to count them (converted to
     jewel-equivalents at $0.005/jewel so units stay consistent). */
  YT_SUPERCHATS: false,

  /* ── Gift tiers, thresholds in normalized USD of the single gift ── */
  TIERS: { t2: 0.5, t3: 5, t4: 25 },

  /* ── Chance roll weights per tier: [WHIFF, TOSS, DOUBLE TOSS, BIG BONK, SPLAT HIT] ── */
  CHANCE_WEIGHTS: {
    1: [45, 40, 8, 5, 2],
    2: [28, 45, 13, 9, 5],
    3: [14, 38, 18, 16, 14],
    4: [4, 28, 21, 23, 24],
  },

  /* ── Lane callout toggles (controller-adjustable, persisted) ── */
  CALLOUTS: {
    gift: true,      // "JOE SENT 5,000 COINS"
    chance: true,    // the WHIFF/TOSS spinner strip
    outcome: true,   // "JOE BONKED YOUTUBE" / "AIR BALL"
    steal: true,     // "JOE STOLE TIKTOK TOP SPLATTY" / "ALL HAIL JOE"
    compare: true,   // "TIKTOK IS AHEAD" / "NECK AND NECK"
    hype: true,      // periodic idle bait lines
  },

  /* ── Redesign knobs (controller-adjustable, persisted) ── */
  ROTATION_S: 6,          // challenger ticket rotation period
  STEAL_SHOW_S: 5,        // how long a !steal requester owns the ticket
  STEAL_CD_S: 30,         // per-user !steal cooldown
  IDLE_DIM: true,         // grey the tickets when the lane goes quiet
  IDLE_AFTER_S: 60,       // quiet seconds before dimming
  SKIN: { youtube: 'auto', tiktok: 'auto' },  // auto | yt | tt | generic
  FANS: true,             // little cheering splatties = unique gifters (max 3/side)
  CMD_STEAL: '!steal',
  CMD_THRONE: '!throne',

  /* ── Timing ── */
  ANNOUNCE_GIFT_MS: 1700,
  ANNOUNCE_BIG_MS: 2600,
  CHANCE_SPIN_MS: 900,
  CHANCE_HOLD_MS: 650,
  IDLE_ACT_MIN_S: 5,      // idle flex every 5–11s
  IDLE_ACT_MAX_S: 11,
  HYPE_EVERY_S: 75,       // bait/taunt announcement cadence when lane is quiet
  COMPARE_MIN_GAP_S: 20,  // min seconds between height-comparison callouts

  /* ── Audio (tiny WebAudio blips — no files needed; set enabled:false to mute) ── */
  SFX: { enabled: true, volume: 0.4 },

  /* ── Ably ──
     splat-overlay is the busy shared channel (mic-freq audio relay lives
     there — the dominant message cost). We attach to it ONLY for gift-alert.
     All Top Splatty command/status chatter uses its own quiet channel so it
     never multiplies deliveries of the high-frequency traffic. */
  ABLY_KEY: 'Y8e-eA.l0VHlg:aJXsEfu1Be4BYsAeATRMI3w30YAKSs_LyF3DPoesIz0',
  ABLY_CHANNEL: 'splat-overlay',        // gift-alert subscription only
  SYNC_CHANNEL: 'top-splatty-sync',     // commands in, status out
  MSG_IN: 'top-splatty',          // controller → overlay commands
  MSG_OUT: 'top-splatty-status',  // overlay → controller state mirror
  GIFT_ALERT: 'gift-alert',       // stream-dock's existing gift broadcast
};

/* v2: YouTube totals are stored in JEWELS (v1 stored dollars) */
const LS_STATE = 'topSplatty.state.v2';
const LS_CFG   = 'topSplatty.cfg.v2';

/* ── sides ── */
const SIDES = {
  youtube: { label: 'YOUTUBE', dir: 1,  accent: '#FFB84A' },  // left, throws left→right
  tiktok:  { label: 'TIKTOK',  dir: -1, accent: '#5AD7F0' },  // right, throws right→left
};

/* ════════════════════════════════════════════════════════════════
   1. ASSET MANIFEST + PLACEHOLDER GENERATION
   Exact filenames from the art package. Missing files fall back to
   canvas-drawn placeholders so everything is testable pre-art.
   ════════════════════════════════════════════════════════════════ */

const SEQ_FRAMES = {
  idle:    ['character/splatty-idle-01', 'character/splatty-idle-02'],
  dance:   ['character/splatty-dance-01', 'character/splatty-dance-02', 'character/splatty-dance-03', 'character/splatty-dance-04'],
  taunt:   ['character/splatty-taunt-01', 'character/splatty-taunt-02', 'character/splatty-taunt-03'],

      for (let i = 0; i < 12; i++) { x.beginPath(); x.arc(90 + i * 130, i % 2 ? 34 : 286, 11, 0, 7); x.fill(); }
    });
    case 'chancePtr': return phCanvas(400, 400, (x) => {
      x.fillStyle = P.gold; x.strokeStyle = P.ink; x.lineWidth = 16;
      x.beginPath(); x.moveTo(90, 80); x.lineTo(310, 80); x.lineTo(200, 300); x.closePath(); x.fill(); x.stroke();
    });
    default: return plate(400, 200, P.deep, P.light, 40);
  }
}

/* ── asset resolver: real PNG with placeholder fallback ── */
const assetSrc = {};        // path → resolved src (real URL or placeholder dataURL)
let missingCount = 0, totalCount = 0;

function placeholderFor(path) {
  // character frames
  const m = path.match(/character\/splatty-(.+)$/);
  if (m) return phSplatty(m[1]);
  const t = path.match(/throwables\/throw-([a-z]+)-(flight|impact)$/);
  if (t) return phThrowable(t[1], t[2] === 'flight' ? 'flight' : 1);
  const f = path.match(/fx\/fx-([a-z]+)$/);
  if (f) return phFx(f[1] === 'confetti' ? 'flash' : f[1], 1);
  const f2 = path.match(/fx\/fx-([a-z]+)-0([12])$/);
  if (f2) return phFx(f2[1], +f2[2] - 1);
  for (const [k, v] of Object.entries(UI_ASSETS)) if (v === path) return phUi(k);
  return phUi('_');
}

function resolveAsset(path) {
  return new Promise((res) => {
    totalCount++;
    const url = CONFIG.ASSET_BASE + path + '.png';
    const img = new Image();
    img.onload = () => { assetSrc[path] = url; res(); };
    img.onerror = () => { assetSrc[path] = placeholderFor(path); missingCount++; res(); };
    img.src = url;
  });
}

function allAssetPaths() {
  const out = new Set(Object.values(UI_ASSETS));
  Object.values(SEQ_FRAMES).forEach(a => a.forEach(p => out.add(p)));
  Object.values(THROWABLES).forEach(o => { out.add(o.flight); o.impact.forEach(p => out.add(p)); });
  Object.values(FX).forEach(a => a.forEach(p => out.add(p)));
  return [...out];
}

/* ── redesign art probing (no placeholder fallback — absence means "use old art") ── */
function probeOptional(key, path) {
  return new Promise((res) => {
    const url = CONFIG.ASSET_BASE + path + '.png';
    const img = new Image();
    img.onload = () => { optSrc[key] = url; res(); };
    img.onerror = () => res();
    img.src = url;
  });
}
/* per-skin character frames: character/splatty-idle-01 → …-idle-yt-01 / …-idle-tt-01 */
function probeSideFrame(skin, genericPath) {
  return new Promise((res) => {
    const m = genericPath.match(/^(character\/splatty-.+)-(\d\d)$/);
    if (!m) return res();
    const url = `${CONFIG.ASSET_BASE}${m[1]}-${skin}-${m[2]}.png`;
    const img = new Image();
    img.onload = () => { sideFrames[skin][genericPath] = url; res(); };
    img.onerror = () => res();
    img.src = url;
  });
}
function allRedesignProbes() {
  const jobs = Object.entries(REDESIGN_PATHS).map(([k, p]) => probeOptional(k, p));
  const frames = new Set(); Object.values(SEQ_FRAMES).forEach(a => a.forEach(p => frames.add(p)));
  for (const f of frames) { jobs.push(probeSideFrame('yt', f)); jobs.push(probeSideFrame('tt', f)); }
  return jobs;
}

/* skin selection: auto → platform skin; explicit yt/tt/generic override */
function skinFor(side) {
  const v = (CONFIG.SKIN || {})[side] || 'auto';
  if (v === 'auto') return side === 'youtube' ? 'yt' : 'tt';
  return v === 'generic' ? null : v;
}
/* whole-sequence resolution: use the skin's frames when it has ANY for this
   pose (never mix skin + generic frames inside one sequence — colors clash) */
function seqFor(side, name) {
  const sk = skinFor(side);
  if (sk && sideFrames[sk]) {
    const srcs = SEQ_FRAMES[name].map(p => sideFrames[sk][p]).filter(Boolean);
    if (srcs.length) return { srcs, generic: false };
  }
  return { srcs: SEQ_FRAMES[name].map(p => assetSrc[p]), generic: true };
}
function iconSrcFor(side) {
  const key = side === 'youtube' ? 'iconYt' : 'iconTt';
  if (optSrc[key]) return optSrc[key];
  return side === 'youtube' ? phIcon('gem') : phIcon('coin');
}
const _phIconCache = {};
function phIcon(kind) {
  if (_phIconCache[kind]) return _phIconCache[kind];
  _phIconCache[kind] = phCanvas(96, 96, (x) => {
    x.strokeStyle = P.ink; x.lineWidth = 7;
    if (kind === 'gem') {
      x.fillStyle = '#ff5da2';
      x.beginPath();
      x.moveTo(48, 10); x.lineTo(82, 38); x.lineTo(48, 88); x.lineTo(14, 38); x.closePath();
      x.fill(); x.stroke();
      x.strokeStyle = 'rgba(255,255,255,.7)'; x.lineWidth = 4;
      x.beginPath(); x.moveTo(30, 38); x.lineTo(48, 24); x.lineTo(66, 38); x.stroke();
    } else {
      x.fillStyle = '#FFD25A';
      x.beginPath(); x.arc(48, 48, 38, 0, 7); x.fill(); x.stroke();
      x.fillStyle = '#9be9f2';
      x.beginPath(); x.arc(48, 48, 26, 0, 7); x.fill();
      x.strokeStyle = P.ink; x.lineWidth = 5;
      x.beginPath(); x.moveTo(44, 60); x.lineTo(44, 36); x.lineTo(58, 33); x.lineTo(58, 56); x.stroke();
      x.beginPath(); x.arc(41, 61, 5, 0, 7); x.fill(); x.beginPath(); x.arc(55, 57, 5, 0, 7); x.fill();
    }
  });
  return _phIconCache[kind];
}

/* ── cross-platform height comparison ── */
let lastLeader = null, lastCompareAt = 0;
function updateHeights(silent) {
  const yt = normTotal('youtube'), tt = normTotal('tiktok');
  const max = Math.max(yt, tt);
  let leader = 'even';
  if (max > 0) {
    const diff = Math.abs(yt - tt) / max;
    if (diff > CONFIG.NECK_AND_NECK) leader = yt > tt ? 'youtube' : 'tiktok';
  }
  const liftFor = (side) => {
    if (leader === 'even') return 0;
    const win = side === leader;
    if (max <= 0) return 0;
    const ratio = Math.min(1, Math.abs(yt - tt) / max);
    return (win ? -1 : 1) * CONFIG.MAX_LIFT * (0.45 + 0.55 * ratio);
  };
  for (const side of ['youtube', 'tiktok']) {
    const E = sideEls[side], lift = liftFor(side);
    E.lift = lift;
    E.pedWrap.style.transform = `translateY(${lift}px)`;
  }
  if (!silent && CONFIG.CALLOUTS.compare && leader !== lastLeader && (Date.now() - lastCompareAt) / 1000 > CONFIG.COMPARE_MIN_GAP_S) {
    lastCompareAt = Date.now();
    const lines = leader === 'even'
      ? ['NECK AND NECK', 'DEAD EVEN — SOMEBODY MOVE']
      : leader === 'youtube'
        ? ['YOUTUBE IS WINNING', 'TIKTOK GOT DROPPED', 'YOUTUBE IS HIGHER']
        : ['TIKTOK IS AHEAD', 'YOUTUBE NEEDS A HERO', 'TIKTOK IS HIGHER'];
    laneQueue.push({ kind: 'compare', text: pick(lines), ms: 2200 });
    pumpLane();
  }
  lastLeader = leader;
}

    this.busy = false;      // true while a scripted action owns the character
  }
  stop() { if (this.timer) { clearTimeout(this.timer); this.timer = null; } }
  /* play a named sequence; resolves when done (or never, if loop) */
  play(name, { fps = 5, loop = false, cycles = 1 } = {}) {
    this.stop();
    this.current = name;
    const { srcs, generic } = seqFor(this.side, name);
    let frames = srcs;
    if (frames.length === 1 && !loop) frames = [frames[0], frames[0]];  // keep the beat length
    const wrap = sideEls[this.side].charWrap;
    wrap.classList.toggle('gen-art', generic);          // untrimmed old canvas needs the foot shift
    wrap.classList.toggle('single', frames.length === 1 && loop);  // single-pose skins get CSS breathe
    return new Promise((resolve) => {
      if (loop && frames.length === 1) { this.img.src = frames[0]; return; }  // static pose + CSS breathe
      let i = 0, played = 0;
      const step = () => {
        this.img.src = frames[i];
        i++;
        if (i >= frames.length) {
          i = 0; played++;
          if (!loop && played >= cycles) { this.timer = null; resolve(); return; }
        }
        this.timer = setTimeout(step, 1000 / fps);
      };
      step();
    });
  }
  idle() { this.busy = false; this.play('idle', { fps: 2.1, loop: true }); }
}
const actors = { youtube: null, tiktok: null };

/* idle flex scheduler — cockiness rises the longer a throne goes unchallenged */
function scheduleIdleActs(side) {
  const next = () => (CONFIG.IDLE_ACT_MIN_S + Math.random() * (CONFIG.IDLE_ACT_MAX_S - CONFIG.IDLE_ACT_MIN_S)) * 1000;
  const tick = async () => {
    const a = actors[side];
    if (state.top[side] && a && !a.busy) {
      const cocky = Math.min(1, (Date.now() - (state.lastCrownChange[side] || 0)) / 240000); // maxes at 4 min
      const roll = Math.random();
      let seq = 'idle';
      if (roll < 0.30 + cocky * 0.25) seq = pick(['taunt', 'taunt', 'puff']);
      else if (roll < 0.62) seq = 'dance';
      if (seq !== 'idle' && !a.busy) {
        a.busy = true;
        await a.play(seq, { fps: seq === 'dance' ? 5 : 3.6, cycles: seq === 'dance' ? 2 : 1 });
        if (!a.busy) return;    // a scripted action took over mid-flex
        a.idle();
      }
    }
    setTimeout(tick, next());
  };
  setTimeout(tick, next() + (side === 'tiktok' ? 2600 : 0));
}

/* ════════════════════════════════════════════════════════════════
   5. LANE DIRECTOR — announcements + chance strip, serialized
   ════════════════════════════════════════════════════════════════ */

const laneQueue = [];
let lanePumping = false;
const pick = (a) => a[Math.floor(Math.random() * a.length)];

function announce(text, kind = 'gift', ms = CONFIG.ANNOUNCE_GIFT_MS) {
  return new Promise((res) => {
    const el = $('announce');
    el.className = 'kind-' + kind;
    el.style.setProperty('--ann-ms', ms + 'ms');
    el.querySelector('.ann-text').textContent = text;
    void el.offsetWidth;
    el.classList.add('show');
    setTimeout(() => { el.classList.remove('show'); res(); }, ms);
  });
}

const CHANCE_LABELS = ['WHIFF', 'TOSS', 'DOUBLE TOSS', 'BIG BONK', 'SPLAT HIT'];
function chanceRoll(tier) {
  const w = CONFIG.CHANCE_WEIGHTS[tier] || CONFIG.CHANCE_WEIGHTS[1];
  const sum = w.reduce((a, b) => a + b, 0);
  let r = Math.random() * sum;
  for (let i = 0; i < w.length; i++) { r -= w[i]; if (r <= 0) return i; }
  return 1;
}
function showChanceStrip(resultIdx, gifterName) {
  return new Promise((res) => {
    const el = $('chance');
    const pre = el.querySelector('.slot.pre'), mid = el.querySelector('.slot.mid'), post = el.querySelector('.slot.post');
    el.querySelector('.chance-caption').textContent = gifterName ? `${gifterName} spun a gift…` : 'gift spin…';
    const setSlots = (i) => {
      const n = CHANCE_LABELS.length;
      pre.textContent = CHANCE_LABELS[((i - 1) % n + n) % n];
      mid.textContent = CHANCE_LABELS[((i % n) + n) % n];
      post.textContent = CHANCE_LABELS[(i + 1) % n];
    };
    el.classList.add('show'); el.classList.remove('landed');
    let t = Math.floor(Math.random() * CHANCE_LABELS.length);
    setSlots(t);
    const spin = setInterval(() => { setSlots(++t); sfx('tick'); }, 90);
    setTimeout(() => {
      clearInterval(spin);
      setSlots(resultIdx);
      el.classList.add('landed');
      sfx(resultIdx === 0 ? 'whiff' : 'land');
      setTimeout(() => { el.classList.remove('show', 'landed'); res(); }, CONFIG.CHANCE_HOLD_MS);
    }, CONFIG.CHANCE_SPIN_MS);
  });
}

async function pumpLane() {
  if (lanePumping) return;
  lanePumping = true;
  while (laneQueue.length) {
    /* under spam pressure, drop chance visuals from older queued gifts */
    const overload = laneQueue.length > 4;
    const item = laneQueue.shift();
    try {
      if (item.kind === 'gift-flow') await runGiftFlow(item, overload);
      else if (item.kind === 'steal-flow') await runStealFlow(item);
      else await announce(item.text, item.kind, item.ms || 2000);
    } catch (e) { console.error('lane item failed', e); }
  }
  lanePumping = false;
}

/* ════════════════════════════════════════════════════════════════
   6. THROWS, IMPACTS, FX
   ════════════════════════════════════════════════════════════════ */

function sideCharCenter(side) {
  const E = sideEls[side];
  const rootX = parseFloat(E.root.style.left);
  const wrapTop = parseFloat(E.pedWrap.style.top) + (E.lift || 0);
  return {
    x: rootX + G.clusterW / 2,
    y: wrapTop + G.standYIn - G.charH * 0.26,   // torso height (art has top margin)
    handY: wrapTop + G.standYIn - G.charH * 0.30,
  };
}

/* throwable art fills ~55% of its canvas; sized to the smaller clusters */
function tierProjSize(tier) { return [0, 56, 76, 104, 140][tier] || 56; }

function spawnFx(kind, x, y, size) {
  const frames = FX[kind];
  const el = document.createElement('img');
  el.className = 'fx';
  el.style.width = size + 'px'; el.style.height = size + 'px';
  el.style.left = (x - size / 2) + 'px'; el.style.top = (y - size / 2) + 'px';
  el.src = assetSrc[frames[0]];
  $('fx-layer').appendChild(el);
  let i = 1;
  const iv = setInterval(() => {
    if (i < frames.length) { el.src = assetSrc[frames[i++]]; el.style.opacity = .85; }
    else { clearInterval(iv); el.style.transition = 'opacity .25s'; el.style.opacity = 0; setTimeout(() => el.remove(), 300); }
  }, 150);
}

function throwProjectile(fromSide, { tier = 1, objKind = null, whiff = false } = {}) {
  return new Promise((res) => {
    const toSide = fromSide === 'youtube' ? 'tiktok' : 'youtube';
    const obj = THROWABLES[objKind || pick(Object.keys(THROWABLES))];
    const from = sideCharCenter(fromSide);
    const to = sideCharCenter(toSide);
    const size = tierProjSize(tier) * (0.9 + Math.random() * 0.2);
    const el = document.createElement('img');
    el.className = 'proj';
    el.src = assetSrc[obj.flight];
    el.style.width = size + 'px'; el.style.height = size + 'px';
    $('proj-layer').appendChild(el);

    const frac = whiff ? 0.34 + Math.random() * 0.1 : 1;
    const x0 = from.x, y0 = from.handY;
    const x1 = x0 + (to.x - x0) * frac;
    const y1 = whiff ? G.seam + 26 : to.y;
    const arc = whiff ? 60 : 95 + tier * 12;
    const dur = whiff ? 620 : 660 + tier * 40;
    const spinDir = fromSide === 'youtube' ? 1 : -1;
    const t0 = performance.now();
    sfx('whoosh');

    /* hybrid driver: rAF for smoothness, interval as fallback so the flight
       always completes (and the lane queue never stalls) even if rAF is
       throttled by a hidden/occluded window */
    let finished = false;
    const step = () => {
      if (finished) return;
      const t = Math.min(1, (performance.now() - t0) / dur);
      const x = x0 + (x1 - x0) * t;
      const y = y0 + (y1 - y0) * t - arc * 4 * t * (1 - t);
      el.style.transform = `translate(${x - size / 2}px, ${y - size / 2}px) rotate(${spinDir * t * 640}deg)`;
      if (t < 1) return;
      finished = true;
      clearInterval(iv);
      el.remove();
      if (whiff) {
        spawnFx('dust', x1, G.seam + 8, size * 1.4);
        sfx('thud');
        res({ toSide, landed: false });
        return;
      }
      /* impact frames at the target */
      const imp = document.createElement('img');
      imp.className = 'proj';
      imp.style.width = (size * 1.5) + 'px'; imp.style.height = (size * 1.5) + 'px';
      imp.style.transform = `translate(${x1 - size * 0.75}px, ${y1 - size * 0.75}px)`;
      imp.src = assetSrc[obj.impact[0]];
      $('proj-layer').appendChild(imp);
      if (obj.impact[1]) setTimeout(() => { imp.src = assetSrc[obj.impact[1]]; }, 140);
      setTimeout(() => { imp.style.transition = 'opacity .3s'; imp.style.opacity = 0; setTimeout(() => imp.remove(), 320); }, 420);
      spawnFx(obj.fx, x1, y1, size * (obj.fx === 'splat' ? 2.1 : 1.9));
      sfx(obj.fx === 'splat' ? 'splat' : 'bonk');
      res({ toSide, landed: true, fxKind: obj.fx, x: x1, y: y1, size });
    };
    const iv = setInterval(step, 33);
    const raf = () => { if (finished) return; step(); requestAnimationFrame(raf); };
    requestAnimationFrame(raf);
  });
}

async function hitReaction(side, { tier = 1, splat = false } = {}) {
  const E = sideEls[side], a = actors[side];
  if (!state.top[side] || !a) return;   // empty throne: impact fx alone is enough
  a.busy = true;
  const kb = tier >= 3 ? (side === 'youtube' ? 'knockback-left' : 'knockback-right') : 'wobble';
  E.charWrap.classList.remove('wobble', 'knockback-left', 'knockback-right');
  void E.charWrap.offsetWidth;
  E.charWrap.classList.add(kb);
  if (splat) {
    const dImp = THROWABLES[Math.random() < .5 ? 'tomato' : 'pie'].impact;
    E.decal.src = assetSrc[dImp[1] || dImp[0]];
    E.decal.classList.add('show');
    setTimeout(() => E.decal.classList.remove('show'), 2600);
  }
  await a.play('hit', { fps: 4, cycles: 1 });
  E.charWrap.classList.remove(kb);
  a.idle();
}

/* full throw action from one side (windup → release → projectile → impact) */
async function performThrow(fromSide, { tier = 1, count = 1, whiff = false, objKind = null, big = false } = {}) {
  const a = actors[fromSide];
  const canAnimate = !!(state.top[fromSide] && a);
  if (canAnimate) {
    a.busy = true;
    await a.play('windup', { fps: 5 });
    a.play('release', { fps: 4 });
  }
  for (let i = 0; i < count; i++) {
    const kind = objKind || (big ? pick(['bone', 'moneybag', 'crown']) : null);
    const out = await throwProjectile(fromSide, { tier: big ? Math.max(tier, 3) : tier, objKind: kind, whiff });
    if (out.landed) hitReaction(out.toSide, { tier: big ? 4 : tier, splat: out.fxKind === 'splat' });
    if (i < count - 1) await new Promise(rs => setTimeout(rs, 240));
  }
  if (canAnimate) {
    await a.play('follow', { fps: 4 });
    a.idle();
  }
}

/* ════════════════════════════════════════════════════════════════
   7. GIFT FLOW
   ════════════════════════════════════════════════════════════════ */

/* re-derive the throne from the roster after a manual fix.
   animate=false → silent swap (no cinematic), for quiet corrections. */
function recomputeTop(side, { animate = false } = {}) {
  const all = Object.values(state.gifters[side]);
  const best = all.length ? all.reduce((a, b) => (b.total > a.total ? b : a)) : null;
  const cur = state.top[side];
  if (!best) {
    state.top[side] = null;
  } else if (!cur || keyOf(best.name) !== keyOf(cur.name)) {
    state.top[side] = { name: best.name, pic: best.pic || null, total: best.total };
    state.lastCrownChange[side] = Date.now();
    if (animate) {
      laneQueue.push({ kind: 'steal-flow', side, name: best.name, tier: 2, hadOld: !!cur, oldName: cur?.name });
      pumpLane();
    }
  } else {
    cur.total = best.total;
    if (best.pic) cur.pic = best.pic;
  }
  persistState();
  updateSideInfo(side, true);
  updateHeights();
}

function giftReceived(side, name, nativeAmount, usd, pic) {
  if (!SIDES[side] || !(nativeAmount > 0)) return;
  wakeIdle();
  fansReact(side, 'hop');
  const k = keyOf(name);
  const g = state.gifters[side][k] || (state.gifters[side][k] = { name, total: 0, pic: null });
  g.total += nativeAmount;
  g.name = name;
  if (pic) g.pic = pic;

  const top = state.top[side];
  const isHolder = top && keyOf(top.name) === k;
  const isSteal = !isHolder && (!top || g.total > top.total);
  const oldTop = top ? { ...top } : null;

  if (isSteal) {
    state.top[side] = { name: g.name, pic: g.pic, total: g.total };
    state.lastCrownChange[side] = Date.now();
  } else if (isHolder) {
    top.total = g.total;
    if (g.pic) top.pic = g.pic;
  }
  persistState();
  updateSideInfo(side, true);
  updateHeights();

  const tier = tierOfUsd(usd);
  if (isSteal) {
    laneQueue.push({ kind: 'steal-flow', side, name: g.name, tier, hadOld: !!oldTop, oldName: oldTop?.name });
  } else {
    laneQueue.push({ kind: 'gift-flow', side, name: g.name, nativeAmount, tier, isHolder });
  }
  pumpLane();
}

async function runGiftFlow(item, overload) {
  const { side, name, nativeAmount, tier, isHolder } = item;
  const C = CONFIG.CALLOUTS;
  const amtTxt = `${Math.round(nativeAmount).toLocaleString()} ${currencyWord(side)}`;
  if (C.gift) await announce(`${name.toUpperCase()} SENT ${amtTxt}`, 'gift',
    tier >= 3 ? CONFIG.ANNOUNCE_BIG_MS : CONFIG.ANNOUNCE_GIFT_MS);

  if (overload) {   // spam relief: totals already counted, skip the theatrics
    if (tier >= 2) performThrow(side, { tier, count: 1 });
    return;
  }

  let idx = chanceRoll(tier);
  if (isHolder && idx === 0) idx = 1;      // the champ flexing never fully whiffs
  if (C.chance) await showChanceStrip(idx, name);

  const opp = side === 'youtube' ? 'TIKTOK' : 'YOUTUBE';
  const NAME = name.toUpperCase();
  const say = (text, kind, ms) => { if (C.outcome) announce(text, kind, ms); };
  switch (idx) {
    case 0:
      await performThrow(side, { tier, whiff: true });
      say(pick([`${NAME} WHIFFED IT`, 'AIR BALL', 'NOT EVEN CLOSE']), 'whiff', 1500);
      break;
    case 1:
      await performThrow(side, { tier });
      say(pick([`${NAME} HIT ${opp}`, `${NAME} FIRED ONE OVER`, `${opp} CAUGHT ONE`]), 'throw', 1700);
      break;
    case 2:
      await performThrow(side, { tier, count: 2 });
      say(pick([`${NAME} DOUBLED UP`, `TWO SHOTS FROM ${NAME}`]), 'throw', 1700);
      break;
    case 3:
      await performThrow(side, { tier: Math.max(tier, 3), big: true });
      say(pick([`${NAME} BONKED ${opp}`, `BIG BONK BY ${NAME}`, `${opp} FELT THAT ONE`]), 'throw', 1900);
      break;
    case 4:
      await performThrow(side, { tier: Math.max(tier, 3), objKind: Math.random() < .5 ? 'tomato' : 'pie' });
      say(pick([`${NAME} SPLATTED ${opp}`, `DIRECT SPLAT BY ${NAME}`]), 'throw', 1900);
      break;
  }
  if (isHolder && idx >= 1) {
    const a = actors[side];
    if (a && !a.busy) { a.busy = true; await a.play('puff', { fps: 4 }); a.idle(); }
  }
}

async function runStealFlow(item) {
  const { side, name, hadOld, oldName } = item;
  const E = sideEls[side], a = actors[side];
  const plat = SIDES[side].label;
  const NAME = name.toUpperCase();

  if (hadOld && a) {
    a.busy = true;
    if (CONFIG.CALLOUTS.steal) announce(pick([
      `${NAME} STOLE ${plat} TOP SPLATTY`,
      `${NAME} KNOCKED ${(oldName || '').toUpperCase()} OFF`,
      `${(oldName || '').toUpperCase()} GOT TOO COMFORTABLE`,
    ]), 'steal', 2600);
    sfx('alarm');
    await a.play('shock', { fps: 4 });
    const fallCls = side === 'youtube' ? 'fall-left' : 'fall-right';
    E.charWrap.classList.add(fallCls);
    a.play('fall', { fps: 4 });
    await new Promise(r => setTimeout(r, 950));
    spawnFx('dust', sideCharCenter(side).x, G.seam + 10, 200);
    E.charWrap.classList.remove(fallCls);
    E.charWrap.classList.add('hidden-char');
  } else {
    if (CONFIG.CALLOUTS.steal) announce(`NEW ${plat} TOP SPLATTY`, 'steal', 2400);
  }

  /* arrival — crown hops onto the new champ, plate flashes gold, STOLE IT! */
  updateSideInfo(side);
  E.decal.classList.remove('show');
  E.charWrap.classList.remove('hidden-char');
  E.charWrap.classList.add('arrive');
  E.crown.classList.remove('transfer'); void E.crown.offsetWidth; E.crown.classList.add('transfer');
  E.plate.classList.add('gold-flash');
  setTimeout(() => E.plate.classList.remove('gold-flash'), 2400);
  if (hadOld && CONFIG.CALLOUTS.steal) {
    E.stealBurst.classList.remove('show'); void E.stealBurst.offsetWidth;
    E.stealBurst.classList.add('show');
    setTimeout(() => E.stealBurst.classList.remove('show'), 1900);
  }
  const c = sideCharCenter(side);
  spawnFx('flash', c.x, c.y, 220);
  fansReact(side, 'hype');
  sfx('fanfare');
  if (a) {
    a.busy = true;
    await a.play('victory', { fps: 4 });
    E.charWrap.classList.remove('arrive');
    E.crown.classList.remove('transfer');
    a.idle();
  }
  if (CONFIG.CALLOUTS.steal) announce(pick([
    `${NAME} IS THE NEW ${plat} TOP SPLATTY`,
    `ALL HAIL ${NAME}`,
    `SEND 1 MORE TO KNOCK ${NAME} OFF`,
  ]), 'steal', 2400);
}

/* ── periodic bait lines when the lane is quiet ── */
setInterval(() => {
  if (!CONFIG.CALLOUTS.hype) return;
  if (laneQueue.length || lanePumping) return;
  const occupied = ['youtube', 'tiktok'].filter(s => state.top[s]);
  if (!occupied.length) return;
  const side = pick(occupied);
  const t = state.top[side];
  const lines = [
    `${t.name.toUpperCase()} THINKS THEY OWN ${SIDES[side].label}`,
    `YOU GONNA LET ${t.name.toUpperCase()} STAY UP THERE?`,
    `${SIDES[side].label} TOP SPLATTY IS GETTING COMFY`,
  ];
  lines.push(`SEND ${fmtAmount(side, t.total + 1)} ${currencyWord(side)} TO STEAL ${SIDES[side].label}`);
  laneQueue.push({ kind: 'hype', text: pick(lines), ms: 2400 });
  pumpLane();
  const a = actors[side];
  if (a && !a.busy) { a.busy = true; a.play('taunt', { fps: 3.6 }).then(() => a.idle()); }
}, CONFIG.HYPE_EVERY_S * 1000);

/* ════════════════════════════════════════════════════════════════
   7b. CHALLENGER TICKETS, CHAT COMMANDS (!steal / !throne), IDLE DIM
   ════════════════════════════════════════════════════════════════ */

const ticketState = {
  youtube: { idx: 0, holdRow: null, holdUntil: 0 },
  tiktok:  { idx: 0, holdRow: null, holdUntil: 0 },
};
const stealCooldowns = {};        // viewer key → last !steal timestamp
let lastActivityAt = Date.now();

function wakeIdle() {
  lastActivityAt = Date.now();
  ['youtube', 'tiktok'].forEach(s => sideEls[s] && sideEls[s].ticket.classList.remove('dim'));
}

/* the next ~2 gifters chasing the crown on a side (champ excluded) */
function challengersFor(side) {
  const top = state.top[side];
  return Object.values(state.gifters[side])
    .filter(g => !top || keyOf(g.name) !== keyOf(top.name))
    .sort((a, b) => b.total - a.total)
    .slice(0, 2);
}

function renderTicket(side, row) {
  const E = sideEls[side];
  if (!row) { E.ticket.classList.add('empty'); return; }
  E.ticket.classList.remove('empty');
  applyMarquee(E.ticketName, E.ticketScroll, row.name);
  E.ticketAmt.textContent = fmtAmount(side, row.total);
  /* fill = % of the champ's total still to go (mock: 1401/2000 shows 30%) */
  const champ = state.top[side];
  const pct = champ && champ.total > 0
    ? Math.min(100, Math.max(0, (champ.total - row.total) / champ.total * 100))
    : 0;
  E.ticketFill.style.width = pct.toFixed(1) + '%';
}

function refreshTicket(side) {
  const ts = ticketState[side], E = sideEls[side];
  if (ts.holdRow && Date.now() < ts.holdUntil) { renderTicket(side, ts.holdRow); return; }
  if (ts.holdRow) { ts.holdRow = null; E.ticket.classList.remove('steal-hold'); }
  const rows = challengersFor(side);
  renderTicket(side, rows.length ? rows[ts.idx % rows.length] : null);
}

/* rotation loop — self-rescheduling so ROTATION_S changes apply live;
   pauses while the lane director is resolving a gift */
(function rotateTick() {
  setTimeout(() => {
    if (!lanePumping) {
      for (const side of ['youtube', 'tiktok']) {
        const ts = ticketState[side];
        if (!(ts.holdRow && Date.now() < ts.holdUntil)) ts.idx++;
        if (sideEls[side]) refreshTicket(side);
      }
    }
    rotateTick();
  }, Math.max(2, CONFIG.ROTATION_S) * 1000);
})();

/* idle dim — tickets mute to grey (opaque) when the lane goes quiet */
setInterval(() => {
  const idle = CONFIG.IDLE_DIM && (Date.now() - lastActivityAt) / 1000 > CONFIG.IDLE_AFTER_S;
  ['youtube', 'tiktok'].forEach(s => sideEls[s] && sideEls[s].ticket.classList.toggle('dim', idle));
}, 3000);

/* chat commands ride stream-dock's existing milk-event comment relay */
function onChat(d) {
  if (!d || d.type !== 'comment') return;
  const text = String(d.message || '').trim().toLowerCase();
  if (!text.startsWith('!')) return;
  const user = String(d.username || '').replace(/^@/, '').trim();
  const plat = (d.platform || '').toLowerCase();
  const side = plat === 'youtube' ? 'youtube' : plat === 'tiktok' ? 'tiktok' : null;

  if (text.startsWith(CONFIG.CMD_THRONE)) {
    wakeIdle();
    ['youtube', 'tiktok'].forEach(refreshTicket);
    return;
  }
  if (text.startsWith(CONFIG.CMD_STEAL) && side && user) {
    const k = keyOf(user), now = Date.now();
    if (stealCooldowns[k] && now - stealCooldowns[k] < CONFIG.STEAL_CD_S * 1000) return;
    stealCooldowns[k] = now;
    wakeIdle();
    const rec = state.gifters[side][k];
    const ts = ticketState[side];
    ts.holdRow = { name: rec ? rec.name : user, total: rec ? rec.total : 0 };
    ts.holdUntil = now + CONFIG.STEAL_SHOW_S * 1000;
    sideEls[side].ticket.classList.add('steal-hold');
    renderTicket(side, ts.holdRow);
  }
}

/* ════════════════════════════════════════════════════════════════
   8. SFX — tiny WebAudio blips (placeholder-grade, no files)
   ════════════════════════════════════════════════════════════════ */
let AC = null;
function ac() { if (!AC) try { AC = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} return AC; }
function sfx(kind) {
  if (!CONFIG.SFX.enabled) return;
  const a = ac(); if (!a) return;
  const t = a.currentTime, vol = CONFIG.SFX.volume;
  const osc = (type, f0, f1, dur, v) => {
    const o = a.createOscillator(), g = a.createGain();
    o.type = type; o.frequency.setValueAtTime(f0, t);
    o.frequency.exponentialRampToValueAtTime(Math.max(30, f1), t + dur);
    g.gain.setValueAtTime(v * vol, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    o.connect(g).connect(a.destination); o.start(t); o.stop(t + dur);
  };
  const noise = (dur, v, fc) => {
    const n = a.createBufferSource(), buf = a.createBuffer(1, a.sampleRate * dur, a.sampleRate);
    const d = buf.getChannelData(0); for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
    n.buffer = buf;
    const f = a.createBiquadFilter(); f.type = 'bandpass'; f.frequency.value = fc;
    const g = a.createGain(); g.gain.setValueAtTime(v * vol, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    n.connect(f).connect(g).connect(a.destination); n.start(t);
  };
  switch (kind) {
    case 'tick': osc('square', 900, 700, .04, .12); break;
    case 'land': osc('triangle', 300, 900, .18, .5); break;
    case 'whiff': osc('sine', 500, 140, .3, .35); break;
    case 'whoosh': noise(.28, .3, 1400); break;
    case 'bonk': osc('sine', 180, 60, .22, .8); noise(.1, .25, 800); break;
    case 'splat': noise(.24, .55, 500); osc('sine', 220, 70, .18, .4); break;
    case 'thud': osc('sine', 140, 50, .18, .5); break;
    case 'alarm': osc('square', 620, 620, .1, .3); setTimeout(() => osc('square', 480, 480, .12, .3), 120); break;
    case 'fanfare': [523, 659, 784, 1046].forEach((f, i) => setTimeout(() => osc('triangle', f, f, .22, .4), i * 110)); break;
  }
}

/* ════════════════════════════════════════════════════════════════
   9. ABLY + COMMANDS + STATUS
   ════════════════════════════════════════════════════════════════ */

let ablyChannel = null, syncChannel = null;

function onGiftAlert(d) {
  d = d || {};
  const type = (d.type || '').toLowerCase();
  let side = (d.platform || '').toLowerCase();
  if (side !== 'tiktok' && side !== 'youtube') {
    if (type === 'tiktok_coins') side = 'tiktok';
    else if (type.startsWith('youtube')) side = 'youtube';
    else return;
  }
  const amt = +d.amount || 0;
  if (amt <= 0) return;
  let native, usd;
  if (side === 'tiktok') {                        // native unit: coins
    native = amt; usd = amt * CONFIG.COIN_TO_USD;
  } else if (type === 'youtube_jewels') {         // native unit: jewels
    native = amt; usd = amt * CONFIG.JEWEL_TO_USD;
  } else {                                        // superchats: off by default
    if (!CONFIG.YT_SUPERCHATS) return;
    native = Math.round(amt / CONFIG.JEWEL_TO_USD);   // dollars → jewel-equivalent
    usd = amt;
  }
  giftReceived(side, d.name || 'Anonymous', native, usd, d.profilePic || d.chatimg || d.avatar || null);
}

function onCommand(d) {
  d = d || {};
  switch (d.cmd) {
    case 'reset':
      state = { top: { youtube: null, tiktok: null }, gifters: { youtube: {}, tiktok: {} }, lastCrownChange: { youtube: 0, tiktok: 0 } };
      persistState();
      ['youtube', 'tiktok'].forEach(s => updateSideInfo(s));
      updateHeights(true);
      laneQueue.length = 0;
      announce('FRESH THRONES — WHO WANTS IT?', 'steal', 2400);
      break;
    case 'reset-side':
      if (SIDES[d.platform]) {
        state.top[d.platform] = null;
        state.gifters[d.platform] = {};
        persistState(); updateSideInfo(d.platform); updateHeights(true);
      }
      break;
    case 'seam':
      CONFIG.SEAM_Y = Math.min(Math.max(+d.y || 940, 300), 1600);
      cfgOverride.seamY = CONFIG.SEAM_Y; persistCfg(); applyLayout();
      break;
    case 'scale':
      CONFIG.UI_SCALE = Math.min(Math.max(+d.v || 1, 0.6), 1.6);
      cfgOverride.uiScale = CONFIG.UI_SCALE; persistCfg(); applyLayout();
      break;
    case 'debug':
      document.body.classList.toggle('debug', !!d.on);
      break;
    case 'callouts':
      /* d: {key, on} for one toggle, or {set:{...}} for several */
      if (d.set && typeof d.set === 'object') {
        for (const k of Object.keys(CONFIG.CALLOUTS))
          if (k in d.set) CONFIG.CALLOUTS[k] = !!d.set[k];
      } else if (d.key in CONFIG.CALLOUTS) {
        CONFIG.CALLOUTS[d.key] = !!d.on;
      }
      cfgOverride.callouts = CONFIG.CALLOUTS; persistCfg();
      break;
    case 'redesign':
      /* d: {rotationS?, stealCdS?, idleDim?, idleAfterS?, skin?:{youtube,tiktok}} */
      if (+d.rotationS >= 2) { CONFIG.ROTATION_S = +d.rotationS; cfgOverride.rotationS = CONFIG.ROTATION_S; }
      if (d.stealCdS != null && +d.stealCdS >= 0) { CONFIG.STEAL_CD_S = +d.stealCdS; cfgOverride.stealCdS = CONFIG.STEAL_CD_S; }
      if (d.idleDim != null) { CONFIG.IDLE_DIM = !!d.idleDim; cfgOverride.idleDim = CONFIG.IDLE_DIM; }
      if (d.fans != null) {
        CONFIG.FANS = !!d.fans; cfgOverride.fans = CONFIG.FANS;
        ['youtube', 'tiktok'].forEach(updateFans);
      }
      if (+d.idleAfterS >= 10) { CONFIG.IDLE_AFTER_S = +d.idleAfterS; cfgOverride.idleAfterS = CONFIG.IDLE_AFTER_S; }
      if (d.skin && typeof d.skin === 'object') {
        for (const s of ['youtube', 'tiktok'])
          if (['auto', 'yt', 'tt', 'generic'].includes(d.skin[s])) CONFIG.SKIN[s] = d.skin[s];
        cfgOverride.skin = CONFIG.SKIN;
        applySkins();
      }
      persistCfg();
      wakeIdle();
      break;
    case 'sfx':
      CONFIG.SFX.enabled = !!d.on;
      break;
    case 'announce':
      if (d.text) { laneQueue.push({ kind: 'hype', text: String(d.text).slice(0, 60), ms: 2600 }); pumpLane(); }
      break;
    case 'set-top':
      /* force this viewer onto the throne; bumps their total above the roster
         max if needed so the next real gift can't instantly re-steal it */
      if (SIDES[d.platform] && d.name && +d.amount > 0) {
        const k = keyOf(d.name);
        const others = Object.entries(state.gifters[d.platform])
          .filter(([kk]) => kk !== k)
          .map(([, g]) => g.total);
        const floor = others.length ? Math.max(...others) : 0;
        const bump = 1;   // both platforms use whole native units (coins / jewels)
        const total = Math.max(+d.amount, floor > 0 ? floor + bump : 0);
        state.gifters[d.platform][k] = { name: d.name, total, pic: d.pic || null };
        recomputeTop(d.platform, { animate: !!d.animate });
      }
      break;
    case 'adjust':
      /* add/remove coins or $ for a viewer (missed gifts, refunds).
         d: {platform, name, delta} or {platform, name, mode:'set', amount} */
      if (SIDES[d.platform] && d.name) {
        const k = keyOf(d.name);
        const g = state.gifters[d.platform][k]
          || (state.gifters[d.platform][k] = { name: d.name, total: 0, pic: null });
        if (d.mode === 'set') g.total = Math.max(0, +d.amount || 0);
        else g.total = Math.max(0, g.total + (+d.delta || 0));
        if (g.total <= 0) delete state.gifters[d.platform][k];
        recomputeTop(d.platform, { animate: !!d.animate });
      }
      break;
    case 'remove-gifter':
      if (SIDES[d.platform] && d.name) {
        delete state.gifters[d.platform][keyOf(d.name)];
        recomputeTop(d.platform, { animate: !!d.animate });
      }
      break;
    case 'test-gift':
      /* amount in native units: coins (tiktok) / jewels (youtube) */
      giftReceived(d.platform, d.name || 'Tester',
        +d.amount || 1,
        (+d.amount || 1) * (d.platform === 'tiktok' ? CONFIG.COIN_TO_USD : CONFIG.JEWEL_TO_USD),
        d.pic || null);
      break;
    case 'demo': runDemo(); break;
    case 'ping': break;   // controller just opened — the forced publish below answers it
  }
  publishStatus(true);
}

/* status publishing is debounced AND deduped: bursts of gifts or commands
   coalesce into one message, and identical payloads are never re-sent, so
   an idle stream publishes nothing at all */
let statusTimer = null, lastStatusStr = '';
function publishStatus(force) {
  if (force) lastStatusStr = '';           // guarantee the next payload goes out
  if (!syncChannel || statusTimer) return;
  statusTimer = setTimeout(doPublishStatus, force ? 250 : 2000);
}
function doPublishStatus() {
  statusTimer = null;
  const rosterOf = (side) => Object.values(state.gifters[side])
    .sort((a, b) => b.total - a.total).slice(0, 8)
    .map(g => ({ name: g.name, total: g.total }));
  const payload = {
    tiktok: state.top.tiktok && { name: state.top.tiktok.name, total: state.top.tiktok.total },
    youtube: state.top.youtube && { name: state.top.youtube.name, total: state.top.youtube.total },
    roster: { tiktok: rosterOf('tiktok'), youtube: rosterOf('youtube') },
    seamY: CONFIG.SEAM_Y, uiScale: CONFIG.UI_SCALE,
    callouts: CONFIG.CALLOUTS,
    redesign: {
      rotationS: CONFIG.ROTATION_S, stealCdS: CONFIG.STEAL_CD_S,
      idleDim: CONFIG.IDLE_DIM, idleAfterS: CONFIG.IDLE_AFTER_S, skin: CONFIG.SKIN,
      fans: CONFIG.FANS,
    },
    missingAssets: missingCount, totalAssets: totalCount,
  };
  const str = JSON.stringify(payload);
  if (str === lastStatusStr) return;
  lastStatusStr = str;
  syncChannel.publish(CONFIG.MSG_OUT, payload).catch(() => {});
}

function connectAbly() {
  if (!window.Ably) return;
  try {
    /* echoMessages:false — never get billed a delivery of our own publishes */
    const ably = new Ably.Realtime({ key: CONFIG.ABLY_KEY, echoMessages: false });
    ablyChannel = ably.channels.get(CONFIG.ABLY_CHANNEL);   // busy shared channel
    syncChannel = ably.channels.get(CONFIG.SYNC_CHANNEL);   // quiet private channel
    ablyChannel.subscribe(CONFIG.GIFT_ALERT, m => onGiftAlert(m.data));
    ablyChannel.subscribe('milk-event', m => onChat(m.data));   // !steal / !throne chat commands
    syncChannel.subscribe(CONFIG.MSG_IN, m => onCommand(m.data));
    ably.connection.on('connected', () => { $('conn-dot').classList.add('connected'); publishStatus(true); });
    ably.connection.on('disconnected', () => $('conn-dot').classList.remove('connected'));
    ably.connection.on('suspended', () => $('conn-dot').classList.remove('connected'));
  } catch (e) { console.error('Ably init failed', e); }
}

/* ── scripted demo for testing / screenshots ── */
async function runDemo() {
  const wait = (ms) => new Promise(r => setTimeout(r, ms));
  onCommand({ cmd: 'reset' });
  await wait(2800);
  const g = (side, name, amt) => giftReceived(side, name, amt,
    amt * (side === 'tiktok' ? CONFIG.COIN_TO_USD : CONFIG.JEWEL_TO_USD), null);
  g('tiktok', 'JoeFan88', 99);
  await wait(1500);
  g('youtube', 'BigMike', 1000);
  await wait(6000);
  g('tiktok', 'SplatQueen', 1200);
  await wait(7000);
  g('youtube', 'BigMike', 4000);
  await wait(7000);
  g('tiktok', 'JoeFan88', 5000);
}

/* ════════════════════════════════════════════════════════════════
   10. BOOT
   ════════════════════════════════════════════════════════════════ */

async function boot() {
  loadPersisted();
  if (new URLSearchParams(location.search).get('debug') === '1') document.body.classList.add('debug');
  buildSide('youtube');
  buildSide('tiktok');
  buildFans();
  applyLayout();

  await Promise.all([...allAssetPaths().map(resolveAsset), ...allRedesignProbes()]);
  assignArt();

  actors.youtube = new Actor('youtube');
  actors.tiktok = new Actor('tiktok');
  ['youtube', 'tiktok'].forEach(s => {
    updateSideInfo(s);
    if (state.top[s]) actors[s].idle();
    scheduleIdleActs(s);
  });
  updateHeights(true);
  connectAbly();

  const hud = $('debug-hud');
  setInterval(() => {
    if (!document.body.classList.contains('debug')) return;
    hud.textContent =
      `seam ${CONFIG.SEAM_Y}  scale ${CONFIG.UI_SCALE}\n` +
      `assets ${totalCount - missingCount}/${totalCount} real (${missingCount} placeholder)\n` +
      `YT ${state.top.youtube ? state.top.youtube.name + ' ' + Math.round(state.top.youtube.total) + 'j' : '—'}  ` +
      `TT ${state.top.tiktok ? state.top.tiktok.name + ' ' + state.top.tiktok.total + 'c' : '—'}\n` +
      `queue ${laneQueue.length}`;
  }, 500);

  const ytSkins = Object.keys(sideFrames.yt).length, ttSkins = Object.keys(sideFrames.tt).length;
  console.log(`[TopSplatty] ready — ${totalCount - missingCount}/${totalCount} base assets; ` +
    `redesign art: ${Object.keys(optSrc).length}/6 ui, yt-skin ${ytSkins} frames, tt-skin ${ttSkins} frames (fallbacks active where 0)`);
}

/* public API for console testing */
window.topSplatty = {
  gift: (platform, name, amount, pic) => onCommand({ cmd: 'test-gift', platform, name, amount, pic }),
  chat: (platform, username, message) => onChat({ type: 'comment', platform, username, message }),
  reset: () => onCommand({ cmd: 'reset' }),
  demo: () => runDemo(),
  seam: (y) => onCommand({ cmd: 'seam', y }),
  scale: (v) => onCommand({ cmd: 'scale', v }),
  state: () => state,
};

boot();
