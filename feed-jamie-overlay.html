<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FEED JAMIE — Overlay</title>
<script src="https://cdn.ably.com/lib/ably.min-2.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=DM+Sans:wght@500;700&display=swap" rel="stylesheet">
<style>
  /* ── FEED JAMIE overlay — 1080x1920 transparent browser source ── */
  :root {
    --fj-purple-deep:   #3B0764;
    --fj-purple-mid:    #7B2FBE;
    --fj-purple-bright: #A855F7;
    --fj-purple-light:  #C084FC;
    --fj-accent:        #E879F9;
    --fj-white:         #FAF5FF;
    --fj-blue:          #3B82F6;
    --fj-gold:          #F5C518;
    --fj-charcoal:      #3A3A40;
  }
  html, body {
    width: 1080px; height: 1920px;
    margin: 0; padding: 0;
    overflow: hidden;
    background: transparent;
    pointer-events: none;
    font-family: 'DM Sans', sans-serif;
  }
  #stage { position: absolute; top: 0; left: 0; width: 1080px; height: 1920px; overflow: hidden; }

  /* connection dot — hidden on the broadcast overlay; check feed-jamie-control.html for status */
  #conn-dot {
    display: none;
    position: absolute; top: 10px; right: 10px; width: 13px; height: 13px;
    border-radius: 50%; background: transparent; border: 3px solid #F59E0B;
    box-sizing: border-box; opacity: .8; z-index: 90;
  }
  #conn-dot.connected { background: var(--fj-blue); border-color: var(--fj-blue); box-shadow: 0 0 8px #3B82F688; }

  /* floor line */
  #floor-line {
    position: absolute; left: 0; width: 1080px; height: 3px;
    background: var(--fj-purple-bright); opacity: 0; z-index: 5;
    transition: opacity .3s;
  }

  /* setup guides */
  #guide-canvas { position: absolute; inset: 0; border: 3px dashed #3B82F666; box-sizing: border-box; display: none; z-index: 80; }
  #guide-floor-label {
    position: absolute; left: 12px; padding: 3px 10px; font: 700 20px 'DM Sans';
    color: #fff; background: #3B82F6CC; border-radius: 8px; display: none; z-index: 81;
  }
  #reach-zone-vis {
    position: absolute; border: 3px dashed var(--fj-accent); background: #E879F922;
    display: none; z-index: 40; box-sizing: border-box;
  }
  #jamie-box { position: absolute; border: 2px dashed var(--fj-gold); display: none; z-index: 41; box-sizing: border-box; }
  #safe-area { position: absolute; inset: 60px 40px; border: 2px dotted #FAF5FF55; display: none; z-index: 79; box-sizing: border-box; }
  #debug-hud {
    position: absolute; top: 30px; left: 12px; padding: 6px 10px; display: none; z-index: 82;
    font: 500 16px 'DM Sans'; color: #fff; background: #000000AA; border-radius: 8px; white-space: pre;
  }

  /* Jamie */
  #jamie {
    position: absolute; z-index: 30; will-change: transform;
    transform-origin: 50% 100%;
    /* width/height transition makes growth (eating) swell smoothly;
       transform matches so the feet stay glued to the floor line while growing */
    transition: transform .45s ease-out, width .45s ease-out, height .45s ease-out;
  }
  #jamie.hidden-state { display: none; }
  #jamie svg { width: 100%; height: 100%; display: block; }
  #jamie-inner { width: 100%; height: 100%; transform-origin: 50% 100%; position: relative; }
  /* crossfade-capable frame layers — stacked absolutely so old/new frames overlap exactly.
     JS drives opacity/transform transitions per-layer (duration = visuals.frameCrossfadeMs). */
  #jamie .fj-jamie-layer { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }

  /* synthetic wobble/squash/hop/tilt — ONLY used as a fallback when no real drawn
     frame exists for the current pose (class .no-real-art). Real hand-drawn sprites
     play cleanly with no extra CSS motion layered on top. Amplitude scales with
     --fj-motion (0 = none .. 1 = normal .. 1.5+ = extra), set from visuals.intensity. */
  :root { --fj-motion: 1; }
  #jamie-inner { transition: transform .16s ease-out; }
  #jamie.no-real-art.pose-anticipation #jamie-inner {
    transform: scaleY(calc(1 - 0.12 * var(--fj-motion))) scaleX(calc(1 + 0.05 * var(--fj-motion))) translateY(calc(4% * var(--fj-motion)));
  }
  #jamie.no-real-art.pose-payoff #jamie-inner {
    transform: translateY(calc(-7% * var(--fj-motion))) scaleY(calc(1 + 0.04 * var(--fj-motion)));
  }
  #jamie.no-real-art.pose-celebrate #jamie-inner { animation: fjHop .45s ease-in-out infinite; }
  #jamie.no-real-art.pose-track-left  #jamie-inner { transform: rotate(calc(-5deg * var(--fj-motion))); }
  #jamie.no-real-art.pose-track-right #jamie-inner { transform: rotate(calc(5deg * var(--fj-motion))); }
  #jamie.pose-sleep #jamie-inner { transform: scaleY(.8) translateY(9%); filter: brightness(.85); }
  @keyframes fjHop { 0%,100% { transform: translateY(0); } 50% { transform: translateY(calc(-9% * var(--fj-motion))); } }

  /* idle breathing — only a fallback; real idle sequences already alternate
     between drawn breathing frames, so this stays off when real art is present. */
  #jamie.no-real-art.breathe #jamie-inner { animation: fjBreathe 4s ease-in-out infinite; }
  @keyframes fjBreathe { 0%,100% { transform: scale(1); } 50% { transform: scale(calc(1 + 0.012 * var(--fj-motion)), calc(1 + 0.028 * var(--fj-motion))); } }
  #jamie.pose-anticipation.breathe #jamie-inner,
  #jamie.pose-celebrate.breathe #jamie-inner,
  #jamie.pose-payoff.breathe #jamie-inner { animation: none; }

  /* placeholder SVG internal state classes (driven by container classes) */
  .fj-eyes-closed { display: none; }
  #jamie.ph-blink .fj-eyes-open   { display: none; }
  #jamie.ph-blink .fj-eyes-closed { display: block; }
  .fj-tongue { display: none; }
  #jamie.ph-happy .fj-tongue { display: block; }
  #jamie.ph-happy .fj-mouth-line { display: none; }

  /* objects */
  .fj-object {
    position: absolute; top: 0; left: 0; z-index: 29; /* in front of #gift-showcase (28), behind #jamie (30) */
    will-change: transform; pointer-events: none;
  }
  .fj-object img, .fj-object svg { width: 100%; height: 100%; display: block; }
  .fj-object.premium-glow { filter: drop-shadow(0 0 14px #F5C518CC) drop-shadow(0 0 26px #F5C51866); }
  .fj-object.jackpot-glow { filter: drop-shadow(0 0 14px #A855F7DD) drop-shadow(0 0 26px #A855F788); }
  .fj-object.splat-glow   { filter: drop-shadow(0 0 10px #A855F7AA); }
  .fj-object.dimmed { opacity: .25; transition: opacity .3s; }

  /* item username tag */
  .fj-obj-tag {
    position: absolute; left: 50%; top: -30px; transform: translateX(-50%);
    font: 700 22px 'DM Sans'; color: #fff; white-space: nowrap;
    text-shadow: 0 2px 4px #000, 0 0 6px #000;
  }

  /* prompt pill */
  #prompt-pill {
    position: absolute; z-index: 60; transform: translateX(-50%);
    padding: 10px 26px; border-radius: 999px;
    background: rgba(30, 8, 56, 0.45);
    border: 2px solid #C084FC88;
    font: 400 34px 'Boogaloo', sans-serif; letter-spacing: 1px;
    color: var(--fj-white); text-align: center; white-space: nowrap;
    opacity: 0; transition: opacity .5s;
    text-shadow: 0 2px 4px #00000099;
  }

  /* event label (follow / heart me / sub / gift) */
  #event-label {
    position: absolute; z-index: 61; padding: 8px 22px; border-radius: 999px;
    background: rgba(59, 7, 100, 0.55); border: 2px solid var(--fj-accent);
    font: 400 32px 'Boogaloo'; color: #fff; white-space: nowrap;
    opacity: 0; transition: opacity .3s, left .25s ease-out, top .25s ease-out; text-shadow: 0 2px 4px #000;
  }
  #event-label.gold { border-color: var(--fj-gold); background: rgba(80, 60, 4, 0.55); }

  /* like meter */
  #like-meter {
    position: absolute; z-index: 55; padding: 5px 14px; border-radius: 999px;
    background: rgba(30, 8, 56, 0.5); border: 2px solid #C084FC66;
    font: 700 22px 'DM Sans'; color: #fff; white-space: nowrap;
    opacity: 0; transition: opacity .4s, left .25s ease-out, top .25s ease-out; text-shadow: 0 1px 3px #000;
  }

  /* milestone goal bars — cumulative like/comment totals counting up toward a
     configurable target that fires an action (Heart Me, Jackpot, an item) */
  #milestone-bars {
    position: absolute; z-index: 58; transform: translateX(-50%);
    display: flex; flex-direction: column; gap: 8px; align-items: center;
    opacity: 0; transition: opacity .35s;
  }
  .milestone-bar {
    background: rgba(30, 8, 56, 0.6); border: 2px solid #C084FC66; border-radius: 10px;
    padding: 6px 14px; min-width: 240px;
  }
  .milestone-bar-label {
    font: 400 20px 'Boogaloo', sans-serif; letter-spacing: .4px; color: #fff;
    text-shadow: 0 1px 3px #000; line-height: 1;
  }
  .milestone-bar-track {
    margin-top: 4px; width: 100%; height: 10px; border-radius: 6px;
    background: rgba(255, 255, 255, 0.15); overflow: hidden;
  }
  .milestone-bar-fill {
    height: 100%; border-radius: 6px; background: linear-gradient(90deg, #C084FC, #F472B6);
    transition: width .4s ease-out;
  }
  .milestone-bar-nums {
    margin-top: 2px; font: 700 13px 'DM Sans'; color: #F4D8FF; text-align: right;
    font-variant-numeric: tabular-nums;
  }

  /* wide wooden treat board — several gift → item mappings shown side by side
     as carved-in windows, planted at the floor line beside Jamie, rotating
     through the full mapping list a slot-count at a time. Pure CSS (no baked
     art) so it scales cleanly to any width, height, font size, or slot count. */
  #gift-showcase {
    position: absolute; z-index: 28; opacity: 0; pointer-events: none;
    transform-origin: 50% 100%; box-sizing: border-box;
    display: flex; align-items: stretch;
    transition: opacity .35s ease, left .3s ease-out, top .3s ease-out;
    background:
      repeating-linear-gradient(90deg, #0000000f 0 2px, transparent 2px 40px),
      linear-gradient(180deg, #A0703F 0%, #7C4F2B 55%, #6B4325 100%);
    border-radius: 10px;
    border: 3px solid #2A1608;
    box-shadow: inset 0 0 0 2px #3B82F670, 0 4px 10px #0007;
  }
  .gs-cell {
    position: relative; flex: 1 1 0; min-width: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: linear-gradient(180deg, #FBF3E3 0%, #F2E2C4 100%);
    border-radius: 6px;
    box-shadow: inset 0 0 0 1px #C9AE86, 0 2px 3px #0004;
  }
  .gs-cell::before, .gs-cell::after {
    content: ''; position: absolute; top: 8%; width: 7%; aspect-ratio: 1; max-width: 12px;
    border-radius: 50%; background: radial-gradient(circle at 35% 35%, #9a9a9a, #3a3a3a);
  }
  .gs-cell::before { left: 8%; }
  .gs-cell::after  { right: 8%; }
  .gs-cell-img { width: 46%; aspect-ratio: 1; object-fit: contain; }
  .gs-cell-label {
    font: 700 16px 'DM Sans'; color: #3A2A1A; line-height: 1.05;
    text-align: center; overflow: hidden; overflow-wrap: break-word; max-width: 92%;
  }

  /* floating video-game trigger text above Jamie when a mapped gift lands */
  #gift-float-layer { position: absolute; inset: 0; z-index: 64; overflow: visible; pointer-events: none; }
  .fj-gift-float {
    position: absolute; transform: translate(-50%, -50%);
    text-align: center; white-space: nowrap; line-height: 1;
    animation: fjGiftFloat var(--float-duration, 1500ms) ease-out forwards;
  }
  .fj-gift-float-main {
    font: 400 34px 'Boogaloo', sans-serif; letter-spacing: .5px; color: #fff;
    text-shadow: -3px -3px 0 #3B0764, 3px -3px 0 #3B0764, -3px 3px 0 #3B0764, 3px 3px 0 #3B0764, 0 5px 8px #000a;
  }
  .fj-gift-float-sub {
    margin-top: -2px; font: 400 18px 'Boogaloo', sans-serif; letter-spacing: .3px; color: #F4D8FF;
    text-shadow: 0 2px 4px #000, 0 0 5px #3B0764;
  }
  @keyframes fjGiftFloat {
    0%   { opacity: 0; transform: translate(-50%, -40%) scale(.82); }
    16%  { opacity: 1; transform: translate(-50%, -50%) scale(1.06); }
    75%  { opacity: 1; transform: translate(-50%, calc(-50% - var(--float-rise, 26px))) scale(1); }
    100% { opacity: 0; transform: translate(-50%, calc(-50% - var(--float-rise, 26px))) scale(.96); }
  }

  /* growth flash: golden glow pulse whenever eating makes Jamie bigger */
  #jamie.growing .fj-jamie-layer, #jamie.growing svg { animation: fjGrowGlow .9s ease-out; }
  @keyframes fjGrowGlow {
    0%   { filter: none; }
    30%  { filter: drop-shadow(0 0 16px #F5C518E0) drop-shadow(0 0 34px #A855F790) brightness(1.18); }
    100% { filter: none; }
  }

  /* effects layer */
  #effects { position: absolute; inset: 0; z-index: 50; overflow: hidden; }
  .fj-fx {
    position: absolute; top: 0; left: 0; will-change: transform, opacity;
    font-size: 30px; line-height: 1; user-select: none;
  }
  .fj-fx svg { display: block; }

  /* heart-me flash */
  #heartme-veil {
    position: absolute; inset: 0; z-index: 45; pointer-events: none; opacity: 0;
    background: radial-gradient(ellipse at 50% 40%, #A855F72E 0%, transparent 65%);
    transition: opacity .35s;
  }
  /* jackpot flash (big gift / big superchat, gold instead of heart-me purple) */
  #jackpot-veil {
    position: absolute; inset: 0; z-index: 45; pointer-events: none; opacity: 0;
    background: radial-gradient(ellipse at 50% 40%, #FFD34E33 0%, transparent 65%);
    transition: opacity .35s;
  }
</style>
</head>
<body>
<div id="stage">
  <div id="heartme-veil"></div>
  <div id="jackpot-veil"></div>
  <div id="floor-line"></div>
  <div id="guide-canvas"></div>
  <div id="safe-area"></div>
  <div id="guide-floor-label">floor Y</div>
  <div id="reach-zone-vis"></div>
  <div id="jamie-box"></div>
  <div id="jamie"><div id="jamie-inner"></div></div>
  <div id="effects"></div>
  <div id="prompt-pill"></div>
  <div id="event-label"></div>
  <div id="like-meter"></div>
  <div id="milestone-bars"></div>
  <div id="gift-showcase" aria-label="TikTok gift actions"></div>
  <div id="gift-float-layer" aria-live="polite"></div>
  <div id="debug-hud"></div>
  <div id="conn-dot" title="Ably connection"></div>
</div>

<script>
'use strict';
/* ════════════════════════════════════════════════════════════════
   FEED JAMIE — overlay engine
   1080x1920 transparent browser source for TikTok Live Studio.
   Receives events/config from feed-jamie-control.html via Ably
   (live), BroadcastChannel + localStorage (local testing).
════════════════════════════════════════════════════════════════ */

/* ── 1. DEFAULT CONFIG ─────────────────────────────────────────── */
const FJ_DEFAULT_CONFIG = {
  canvas: { width: 1080, height: 1920 },
  floor: {
    y: 500, min: 180, max: 1500,
    liveVisible: false, color: '#A855F7', opacity: 0.35, thickness: 3
  },
  jamie: {
    x: 130, width: 260, yOffset: 0, side: 'left', flip: false,
    scale: 1, rotation: 0
  },
  reachZone: {
    xOffset: 0, yOffset: 0, width: 135, height: 150, shape: 'ellipse',
    anticipationDistance: 180, nearMissDistance: 70
  },
  movement: {
    normalSpeedMin: 150, normalSpeedMax: 220,
    premiumSpeedMin: 190, premiumSpeedMax: 280,
    objectScale: 1, maxObjects: 1, spin: 40,
    /* L5 item showers get their own, higher concurrent-object cap — a big
       spend spectacle can queue up to 22 shower items, and bottlenecking
       them through the normal 1-3 cap would turn the storm into a slow
       trickle instead of an actual swarm. */
    showerMaxObjects: 8,
    maxLifetimeNormal: 25, maxLifetimePremium: 35,
    guidanceEnabled: true, guidanceStrength: 0.6,
    cornerJackpot: true, cornerTolerance: 30, cornerWindowMs: 150,
    cornerRewardMultiplier: 1, squashStretch: true
  },
  events: {
    likesPerTreat: 50, likeQueueCap: 2,
    commentCooldown: 4, perUserCooldown: 10,
    genericSpawnChance: 0.05, keywordOnly: false,
    keywords: {
      ball: 'tennis-ball', treat: 'random-treat', toy: 'squeaky-toy',
      duck: 'duck', sock: 'sock', bubble: 'bubble', jamie: 'look'
    },
    treatWeights: { 'treat-biscuit': 45, 'treat-bone': 30, 'treat-purple-splat': 20, 'treat-heart': 5 },
    heartMeDurationSec: 3, heartMeSpawnHeart: true,
    /* Heart Me randomly rotates through these 4 variants each time it fires
       (uncheck any you don't want in the rotation). */
    heartMeVariants: { run: true, classic: true, spin: true, proud: true },
    subscribeDurationSec: 2.5,
    giftLowMax: 99, giftHighMin: 5000,
    giftFallbackEnabled: true,  /* false = only explicitly mapped gifts react */
    giftSizeScaling: {
      enabled: true,      /* bigger gifts spawn bigger items */
      maxScale: 2.6,      /* size multiplier at/above coinsForMax (1-coin gifts stay 1x) */
      coinsForMax: 20000  /* coin value that reaches full size — pushed out so items keep
                             growing from Galaxy toward a TikTok Universe (log curve between) */
    },
    /* intensity ladder: how big a reaction scales with coin value.
       L1 normal catch · L2 +sparkle & size · L3 premium (fast/glow/2x growth)
       · L4 MEGA (Heart-Me style) · L5 MEGA + item shower. Above L5 the SPEND
       SPECTACLE keeps escalating (storm/size/duration/repeats) up to a Universe.
       Gate is deliberately low so a Galaxy (~1k coins) already hits the mega. */
    intensityThresholds: { l2: 50, l3: 250, l4: 500, l5: 1000 },
    /* cheap gifts (and all likes) skip the bounce entirely and go straight
       into Jamie's mouth — instant payoff, and they never occupy a bounce
       slot so a big gift right after isn't stuck waiting behind a Rose. */
    instantFeed: { enabled: true, maxCoins: 1 },
    giftMappings: [],   /* [{giftName, itemType ('heartme' = mega reaction), minValue, maxValue, showUsername, intensity: 'auto'|1-5}] */
    /* YouTube Super Chats — same 5-level ladder, dollar thresholds. Fed via
       stream-dock's existing 'gift-alert' Ably broadcast; no direct YouTube
       connection here. */
    superchat: {
      enabled: true,
      thresholds: { l2: 2, l3: 5, l4: 20, l5: 100 },
      sizeScaling: { enabled: true, maxScale: 2, dollarsForMax: 50 }
    },
    /* Simple auto-mode goals: pick a cumulative counter (likes/comments), a
       target, and an action — the goal fires once the running total reaches
       target, shows a progress bar on screen the whole way there, and can
       auto-escalate to a bigger target afterward (either +N flat or ×N) so
       it keeps going without you having to reconfigure it mid-stream. */
    milestones: {
      enabled: true,
      x: 540, y: 1790, scale: 1,
      goals: [
        { id: 'goal-likes', label: 'Like Goal', counter: 'likes', target: 1000, baseValue: 0,
          action: 'heartme', autoEscalate: true, escalateMode: 'add', escalateAmount: 1000, escalateFactor: 2,
          enabled: true, completed: false },
        { id: 'goal-comments', label: 'Comment Goal', counter: 'comments', target: 50, baseValue: 0,
          action: 'jackpot', autoEscalate: true, escalateMode: 'multiply', escalateAmount: 50, escalateFactor: 2,
          enabled: true, completed: false }
      ]
    }
  },
  prompts: {
    enabled: true, intervalSec: 8, x: 540, y: 110, scale: 1,
    opacity: 1, bgOpacity: 0.45,
    list: [
      'LIKES = TREATS 🦴',
      'COMMENT BALL, TREAT, OR TOY',
      'FOLLOW TO THROW THE BALL 🎾',
      'HEART ME = BIG JAMIE REACTION 💜'
    ]
  },
  visuals: {
    usernameLabels: true, likeMeter: true, particleLevel: 'low',
    blueAccent: true, stickerBorder: true, highContrast: false,
    intensity: 1, cornerGlow: 1,
    frameCrossfadeMs: 120,   /* dissolve duration between Jamie sprite frames — smoothness */
    frameDurationScale: 1,   /* multiplies every animation frame's hold time — pacing/calmness */
    eventLabelX: 540, eventLabelY: 110, eventLabelScale: 1,  /* follow/heart-me/sub/gift username text */
    likeMeterX: 404, likeMeterY: 440, likeMeterScale: 1,
    usernameSeconds: 2.5,   /* how long username tags/labels stay visible */
    usernameEvents: {       /* which events display the viewer's username */
      follow: true, keyword: false, gift: true, subscribe: true, heartMe: true
    },
    giftShowcase: {   /* wide wooden treat board — N cells rotating through gift → item mappings */
      enabled: true, anchorToJamie: true, gap: 15, x: 420, floorOffset: 4,
      width: 365, intervalSec: 7, transitionMs: 350,
      heightScale: 1, /* stretch the board taller than its default proportions for more text room */
      fontScale: 1,   /* independent text-size multiplier, on top of per-cell-width scaling */
      slots: 3        /* how many gift cells are shown side by side at once */
    },
    giftFloatText: {  /* video-game floating text above Jamie when a mapped gift lands */
      enabled: true, xOffset: 0, yOffset: -45, durationMs: 1500, risePx: 26,
      maxVisible: 3, aggregateWindowMs: 700, showSender: true
    }
  },
  audio: {
    muted: false, master: 0.7, cooldownMs: 140,
    volumes: {
      bounce: 0.25, catch: 0.7, crunch: 0.6, ballBounce: 0.5, squeak: 0.7,
      quack: 0.7, pop: 0.6, jackpot: 0.7, heartMe: 0.85, subscribe: 0.8, gift: 0.7
    },
    urls: {}  /* soundName -> https URL; empty = Web Audio placeholder synth */
  },
  growth: {
    enabled: true,       /* Jamie grows a little with every item he catches */
    maxScale: 2,         /* size cap (1 = no growth possible, 2 = double size) */
    perCatch: 0.05,      /* size gained per catch (premium items count double) */
    decayPerMinute: 0.05,/* how fast he shrinks back toward 1x (0 = never) */
    fx: true             /* golden glow + sparkles whenever he grows */
  },
  assets: { basePath: 'assets/feed-jamie/', manifestFile: 'asset-manifest.json' },
  debug: { setupGuides: false, showReachZone: false, showJamieBox: false, showSafeArea: false, showState: false, showWarnings: false }
};

const FJ_LS_CONFIG  = 'feedJamie.config.v1';
const FJ_LS_MSG     = 'feedJamie.msg';
const FJ_LS_STATUS  = 'feedJamie.status';
const FJ_LS_ASSETS  = 'feedJamie.assetOverrides.v1';
const FJ_BC_NAME    = 'feed-jamie-control';
const FJ_ABLY_KEY   = 'Y8e-eA.l0VHlg:aJXsEfu1Be4BYsAeATRMI3w30YAKSs_LyF3DPoesIz0';
const FJ_ABLY_CH    = 'splat-overlay';
const FJ_ABLY_MSG_IN  = 'feed-jamie';        /* control -> overlay */
const FJ_ABLY_MSG_OUT = 'feed-jamie-status'; /* overlay -> control */
/* cache-bust key: forces a fresh fetch of every asset on each page load, so
   replacing a PNG under the same filename (common during art iteration)
   can never keep showing a stale browser-cached copy. */
const FJ_CACHE_BUST = Date.now();

  publishStatus();
}
/* fires a goal's action once its counter reaches target; auto-escalating
   goals raise the target (+N or ×N) and keep going, others complete once. */
function checkMilestones() {
  const ms = CFG.events.milestones;
  if (!ms || !ms.enabled) { renderMilestoneBars(); return; }
  let changed = false;
  for (const g of (ms.goals || [])) {
    if (!g.enabled || g.completed) continue;
    const total = milestoneTotals[g.counter] || 0;
    let guard = 0;
    while (total >= g.target && guard < 50) {
      fireMilestoneAction(g);
      changed = true;
      if (g.autoEscalate) {
        const oldTarget = g.target;
        g.target = g.escalateMode === 'multiply'
          ? Math.max(oldTarget + 1, Math.round(oldTarget * (g.escalateFactor || 2)))
          : oldTarget + Math.max(1, Math.round(g.escalateAmount || 0));
        g.baseValue = oldTarget;
      } else {
        g.completed = true;
        break;
      }
      guard++;
    }
  }
  if (changed) { saveMilestoneTotals(); publishStatus(); }
  renderMilestoneBars();
}
function fireMilestoneAction(goal) {
  const label = goal.label || (goal.counter === 'likes' ? 'Like Goal' : 'Comment Goal');
  const targetLabel = `${(milestoneTotals[goal.counter] || 0).toLocaleString()} ${goal.counter}`;
  switch (goal.action) {
    case 'heartme': triggerHeartMe(null, label); break;
    case 'jackpot': triggerJackpot(null, label); break;
    default:
      if (ITEM_DEFS[goal.action]) {
        queueSpawn(goal.action, { sourceEvent: 'milestone', priority: 92, premium: true, showName: false });
      }
  }
  showEventLabel(`🎯 ${sanitizeName(label)} reached! (${targetLabel})`, CFG.visuals.usernameSeconds, true);
}
function renderMilestoneBars() {
  const el = $('milestone-bars');
  if (!el) return;
  const ms = CFG.events.milestones;
  const goals = (ms && ms.enabled) ? (ms.goals || []).filter(g => g.enabled && !g.completed) : [];
  el.innerHTML = '';
  if (!goals.length) { el.style.opacity = 0; return; }
  el.style.opacity = 1;
  for (const g of goals) {
    const total = milestoneTotals[g.counter] || 0;
    const base = g.baseValue || 0;
    const span = Math.max(1, g.target - base);
    const pct = Math.max(0, Math.min(100, ((total - base) / span) * 100));
    const bar = document.createElement('div');
    bar.className = 'milestone-bar';
    const label = document.createElement('div');
    label.className = 'milestone-bar-label';
    label.textContent = g.label || (g.counter === 'likes' ? 'Like Goal' : 'Comment Goal');
    const track = document.createElement('div');
    track.className = 'milestone-bar-track';
    const fill = document.createElement('div');
    fill.className = 'milestone-bar-fill';
    fill.style.width = pct + '%';
    track.appendChild(fill);
    const nums = document.createElement('div');
    nums.className = 'milestone-bar-nums';
    nums.textContent = total.toLocaleString() + ' / ' + g.target.toLocaleString();
    bar.appendChild(label); bar.appendChild(track); bar.appendChild(nums);
    el.appendChild(bar);
  }
}
let growGlowTimer = null;
let pendingGrownProud = false;
function growthFlash(hitMax) {
  if (CFG.growth.fx === false) return;
  /* golden glow pulse on the sprite */
  jamieEl.classList.remove('growing');
  void jamieEl.offsetWidth;  /* restart the animation */
  jamieEl.classList.add('growing');

}
function applyGrowthCatch(obj) {

/* ── 4. ASSET MANIFEST + AVAILABILITY ──────────────────────────── */
/* Safe built-in default: normalized 1200x1400 art canvas. All Jamie
   frames share the primary floor anchor + targets unless the loaded
   manifest overrides them per frame. */
const DEFAULT_FRAME_META = {
  anchor:         { x: 588, y: 1172 },
  mouthTarget:    { x: 560, y: 680 },
  leftPawTarget:  { x: 435, y: 1130 },
  rightPawTarget: { x: 726, y: 1130 },
  facing: 'center'
};
let MANIFEST = { version: 2, canvas: { width: 1161, height: 1355, floorAnchor: { x: 588, y: 1172 } }, states: {}, items: {}, effects: {}, audio: {} };
const assetAvailable = {};   /* filename -> true/false (probed) */
const assetWarnings  = [];
let assetOverrides   = {};   /* filename -> dataURL (from control panel uploads) */
try { assetOverrides = JSON.parse(localStorage.getItem(FJ_LS_ASSETS) || '{}'); } catch (e) {}

function fjAssetUrl(file) {
  if (assetOverrides[file]) return assetOverrides[file];
  return CFG.assets.basePath + file + '?v=' + FJ_CACHE_BUST;
}
function fjProbe(file) {
  return new Promise(resolve => {
    if (assetOverrides[file]) { assetAvailable[file] = true; return resolve(true); }
    const img = new Image();
    img.onload  = () => { assetAvailable[file] = true;  resolve(true);  };
    img.onerror = () => { assetAvailable[file] = false; resolve(false); };
    img.src = CFG.assets.basePath + file + '?v=' + FJ_CACHE_BUST;
  });
}
function fjFrameMeta(file) {
  for (const st of Object.values(MANIFEST.states || {})) {
    for (const fr of (st.frames || [])) {
      if (fr.file === file) return fjDeepMerge(fjClone(DEFAULT_FRAME_META), fr);
    }
  }
  return fjClone(DEFAULT_FRAME_META);
}
/* resolve a Jamie frame file through the fallback chain; null = use placeholder SVG */
function fjResolveFrame(file) {
  let f = file, hops = 0;
  while (f && hops < 6) {
    if (assetAvailable[f]) return f;
    f = FRAME_FALLBACK[f] || (f === 'jamie-idle-01.png' ? null : 'jamie-idle-01.png');
    hops++;
  }
  return null;
}
async function fjLoadAssets() {
  try {
    const res = await fetch(CFG.assets.basePath + CFG.assets.manifestFile, { cache: 'no-cache' });
    if (res.ok) {
      const m = await res.json();
      if (m && m.states) MANIFEST = m;
    }
  } catch (e) { assetWarnings.push('manifest missing — using built-in defaults'); }
  const files = new Set();
  Object.values(SEQ).forEach(seq => seq.forEach(fr => files.add(fr.f)));
  Object.values(ITEM_DEFS).forEach(d => files.add(d.file));
  await Promise.all([...files].map(fjProbe));
  for (const f of files) if (!assetAvailable[f]) assetWarnings.push('missing: ' + f);
  jamieRender(true);
  publishStatus();
}

/* ── 6. AUDIO (Web Audio placeholder synth + optional file URLs) ── */
let audioCtx = null;
const soundLastPlayed = {};
const audioFileCache = {};
function fjAudio() {
  if (!audioCtx) { try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} }
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume().catch(() => {});
  return audioCtx;
}
function playSound(name) {
  if (CFG.audio.muted) return;
  const now = performance.now();
  if (soundLastPlayed[name] && now - soundLastPlayed[name] < CFG.audio.cooldownMs) return;
  soundLastPlayed[name] = now;
  const vol = (CFG.audio.volumes[name] ?? 0.6) * CFG.audio.master;
  if (vol <= 0) return;
  const url = CFG.audio.urls[name];
  if (url) {
    try {
      let a = audioFileCache[name];
      if (!a || a.src !== url) { a = new Audio(url); audioFileCache[name] = a; }
      const inst = a.cloneNode();
      inst.volume = Math.min(vol, 1);
      inst.play().catch(() => {});
      return;
    } catch (e) { /* fall through to synth */ }
  }
  fjSynth(name, vol);
}
function fjSynth(name, vol) {
  const ctx = fjAudio();
  if (!ctx) return;
  const t = ctx.currentTime;
  const master = ctx.createGain();
  master.gain.value = vol * 0.5;
  master.connect(ctx.destination);
  const tone = (freq, start, dur, type, peak) => {
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.type = type || 'sine'; o.frequency.setValueAtTime(freq, t + start);
    g.gain.setValueAtTime(0.0001, t + start);
    g.gain.exponentialRampToValueAtTime(peak || 1, t + start + 0.012);
    g.gain.exponentialRampToValueAtTime(0.0001, t + start + dur);
    o.connect(g); g.connect(master);
    o.start(t + start); o.stop(t + start + dur + 0.05);
    return o;
  };
  switch (name) {
    case 'bounce':     tone(320, 0, 0.08, 'sine'); break;
    case 'ballBounce': tone(180, 0, 0.12, 'triangle'); break;
    case 'catch':      tone(520, 0, 0.1, 'triangle'); tone(780, 0.07, 0.12, 'triangle'); break;
    case 'crunch':     tone(150, 0, 0.06, 'square', 0.5); tone(120, 0.07, 0.06, 'square', 0.4); tone(100, 0.14, 0.08, 'square', 0.3); break;
    case 'squeak':   { const o = tone(900, 0, 0.22, 'sawtooth', 0.5); o.frequency.exponentialRampToValueAtTime(1400, t + 0.1); o.frequency.exponentialRampToValueAtTime(700, t + 0.22); break; }
    case 'quack':    { const o = tone(260, 0, 0.16, 'sawtooth', 0.6); o.frequency.exponentialRampToValueAtTime(180, t + 0.16); tone(240, 0.2, 0.14, 'sawtooth', 0.4); break; }
    case 'pop':      { const o = tone(600, 0, 0.07, 'sine'); o.frequency.exponentialRampToValueAtTime(1200, t + 0.06); break; }
    case 'jackpot':    tone(660, 0, 0.12, 'triangle'); tone(880, 0.1, 0.12, 'triangle'); tone(1320, 0.2, 0.2, 'triangle'); break;
    case 'heartMe':    tone(523, 0, 0.18, 'triangle'); tone(659, 0.12, 0.18, 'triangle'); tone(784, 0.24, 0.22, 'triangle'); tone(1047, 0.36, 0.3, 'triangle'); break;
    case 'subscribe':  tone(784, 0, 0.14, 'triangle'); tone(988, 0.1, 0.14, 'triangle'); tone(1175, 0.2, 0.28, 'triangle'); break;
    case 'gift':       tone(587, 0, 0.14, 'triangle'); tone(880, 0.11, 0.2, 'triangle'); break;
    default:           tone(440, 0, 0.1, 'sine');
  }
}

/* ── 7. LAYOUT (Jamie + reach zone geometry) ───────────────────── */
const $ = id => document.getElementById(id);
const jamieEl = $('jamie'), jamieInner = $('jamie-inner');
let jamieRect = { x: 0, y: 0, w: 260, h: 303 };  /* on-screen box */

function jamieHeightFor(width) {
  const mc = MANIFEST.canvas || { width: 1200, height: 1400 };
  return width * (mc.height / mc.width);
}
/* fast/directional poses (anticipation lean, fetch leap, toy pounce) can pin an
   explicit left/right mirror toward whatever they're reacting to, overriding
   the plain global side flip for just that pose. null = use isFlipped(). Reset
   to null on every state change unless that change explicitly requests one
   (see setJamieState), so slower/face-forward poses (idle, celebrate,
   growth-proud, ...) always render Jamie's real, un-mirrored art. */
let poseMirror = null;
function currentMirror() { return poseMirror === null ? isFlipped() : poseMirror; }
function applyJamieTransform() {
  const j = CFG.jamie;
  jamieEl.style.transform = `translate3d(${jamieRect.x}px, ${jamieRect.y}px, 0) rotate(${j.rotation || 0}deg)` + (currentMirror() ? ' scaleX(-1)' : '');
}
/* smoothly interpolates jamieRect.x over `ms`, re-applying the transform each
   frame — drives Heart Me's run-to-center-and-back sprint. */
function tweenJamieX(fromX, toX, ms, onDone) {
  /* setTimeout, not requestAnimationFrame: this is a one-shot animation, not
     a continuously-rescheduling loop like the main tick() below, so it has no
     way to self-heal if a single rAF callback never fires (e.g. the OBS
     browser source gets occluded/backgrounded for a moment mid-Heart-Me) —
     that would leave heartMeActive stuck true forever. setTimeout can't get
     silently suspended the same way, so this always eventually completes. */
  const start = performance.now();

    const now = performance.now();

    const e = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2; /* ease-in-out quad */
    jamieRect.x = fromX + (toX - fromX) * e;
    applyJamieTransform();
    if (t < 1) setTimeout(step, 16);
    else { jamieRect.x = toX; applyJamieTransform(); if (onDone) onDone(); }
  }
  step();
}
function applyLayout() {

/* ── wide wooden treat board layout: N cells side by side, each holding a
   gift image + one-word label, sized purely from CSS/flexbox (no baked art)

const BOARD_FONT_REF_CELL_WIDTH = 120; /* label font size tuned at this per-cell width */

  let cells = Array.from(gs.querySelectorAll('.gs-cell'));
  while (cells.length < n) {
    const cell = document.createElement('div');
    cell.className = 'gs-cell';
    const img = document.createElement('img');
    img.className = 'gs-cell-img';
    img.alt = '';
    const label = document.createElement('div');
    label.className = 'gs-cell-label';
    cell.appendChild(img);
    cell.appendChild(label);
    gs.appendChild(cell);
    cells.push(cell);
  }
  while (cells.length > n) { gs.removeChild(cells.pop()); }
  return cells;
}
function applyGiftShowcaseLayout() {
  const gs = $('gift-showcase');
  const sc = CFG.visuals.giftShowcase;
  const width = sc.width;
  const slots = sc.slots || 3;
  const cellWidth = width / slots;
  /* heightScale stretches the board taller than its default proportions for
     more label room, independent of width/slot count. */
  const height = cellWidth * 1.2 * (sc.heightScale || 1);
  let x = sc.x;
  if (sc.anchorToJamie) {
    const rightX = jamieRect.x + jamieRect.w + sc.gap;
    const leftX = jamieRect.x - sc.gap - width;
    x = CFG.jamie.side === 'right' ? leftX : rightX;
    if (x < 8) x = rightX;
    if (x + width > 1072) x = leftX;
  }
  x = Math.max(8, Math.min(1080 - width - 8, x));
  const y = CFG.floor.y + sc.floorOffset - height;
  gs.style.left = x + 'px';
  gs.style.top = y + 'px';
  gs.style.width = width + 'px';
  gs.style.height = height + 'px';
  const cellGap = Math.max(2, Math.round(cellWidth * 0.06));
  gs.style.gap = cellGap + 'px';
  gs.style.padding = cellGap + 'px';
  gs.style.transition = `opacity ${sc.transitionMs}ms ease, left .3s ease-out, top .3s ease-out`;
  const cells = ensureBoardCells(gs, slots);

     instead of overflowing) times the independent fontScale knob. */
  const fs = (cellWidth / BOARD_FONT_REF_CELL_WIDTH) * (sc.fontScale || 1);
  cells.forEach(cell => {
    const label = cell.querySelector('.gs-cell-label');
    label.dataset.baseFontPx = Math.max(7, Math.round(16 * fs));
    label.style.fontSize = label.dataset.baseFontPx + 'px';
  });
}
function isFlipped() {

}
/* map normalized manifest coords (art canvas) to overlay px */
function mapArtPoint(pt) {
  const mc = MANIFEST.canvas || { width: 1200, height: 1400 };
  let nx = pt.x / mc.width;
  if (isFlipped()) nx = 1 - nx;

/* ── 8. JAMIE STATE MACHINE ────────────────────────────────────── */
const J = {

  watchdog: null,
  animTimer: null,
  blinkTimer: null,
  twitchTimer: null,
  currentSeq: null,
  seqIndex: 0,

  hidden: false

let currentFrameFile = 'jamie-idle-01.png';
/* timeout protection: no state may outlive its budget */
const STATE_MAX_MS = { IDLE: 0, TRACKING: 0, ANTICIPATION: 12000, PAYOFF: 4000, CELEBRATE: 4000, RESET: 1500, SLEEPING: 0, PAUSED: 0, HIDDEN: 0 };

  applyJamieTransform();

  const budget = STATE_MAX_MS[next];
  if (budget) J.watchdog = setTimeout(() => { forceReset('watchdog:' + next); }, budget);

  switch (next) {
    case 'IDLE':
      jamieEl.classList.add('breathe');

    case 'TRACKING':

    case 'ANTICIPATION':

function forceReset(why) {

/* frame sequence player with fallback chain. Frame hold times scale with
   visuals.frameDurationScale (>1 = slower/calmer, <1 = snappier). */
function playSeq(name, opts = {}) {
  const seq = SEQ[name];
  if (!seq || !seq.length) { if (opts.onDone) opts.onDone(); return; }
  J.currentSeq = name; J.seqIndex = 0;
  const step = () => {
    if (J.currentSeq !== name) return;
    const fr = seq[J.seqIndex];
    showFrame(fr.f);
    if (fr.d === 0) return; /* static frame (tracking) */
    const dur = Math.max(50, Math.round((fr.d || 400) * (CFG.visuals.frameDurationScale || 1)));
    J.animTimer = setTimeout(() => {
      if (J.currentSeq !== name) return;
      J.seqIndex++;
      if (J.seqIndex >= seq.length) {

        else if (opts.onDone) opts.onDone();

}
/* crossfade-capable layer swap: fades the new frame in over the old one instead

let jamieImgLayers = [];

function setJamieImage(url, dyPct, instant) {

  if (url === lastShownUrl && jamieImgLayers.length) {

    top.style.transform = dyPct ? `translateY(${dyPct}%)` : '';

/* directional tracking */
function updateTracking(obj) {
  if (J.state !== 'TRACKING') return;

  const dx = (obj.x + obj.w / 2) - rz.cx;

  else if (dx > 90)  { dir = 'trackRight'; pose = 'pose-track-right'; }

/* one-shot look/miss interrupts (only from calm states) */

/* ── 9. OBJECT SYSTEM (DVD bounce physics) ─────────────────────── */
const objectsLayer = $('stage');
let objects = [];
let objectSeq = 0;
let lastMissAt = 0;

function rand(min, max) { return min + Math.random() * (max - min); }

function spawnObject(itemType, opts = {}) {
  const def = ITEM_DEFS[itemType];
  if (!def) return null;
  const premium = opts.premium ?? def.premium;
  const speedMin = premium ? CFG.movement.premiumSpeedMin : CFG.movement.normalSpeedMin;
  const speedMax = premium ? CFG.movement.premiumSpeedMax : CFG.movement.normalSpeedMax;
  const speed = rand(speedMin, speedMax) * (def.speedFactor || 1);
  const w = def.width * CFG.movement.objectScale * (opts.sizeScale || 1);
  const h = w;
  /* direction: enforce min normalized components (never near-flat) */
  let nx = rand(0.35, 0.85) * (Math.random() < 0.5 ? -1 : 1);
  let ny = Math.sqrt(1 - nx * nx) * (Math.random() < 0.6 ? 1 : -1);
  let x, y;
  const lvl = opts.intensityLevel || 0;
  if (opts.entry === 'throw') {
    const fromLeft = CFG.jamie.side === 'right';
    x = fromLeft ? -w * 0.5 : 1080 - w * 0.5;
    y = rand(40, Math.max(80, CFG.floor.y * 0.35));
    nx = Math.abs(nx) * (fromLeft ? 1 : -1);
    ny = Math.abs(ny);
  } else {
    const minX = 40, maxX = 1080 - w - 40;
    /* bigger gifts intentionally spawn farther from Jamie so they take
       longer to bounce their way over — more time for the username tag
       and bigger item to stay on screen before he ever gets a shot. */
    const farBias = Math.min(1, Math.max(0, lvl - 1) * 0.22);
    const jamieOnLeft = CFG.jamie.side !== 'right';
    const uniformX = rand(minX, maxX);
    const farX = jamieOnLeft ? rand(minX + (maxX - minX) * 0.55, maxX) : rand(minX, minX + (maxX - minX) * 0.45);
    x = uniformX * (1 - farBias) + farX * farBias;
    y = rand(30, Math.max(60, CFG.floor.y - h - 60));
  }
  const el = document.createElement('div');
  el.className = 'fj-object';
  el.style.width = w + 'px'; el.style.height = h + 'px';
  const url = assetOverrides[def.file] ? assetOverrides[def.file] : CFG.assets.basePath + def.file + '?v=' + FJ_CACHE_BUST;
  if (assetAvailable[def.file]) {
    const img = document.createElement('img');
    img.src = url;
    img.onerror = () => { el.innerHTML = ITEM_SVGS[itemType] || ITEM_SVGS['treat-biscuit']; };
    el.appendChild(img);
  } else {
    el.innerHTML = ITEM_SVGS[itemType] || ITEM_SVGS['treat-biscuit'];
  }
  if (def.glow === 'gold') el.classList.add('premium-glow');
  if (def.glow === 'purple') el.classList.add('splat-glow');
  if (opts.username && CFG.visuals.usernameLabels && opts.showName) {
    const tag = document.createElement('div');
    tag.className = 'fj-obj-tag';
    tag.textContent = '@' + sanitizeName(opts.username);
    el.appendChild(tag);
    setTimeout(() => tag.remove(), (opts.nameSeconds || 1.5) * 1000);
  }
  objectsLayer.appendChild(el);
  const obj = {
    id: 'obj' + (++objectSeq), itemType, def,
    sourceEvent: opts.sourceEvent || 'manual',
    username: opts.username || null, message: opts.message || '',
    value: opts.value || 0,
    x, y, vx: nx * speed, vy: ny * speed, speed,
    w, h, radius: w * 0.42,
    rotation: rand(0, 360), angularVelocity: rand(-1, 1) * CFG.movement.spin,
    priority: opts.priority || 0,
    createdAt: performance.now(), age: 0,
    /* higher-level gifts get more total bounce time before guidance forces
       a catch — bigger spends buy the spotlight longer. */
    maxLifetime: (premium ? CFG.movement.maxLifetimePremium : CFG.movement.maxLifetimeNormal) * 1000 * (1 + Math.max(0, lvl - 1) * 0.2),
    captured: false, paused: false,
    cornerHitCount: 0, rewardLevel: premium ? 1 : 0,
    premium, intensityLevel: opts.intensityLevel || 0,
    lastHBounce: -9999, lastVBounce: -9999, lastBounceAt: 0,
    anticipated: false, nearMissArmed: true,
    squash: 0, el,
    assetPath: def.file
  };
  objects.push(obj);
  if (['IDLE', 'SLEEPING'].includes(J.state)) {
    if (J.state === 'SLEEPING') { playSeq('wake', { loop: false }); setTimeout(() => setJamieState('TRACKING'), 420); }
    else setJamieState('TRACKING');
  }
  publishStatus();
  return obj;
}
function removeObject(obj) {
  obj.el.remove();
  objects = objects.filter(o => o !== obj);
  publishStatus();
}
function clearAllObjects() {
  showerTimers.forEach(t => clearTimeout(t));
  showerTimers = [];
  spawnQueue = [];
  objects.forEach(o => o.el.remove());
  objects = [];
  drainQueue();
  if (['TRACKING', 'ANTICIPATION'].includes(J.state)) setJamieState('IDLE');
  publishStatus();
}

function enforceMinDirection(obj) {
  const sp = Math.hypot(obj.vx, obj.vy) || 1;
  let nx = obj.vx / sp, ny = obj.vy / sp;
  const MIN = 0.3;
  if (Math.abs(nx) < MIN) nx = MIN * (nx < 0 ? -1 : 1);
  if (Math.abs(ny) < MIN) ny = MIN * (ny < 0 ? -1 : 1);
  const len = Math.hypot(nx, ny);
  obj.vx = (nx / len) * sp; obj.vy = (ny / len) * sp;
}

function stepObject(obj, dt, now) {
  if (obj.captured || obj.paused) return;
  obj.age = now - obj.createdAt;

  /* final-seconds guidance: bias trajectory toward the reach zone.
     Higher-level gifts get a shorter, gentler guidance window — they wander
     freely for most of their (also extended) lifetime instead of getting
     pulled in early, so bigger spends stay bouncing/on-screen longer. */
  const guideWindowMs = Math.max(1200, 5000 - (obj.intensityLevel || 0) * 700);
  const guideStrengthMult = Math.max(0.4, 1 - (obj.intensityLevel || 0) * 0.1);
  if (CFG.movement.guidanceEnabled && obj.maxLifetime - obj.age < guideWindowMs && !obj.captured) {
    const rz = reachZoneRect();
    const tx = rz.cx - (obj.x + obj.w / 2), ty = rz.cy - (obj.y + obj.h / 2);
    const tlen = Math.hypot(tx, ty) || 1;
    const sp = Math.hypot(obj.vx, obj.vy);
    const k = CFG.movement.guidanceStrength * guideStrengthMult * dt * 1.6;
    obj.vx += (tx / tlen) * sp * k;
    obj.vy += (ty / tlen) * sp * k;
    const nsp = Math.hypot(obj.vx, obj.vy) || 1;
    obj.vx = obj.vx / nsp * sp; obj.vy = obj.vy / nsp * sp;
  }

  obj.x += obj.vx * dt;
  obj.y += obj.vy * dt;
  obj.rotation += obj.angularVelocity * dt;

  const floorY = CFG.floor.y;
  let hBounce = false, vBounce = false;
  if (obj.x <= 0)              { obj.x = 0;              obj.vx = Math.abs(obj.vx);  hBounce = true; }
  else if (obj.x + obj.w >= 1080) { obj.x = 1080 - obj.w; obj.vx = -Math.abs(obj.vx); hBounce = true; }
  if (obj.y <= 0)              { obj.y = 0;              obj.vy = Math.abs(obj.vy);  vBounce = true; }
  else if (obj.y + obj.h >= floorY) { obj.y = floorY - obj.h; obj.vy = -Math.abs(obj.vy); vBounce = true; }

  if (hBounce || vBounce) {
    /* debounce double-trigger jitter */
    if (now - obj.lastBounceAt > 80) {
      obj.lastBounceAt = now;
      enforceMinDirection(obj);
      if (CFG.movement.squashStretch) { obj.squash = 1; }
      playSound(obj.def.bounceSound || 'bounce');
      if (hBounce) obj.lastHBounce = now;
      if (vBounce) obj.lastVBounce = now;
      /* corner jackpot */
      if (CFG.movement.cornerJackpot &&
          Math.abs(obj.lastHBounce - obj.lastVBounce) <= CFG.movement.cornerWindowMs) {
        const tol = CFG.movement.cornerTolerance;
        const nearX = obj.x <= tol || obj.x + obj.w >= 1080 - tol;
        const nearY = obj.y <= tol || obj.y + obj.h >= floorY - tol;
        if (nearX && nearY && now - (obj.lastJackpotAt || 0) > 1200) {
          obj.lastJackpotAt = now;
          cornerJackpot(obj);
        }
      }
    } else {
      if (hBounce) obj.lastHBounce = now;
      if (vBounce) obj.lastVBounce = now;
    }
  }

  /* lifetime: fade out if guidance disabled and never reached Jamie */
  if (obj.age > obj.maxLifetime) {
    obj.el.style.transition = 'opacity .6s';
    obj.el.style.opacity = '0';
    obj.captured = true; /* stop physics */
    setTimeout(() => { removeObject(obj); if (!objects.length && ['TRACKING', 'ANTICIPATION'].includes(J.state)) setJamieState('IDLE'); drainQueue(); }, 650);
    return;
  }

  /* collisions with Jamie */
  checkReachZone(obj, now);
  renderObject(obj, dt);
}
function renderObject(obj, dt) {
  if (obj.squash > 0) obj.squash = Math.max(0, obj.squash - dt * 6);
  const s = obj.squash;
  const sx = 1 + s * 0.14, sy = 1 - s * 0.14;
  obj.el.style.transform =
    `translate3d(${obj.x}px, ${obj.y}px, 0) rotate(${obj.rotation}deg) scale(${sx}, ${sy})`;
}
function cornerJackpot(obj) {
  obj.cornerHitCount++;
  obj.rewardLevel += CFG.movement.cornerRewardMultiplier;
  obj.el.classList.add('jackpot-glow');
  playSound('jackpot');
  const cx = obj.x < 540 ? obj.x + 10 : obj.x + obj.w - 10;
  const cy = obj.y < CFG.floor.y / 2 ? obj.y + 10 : obj.y + obj.h - 10;
  spawnFx('star', cx, cy, 4 + Math.round(3 * CFG.visuals.cornerGlow));
}

/* reach zone collision (ellipse or rounded-rect), single trigger */
function checkReachZone(obj, now) {
  if (obj.captured || J.paused) return;
  if (!['TRACKING', 'ANTICIPATION', 'IDLE'].includes(J.state)) return;
  const rz = reachZoneRect();
  const cx = obj.x + obj.w / 2, cy = obj.y + obj.h / 2;
  const dx = cx - rz.cx, dy = cy - rz.cy;
  let inside, dist;
  if (CFG.reachZone.shape === 'ellipse') {
    const ex = dx / (rz.rx + obj.radius), ey = dy / (rz.ry + obj.radius);
    dist = Math.sqrt(ex * ex + ey * ey);
    inside = dist <= 1;
  } else {
    inside = Math.abs(dx) <= rz.rx + obj.radius && Math.abs(dy) <= rz.ry + obj.radius;
    dist = Math.max(Math.abs(dx) / (rz.rx + obj.radius), Math.abs(dy) / (rz.ry + obj.radius));
  }
  const edgeDist = Math.hypot(dx, dy) - Math.max(rz.rx, rz.ry) - obj.radius;

  /* anticipation (once per object) — leans/faces toward whichever side the
     object is actually approaching from, mirroring the real art if needed. */
  if (!inside && !obj.anticipated && edgeDist < CFG.reachZone.anticipationDistance &&
      ['TRACKING', 'IDLE'].includes(J.state)) {
    obj.anticipated = true;
    const mirror = cx < (jamieRect.x + jamieRect.w / 2);
    if (obj.def.reaction === 'bubble' && (assetAvailable['jamie-bubble-watch.png'])) {
      setJamieState('ANTICIPATION', { mirror }); playSeq('bubble', { loop: false });
    } else if (obj.premium && assetAvailable['jamie-premium-ready.png']) {
      setJamieState('ANTICIPATION', { mirror }); playSeq('premium', { loop: false });
    } else {
      setJamieState('ANTICIPATION', { mirror });
    }
  }
  /* near miss: passed close but is now leaving */
  if (!inside && obj.anticipated && obj.nearMissArmed && edgeDist > 0 &&
      edgeDist < CFG.reachZone.nearMissDistance &&
      (dx * obj.vx + dy * obj.vy) > 0 && now - lastMissAt > 8000) {
    obj.nearMissArmed = false;
    lastMissAt = now;
    if (['TRACKING', 'ANTICIPATION'].includes(J.state)) {
      const seq = (assetAvailable['jamie-confused.png'] && Math.random() < 0.4) ? 'confused' : 'miss';
      jamieOneShot(seq, seq === 'confused' ? 900 : 800);
    }
  }
  if (inside) captureObject(obj);
}
function captureObject(obj) {
  if (obj.captured) return;
  obj.captured = true;
  obj.el.classList.remove('jackpot-glow');
  const r = REACTION_SEQ[obj.def.reaction] || REACTION_SEQ.treat;
  const seqName = r.payoff;
  /* during an L5 item shower, occasionally swap in the "still hungry" nom pose
     as the celebrate beat so the rapid-fire catches don't feel identical */
  let celebrateSeq = r.celebrate;
  if (obj.sourceEvent === 'gift-shower' && assetAvailable['jamie-shower-nom.png'] && Math.random() < 0.5) {
    celebrateSeq = 'showerNom';
  }
  const mirror = MIRROR_PAYOFF_REACTIONS.has(obj.def.reaction)
    ? (obj.x + obj.w / 2) < (jamieRect.x + jamieRect.w / 2)
    : undefined;
  setJamieState('PAYOFF', { seq: seqName, celebrateSeq, mirror });
  /* animate item to the reaction's designated mouth/paw target frame */
  const tp = targetPoint(obj.def.target, r.targetFrame || SEQ[seqName][0].f);
  const fromX = obj.x, fromY = obj.y;
  const toX = tp.x - obj.w / 2, toY = tp.y - obj.h / 2;
  const dur = r.captureMs;
  const start = performance.now();
  playSound(obj.def.catchSound);
  /* safety: if rAF stalls (hidden/throttled tab), force-finish so the object never hangs */
  setTimeout(() => { if (!obj.finished) finishCapture(obj, tp); }, dur + 1500);
  const ease = t => 1 - Math.pow(1 - t, 2.2);
  function animCapture(nowT) {
    const t = Math.min(1, (nowT - start) / dur);
    const e = ease(t);
    obj.x = fromX + (toX - fromX) * e;
    obj.y = fromY + (toY - fromY) * e;
    obj.rotation *= (1 - e * 0.6);
    obj.el.style.transform = `translate3d(${obj.x}px, ${obj.y}px, 0) rotate(${obj.rotation}deg) scale(${1 - e * 0.35})`;
    if (t < 1) requestAnimationFrame(animCapture);
    else finishCapture(obj, tp);
  }
  requestAnimationFrame(animCapture);
}
function finishCapture(obj, tp) {
  if (obj.finished) return;
  obj.finished = true;
  applyGrowthCatch(obj);
  const rx = obj.def.reaction;
  if (rx === 'treat') { spawnFx('crumb', tp.x, tp.y, 5); setTimeout(() => playSound('crunch'), 150); }
  if (rx === 'bubble') { spawnFx('pop', tp.x, tp.y, 6); }
  if (obj.def.splat) { spawnFx('splat', tp.x, tp.y, 5); }
  if (rx === 'premium') { spawnFx('sparkleGold', tp.x, tp.y, 8); }
  if (obj.rewardLevel > (obj.premium ? 1 : 0)) { spawnFx('sparkle', tp.x, tp.y, 6); }
  if (obj.intensityLevel >= 2) spawnFx('sparkle', tp.x, tp.y, obj.intensityLevel >= 3 ? 8 : 4);
  if (obj.intensityLevel >= 3) spawnFx('sparkleGold', tp.x, tp.y, 6);
  if (rx === 'toy') { obj.el.style.transition = 'transform .12s'; }

/* ── 10. EVENT QUEUE ───────────────────────────────────────────── */
/* priorities: subscribe 100 > heartMe 95 > giftHigh 90 > giftMed 80 >
   giftLow 70 > follow 60 > keyword 50 > generic 40 > like treats 30 */
let spawnQueue = [];
function queueSpawn(itemType, opts) {
  const pr = opts.priority || 0;
  if (pr <= 30) {
    const treatsQueued = spawnQueue.filter(q => q.priority <= 30).length;
    if (treatsQueued >= CFG.events.likeQueueCap) return; /* treat queue cap */
  }
  if (spawnQueue.length > 20) spawnQueue.length = 20; /* hard cap: never flood */
  spawnQueue.push({ itemType, opts, priority: pr });
  spawnQueue.sort((a, b) => b.priority - a.priority);
  drainQueue();
}
function drainQueue() {
  /* gift-shower items get their own concurrent-object cap (showerMaxObjects,
     default 8) instead of sharing the normal 1-3 maxObjects cap — otherwise a
     big spend spectacle's 22-item storm would trickle in 1-3 at a time and a
     normal gift arriving mid-storm would get stuck behind it. Scan past a
     blocked head item so the OTHER category can still spawn; always restart
     from the top afterward so priority order still wins within each category. */
  let i = 0;
  while (i < spawnQueue.length) {
    const q = spawnQueue[i];
    const isShower = q.opts.sourceEvent === 'gift-shower';
    const cap = isShower ? CFG.movement.showerMaxObjects : CFG.movement.maxObjects;
    const active = objects.filter(o => !o.captured && (o.sourceEvent === 'gift-shower') === isShower).length;
    if (active < cap) {
      spawnQueue.splice(i, 1);
      spawnObject(q.itemType, q.opts);
      i = 0;
    } else {
      i++;
    }
  }
  publishStatus();
}

/* ── 11. VIEWER EVENTS ─────────────────────────────────────────── */
let likeAccumulator = 0;
let lastCommentAt = 0;
const userCommentAt = {};
let lastEventInfo = '—';

function sanitizeName(name) {
  const s = String(name || '').replace(/[<>&"'`]/g, '').trim();
  return s.length > 16 ? s.slice(0, 15) + '…' : s;
}
function pickTreat() {
  const w = CFG.events.treatWeights;
  const entries = Object.entries(w).filter(([k, v]) => ITEM_DEFS[k] && v > 0);
  const total = entries.reduce((s, [, v]) => s + v, 0) || 1;
  let r = Math.random() * total;
  for (const [k, v] of entries) { r -= v; if (r <= 0) return k; }
  return 'treat-biscuit';
}
function handleEvent(evt) {
  if (!evt || typeof evt !== 'object') return;
  const type = String(evt.type || '').toLowerCase();
  const username = evt.username || null;
  lastEventInfo = type + (username ? ' @' + sanitizeName(username) : '');
  switch (type) {
    case 'like': {
      const likeN = Math.max(1, Math.round(+evt.count || 1));
      likeAccumulator += likeN;
      milestoneTotals.likes += likeN;
      while (likeAccumulator >= CFG.events.likesPerTreat) {
        likeAccumulator -= CFG.events.likesPerTreat;
        instantFeed(pickTreat(), { sourceEvent: 'like' });
      }
      updateLikeMeter();
      checkMilestones();
      break;
    }
    case 'comment': handleComment(username, evt.message || ''); break;
    case 'follow': {
      const showFollowName = !!CFG.visuals.usernameEvents.follow;
      queueSpawn('tennis-ball', {
        sourceEvent: 'follow', username, priority: 60, entry: 'throw',
        showName: showFollowName, nameSeconds: CFG.visuals.usernameSeconds
      });
      if (username && showFollowName)
        showEventLabel(`@${sanitizeName(username)} threw Jamie a ball! 🎾`, CFG.visuals.usernameSeconds, false);
      break;
    }
    case 'heartme': triggerHeartMe(username, '', evt.variant ? { variant: evt.variant } : {}); break;
    case 'subscribe': triggerSubscribe(username); break;
    case 'gift': handleGift(evt); break;
    case 'share':
      /* treat a share like a keyword comment reward */
      queueSpawn(pickTreat(), { sourceEvent: 'share', username, priority: 45 });
      break;
  }
  publishStatus();
}
function handleComment(username, message) {
  /* counted for milestone goals regardless of Jamie's reaction cooldown below —
     that cooldown is only an anti-spam limit on Jamie's own visual reaction,
     not on how many comments actually came in. */
  milestoneTotals.comments++;
  checkMilestones();
  const now = performance.now();
  if (now - lastCommentAt < CFG.events.commentCooldown * 1000) return;
  const ukey = String(username || 'anon').toLowerCase();
  if (userCommentAt[ukey] && now - userCommentAt[ukey] < CFG.events.perUserCooldown * 1000) return;

  const clean = String(message || '').toLowerCase().replace(/[^\w\s]/g, ' ');
  const words = clean.split(/\s+/);
  let matched = null;
  for (const [kw, action] of Object.entries(CFG.events.keywords)) {
    if (words.includes(kw.toLowerCase())) { matched = action; break; }
  }
  if (matched) {
    lastCommentAt = now; userCommentAt[ukey] = now;
    if (matched === 'look') { jamieOneShot('look', 900); return; }
    const itemType = matched === 'random-treat' ? pickTreat() : matched;
    if (!ITEM_DEFS[itemType]) return;
    queueSpawn(itemType, {
      sourceEvent: 'comment', username, priority: 50,
      showName: !!CFG.visuals.usernameEvents.keyword, nameSeconds: CFG.visuals.usernameSeconds
    });
  } else if (!CFG.events.keywordOnly) {
    if (objects.length >= CFG.movement.maxObjects) return; /* queue full: generic comments do nothing */
    if (Math.random() < CFG.events.genericSpawnChance) {
      lastCommentAt = now; userCommentAt[ukey] = now;
      const pool = ['squeaky-toy', 'duck', 'tennis-ball'];
      queueSpawn(pool[Math.floor(Math.random() * pool.length)], { sourceEvent: 'comment', priority: 40 });
    } else if (Math.random() < 0.25) {
      jamieOneShot('look', 700);
    }
  }
}

function heartMeRunVariant(username, highGiftName, opts) {

  const outMirror = centerX < startX; /* default art faces right; mirror to face left */
  const fxMul = opts.fxMul || 1;
  const durMs = CFG.events.heartMeDurationSec * 1000 * (opts.durMul || 1);
  const safetyTimer = heartMeSafety(Math.max(8000, runMs * 2 + 260 + durMs + 3000), username);

  function runOut() {
    poseMirror = outMirror;
    playSeq('heartMeRun', { loop: true });

  function skid() {

    applyJamieTransform();

       total; the run/skid legs come out of it, but the hold always keeps a
       sensible minimum so the signature pose is never skipped even at the
       shortest configured duration. */
    const holdMs = Math.max(400, durMs - runMs * 2 - 260);

function handleGift(evt) {
  const value = +evt.value || 0;
  const rawGiftName = String(evt.giftName || 'Gift').trim() || 'Gift';
  const giftName = rawGiftName.toLowerCase();
  const username = evt.username;
  /* custom mappings first (giftName match from the control panel's gift picker,
     optionally coin-range constrained via the advanced JSON editor). Reaction
     size/flair still escalates with coin value via the intensity ladder,
     unless the mapping pins an explicit level. */
  for (const m of (CFG.events.giftMappings || [])) {
    const nameOk = !m.giftName || giftName === String(m.giftName).toLowerCase();
    const minOk = m.minValue == null || value >= m.minValue;
    const maxOk = m.maxValue == null || value <= m.maxValue;
    if (nameOk && minOk && maxOk) {
      if (m.itemType === 'heartme' || ITEM_DEFS[m.itemType]) {

     giftLowMax still decides which item POOL an unmapped gift picks from;
     how big/flashy that reaction gets is the intensity ladder's job. */
  if (CFG.events.giftFallbackEnabled === false) return;
  const showGiftName = !!CFG.visuals.usernameEvents.gift;

    ? ['squeaky-toy', 'duck', 'tennis-ball'][Math.floor(Math.random() * 3)]

  }
  const label = cell.querySelector('.gs-cell-label');
  label.textContent = m.signAction || defaults.signAction || ('THROW ' + (GIFT_ITEM_LABELS[m.itemType] || 'A GIFT').toUpperCase());
  /* auto-fit: shrink from the cell's width/height/font-scaled base font
     until the label fits its cell (never below ~65% of that base). */
  const sc = CFG.visuals.giftShowcase;
  const cellHeight = (sc.width / (sc.slots || 3)) * 1.2 * (sc.heightScale || 1);
  const regionH = cellHeight * 0.4; /* label gets roughly the bottom 40% of the cell */
  const baseSize = +label.dataset.baseFontPx || 16;
  const minSize = Math.max(6, Math.round(baseSize * 0.65));
  for (let size = baseSize; size >= minSize; size--) {
    label.style.fontSize = size + 'px';
    if (label.scrollHeight <= regionH + 2) break;
  }
}
let showcaseIdx = 0, showcaseTimer = null;
function giftShowcaseLoop() {
  clearTimeout(showcaseTimer);
  healGiftImages();
  const gs = $('gift-showcase');
  const sc = CFG.visuals.giftShowcase;
  const slots = sc.slots || 3;
  const maps = (CFG.events.giftMappings || []).filter(m => m.giftName && (GIFT_ACTION_DEFAULTS[m.itemType] || GIFT_ITEM_LABELS[m.itemType]));
  if (!sc.enabled || !maps.length || J.hidden) {
    gs.style.opacity = 0;
    showcaseTimer = setTimeout(giftShowcaseLoop, 2000);
    return;
  }
  /* content swaps instantly, in place — the board itself stays visible and
     only each cell's image/text change, no fade-out/fade-in between rotations.
     Rotates a full slots-sized group at a time; wraps around (padding with
     repeats) so the board is always full even when maps.length < slots. */
  const cells = ensureBoardCells(gs, Math.min(slots, maps.length));
  const start = (showcaseIdx * slots) % maps.length;
  cells.forEach((cell, i) => setCellContent(cell, maps[(start + i) % maps.length]));
  showcaseIdx++;
  gs.style.opacity = 1;
  showcaseTimer = setTimeout(giftShowcaseLoop, sc.intervalSec * 1000);
}

/* ── floating trigger text above Jamie's head (damage-number style) ── */
let floatActive = [];
let floatSlotSeq = 0;
function showGiftFloat(mapping, username, rawGiftName) {
  const cfgF = CFG.visuals.giftFloatText;
  if (!cfgF.enabled) return;
  const defaults = GIFT_ACTION_DEFAULTS[mapping.itemType] || {};
  const mainText = mapping.floatText || defaults.floatText || ('+ ' + (GIFT_ITEM_LABELS[mapping.itemType] || 'GIFT') + '!').toUpperCase();
  const key = (username || '') + '|' + (rawGiftName || '');
  const now = performance.now();
  floatActive = floatActive.filter(f => f.el.isConnected);
  const existing = floatActive.find(f => f.key === key && now - f.t <= cfgF.aggregateWindowMs);
  if (existing) {  /* same gift + sender in quick succession: bump to ×N */
    existing.count++; existing.t = now;
    existing.el.querySelector('.fj-gift-float-main').textContent = mainText + ' ×' + existing.count;
    return;
  }
  if (floatActive.length >= cfgF.maxVisible) {
    const oldest = floatActive.shift();
    oldest.el.remove();
  }
  const el = document.createElement('div');
  el.className = 'fj-gift-float';
  const main = document.createElement('div');
  main.className = 'fj-gift-float-main';
  main.textContent = mainText;
  const sub = document.createElement('div');
  sub.className = 'fj-gift-float-sub';
  const withSender = cfgF.showSender && username && CFG.visuals.usernameEvents.gift;
  sub.textContent = withSender ? '@' + sanitizeName(username) + ' • ' + (rawGiftName || '') : (rawGiftName || '');
  el.appendChild(main); el.appendChild(sub);
  /* each concurrent float gets its own rotating vertical slot — not just the
     current array length, which plateaus at (maxVisible - 1) forever once
     the buffer fills and the oldest keeps getting shifted out, which is why
     everything past the first few used to land in the exact same spot —
     plus a small alternating side jitter so near-simultaneous gifts read as
     genuinely separate bubbles floating out of Jamie independently. */
  const slot = floatSlotSeq % cfgF.maxVisible;
  floatSlotSeq++;
  const jitterX = (slot % 2 === 0 ? -1 : 1) * (14 + (slot % 3) * 8);
  const x = jamieRect.x + jamieRect.w / 2 + cfgF.xOffset + jitterX;
  const y = jamieRect.y + cfgF.yOffset - slot * 48;
  el.style.left = x + 'px';
  el.style.top = y + 'px';
  el.style.setProperty('--float-duration', cfgF.durationMs + 'ms');
  el.style.setProperty('--float-rise', cfgF.risePx + 'px');
  $('gift-float-layer').appendChild(el);
  const rec = { el, key, count: 1, t: now };
  floatActive.push(rec);
  const cleanup = () => { el.remove(); floatActive = floatActive.filter(f => f !== rec); };
  el.addEventListener('animationend', cleanup);
  setTimeout(cleanup, cfgF.durationMs + 600);  /* safety if animation events stall */
}
let meterTimer = null;
function updateLikeMeter() {
  if (!CFG.visuals.likeMeter) return;
  const lm = $('like-meter');
  lm.textContent = `🦴 ${likeAccumulator}/${CFG.events.likesPerTreat}`;
  lm.style.opacity = 1;
  clearTimeout(meterTimer);
  meterTimer = setTimeout(() => { lm.style.opacity = 0; }, 2500);
}
let labelTimer = null;
function showEventLabel(text, seconds, gold) {
  const el = $('event-label');
  el.textContent = text;              /* textContent only — never HTML */
  el.classList.toggle('gold', !!gold);
  el.style.opacity = 1;
  clearTimeout(labelTimer);
  labelTimer = setTimeout(() => { el.style.opacity = 0; }, (seconds || 1.5) * 1000);
}

/* ── 13. EFFECTS (pooled DOM particles, hard-capped) ───────────── */
const FX_CAP = { off: 0, low: 40, medium: 80 };
let fxCount = 0;
const FX_GLYPHS = {
  heart:      { glyphs: ['💜'], size: [26, 44], rise: -1 },
  sparkle:    { glyphs: ['✦', '✧'], size: [20, 34], rise: -1, color: '#C084FC' },
  sparkleGold:{ glyphs: ['✦', '★'], size: [20, 36], rise: -1, color: '#F5C518' },
  star:       { glyphs: ['★'], size: [22, 38], rise: -1, color: '#C084FC' },
  crumb:      { glyphs: ['•'], size: [12, 20], rise: 1, color: '#D9A05B' },
  splat:      { glyphs: ['●'], size: [10, 22], rise: 1, color: '#A855F7' },
  pop:        { glyphs: ['○'], size: [12, 24], rise: -0.4, color: '#93C5FD' }
};
function spawnFx(kind, x, y, count) {
  const cap = FX_CAP[CFG.visuals.particleLevel] ?? 40;
  if (cap === 0) return;
  const def = FX_GLYPHS[kind] || FX_GLYPHS.sparkle;
  const n = Math.min(count, cap - fxCount);
  for (let i = 0; i < n; i++) {
    fxCount++;
    const el = document.createElement('div');
    el.className = 'fj-fx';
    el.textContent = def.glyphs[Math.floor(Math.random() * def.glyphs.length)];
    if (def.color) el.style.color = def.color;
    el.style.fontSize = rand(def.size[0], def.size[1]) + 'px';
    $('effects').appendChild(el);
    const dx = rand(-70, 70), dy = def.rise < 0 ? rand(-140, -60) : rand(30, 90);
    const dur = rand(600, 1100);
    el.style.transform = `translate3d(${x}px, ${y}px, 0)`;
    el.style.opacity = '1';
    el.style.transition = `transform ${dur}ms ease-out, opacity ${dur}ms ease-in`;
    requestAnimationFrame(() => requestAnimationFrame(() => {
      el.style.transform = `translate3d(${x + dx}px, ${y + dy * Math.abs(def.rise)}px, 0) rotate(${rand(-40, 40)}deg)`;
      el.style.opacity = '0';
    }));
    setTimeout(() => { el.remove(); fxCount--; }, dur + 80);
  }
}

/* ── 14. MAIN LOOP ─────────────────────────────────────────────── */
let lastFrame = performance.now();
let growthDecayAccum = 0;
let rafId = null;
function tick(now) {
  rafId = requestAnimationFrame(tick);
  let dt = (now - lastFrame) / 1000;
  lastFrame = now;
  if (dt > 0.05) dt = 0.05;  /* clamp after tab-hidden gaps */
  if (J.paused || J.hidden) return;
  /* growth decay: shrink slowly back toward 1x (layout refresh throttled to ~1/s).
     Skip the refresh while Heart Me/Jackpot are running — they hand-manage
     jamieRect.x/jamieEl's transform (the Heart Me run-to-center-and-back
     tween, the Jackpot scale-up), and this periodic applyLayout() would
     silently reset that mid-sequence, snapping Jamie back to his resting
     position and making the run look like it glitches/restarts. Both
     already call applyLayout() themselves once they finish. */
  if (CFG.growth.enabled && growth > 1 && CFG.growth.decayPerMinute > 0) {
    growth = Math.max(1, growth - CFG.growth.decayPerMinute * dt / 60);
    growthDecayAccum += dt;
    if (growthDecayAccum >= 1) {
      growthDecayAccum = 0; saveGrowth();
      if (!heartMeActive && !jackpotActive) applyLayout();
    }
  }
  const active = objects.filter(o => !o.captured);
  for (const o of objects) stepObject(o, dt, now);
  if (J.state === 'TRACKING' && active.length) {
    const focus = active.reduce((a, b) => (b.priority > a.priority ? b : a), active[0]);
    updateTracking(focus);
  }
  if (CFG.debug.setupGuides && CFG.debug.showState) {
    $('debug-hud').style.display = 'block';
    $('debug-hud').textContent =
      `state: ${J.state}\nobjects: ${active.length}  queue: ${spawnQueue.length}\nlikes: ${likeAccumulator}/${CFG.events.likesPerTreat}\nwarnings: ${assetWarnings.length}`;
  } else {
    $('debug-hud').style.display = 'none';
  }
}
document.addEventListener('visibilitychange', () => {
  if (document.hidden) { if (rafId) cancelAnimationFrame(rafId); rafId = null; }
  else { lastFrame = performance.now(); if (!rafId) rafId = requestAnimationFrame(tick); }
});

/* ── 15. COMMS: Ably + BroadcastChannel + localStorage ─────────── */
let bc = null, ablyChannel = null;
function processMessage(msg) {
  if (!msg || !msg.cmd) return;
  switch (msg.cmd) {
    case 'CONFIG_UPDATE':
      CFG = fjDeepMerge(fjClone(FJ_DEFAULT_CONFIG), msg.data || {});
      fjValidateConfig();
      applyLayout(); promptLoop(); giftShowcaseLoop(); applyMotionVar(); renderMilestoneBars();
      break;
    case 'SPAWN_ITEM':
      if (msg.data && ITEM_DEFS[msg.data.itemType]) spawnObject(msg.data.itemType, msg.data.options || {});
      break;
    case 'TRIGGER_EVENT': handleEvent(msg.data || {}); break;
    case 'CLEAR_ALL': clearAllObjects(); break;
    case 'PAUSE':  setPaused(true);  break;
    case 'RESUME': setPaused(false); break;
    case 'HIDE':   setHidden(true);  break;
    case 'SHOW':   setHidden(false); break;
    case 'RESET_STATE': forceReset('control'); break;
    case 'RESET_GROWTH': resetGrowth(); break;
    case 'MILESTONE_RESET': resetMilestoneTotals(); break;
    case 'MILESTONE_TRIGGER': {
      const goal = (CFG.events.milestones.goals || []).find(g => g.id === (msg.data && msg.data.id));
      if (goal) fireMilestoneAction(goal);
      break;
    }
    case 'GIFT_SIGN_NEXT': giftShowcaseLoop(); break;   /* advance the wooden sign immediately */
    case 'TEST_GIFT_FLOAT': {
      const d = msg.data || {};
      const n = Math.min(Math.max(Math.round(+d.count || 1), 1), 8);
      for (let i = 0; i < n; i++) {
        setTimeout(() => showGiftFloat(
          { itemType: d.itemType || 'treat-biscuit' },
          d.username || 'test_viewer',
          d.giftName || 'Rose'
        ), i * 150);
      }
      break;
    }
    case 'TEST_SUPERCHAT':
      handleSuperchat({ amount: (msg.data && msg.data.amount) || 5, name: (msg.data && msg.data.username) || 'yt_viewer' });
      break;
    case 'SETUP_GUIDES':
      CFG.debug = fjDeepMerge(CFG.debug, msg.data || {});
      applyLayout();
      break;
    case 'ASSET_UPDATE':
      if (msg.data && msg.data.file) {
        if (msg.data.dataURL) assetOverrides[msg.data.file] = msg.data.dataURL;
        else delete assetOverrides[msg.data.file];
        try { localStorage.setItem(FJ_LS_ASSETS, JSON.stringify(assetOverrides)); } catch (e) {}
        assetAvailable[msg.data.file] = !!msg.data.dataURL || assetAvailable[msg.data.file];
        fjLoadAssets();
      }
      break;
    case 'RELOAD_ASSETS':
      try { assetOverrides = JSON.parse(localStorage.getItem(FJ_LS_ASSETS) || '{}'); } catch (e) {}
      fjLoadAssets();
      break;
    case 'REQUEST_STATUS': publishStatus(true); break;
    case 'PLAY_SOUND': if (msg.data && msg.data.sound) playSound(msg.data.sound); break;
    case 'FORCE_CATCH': { const o = objects.find(x => !x.captured); if (o) captureObject(o); break; }
    case 'FORCE_MISS': jamieOneShot('miss', 800); break;
    case 'FORCE_TIMEOUT': { const o = objects.find(x => !x.captured); if (o) o.createdAt = performance.now() - o.maxLifetime - 1; break; }
    case 'FORCE_JACKPOT': { const o = objects.find(x => !x.captured); if (o) cornerJackpot(o); break; }
    case 'SLEEP': if (['IDLE', 'TRACKING'].includes(J.state)) setJamieState('SLEEPING'); break;
    case 'WAKE': if (J.state === 'SLEEPING') { playSeq('wake', { loop: false }); setTimeout(() => setJamieState(objects.length ? 'TRACKING' : 'IDLE'), 420); } break;
  }
}
let statusTimer = null, statusDirty = false;
function publishStatus(immediate) {
  statusDirty = true;
  if (statusTimer && !immediate) return;
  const send = () => {
    statusTimer = null;
    if (!statusDirty) return;
    statusDirty = false;
    const status = {
      cmd: 'STATUS_UPDATE',
      data: {
        state: J.state, paused: J.paused, hidden: J.hidden,
        objectCount: objects.filter(o => !o.captured).length,
        objectTypes: objects.filter(o => !o.captured).map(o => o.itemType),
        queued: spawnQueue.length,
        likeProgress: likeAccumulator, likesPerTreat: CFG.events.likesPerTreat,
        growth: Math.round(growth * 100) / 100,
        milestoneTotals: { ...milestoneTotals },
        lastEvent: lastEventInfo,
        warnings: assetWarnings.slice(0, 40),
        assetAvailable: Object.fromEntries(Object.entries(assetAvailable)),
        ts: Date.now()
      }
    };
    try { if (bc) bc.postMessage(status); } catch (e) {}
    try { if (ablyChannel) ablyChannel.publish(FJ_ABLY_MSG_OUT, status).catch(() => {}); } catch (e) {}
    try { localStorage.setItem(FJ_LS_STATUS, JSON.stringify({ n: Math.random(), s: status })); } catch (e) {}
  };
  if (immediate) send();
  else statusTimer = setTimeout(send, 1000);
}
function initComms() {
  try {
    bc = new BroadcastChannel(FJ_BC_NAME);
    bc.onmessage = e => { if (e.data && e.data.cmd !== 'STATUS_UPDATE') processMessage(e.data); };
  } catch (e) {}
  window.addEventListener('storage', e => {
    if (e.key === FJ_LS_MSG && e.newValue) {
      try { const wrap = JSON.parse(e.newValue); processMessage(wrap.p); } catch (err) {}
    }
    if (e.key === FJ_LS_CONFIG && e.newValue) {
      try { CFG = fjDeepMerge(fjClone(FJ_DEFAULT_CONFIG), JSON.parse(e.newValue)); fjValidateConfig(); applyLayout(); promptLoop(); giftShowcaseLoop(); applyMotionVar(); } catch (err) {}
    }
  });
  if (window.Ably) {
    try {
      const ably = new Ably.Realtime({ key: FJ_ABLY_KEY });
      ablyChannel = ably.channels.get(FJ_ABLY_CH);
      ablyChannel.subscribe(FJ_ABLY_MSG_IN, m => processMessage(m.data));
      /* stream-dock already publishes YouTube Super Chats here (name/amount
         in USD/type). Feed Jamie piggybacks on this existing broadcast
         instead of opening its own YouTube connection. */
      ablyChannel.subscribe('gift-alert', m => {
        const d = m.data || {};
        if (d.type === 'youtube_superchat' && (+d.amount || 0) > 0) handleSuperchat(d);
      });
      ably.connection.on('connected',    () => $('conn-dot').classList.add('connected'));
      ably.connection.on('disconnected', () => $('conn-dot').classList.remove('connected'));
      ably.connection.on('suspended',    () => $('conn-dot').classList.remove('connected'));
    } catch (e) {}
  }
}
function setPaused(v) {
  J.paused = v;
  if (v) { J.state === 'PAUSED' || setJamieState('PAUSED'); }
  else setJamieState(objects.length ? 'TRACKING' : 'IDLE');
  publishStatus(true);
}
function setHidden(v) {
  J.hidden = v;
  jamieEl.classList.toggle('hidden-state', v);
  $('stage').style.opacity = v ? 0 : 1;
  if (v) setJamieState('HIDDEN');
  else setJamieState(objects.length ? 'TRACKING' : 'IDLE');
  publishStatus(true);
}

/* ── 16. PUBLIC API ────────────────────────────────────────────── */
window.feedJamie = {
  handleEvent,
  spawnItem: (type, options) => spawnObject(type, options || {}),
  triggerHeartMe,
  triggerSubscribe,
  setFloorY: v => { CFG.floor.y = Math.min(Math.max(+v || 500, CFG.floor.min), CFG.floor.max); applyLayout(); },
  setJamiePosition: opts => { CFG.jamie = fjDeepMerge(CFG.jamie, opts || {}); applyLayout(); },
  setPaused,
  clearAll: clearAllObjects,
  hide: () => setHidden(true),
  show: () => setHidden(false),
  testEvent: type => {
    const t = String(type || '').toLowerCase();
    if (t === 'like') handleEvent({ type: 'like', count: CFG.events.likesPerTreat });
    else if (t === 'comment') handleEvent({ type: 'comment', username: 'test_viewer', message: 'ball' });
    else handleEvent({ type: t, username: 'test_viewer', value: t === 'gift' ? 500 : 0, giftName: 'Test' });
  },
  getState: () => ({
    state: J.state, paused: J.paused, hidden: J.hidden, growth,
    objects: objects.map(o => ({ id: o.id, itemType: o.itemType, x: o.x, y: o.y, captured: o.captured })),
    queued: spawnQueue.length, likeAccumulator, warnings: assetWarnings.slice(),
    milestoneTotals: { ...milestoneTotals },
    config: fjClone(CFG)
  }),
  resetGrowth,
  reloadAssets: fjLoadAssets,
  getConfig: () => fjClone(CFG)
};

/* ── 17. BOOT ──────────────────────────────────────────────────── */
applyLayout();
applyMotionVar();
showFrame('jamie-idle-01.png', { instant: true });
setJamieState('IDLE');
promptLoop();
giftShowcaseLoop();
renderMilestoneBars();
initComms();
fjLoadAssets();
rafId = requestAnimationFrame(tick);
</script>
