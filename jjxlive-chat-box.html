<style>
* { box-sizing: border-box; }
:root {
  --overlay-top:134px; --overlay-right:34px;
  --chat-width:235px; --chat-height:210px;
  --event-width:235px; --event-height:42px; --event-gap:8px;
  --chat-radius:14px; --chat-font-scale:1; --bg-opacity:1; --text-opacity:1;
  --chat-font-family:"DM Sans", system-ui, -apple-system, "Segoe UI", Arial, sans-serif;
}
html, body { width:1080px; height:1920px; margin:0; overflow:hidden; background:transparent; font-family:var(--chat-font-family); }
body { color:#fff; pointer-events:none; -webkit-font-smoothing:antialiased; }
.jjx-chat-overlay { position:fixed; top:var(--overlay-top); right:var(--overlay-right); width:var(--chat-width); height:calc(var(--chat-height) + var(--event-height) + var(--event-gap)); pointer-events:none; z-index:20; }
.event-zone { position:absolute; top:0; right:0; width:var(--event-width); height:var(--event-height); z-index:4; opacity:0; transform:translateY(6px); pointer-events:none; }
.event-zone.is-visible { opacity:1; transform:none; animation:eventIn .24s cubic-bezier(.34,1.56,.64,1) both; }
.event-zone.is-out { animation:eventOut .3s ease both; }
.chat-zone { position:absolute; top:calc(var(--event-height) + var(--event-gap)); right:0; width:var(--chat-width); height:var(--chat-height); overflow:hidden; z-index:2; pointer-events:none; }
.chat-list { height:100%; display:flex; flex-direction:column; justify-content:flex-end; gap:8px; overflow:hidden; -webkit-mask-image:linear-gradient(to bottom,transparent 0,rgba(0,0,0,.4) 10px,#000 26px,#000 100%); mask-image:linear-gradient(to bottom,transparent 0,rgba(0,0,0,.4) 10px,#000 26px,#000 100%); }
.chat-message { position:relative; flex:0 0 auto; min-width:0; overflow:hidden; animation:chatIn .26s cubic-bezier(.34,1.56,.64,1) both; }
.chat-message.is-removing { animation:chatOut .32s ease both; }
.chat-meta { display:flex; align-items:center; gap:6px; min-width:0; }
.chat-image-row { display:flex; gap:4px; margin-top:5px; overflow:hidden; }
.message-text { display:-webkit-box; -webkit-line-clamp:var(--clamp-lines,2); -webkit-box-orient:vertical; max-width:100%; overflow:hidden; overflow-wrap:anywhere; }
.username, .message-text, .event-main, .event-value { opacity:var(--text-opacity); }
.message-text img, .chat-sticker { display:inline-block; max-width:calc(22px * var(--chat-font-scale)); max-height:calc(22px * var(--chat-font-scale)); width:auto; height:auto; margin:0 2px; vertical-align:-5px; border-radius:5px; }
@keyframes chatIn { from { opacity:0; transform:translateX(16px); } to { opacity:1; transform:translateX(0); } }
@keyframes chatOut { to { opacity:0; transform:translateY(-12px) scale(.96); } }
@keyframes eventIn { from { opacity:0; transform:translateY(9px) scale(.96); } to { opacity:1; transform:translateY(0) scale(1); } }
@keyframes eventOut { to { opacity:0; transform:translateY(-9px); } }
@keyframes splatPop { 0%{opacity:0;transform:scale(.82) rotate(-1.5deg);} 65%{opacity:1;transform:scale(1.04) rotate(1deg);} 100%{opacity:1;transform:scale(1) rotate(0);} }
@keyframes chipFloat { from{opacity:0;transform:translateY(10px);} to{opacity:1;transform:translateY(0);} }
[data-theme="night"] { --fg:#ffffff; --sub:#c9d2e6; --tt:#79e6ff; --yt:#ff9aa8; --gold:#ffd66b; --scrim:color-mix(in srgb, rgba(8,12,20,0.34) calc(var(--bg-opacity) * 100%), transparent); --halo:0 0 3px rgba(0,0,0,.95), 0 1px 2px rgba(0,0,0,.95), 0 0 8px rgba(0,0,0,.7); }

};
function applyThemeFont(theme) {

}

function param(name, fallback) {
  const direct = params.get(name);
  if (direct != null && direct !== "") return direct;
  const loose = location.href.match(new RegExp(`${name}=([^&#?]+)`));
  return loose ? decodeURIComponent(loose[1].replace(/\+/g, " ")) : fallback;
}

function asBool(value, fallback) {
  if (value == null) return fallback;
  if (String(value) === "0" || String(value).toLowerCase() === "false") return false;
  if (String(value) === "1" || String(value).toLowerCase() === "true") return true;
  return fallback;
}

function applyUrlParams() {
  const style = STYLE_PRESETS.includes(param("style", CONFIG.defaultStyle))
    ? param("style", CONFIG.defaultStyle)
    : CONFIG.defaultStyle;
  overlay.dataset.style = style;
  const theme = THEME_PRESETS.includes(param("theme", DEFAULT_THEME)) ? param("theme", DEFAULT_THEME) : DEFAULT_THEME;
  overlay.dataset.theme = theme;
  applyThemeFont(theme);
  CONFIG.events.enabled = asBool(param("events", null), CONFIG.events.enabled);
  CONFIG.events.duration = Number(param("eventDuration", CONFIG.events.duration)) || CONFIG.events.duration;
  CONFIG.chat.maxMessages = Number(param("maxMessages", CONFIG.chat.maxMessages)) || CONFIG.chat.maxMessages;
  CONFIG.chat.maxChars = Math.max(0, Number(param("maxChars", CONFIG.chat.maxChars)) || 0);
  CONFIG.chat.clampLines = Math.max(1, Number(param("lines", CONFIG.chat.clampLines)) || CONFIG.chat.clampLines);
  CONFIG.position.top = Number(param("top", CONFIG.position.top)) || CONFIG.position.top;
  CONFIG.position.right = Number(param("right", CONFIG.position.right)) || CONFIG.position.right;
  CONFIG.position.width = Number(param("width", CONFIG.position.width)) || CONFIG.position.width;
  CONFIG.position.chatHeight = Number(param("height", CONFIG.position.chatHeight)) || CONFIG.position.chatHeight;
  const fontScale = Number(param("fontScale", 1)) || 1;
  const font = param("font", "");
  const bgOpacity = Number(param("bgOpacity", 1));
  const textOpacity = Number(param("textOpacity", 1));

  document.documentElement.style.setProperty("--overlay-top", `${CONFIG.position.top}px`);
  document.documentElement.style.setProperty("--overlay-right", `${CONFIG.position.right}px`);
  document.documentElement.style.setProperty("--chat-width", `${CONFIG.position.width}px`);
  document.documentElement.style.setProperty("--event-width", `${CONFIG.position.width}px`);
  document.documentElement.style.setProperty("--chat-height", `${CONFIG.position.chatHeight}px`);
  document.documentElement.style.setProperty("--event-height", `${CONFIG.position.eventHeight}px`);
  document.documentElement.style.setProperty("--event-gap", `${CONFIG.position.eventGap}px`);
  document.documentElement.style.setProperty("--clamp-lines", CONFIG.chat.clampLines);
  applyOverlaySettings({ fontScale, font, bgOpacity, textOpacity });
}

function safeFontFamily(font) {
  const allowed = {
    rounded: '"Arial Rounded MT Bold", "Trebuchet MS", Arial, sans-serif',
    trebuch: '"Trebuchet MS", Arial, sans-serif',
    arial: 'Arial, Helvetica, sans-serif',
    impact: 'Impact, "Arial Black", sans-serif',
    mono: '"Lucida Console", "Courier New", monospace'
  };
  return allowed[String(font || "").toLowerCase()] || "";
}

function applyOverlaySettings(settings = {}) {
  if (settings.theme && THEME_PRESETS.includes(settings.theme)) {
    overlay.dataset.theme = settings.theme;
    applyThemeFont(settings.theme);
  }
  if (settings.style && STYLE_PRESETS.includes(settings.style)) {
    overlay.dataset.style = settings.style;
  }
  if (settings.fontScale != null) {
    const scale = Math.max(.75, Math.min(1.5, Number(settings.fontScale) || 1));
    document.documentElement.style.setProperty("--chat-font-scale", String(scale));
  }
  if (settings.bgOpacity != null) {
    const bgOpacity = Math.max(.1, Math.min(1, Number(settings.bgOpacity)));
    document.documentElement.style.setProperty("--bg-opacity", String(bgOpacity));
  }
  if (settings.textOpacity != null) {
    const textOpacity = Math.max(.3, Math.min(1, Number(settings.textOpacity)));
    document.documentElement.style.setProperty("--text-opacity", String(textOpacity));
  }
  if (settings.fontSize != null) {
    const scale = Math.max(.75, Math.min(1.5, Number(settings.fontSize) / 15 || 1));
    document.documentElement.style.setProperty("--chat-font-scale", String(scale));
  }
  if (settings.font) {
    const family = safeFontFamily(settings.font);
    if (family) document.documentElement.style.setProperty("--chat-font-family", family);
  }
  if (settings.width != null) {
    const width = Math.max(180, Math.min(420, Number(settings.width) || CONFIG.position.width));
    CONFIG.position.width = width;
    document.documentElement.style.setProperty("--chat-width", `${width}px`);
    document.documentElement.style.setProperty("--event-width", `${width}px`);
  }
  if (settings.height != null) {
    const height = Math.max(120, Math.min(520, Number(settings.height) || CONFIG.position.chatHeight));
    CONFIG.position.chatHeight = height;
    document.documentElement.style.setProperty("--chat-height", `${height}px`);
  }
  if (settings.top != null) {
    const top = Math.max(0, Math.min(1820, Number(settings.top)));
    CONFIG.position.top = top;
    document.documentElement.style.setProperty("--overlay-top", `${top}px`);
  }
  if (settings.right != null) {
    const right = Math.max(0, Math.min(980, Number(settings.right)));
    CONFIG.position.right = right;
    document.documentElement.style.setProperty("--overlay-right", `${right}px`);
  }
  if (settings.clampLines != null) {
    const lines = Math.max(1, Math.min(8, Math.round(Number(settings.clampLines)) || CONFIG.chat.clampLines));
    CONFIG.chat.clampLines = lines;
    document.documentElement.style.setProperty("--clamp-lines", String(lines));
  }
  if (settings.maxChars != null) {
    CONFIG.chat.maxChars = Math.max(0, Math.min(600, Math.round(Number(settings.maxChars)) || 0));
  }
  if (settings.maxMessages != null) {
    CONFIG.chat.maxMessages = Math.max(1, Math.min(CONFIG.chat.maxMessagesCap, Number(settings.maxMessages) || CONFIG.chat.maxMessages));
    while (chatQueue.length > CONFIG.chat.maxMessages) {
      chatQueue.shift();
      removeOldestChatElement();
    }
  }
  if (settings.showFollowsAsEvents != null) {
    CONFIG.events.showFollowsAsEvents = Boolean(settings.showFollowsAsEvents);
  }
  if (settings.showLikesAsEvents != null) {
    CONFIG.events.showLikesAsEvents = Boolean(settings.showLikesAsEvents);
  }
  if (settings.showJoinsAsEvents != null) {
    CONFIG.events.showJoinsAsEvents = Boolean(settings.showJoinsAsEvents);
  }
  saveOverlaySettings(settings);
}

function saveOverlaySettings(settings = {}) {
  const saved = loadOverlaySettings();
  const next = {
    ...saved,
    ...Object.fromEntries(Object.entries(settings).filter(([, value]) => value != null && value !== ""))
  };
  try { localStorage.setItem(SETTINGS_STORAGE_KEY, JSON.stringify(next)); } catch (_) {}
}

function loadOverlaySettings() {
  try { return JSON.parse(localStorage.getItem(SETTINGS_STORAGE_KEY) || "{}") || {}; }
  catch (_) { return {}; }
}

function sanitizeText(value) {
  return String(value ?? "").replace(/[<>&]/g, char => ({
    "<": "&lt;",
    ">": "&gt;",
    "&": "&amp;"
  }[char]));
}

const ALLOWED_IMAGE_HOSTS = /(^|\.)(tiktokcdn|ttlivecdn|byteoversea|ibyteimg|akamaized|giphy|tenor|socialstream|ggpht|googleusercontent|ytimg)\.[a-z.]+$/i;

function isLikelyImageUrl(url) {
  try {
    const parsed = new URL(url, location.href);
    return /^https?:$/.test(parsed.protocol) &&
      (/\.(png|jpe?g|gif|webp|avif)(\?|$)/i.test(parsed.href) || ALLOWED_IMAGE_HOSTS.test(parsed.hostname));
  } catch (_) {
    return false;
  }
}

function sanitizeMessageContent(value) {
  const raw = String(value ?? "");
  const template = document.createElement("template");
  template.innerHTML = raw;
  const makeSticker = url => {
    const img = document.createElement("img");
    img.className = "chat-sticker";
    img.src = url;
    img.alt = "";
    img.loading = "eager";
    img.referrerPolicy = "no-referrer";
    return img;
  };
  const makeLinkChip = url => {
    const chip = document.createElement("span");
    chip.className = "chat-link-chip";
    try {
      const parsed = new URL(url);
      const host = parsed.hostname.replace(/^www\./, "");
      chip.textContent = /(^|\.)youtu\.be$|(^|\.)youtube\.com$/.test(host)
        ? "YOUTUBE LINK"
        : host.toUpperCase().slice(0, 18);
    } catch (_) {
      chip.textContent = "LINK";
    }
    return chip;
  };

  template.content.querySelectorAll("script, style, iframe, object, embed, video, audio, source").forEach(el => el.remove());
  template.content.querySelectorAll("*").forEach(el => {
    if (el.tagName.toLowerCase() !== "img") {
      el.replaceWith(document.createTextNode(el.textContent || ""));
      return;
    }
    const src = el.getAttribute("src") || el.getAttribute("data-src") || "";
    let url;
    try { url = new URL(src, location.href); } catch (_) { el.remove(); return; }
    if (!/^https?:$/.test(url.protocol)) { el.remove(); return; }
    if (!isLikelyImageUrl(url.href)) { el.replaceWith(document.createTextNode(url.href)); return; }
    [...el.attributes].forEach(attr => el.removeAttribute(attr.name));
    el.src = url.href;
    el.alt = "";
    el.loading = "eager";
    el.referrerPolicy = "no-referrer";
    el.className = "chat-sticker";
  });

  function replaceUrlsInText(node) {
    const text = node.nodeValue || "";
    const urlRe = /https?:\/\/[^\s<>"']+/gi;
    if (!urlRe.test(text)) return;
    urlRe.lastIndex = 0;
    const frag = document.createDocumentFragment();
    let last = 0;
    let match;
    while ((match = urlRe.exec(text))) {
      if (match.index > last) frag.appendChild(document.createTextNode(text.slice(last, match.index)));
      const cleanUrl = match[0].replace(/[),.;!?]+$/g, "");
      frag.appendChild(isLikelyImageUrl(cleanUrl) ? makeSticker(cleanUrl) : makeLinkChip(cleanUrl));
      const trailing = match[0].slice(cleanUrl.length);
      if (trailing) frag.appendChild(document.createTextNode(trailing));
      last = match.index + match[0].length;
    }
    if (last < text.length) frag.appendChild(document.createTextNode(text.slice(last)));
    node.replaceWith(frag);
  }

  function walk(node) {
    [...node.childNodes].forEach(child => {
      if (child.nodeType === 3) replaceUrlsInText(child);
      else if (child.nodeType === 1 && child.tagName.toLowerCase() !== "img") walk(child);
    });
  }
  walk(template.content);
  return template.innerHTML || sanitizeText(raw);
}

function truncateForDisplay(message, maxChars) {
  if (!maxChars || maxChars <= 0) return message;
  const str = String(message ?? "");
  if (!/</.test(str)) {
    return str.length > maxChars ? str.slice(0, maxChars).replace(/\s+$/, "") + "…" : str;
  }
  // Message contains markup (emotes/stickers): measure visible text length only
  const tmp = document.createElement("div");
  tmp.innerHTML = str;
  const visible = tmp.textContent || "";
  if (visible.length <= maxChars) return str;
  return visible.slice(0, maxChars).replace(/\s+$/, "") + "…";
}

function textBlob(...values) {
  return values.map(value => {
    if (Array.isArray(value)) return value.map(v => textBlob(v)).join(" ");
    if (value && typeof value === "object") {
      try { return JSON.stringify(value); } catch (_) { return ""; }
    }
    return String(value || "");
  }).join(" ").toLowerCase();
}

function collectImageUrls(data) {
  const candidates = [
    data.image,
    data.imageUrl,
    data.img,
    data.imgUrl,
    data.media,
    data.mediaUrl,
    data.attachment,
    data.attachmentUrl,
    data.photo,
    data.photoUrl,
    data.picture,
    data.pictureUrl,
    data.contentImg,
    data.contentimg
  ];
  if (Array.isArray(data.images)) candidates.push(...data.images);
  if (Array.isArray(data.attachments)) {
    data.attachments.forEach(item => {
      if (typeof item === "string") candidates.push(item);
      else if (item && typeof item === "object") candidates.push(item.url, item.src, item.imageUrl, item.mediaUrl);
    });
  }
  return [...new Set(candidates
    .filter(Boolean)
    .map(value => String(value).trim())
    .filter(isLikelyImageUrl)
  )].slice(0, 3);
}

function platformLabel(platform) {
  const p = String(platform || "").toLowerCase();
  if (p.includes("tiktok")) return "TT";
  if (p.includes("youtube")) return "YT";
  if (p.includes("twitch")) return "TW";
  return "JJ";
}

function platformKey(platform) {
  const p = String(platform || "").toLowerCase();
  if (p.includes("tiktok")) return "tiktok";
  if (p.includes("youtube")) return "youtube";
  return "other";
}

function viewerStatus(data, platform) {
  const p = platformKey(platform);
  const statusText = textBlob(
    data.membership, data.memberLevel, data.memberLabel, data.subscriberType,
    data.userBadges, data.badges, data.badgeType, data.badge, data.subBadge,
    data.tiktokFan, data.fanClub, data.fanClubMember, data.isFan, data.fan
  );
  const isSuperfan = p === "tiktok" && (
    data.isSuperfan === true || data.isSuperFan === true ||
    data.superfan === true || data.superFan === true ||
    /\b(super\s*fan|superfan|subscriber|subscription)\b/.test(statusText)
  );
  const isMember = p === "youtube" && (
    data.isSubscriber === true || data.subscriber === true ||
    data.isMember === true || data.member === true ||
    Boolean(data.membership || data.subBadge) ||
    /\b(member|membership|subscriber|sponsor)\b/.test(statusText)
  );
  const isFanClub = p === "tiktok" && !isSuperfan && (
    data.isFanClubMember === true || data.fanClubMember === true ||
    data.isTikTokFan === true || data.tiktokFan === true ||
    data.isFan === true || data.fan === true ||
    /\b(fan\s*club|fanclub|\bfan\b)\b/.test(statusText)
  );

  if (isSuperfan) return { kind: "superfan", label: "SUPERFAN" };
  if (isMember) return { kind: "member", label: "MEMBER" };
  if (isFanClub) return { kind: "fanclub", label: "♥" };
  return null;
}

function getEventIcon(type) {
  return {
    follow: "*",

    highGift: "DI",
    sub: "ST",
    member: "MB",
    likeMilestone: "LK",
    join: "IN",
    raid: "RD",
    bossEvent: "BF",
    leagueEvent: "LG",
    diamondDrop: "DI",
    system: "!"
  }[type] || "!";
}

function buildEventText(msg) {
  const name = msg.username || "Viewer";
  const gift = msg.giftName || msg.text || msg.message || "";
  return {
    follow: `${name} followed`,
    gift: `${name} sent ${gift || "a gift"}`,
    highGift: `${name} sent ${gift || "a huge gift"}`,
    sub: `New sub: ${name}`,
    member: `New member: ${name}`,
    likeMilestone: `${msg.value || msg.message || "Likes"} reached`,
    join: `${name} joined`,
    raid: `${name} raided`,
    bossEvent: msg.message || msg.text || "Boss Fight Started",
    leagueEvent: msg.message || msg.text || "League event",
    diamondDrop: `${name} dropped diamonds`,
    system: msg.message || msg.text || "System alert"
  }[msg.eventType] || (msg.message || msg.text || `${name} did something`);
}

function normalizeIncomingMessage(raw) {
  let data = raw;
  if (typeof data === "string") {
    try { data = JSON.parse(data); } catch (_) { data = { message: raw }; }
  }
  if (data?.detail && typeof data.detail === "object") data = data.detail;
  if (data?.action === "content" && data.value) {
    try { data = JSON.parse(data.value); } catch (_) {}
  }

  const event = String(data.event || data.action || data.typeEvent || "").toLowerCase();
  const platform = data.platform || data.source || data.type || data.site || "unknown";
  const username = data.username || data.chatname || data.name || data.displayName || "Viewer";
  const message = data.message || data.chatmessage || data.text || "";
  const giftName = data.giftName || data.gift || data.gifttitle || "";
  const value = data.value || data.amount || data.coins || data.hasDonation || data.donoValue || "";
  const status = viewerStatus(data, platform);
  const imageUrls = collectImageUrls(data);

  let kind = "chat";
  let eventType = null;
  const lowerMessage = String(message).toLowerCase();

  if (event === "follow" || event === "follower") {
    if (!CONFIG.events.showFollowsAsEvents) return { kind: "ignore", raw: data };
    eventType = "follow";
  }
  else if (event === "gift" || event === "giftredemption" || event === "giftpurchase" || giftName || data.hasDonation || data.donoValue) eventType = value && Number(String(value).replace(/[^0-9.]/g, "")) >= 1000 ? "highGift" : "gift";
  else if (event === "superchat" || event === "supersticker" || event === "donation") eventType = "highGift";
  else if (event === "sub" || event === "subscribe") eventType = "sub";
  else if (event === "member" || event === "membership" || event === "sponsor") eventType = "member";
  else if (event === "like" || event === "like_batch" || data.likes != null) {
    if (!CONFIG.events.showLikesAsEvents) return { kind: "ignore", raw: data };
    const likes = Number(data.likes || data.count || value || 0);
    if (likes >= lastLikeMilestone + CONFIG.events.likeMilestoneStep) {
      lastLikeMilestone = Math.floor(likes / CONFIG.events.likeMilestoneStep) * CONFIG.events.likeMilestoneStep;
      eventType = "likeMilestone";
      data.value = `${lastLikeMilestone.toLocaleString()} likes`;
    }
  }
  else if (event === "join" || event === "roomjoin" || event === "enter") {
    if (!CONFIG.events.showJoinsAsEvents) return { kind: "ignore", raw: data };
    eventType = "join";
  }
  else if (event === "raid") eventType = "raid";
  else if (event === "bossevent" || data.bossEvent) eventType = "bossEvent";
  else if (event === "leagueevent" || data.leagueEvent) eventType = "leagueEvent";
  else if (event === "diamonddrop" || lowerMessage.includes("dropped diamonds")) eventType = "diamondDrop";
  else if (event === "system" || data.system === true) eventType = "system";

  if (eventType) kind = "event";

  return {
    kind,
    eventType,
    platform,
    username,
    message,
    avatarUrl: data.avatar || data.avatarUrl || data.chatimg || "",
    imageUrls,
    value: data.value || value,
    giftName,
    status,
    raw: data
  };
}

function handleIncoming(raw) {
  const msg = normalizeIncomingMessage(raw);
  if (msg.kind === "ignore") return;
  if (msg.kind === "event") {
    showEvent({
      type: msg.eventType,
      username: msg.username,
      text: buildEventText(msg),
      value: msg.value,
      icon: getEventIcon(msg.eventType)
    });
    return;
  }

  if (!String(msg.message || "").trim()) return;
  addChatMessage({
    platform: msg.platform,
    username: msg.username,
    message: msg.message,
    avatarUrl: msg.avatarUrl,
    imageUrls: msg.imageUrls,
    status: msg.status,
    badges: []
  });
}

function addChatMessage({ platform = "unknown", username = "Viewer", message = "", avatarUrl = "", imageUrls = [], badges = [], status = null }) {
  const item = { platform, username, message, avatarUrl, imageUrls, badges, status, id: Date.now() + Math.random() };
  chatQueue.push(item);
  renderChatMessage(item);

  while (chatQueue.length > CONFIG.chat.maxMessages) {
    chatQueue.shift();
    removeOldestChatElement();
  }
}

function renderChatMessage(item) {
  const row = document.createElement("div");
  row.className = `chat-message${item.status ? ` is-${item.status.kind}` : ""}`;
  row.dataset.id = item.id;
  row.dataset.platform = platformKey(item.platform);
  const statusHtml = item.status
    ? `<span class="status-pill ${sanitizeText(item.status.kind)}">${sanitizeText(item.status.label)}</span>`
    : "";
  const imageHtml = item.imageUrls?.length
    ? `<div class="chat-image-row">${item.imageUrls.map(url => `<img class="chat-inline-image" src="${sanitizeText(url)}" alt="" referrerpolicy="no-referrer">`).join("")}</div>`
    : "";
  row.innerHTML = `
    <div class="chat-meta">
      <span class="platform-chip" data-platform="${sanitizeText(platformKey(item.platform))}">${sanitizeText(platformLabel(item.platform))}</span>
      ${statusHtml}
      <span class="username">${sanitizeText(item.username)}</span>
    </div>
    <div class="message-text">${sanitizeMessageContent(truncateForDisplay(item.message, CONFIG.chat.maxChars))}</div>
    ${imageHtml}
  `;
  chatList.appendChild(row);

  if (overlay.dataset.style === "chips") {
    window.setTimeout(() => removeChatElement(row), CONFIG.chat.messageLifetime);
  }
}

function removeOldestChatElement() {
  const oldest = chatList.querySelector(".chat-message");
  if (oldest) removeChatElement(oldest);
}

function removeChatElement(el) {
  if (!el || el.classList.contains("is-removing")) return;
  el.classList.add("is-removing");
  window.setTimeout(() => el.remove(), 420);
}

function showEvent({ type = "system", username = "", text = "", value = "", icon = "!" }) {
  if (!CONFIG.events.enabled) return;
  const item = { type, username, text, value, icon };
  if (activeEvent && CONFIG.events.queue) {
    eventQueue.push(item);
    return;
  }
  renderEvent(item);
}

function renderEvent(item) {
  activeEvent = true;
  eventZone.className = "event-zone is-visible";
  eventZone.dataset.eventType = item.type;
  eventZone.innerHTML = `
    <div class="event-card">
      <span class="event-icon">${sanitizeText(item.icon)}</span>
      <span class="event-copy">
        <span class="event-main">${sanitizeText(item.text)}</span>
        ${item.value ? `<span class="event-value">${sanitizeText(item.value)}</span>` : ""}
      </span>
    </div>
  `;
  const duration = ["highGift", "diamondDrop", "bossEvent", "leagueEvent"].includes(item.type)
    ? CONFIG.events.highDuration
    : CONFIG.events.duration;

  window.setTimeout(() => {
    eventZone.classList.remove("is-visible");
    eventZone.classList.add("is-out");
    window.setTimeout(() => {
      eventZone.className = "event-zone";
      eventZone.innerHTML = "";
      activeEvent = false;
      const next = eventQueue.shift();
      if (next) renderEvent(next);
    }, 380);
  }, duration);
}

  const names = ["Sarah", "Mike", "Jamie", "Wekka", "Bob", "Layla", "Kinz"];
  const events = [
    { type: "follow", username: "Sarah", text: "Sarah followed", value: "", icon: "*" },
    { type: "gift", username: "Mike", text: "Mike sent Galaxy", value: "1,000 coins", icon: "+" },
    { type: "diamondDrop", username: "Joe", text: "Joe dropped diamonds", value: "Diamond Drop", icon: "DI" },
    { type: "leagueEvent", username: "Wekka", text: "New Champion: Wekka", value: "League of Splatties", icon: "LG" },
    { type: "bossEvent", username: "Boss", text: "Boss Fight Started", value: "Raid ready", icon: "BF" },
    { type: "leagueEvent", username: "Jamie", text: "League Promotion: Jamie", value: "Rank up", icon: "LG" },
    { type: "likeMilestone", username: "Chat", text: "1,000 likes reached", value: "Milestone", icon: "LK" }
  ];

  function nextChat() {
    const roll = Math.random();
    const status = roll > .82
      ? { kind: "superfan", label: "SUPERFAN" }
      : roll > .66
        ? { kind: "member", label: "MEMBER" }
        : roll > .5
          ? { kind: "fanclub", label: "♥" }
          : null;
    addChatMessage({
      platform: Math.random() > .45 ? "tiktok" : "youtube",
      username: names[Math.floor(Math.random() * names.length)],
      message: chats[Math.floor(Math.random() * chats.length)],
      imageUrls: Math.random() > .82 ? ["https://media.tenor.com/2roX3uxz_68AAAAM/cat-space.gif"] : [],
      status
    });
    mockTimers.push(window.setTimeout(nextChat, 2000 + Math.random() * 2000));
  }
  function nextEvent() {
    const evt = events[Math.floor(Math.random() * events.length)];
    showEvent(evt);
    mockTimers.push(window.setTimeout(nextEvent, 5000 + Math.random() * 4000));
  }
  nextChat();
  nextEvent();
}

function cycleStyle() {
  const current = STYLE_PRESETS.indexOf(overlay.dataset.style);
  overlay.dataset.style = STYLE_PRESETS[(current + 1) % STYLE_PRESETS.length];
}

function cycleTheme() {
  const i = THEME_PRESETS.indexOf(overlay.dataset.theme);
  const next = THEME_PRESETS[(i + 1) % THEME_PRESETS.length];
  overlay.dataset.theme = next;
  applyThemeFont(next);
}

window.addEventListener("message", event => {
  if (!event.data) return;
  handleIncoming(event.data);
});

document.addEventListener("keydown", event => {
  if (param("test", "0") !== "1") return;
  if (event.key.toLowerCase() === "c") {
    addChatMessage({ platform: "tiktok", username: "TestChat", message: "Manual chat pop" });
  }
  if (event.key.toLowerCase() === "e") {
    showEvent({ type: "gift", username: "TestEvent", text: "TestEvent sent Galaxy", value: "1,000 coins", icon: "+" });
  }
  if (event.key.toLowerCase() === "s") cycleStyle();
  if (event.key.toLowerCase() === "t") cycleTheme();
});

function connectSocialStreamSocket() {
  if (!CONFIG.socialStream.connectWebSocket) return;
  const session = param("session", CONFIG.socialStream.session);
  ssnSocket = new WebSocket(`${CONFIG.socialStream.socketBase}/${encodeURIComponent(session)}/4`);
  ssnSocket.onmessage = event => handleIncoming(event.data);
  ssnSocket.onclose = () => window.setTimeout(connectSocialStreamSocket, 3000);
  ssnSocket.onerror = () => {
    try { ssnSocket.close(); } catch (_) {}
  };
}

function connectAblyControls() {
  if (!CONFIG.ably.enabled || !window.Ably) return;
  try {
    ablyClient = new Ably.Realtime(CONFIG.ably.key);
    ablyChannel = ablyClient.channels.get(CONFIG.ably.channel);
    ablyChannel.subscribe("jjx-chat-settings", message => {
      applyOverlaySettings(message.data || {});
    });
    ablyChannel.subscribe("jjx-chat-test", message => {
      const data = message.data || {};
      if (data.kind === "event") showEvent(data.event || { type: "system", text: "Controller test event", icon: "!" });
      else addChatMessage(data.chat || { platform: "tiktok", username: "Controller", message: "Controller test chat" });
    });
  } catch (_) {}
}

applyUrlParams();
applyOverlaySettings(loadOverlaySettings());
if (param("test", "0") === "1") startMockMode();
connectSocialStreamSocket();
connectAblyControls();
</script>
</body>
</html>
