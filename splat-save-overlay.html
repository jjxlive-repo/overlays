<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<title>Splat Save Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     SPLAT SAVE OVERLAY — OBS Browser Source
     Canvas: 1920×1080 | Background: transparent
     Keys: [ = start reset countdown | ] = trigger save
  ============================================================ */

  /* ── CONFIGURABLE DISPLAY COPY ─────────────────────────────
     Edit these CSS custom properties to change all on-screen text.
     (Timer length & sounds are in the <script> CONFIG block below.)
  ──────────────────────────────────────────────────────────── */
  :root {
    /* Purple Splat palette */
    --clr-deep:    #3B0764;
    --clr-mid:     #7B2FBE;
    --clr-bright:  #A855F7;
    --clr-light:   #C084FC;
    --clr-accent:  #E879F9;
    --clr-white:   #FAF5FF;
    --clr-danger:  #F43F5E;
    --clr-gold:    #FBBF24;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    background: transparent;
    font-family: 'DM Sans', sans-serif;
  }

  /* ── SCENE ROOT ─────────────────────────────────────────── */
  #scene {
    position: relative;
    width: 1920px;
    height: 1080px;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding-bottom: 60px;
    pointer-events: none;
  }

  /* ── AMBIENT BLOBS ──────────────────────────────────────── */
  .blob-layer {
    position: absolute;
    inset: 0;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.6s ease;
  }
  .blob-layer.visible { opacity: 1; }

  .blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(2px);
  }

  /* ── MAIN PANEL ─────────────────────────────────────────── */
  #panel {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
    opacity: 0;
    transform: translateY(40px) scale(0.9);
    transition: opacity 0.5s cubic-bezier(.34,1.56,.64,1),
                transform 0.5s cubic-bezier(.34,1.56,.64,1);
    pointer-events: none;
  }
  #panel.visible {
    opacity: 1;
    transform: translateY(0) scale(1);
  }

  /* ── SPLAT SHAPE BEHIND PANEL ───────────────────────────── */
  #splat-bg {
    position: absolute;
    bottom: -30px;
    left: 50%;
    transform: translateX(-50%);
    width: 920px;
    height: 280px;
    z-index: 9;
    opacity: 0;
    transition: opacity 0.5s ease;
    filter: drop-shadow(0 0 40px rgba(168,85,247,0.6));
  }
  #splat-bg.visible { opacity: 1; }

  /* ── COUNTDOWN DISPLAY ──────────────────────────────────── */
  #countdown-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  #timer-number {
    font-family: 'Boogaloo', cursive;
    font-size: 160px;
    line-height: 1;
    color: var(--clr-white);
    text-shadow:
      0 0 20px var(--clr-bright),
      0 0 60px var(--clr-mid),
      0 4px 0 rgba(0,0,0,0.4);
    letter-spacing: -4px;
  }
  #timer-number.pulse-normal { animation: pulseNormal 1s ease-in-out infinite; }
  #timer-number.pulse-warn   { animation: pulseWarn 0.5s ease-in-out infinite; }
  #timer-number.pulse-danger { animation: pulseDanger 0.25s ease-in-out infinite; }

  @keyframes pulseNormal {
    0%,100% { transform: scale(1); }
    50%      { transform: scale(1.04); }
  }
  @keyframes pulseWarn {
    0%,100% { transform: scale(1); color: var(--clr-white); }
    50%      { transform: scale(1.08); color: var(--clr-accent); }
  }
  @keyframes pulseDanger {
    0%,100% { transform: scale(1);    color: var(--clr-accent); text-shadow: 0 0 20px var(--clr-danger), 0 0 60px var(--clr-danger); }
    50%      { transform: scale(1.14); color: var(--clr-danger); text-shadow: 0 0 40px var(--clr-danger), 0 0 100px var(--clr-danger); }
  }

  #countdown-label {
    font-family: 'Boogaloo', cursive;
    font-size: 38px;
    color: var(--clr-white);
    text-shadow: 0 0 16px var(--clr-bright), 0 2px 0 rgba(0,0,0,0.5);
    text-align: center;
    letter-spacing: 1px;
  }

  /* ── PROGRESS BAR ───────────────────────────────────────── */
  #progress-track {
    width: 700px;
    height: 14px;
    background: rgba(255,255,255,0.12);
    border-radius: 7px;
    overflow: hidden;
    box-shadow: 0 0 12px rgba(168,85,247,0.4);
  }
  #progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--clr-mid), var(--clr-accent), var(--clr-light));
    border-radius: 7px;
    width: 100%;
    transition: width 0.9s linear, background 0.3s ease;
  }
  #progress-fill.danger {
    background: linear-gradient(90deg, #7F1D1D, var(--clr-danger), #FB7185);
  }

  /* ── STATE BANNERS ──────────────────────────────────────── */
  #state-banner {
    font-family: 'Boogaloo', cursive;
    font-size: 72px;
    color: var(--clr-white);
    text-align: center;
    letter-spacing: 2px;
    text-shadow: 0 0 30px var(--clr-bright), 0 4px 0 rgba(0,0,0,0.5);
  }
  #state-banner.saved-text {
    color: var(--clr-light);
    text-shadow: 0 0 40px var(--clr-accent), 0 0 80px var(--clr-bright), 0 4px 0 rgba(0,0,0,0.5);
    animation: savedBounce 0.6s cubic-bezier(.34,1.56,.64,1) forwards;
  }
  #state-banner.expired-text {
    color: var(--clr-danger);
    text-shadow: 0 0 40px var(--clr-danger), 0 0 80px #7F1D1D, 0 4px 0 rgba(0,0,0,0.5);
    animation: expiredShake 0.6s ease forwards;
  }

  @keyframes savedBounce {
    0%   { transform: scale(0.5) rotate(-6deg); opacity: 0; }
    60%  { transform: scale(1.15) rotate(2deg); opacity: 1; }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }
  @keyframes expiredShake {
    0%,100% { transform: translateX(0) scale(1); }
    15%     { transform: translateX(-18px) scale(1.05); }
    30%     { transform: translateX(14px) scale(1.05); }
    45%     { transform: translateX(-10px); }
    60%     { transform: translateX(8px); }
    75%     { transform: translateX(-4px); }
  }

  /* ── SPLAT BURST PARTICLES ──────────────────────────────── */
  #burst-layer {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 20;
    overflow: hidden;
  }
  .splat-particle {
    position: absolute;
    border-radius: 50% 70% 50% 70% / 60% 50% 70% 50%;
    opacity: 0;
    transform: scale(0);
  }

  /* ── CRACK / DRIP LAYER ─────────────────────────────────── */
  #crack-layer {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 15;
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  #crack-layer.visible { opacity: 1; }

  .drip {
    position: absolute;
    top: 0;
    border-radius: 0 0 50% 50%;
    opacity: 0;
    transform-origin: top center;
  }

  /* ── GLOW RING ──────────────────────────────────────────── */
  #glow-ring {
    position: absolute;
    bottom: -10px;
    left: 50%;
    transform: translateX(-50%);
    width: 800px;
    height: 800px;
    border-radius: 50%;
    background: radial-gradient(ellipse, rgba(168,85,247,0.15) 0%, transparent 70%);
    pointer-events: none;
    z-index: 8;
    opacity: 0;
    transition: opacity 0.6s ease;
    animation: ringPulse 2s ease-in-out infinite;
  }
  #glow-ring.visible { opacity: 1; }
  @keyframes ringPulse {
    0%,100% { transform: translateX(-50%) scale(1); }
    50%      { transform: translateX(-50%) scale(1.06); }
  }

</style>
</head>
<body>

<div id="scene">

  <div class="blob-layer" id="blob-layer"></div>
  <div id="glow-ring"></div>

  <!-- SVG splat platform shape -->
  <svg id="splat-bg" viewBox="0 0 920 280" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
    <defs>
      <radialGradient id="splatGrad" cx="50%" cy="60%" r="60%">
        <stop offset="0%"   stop-color="#A855F7" stop-opacity="0.95"/>
        <stop offset="50%"  stop-color="#7B2FBE" stop-opacity="0.90"/>
        <stop offset="100%" stop-color="#3B0764" stop-opacity="0.85"/>
      </radialGradient>
      <radialGradient id="splatShine" cx="35%" cy="25%" r="40%">
        <stop offset="0%"   stop-color="#E879F9" stop-opacity="0.5"/>
        <stop offset="100%" stop-color="#A855F7" stop-opacity="0"/>
      </radialGradient>
    </defs>
    <path d="M80,200 C40,180 20,150 30,110 C40,70 80,50 120,60 C130,30 160,10 200,20 C220,-5 260,5 270,35 C300,10 350,15 360,50 C400,20 450,30 455,70 C490,40 540,55 535,95 C575,70 620,90 610,130 C650,110 700,135 690,175 C730,160 770,185 755,220 C790,210 820,240 800,270 C770,290 720,280 700,255 C670,280 630,275 620,250 C590,270 550,260 545,235 C510,255 470,245 470,220 C440,240 400,230 405,205 C370,220 330,205 335,180 C300,195 260,178 270,155 C230,168 190,150 200,125 C160,138 120,118 130,95 C95,105 70,135 80,200 Z"
          fill="url(#splatGrad)"/>
    <path d="M150,80 C160,50 210,40 240,55 C260,30 310,35 320,60 C340,40 380,48 375,75 C360,55 320,52 305,72 C295,48 255,43 240,65 C218,47 170,52 150,80 Z"
          fill="url(#splatShine)" opacity="0.7"/>
    <ellipse cx="50"  cy="215" rx="28" ry="20" fill="#7B2FBE" opacity="0.8"/>
    <ellipse cx="870" cy="200" rx="34" ry="22" fill="#7B2FBE" opacity="0.8"/>
    <ellipse cx="460" cy="270" rx="22" ry="14" fill="#A855F7" opacity="0.7"/>
    <ellipse cx="100" cy="255" rx="18" ry="12" fill="#9333EA" opacity="0.6"/>
    <ellipse cx="820" cy="250" rx="20" ry="13" fill="#9333EA" opacity="0.6"/>
  </svg>

  <!-- Main content panel -->
  <div id="panel">
    <div id="countdown-wrap">
      <div id="timer-number">60</div>
      <div id="countdown-label"></div>
      <div id="progress-track">
        <div id="progress-fill"></div>
      </div>
    </div>
    <div id="state-banner"></div>
  </div>

  <!-- Particle burst layer (save) -->
  <div id="burst-layer"></div>

  <!-- Crack/drip layer (expire) -->
  <div id="crack-layer">
    <svg id="crack-svg" width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>

</div>

<script>
/* ============================================================
   ██████████████  CONFIGURATION  ██████████████
   Edit this block to customize everything.
============================================================ */
const CONFIG = {

  // ── Timer ─────────────────────────────────────────────────
  TIMER_SECONDS: 60,

  // ── Display copy ──────────────────────────────────────────
  COPY_COUNTDOWN: "⚠️ Send a Galaxy or $10 to SAVE the run!",
  COPY_SAVED:     "💜 RUN SAVED! Someone came through!",
  COPY_EXPIRED:   "💀 RUN RESET. GG.",

  // ── Keyboard shortcuts ────────────────────────────────────
  KEY_RESET: "[",   // Start / restart the countdown
  KEY_SAVE:  "]",   // Trigger the save

  // ── Pulse speed thresholds (seconds remaining) ─────────────
  WARN_THRESHOLD:   20,   // Switch to fast pulse
  DANGER_THRESHOLD: 10,   // Switch to frantic pulse + red

  // ── How long saved/expired screens linger before idle (ms) ─
  SAVED_LINGER_MS:   5000,
  EXPIRED_LINGER_MS: 7000,

  // ── Sounds (Web Audio API — no external files needed) ──────
  // To use your own audio files, replace the playSound() function
  // body with:  new Audio("path/to/your.mp3").play()
  // Label is kept per-event so you know exactly where to swap.
  //
  // 🔊 RESET SOUND  — two descending sawtooth blips
  SOUND_RESET_FREQ:  220,
  // 🔊 SAVE SOUND   — ascending sine chime
  SOUND_SAVE_FREQ:   880,
  // 🔊 EXPIRE SOUND — low descending groan
  SOUND_EXPIRE_FREQ: 110,

};
/* ============================================================
   END CONFIGURATION
============================================================ */


/* ── Audio engine ───────────────────────────────────────── */
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}
function playSound(type) {
  ensureAudio();
  const ctx = audioCtx;
  const now = ctx.currentTime;

  if (type === "reset") {
    // 🔊 RESET SOUND — swap block below with: new Audio("reset.mp3").play()
    [0, 0.12].forEach((delay, i) => {
      const osc = ctx.createOscillator(), g = ctx.createGain();
      osc.connect(g); g.connect(ctx.destination);
      osc.type = "sawtooth";
      osc.frequency.setValueAtTime(CONFIG.SOUND_RESET_FREQ * (i === 0 ? 1.5 : 1), now + delay);
      g.gain.setValueAtTime(0.3, now + delay);
      g.gain.exponentialRampToValueAtTime(0.001, now + delay + 0.18);
      osc.start(now + delay); osc.stop(now + delay + 0.2);
    });

  } else if (type === "save") {
    // 🔊 SAVE SOUND — swap block below with: new Audio("save.mp3").play()
    [0, 0.10, 0.22, 0.36].forEach((delay, i) => {
      const freq = CONFIG.SOUND_SAVE_FREQ * [1, 1.25, 1.5, 2][i];
      const osc = ctx.createOscillator(), g = ctx.createGain();
      osc.connect(g); g.connect(ctx.destination);
      osc.type = "sine";
      osc.frequency.setValueAtTime(freq, now + delay);
      g.gain.setValueAtTime(0.35, now + delay);
      g.gain.exponentialRampToValueAtTime(0.001, now + delay + 0.4);
      osc.start(now + delay); osc.stop(now + delay + 0.45);
    });

  } else if (type === "expire") {
    // 🔊 EXPIRE SOUND — swap block below with: new Audio("expire.mp3").play()
    const osc = ctx.createOscillator(), g = ctx.createGain();
    osc.connect(g); g.connect(ctx.destination);
    osc.type = "sawtooth";
    osc.frequency.setValueAtTime(CONFIG.SOUND_EXPIRE_FREQ * 2, now);
    osc.frequency.exponentialRampToValueAtTime(CONFIG.SOUND_EXPIRE_FREQ * 0.5, now + 0.8);
    g.gain.setValueAtTime(0.4, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.9);
    osc.start(now); osc.stop(now + 1.0);
  }
}

/* ── DOM refs ───────────────────────────────────────────── */
const panel        = document.getElementById("panel");
const splatBg      = document.getElementById("splat-bg");
const blobLayer    = document.getElementById("blob-layer");
const glowRing     = document.getElementById("glow-ring");
const timerNumber  = document.getElementById("timer-number");
const countLabel   = document.getElementById("countdown-label");
const progressFill = document.getElementById("progress-fill");
const stateBanner  = document.getElementById("state-banner");
const burstLayer   = document.getElementById("burst-layer");
const crackLayer   = document.getElementById("crack-layer");
const crackSvg     = document.getElementById("crack-svg");
const countWrap    = document.getElementById("countdown-wrap");

// Stamp configured copy
countLabel.textContent = CONFIG.COPY_COUNTDOWN;

/* ── Build ambient blobs ────────────────────────────────── */
const BLOBS = [
  { w:340, h:260, l:"5%",  t:"55%", c:"#7B2FBE", o:0.25, d:8  },
  { w:260, h:200, l:"80%", t:"60%", c:"#A855F7", o:0.20, d:11 },
  { w:180, h:140, l:"45%", t:"5%",  c:"#9333EA", o:0.15, d:7  },
  { w:120, h:100, l:"15%", t:"10%", c:"#C084FC", o:0.18, d:9  },
  { w:150, h:110, l:"70%", t:"15%", c:"#6D28D9", o:0.15, d:13 },
];
BLOBS.forEach((b, i) => {
  const el = document.createElement("div");
  el.className = "blob";
  el.style.cssText = `width:${b.w}px;height:${b.h}px;left:${b.l};top:${b.t};
    background:radial-gradient(ellipse,${b.c} 0%,transparent 70%);opacity:${b.o};
    animation:blobDrift${i} ${b.d}s ease-in-out infinite alternate;`;
  blobLayer.appendChild(el);
  const dx = (i % 2 === 0 ? 1 : -1) * 30;
  const dy = (i % 3 === 0 ? -1 : 1) * 20;
  const dr = (i % 2 === 0 ? 3 : -3);
  addStyle(`@keyframes blobDrift${i}{from{transform:translate(0,0) scale(1) rotate(0deg)}to{transform:translate(${dx}px,${dy}px) scale(1.08) rotate(${dr}deg)}}`);
});

function addStyle(css) {
  const s = document.createElement("style");
  s.textContent = css;
  document.head.appendChild(s);
}

/* ── State machine ──────────────────────────────────────── */
const STATE = { IDLE:"idle", COUNTDOWN:"countdown", SAVED:"saved", EXPIRED:"expired" };
let state = STATE.IDLE;
let timeLeft = CONFIG.TIMER_SECONDS;
let ticker = null;
let lingerTimer = null;

function show(...els) { els.forEach(e => e.classList.add("visible")); }
function hide(...els) { els.forEach(e => e.classList.remove("visible")); }

function enterIdle() {
  state = STATE.IDLE;
  clearInterval(ticker);
  clearTimeout(lingerTimer);

  hide(panel, splatBg, blobLayer, glowRing, crackLayer);
  timerNumber.className = "";
  stateBanner.className = "";
  progressFill.classList.remove("danger");
  burstLayer.innerHTML = "";
  crackSvg.innerHTML   = "";
  // Remove stray drip divs
  crackLayer.querySelectorAll(".drip").forEach(d => d.remove());
}

function enterCountdown() {
  state = STATE.COUNTDOWN;
  clearInterval(ticker);
  clearTimeout(lingerTimer);
  timeLeft = CONFIG.TIMER_SECONDS;

  // Reset any lingering state
  hide(crackLayer);
  crackSvg.innerHTML = "";
  burstLayer.innerHTML = "";
  crackLayer.querySelectorAll(".drip").forEach(d => d.remove());
  stateBanner.className = "";
  stateBanner.textContent = "";
  countWrap.style.display = "flex";
  progressFill.classList.remove("danger");
  progressFill.style.transition = "none";
  progressFill.style.width = "100%";
  // Re-enable transition on next frame
  requestAnimationFrame(() => {
    progressFill.style.transition = "width 0.9s linear, background 0.3s ease";
  });

  updateDisplay();
  show(panel, splatBg, blobLayer, glowRing);
  playSound("reset");

  ticker = setInterval(() => {
    timeLeft--;
    updateDisplay();
    if (timeLeft <= 0) enterExpired();
  }, 1000);
}

function enterSaved() {
  if (state !== STATE.COUNTDOWN) return;
  state = STATE.SAVED;
  clearInterval(ticker);

  playSound("save");
  countWrap.style.display = "none";
  stateBanner.textContent = CONFIG.COPY_SAVED;
  stateBanner.className   = "saved-text";

  triggerBurst();
  lingerTimer = setTimeout(enterIdle, CONFIG.SAVED_LINGER_MS);
}

function enterExpired() {
  state = STATE.EXPIRED;
  clearInterval(ticker);

  playSound("expire");
  timerNumber.textContent = "0";
  timerNumber.className   = "pulse-danger";
  progressFill.style.width = "0%";

  setTimeout(() => {
    countWrap.style.display = "none";
    stateBanner.textContent  = CONFIG.COPY_EXPIRED;
    stateBanner.className    = "expired-text";
    triggerCrack();
  }, 300);

  lingerTimer = setTimeout(enterIdle, CONFIG.EXPIRED_LINGER_MS);
}

function updateDisplay() {
  const pct = timeLeft / CONFIG.TIMER_SECONDS;
  timerNumber.textContent  = timeLeft;
  progressFill.style.width = (pct * 100) + "%";

  timerNumber.classList.remove("pulse-normal", "pulse-warn", "pulse-danger");
  if (timeLeft <= CONFIG.DANGER_THRESHOLD) {
    timerNumber.classList.add("pulse-danger");
    progressFill.classList.add("danger");
  } else if (timeLeft <= CONFIG.WARN_THRESHOLD) {
    timerNumber.classList.add("pulse-warn");
  } else {
    timerNumber.classList.add("pulse-normal");
  }
}

/* ── Save: Splat burst ──────────────────────────────────── */
function triggerBurst() {
  const colors = ["#A855F7","#C084FC","#E879F9","#7B2FBE","#DDD6FE","#FBBF24"];
  const n = 30;

  for (let i = 0; i < n; i++) {
    const el  = document.createElement("div");
    el.className = "splat-particle";
    const sz  = 20 + Math.random() * 90;
    const ang = (i / n) * 360 + Math.random() * 24;
    const r   = 160 + Math.random() * 520;
    const dx  = Math.cos(ang * Math.PI / 180) * r;
    const dy  = Math.sin(ang * Math.PI / 180) * r;
    const col = colors[i % colors.length];
    const dur = 0.5 + Math.random() * 0.6;
    const del = Math.random() * 0.18;
    const rot = Math.random() * 360;
    const br1 = 40 + Math.random()*30, br2 = 60 + Math.random()*20,
          br3 = 40 + Math.random()*30, br4 = 60 + Math.random()*20,
          br5 = 50 + Math.random()*20, br6 = 40 + Math.random()*20,
          br7 = 60 + Math.random()*20, br8 = 50 + Math.random()*20;

    el.style.cssText = `
      width:${sz}px; height:${sz * (0.6 + Math.random() * 0.6)}px;
      left:calc(50% - ${sz/2}px); top:calc(80% - ${sz/2}px);
      background:radial-gradient(ellipse at 35% 35%,${col},${col}99);
      border-radius:${br1}% ${br2}% ${br3}% ${br4}% / ${br5}% ${br6}% ${br7}% ${br8}%;
      box-shadow:0 0 ${sz*0.4}px ${col}88;
      animation:burst${i} ${dur}s ${del}s cubic-bezier(.2,.8,.4,1) forwards;
    `;
    addStyle(`@keyframes burst${i}{0%{opacity:1;transform:translate(0,0) scale(0) rotate(0deg)}40%{opacity:1}100%{opacity:0;transform:translate(${dx}px,${dy}px) scale(1) rotate(${rot}deg)}}`);
    burstLayer.appendChild(el);
  }

  // Pulse the splat bg
  splatBg.style.filter = "drop-shadow(0 0 80px rgba(232,121,249,1)) drop-shadow(0 0 160px rgba(168,85,247,0.8))";
  setTimeout(() => {
    splatBg.style.filter = "drop-shadow(0 0 40px rgba(168,85,247,0.6))";
  }, 600);
}

/* ── Expire: Crack + drips ──────────────────────────────── */
function triggerCrack() {
  show(crackLayer);

  // SVG crack lines radiating from bottom center
  const cx = 960, cy = 960;
  const crackPaths = [
    [[cx,cy],[cx-180,cy-300],[cx-260,cy-500],[cx-160,cy-720]],
    [[cx,cy],[cx+200,cy-280],[cx+310,cy-490],[cx+200,cy-700]],
    [[cx,cy],[cx-80, cy-440],[cx-50, cy-700],[cx-130,cy-920]],
    [[cx,cy],[cx+60, cy-390],[cx+90, cy-630],[cx+40, cy-870]],
    [[cx,cy],[cx-330,cy-200],[cx-510,cy-290],[cx-660,cy-270]],
    [[cx,cy],[cx+360,cy-180],[cx+570,cy-250],[cx+720,cy-230]],
    [[cx,cy],[cx-140,cy-150],[cx-360,cy-110],[cx-510,cy-190]],
    [[cx,cy],[cx+160,cy-140],[cx+410,cy-100],[cx+580,cy-170]],
  ];

  crackPaths.forEach((pts, idx) => {
    const path = document.createElementNS("http://www.w3.org/2000/svg","path");
    let d = `M ${pts[0][0]} ${pts[0][1]}`;
    pts.slice(1).forEach(p => { d += ` L ${p[0]} ${p[1]}`; });
    path.setAttribute("d", d);
    path.setAttribute("stroke", "#F43F5E");
    path.setAttribute("stroke-width", String(Math.max(1.5, 4 - idx * 0.35)));
    path.setAttribute("fill", "none");
    path.setAttribute("opacity", "0.85");
    const len = 1400;
    path.style.strokeDasharray  = len;
    path.style.strokeDashoffset = len;
    path.style.transition = `stroke-dashoffset ${0.4 + idx * 0.06}s ${idx * 0.04}s ease-out`;
    crackSvg.appendChild(path);
    requestAnimationFrame(() => requestAnimationFrame(() => { path.style.strokeDashoffset = "0"; }));
  });

  // Drips from top
  [150,350,560,780,1050,1280,1540,1760].forEach((x, i) => {
    const drip = document.createElement("div");
    drip.className = "drip";
    const h = 80 + Math.random() * 200;
    const w = 8 + Math.random() * 14;
    drip.style.cssText = `left:${x}px;height:${h}px;width:${w}px;
      background:linear-gradient(180deg,#F43F5E,#7F1D1D);
      animation:dripDown ${0.6 + Math.random()*0.4}s ${0.2 + i*0.07}s ease-in forwards;`;
    crackLayer.appendChild(drip);
  });
  addStyle(`@keyframes dripDown{0%{opacity:0;transform:scaleY(0);transform-origin:top}30%{opacity:0.9}100%{opacity:0.7;transform:scaleY(1);transform-origin:top}}`);

  // Red vignette flash
  const flash = document.createElement("div");
  flash.style.cssText = `position:fixed;inset:0;z-index:50;pointer-events:none;
    background:radial-gradient(ellipse at center,transparent 30%,rgba(244,63,94,0.4) 100%);
    animation:vignFade 1.5s ease forwards;`;
  addStyle(`@keyframes vignFade{0%{opacity:0}20%{opacity:1}100%{opacity:0}}`);
  document.body.appendChild(flash);
  setTimeout(() => flash.remove(), 1600);
}

/* ── Keyboard ───────────────────────────────────────────── */
document.addEventListener("keydown", e => {
  if (e.key === CONFIG.KEY_RESET) {
    enterCountdown();
  } else if (e.key === CONFIG.KEY_SAVE) {
    if (state === STATE.COUNTDOWN) enterSaved();
  }
});

/* ── Init ───────────────────────────────────────────────── */
enterIdle();
</script>
