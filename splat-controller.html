<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Splat Controller 💜</title>
<link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --clr-deep:   #1a0533;
    --clr-mid:    #7B2FBE;
    --clr-bright: #A855F7;
    --clr-light:  #C084FC;
    --clr-accent: #E879F9;
    --clr-white:  #FAF5FF;
    --clr-danger: #F43F5E;
    --clr-save:   #22c55e;
  }
  *, *::before, *::after { box-sizing: border-box; margin:0; padding:0; }
  body {
    background: var(--clr-deep);
    font-family: 'DM Sans', sans-serif;
    color: var(--clr-white);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 32px;
    padding: 32px 20px;
    user-select: none;
  }

  h1 {
    font-family: 'Boogaloo', cursive;
    font-size: 48px;
    letter-spacing: 2px;
    color: var(--clr-light);
    text-shadow: 0 0 30px var(--clr-accent);
    text-align: center;
  }

  /* Status bar */
  #status-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 10px 24px;
    font-size: 15px;
    color: rgba(255,255,255,0.6);
  }
  #conn-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: #555; transition: background 0.3s;
    flex-shrink: 0;
  }
  #conn-dot.connected { background: var(--clr-save); box-shadow: 0 0 8px var(--clr-save); }
  #conn-dot.waiting   { background: #FBBF24; box-shadow: 0 0 8px #FBBF24; animation: blink 1s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* Timer display */
  #timer-display {
    font-family: 'Boogaloo', cursive;
    font-size: 120px;
    line-height: 1;
    color: var(--clr-white);
    text-shadow: 0 0 30px var(--clr-bright);
    letter-spacing: -3px;
    min-width: 200px;
    text-align: center;
    transition: color 0.3s;
  }
  #timer-display.warn   { color: var(--clr-accent); text-shadow: 0 0 30px var(--clr-accent); }
  #timer-display.danger { color: var(--clr-danger); text-shadow: 0 0 30px var(--clr-danger), 0 0 60px var(--clr-danger); }
  #timer-display.idle   { color: rgba(255,255,255,0.2); text-shadow: none; }

  /* State label */
  #state-label {
    font-family: 'Boogaloo', cursive;
    font-size: 28px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
    text-align: center;
    min-height: 36px;
    transition: color 0.3s;
  }

  /* Buttons */
  .btn-row {
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .btn {
    font-family: 'Boogaloo', cursive;
    font-size: 36px;
    letter-spacing: 2px;
    border: none;
    border-radius: 20px;
    padding: 28px 56px;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.2s, filter 0.2s;
    position: relative;
    overflow: hidden;
    min-width: 260px;
  }
  .btn:active { transform: scale(0.95); }
  .btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: white;
    opacity: 0;
    transition: opacity 0.1s;
    border-radius: inherit;
  }
  .btn:active::after { opacity: 0.15; }

  #btn-reset {
    background: linear-gradient(135deg, #7B2FBE, #A855F7);
    color: white;
    box-shadow: 0 8px 32px rgba(168,85,247,0.5), 0 0 0 2px rgba(255,255,255,0.1) inset;
  }
  #btn-reset:hover { box-shadow: 0 12px 48px rgba(168,85,247,0.7), 0 0 0 2px rgba(255,255,255,0.15) inset; filter: brightness(1.1); }
  #btn-reset.active-state { animation: btnPulse 1s ease-in-out infinite; }
  @keyframes btnPulse { 0%,100%{box-shadow:0 8px 32px rgba(168,85,247,0.5)} 50%{box-shadow:0 8px 56px rgba(168,85,247,0.9)} }

  #btn-save {
    background: linear-gradient(135deg, #15803d, #22c55e);
    color: white;
    box-shadow: 0 8px 32px rgba(34,197,94,0.4), 0 0 0 2px rgba(255,255,255,0.1) inset;
    opacity: 0.35;
    pointer-events: none;
    transition: opacity 0.3s, box-shadow 0.2s, filter 0.2s;
  }
  #btn-save.enabled {
    opacity: 1;
    pointer-events: auto;
    animation: saveReady 1.5s ease-in-out infinite;
  }
  #btn-save.enabled:hover { box-shadow: 0 12px 48px rgba(34,197,94,0.7); filter: brightness(1.1); }
  @keyframes saveReady { 0%,100%{box-shadow:0 8px 32px rgba(34,197,94,0.4)} 50%{box-shadow:0 8px 56px rgba(34,197,94,0.8)} }

  #btn-idle {
    background: rgba(255,255,255,0.07);
    color: rgba(255,255,255,0.4);
    box-shadow: none;
    border: 1px solid rgba(255,255,255,0.12);
    font-size: 22px;
    padding: 16px 36px;
    min-width: 160px;
  }
  #btn-idle:hover { background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.7); }

  /* Progress bar */
  #progress-wrap {
    width: 100%;
    max-width: 500px;
    height: 10px;
    background: rgba(255,255,255,0.08);
    border-radius: 5px;
    overflow: hidden;
  }
  #progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--clr-mid), var(--clr-accent));
    border-radius: 5px;
    width: 100%;
    transition: width 0.9s linear, background 0.3s;
  }
  #progress-fill.danger { background: linear-gradient(90deg, #7F1D1D, var(--clr-danger)); }

  /* Keyboard shortcut hints */
  .shortcut-hints {
    display: flex; gap: 20px; flex-wrap: wrap; justify-content: center;
  }
  .hint {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; color: rgba(255,255,255,0.3);
  }
  kbd {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 6px;
    padding: 3px 10px;
    font-family: monospace;
    font-size: 14px;
    color: rgba(255,255,255,0.6);
  }

  /* Flash feedback */
  #flash {
    position: fixed; inset: 0; pointer-events: none; z-index: 999;
    opacity: 0; transition: opacity 0.1s;
  }
  #flash.green { background: rgba(34,197,94,0.15); }
  #flash.red   { background: rgba(244,63,94,0.15); }
  #flash.show  { opacity: 1; }
</style>
</head>
<body>

<h1>💜 Splat Controller</h1>

<div id="status-bar">
  <div id="conn-dot" class="waiting"></div>
  <span id="conn-label">Looking for overlay tab…</span>
</div>

<div id="timer-display" class="idle">--</div>
<div id="state-label">IDLE</div>

<div id="progress-wrap"><div id="progress-fill"></div></div>

<div class="btn-row">
  <button class="btn" id="btn-reset" onclick="sendReset()">⚠️ RESET TIMER</button>
  <button class="btn" id="btn-save"  onclick="sendSave()">💜 SAVE RUN</button>
</div>

<div class="btn-row">
  <button class="btn" id="btn-idle" onclick="sendIdle()">✖ Clear / Idle</button>
</div>

<div class="shortcut-hints">
  <div class="hint"><kbd>[</kbd> Start Reset</div>
  <div class="hint"><kbd>]</kbd> Save Run</div>
  <div class="hint"><kbd>Esc</kbd> Clear</div>
</div>

<div id="flash"></div>

<script>
/* ── CONFIG (keep in sync with overlay) ─────────────────── */
const CONFIG = {
  TIMER_SECONDS:    60,
  WARN_THRESHOLD:   20,
  DANGER_THRESHOLD: 10,
  CHANNEL_NAME:     "splat-overlay-control",
};

/* ── BroadcastChannel ───────────────────────────────────── */
const channel = new BroadcastChannel(CONFIG.CHANNEL_NAME);
const connDot   = document.getElementById("conn-dot");
const connLabel = document.getElementById("conn-label");
const timerDisp = document.getElementById("timer-display");
const stateLabel= document.getElementById("state-label");
const btnSave   = document.getElementById("btn-save");
const btnReset  = document.getElementById("btn-reset");
const progFill  = document.getElementById("progress-fill");
const flash     = document.getElementById("flash");

let overlayConnected = false;
let appState = "idle";
let timeLeft = CONFIG.TIMER_SECONDS;
let ticker = null;

// Ping overlay every 2s to check it's alive
function pingOverlay() {
  channel.postMessage({ cmd: "ping" });
}
setInterval(pingOverlay, 2000);
pingOverlay();

channel.onmessage = (e) => {
  const { cmd } = e.data || {};
  if (cmd === "pong") {
    overlayConnected = true;
    connDot.className = "connected";
    connLabel.textContent = "Overlay connected ✓";
  }
};

/* ── Commands ───────────────────────────────────────────── */
function sendReset() {
  channel.postMessage({ cmd: "reset" });
  startLocalCountdown();
  doFlash("red");
}

function sendSave() {
  if (appState !== "countdown") return;
  channel.postMessage({ cmd: "save" });
  clearInterval(ticker);
  appState = "saved";
  timerDisp.textContent = "💜";
  timerDisp.className = "";
  stateLabel.textContent = "RUN SAVED!";
  stateLabel.style.color = "#22c55e";
  btnSave.classList.remove("enabled");
  btnReset.classList.remove("active-state");
  progFill.style.width = "100%";
  progFill.classList.remove("danger");
  doFlash("green");
  setTimeout(goIdle, 5000);
}

function sendIdle() {
  channel.postMessage({ cmd: "idle" });
  goIdle();
}

function goIdle() {
  clearInterval(ticker);
  appState = "idle";
  timerDisp.textContent = "--";
  timerDisp.className = "idle";
  stateLabel.textContent = "IDLE";
  stateLabel.style.color = "";
  btnSave.classList.remove("enabled");
  btnReset.classList.remove("active-state");
  progFill.style.width = "100%";
  progFill.classList.remove("danger");
}

/* ── Local countdown mirror ─────────────────────────────── */
function startLocalCountdown() {
  clearInterval(ticker);
  appState = "countdown";
  timeLeft = CONFIG.TIMER_SECONDS;
  btnSave.classList.add("enabled");
  btnReset.classList.add("active-state");
  stateLabel.style.color = "";
  updateLocal();

  ticker = setInterval(() => {
    timeLeft--;
    updateLocal();
    if (timeLeft <= 0) {
      clearInterval(ticker);
      appState = "expired";
      timerDisp.textContent = "💀";
      timerDisp.className = "danger";
      stateLabel.textContent = "RUN RESET";
      stateLabel.style.color = "#F43F5E";
      btnSave.classList.remove("enabled");
      btnReset.classList.remove("active-state");
      setTimeout(goIdle, 7000);
    }
  }, 1000);
}

function updateLocal() {
  timerDisp.textContent = timeLeft;
  const pct = timeLeft / CONFIG.TIMER_SECONDS;
  progFill.style.width = (pct * 100) + "%";
  if (timeLeft <= CONFIG.DANGER_THRESHOLD) {
    timerDisp.className = "danger";
    progFill.classList.add("danger");
    stateLabel.textContent = "⚠️ ALMOST OUT!";
  } else if (timeLeft <= CONFIG.WARN_THRESHOLD) {
    timerDisp.className = "warn";
    stateLabel.textContent = "⚠️ COUNTING DOWN…";
  } else {
    timerDisp.className = "";
    stateLabel.textContent = "COUNTING DOWN…";
  }
}

/* ── Flash feedback ─────────────────────────────────────── */
function doFlash(color) {
  flash.className = color + " show";
  setTimeout(() => { flash.className = ""; }, 300);
}

/* ── Keyboard shortcuts ─────────────────────────────────── */
document.addEventListener("keydown", e => {
  if (e.key === "[")   sendReset();
  if (e.key === "]")   sendSave();
  if (e.key === "Escape") sendIdle();
});
</script>
</body>
</html>
