<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Guest Chat</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=DM+Sans:wght@500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --deep: #3B0764;
    --mid: #7B2FBE;
    --bright: #A855F7;
    --light: #C084FC;
    --accent: #E879F9;
    --white: #FAF5FF;
    --danger: #F43F5E;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    min-height: 100%;
    background: radial-gradient(ellipse at top, var(--mid) 0%, var(--deep) 55%, #1a0430 100%);
    background-attachment: fixed;
    color: var(--white);
    font-family: "DM Sans", system-ui, sans-serif;
  }
  body { padding: 40px 24px 60px; display: flex; justify-content: center; }
  .wrap { max-width: 440px; width: 100%; }
  header { text-align: center; margin-bottom: 28px; }
  h1 {
    font-family: "Boogaloo", cursive;
    font-size: 40px;
    letter-spacing: .02em;
    margin: 0 0 6px;
    text-shadow: 0 3px 0 rgba(0,0,0,.3);
  }
  header p {
    margin: 0;
    color: var(--light);
    font-weight: 700;
    font-size: 13px;
    letter-spacing: .03em;
    opacity: .85;
  }
  .card {
    background: rgba(255,255,255,.06);
    border: 1px solid rgba(255,255,255,.12);
    border-radius: 16px;
    padding: 22px 20px;
  }
  .warning {
    font-size: 12.5px;
    color: var(--danger);
    background: rgba(244,63,94,.12);
    border: 1px solid rgba(244,63,94,.35);
    border-radius: 8px;
    padding: 10px 12px;
    line-height: 1.4;
    margin-bottom: 20px;
  }
  label {
    display: block;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .04em;
    color: var(--light);
    margin-bottom: 6px;
  }
  input[type="text"], textarea {
    width: 100%;
    background: rgba(0,0,0,.3);
    color: var(--white);
    border: 1px solid rgba(255,255,255,.2);
    border-radius: 8px;
    padding: 10px 12px;
    font-family: inherit;
    font-size: 14px;
    margin-bottom: 16px;
    resize: none;
  }
  input[type="text"]:focus, textarea:focus { outline: none; border-color: var(--accent); }
  textarea { min-height: 70px; }
  .checkbox-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 18px;
    font-size: 13px;
    color: var(--white);
  }
  .checkbox-row input { width: 16px; height: 16px; }
  .send-btn {
    display: block;
    width: 100%;
    background: linear-gradient(135deg, var(--bright), var(--mid));
    color: var(--white);
    border: 1px solid rgba(255,255,255,.25);
    border-radius: 10px;
    padding: 13px 16px;
    font-family: inherit;
    font-weight: 900;
    font-size: 15px;
    cursor: pointer;
    transition: transform .15s cubic-bezier(.34,1.56,.64,1), border-color .15s;
  }
  .send-btn:hover:not(:disabled) { transform: translateY(-2px); border-color: var(--white); }
  .send-btn:disabled { opacity: .5; cursor: not-allowed; }
  .status {
    text-align: center;
    font-size: 12.5px;
    margin-top: 12px;
    min-height: 16px;
    color: var(--light);
  }
  .status.ok { color: #6ee68c; }
  .status.err { color: var(--danger); }
  .preview {
    font-size: 11.5px;
    color: var(--light);
    opacity: .8;
    margin-top: -8px;
    margin-bottom: 16px;
  }
  .chat-log-panel {
    background: rgba(255,255,255,.06);
    border: 1px solid rgba(255,255,255,.12);
    border-radius: 16px;
    padding: 14px 16px;
    margin-bottom: 16px;
  }
  .chat-log-header {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .04em;
    color: var(--light);
    margin-bottom: 10px;
  }
  .chat-log-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #888;
    flex: 0 0 auto;
  }
  .chat-log-dot.connecting { background: #d9a441; }
  .chat-log-dot.connected { background: #6ee68c; }
  .chat-log-dot.disconnected { background: var(--danger); }
  .chat-log-messages {
    max-height: 260px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .chat-log-msg {
    font-size: 13px;
    line-height: 1.35;
    word-wrap: break-word;
  }
  .chat-log-msg .chat-log-name {
    font-weight: 700;
    color: var(--accent);
    margin-right: 5px;
  }
  .chat-log-msg.is-guest .chat-log-name { color: #6ee68c; }
  .chat-log-empty {
    font-size: 12.5px;
    color: var(--light);
    opacity: .7;
    text-align: center;
    padding: 10px 0;
  }
  .discord-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    background: #5865F2;
    color: #fff;
    border: 1px solid rgba(255,255,255,.25);
    border-radius: 10px;
    padding: 11px 16px;
    font-family: inherit;
    font-weight: 900;
    font-size: 14px;
    cursor: pointer;
    margin-bottom: 14px;
    transition: transform .15s cubic-bezier(.34,1.56,.64,1), border-color .15s;
  }
  .discord-btn:hover { transform: translateY(-2px); border-color: var(--white); }
  .divider {
    display: flex;
    align-items: center;
    color: var(--light);
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .04em;
    opacity: .6;
    margin-bottom: 14px;
  }
  .divider::before, .divider::after {
    content: "";
    flex: 1;
    border-top: 1px solid rgba(255,255,255,.15);
  }
  .divider span { padding: 0 10px; }
  .discord-identity-row {
    display: none;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    padding: 10px 12px;
    background: rgba(88,101,242,.15);
    border: 1px solid rgba(88,101,242,.4);
    border-radius: 8px;
  }
  .discord-avatar {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: none;
  }
  .discord-identity-row .name {
    flex: 1;
    font-weight: 700;
    font-size: 14px;
  }
  .discord-identity-row a {
    color: var(--light);
    font-size: 11.5px;
    text-decoration: underline;
    cursor: pointer;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>🎤 Guest Chat</h1>
    <p>Send a message straight into the stream chat</p>
  </header>

  <div class="warning" id="session-warning" style="display:none;">
    <strong>⚠️ No session in this link.</strong> Ask whoever sent you this page for the correct link — it needs
    a <code>?session=</code> value to work.
  </div>

  <div class="chat-log-panel" id="chat-log-panel">
    <div class="chat-log-header">
      <span class="chat-log-dot" id="chat-log-dot"></span>
      <span id="chat-log-status">Connecting to chat...</span>
    </div>
    <div class="chat-log-messages" id="chat-log-messages">
      <div class="chat-log-empty" id="chat-log-empty">No messages yet — say hi!</div>
    </div>
  </div>

  <div class="card" id="form-card">
    <div id="discord-login-row">
      <button class="discord-btn" id="discord-login-btn" type="button">💬 Login with Discord</button>
    </div>
    <div class="divider" id="discord-divider"><span>or</span></div>

    <div class="discord-identity-row" id="discord-identity-row">
      <img class="discord-avatar" id="discord-avatar" alt="">
      <span class="name" id="discord-display-name"></span>
      <a href="#" id="discord-logout">Log out</a>
    </div>

    <div id="manual-name-group">
      <label for="guest-name">Your name</label>
      <input type="text" id="guest-name" maxlength="40" placeholder="e.g. Jamie">
    </div>

    <label for="guest-message">Message</label>
    <textarea id="guest-message" maxlength="200" placeholder="Say something..."></textarea>

    <div class="checkbox-row">
      <input type="checkbox" id="guest-readaloud" checked>
      <label for="guest-readaloud" style="margin:0; text-transform:none; letter-spacing:0; font-size:13px; color:var(--white); font-weight:500;">
        🔊 Read this message aloud
      </label>
    </div>

    <div class="preview" id="preview-text"></div>

    <button class="send-btn" id="send-btn" type="button">Send</button>
    <div class="status" id="status-text"></div>
  </div>
</div>

<script>
(function () {
  "use strict";
  var NAME_KEY = "jjxlive_guest_chat_name";
  var DISCORD_CLIENT_ID = "1528487115908714657";
  var DISCORD_REDIRECT_URI = "https://jjxlive-repo.github.io/overlays/guest-chat.html";
  var DISCORD_IDENTITY_KEY = "jjxlive_guest_chat_discord";
  var PENDING_SESSION_KEY = "jjxlive_guest_chat_pending_session";
  var PENDING_STATE_KEY = "jjxlive_guest_chat_pending_state";

  // Discord's implicit-grant redirect drops our ?session=... query string (the redirect_uri
  // registered with Discord has no query string), so we stash SESSION in sessionStorage right
  // before leaving for Discord and restore it here, before anything else runs.
  var restoredSession = null;
  var pendingDiscordToken = null;
  var discordCallbackError = null;
  if (location.hash.indexOf("access_token=") !== -1) {
    var hashParams = new URLSearchParams(location.hash.slice(1));
    var returnedState = hashParams.get("state");
    var expectedState = sessionStorage.getItem(PENDING_STATE_KEY);
    var pendingSession = sessionStorage.getItem(PENDING_SESSION_KEY);
    sessionStorage.removeItem(PENDING_STATE_KEY);
    sessionStorage.removeItem(PENDING_SESSION_KEY);
    if (returnedState && expectedState && returnedState === expectedState) {
      pendingDiscordToken = hashParams.get("access_token");
      restoredSession = pendingSession;
    } else {
      discordCallbackError = "Login verification failed — please try again.";
    }
    var cleanUrl = location.pathname + (restoredSession ? ("?session=" + encodeURIComponent(restoredSession)) : location.search);
    history.replaceState(null, "", cleanUrl);
  }

  var SESSION = restoredSession || new URLSearchParams(location.search).get("session") || "";

  function loadDiscordIdentity() {
    try {
      var raw = localStorage.getItem(DISCORD_IDENTITY_KEY);
      if (!raw) return null;
      var identity = JSON.parse(raw);
      if (!identity || !identity.expiresAt || identity.expiresAt < Date.now()) {
        localStorage.removeItem(DISCORD_IDENTITY_KEY);
        return null;
      }
      return identity;
    } catch (e) { return null; }
  }
  function saveDiscordIdentity(identity) {
    try { localStorage.setItem(DISCORD_IDENTITY_KEY, JSON.stringify(identity)); } catch (e) {}
  }
  function clearDiscordIdentity() {
    try { localStorage.removeItem(DISCORD_IDENTITY_KEY); } catch (e) {}
  }
  function randomState() {
    return Math.random().toString(36).slice(2) + Date.now().toString(36);
  }

  var warning = document.getElementById("session-warning");
  var formCard = document.getElementById("form-card");
  var chatLogPanel = document.getElementById("chat-log-panel");
  var nameInput = document.getElementById("guest-name");
  var manualNameGroup = document.getElementById("manual-name-group");
  var messageInput = document.getElementById("guest-message");
  var readAloudCheckbox = document.getElementById("guest-readaloud");
  var previewText = document.getElementById("preview-text");
  var sendBtn = document.getElementById("send-btn");
  var statusText = document.getElementById("status-text");
  var discordLoginRow = document.getElementById("discord-login-row");
  var discordLoginBtn = document.getElementById("discord-login-btn");
  var discordDivider = document.getElementById("discord-divider");
  var discordIdentityRow = document.getElementById("discord-identity-row");
  var discordAvatar = document.getElementById("discord-avatar");
  var discordDisplayName = document.getElementById("discord-display-name");
  var discordLogoutLink = document.getElementById("discord-logout");

  if (!SESSION) {
    warning.style.display = "block";
    formCard.style.display = "none";
    chatLogPanel.style.display = "none";
    return;
  }

  var chatLogDot = document.getElementById("chat-log-dot");
  var chatLogStatus = document.getElementById("chat-log-status");
  var chatLogMessages = document.getElementById("chat-log-messages");
  var chatLogEmpty = document.getElementById("chat-log-empty");
  var MAX_LOG_MESSAGES = 50;

  function stripHtml(html) {
    var tmp = document.createElement("div");
    tmp.innerHTML = html;
    return tmp.textContent || tmp.innerText || "";
  }

  function appendChatLine(name, message, isGuest) {
    if (chatLogEmpty) { chatLogEmpty.remove(); chatLogEmpty = null; }
    var line = document.createElement("div");
    line.className = "chat-log-msg" + (isGuest ? " is-guest" : "");
    var nameEl = document.createElement("span");
    nameEl.className = "chat-log-name";
    nameEl.textContent = name + ":";
    var msgEl = document.createElement("span");
    msgEl.textContent = message.replace(/^\.\s*/, "");
    line.appendChild(nameEl);
    line.appendChild(msgEl);
    chatLogMessages.appendChild(line);
    while (chatLogMessages.children.length > MAX_LOG_MESSAGES) {
      chatLogMessages.removeChild(chatLogMessages.firstChild);
    }
    chatLogMessages.scrollTop = chatLogMessages.scrollHeight;
  }

  function setChatLogStatus(state) {
    chatLogDot.className = "chat-log-dot " + state;
    chatLogStatus.textContent = state === "connected" ? "Live chat"
      : state === "connecting" ? "Connecting to chat..."
      : "Disconnected — retrying...";
  }

  var readSocket = null;
  var readReconnectTimer = null;
  function connectReadSocket() {
    setChatLogStatus("connecting");
    readSocket = new WebSocket("wss://io.socialstream.ninja/join/" + SESSION + "/4");
    readSocket.onopen = function () { setChatLogStatus("connected"); };
    readSocket.onmessage = function (e) {
      var d;
      try { d = JSON.parse(e.data); } catch (err) { return; }
      if (!d) return;
      if (d.action === "content" && d.value) {
        try { d = JSON.parse(d.value); } catch (err) { return; }
      }
      if (d && d.chatname && d.chatmessage) {
        var incomingName = stripHtml(d.chatname);
        var isOwnMessage = incomingName === "🎤 " + currentGuestName();
        appendChatLine(incomingName, stripHtml(d.chatmessage), isOwnMessage);
      }
    };
    readSocket.onclose = function () {
      setChatLogStatus("disconnected");
      clearTimeout(readReconnectTimer);
      readReconnectTimer = setTimeout(connectReadSocket, 3000);
    };
    readSocket.onerror = function () {
      setChatLogStatus("disconnected");
      try { readSocket.close(); } catch (e) {}
    };
  }
  connectReadSocket();

  try {
    var savedName = localStorage.getItem(NAME_KEY);
    if (savedName) nameInput.value = savedName;
  } catch (e) {}

  function setStatus(text, kind) {
    statusText.textContent = text || "";
    statusText.className = "status" + (kind ? " " + kind : "");
  }

  var discordIdentity = null;

  function currentGuestName() {
    return discordIdentity ? discordIdentity.displayName : nameInput.value.trim();
  }
  function currentAvatarUrl() {
    return discordIdentity ? discordIdentity.avatarUrl : "";
  }

  function updatePreview() {
    var name = currentGuestName() || "Guest";
    var msg = messageInput.value.trim() || "...";
    previewText.textContent = "Will appear as: 🎤 " + name + ": " + msg;
  }
  nameInput.addEventListener("input", updatePreview);
  messageInput.addEventListener("input", updatePreview);

  function applyIdentityUI() {
    if (discordIdentity) {
      discordLoginRow.style.display = "none";
      discordDivider.style.display = "none";
      manualNameGroup.style.display = "none";
      discordIdentityRow.style.display = "flex";
      discordAvatar.style.display = discordIdentity.avatarUrl ? "inline-block" : "none";
      discordAvatar.src = discordIdentity.avatarUrl || "";
      discordDisplayName.textContent = discordIdentity.displayName;
    } else {
      discordLoginRow.style.display = DISCORD_CLIENT_ID ? "block" : "none";
      discordDivider.style.display = DISCORD_CLIENT_ID ? "flex" : "none";
      manualNameGroup.style.display = "block";
      discordIdentityRow.style.display = "none";
    }
    updatePreview();
  }

  discordLoginBtn.addEventListener("click", function () {
    var state = randomState();
    try {
      sessionStorage.setItem(PENDING_STATE_KEY, state);
      sessionStorage.setItem(PENDING_SESSION_KEY, SESSION);
    } catch (e) {}
    var authorizeUrl = "https://discord.com/oauth2/authorize"
      + "?response_type=token"
      + "&client_id=" + encodeURIComponent(DISCORD_CLIENT_ID)
      + "&redirect_uri=" + encodeURIComponent(DISCORD_REDIRECT_URI)
      + "&scope=identify"
      + "&state=" + encodeURIComponent(state);
    location.href = authorizeUrl;
  });

  discordLogoutLink.addEventListener("click", function (e) {
    e.preventDefault();
    discordIdentity = null;
    clearDiscordIdentity();
    applyIdentityUI();
  });

  function finishDiscordLogin(token) {
    setStatus("Verifying Discord login...", "");
    fetch("https://discord.com/api/users/@me", {
      headers: { Authorization: "Bearer " + token }
    }).then(function (res) {
      if (!res.ok) throw new Error("Discord rejected the login.");
      return res.json();
    }).then(function (user) {
      var displayName = user.global_name || user.username;
      var avatarUrl = user.avatar
        ? "https://cdn.discordapp.com/avatars/" + user.id + "/" + user.avatar + ".png?size=64"
        : "";
      discordIdentity = {
        displayName: displayName,
        avatarUrl: avatarUrl,
        expiresAt: Date.now() + 6 * 24 * 60 * 60 * 1000
      };
      saveDiscordIdentity(discordIdentity);
      applyIdentityUI();
      setStatus("Logged in as " + displayName + ".", "ok");
    }).catch(function (err) {
      setStatus(err.message || "Discord login failed.", "err");
    });
  }

  if (discordCallbackError) {
    setStatus(discordCallbackError, "err");
  } else if (pendingDiscordToken) {
    finishDiscordLogin(pendingDiscordToken);
  } else {
    discordIdentity = loadDiscordIdentity();
  }
  applyIdentityUI();

  function sendGuestMessage(sessionID, payload) {
    return new Promise(function (resolve, reject) {
      var socket = new WebSocket("wss://io.socialstream.ninja:443");
      var completed = false;
      var timeout = setTimeout(function () {
        if (completed) return;
        completed = true;
        try { socket.close(); } catch (e) {}
        reject(new Error("Timed out connecting."));
      }, 5000);

      socket.onopen = function () {
        // channel 4 — matches stream-dock.html / jjxlive-chat-box.html / ssn-chat-overlay.html,
        // which all listen via wss://io.socialstream.ninja/join/{session}/4. Channel 1 (SSN's own
        // createtestmessage.html default) targets the official SSN dock.html, not this repo's dock.
        socket.send(JSON.stringify({ join: sessionID, out: 4, in: 4 }));
        setTimeout(function () {
          if (completed) return;
          socket.send(JSON.stringify(payload));
          completed = true;
          clearTimeout(timeout);
          resolve();
          setTimeout(function () { try { socket.close(); } catch (e) {} }, 250);
        }, 150);
      };
      socket.onerror = function () {
        if (completed) return;
        completed = true;
        clearTimeout(timeout);
        reject(new Error("Connection failed."));
      };
    });
  }

  sendBtn.addEventListener("click", function () {
    var name = currentGuestName();
    var message = messageInput.value.trim();
    if (!name) {
      setStatus(discordIdentity ? "Something went wrong with your login — try logging in again." : "Enter your name first.", "err");
      if (!discordIdentity) nameInput.focus();
      return;
    }
    if (!message) { setStatus("Type a message first.", "err"); messageInput.focus(); return; }

    if (!discordIdentity) {
      try { localStorage.setItem(NAME_KEY, name); } catch (e) {}
    }

    var chatmessage = message;
    if (readAloudCheckbox.checked) chatmessage = ". " + chatmessage;

    var payload = {
      chatname: "🎤 " + name,
      chatmessage: chatmessage,
      type: "youtube",
      membership: true,
      mod: true
    };
    var avatarUrl = currentAvatarUrl();
    if (avatarUrl) payload.chatimg = avatarUrl;

    sendBtn.disabled = true;
    setStatus("Sending...", "");
    sendGuestMessage(SESSION, payload).then(function () {
      // No local echo here on purpose — sent messages loop back through the same
      // channel-4 relay this page listens on, so appending locally would double it up.
      setStatus("Sent!", "ok");
      messageInput.value = "";
      updatePreview();
      sendBtn.disabled = false;
      messageInput.focus();
    }, function (err) {
      setStatus(err.message || "Failed to send.", "err");
      sendBtn.disabled = false;
    });
  });

  messageInput.addEventListener("keydown", function (e) {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendBtn.click();
    }
  });
})();
</script>
</body>
</html>
