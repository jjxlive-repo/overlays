<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kegel Workout Overlay</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=DM+Sans:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://cdn.ably.com/lib/ably.min-2.js"></script>
<style>
  /* ═══════════════════════════════════════════
     CONFIG
     Frame art comes from the "Group kegel workout
     assets" pack (20 PNGs, 1254x1254, dark-purple
     background baked in). Upload the frames/ folder
     to GitHub Pages, then set FRAME_BASE below.
  ═══════════════════════════════════════════ */
  :root {
    --purple-deep:   #3B0764;
    --purple-mid:    #7B2FBE;
    --purple-bright: #A855F7;
    --purple-light:  #C084FC;
    --accent:        #E879F9;
    --white:         #FAF5FF;
    --danger:        #F43F5E;
    --amber:         #FBBF24;
  }

  html, body {
    width: 1080px;
    height: 1920px;
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: transparent;
    font-family: 'DM Sans', sans-serif;
  }

  #scene {
    width: 1080px;
    height: 1920px;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* ── connection status dot — top-right, 12-14px.
       NOTE: grey (disconnected) -> BLUE (connected).
       Not green: JJ is red-green colorblind and can't
       reliably tell purple/blue apart either, so blue
       is the one accent color reserved for "connected"
       across all his overlays. ── */
  /* hidden on the broadcast overlay; check stream-dock.html for status */
  #kw-status-dot {
    display: none;
    position: absolute;
    top: 28px;
    right: 28px;
    width: 13px;
    height: 13px;
    border-radius: 50%;
    background: #6b7280;
    box-shadow: 0 0 0 3px rgba(0,0,0,.25);
    transition: background .25s ease;
    z-index: 50;
  }
  #kw-status-dot.connected { background: #3b82f6; box-shadow: 0 0 8px #3b82f6, 0 0 0 3px rgba(0,0,0,.25); }

  /* ── rep counter pill — small, optional polish.
       Shows during the Rep Loop only. ── */
  #kw-rep-pill {
    position: absolute;
    top: 12%;
    left: 50%;
    transform: translate(-50%, -14px) scale(.85);
    opacity: 0;
    padding: 10px 26px;
    border-radius: 999px;
    background: rgba(59,7,100,.72);
    border: 2px solid var(--purple-light);
    color: var(--white);
    font-family: 'Boogaloo', cursive;
    font-size: 34px;
    letter-spacing: .04em;
    white-space: nowrap;
    transition: opacity .25s ease, transform .35s cubic-bezier(.34,1.56,.64,1);
    z-index: 40;
  }
  #kw-rep-pill.show { opacity: 1; transform: translate(-50%, 0) scale(1); }

  /* ── the frame card itself.
       Source art is a flat, non-transparent 1254x1254
       square with its own dark-purple background baked
       in, plus a caption band ("FRAME NN / LABEL") baked
       into the bottom of SOME frames. We crop that band
       off uniformly for every frame (overflow:hidden on
       a shorter wrapper) so framing is consistent whether
       or not a given frame happens to have the caption. ── */
  #kw-stage {
    position: relative;
    width: 1000px;
    height: 864px;
    overflow: hidden;
    border-radius: 26px;
    opacity: 0;
    transform: scale(.85);
    transition: opacity .25s ease, transform .4s cubic-bezier(.34,1.56,.64,1);
    box-shadow: 0 30px 80px rgba(0,0,0,.45);
  }
  #kw-stage.show { opacity: 1; transform: scale(1); }

  /* two stacked layers crossfade against each other — the old frame
     never drops to a blank/transparent state mid-swap (which is what
     was reading as a white flash), it just fades under the new one. */
  #kw-stage img {
    position: absolute;
    top: 0;
    left: 0;
    width: 1000px;
    height: 1000px;
    display: block;
    opacity: 0;
    transition: opacity var(--kw-crossfade, .35s) linear;
  }
  #kw-stage img.front { opacity: 1; z-index: 2; }

  /* gentle "armed and waiting" pulse while holding on
     the last countdown frame, waiting for Reps Loop */
  #kw-stage.armed { animation: kwArmedPulse 1.1s ease-in-out infinite; }
  @keyframes kwArmedPulse {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.035); }
  }

  /* faster, more urgent pulse during Speed Round */
  #kw-stage.speeding { animation: kwSpeedPulse .5s ease-in-out infinite; }
  @keyframes kwSpeedPulse {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.05); }
  }
</style>
</head>
<body>

<div id="scene">
  <div id="kw-stage">
    <img id="kw-img-a" class="front" src="" alt="">
    <img id="kw-img-b" src="" alt="">
  </div>
  <div id="kw-rep-pill"></div>
  <div id="kw-status-dot"></div>
</div>

<script>
/* ═══════════════════════════════════════════
   CONFIG
═══════════════════════════════════════════ */
const CONFIG = {
  // Where the 20 frame PNGs live once uploaded to GitHub Pages.
  // Upload the frames/ folder from the asset pack as-is (don't
  // rename them) into this path in the jjxlive-repo/overlays repo.
  FRAME_BASE: "https://jjxlive-repo.github.io/overlays/kegel-frames/",

  // Every frame (countdown, reps, speed round, finale) holds for exactly
  // this long before cutting to the next one.
  FRAME_MS:        1000,
  // Smooth crossfade duration between frames — comfortably inside the
  // 1s hold so each frame still reads as a full second on screen.
  CROSSFADE_MS:    350,
  FINALE_LINGER_MS: 6000, // how long "complete" stays up before auto-idle

  // Audio (swap in real files once uploaded to GitHub — leave blank
  // to use the built-in Web Audio placeholder sounds)
  SOUND_TICK: "",   // e.g. "https://jjxlive-repo.github.io/overlays/kegel-tick.mp3"
  SOUND_HERO: "",   // e.g. "https://jjxlive-repo.github.io/overlays/kegel-hero.mp3"
  SOUND_FAIL: "",   // e.g. "https://jjxlive-repo.github.io/overlays/kegel-fail.mp3"

  // Ably
  ABLY_KEY:     "Y8e-eA.l0VHlg:aJXsEfu1Be4BYsAeATRMI3w30YAKSs_LyF3DPoesIz0",
  ABLY_CHANNEL: "splat-overlay",
};

const FRAMES = {
  ready:      "01-ready.png",
  c3:         "02-countdown3.png",
  c2:         "03-countdown2.png",
  c1:         "04-countdown1.png",
  clench:     "05-clench.png",
  holda:      "06-holda.png",
  holdb:      "07-holdb.png",
  hold:       "08-hold.png",
  release:    "09-release.png",
  recover:    "10-recoverybounce.png",
  speedintro: "11-speedround.png",
  fc1:        "12-fastclench1.png",
  fr1:        "13-fastrelease1.png",
  fc2:        "14-fastclench2.png",
  fr2:        "15-fastrelease2.png",
  perfect:    "16-perfectrep.png",
  // 17-toosoon.png / 18-chatjoined.png exist on disk but no command handler here or in
  // stream-dock's Kegel panel (start/reps/speed/end/reset) ever triggers a "too soon" fail
  // state or a "chat joined" milestone — left out of the map rather than left dead in it.
  finalhold:  "19-finalhold.png",
  complete:   "20-complete.png",
};
function frameUrl(key) { return CONFIG.FRAME_BASE + FRAMES[key]; }

/* ═══════════════════════════════════════════
   AUDIO — real files if provided, else a small
   Web Audio placeholder so the overlay works
   drop-in before JJ uploads real sounds.
═══════════════════════════════════════════ */
let _actx = null;
function _ctx() { return _actx || (_actx = new (window.AudioContext || window.webkitAudioContext)()); }
function _beep(freq, dur, type) {
  const ctx = _ctx();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = type || 'sine';
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(0.22, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
  osc.connect(gain).connect(ctx.destination);
  osc.start();
  osc.stop(ctx.currentTime + dur);
}
function playUrlOrBeep(url, beepFn) {
  if (url) { const a = new Audio(url); a.play().catch(() => {}); return; }
  try { beepFn(); } catch (e) {}
}
function playTick() { playUrlOrBeep(CONFIG.SOUND_TICK, () => _beep(880, 0.08, 'square')); }
function playHero() { playUrlOrBeep(CONFIG.SOUND_HERO, () => { _beep(523, 0.14, 'triangle'); setTimeout(() => _beep(784, 0.22, 'triangle'), 120); }); }
function playFail() { playUrlOrBeep(CONFIG.SOUND_FAIL, () => { _beep(220, 0.25, 'sawtooth'); setTimeout(() => _beep(160, 0.3, 'sawtooth'), 140); }); }

/* ═══════════════════════════════════════════
   FRAME PLAYBACK
═══════════════════════════════════════════ */
const stage = document.getElementById('kw-stage');
const repPill = document.getElementById('kw-rep-pill');
stage.style.setProperty('--kw-crossfade', (CONFIG.CROSSFADE_MS / 1000) + 's');

// Preload every frame up front so switching src is instant — no network
// wait mid-swap, which is what was reading as a white flash.
const _preload = {};
Object.keys(FRAMES).forEach(key => {
  const im = new Image();
  im.src = frameUrl(key);
  _preload[key] = im;
});

// Two stacked <img> layers cross-fade against each other: the "front"
// one is opacity:1, the other is opacity:0 underneath. To change frame,
// load the new image into the back layer (already decoded from the
// preload cache) and swap which layer is "front" — both layers are
// always showing *some* frame, so there's never a blank/transparent
// gap between frames.
let _front = document.getElementById('kw-img-a');
let _back  = document.getElementById('kw-img-b');
let _currentKey = null;

let _seqTimer = null;
let _segment = 'idle'; // idle | countdown | reps | speed | finale
let _repCount = 0;

function showStage() { stage.classList.add('show'); }
function hideStage() { stage.classList.remove('show', 'armed', 'speeding'); }

function setFrame(key) {
  if (key === _currentKey) return;
  _currentKey = key;
  _back.src = frameUrl(key);
  _back.classList.add('front');
  _front.classList.remove('front');
  const tmp = _front; _front = _back; _back = tmp;
}

function updateRepPill() {
  if (_repCount > 0 && _segment === 'reps') {
    repPill.textContent = 'REP ' + _repCount;
    repPill.classList.add('show');
  } else {
    repPill.classList.remove('show');
  }
}

function clearSeq() {
  clearInterval(_seqTimer);
  clearTimeout(_seqTimer);
  _seqTimer = null;
}

/* Loop a list of frame keys forever, each held for `ms`. */
function playLoop(list, ms) {
  clearSeq();
  let i = 0;
  setFrame(list[0]);
  _seqTimer = setInterval(() => {
    i = (i + 1) % list.length;
    setFrame(list[i]);
  }, ms);
}

/* Play a fixed list of {key, ms} once, in order, then call onDone. */
function playOnce(list, onDone) {
  clearSeq();
  let i = 0;
  function step() {
    if (i >= list.length) { onDone && onDone(); return; }
    setFrame(list[i].key);
    _seqTimer = setTimeout(() => { i++; step(); }, list[i].ms);
  }
  step();
}

function goIdle() {
  clearSeq();
  _segment = 'idle';
  _repCount = 0;
  updateRepPill();
  hideStage();
}

function cmdStart() {
  clearSeq();
  _segment = 'countdown';
  _repCount = 0;
  updateRepPill();
  showStage();
  stage.classList.remove('armed', 'speeding');
  const seq = [
    { key: 'ready', ms: CONFIG.FRAME_MS },
    { key: 'c3',    ms: CONFIG.FRAME_MS },
    { key: 'c2',    ms: CONFIG.FRAME_MS },
    { key: 'c1',    ms: CONFIG.FRAME_MS },
  ];
  let i = 0;
  function step() {
    if (i > 0) playTick(); // tick on each countdown beat (skip the idle "ready" frame)
    if (i >= seq.length) {
      stage.classList.add('armed'); // hold here, pulsing, until Reps Loop is clicked
      return;
    }
    setFrame(seq[i].key);
    _seqTimer = setTimeout(() => { i++; step(); }, seq[i].ms);
  }
  step();
}

function cmdReps() {
  clearSeq();
  _segment = 'reps';
  showStage();
  stage.classList.remove('armed', 'speeding');
  const loop = ['clench', 'holda', 'holdb', 'hold', 'release', 'recover'];
  let i = -1;
  function step() {
    i = (i + 1) % loop.length;
    setFrame(loop[i]);
    if (loop[i] === 'recover') { _repCount++; updateRepPill(); }
    _seqTimer = setTimeout(step, CONFIG.FRAME_MS);
  }
  step();
}

function cmdSpeed() {
  const wasAlreadySpeed = _segment === 'speed';
  clearSeq();
  _segment = 'speed';
  showStage();
  stage.classList.remove('armed');
  stage.classList.add('speeding');
  const loop = ['fc1', 'fr1', 'fc2', 'fr2'];
  function startLoop() { playLoop(loop, CONFIG.FRAME_MS); }
  if (wasAlreadySpeed) { startLoop(); return; }
  setFrame('speedintro');
  _seqTimer = setTimeout(startLoop, CONFIG.FRAME_MS);
}

function cmdEnd() {
  clearSeq();
  _segment = 'finale';
  updateRepPill();
  showStage();
  stage.classList.remove('armed', 'speeding');
  playHero();
  playOnce([
    { key: 'perfect',   ms: CONFIG.FRAME_MS },
    { key: 'finalhold', ms: CONFIG.FRAME_MS },
    { key: 'complete',  ms: CONFIG.FINALE_LINGER_MS },
  ], () => { goIdle(); });
}

function cmdReset() {
  playFail();
  goIdle();
}

function handleCmd(action) {
  if (action === 'start') return cmdStart();
  if (action === 'reps')  return cmdReps();
  if (action === 'speed') return cmdSpeed();
  if (action === 'end')   return cmdEnd();
  if (action === 'reset') return cmdReset();
}

/* ═══════════════════════════════════════════
   ABLY — subscribe for commands, publish alive
   heartbeat so the stream-dock panel shows LIVE.
═══════════════════════════════════════════ */
const dot = document.getElementById('kw-status-dot');
const ably = new Ably.Realtime({ key: CONFIG.ABLY_KEY });
const channel = ably.channels.get(CONFIG.ABLY_CHANNEL);

ably.connection.on('connected',    () => dot.classList.add('connected'));
ably.connection.on('disconnected', () => dot.classList.remove('connected'));
ably.connection.on('suspended',    () => dot.classList.remove('connected'));
ably.connection.on('failed',       () => dot.classList.remove('connected'));

channel.subscribe('kegel-cmd', (msg) => {
  const action = msg?.data?.action;
  if (action) handleCmd(action);
});

let _aliveHeartbeat = null;
function announceAlive() { channel.publish('kegel-alive', {}).catch(() => {}); }
channel.subscribe('kegel-ping', announceAlive);
ably.connection.once('connected', () => {
  announceAlive();
  _aliveHeartbeat = setInterval(announceAlive, 15000);
});
</script>
</body>
</html>
