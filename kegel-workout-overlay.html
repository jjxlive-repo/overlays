<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kegel Workout Overlay</title>
<script src="https://cdn.ably.com/lib/ably.min-2.js"></script>
<style>
  /* ═══════════════════════════════════════════
     CONFIG
     Frame art: "Kegel Splatty" badge set — 30 PNGs,
     1536x1024, REAL transparency (no baked background,
     no baked caption band this time — unlike the first
     art pass). Displayed at 960x640 (exact same 3:2
     ratio, so no letterboxing). Upload the 30 PNGs to
     GitHub Pages and set FRAME_BASE below.
  ═══════════════════════════════════════════ */
  html, body {
    width: 1080px;
    height: 1920px;
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: transparent;
  }

  #scene {
    width: 1080px;
    height: 1920px;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* ── rep counter pill — small, optional polish.
       Shows during the Rep Loop only. Positioned above
       the badge, never anchored to bottom. ── */
  #kw-rep-pill {
    position: absolute;
    top: 38%;
    left: 50%;
    transform: translate(-50%, -14px) scale(.85);
    opacity: 0;
    padding: 10px 26px;
    border-radius: 999px;
    background: rgba(15,23,60,.72);
    border: 2px solid #FBBF24;
    color: #FAF5FF;
    font-family: system-ui, sans-serif;
    font-weight: 800;
    font-size: 30px;
    letter-spacing: .04em;
    white-space: nowrap;
    transition: opacity .25s ease, transform .35s cubic-bezier(.34,1.56,.64,1);
    z-index: 40;
  }
  #kw-rep-pill.show { opacity: 1; transform: translate(-50%, 0) scale(1); }

  /* ── the badge itself — a small landscape widget
       (960x640, matches the art's native 1536x1024 3:2
       ratio exactly), centered on the canvas by default.
       No card chrome (rounded rect / box-shadow) here —
       the art already has its own navy "platform" baked
       in, so an outer box behind a transparent PNG would
       just look like a stray rectangle. ── */
  #kw-stage {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 960px;
    height: 640px;
    transform: translate(-50%, -50%) scale(.85);
    opacity: 0;
    transition: opacity .25s ease, transform .4s cubic-bezier(.34,1.56,.64,1);
  }
  #kw-stage.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }

  /* two stacked layers crossfade against each other — the
     old frame never drops to empty mid-swap. */
  #kw-stage img {
    position: absolute;
    top: 0;
    left: 0;
    width: 960px;
    height: 640px;
    display: block;
    object-fit: contain;
    opacity: 0;
    transition: opacity .35s linear;
  }
  #kw-stage img.front { opacity: 1; z-index: 2; }

  /* gentle "armed and waiting" pulse while holding on
     the last countdown frame, waiting for Reps Loop */
  #kw-stage.armed { animation: kwArmedPulse 1.1s ease-in-out infinite; }
  @keyframes kwArmedPulse {
    0%, 100% { transform: translate(-50%, -50%) scale(1); }
    50%      { transform: translate(-50%, -50%) scale(1.035); }
  }

  /* faster, more urgent pulse during Speed Round */
  #kw-stage.speeding { animation: kwSpeedPulse .5s ease-in-out infinite; }
  @keyframes kwSpeedPulse {
    0%, 100% { transform: translate(-50%, -50%) scale(1); }
    50%      { transform: translate(-50%, -50%) scale(1.05); }
  }
</style>
</head>
<body>

<div id="scene">
  <div id="kw-stage">
    <img id="kw-img-a" class="front" src="" alt="">
    <img id="kw-img-b" src="" alt="">
  </div>
  <div id="kw-rep-pill"></div>
</div>

<script>
/* ═══════════════════════════════════════════
   CONFIG
═══════════════════════════════════════════ */
const CONFIG = {
  // New art pack — separate folder from the old 20-frame set so nothing
  // collides. Upload the 30 PNGs from kegel-splatty-frames/ here as-is.
  FRAME_BASE: "https://jjxlive-repo.github.io/overlays/kegel-frames-v2/",

  // Every frame holds for exactly this long before cutting to the next.
  // Heads up: the Rep Loop is now 12 frames (was 6) and Speed Round is
  // 6 (was 4), so at 1000ms/frame those loops run longer than before —
  // drop this if you want the same overall pace as the old art.
  FRAME_MS:        1000,
  CROSSFADE_MS:    350,
  FINALE_LINGER_MS: 6000, // how long "complete" stays up before auto-idle

  // Audio (swap in real files once uploaded to GitHub — leave blank
  // to use the built-in Web Audio placeholder sounds)
  SOUND_TICK: "",   // e.g. "https://jjxlive-repo.github.io/overlays/kegel-tick.mp3"
  SOUND_HERO: "",   // e.g. "https://jjxlive-repo.github.io/overlays/kegel-hero.mp3"
  SOUND_FAIL: "",   // e.g. "https://jjxlive-repo.github.io/overlays/kegel-fail.mp3"

  // Ably
  ABLY_KEY:     "Y8e-eA.l0VHlg:aJXsEfu1Be4BYsAeATRMI3w30YAKSs_LyF3DPoesIz0",
  ABLY_CHANNEL: "splat-overlay",
};

// Matches kegel-splatty-frames/frames.json exactly.
const FRAMES = {
  ready:             "01-ready.png",
  c3:                "02-countdown-3.png",
  c2:                "03-countdown-2.png",
  c1:                "04-countdown-1.png",
  squeezeStart:      "05-squeeze-start.png",
  squeezeMid:        "06-squeeze-mid.png",
  squeezePeak:       "07-squeeze-peak.png",
  holdA:             "08-hold-a.png",
  holdB:             "09-hold-b.png",
  holdPeak:          "10-hold-peak.png",
  release:           "11-release.png",
  release1:          "12-release-1.png",
  release2:          "13-release-2.png",
  release3:          "14-release-3.png",
  recoverySettle:    "15-recovery-settle.png",
  recoverySettleAlt: "16-recovery-settle-alt.png",
  speedIntro:        "17-speed-round-intro.png",
  fastSqueeze1Start: "18-fast-squeeze-1-start.png",
  fastSqueeze1Peak:  "19-fast-squeeze-1-peak.png",
  fastRelease1:      "20-fast-release-1.png",
  fastSqueeze2Start: "21-fast-squeeze-2-start.png",
  fastSqueeze2Peak:  "22-fast-squeeze-2-peak.png",
  fastRelease2:      "23-fast-release-2.png",
  perfectRepStart:   "24-perfect-rep-start.png",
  perfectRep:        "25-perfect-rep.png",
  finalHoldBuildup:  "26-final-hold-buildup.png",
  tooSoon:           "27-too-soon.png",   // optional gag, not in the auto sequence
  chatSqueeze:       "28-chat-squeeze.png", // optional variant, not in the auto sequence
  finalHoldPeak:      "29-final-hold-peak.png",
  complete:          "30-workout-complete.png",
};
function frameUrl(key) { return CONFIG.FRAME_BASE + FRAMES[key]; }

/* ═══════════════════════════════════════════
   AUDIO — real files if provided, else a small
   Web Audio placeholder so the overlay works
   drop-in before JJ uploads real sounds.
═══════════════════════════════════════════ */
let _actx = null;
function _ctx() { return _actx || (_actx = new (window.AudioContext || window.webkitAudioContext)()); }
function _beep(freq, dur, type) {
  const ctx = _ctx();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = type || 'sine';
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(0.22, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
  osc.connect(gain).connect(ctx.destination);
  osc.start();
  osc.stop(ctx.currentTime + dur);
}
function playUrlOrBeep(url, beepFn) {
  if (url) { const a = new Audio(url); a.play().catch(() => {}); return; }
  try { beepFn(); } catch (e) {}
}
function playTick() { playUrlOrBeep(CONFIG.SOUND_TICK, () => _beep(880, 0.08, 'square')); }
function playHero() { playUrlOrBeep(CONFIG.SOUND_HERO, () => { _beep(523, 0.14, 'triangle'); setTimeout(() => _beep(784, 0.22, 'triangle'), 120); }); }
function playFail() { playUrlOrBeep(CONFIG.SOUND_FAIL, () => { _beep(220, 0.25, 'sawtooth'); setTimeout(() => _beep(160, 0.3, 'sawtooth'), 140); }); }

/* ═══════════════════════════════════════════
   FRAME PLAYBACK
═══════════════════════════════════════════ */
const stage = document.getElementById('kw-stage');
const repPill = document.getElementById('kw-rep-pill');
stage.style.setProperty('--kw-crossfade', (CONFIG.CROSSFADE_MS / 1000) + 's');

// Preload every frame up front so switching src is instant — no network
// wait mid-swap, which is what reads as a flash/gap.
const _preload = {};
Object.keys(FRAMES).forEach(key => {
  const im = new Image();
  im.src = frameUrl(key);
  _preload[key] = im;
});

// Two stacked <img> layers cross-fade against each other: the "front"
// one is opacity:1, the other is opacity:0 underneath. To change frame,
// load the new image into the back layer (already decoded from the
// preload cache) and swap which layer is "front" — both layers are
// always showing *some* frame, so there's never a gap between frames.
let _front = document.getElementById('kw-img-a');
let _back  = document.getElementById('kw-img-b');
let _currentKey = null;

let _seqTimer = null;
let _segment = 'idle'; // idle | countdown | reps | speed | finale
let _repCount = 0;

function showStage() { stage.classList.add('show'); }
function hideStage() { stage.classList.remove('show', 'armed', 'speeding'); }

function setFrame(key) {
  if (key === _currentKey) return;
  _currentKey = key;
  _back.src = frameUrl(key);
  _back.classList.add('front');
  _front.classList.remove('front');
  const tmp = _front; _front = _back; _back = tmp;
}

function updateRepPill() {
  if (_repCount > 0 && _segment === 'reps') {
    repPill.textContent = 'REP ' + _repCount;
    repPill.classList.add('show');
  } else {
    repPill.classList.remove('show');
  }
}

function clearSeq() {
  clearInterval(_seqTimer);
  clearTimeout(_seqTimer);
  _seqTimer = null;
}

/* Loop a list of frame keys forever, each held for `ms`. */
function playLoop(list, ms) {
  clearSeq();
  let i = 0;
  setFrame(list[0]);
  _seqTimer = setInterval(() => {
    i = (i + 1) % list.length;
    setFrame(list[i]);
  }, ms);
}

/* Play a fixed list of {key, ms} once, in order, then call onDone. */
function playOnce(list, onDone) {
  clearSeq();
  let i = 0;
  function step() {
    if (i >= list.length) { onDone && onDone(); return; }
    setFrame(list[i].key);
    _seqTimer = setTimeout(() => { i++; step(); }, list[i].ms);
  }
  step();
}

function goIdle() {
  clearSeq();
  _segment = 'idle';
  _repCount = 0;
  updateRepPill();
  hideStage();
}

function cmdStart() {
  clearSeq();
  _segment = 'countdown';
  _repCount = 0;
  updateRepPill();
  showStage();
  stage.classList.remove('armed', 'speeding');
  const seq = [
    { key: 'ready', ms: CONFIG.FRAME_MS },
    { key: 'c3',    ms: CONFIG.FRAME_MS },
    { key: 'c2',    ms: CONFIG.FRAME_MS },
    { key: 'c1',    ms: CONFIG.FRAME_MS },
  ];
  let i = 0;
  function step() {
    if (i > 0) playTick(); // tick on each countdown beat (skip the idle "ready" frame)
    if (i >= seq.length) {
      stage.classList.add('armed'); // hold here, pulsing, until Reps Loop is clicked
      return;
    }
    setFrame(seq[i].key);
    _seqTimer = setTimeout(() => { i++; step(); }, seq[i].ms);
  }
  step();
}

function cmdReps() {
  clearSeq();
  _segment = 'reps';
  showStage();
  stage.classList.remove('armed', 'speeding');
  const loop = [
    'squeezeStart', 'squeezeMid', 'squeezePeak',
    'holdA', 'holdB', 'holdPeak',
    'release', 'release1', 'release2', 'release3',
    'recoverySettle', 'recoverySettleAlt',
  ];
  let i = -1;
  function step() {
    i = (i + 1) % loop.length;
    setFrame(loop[i]);
    if (loop[i] === 'recoverySettle') { _repCount++; updateRepPill(); }
    _seqTimer = setTimeout(step, CONFIG.FRAME_MS);
  }
  step();
}

function cmdSpeed() {
  const wasAlreadySpeed = _segment === 'speed';
  clearSeq();
  _segment = 'speed';
  showStage();
  stage.classList.remove('armed');
  stage.classList.add('speeding');
  const loop = ['fastSqueeze1Start', 'fastSqueeze1Peak', 'fastRelease1', 'fastSqueeze2Start', 'fastSqueeze2Peak', 'fastRelease2'];
  function startLoop() { playLoop(loop, CONFIG.FRAME_MS); }
  if (wasAlreadySpeed) { startLoop(); return; }
  setFrame('speedIntro');
  _seqTimer = setTimeout(startLoop, CONFIG.FRAME_MS);
}

function cmdEnd() {
  clearSeq();
  _segment = 'finale';
  updateRepPill();
  showStage();
  stage.classList.remove('armed', 'speeding');
  playHero();
  playOnce([
    { key: 'perfectRepStart',  ms: CONFIG.FRAME_MS },
    { key: 'perfectRep',       ms: CONFIG.FRAME_MS },
    { key: 'finalHoldBuildup', ms: CONFIG.FRAME_MS },
    { key: 'finalHoldPeak',    ms: CONFIG.FRAME_MS },
    { key: 'complete',         ms: CONFIG.FINALE_LINGER_MS },
  ], () => { goIdle(); });
}

function cmdReset() {
  playFail();
  goIdle();
}

function handleCmd(action) {
  if (action === 'start') return cmdStart();
  if (action === 'reps')  return cmdReps();
  if (action === 'speed') return cmdSpeed();
  if (action === 'end')   return cmdEnd();
  if (action === 'reset') return cmdReset();
}

/* ═══════════════════════════════════════════
   ABLY — subscribe for commands, publish alive
   heartbeat so the stream-dock panel shows LIVE.
═══════════════════════════════════════════ */
const ably = new Ably.Realtime({ key: CONFIG.ABLY_KEY });
const channel = ably.channels.get(CONFIG.ABLY_CHANNEL);

channel.subscribe('kegel-cmd', (msg) => {
  const action = msg?.data?.action;
  if (action) handleCmd(action);
});

let _aliveHeartbeat = null;
function announceAlive() { channel.publish('kegel-alive', {}).catch(() => {}); }
channel.subscribe('kegel-ping', announceAlive);
ably.connection.once('connected', () => {
  announceAlive();
  _aliveHeartbeat = setInterval(announceAlive, 15000);
});
</script>
</body>
</html>
