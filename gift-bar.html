<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, height=1920, initial-scale=1.0">
<title>Gift Bar + Splat Overlay v3</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Bebas+Neue&family=Boogaloo&family=DM+Sans:wght@700&display=swap" rel="stylesheet">
<script src="https://cdn.ably.com/lib/ably.min-2.js"></script>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 1080px; height: 1920px; overflow: hidden; background: transparent; position: relative; }

/* ─── PARTICLE CANVAS (gift-bar gifts) ─── */
#particle-canvas {
  position: absolute; top: 0; left: 0;
  width: 1080px; height: 1920px;
  pointer-events: none; z-index: 50;
}

/* ─── SCREEN PULSE ─── */
#screen-pulse {
  position: absolute; inset: 0;
  pointer-events: none; z-index: 8;
  opacity: 0; transition: opacity 0.35s ease;
}

/* ══ GIFT BAR EDGE LINES ══ */
#bar-lines {
  position: absolute; top: 450px; left: 0;
  width: 1080px; height: 55px; pointer-events: none; z-index: 12;
}
#line-top, #line-bot {
  position: absolute; left: 0; right: 0; height: 1px;
  background: linear-gradient(to right, transparent 0%, transparent 30%,
    rgba(192,132,252,0.15) 55%, rgba(192,132,252,0.45) 80%, rgba(192,132,252,0.65) 100%);
  transition: background 0.9s ease, box-shadow 0.8s ease;
}
#line-top { top: 0; }
#line-bot { bottom: 0; }
#bar-lines.active #line-top,
#bar-lines.active #line-bot { animation: lineActivate 0.35s ease forwards; }
@keyframes lineActivate { from{opacity:0.10} to{opacity:1.00} }
#line-sweep-top, #line-sweep-bot {
  position: absolute; left: 0; right: 0; height: 1px; opacity: 0; pointer-events: none;
  background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.0) 30%,
    rgba(255,255,255,1.0) 50%, rgba(255,255,255,0.0) 70%, transparent 100%);
  background-size: 40% 100%;
}
#line-sweep-top { top: 0; }
#line-sweep-bot { bottom: 0; }
#bar-lines.active #line-sweep-top,
#bar-lines.active #line-sweep-bot { animation: lineSweep 1.1s ease-in-out var(--sweep-count, 2) forwards; }
@keyframes lineSweep {
  0%{background-position:-40% 0;opacity:0} 10%{opacity:1}
  90%{opacity:0.6} 100%{background-position:140% 0;opacity:0}
}
#line-sweep-bot { animation-delay: 0.08s; }

/* ══ MISSION STRIP — pinned top, explains the game to FYP viewers ══ */
#mission-strip {
  position: absolute; top: 0; left: 0;
  width: 1080px; height: 38px;
  display: flex; align-items: center; justify-content: center;
  background: rgba(20,8,40,0.72);
  backdrop-filter: blur(6px);
  border-bottom: 1px solid rgba(168,85,247,0.25);
  z-index: 15; pointer-events: none;
  opacity: 0; transition: opacity 0.5s ease;
}
#mission-strip.visible { opacity: 1; }
#mission-strip-text {
  font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600;
  color: rgba(255,255,255,0.88); letter-spacing: 0.06em;
  text-shadow: 0 1px 6px rgba(0,0,0,0.6);
}
#mission-strip-pct {
  font-family: 'Boogaloo', cursive; font-size: 18px;
  color: #C084FC; margin-left: 10px;
  text-shadow: 0 0 12px rgba(192,132,252,0.6);
}

/* ══ ENTRY BANNER — reactive join flash for new viewers ══ */
#entry-banner {
  position: absolute; top: 54px; left: 0;
  width: 1080px;
  display: flex; align-items: center; justify-content: center;
  pointer-events: none; z-index: 14;
  opacity: 0; transform: translateY(-6px);
  transition: opacity 0.3s ease, transform 0.3s cubic-bezier(.34,1.56,.64,1);
}
#entry-banner.visible {
  opacity: 1; transform: translateY(0);
}
#entry-banner-inner {
  display: inline-flex; align-items: center; gap: 10px;
  background: rgba(59,7,100,0.82);
  border: 1px solid rgba(168,85,247,0.45);
  border-radius: 24px;
  padding: 7px 22px;
  backdrop-filter: blur(8px);
  box-shadow: 0 4px 24px rgba(124,58,237,0.35);
}
#entry-banner-text {
  font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600;
  color: #FAF5FF; letter-spacing: 0.04em;
  text-shadow: 0 1px 4px rgba(0,0,0,0.5);
}

/* ══ GIFT BAR ══ */
#gift-bar {
  position: absolute; top: 450px; left: 0;
  width: 1080px; height: 55px; overflow: visible;
  opacity: 0; transition: opacity 0.6s ease; z-index: 10;
}
#gift-bar.visible { opacity: 1; }

/* ── Ripple layer — fill edge impact circles ── */
#gb-ripple-layer {
  position: absolute; top: 0; left: 0;
  width: 1080px; height: 55px;
  pointer-events: none; overflow: visible; z-index: 6;
}
/* ── NOTIFICATION ZONE — unified purple pill zone above the bar ── */
#gb-notif-zone {
  position: absolute;
  left: var(--nz-x, 50%);
  top: var(--nz-y, -38px);
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  pointer-events: none;
  z-index: 9;
  white-space: nowrap;
  transition: left 0.25s ease, top 0.25s ease;
}
.gb-notif-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(59,7,100,0.86);
  border: 1px solid rgba(168,85,247,0.55);
  border-radius: 24px;
  padding: 5px 18px;
  backdrop-filter: blur(8px);
  box-shadow: 0 4px 24px rgba(124,58,237,0.40), 0 0 0 1px rgba(168,85,247,0.12) inset;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 600;
  color: #FAF5FF;
  letter-spacing: 0.04em;
  text-shadow: 0 1px 4px rgba(0,0,0,0.6);
  opacity: 0;
  transform: translateY(5px) scale(0.93);
  transition: opacity 0.22s ease, transform 0.28s cubic-bezier(.34,1.56,.64,1);
}
.gb-notif-pill.visible {
  opacity: 1;
  transform: translateY(0) scale(1);
}
/* ticker pill — slightly dimmer accent */
#gb-notif-ticker { border-color: rgba(168,85,247,0.38); }
/* user pill — brighter, with purple accent on the @username */
#gb-notif-user .notif-user-name { color: #C084FC; }

/* ── v3: Platform notification zones — TT above bar, YT below bar ── */
#notif-zone-tt,
#notif-zone-yt {
  position: absolute; left: 0; width: 100%;
  height: 160px; pointer-events: none; overflow: visible; z-index: 8;
}
#notif-zone-tt { bottom: calc(100% + 4px); }
#notif-zone-yt { top:    calc(100% + 4px); }

/* Spawned platform pill */
.nt-pill {
  position: absolute;
  display: inline-flex; align-items: center; gap: 7px;
  border-radius: 22px; padding: 5px 14px 5px 10px;
  font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 700;
  white-space: nowrap; border: 1px solid;
  will-change: transform, opacity;
  transition: opacity 0.28s ease, transform 0.40s cubic-bezier(.34,1.56,.64,1);
}
.nt-pill-tt {
  background: rgba(105,201,208,.22); border-color: rgba(105,201,208,.6);
  color: #b4edf2; box-shadow: 0 0 18px rgba(105,201,208,.28), 0 2px 8px rgba(0,0,0,.55);
}
.nt-pill-yt {
  background: rgba(255,85,85,.22); border-color: rgba(255,85,85,.6);
  color: #ffb5b5; box-shadow: 0 0 18px rgba(255,85,85,.28), 0 2px 8px rgba(0,0,0,.55);
}
.nt-user { color: #fff; font-weight: 800; }
.nt-label { color: inherit; }
.nt-pts  { margin-left: 5px; opacity: .62; font-size: 10px; letter-spacing: .04em; }
.nt-pill.nt-exit {
  opacity: 0 !important;
  transform-origin: center;
  transition: opacity 0.26s ease, transform 0.26s ease !important;
}

/* ── v3: Boost / surge pill — floats above bar, replaces in-bar text during boost ── */
#v3-boost-pill {
  position: absolute; left: 50%; top: -48px;
  transform: translateX(-50%) translateY(10px);
  pointer-events: none; z-index: 16; white-space: nowrap;
  opacity: 0;
  transition: opacity 0.28s ease, transform 0.35s cubic-bezier(.34,1.56,.64,1);
}
#v3-boost-pill.visible {
  opacity: 1; transform: translateX(-50%) translateY(0);
}
#v3bp-inner {
  display: inline-flex; align-items: center; gap: 8px;
  background: rgba(18,3,42,.92);
  border: 1px solid rgba(232,121,249,.62);
  border-radius: 24px; padding: 6px 22px 6px 15px;
  box-shadow: 0 0 22px rgba(168,85,247,.38), 0 0 0 1px rgba(232,121,249,.10) inset;
  backdrop-filter: blur(6px);
}
#v3bp-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: #e879f9; flex-shrink: 0;
  box-shadow: 0 0 7px rgba(232,121,249,.85);
  animation: v3bpPulse 0.9s ease-in-out infinite;
}
@keyframes v3bpPulse { 0%,100%{opacity:1} 50%{opacity:.18} }
#v3bp-text {
  font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 700;
  color: #FAF5FF; letter-spacing: .045em;
}
.v3bp-mult { color: #e879f9; }
#v3bp-timer {
  font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 700;
  color: rgba(255,255,255,.42); letter-spacing: .07em;
}

/* ── Milk fill — sweeps L→R inside bar based on milk % ── */
#gb-milk-fill {
  position: absolute; top: 0; left: 0; bottom: 0; width: 0%;
  /* Opaque enough to fully cover gifter slides underneath */
  background: linear-gradient(90deg,
    rgba(59,7,100,0.96)  0%,
    rgba(109,40,217,0.94) 60%,
    rgba(168,85,247,0.90) 100%);
  /* Glowing leading-edge line on the right */
  box-shadow: inset -2px 0 0 rgba(232,121,249,0.85), inset -8px 0 16px rgba(168,85,247,0.35);
  transition: width 0.5s ease, background 0.4s ease, box-shadow 0.4s ease;
  pointer-events: none; z-index: 1;
}
#gb-milk-fill.urgent {
  background: linear-gradient(90deg,
    rgba(109,40,217,0.97) 0%,
    rgba(168,85,247,0.95) 55%,
    rgba(232,121,249,0.92) 100%);
  box-shadow: inset -2px 0 0 rgba(249,168,232,0.95), inset -12px 0 22px rgba(232,121,249,0.5);
}
/* ── In-bar CTA / surge text ── */
/* ── Segmented progress blocks ── */
#gb-segments {
  position: absolute; top: 0; left: 0; width: 780px; height: 100%;
  display: flex; gap: 3px; pointer-events: none; z-index: 5;
}
.gb-seg {
  flex: 1; height: 100%;
  background: rgba(255,255,255,0.03);
  border-right: 1px solid rgba(255,255,255,0.07);
  transition: background 0.3s ease, box-shadow 0.3s ease;
}
.gb-seg:last-child { border-right: none; }
.gb-seg.filled {
  background: rgba(139,92,246,0.32);
  border-right-color: rgba(168,85,247,0.4);
  box-shadow: inset 0 0 14px rgba(168,85,247,0.25), inset 0 0 4px rgba(232,121,249,0.15);
}
.gb-seg.flash {
  animation: segFlash 0.55s ease-out forwards;
}
@keyframes segFlash {
  0%   { background: rgba(255,255,255,0.75); box-shadow: inset 0 0 20px rgba(255,255,255,0.9); }
  40%  { background: rgba(232,121,249,0.55); box-shadow: inset 0 0 16px rgba(232,121,249,0.6); }
  100% { background: rgba(139,92,246,0.32);  box-shadow: inset 0 0 14px rgba(168,85,247,0.25); }
}

#gb-bar-text {
  position: absolute; top: 50%; left: var(--wave-center, 50%); transform: translate(-50%, -50%);
  font-family: 'Anton', sans-serif; font-size: 22px; color: #ffffff;
  text-shadow:
    0 0 6px  rgba(0,0,0,1),
    0 0 14px rgba(0,0,0,0.98),
    0 0 28px rgba(0,0,0,0.85),
    0 2px 4px rgba(0,0,0,1),
    0 0 22px rgba(168,85,247,0.55);
  white-space: nowrap; letter-spacing: 0.07em; text-transform: uppercase;
  line-height: 1; pointer-events: none; z-index: 7;
  opacity: 0; transition: opacity 0.3s ease, font-size 0.3s ease;
}
#gb-bar-text.visible { opacity: 1; } /* overridden by inline style from JS */
/* Slow breath on normal fill state — filter so it doesn't fight JS opacity */
#gb-bar-text.visible:not(.urgent):not(.surge):not(.boost) {
  animation: gbTextBreath 3s ease-in-out infinite;
}
@keyframes gbTextBreath {
  0%, 100% { filter: brightness(0.92); }
  50%      { filter: brightness(1.25); }
}
#gb-bar-text.urgent {
  font-size: 26px;
  text-shadow: 0 2px 8px rgba(0,0,0,0.95), 0 0 28px rgba(232,121,249,0.9), 0 0 55px rgba(168,85,247,0.6);
  animation: gbTextPulse 0.5s ease-in-out infinite alternate;
}
#gb-bar-text.surge {
  font-size: 30px; letter-spacing: 0.1em;
  -webkit-text-stroke: 1.5px #7c3aed;
  text-shadow: 0 0 20px #e879f9, 0 0 50px #a855f7, 0 3px 0 rgba(0,0,0,0.9);
  animation: gbSurgePulse 0.2s ease-in-out infinite alternate;
}
#gb-bar-text.boost {
  font-size: 24px; letter-spacing: 0.08em;
  text-shadow: 0 0 16px #38bdf8, 0 0 36px #3b82f6, 0 3px 0 rgba(0,0,0,0.9);
  animation: gbBoostPulse 0.55s ease-in-out infinite alternate;
}
@keyframes gbBoostPulse {
  from { filter: brightness(1.0) drop-shadow(0 0 6px #3b82f6); }
  to   { filter: brightness(1.4) drop-shadow(0 0 20px #38bdf8) drop-shadow(0 0 36px #fff); }
}
/* Bar border flickers blue during manual boost */
#gift-bar.gb-boost-active #bar-border::before,
#gift-bar.gb-boost-active #bar-border::after {
  animation: gbBorderFlicker 0.15s steps(1) infinite;
  background: linear-gradient(to right, rgba(56,189,248,0.3) 0%, rgba(255,255,255,0.7) 50%, rgba(56,189,248,0.3) 100%);
}
@keyframes gbTextPulse {
  from { text-shadow: 0 2px 8px rgba(0,0,0,0.95), 0 0 20px rgba(192,132,252,0.8), 0 0 45px rgba(168,85,247,0.5); }
  to   { text-shadow: 0 2px 8px rgba(0,0,0,0.95), 0 0 36px rgba(232,121,249,1.0), 0 0 70px rgba(168,85,247,0.75); }
}
@keyframes gbSurgePulse {
  from { filter: brightness(1.0) drop-shadow(0 0 8px #a855f7); }
  to   { filter: brightness(1.6) drop-shadow(0 0 28px #e879f9) drop-shadow(0 0 50px #fff); }
}
/* Bar top/bottom border flickers electric during surge */
#gift-bar.gb-surge-active #bar-border::before,
#gift-bar.gb-surge-active #bar-border::after {
  animation: gbBorderFlicker 0.12s steps(1) infinite;
}
@keyframes gbBorderFlicker {
  0%  { opacity: 1; }
  30% { opacity: 0.25; }
  60% { opacity: 0.85; }
}

#gift-bar.ep-passive-active { opacity: 1; }
#gift-bar.ep-passive-active #bar-bg {
  background: linear-gradient(to right,
    rgba(20,4,40,0.72) 0%,
    rgba(25,5,52,0.78) 35%,
    rgba(59,7,100,0.80) 65%,
    rgba(10,10,28,0.84) 100%);
}
#gift-bar.ep-passive-active #bar-info,
#gift-bar.ep-passive-active #bar-hero { opacity: 0; }
#gift-bar.ep-passive-active #bar-border::before,
#gift-bar.ep-passive-active #bar-border::after {
  background: linear-gradient(to right,
    transparent 0%, transparent 18%,
    rgba(192,132,252,0.18) 36%,
    rgba(232,121,249,0.58) 68%,
    rgba(192,132,252,0.82) 100%);
}
#bar-bg-layer { position: absolute; inset: 0; overflow: hidden; }
#bar-bg {
  position: absolute; inset: 0;
  background: linear-gradient(to right,
    rgba(14,4,32,0.68) 0%,
    rgba(10,2,24,0.73) 30%,
    rgba(6,1,16,0.78) 60%,
    rgba(5,0,14,0.82) 100%);
  transition: background 0.52s cubic-bezier(.34,1.56,.64,1);
}
#gift-bar.alert-active #bar-bg { background: rgba(5,0,14,0.76); }
#bar-wash { position: absolute; inset: 0; transition: background 0.9s ease; pointer-events: none; }
#bar-shimmer-flare {
  position: absolute; inset: 0; pointer-events: none; display: none;
}
@keyframes barFlareSweep {
  0%{background-position:-260% 0;opacity:0} 8%{opacity:1}
  50%{background-position:260% 0;opacity:0} 100%{background-position:260% 0;opacity:0}
}
/* Gradient border lines — transparent on left, opaque on right, matching bg */
#bar-border { --bc: 192,132,252; position: absolute; inset: 0; pointer-events: none; }
#bar-border::before,
#bar-border::after {
  content: '';
  position: absolute; left: 0; right: 0; height: 1px;
  background: linear-gradient(to right,
    rgba(var(--bc),0.08) 0%,
    rgba(var(--bc),0.14) 25%,
    rgba(var(--bc),0.42) 60%,
    rgba(var(--bc),0.78) 100%);
  transition: background 0.9s ease;
}
#bar-border::before { top: 0; }
#bar-border::after  { bottom: 0; }
#bar-progress {
  position: absolute; bottom: 0; left: 0;
  height: 2px; width: 0%; border-radius: 0 1px 1px 0; transition: background 0.9s ease;
}
#bar-hero {
  position: absolute; left: 0; top: 0; width: 720px; height: 55px; overflow: visible;
  display: flex; align-items: center; gap: 18px; padding: 0 20px 0 18px;
  opacity: 0; transform: translateX(-22px); pointer-events: none;
  transition: opacity 0.36s ease 0.08s, transform 0.46s cubic-bezier(.34,1.56,.64,1) 0.06s;
}
#gift-bar.alert-active #bar-hero { opacity: 1; transform: translateX(0); }
#bar-hero-name {
  font-family: 'Anton', sans-serif; font-size: 90px; line-height: 1;
  text-transform: uppercase; color: #fff; letter-spacing: 1px; white-space: nowrap;
  overflow: visible; flex-shrink: 1; min-width: 0;
  text-shadow: 0 3px 18px rgba(0,0,0,0.95), 0 0 40px rgba(255,255,255,0.06);
}
#bar-hero-amount {
  font-family: 'Bebas Neue', sans-serif; font-size: 58px; letter-spacing: 4px;
  white-space: nowrap; flex-shrink: 0; overflow: visible;
}
/* ══ GIFT BAR INFO (rotating carousel slot) ══ */
#bar-info {
  position: absolute; right: 0; top: 0; width: 300px; height: 55px; overflow: hidden;
  background: rgba(5,0,14,0.76); border-left: 1px solid rgba(255,255,255,0.06);
  display: flex; flex-direction: column; justify-content: center; align-items: flex-end;
  padding: 9px 14px 2px 14px; gap: 1px; transition: opacity 0.28s ease;
}
#bar-info-top { display: flex; align-items: center; gap: 7px; }
#bar-slot-title {
  font-family: 'DM Sans', sans-serif; font-size: 10px; font-weight: 700;
  letter-spacing: 0.14em; text-transform: uppercase; color: rgba(255,255,255,0.55); white-space: nowrap;
}
#bar-info-bot { display: flex; align-items: baseline; gap: 9px; }
#bar-info-name {
  font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 2px; color: #fff;
  white-space: nowrap; flex-shrink: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis;
  text-shadow: 0 2px 8px rgba(0,0,0,0.9);
}
#bar-info-amount {
  font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 2px;
  white-space: nowrap; flex-shrink: 0; transition: color 0.6s ease;
  text-shadow: -1px -1px 0 rgba(0,0,0,0.95), 1px -1px 0 rgba(0,0,0,0.95),
               -1px 1px 0 rgba(0,0,0,0.95), 1px 1px 0 rgba(0,0,0,0.95);
}
#bar-info-amount.monthly-shimmer { background: rgba(192,132,252,0.14); animation: monthlyGlow 1.4s ease-in-out infinite; }
@keyframes monthlyGlow {
  0%,100%{box-shadow:0 0 6px rgba(192,132,252,0.25)} 50%{box-shadow:0 0 22px rgba(232,121,249,0.70),0 0 40px rgba(168,85,247,0.35)}
}
#bar-plat-badge {
  font-family: 'DM Sans', sans-serif; font-size: 9px; font-weight: 700;
  letter-spacing: 0.10em; text-transform: uppercase; padding: 2px 6px; border-radius: 4px; white-space: nowrap; flex-shrink: 0;
}
.plat-tiktok  { color:#69C9D0;background:rgba(105,201,208,0.16);border:1px solid rgba(105,201,208,0.30); }
.plat-youtube { color:#FF6B6B;background:rgba(255,80,80,0.16);  border:1px solid rgba(255,80,80,0.30);   }
.plat-direct, .plat-default { color:#C084FC;background:rgba(192,132,252,0.16);border:1px solid rgba(192,132,252,0.30); }

/* ══ TOP GIFTERS PANEL ══ */
#top-gifters-panel {
  position: absolute; left: 0; top: 505px; width: 1080px; z-index: 9;
  overflow: hidden; max-height: 0;
  transition: max-height 0.55s cubic-bezier(.34,1.12,.64,1);
  background: linear-gradient(180deg,rgba(15,4,32,0.97) 0%,rgba(25,6,48,0.94) 100%);
  border-bottom: 1px solid rgba(168,85,247,0.30);
  box-shadow: 0 8px 32px rgba(0,0,0,0.70);
}
#top-gifters-panel.open { max-height: 340px; }
#tgp-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 11px 22px 8px 22px;
  border-bottom: 1px solid rgba(168,85,247,0.18);
}
#tgp-title {
  font-family: 'Boogaloo', sans-serif; font-size: 20px; letter-spacing: 0.15em;
  color: #C084FC; text-transform: uppercase;
  text-shadow: 0 0 12px rgba(192,132,252,0.55);
}
#tgp-timeframe {

/* ─── STATUS DOT ─── */
#status-dot {

/* ══════════════════════════════════════════════════════════
   SPLAT OVERLAY
   All elements inside #splat-root.
   --splat-cy = vertical center Y of the splat zone (default 960px = canvas center).
   Updated via Ably "splat-pos" command from the dock.
══════════════════════════════════════════════════════════ */
#splat-root {
  --splat-cy: 960px;
  position: absolute; left: 0; top: 0;
  width: 1080px; height: 1920px;
  pointer-events: none; z-index: 20; overflow: hidden;
}

/* Ambient blobs */
.blob-layer { position:absolute;inset:0;pointer-events:none;opacity:0;transition:opacity 0.6s ease; }
.blob-layer.visible { opacity:1; }
.blob { position:absolute;border-radius:50%;filter:blur(2px); }

/* Glow ring */
#splat-glow-ring {
  position:absolute; left:540px; top:var(--splat-cy);
  transform:translate(-50%,-50%); width:900px; height:900px; border-radius:50%;
  background:radial-gradient(ellipse,rgba(168,85,247,0.15) 0%,transparent 70%);
  z-index:8; opacity:0;
  transition:opacity 0.6s ease, top 0.4s ease;
  animation:splatRingPulse 2s ease-in-out infinite;
}
#splat-glow-ring.visible { opacity:1; }
@keyframes splatRingPulse {
  0%,100%{transform:translate(-50%,-50%) scale(1)} 50%{transform:translate(-50%,-50%) scale(1.06)}
}

/* Splat background SVG */
#splat-bg {
  position:absolute; left:540px; top:var(--splat-cy);
  transform:translate(-50%,-50%); width:900px; height:280px;
  z-index:9; opacity:0;
  transition:opacity 0.5s ease, top 0.4s ease;
  filter:drop-shadow(0 0 40px rgba(168,85,247,0.6));
}
#splat-bg.visible { opacity:1; }

/* Panel (timer + banner) */
#splat-panel {
  position:absolute; left:540px; top:var(--splat-cy);
  transform:translate(-50%,calc(-50% + 40px)) scale(0.9);
  width:900px; display:flex; flex-direction:column; align-items:center; gap:24px;
  z-index:10; opacity:0; pointer-events:none;
  transition:opacity 0.5s cubic-bezier(.34,1.56,.64,1),
             transform 0.5s cubic-bezier(.34,1.56,.64,1),
             top 0.4s ease;
}
#splat-panel.visible { opacity:1; transform:translate(-50%,-50%) scale(1); }

/* Timer */
#splat-countdown-wrap { display:flex;flex-direction:column;align-items:center;gap:14px;width:100%; }
#splat-timer-number {
  font-family:'Boogaloo',cursive; font-size:200px; line-height:1; color:#FAF5FF;
  text-shadow:0 0 20px #A855F7,0 0 60px #7B2FBE,0 4px 0 rgba(0,0,0,0.4); letter-spacing:-6px;
}
#splat-timer-number.pulse-normal { animation:splatPulseNormal 1s ease-in-out infinite; }
#splat-timer-number.pulse-warn   { animation:splatPulseWarn 0.5s ease-in-out infinite; }
#splat-timer-number.pulse-danger { animation:splatPulseDanger 0.25s ease-in-out infinite; }
@keyframes splatPulseNormal { 0%,100%{transform:scale(1)} 50%{transform:scale(1.04)} }
@keyframes splatPulseWarn   { 0%,100%{transform:scale(1);color:#FAF5FF} 50%{transform:scale(1.08);color:#E879F9} }
@keyframes splatPulseDanger {
  0%,100%{transform:scale(1);color:#E879F9;text-shadow:0 0 20px #F43F5E,0 0 60px #F43F5E}
  50%    {transform:scale(1.14);color:#F43F5E;text-shadow:0 0 40px #F43F5E,0 0 100px #F43F5E}
}
#splat-countdown-label {
  font-family:'Boogaloo',cursive; font-size:42px; color:#FAF5FF;
  text-shadow:0 0 16px #A855F7,0 2px 0 rgba(0,0,0,0.5);
  text-align:center; letter-spacing:1px; padding:0 20px;
}
#splat-progress-track {
  width:800px; height:16px; background:rgba(255,255,255,0.12);
  border-radius:8px; overflow:hidden; box-shadow:0 0 12px rgba(168,85,247,0.4);
}
#splat-progress-fill {
  height:100%; background:linear-gradient(90deg,#7B2FBE,#E879F9,#C084FC);
  border-radius:8px; width:100%; transition:width 0.9s linear,background 0.3s ease;
}
#splat-progress-fill.danger { background:linear-gradient(90deg,#7F1D1D,#F43F5E,#FB7185); }

/* State banners */
#splat-state-banner {
  font-family:'Boogaloo',cursive; font-size:80px; color:#FAF5FF;
  text-align:center; letter-spacing:2px; padding:0 40px;
  text-shadow:0 0 30px #A855F7,0 4px 0 rgba(0,0,0,0.5);
}
#splat-state-banner.saved-text {
  color:#C084FC; text-shadow:0 0 40px #E879F9,0 0 80px #A855F7,0 4px 0 rgba(0,0,0,0.5);
  animation:splatSavedBounce 0.6s cubic-bezier(.34,1.56,.64,1) forwards;
}
#splat-state-banner.expired-text {
  color:#F43F5E; text-shadow:0 0 40px #F43F5E,0 0 80px #7F1D1D,0 4px 0 rgba(0,0,0,0.5);
  animation:splatExpiredShake 0.6s ease forwards;
}
@keyframes splatSavedBounce {
  0%{transform:scale(0.5) rotate(-6deg);opacity:0} 60%{transform:scale(1.15) rotate(2deg);opacity:1} 100%{transform:scale(1) rotate(0deg);opacity:1}
}
@keyframes splatExpiredShake {
  0%,100%{transform:translateX(0) scale(1)} 15%{transform:translateX(-18px) scale(1.05)}
  30%{transform:translateX(14px) scale(1.05)} 45%{transform:translateX(-10px)} 60%{transform:translateX(8px)} 75%{transform:translateX(-4px)}
}

/* Burst layer */
#splat-burst-layer { position:absolute;inset:0;pointer-events:none;z-index:25;overflow:hidden; }
.splat-particle { position:absolute;border-radius:50% 70% 50% 70% / 60% 50% 70% 50%;opacity:0;transform:scale(0); }

/* Crack/drip layer */
#splat-crack-layer { position:absolute;inset:0;pointer-events:none;z-index:22;opacity:0;transition:opacity 0.3s ease; }
#splat-crack-layer.visible { opacity:1; }
.drip { position:absolute;top:0;border-radius:0 0 50% 50%;opacity:0;transform-origin:top center; }

/* Idle bait widget — tracks splat center Y with smooth transition */
#idle-bait {
  position:absolute; z-index:10;
  left:40px; top:calc(var(--splat-cy) - 35px);
  transform:translateX(-30px) scale(0.92);
  width:215px; padding:9px 11px;
  display:flex; align-items:center; justify-content:flex-start; gap:8px;
  background:rgba(20,0,40,0.78); border:2px solid rgba(168,85,247,0.55);
  border-radius:10px; box-shadow:0 0 24px rgba(168,85,247,0.35),inset 0 0 20px rgba(59,7,100,0.4);
  opacity:0; pointer-events:none;
  transition:opacity 0.55s cubic-bezier(.4,0,.2,1),
             transform 0.55s cubic-bezier(.34,1.56,.64,1),
             top 0.4s ease;
}
#idle-bait.visible { opacity:1; transform:translateX(0) scale(1); animation:baitGlow 3s ease-in-out infinite; }
@keyframes baitGlow {
  0%,100%{box-shadow:0 0 24px rgba(168,85,247,0.35),inset 0 0 20px rgba(59,7,100,0.4)}
  50%    {box-shadow:0 0 55px rgba(168,85,247,0.7), inset 0 0 28px rgba(59,7,100,0.5)}
}
#bait-inner { display:flex;align-items:center;gap:8px;width:100%;transform-origin:center center; }
#idle-bait.visible #bait-inner { animation:baitWiggle 15s ease-in-out 2s infinite; }
@keyframes baitWiggle {
  0%,92%,100%{transform:rotate(0deg) scale(1)} 93%{transform:rotate(-5deg) scale(0.97)}
  94.5%{transform:rotate(6deg) scale(1.03)} 96%{transform:rotate(-4deg) scale(0.98)}
  97.5%{transform:rotate(4deg) scale(1.02)} 99%{transform:rotate(-1deg) scale(1)}
}
#bait-galaxy-img {
  width:45px;height:45px;object-fit:contain;flex-shrink:0;
  filter:drop-shadow(0 0 10px rgba(232,121,249,0.8)) drop-shadow(0 0 22px rgba(168,85,247,0.6));
  animation:baitFloat 2.6s ease-in-out infinite;
}
@keyframes baitFloat { 0%,100%{transform:translateY(0) scale(1)} 50%{transform:translateY(-3px) scale(1.04)} }
#bait-text { display:flex;flex-direction:column;align-items:flex-start;gap:1px; }
#bait-label-send {
  font-family:'Boogaloo',cursive; font-size:15px; color:rgba(192,132,252,0.95);
  letter-spacing:2px; text-transform:uppercase; text-shadow:0 0 12px rgba(168,85,247,0.6); line-height:1;
}
#bait-label-main {
  font-family:'Boogaloo',cursive; font-size:29px; line-height:1; color:#FAF5FF; letter-spacing:3px;
  text-shadow:0 0 16px rgba(232,121,249,0.95),0 0 36px rgba(168,85,247,0.75),0 3px 0 rgba(0,0,0,0.55);
  animation:baitTextGlow 3s ease-in-out infinite;
}
@keyframes baitTextGlow {
  0%,100%{text-shadow:0 0 16px rgba(232,121,249,0.9),0 0 36px rgba(168,85,247,0.7),0 3px 0 rgba(0,0,0,0.55)}
  50%    {text-shadow:0 0 28px rgba(232,121,249,1),0 0 60px rgba(168,85,247,0.9),0 3px 0 rgba(0,0,0,0.55)}
}
.bait-sparkle {
  position:absolute;border-radius:50%;background:#E879F9;opacity:0;pointer-events:none;
  animation:baitSparkle var(--dur) var(--del) ease-in-out infinite;
}
@keyframes baitSparkle { 0%,100%{opacity:0;transform:scale(0)} 50%{opacity:0.9;transform:scale(1)} }

/* ─── ANNOUNCE BOX ─── */
#announce-box {
  --ax: 540px; --ay: 200px;
  --aw: 560px; --afm: 52px; --afs: 18px; --apv: 12px; --aph: 22px;
  position: absolute; z-index: 15; pointer-events: none;
  left: clamp(calc(var(--aw) / 2), var(--ax), calc(1080px - var(--aw) / 2));
  top: var(--ay);
  transform: translate(-50%, calc(-50% + 18px)) scale(0.92);
  opacity: 0;
  transition: opacity 0.45s cubic-bezier(.34,1.56,.64,1),
              transform 0.45s cubic-bezier(.34,1.56,.64,1),
              left 0.38s ease, top 0.38s ease,
              width 0.25s ease;
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  padding: var(--apv) var(--aph);
  width: max-content; max-width: var(--aw); text-align: center;
  background: linear-gradient(160deg, rgba(10,2,26,0.62), rgba(5,0,15,0.55));
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  border-radius: 16px;
  border: 1px solid rgba(168,85,247,0.60);
  box-shadow:
    0 0 40px rgba(168,85,247,0.38),
    0 0 90px rgba(168,85,247,0.16);
  animation: announceGlow 3.2s ease-in-out infinite;
  overflow: hidden;
}
#announce-box.visible {
  opacity: 1;
  transform: translate(-50%, -50%) scale(1);
}
#announce-box::after {
  content: '';
  position: absolute; top: 0; left: -100%; width: 60%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(232,121,249,0.05), transparent);
  animation: announceSweep 5s ease-in-out 1s infinite;
  pointer-events: none;
}
@keyframes announceSweep { 0%{left:-100%} 60%,100%{left:160%} }
@keyframes announceGlow {
  0%,100% {
    box-shadow: 0 0 40px rgba(168,85,247,0.38), 0 0 90px rgba(168,85,247,0.16);
    border-color: rgba(168,85,247,0.60);
  }
  50% {
    box-shadow: 0 0 55px rgba(232,121,249,0.55), 0 0 120px rgba(168,85,247,0.26);
    border-color: rgba(232,121,249,0.85);
  }
}
#announce-live-badge {
  font-family: 'Anton', sans-serif; font-size: 10px; font-weight: 400;
  letter-spacing: 0.22em; text-transform: uppercase;
  color: #FAF5FF; background: linear-gradient(90deg, #b91c1c, #F43F5E);
  border: none; border-radius: 5px;
  padding: 3px 10px 2px; display: inline-flex; align-items: center; gap: 5px;
  margin-bottom: 6px;
  box-shadow: 0 0 10px rgba(244,63,94,0.45);
}
#announce-live-badge::before {
  content: '';
  width: 6px; height: 6px; border-radius: 50%;
  background: rgba(255,255,255,0.9);
  animation: ltpPulse 1.4s ease-in-out infinite;
  flex-shrink: 0;
}
#announce-text {
  font-family: 'Anton', sans-serif; font-size: var(--afm); line-height: 0.95;
  color: #FAF5FF; letter-spacing: 2px; text-transform: uppercase;
  white-space: normal; word-break: break-word; width: 100%;
  text-shadow: 0 3px 18px rgba(0,0,0,0.85), 0 0 28px rgba(232,121,249,0.28);
  transition: font-size 0.25s ease;
}
#announce-sub {
  font-family: 'DM Sans', sans-serif; font-size: var(--afs); font-weight: 700;
  line-height: 1.2; letter-spacing: 0.12em; text-transform: uppercase;
  color: #E879F9;
  white-space: normal; word-break: break-word; width: 100%;
  text-shadow: 0 0 14px rgba(232,121,249,0.55);
  max-height: 0; overflow: hidden;
  transition: max-height 0.3s ease, margin-top 0.3s ease, font-size 0.25s ease;
}
#announce-sub.has-text { max-height: 120px; margin-top: 1px; }

/* ══ EVENT PROMO SYSTEM ══ */
.ep-root {
  --ep-shelf-title: 31px;
  --ep-team-label: 22px;
  --ep-player-name: 22px;
  --ep-meta: 17px;
  position: absolute;
  inset: 0;
  width: 1080px;
  height: 1920px;
  pointer-events: none;
  z-index: 40;
  opacity: 0;
  transition: opacity 0.28s ease;
}
.ep-root.ep-active { opacity: 1; }
.ep-dim {
  position: absolute;
  inset: 0;
  opacity: 0;
  background:
    radial-gradient(circle at 50% 46%, rgba(168,85,247,0.34), transparent 34%),
    radial-gradient(circle at 50% 52%, rgba(232,121,249,0.18), transparent 48%),
    rgba(6,0,18,0.48);
  transition: opacity 0.32s ease;
}
.ep-root.ep-card-mode .ep-dim,
.ep-root.ep-paintball-mode .ep-dim { opacity: 1; }
.ep-passive {
  position: absolute;
  top: 450px;
  left: 0;
  width: 1080px;
  height: 55px;
  transform: translateX(36px);
  overflow: hidden;
  opacity: 0;
  border-radius: 0;
  border: 0;
  background:
    linear-gradient(to right, transparent 0%, rgba(59,7,100,0.16) 22%, rgba(59,7,100,0.70) 48%, rgba(5,0,14,0.84) 100%),
    radial-gradient(ellipse at 82% 50%, rgba(232,121,249,0.28), transparent 46%);
  box-shadow: none;
  transition: opacity 0.34s ease, transform 0.46s cubic-bezier(.34,1.56,.64,1);
}
.ep-passive::before,
.ep-passive::after {
  content: '';
  position: absolute;
  top: 0;
  bottom: 0;
  width: 190px;
  z-index: 2;
  pointer-events: none;
}
.ep-passive::before { left: 0; background: linear-gradient(to right, rgba(0,0,0,0), rgba(0,0,0,0)); }
.ep-passive::after { right: 0; background: linear-gradient(to right, transparent, rgba(5,0,14,0.92)); }
.ep-root.ep-passive-mode .ep-passive { opacity: 1; transform: translateX(0); }
.ep-root.ep-gift-alert .ep-passive { opacity: 0.16; }
.ep-passive-track {
  display: flex;
  align-items: center;
  gap: 56px;
  width: max-content;
  height: 100%;
  padding-left: 120px;
  animation: epTicker 24s linear infinite;
}
.ep-passive-track span {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 31px;
  letter-spacing: 2.6px;
  color: #FAF5FF;
  white-space: nowrap;
  text-shadow: 0 2px 8px rgba(0,0,0,0.96), 0 0 10px rgba(192,132,252,0.68);
}
@keyframes epTicker { from { transform: translateX(0); } to { transform: translateX(-50%); } }
.ep-card {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 880px;
  min-height: 900px;
  transform: translate(-50%, -50%) scale(0.9);
  opacity: 0;
  padding: 54px 50px 48px;
  border-radius: 34px;
  border: 2px solid rgba(232,121,249,0.58);
  background:
    linear-gradient(145deg, rgba(12,2,34,0.96), rgba(59,7,100,0.94) 54%, rgba(8,5,30,0.96)),
    radial-gradient(circle at 50% 0%, rgba(232,121,249,0.42), transparent 44%);
  box-shadow: 0 32px 90px rgba(0,0,0,0.72), 0 0 70px rgba(168,85,247,0.45);
  overflow: hidden;
  z-index: 4;
}
.ep-card::after {
  content: '';
  position: absolute;
  inset: 0;
  transform: translateX(-120%) skewX(-14deg);
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.26), transparent);
}
.ep-root.ep-card-mode .ep-card,
.ep-root.ep-paintball-mode.ep-reveal-card .ep-card { animation: epCardIn 0.72s cubic-bezier(.34,1.56,.64,1) forwards; }
.ep-root.ep-card-mode .ep-card::after,
.ep-root.ep-paintball-mode.ep-reveal-card .ep-card::after { animation: epSweep 1.1s 0.9s ease-out forwards; }
@keyframes epCardIn { to { opacity: 1; transform: translate(-50%, -50%) scale(1); } }
@keyframes epSweep { to { transform: translateX(130%) skewX(-14deg); } }
.ep-eyebrow,
.ep-date-time,
.ep-tagline {
  font-family: 'DM Sans', sans-serif;
  font-weight: 700;
  text-align: center;
  letter-spacing: 0.18em;
  text-transform: uppercase;
}
.ep-eyebrow { font-size: 28px; color: #E879F9; }
.ep-title {
  margin-top: 8px;
  font-family: 'Anton', sans-serif;
  font-size: 100px;
  line-height: 0.95;
  text-align: center;

/* ══ COMMENT PROMPT — free-floating engagement CTA ══ */
#comment-prompt {
  --cpx: 540px; --cpy: 1620px; --cpw: 720px; --cpfm: 44px; --cpfs: 22px;
  position: absolute;
  left: clamp(calc(var(--cpw) / 2), var(--cpx), calc(1080px - var(--cpw) / 2));
  top: var(--cpy);
  transform: translate(-50%, -50%) scale(0.92);
  opacity: 0;
  width: var(--cpw);
  text-align: center;
  pointer-events: none; z-index: 16;
  transition: opacity 0.42s ease, transform 0.42s cubic-bezier(.34,1.56,.64,1),
              left 0.38s ease, top 0.38s ease;
  display: flex; flex-direction: column; align-items: center; gap: 5px;
  padding: 16px 30px 14px;
  background: linear-gradient(160deg, rgba(6,0,18,0.90), rgba(20,4,40,0.87));
  border-radius: 18px;
  border: 1px solid rgba(192,132,252,0.52);
  box-shadow: 0 0 28px rgba(168,85,247,0.32), 0 0 64px rgba(168,85,247,0.10),
              inset 0 0 22px rgba(59,7,100,0.32);
  animation: cpGlow 3.2s ease-in-out infinite;
  overflow: hidden;
}
#comment-prompt.visible { opacity: 1; transform: translate(-50%, -50%) scale(1); }
#comment-prompt::after {
  content: ''; position: absolute; top: 0; left: -100%; width: 55%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(192,132,252,0.04), transparent);
  animation: cpSweep 5.5s ease-in-out 1s infinite; pointer-events: none;
}
@keyframes cpSweep { 0%{left:-100%} 60%,100%{left:155%} }
@keyframes cpGlow {
  0%,100% { border-color: rgba(192,132,252,0.52); box-shadow: 0 0 28px rgba(168,85,247,0.32), 0 0 64px rgba(168,85,247,0.10), inset 0 0 22px rgba(59,7,100,0.32); }
  50%     { border-color: rgba(232,121,249,0.78); box-shadow: 0 0 46px rgba(232,121,249,0.52), 0 0 95px rgba(168,85,247,0.20), inset 0 0 32px rgba(59,7,100,0.42); }
}
#cp-eyebrow {
  font-family: 'DM Sans', sans-serif; font-size: 10px; font-weight: 700;
  letter-spacing: 0.24em; text-transform: uppercase; color: rgba(232,121,249,0.70);
  white-space: nowrap;
}
#cp-text {
  font-family: 'Boogaloo', cursive; font-size: var(--cpfm); line-height: 1.0;
  color: #FAF5FF; letter-spacing: 2px;
  white-space: normal; word-break: break-word; width: 100%;
  text-shadow: 0 0 24px rgba(168,85,247,0.88), 0 0 56px rgba(168,85,247,0.42), 0 3px 0 rgba(0,0,0,0.65);
  transition: font-size 0.25s ease;
}
#cp-sub {
  font-family: 'Boogaloo', cursive; font-size: var(--cpfs); line-height: 1.1;
  color: rgba(192,132,252,0.82); letter-spacing: 1px;
  white-space: normal; word-break: break-word; width: 100%;
  max-height: 0; overflow: hidden;
  transition: max-height 0.3s ease;
}
#cp-sub.has-text { max-height: 90px; }
#cp-dots { display: flex; gap: 5px; align-items: center; margin-top: 3px; }
.cp-dot {
  width: 5px; height: 5px; border-radius: 50%;

/* ══ GIFT BAR ALERT SYSTEM ══ */
let _lastAlertKey=null,_lastAlertTime=0;
// Cross-source dedup: tracks recent Tikfinity gift-alerts so dock SSN can't double-fire
const _tikfinityAlertCache = new Map(); // "name|amount" → timestamp
function onGiftAlert(data){
  const tier=getTier(data.amount,data.type);
  if(tier===0)return;
  // If this is a TikTok coin alert from dock-SSN, check if Tikfinity already fired it
  if(data._src==='dock' && data.type==='tiktok_coins'){
    const cacheKey=`${(data.name||'').toLowerCase()}|${data.amount}`;
    if(_tikfinityAlertCache.has(cacheKey)) return; // Tikfinity got here first — skip SSN duplicate
  }
  if(data._src==='tikfinity' && data.type==='tiktok_coins'){
    // Register this in cache so SSN version is blocked for 6 seconds
    const cacheKey=`${(data.name||'').toLowerCase()}|${data.amount}`;
    _tikfinityAlertCache.set(cacheKey, Date.now());
    setTimeout(()=>_tikfinityAlertCache.delete(cacheKey), 6000);
  }
  const key=`${(data.name||'').toLowerCase()}|${data.amount}|${data.type}`,now=Date.now();
  if(key===_lastAlertKey&&now-_lastAlertTime<4000)return;
  _lastAlertKey=key;_lastAlertTime=now;
  alertQueue.push({...data,tier});
  if(!alertActive)runNextAlert();
}
function runNextAlert(){if(!alertQueue.length){alertActive=false;if(!_pendingGoalExplosion)runMonthlyMoment();return;}alertActive=true;showAlert(alertQueue.shift());}
function showAlert(alert){_orchOnAlertStart();eventPromoSetGiftAlertActive(true);const{name,amount,type,platform,tier}=alert,plat=platKey(platform),pc=PLAT_COLORS[plat],cfg=TIER_CONFIG[tier];stopRotation();clearTimeout(alertTimeout);activePlat=plat;setBarInfo('JUST GIFTED',name.toUpperCase(),fmtAmount(amount,type),pc.edge,pc.edgeRgb,platLabel(platform),'bar-plat plat-'+plat,false);document.getElementById('bar-wash').style.background=`linear-gradient(180deg,${pc.wash} 0%,rgba(5,0,14,0) 100%)`;document.getElementById('bar-progress').style.background=pc.edge;document.getElementById('bar-border').style.setProperty('--bc',pc.edgeRgb);if(tier===1){activateLines(plat,tier);alertTimeout=setTimeout(dismissAlert,cfg.duration);return;}const heroName=document.getElementById('bar-hero-name'),heroAmt=document.getElementById('bar-hero-amount');heroName.textContent=name.toUpperCase();heroAmt.textContent=fmtAmount(amount,type);heroAmt.style.color=pc.edge;heroAmt.style.textShadow=['0 3px 10px rgba(0,0,0,0.98)','0 6px 22px rgba(0,0,0,0.85)',`0 0 12px rgba(${pc.edgeRgb},1.0)`,`0 0 30px rgba(${pc.edgeRgb},0.85)`,`0 0 65px rgba(${pc.edgeRgb},0.55)`,`0 0 120px rgba(${pc.edgeRgb},0.25)`].join(', ');const heroImg=document.getElementById('bar-hero-gift-img');if(alert.contentImg){heroImg.src=alert.contentImg;heroImg.style.display='block';}else{heroImg.style.display='none';}document.getElementById('gift-bar').style.setProperty('--plat-rgb',pc.edgeRgb);document.getElementById('bar-hero-action').textContent=name.toUpperCase()+' JUST SENT '+fmtAmount(amount,type)+'!';document.getElementById('gift-bar').classList.add('alert-active');activateLines(plat,tier);if(cfg.pulseLines)startLinePulse(plat);emitParticles(tier,plat);triggerScreenPulse(plat,tier);alertTimeout=setTimeout(dismissAlert,cfg.duration);}
function dismissAlert(){clearTimeout(alertTimeout);stopLinePulse();deactivateLines();clearParticles();document.getElementById('gift-bar').classList.remove('alert-active');eventPromoSetGiftAlertActive(false);document.getElementById('bar-hero-action').textContent='';const _img=document.getElementById('bar-hero-gift-img');_img.style.display='none';_img.src='';_orchOnAlertEnd();runNextAlert();}

function ensureAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();}
function playSound(type){try{ensureAudio();const ctx=audioCtx,now=ctx.currentTime;if(type==='reset'){[0,0.12].forEach((delay,i)=>{const osc=ctx.createOscillator(),g=ctx.createGain();osc.connect(g);g.connect(ctx.destination);osc.type='sawtooth';osc.frequency.setValueAtTime(220*(i===0?1.5:1),now+delay);g.gain.setValueAtTime(0.3,now+delay);g.gain.exponentialRampToValueAtTime(0.001,now+delay+0.18);osc.start(now+delay);osc.stop(now+delay+0.2);});}else if(type==='save'){[0,0.10,0.22,0.36].forEach((delay,i)=>{const freq=880*[1,1.25,1.5,2][i],osc=ctx.createOscillator(),g=ctx.createGain();osc.connect(g);g.connect(ctx.destination);osc.type='sine';osc.frequency.setValueAtTime(freq,now+delay);g.gain.setValueAtTime(0.35,now+delay);g.gain.exponentialRampToValueAtTime(0.001,now+delay+0.4);osc.start(now+delay);osc.stop(now+delay+0.45);});}else if(type==='expire'){const osc=ctx.createOscillator(),g=ctx.createGain();osc.connect(g);g.connect(ctx.destination);osc.type='sawtooth';osc.frequency.setValueAtTime(220,now);osc.frequency.exponentialRampToValueAtTime(55,now+0.8);g.gain.setValueAtTime(0.4,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.9);osc.start(now);osc.stop(now+1.0);}}catch(e){}}

/* State machine */

  // Defer if a gift alert is playing — restart after it clears
  if(alertActive){
    const _splatDeferred = setInterval(()=>{
      if(!alertActive){ clearInterval(_splatDeferred); splatEnterCountdown(); }
    }, 200);
    return;
  }
  splatState=SPLAT_STATE.COUNTDOWN;clearInterval(splatTicker);clearTimeout(splatLingerTimer);splatHide(idleBait);splatTimeLeft=SPLAT_CONFIG.TIMER_SECONDS;splatHide(splatCrackLayer);splatCrackSvg.innerHTML='';splatBurstLayer.innerHTML='';splatCrackLayer.querySelectorAll('.drip').forEach(d=>d.remove());splatBanner.className='';splatBanner.textContent='';splatCountWrap.style.display='flex';splatProgFill.classList.remove('danger');splatProgFill.style.transition='none';splatProgFill.style.width='0%';splatProgFill.classList.remove('danger');requestAnimationFrame(()=>{splatProgFill.style.transition='width 0.5s ease-out,background 0.3s ease';});splatUpdateDisplay();splatShow(splatPanel,splatBg,splatBlobLayer,splatGlowRing);playSound('reset');splatTicker=setInterval(()=>{splatTimeLeft--;splatUpdateDisplay();if(splatTimeLeft<=0)splatEnterExpired();},1000);
}

function mergeEventPromoConfig(cfg){
  const src=cfg&&typeof cfg==='object'?cfg:{};
  const durations={...DEFAULT_EVENT_PROMO_CONFIG.durations,...(src.durations||{})};
  if(durations.autoIntervalMs===600000)durations.autoIntervalMs=60000;
  if(durations.paintballMs===13000)durations.paintballMs=60000;
  if(durations.fightCardMs===10000)durations.fightCardMs=15000;
  durations.paintballSplatMs=Math.max(1200,Number(durations.paintballSplatMs)||DEFAULT_EVENT_PROMO_CONFIG.durations.paintballSplatMs);
  return {
    ...DEFAULT_EVENT_PROMO_CONFIG,
    ...src,
    players: DEFAULT_EVENT_PROMO_CONFIG.players.map((p,i)=>({...p,...((src.players&&src.players[i])||{})})),
    fun: {...DEFAULT_EVENT_PROMO_CONFIG.fun,...(src.fun||{})},
    fonts: {...DEFAULT_EVENT_PROMO_CONFIG.fonts,...(src.fonts||{})},
    durations
  };
}

function epText(id,value){const el=document.getElementById(id);if(el)el.textContent=value||'';}
function epInitials(name){return String(name||'?').trim().split(/\s+/).slice(0,2).map(s=>s[0]||'').join('').toUpperCase()||'?';}
function epEscape(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

function renderEventPromo(){
  const cfg=eventPromoConfig;
  const root=document.getElementById('event-promo-root');
  if(root&&cfg.fonts){
    root.style.setProperty('--ep-shelf-title',(Number(cfg.fonts.shelfTitlePx)||31)+'px');
    root.style.setProperty('--ep-team-label',(Number(cfg.fonts.teamLabelPx)||22)+'px');
    root.style.setProperty('--ep-player-name',(Number(cfg.fonts.playerNamePx)||22)+'px');
    root.style.setProperty('--ep-meta',(Number(cfg.fonts.metaPx)||17)+'px');
  }
  epText('ep-eyebrow',cfg.eyebrow);
  epText('ep-title',cfg.title);
  epText('ep-date-time',cfg.dateTime);
  epText('ep-tagline',cfg.tagline);
  epText('ep-gamers-label',cfg.teamGamersLabel);
  epText('ep-battlers-label',cfg.teamBattlersLabel);
  epText('ep-passive-text-a',(cfg.passiveText||'')+'   ');
  epText('ep-passive-text-b',(cfg.passiveText||'')+'   ');
  const splatTitle=document.querySelector('.ep-splat-title');
  const splatDate=document.querySelector('.ep-splat-date');

  if(splatDate)splatDate.textContent=cfg.dateTime;

  const funImgWrap=document.getElementById('ep-fun-image-wrap');
  if(funImgWrap){

    funImgWrap.classList.toggle('has-image',!!image);

  }

function buildEventPromoPaint(){
  const drops=document.getElementById('ep-droplets');
  const drips=document.getElementById('ep-drips');
  if(drops&&!drops.children.length){
    for(let i=0;i<18;i++){
      const span=document.createElement('span');
      const angle=(i/18)*Math.PI*2;
      const radius=170+Math.random()*130;
      span.style.setProperty('--dx',Math.cos(angle)*radius+'px');
      span.style.setProperty('--dy',Math.sin(angle)*radius+'px');
      span.style.setProperty('--s',(0.55+Math.random()*1.0).toFixed(2));
      drops.appendChild(span);
    }
  }
  if(drips&&!drips.children.length){
    [210,265,320,382,438].forEach((left,i)=>{
      const span=document.createElement('span');
      span.style.left=left+'px';
      span.style.setProperty('--h',(76+i*18)+'px');

    });

function hideEventPromo(){
  const root=document.getElementById('event-promo-root');
  if(!root)return;

  clearTimeout(eventPromoRevealTimer);
  if((root.classList.contains('ep-card-mode')||root.classList.contains('ep-fun-mode'))&&!root.classList.contains('ep-card-hiding')){
    root.classList.add('ep-card-hiding');
    setTimeout(()=>{
      root.classList.remove('ep-active','ep-passive-mode','ep-card-mode','ep-fun-mode','ep-paintball-mode','ep-reveal-card','ep-card-hiding','ep-lt-mode');

      root.setAttribute('aria-hidden','true');

  }

function eventPromoShowOverlay(mode,durationMs){
  const cfg=eventPromoConfig=mergeEventPromoConfig(eventPromoConfig);
  console.log('[EP] showOverlay mode='+mode+' enabled='+cfg.enabled+' players='+JSON.stringify(cfg.players?.map(p=>p.name)));
  if(!cfg.enabled){console.warn('[EP] blocked: cfg.enabled is false');return hideEventPromo();}
  const root=document.getElementById('event-promo-root');
  if(!root){console.error('[EP] event-promo-root not found');return;}
  renderEventPromo();
  buildEventPromoPaint();
  clearTimeout(eventPromoHideTimer);
  clearTimeout(eventPromoRevealTimer);
  document.getElementById('gift-bar')?.classList.remove('ep-passive-active');
  root.classList.remove('ep-active','ep-passive-mode','ep-card-mode','ep-fun-mode','ep-paintball-mode','ep-reveal-card','ep-card-hiding');
  void root.offsetWidth;
  const safeMode=mode==='paintball'||mode==='fight-card'||mode==='fun-drawer'||mode==='passive'?mode:'passive';
  const durations=cfg.durations||DEFAULT_EVENT_PROMO_CONFIG.durations;
  const ms=Number(durationMs)||durations[safeMode==='fight-card'?'fightCardMs':safeMode==='paintball'?'paintballMs':safeMode==='fun-drawer'?'fightCardMs':'passiveMs']||15000;
  const splatMs=Math.min(Math.max(1200,Number(durations.paintballSplatMs)||3000),Math.max(1200,ms-900));
  root.style.setProperty('--ep-exit-delay',Math.max(1,ms-900)+'ms');
  root.style.setProperty('--ep-splat-clear-delay',splatMs+'ms');
  root.classList.add('ep-active',safeMode==='fight-card'?'ep-card-mode':safeMode==='fun-drawer'?'ep-fun-mode':safeMode==='paintball'?'ep-paintball-mode':'ep-passive-mode');
  if(safeMode==='passive')document.getElementById('gift-bar')?.classList.add('ep-passive-active');
  root.setAttribute('aria-hidden','false');
  if(safeMode==='paintball')eventPromoRevealTimer=setTimeout(()=>root.classList.add('ep-reveal-card'),splatMs);
  eventPromoHideTimer=setTimeout(hideEventPromo,ms);
}

function setEventPromoConfig(config){
  console.log('[event-promo] config received, players:', JSON.stringify((config&&config.players||[]).map(p=>p.name)));
  const incoming=mergeEventPromoConfig(config);
  incoming.players=incoming.players.map((player,i)=>({
    ...player,
    image: player.image || eventPromoConfig.players?.[i]?.image || ''
  }));
  incoming.fun={
    ...incoming.fun,
    image: incoming.fun?.image || eventPromoConfig.fun?.image || ''
  };
  eventPromoConfig=incoming;
  renderEventPromo();
}

function setEventPromoPlayerImage(index,image){
  if(index==='fun'){setEventPromoFunImage(image);return;}
  const i=Number(index);
  if(!Number.isInteger(i)||i<0||i>3||!image)return;
  eventPromoConfig=mergeEventPromoConfig(eventPromoConfig);
  eventPromoConfig.players[i].image=image;
  renderEventPromo();
}

function setEventPromoFunImage(image){
  if(!image)return;
  eventPromoConfig=mergeEventPromoConfig(eventPromoConfig);
  eventPromoConfig.fun.image=image;
  renderEventPromo();
}


function handleEventPromoImageChunk(d){
  const total=Number(d.total),part=Number(d.part);
  if(!d.id||!Number.isInteger(total)||!Number.isInteger(part)||part<0||part>=total)return;
  if(d.index==='fun'){
    const key=d.id+':fun';
    if(!eventPromoImageChunks[key])eventPromoImageChunks[key]={parts:new Array(total),total,index:'fun'};
    eventPromoImageChunks[key].parts[part]=d.chunk||'';
    if(eventPromoImageChunks[key].parts.filter(v=>v!==undefined).length===total){
      setEventPromoFunImage(eventPromoImageChunks[key].parts.join(''));
      delete eventPromoImageChunks[key];
    }
    return;
  }
  const i=Number(d.index);
  if(!Number.isInteger(i)||i<0||i>3)return;
  const key=d.id+':'+i;
  if(!eventPromoImageChunks[key])eventPromoImageChunks[key]={parts:new Array(total),total,index:i};
  eventPromoImageChunks[key].parts[part]=d.chunk||'';
  if(eventPromoImageChunks[key].parts.filter(v=>v!==undefined).length===total){
    setEventPromoPlayerImage(i,eventPromoImageChunks[key].parts.join(''));
    delete eventPromoImageChunks[key];
  }
}

/* ══ ORCHESTRATION — priority queue for deferred animations ══
   Animations ranked by priority:
   1. Milk goal explosion  (highest — full-bar takeover)
   2. Gift alert hero      (high — queued via alertQueue)
   3. Milk boost banner    (medium — deferred during alert)
   4. Monthly moment       (low — fires after queue clears)
   5. EP passive / auto    (lowest — paused during all above)
══ */
let _pendingGoalExplosion = false;   // queued while alertActive
let _pendingBoostData     = null;    // { type, mult, durMs, cta, icon }
let _epWasPassive         = false;   // restore ep-passive after alert

function _orchOnAlertStart() {
  // Clear ep-passive-active so bar-info/hero are never hidden during an alert
  const gb = document.getElementById('gift-bar');
  _epWasPassive = gb.classList.contains('ep-passive-active');
  if (_epWasPassive) gb.classList.remove('ep-passive-active');
  // Hide in-bar text during alert
  const sw = document.getElementById('gb-bar-text');
  if (sw) sw.style.opacity = '0';
  // Pause EP auto-cycle
  stopEventPromoAuto();
}

function _orchOnAlertEnd() {
  // Restore ep-passive if it was active before
  if (_epWasPassive) {
    const gb = document.getElementById('gift-bar');
    gb.classList.add('ep-passive-active');
    _epWasPassive = false;
  }
  // Restore in-bar text
  const sw = document.getElementById('gb-bar-text');
  if (sw) sw.style.opacity = '';

  // Goal explosions now fire immediately in addPts — clear any stale flag
  _pendingGoalExplosion = false;

  // Fire queued boost if pending (and explosion not pending)
  if (_pendingBoostData) {
    const b = _pendingBoostData;
    _pendingBoostData = null;
    setTimeout(() => _triggerBoost(b.type, b.mult, b.durMs, b.cta, b.icon), 120);
  }
}

function startEventPromoAuto(intervalMs){
  stopEventPromoAuto();
  const ms=Math.max(10000,Number(intervalMs)||60000);
  eventPromoAutoTimer=setInterval(()=>{
    if(alertActive||_bbCooldown)return; // skip if gift alert or explosion is playing
    const mode=eventPromoAutoModes[eventPromoAutoIndex%eventPromoAutoModes.length];
    eventPromoAutoIndex++;
    eventPromoShowOverlay(mode);
  },ms);
}

  if(eventPromoAutoTimer){clearInterval(eventPromoAutoTimer);eventPromoAutoTimer=null;}
}

let _cpRotateTimer=null,_cpPresets=[];
function handleAnnounce(data){
  const box=document.getElementById('announce-box');
  if(!box)return;
  if(typeof data.visible==='boolean'){box.classList.toggle('visible',data.visible);return;}
  if(data.text!==undefined){const el=document.getElementById('announce-text');if(el)el.textContent=data.text||'';}
  if(data.sub!==undefined){const el=document.getElementById('announce-sub');if(el){el.textContent=data.sub||'';el.classList.toggle('has-text',!!data.sub);}}
  if(data.badge!==undefined){const el=document.getElementById('announce-live-badge');if(el)el.textContent=data.badge||'● LIVE';}
  const sizeMap    = {micro:'16px',mini:'22px',xs:'28px',sm:'36px',md:'46px',lg:'56px',xl:'68px',xxl:'84px'};
  const sizeMapSub = {micro:'11px',mini:'14px',xs:'17px',sm:'21px',md:'26px',lg:'32px',xl:'38px',xxl:'46px'};
  const widthMap   = {micro:'200px',mini:'260px',xs:'330px',sm:'420px',md:'520px',lg:'640px',xl:'760px',xxl:'880px'};
  const padVMap    = {micro:'8px', mini:'10px',xs:'12px',sm:'14px',md:'16px',lg:'18px',xl:'20px',xxl:'22px'};
  const padHMap    = {micro:'14px',mini:'18px',xs:'22px',sm:'28px',md:'34px',lg:'40px',xl:'44px',xxl:'48px'};
  const badgeMap   = {micro:'9px', mini:'10px',xs:'11px',sm:'12px',md:'13px',lg:'14px',xl:'14px',xxl:'14px'};
  if(data.size&&sizeMap[data.size]){
    box.style.setProperty('--afm', sizeMap[data.size]);
    box.style.setProperty('--afs', sizeMapSub[data.size]);
    box.style.setProperty('--aw',  widthMap[data.size]);
    box.style.setProperty('--apv', padVMap[data.size]);
    box.style.setProperty('--aph', padHMap[data.size]);
    const badge = document.getElementById('announce-live-badge');
    if(badge) badge.style.fontSize = badgeMap[data.size];
  }
  const xMap={left:'12%',center:'50%',right:'88%'};
  if(data.x&&xMap[data.x])box.style.setProperty('--ax',xMap[data.x]);
  const yMap={top:'200px',upper:'480px',center:'960px',lower:'1440px',bottom:'1700px'};
  if(data.y&&yMap[data.y])box.style.setProperty('--ay',yMap[data.y]);
  if(data.text)box.classList.add('visible');
}

/* ══ COMMENT PROMPT HANDLER ══ */
function handleCommentPrompt(data){
  const box=document.getElementById('comment-prompt');
  if(!box)return;
  if(typeof data.visible==='boolean'){
    box.classList.toggle('visible',data.visible);
    if(!data.visible&&_cpRotateTimer){clearInterval(_cpRotateTimer);_cpRotateTimer=null;}
    return;
  }
  if(data.text!==undefined){const el=document.getElementById('cp-text');if(el)el.textContent=data.text||'';}
  if(data.sub!==undefined){const el=document.getElementById('cp-sub');if(el){el.textContent=data.sub||'';el.classList.toggle('has-text',!!data.sub);}}
  const cpSizeMap={xs:'32px',sm:'38px',md:'44px',lg:'52px',xl:'62px'};
  const cpSizeMapSub={xs:'16px',sm:'18px',md:'22px',lg:'26px',xl:'32px'};
  if(data.size&&cpSizeMap[data.size]){box.style.setProperty('--cpfm',cpSizeMap[data.size]);box.style.setProperty('--cpfs',cpSizeMapSub[data.size]);}
  const xMap={left:'20%',center:'50%',right:'80%'};
  if(data.x&&xMap[data.x])box.style.left=xMap[data.x];
  const yMap={top:'15%',upper:'30%',center:'50%',lower:'70%',bottom:'85%'};
  if(data.y&&yMap[data.y])box.style.top=yMap[data.y];
  if(data.presets&&data.presets.length){
    _cpPresets=data.presets;
    if(_cpRotateTimer)clearInterval(_cpRotateTimer);
    let idx=0;
    _cpRotateTimer=setInterval(()=>{
      idx=(idx+1)%_cpPresets.length;
      const p=_cpPresets[idx];
      const textEl=document.getElementById('cp-text');
      const subEl=document.getElementById('cp-sub');
      if(textEl)textEl.textContent=p.text||'';
      if(subEl){subEl.textContent=p.sub||'';subEl.classList.toggle('has-text',!!p.sub);}
    },data.rotateMs||30000);
  }
  if(data.text)box.classList.add('visible');
}

/* ══════════════════════════════════════════════════════════════════
   GIFT ANIMATION SYSTEM
   Bottom geyser EQ bars + flying notification card.
   Variants assigned by type + tier:
     • comet — small/TT gifts (tier 1–3): compressed streak, spring-snaps open
     • lift  — YouTube SuperChats: grows from glow point, slow premium rise
     • blast — large gifts (tier 4+): shockwave rings + fast burst
══════════════════════════════════════════════════════════════════ */
(function initGiftAnim(){
  const _geqEl  = document.getElementById('gift-eq-canvas');
  const _gblEl  = document.getElementById('gift-blast-canvas');
  const _gcCard = document.getElementById('gift-card');
  if(!_geqEl || !_gblEl || !_gcCard) return;

  _geqEl.width  = 1080; _geqEl.height  = 200;
  _gblEl.width  = 1080; _gblEl.height  = 1920;
  const _geqCtx = _geqEl.getContext('2d');
  const _gblCtx = _gblEl.getContext('2d');

  /* ── Geyser EQ constants ── */
  const GEQ_W = 8, GEQ_G = 5.5, GEQ_S = GEQ_W + GEQ_G;
  const GEQ_N = Math.floor(1080 / GEQ_S);   // ~79 bars
  const GEQ_H = 200;
  let _geqFireT = -100;
  let _geqReact = 0;
  let _geqPR = 105, _geqPG = 201, _geqPB = 208;   // default teal

  function _geqSetPlat(plat){
    if(plat === 'youtube'){ _geqPR=255; _geqPG=68;  _geqPB=68;  }
    else                  { _geqPR=105; _geqPG=201; _geqPB=208; }
  }
  function _geqFire(){ _geqFireT = Date.now()/1000; _geqReact = 1.0; }

  /* ── Geyser draw loop (always running) ── */
  (function _geqDraw(){
    const t = Date.now() / 1000;
    _geqCtx.clearRect(0, 0, 1080, GEQ_H);
    _geqReact = Math.max(0, _geqReact * 0.966);
    const tFire = Math.max(0, t - _geqFireT);

    for(let i = 0; i < GEQ_N; i++){
      const x  = i * GEQ_S;
      const xf = i / (GEQ_N - 1);
      const idle = 0.22 + 0.14 * Math.sin(t * 1.6 + xf * 7.5)
                        + 0.09 * Math.sin(t * 2.9 + xf * 13 + 1.1);
      const distFromEdge = 1 - Math.abs(xf - 0.5) * 2;
      const peakT  = distFromEdge * 0.38;
      const dPeak  = tFire - peakT;
      const ripple = _geqReact * Math.max(0,
        dPeak >= 0 ? Math.exp(-dPeak * 6) : Math.exp(dPeak * 22)
      );
      const h = Math.max(3, (idle * 0.55 + ripple) * GEQ_H * 0.90);
      const a = Math.min(0.95, 0.14 + ripple * 0.82 + idle * 0.10);

      _geqCtx.fillStyle = `rgba(${_geqPR},${_geqPG},${_geqPB},${a})`;
      _geqCtx.fillRect(x, GEQ_H - h, GEQ_W, h);
      if(a > 0.22){
        _geqCtx.fillStyle = `rgba(255,255,255,${a * 0.30})`;
        _geqCtx.fillRect(x, GEQ_H - h, GEQ_W, Math.min(3, h * 0.09));
      }
    }
    requestAnimationFrame(_geqDraw);
  })();

  /* ── Blast shockwave rings ── */
  function _fireBlastRings(tier){
    const cx = 540, cy = 1100;  // base of geyser (top:900 + height:200)
    const rings  = tier >= 5 ? 3 : 2;
    const maxR   = Math.min(320, 90 + tier * 46);
    const startMs = performance.now();
    const DUR    = 850;
    (function drawRings(){
      const t = (performance.now() - startMs) / DUR;
      _gblCtx.clearRect(0, 0, 1080, 1920);
      if(t > 1.0) return;
      for(let ri = 0; ri < rings; ri++){
        const tOff = ri * 0.18;
        const rt   = Math.max(0, Math.min(1, (t - tOff) / (1 - tOff)));
        if(rt <= 0) continue;
        _gblCtx.beginPath();
        _gblCtx.arc(cx, cy, rt * maxR, 0, Math.PI * 2);
        _gblCtx.strokeStyle = `rgba(${_geqPR},${_geqPG},${_geqPB},${(1 - rt) * 0.70})`;
        _gblCtx.lineWidth   = (1 - rt) * 7 + 0.5;
        _gblCtx.stroke();
      }
      requestAnimationFrame(drawRings);
    })();
  }

  /* ── Populate card content ── */
  const _gcPlatNm = document.getElementById('gc-plat-name');
  const _gcSender = document.getElementById('gc-sender-name');
  const _gcLabel  = document.getElementById('gc-gift-label');
  const _gcAmt    = document.getElementById('gc-amount-str');
  const _gcImg    = document.getElementById('gc-img');
  const _gcFb     = document.getElementById('gc-img-fallback');

  function _populateCard(data, tier, plat){
    const sizeClass = tier <= 2 ? 'tier-sm' : tier <= 4 ? 'tier-md' : 'tier-lg';
    _gcCard.className = `plat-${plat} ${sizeClass}`;
    _gcPlatNm.textContent = plat === 'tiktok' ? '♪ TikTok'
                          : plat === 'youtube' ? '▶ YouTube' : '🎁 Gift';
    _gcSender.textContent = '@' + (data.name || 'Anonymous');
    _gcLabel.textContent  = data.giftLabel || data.giftTitle || data.contentImg
      ? (data.giftLabel || data.giftTitle || '')
      : (data.type === 'youtube_superchat' ? 'Super Chat' : '');
    _gcAmt.textContent = fmtAmount(data.amount, data.type);
    if(data.contentImg){
      _gcImg.src = data.contentImg; _gcImg.style.display = 'block';
      _gcFb.style.display = 'none';
      _gcImg.onerror = () => { _gcImg.style.display='none'; _gcFb.style.display='block'; };
    } else {
      _gcImg.style.display = 'none'; _gcFb.style.display = 'block';
      _gcFb.textContent = plat === 'youtube' ? '⭐' : '🎁';
    }
  }

  /* ── Card position animation ── */
  const HOLD_Y   = 822;   // px — center of card lands at ~962px (canvas center)
  const ABSORB_Y = 420;   // px — flies up to bar area
  let _holdTmr = null, _absorbTmr = null;

  function _cancelCard(){
    clearTimeout(_holdTmr); clearTimeout(_absorbTmr);
    _gcCard.style.transition = 'none'; _gcCard.style.opacity = '0';
  }

  function _launchCard(variant, tier){
    _cancelCard();
    const launchMs = variant === 'lift' ? 2100 : variant === 'blast' ? 480 : 680;
    const holdMs   = variant === 'lift' ? 3600 : variant === 'blast' ? 2600 : 2000;
    const ease     = variant === 'lift'  ? 'cubic-bezier(0.16,1,0.30,1)'
                   : variant === 'blast' ? 'cubic-bezier(0.00,0.00,0.15,1)'
                   :                       'cubic-bezier(0.34,1.56,0.64,1)';
    // Set start state with no transition
    _gcCard.style.transition = 'none';
    _gcCard.style.top        = '1790px';
    _gcCard.style.opacity    = variant === 'lift' ? '0.04' : '1';
    _gcCard.style.transform  = variant === 'comet'
        ? 'translateX(-50%) scaleX(0.38) scaleY(0.07)'
        : variant === 'lift' ? 'translateX(-50%) scale(0.04)'
        :                      'translateX(-50%) scale(0.86)';
    void _gcCard.offsetHeight; // force reflow
    // Animate to hold position
    _gcCard.style.transition = `top ${launchMs}ms ${ease}, transform ${launchMs}ms ${ease}, opacity ${Math.round(launchMs*0.5)}ms ease`;
    _gcCard.style.top        = HOLD_Y + 'px';
    _gcCard.style.transform  = 'translateX(-50%) scale(1)';
    _gcCard.style.opacity    = '1';
    // Lift: gentle bob during hold
    if(variant === 'lift'){
      _holdTmr = setTimeout(() => {
        _gcCard.style.transition = 'top 0.85s ease-in-out';
        _gcCard.style.top = (HOLD_Y - 12) + 'px';
        setTimeout(() => { _gcCard.style.top = HOLD_Y + 'px'; }, 850);
        _absorbTmr = setTimeout(_absorbCard, holdMs);
      }, launchMs);
    } else {
      _holdTmr = setTimeout(_absorbCard, launchMs + holdMs);
    }
  }

  function _absorbCard(){
    _gcCard.style.transition = 'top 430ms ease-in, transform 430ms ease-in, opacity 370ms ease-in';
    _gcCard.style.top        = ABSORB_Y + 'px';
    _gcCard.style.transform  = 'translateX(-50%) scale(0.08)';
    _gcCard.style.opacity    = '0';
  }

  /* ── Public entry point ── */
  window.fireGiftAnim = function(data){
    const tier    = getTier(data.amount, data.type);
    if(tier === 0) return;
    const plat    = platKey(data.platform);
    const variant = data.type === 'youtube_superchat' ? 'lift'
                  : tier >= _giftTierCfg.blastTier ? 'blast' : 'comet';
    _geqSetPlat(plat);
    if(variant === 'blast') _fireBlastRings(tier);
    _geqFire();
    _populateCard(data, tier, plat);
    setTimeout(() => _launchCard(variant, tier), variant === 'blast' ? 180 : 380);
  };
})();

/* ══════════════════════════════════════════════════════════════════
   HYPE METER — audio-reactive waveform engine
   ─────────────────────────────────────────────────────────────────
   Visual: 20 segments hanging below the gift bar, heights driven
   by Web Audio API frequency analysis at 60fps via rAF.
   Hype score (from engagement events) controls amplitude + color.
   Fallback: animated sine wave if mic permission denied.

   Event weights:
     join          +1    like_batch    +1    comment_match +3
     heart_me      +15   heart_me_first +50  yt_sub        +40
   Decay: −3.5% MAX_RAW per 10 s
   Surge: random 60–90 s, 5 s duration, 2× all points
══════════════════════════════════════════════════════════════════ */
(function initHypeMeter(){

  /* ── tunables ── */
  const SEG_COUNT      = 20;
  const MAX_H          = 52;        // px — tallest segment
  const MIN_H          = 3;         // px — always-visible floor
  const FLOOR_PCT      = 30;        // log-scale display floor %
  const K              = 0.08;
  let MAX_RAW          = 200;  // configurable from dock via milk-scoring-config.target
  const DECAY_RATE     = 0.035;
  const DECAY_TICK_MS  = 10_000;
  const SURGE_MIN_MS      = 60_000;  // min gap between auto surges
  const SURGE_MAX_MS      = 90_000;  // max gap
  const SURGE_MULTI       = 2;       // global point multiplier during surge
  const SURGE_DURATION_MS = 15_000;  // 15 seconds with countdown
  const STREAM_DELAY_S    = 10;      // added to all timer displays + durations for stream delay
  // Surge rotates through these types — one randomly picked per firing
  // Weighted: TT comments ×2, joins ×2, YT comments ×1, gifts ×1, all ×1
  const SURGE_TYPES = [
    { key:'tt_comment', label:'💬 TIKTOK COMMENTS',  cta:'COMMENT NOW',     match:(t,p)    => t==='comment'&&p==='tt' },
    { key:'tt_comment', label:'💬 TIKTOK COMMENTS',  cta:'COMMENT NOW',     match:(t,p)    => t==='comment'&&p==='tt' },
    { key:'yt_comment', label:'📹 YOUTUBE COMMENTS', cta:'COMMENT NOW',     match:(t,p)    => t==='comment'&&p==='yt' },
    { key:'join',       label:'🚪 JOINS & FOLLOWS',  cta:'JOIN THE SQUAD',  match:(t)      => t==='join' },
    { key:'join',       label:'🚪 JOINS & FOLLOWS',  cta:'JOIN THE SQUAD',  match:(t)      => t==='join' },
    { key:'gift',       label:'🎁 GIFTS & REACTIONS',cta:'SEND A GIFT',     match:(t,p,cat)=> cat==='gifts' },
    { key:'all',        label:'⚡ ALL ENGAGEMENT',   cta:'ENGAGE NOW',      match:()       => true },
  ];
  const AUDIO_SMOOTH   = 0.40;   // was 0.78 — much faster response to voice
  const GAIN_BOOST     = 3.2;    // amplify quiet audio signal before mapping
  const PLAT_DECAY_MS  = 8_000;
  const BIN_START      = 2;
  const BIN_END        = 28;

  // Mutable — updated live via milk-scoring-config from dock
  let PTS = {
    comment:0.5, join:1, like:0.1, like_batch:1, comment_match:3,
    heart_me:15, heart_me_first:50, yt_sub:40,
  };

  // Like batching — accumulate N likes before adding pts to meter
  let LIKE_BATCH_SIZE = 20;   // legacy — kept for like_batch events from dock
  const LIKE_PILL_EVERY = 20; // spawn a pill once per this many likes per user
  let _likeAccum = 0;
  let _likeAccumPlat = 'other';
  const _likePillCounts = {};  // username → running like count for pill throttle

  // Mutable gift tier ranges — dollar values, updated via milk-scoring-config
  let _giftRanges = [
    { minD:0,   maxD:4.99,  rpt:3,  isNew:20  },
    { minD:5,   maxD:9.99,  rpt:15, isNew:30  },
    { minD:10,  maxD:19.99, rpt:30, isNew:50  },
    { minD:20,  maxD:49.99, rpt:50, isNew:70  },
    { minD:50,  maxD:9999,  rpt:80, isNew:100 },
  ];

  // Chat command matchers — { phrase, matchType, pts }
  let _milkCmds = [];

  /* ── state ── */
  let rawScore       = 0;
  let boostActive    = false;
  let boostTimer     = null;
  let _intensityMult = 1.0;
  let _milkCTA       = '';
  let _milkFired     = false;

  /* ── per-input boost multipliers (1 = no boost) — for manual boosts ── */
  let _boostMult = { comments: 1, likes: 1, gifts: 1 };
  let _boostType = 'comments';

  /* ── current pct (used to show % alongside surge/boost text) ── */
  let _currentPct = 0;

  /* ── instant save thresholds (0 = disabled) ── */
  let _instantSaveCoins   = 0;
  let _instantSaveDollars = 0;

  /* ── fill edge ripple ── */
  const _rippleLayer = document.getElementById('gb-ripple-layer');
  function _triggerRipple(pct, pts) {
    if (!_rippleLayer || pct <= 0) return;
    const x     = Math.round(pct / 100 * 1080);
    const y     = 27;  // vertical center of 55px bar
    const rings = pts >= 30 ? 3 : pts >= 8 ? 2 : 1;
    const color = pts >= 30 ? 'rgba(232,121,249,' : pts >= 8 ? 'rgba(192,132,252,' : 'rgba(168,85,247,';
    for (let i = 0; i < rings; i++) {
      const el = document.createElement('div');
      el.style.cssText = `position:absolute;border-radius:50%;border:2px solid ${color}0.85);left:${x}px;top:${y}px;transform:translate(-50%,-50%);pointer-events:none;`;
      _rippleLayer.appendChild(el);
      const size = Math.min(140, Math.max(18, pts * 2.8)) * (1 + i * 0.45);
      setTimeout(() => {
        el.animate([
          { width:'6px', height:'6px', opacity:0.9, transform:'translate(-50%,-50%)' },
          { width:size+'px', height:size+'px', opacity:0, transform:'translate(-50%,-50%)' },
        ], { duration: 650 + i * 130, easing:'ease-out', fill:'forwards' })
        .onfinish = () => el.remove();
      }, i * 110);
    }
  }

  /* ── notification zone: unified purple pill positioning ── */
  const _notifZone = document.getElementById('gb-notif-zone');
  let   _notifPos  = { x: 50, y: -38 }; // % left, px top (negative = above bar)
  function _applyNotifPos(){
    if(!_notifZone) return;
    _notifZone.style.left = _notifPos.x + '%';
    _notifZone.style.top  = _notifPos.y + 'px';
  }

  /* ── v3: Platform notification spawner ──────────────────────────────────
     TT pings → #notif-zone-tt (above bar), YT pings → #notif-zone-yt (below)
     Pills spawn at fill-edge x%, stack outward with jitter for chaos feel.
  ─────────────────────────────────────────────────────────────────────── */
  const _ntZoneTT = document.getElementById('notif-zone-tt');
  const _ntZoneYT = document.getElementById('notif-zone-yt');
  const _ntPoolTT = [];   // active TT pills above bar
  const _ntPoolYT = [];   // active YT pills below bar
  const NT_MAX = 4;       // max simultaneous pills per platform
  const NT_TTL = 3500;    // ms each pill lives before auto-exit

  function _spawnNotif(platform, html){
    const zone = platform === 'tt' ? _ntZoneTT : _ntZoneYT;
    const pool = platform === 'tt' ? _ntPoolTT : _ntPoolYT;
    if(!zone) return;

    // Evict oldest pill if at cap
    while(pool.length >= NT_MAX){
      _ntEvict(pool.shift(), pool);
    }

    // Snap x to current fill edge (clamped away from bar edges)
    const fillPct  = Math.min(92, Math.max(8, (rawScore / MAX_RAW) * 100));
    const stackIdx = pool.length;          // how many already showing
    const yOffset  = stackIdx * 38;        // px outward from bar edge per pill
    const xJitter  = (Math.random() - 0.5) * 22;
    const rot       = (Math.random() - 0.5) * 5;

    // TT anchors bottom (stacks upward), YT anchors top (stacks downward)
    const anchorProp = platform === 'tt' ? 'bottom' : 'top';

    const pill = document.createElement('div');
    pill.className = `nt-pill nt-pill-${platform}`;
    pill.innerHTML = html;
    pill.style.left            = `calc(${fillPct}% + ${xJitter}px)`;
    pill.style[anchorProp]     = `${yOffset}px`;
    pill.style.transform       = `translateX(-50%) rotate(${rot}deg) scale(0.7)`;
    pill.style.opacity         = '0';
    zone.appendChild(pill);
    pool.push(pill);

    // Animate in — double rAF so transition fires after paint
    requestAnimationFrame(() => requestAnimationFrame(() => {
      pill.style.transform = `translateX(-50%) rotate(${rot}deg) scale(1)`;
      pill.style.opacity   = '1';
    }));

    pill._ntTimer = setTimeout(() => _ntEvict(pill, pool), NT_TTL);
  }

  function _ntEvict(pill, pool){
    if(!pill) return;
    clearTimeout(pill._ntTimer);
    pill.classList.add('nt-exit');
    setTimeout(() => {
      pill.remove();
      if(pool){ const i = pool.indexOf(pill); if(i >= 0) pool.splice(i, 1); }
    }, 280);
  }

  /* ── user pill — who just moved the meter ── */
  const _nameTagEl    = document.getElementById('gb-notif-user');
  let   _nameTagTimer = null;
  function _triggerNameTag(username, action) {
    if (!_nameTagEl || !username) return;
    _nameTagEl.innerHTML = `<span class="notif-user-name">@${username}</span>&nbsp;&nbsp;${action}`;
    _nameTagEl.classList.add('visible');
    clearTimeout(_nameTagTimer);
    _nameTagTimer = setTimeout(() => _nameTagEl.classList.remove('visible'), 2800);

  function _v3FireEdgeBurst(platform, amount){
    const fillFrac = Math.min(1, rawScore / MAX_RAW);
    const x = Math.round(fillFrac * EW);
    const col = platform === 'tt' ? 'rgba(105,201,208,' : 'rgba(255,90,90,';

    _v3EdgeBursts.push({ x, col, age: 0, max: 54, intensity });

  function drawEdgePulse(){
    eCtx.clearRect(0, 0, EW, EH);
    for(let i = _v3EdgeBursts.length - 1; i >= 0; i--){
      const b = _v3EdgeBursts[i]; b.age++;
      if(b.age < 0) continue; // delayed ring not started yet
      if(b.age >= b.max){ _v3EdgeBursts.splice(i, 1); continue; }
      const p = b.age / b.max;
      const a = (1 - p) * b.intensity;
      const r = p * EH * 0.72;  // max radius ~40px — clips top/bottom of bar nicely
      // Outer ring
      eCtx.beginPath(); eCtx.arc(b.x, EH / 2, r, 0, Math.PI * 2);
      eCtx.strokeStyle = b.col + (a * 0.9) + ')';
      eCtx.lineWidth = 3.2 * (1 - p * 0.5) + 0.3;
      eCtx.stroke();
      // Inner echo ring
      if(r > 6){
        eCtx.beginPath(); eCtx.arc(b.x, EH / 2, r * 0.48, 0, Math.PI * 2);
        eCtx.strokeStyle = b.col + (a * 0.38) + ')';
        eCtx.lineWidth = 1.3;
        eCtx.stroke();
      }
    }
  }

  /* ── frequency bins → normalised per-segment amplitudes ── */
  function getFreqNorm(){
    const out = new Float32Array(SEG_COUNT);
    const src = (_wsFreqData && Date.now() - _wsFreqAge < 300) ? _wsFreqData
               : (audioReady && analyser)
                 ? (analyser.getByteFrequencyData(freqData), freqData)
                 : null;
    if(src){
      const binRange = BIN_END - BIN_START;
      for(let i = 0; i < SEG_COUNT; i++){
        const b0 = Math.floor(BIN_START + (i / SEG_COUNT) * binRange);
        const b1 = Math.floor(BIN_START + ((i + 1) / SEG_COUNT) * binRange);
        let sum = 0, cnt = 0;
        for(let b = b0; b <= b1 && b < src.length; b++){ sum += src[b]; cnt++; }
        out[i] = cnt > 0 ? Math.min(1, (sum / cnt) / 255 * GAIN_BOOST) : 0;
      }
    } else {
      const t = Date.now() / 1000;
      for(let i = 0; i < SEG_COUNT; i++)
        out[i] = 0.40 + 0.35 * Math.sin(t * 2.2 + i * 0.55)
                      + 0.15 * Math.sin(t * 3.7 + i * 0.90);
    }
    return out;
  }
