<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gift Bar</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Bebas+Neue&family=DM+Sans:wght@700&display=swap" rel="stylesheet">
<script src="https://cdn.ably.com/lib/ably.min-2.js"></script>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 1080px; height: 1920px; overflow: hidden; background: transparent; }

/* ─── PARTICLE CANVAS ─── */
#particle-canvas {
  position: absolute; top: 0; left: 0;
  width: 1080px; height: 1920px;
  pointer-events: none; z-index: 50;
}

/* ─── SCREEN PULSE ─── */
#screen-pulse {
  position: absolute; inset: 0;
  pointer-events: none; z-index: 8;
  opacity: 0; transition: opacity 0.35s ease;
}

/* ══════════════════════════════════════════════════════════
   FULL-WIDTH EDGE LINES
   Always span all 1080px at the top and bottom of the bar.
   Idle: very faint (opacity 0.10), no glow.
   Alert: activated — full brightness + traveling light sweep.
══════════════════════════════════════════════════════════ */
#bar-lines {
  position: absolute;
  top: 450px; left: 0;
  width: 1080px; height: 50px;
  pointer-events: none; z-index: 12;
}

/* Idle lines — full 1080px, fade left→transparent, visible right near content */
#line-top, #line-bot {
  position: absolute; left: 0; right: 0; height: 1px;
  /* Default: fades from transparent (left) to subtle purple (right) */
  background: linear-gradient(to right,
    transparent 0%,
    transparent 30%,
    rgba(192,132,252,0.15) 55%,
    rgba(192,132,252,0.45) 80%,
    rgba(192,132,252,0.65) 100%);
  transition: background 0.9s ease, box-shadow 0.8s ease;
}
#line-top { top: 0; }
#line-bot { bottom: 0; }

/* Activated state — full brightness, platform-coloured glow */
#bar-lines.active #line-top,
#bar-lines.active #line-bot {
  animation: lineActivate 0.35s ease forwards;
}
@keyframes lineActivate {
  from { opacity: 0.10; }
  to   { opacity: 1.00; }
}

/* Traveling-light sweep across the active line */
#line-sweep-top, #line-sweep-bot {
  position: absolute; left: 0; right: 0; height: 1px;
  opacity: 0; pointer-events: none;
  background: linear-gradient(90deg,
    transparent 0%,
    rgba(255,255,255,0.0) 30%,
    rgba(255,255,255,1.0) 50%,
    rgba(255,255,255,0.0) 70%,
    transparent 100%);
  background-size: 40% 100%;
}
#line-sweep-top { top: 0; }
#line-sweep-bot { bottom: 0; }

#bar-lines.active #line-sweep-top,
#bar-lines.active #line-sweep-bot {
  animation: lineSweep 1.1s ease-in-out var(--sweep-count, 2) forwards;
}
@keyframes lineSweep {
  0%   { background-position: -40% 0; opacity: 0; }
  10%  { opacity: 1; }
  90%  { opacity: 0.6; }
  100% { background-position: 140% 0; opacity: 0; }
}
#line-sweep-bot { animation-delay: 0.08s; }

/* ══════════════════════════════════════════════════════════
   GIFT BAR
   Background only visible in right 360px in idle state.
   clip-path animates open to full 1080px on alert.
   overflow:visible so hero text can bleed above/below.
══════════════════════════════════════════════════════════ */
#gift-bar {
  position: absolute;
  top: 450px; left: 0;
  width: 1080px; height: 50px;
  overflow: visible;
  opacity: 0; transition: opacity 0.6s ease;
  z-index: 10;
}
#gift-bar.visible { opacity: 1; }

/* Background layer — clips to right 360px in idle */
#bar-bg-layer {
  position: absolute; inset: 0;
  overflow: hidden;
  clip-path: inset(0 0 0 720px round 6px 0 0 6px);
  transition: clip-path 0.52s cubic-bezier(.34,1.56,.64,1);
}
#gift-bar.alert-active #bar-bg-layer {
  clip-path: inset(0 0 0 0px round 0px);
}

#bar-bg {
  position: absolute; inset: 0;
  background: rgba(5,0,14,0.76);
}
#bar-wash {
  position: absolute; inset: 0;
  transition: background 0.9s ease; pointer-events: none;
}
#bar-shimmer-flare {
  position: absolute; inset: 0;
  background: linear-gradient(115deg, transparent 15%, rgba(255,255,255,0.18) 50%, transparent 85%);
  background-size: 260% 100%; background-position: -260% 0; pointer-events: none;
  animation: barFlareSweep 5s ease-in-out infinite;
}
@keyframes barFlareSweep {
  0%   { background-position: -260% 0; opacity: 0; }
  8%   { opacity: 1; }
  50%  { background-position: 260% 0; opacity: 0; }
  100% { background-position: 260% 0; opacity: 0; }
}
/* Shimmer border — cycles through brand palette */
#bar-border {
  position: absolute; inset: 0; pointer-events: none;
  animation: barBorderShimmer 5s linear infinite;
}
@keyframes barBorderShimmer {
  0%   { box-shadow: inset 0 0 0 1px rgba(192,132,252,0.82), 0 0 10px rgba(192,132,252,0.22); }
  20%  { box-shadow: inset 0 0 0 1px rgba(232,121,249,0.96), 0 0 18px rgba(232,121,249,0.34); }
  40%  { box-shadow: inset 0 0 0 1px rgba(105,201,208,0.82), 0 0 10px rgba(105,201,208,0.22); }
  60%  { box-shadow: inset 0 0 0 1px rgba(238,29,82,0.88),   0 0 14px rgba(238,29,82,0.28);   }
  80%  { box-shadow: inset 0 0 0 1px rgba(168,85,247,0.88),  0 0 14px rgba(168,85,247,0.28);  }
  100% { box-shadow: inset 0 0 0 1px rgba(192,132,252,0.82), 0 0 10px rgba(192,132,252,0.22); }
}
/* Progress line along bottom of bar */
#bar-progress {
  position: absolute; bottom: 0; left: 0;
  height: 2px; width: 0%;
  border-radius: 0 1px 1px 0;
  transition: background 0.9s ease;
}

/* ─── HERO PANEL — overflows bar height, slides in on alert ─── */
#bar-hero {
  position: absolute; left: 0; top: 0;
  width: 720px; height: 50px;
  overflow: visible;
  display: flex; align-items: center; gap: 18px; padding: 0 20px 0 18px;
  opacity: 0; transform: translateX(-22px);
  transition: opacity 0.36s ease 0.08s, transform 0.46s cubic-bezier(.34,1.56,.64,1) 0.06s;
  pointer-events: none;
}
#gift-bar.alert-active #bar-hero { opacity: 1; transform: translateX(0); }

/* 90px Anton in 50px bar — intentionally bleeds above & below */
#bar-hero-name {
  font-family: 'Anton', sans-serif;
  font-size: 90px; line-height: 1; text-transform: uppercase; color: #fff;
  letter-spacing: 1px; white-space: nowrap; overflow: visible; flex-shrink: 1; min-width: 0;
  text-shadow: 0 3px 18px rgba(0,0,0,0.95), 0 0 40px rgba(255,255,255,0.06);
}
/* 58px Bebas — overflows bar. Shadow+glow set dynamically in JS. */
#bar-hero-amount {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 58px; letter-spacing: 4px;
  white-space: nowrap; flex-shrink: 0; overflow: visible;
}

/* ─── INFO PANEL — anchored right, expands left with content ─── */
#bar-info {
  position: absolute; right: 0; top: 0;
  width: auto; min-width: 260px; height: 50px;
  overflow: hidden;
  /* own bg so it always covers its content regardless of clip-path on bar-bg-layer */
  background: rgba(5,0,14,0.76);
  border-left: 1px solid rgba(255,255,255,0.06);
  display: flex; flex-direction: column;
  justify-content: center; align-items: flex-end;
  padding: 0 14px 0 14px; gap: 3px;
  transition: opacity 0.28s ease;
}

/* Row 1: slot title + platform badge — same line, right-aligned */
#bar-info-top {
  display: flex; align-items: center;
  gap: 7px;
}
/* Slot title */
#bar-slot-title {
  font-family: 'DM Sans', sans-serif;
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: rgba(255,255,255,0.55);
  white-space: nowrap;
}

/* Row 2: name + amount — adjacent, no justify-between spread */
#bar-info-bot {
  display: flex; align-items: baseline;
  gap: 9px;
}
#bar-info-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 24px; letter-spacing: 2px; color: #fff;
  white-space: nowrap;   /* never wraps */
  flex-shrink: 0;        /* never squishes — container expands instead */
  text-shadow: 0 2px 8px rgba(0,0,0,0.9);
}
#bar-info-amount {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 20px; letter-spacing: 2px;
  white-space: nowrap; flex-shrink: 0;
  transition: color 0.6s ease;
  /* dark stroke for readability against any background */
  text-shadow:
    -1px -1px 0 rgba(0,0,0,0.95),
     1px -1px 0 rgba(0,0,0,0.95),
    -1px  1px 0 rgba(0,0,0,0.95),
     1px  1px 0 rgba(0,0,0,0.95);
}
#bar-info-amount.monthly-shimmer {
  background: rgba(192,132,252,0.14);
  animation: monthlyGlow 1.4s ease-in-out infinite;
}
@keyframes monthlyGlow {
  0%,100% { box-shadow: 0 0 6px rgba(192,132,252,0.25); }
  50%     { box-shadow: 0 0 22px rgba(232,121,249,0.70), 0 0 40px rgba(168,85,247,0.35); }
}

/* Platform badge */
#bar-plat-badge {
  font-family: 'DM Sans', sans-serif;
  font-size: 9px; font-weight: 700;
  letter-spacing: 0.10em; text-transform: uppercase;
  padding: 2px 6px; border-radius: 4px;
  white-space: nowrap; flex-shrink: 0;
}
.plat-tiktok  { color: #69C9D0; background: rgba(105,201,208,0.16); border: 1px solid rgba(105,201,208,0.30); }
.plat-youtube { color: #FF6B6B; background: rgba(255,80,80,0.16);   border: 1px solid rgba(255,80,80,0.30);   }
.plat-direct,
.plat-default { color: #C084FC; background: rgba(192,132,252,0.16); border: 1px solid rgba(192,132,252,0.30); }

/* ─── STATUS DOT ─── */
#status-dot {
  position: absolute; top: 456px; left: 8px;
  width: 6px; height: 6px; border-radius: 50%;
  background: #444; z-index: 30; transition: background 0.3s;
}
#status-dot.connected  { background: #22c55e; box-shadow: 0 0 5px rgba(34,197,94,0.7); }
#status-dot.connecting { background: #eab308; }
</style>
</head>
<body>

<canvas id="particle-canvas" width="1080" height="1920"></canvas>
<div id="screen-pulse"></div>

<!-- Full-width edge lines — span entire canvas width -->
<div id="bar-lines">
  <div id="line-top"></div>
  <div id="line-bot"></div>
  <div id="line-sweep-top"></div>
  <div id="line-sweep-bot"></div>
</div>

<div id="gift-bar">
  <div id="bar-bg-layer">
    <div id="bar-bg"></div>
    <div id="bar-wash"></div>
    <div id="bar-shimmer-flare"></div>
    <div id="bar-border"></div>
    <div id="bar-progress"></div>
  </div>
  <div id="bar-hero">
    <span id="bar-hero-name"></span>
    <span id="bar-hero-amount"></span>
  </div>
  <div id="bar-info">
    <div id="bar-info-top">
      <span id="bar-slot-title"></span>
      <span id="bar-plat-badge"></span>  <!-- badge sits right of title, same row -->
    </div>
    <div id="bar-info-bot">
      <span id="bar-info-name"></span>
      <span id="bar-info-amount"></span>
    </div>
  </div>
</div>

<div id="status-dot"></div>

<script>
/* ══ CONFIG ══════════════════════════════════════════════ */
const CONFIG = {
  ROTATE_MS:         5000,
  MONTHLY_LINGER_MS: 3500,
  ABLY_KEY:    'Y8e-eA.l0VHlg:aJXsEfu1Be4BYsAeATRMI3w30YAKSs_LyF3DPoesIz0',
  ABLY_CHANNEL:'splat-overlay',
};

/*
  Tier thresholds:
    Coins/Jewels: <50=skip  <1k=T1  <5k=T2  <25k=T3  <100k=T4  <250k=T5  250k+=T6
    USD:          <$1=skip  <$10=T1 <$50=T2 <$100=T3 <$250=T4  <$400=T5  $400+=T6
*/
const TIER_CONFIG = [
  null,
  { duration:  5000, particles:   0, sweeps: 1, pulseLines: false }, // T1
  { duration:  6500, particles:  30, sweeps: 2, pulseLines: false }, // T2
  { duration:  7500, particles:  60, sweeps: 3, pulseLines: false }, // T3
  { duration:  9000, particles: 120, sweeps: 4, pulseLines: true  }, // T4
  { duration: 11000, particles: 200, sweeps: 5, pulseLines: true  }, // T5
  { duration: 13000, particles: 350, sweeps: 6, pulseLines: true  }, // T6
];

const SLOT_DEFS = [
  { key: 'daily',   label: 'Daily Top Gifter'   },
  { key: 'weekly',  label: 'Weekly Top Gifter'  },
  { key: 'monthly', label: 'Monthly Top Gifter' },
  { key: 'youtube', label: 'Top YouTube Gifter' },
  { key: 'tiktok',  label: 'Top TikTok Gifter'  },
  { key: 'custom',  label: 'Featured Gifter'    },
];

const PLAT_COLORS = {
  tiktok:  { wash: 'rgba(105,201,208,0.08)', edge: '#69C9D0', edgeRgb: '105,201,208', particles: ['#69C9D0','#EE1D52','#fff','#ff80ab','#00eeff'], pulse: 'rgba(105,201,208,0.24)' },
  youtube: { wash: 'rgba(255,80,80,0.08)',   edge: '#FF6B6B', edgeRgb: '255,107,107', particles: ['#FF6B6B','#FF0000','#fff','#ffcc00','#ff4444'], pulse: 'rgba(255,80,80,0.24)'   },
  direct:  { wash: 'rgba(192,132,252,0.08)', edge: '#C084FC', edgeRgb: '192,132,252', particles: ['#C084FC','#E879F9','#fff','#A855F7','#FAF5FF'], pulse: 'rgba(192,132,252,0.24)' },
  default: { wash: 'rgba(192,132,252,0.08)', edge: '#C084FC', edgeRgb: '192,132,252', particles: ['#C084FC','#E879F9','#fff','#A855F7','#FAF5FF'], pulse: 'rgba(192,132,252,0.24)' },
};

/* ══ STATE ═══════════════════════════════════════════════ */
let leaderboard = {}, activeSlots = SLOT_DEFS.slice(0, 5);
let currentIdx = 0, rotateTimer = null, progressAnim = null;
let pinned = false, alertQueue = [], alertActive = false;
let alertTimeout = null, infoFadeTimer = null, monthlyTimer = null;
let activePlat = 'default';

/* ══ UTILS ═══════════════════════════════════════════════ */
function fmtAmount(amount, type) {
  const n = Number(amount) || 0;
  if (type === 'tiktok_coins')      return n.toLocaleString() + ' COINS';
  if (type === 'youtube_jewels')    return n.toLocaleString() + ' JEWELS';
  if (type === 'youtube_superchat') return '$' + (Number.isInteger(n) ? n.toLocaleString() : n.toFixed(2));
  if (type === 'direct_donation')   return '$' + (Number.isInteger(n) ? n.toLocaleString() : n.toFixed(2));
  return n.toLocaleString();
}
function platKey(p) { return ['tiktok','youtube','direct'].includes(p) ? p : 'default'; }
function platLabel(p) {
  if (p === 'tiktok')  return '♪ TikTok';
  if (p === 'youtube') return '▶ YouTube';
  if (p === 'direct')  return '💚 Direct';
  return '🎁 Gift';
}
function getTier(amount, type) {
  const n = Number(amount) || 0;
  if (type === 'tiktok_coins' || type === 'youtube_jewels') {
    if (n < 50)     return 0; if (n < 1000)   return 1;
    if (n < 5000)   return 2; if (n < 25000)  return 3;
    if (n < 100000) return 4; if (n < 250000) return 5; return 6;
  }
  if (n < 1)   return 0; if (n < 10)  return 1;
  if (n < 50)  return 2; if (n < 100) return 3;
  if (n < 250) return 4; if (n < 400) return 5; return 6;
}

/* ══ PARTICLES ═══════════════════════════════════════════ */
const pCanvas = document.getElementById('particle-canvas');
const pCtx    = pCanvas.getContext('2d');
let pList = [], pRaf = null;

function emitParticles(tier, plat) {
  const cfg = TIER_CONFIG[tier];
  if (!cfg || cfg.particles === 0) return;
  const colors = PLAT_COLORS[plat].particles;
  for (let i = 0; i < cfg.particles; i++) {
    const a = Math.random() * Math.PI * 2;
    const sp = (3 + Math.random() * tier * 3.2) * (0.6 + Math.random() * 0.8);
    pList.push({
      x: 200 + Math.random() * 680, y: 455 + Math.random() * 20,
      vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 1,
      color: colors[Math.floor(Math.random() * colors.length)],
      size: 2 + Math.random() * tier * 1.5,
      life: 0.7 + Math.random() * 0.3,
      decay: 0.003 + Math.random() * (0.007 / Math.max(tier, 1)),
      type: Math.random() < 0.5 ? 'rect' : 'circle',
      rot: Math.random() * Math.PI * 2, rotV: (Math.random() - 0.5) * 0.12,
    });
  }
  if (!pRaf) pTick();
}
function pTick() {
  pCtx.clearRect(0, 0, 1080, 1920);
  pList = pList.filter(p => p.life > 0.01);
  for (const p of pList) {
    p.x += p.vx; p.y += p.vy; p.vy += 0.2; p.vx *= 0.993;
    p.life -= p.decay; p.rot += p.rotV;
    pCtx.save(); pCtx.globalAlpha = Math.max(0, Math.min(1, p.life));
    pCtx.fillStyle = p.color;
    pCtx.translate(p.x, p.y); pCtx.rotate(p.rot);
    if (p.type === 'rect') { pCtx.fillRect(-p.size * .5, -p.size, p.size, p.size * 2); }
    else { pCtx.beginPath(); pCtx.arc(0, 0, p.size / 2, 0, Math.PI * 2); pCtx.fill(); }
    pCtx.restore();
  }
  pCtx.globalAlpha = 1;
  pRaf = pList.length ? requestAnimationFrame(pTick) : null;
}
function clearParticles() {
  pList = [];
  if (pRaf) { cancelAnimationFrame(pRaf); pRaf = null; }
  pCtx.clearRect(0, 0, 1080, 1920);
}

/* ══ SCREEN PULSE ════════════════════════════════════════ */
function triggerScreenPulse(plat, tier) {
  if (tier < 4) return;
  const pc = PLAT_COLORS[plat];
  const sp = document.getElementById('screen-pulse');
  const sz = (tier - 3) * 65;
  function pulse(delay) {
    setTimeout(() => {
      sp.style.boxShadow = `inset 0 0 ${sz}px ${sz * .55}px ${pc.pulse}`;
      sp.style.opacity = '1';
      setTimeout(() => { sp.style.opacity = '0'; }, 700);
    }, delay);
  }
  pulse(0); if (tier >= 5) pulse(1300); if (tier >= 6) pulse(2500);
}

/* ══ EDGE LINES ACTIVATION ═══════════════════════════════ */
function activateLines(plat, tier) {
  const pc  = PLAT_COLORS[plat];
  const rgb = pc.edgeRgb;
  const lines = document.getElementById('bar-lines');
  const top   = document.getElementById('line-top');
  const bot   = document.getElementById('line-bot');
  const sweepCount = TIER_CONFIG[tier]?.sweeps ?? 2;

  // Set line colour and glow before activating
  const glow = tier >= 4
    ? `0 0 ${6 + tier * 3}px rgba(${rgb},0.9), 0 0 ${14 + tier * 6}px rgba(${rgb},0.5)`
    : `0 0 6px rgba(${rgb},0.7)`;
  top.style.background = `rgba(${rgb},1)`;
  top.style.boxShadow  = glow;
  bot.style.background = `rgba(${rgb},1)`;
  bot.style.boxShadow  = glow;

  // Set sweep speed/count via CSS custom property & re-trigger animation
  lines.style.setProperty('--sweep-count', sweepCount);
  lines.classList.remove('active');
  void lines.offsetWidth;
  lines.classList.add('active');
}

function deactivateLines() {
  const lines = document.getElementById('bar-lines');
  const top   = document.getElementById('line-top');
  const bot   = document.getElementById('line-bot');
  lines.classList.remove('active');
  // Fade back to faint idle state
  top.style.background = 'rgba(192,132,252,0.10)';
  top.style.boxShadow  = 'none';
  bot.style.background = 'rgba(192,132,252,0.10)';
  bot.style.boxShadow  = 'none';
}

/* ══ PULSING LINES (tier 4+) ═════════════════════════════ */
let linePulseInterval = null;
function startLinePulse(plat) {
  stopLinePulse();
  const pc  = PLAT_COLORS[plat];
  const rgb = pc.edgeRgb;
  const top = document.getElementById('line-top');
  const bot = document.getElementById('line-bot');
  let bright = true;
  linePulseInterval = setInterval(() => {
    const glow = bright
      ? `0 0 18px rgba(${rgb},1), 0 0 40px rgba(${rgb},0.7)`
      : `0 0 6px rgba(${rgb},0.6)`;
    top.style.boxShadow = bot.style.boxShadow = glow;
    bright = !bright;
  }, 500);
}
function stopLinePulse() {
  if (linePulseInterval) { clearInterval(linePulseInterval); linePulseInterval = null; }
}

/* ══ PROGRESS LINE ═══════════════════════════════════════ */
function startProgress(ms) {
  if (progressAnim) { cancelAnimationFrame(progressAnim); progressAnim = null; }
  const bar = document.getElementById('bar-progress');
  const start = performance.now(); bar.style.width = '0%';
  function tick(now) {
    const pct = Math.min(100, ((now - start) / ms) * 100);
    bar.style.width = pct + '%';
    progressAnim = pct < 100 ? requestAnimationFrame(tick) : null;
  }
  progressAnim = requestAnimationFrame(tick);
}

/* ══ BAR INFO UPDATE — crossfade content ═════════════════ */
function setBarInfo(title, name, amtText, amtColor, amtRgb, platText, platClass, monthly) {
  const info = document.getElementById('bar-info');
  clearTimeout(infoFadeTimer);
  info.style.opacity = '0';
  infoFadeTimer = setTimeout(() => {
    document.getElementById('bar-slot-title').textContent = title;
    document.getElementById('bar-info-name').textContent  = name;
    const amtEl = document.getElementById('bar-info-amount');
    amtEl.textContent = amtText; amtEl.style.color = amtColor;
    // Dark stroke + subtle platform glow on info amount
    amtEl.style.textShadow = [
      '-1px -1px 0 rgba(0,0,0,0.95)',
       '1px -1px 0 rgba(0,0,0,0.95)',
      '-1px  1px 0 rgba(0,0,0,0.95)',
       '1px  1px 0 rgba(0,0,0,0.95)',
      `0 0 14px rgba(${amtRgb},0.55)`,
    ].join(', ');
    amtEl.classList.toggle('monthly-shimmer', !!monthly);
    const badge = document.getElementById('bar-plat-badge');
    badge.textContent = platText; badge.className = 'bar-plat ' + platClass;
    info.style.opacity = '1';
  }, 240);
}

/* ══ SHOW SLOT — idle rotation ═══════════════════════════ */
function showSlot(idx) {
  if (!activeSlots.length) return;
  currentIdx = ((idx % activeSlots.length) + activeSlots.length) % activeSlots.length;
  const slotDef = activeSlots[currentIdx];
  const entry   = leaderboard[slotDef.key] ?? null;
  const plat    = entry ? platKey(entry.platform) : 'default';
  const pc      = PLAT_COLORS[plat];
  activePlat    = plat;

  setBarInfo(
    slotDef.label.toUpperCase(),
    entry?.name ? entry.name.toUpperCase() : '—',
    entry ? fmtAmount(entry.amount, entry.type) : '',
    pc.edge, pc.edgeRgb,
    platLabel(entry?.platform), 'bar-plat plat-' + plat,
    false
  );

  document.getElementById('bar-wash').style.background =
    `linear-gradient(180deg, ${pc.wash} 0%, rgba(5,0,14,0) 100%)`;
  document.getElementById('bar-progress').style.background = pc.edge;

  // Idle lines: fade from transparent (left) → platform color (right)
  const lineGrad = `linear-gradient(to right,
    transparent 0%, transparent 28%,
    rgba(${pc.edgeRgb},0.12) 50%,
    rgba(${pc.edgeRgb},0.40) 78%,
    rgba(${pc.edgeRgb},0.65) 100%)`;
  document.getElementById('line-top').style.background =
  document.getElementById('line-bot').style.background = lineGrad;

  startProgress(CONFIG.ROTATE_MS);
}

/* ══ ROTATION ════════════════════════════════════════════ */
function startRotation() {
  stopRotation();
  if (!activeSlots.length) return;
  rotateTimer = setInterval(() => { if (!pinned && !alertActive) showSlot(currentIdx + 1); }, CONFIG.ROTATE_MS);
}
function stopRotation() {
  if (rotateTimer)  { clearInterval(rotateTimer);  rotateTimer = null;  }
  if (progressAnim) { cancelAnimationFrame(progressAnim); progressAnim = null; }
}

/* ══ GIFTR DATA ══════════════════════════════════════════ */
function onGiftrData(data) {
  leaderboard = {};
  let hasAny = false;
  SLOT_DEFS.forEach(d => { if (data[d.key]) { leaderboard[d.key] = data[d.key]; hasAny = true; } });
  const enabled = Array.isArray(data.enabledSlots)
    ? data.enabledSlots : ['daily','weekly','monthly','youtube','tiktok'];
  activeSlots = SLOT_DEFS.filter(d => d.key === 'custom' ? !!data.custom : enabled.includes(d.key));
  const bar = document.getElementById('gift-bar');
  if (!hasAny || !activeSlots.length) { bar.classList.remove('visible'); stopRotation(); return; }
  bar.classList.add('visible');
  if (currentIdx >= activeSlots.length) currentIdx = 0;
  if (!alertActive) { showSlot(currentIdx); startRotation(); }
}

/* ══ GIFT ALERT SYSTEM ═══════════════════════════════════ */
function onGiftAlert(data) {
  const tier = getTier(data.amount, data.type);
  if (tier === 0) return;
  alertQueue.push({ ...data, tier });
  if (!alertActive) runNextAlert();
}

function runNextAlert() {
  if (!alertQueue.length) {
    alertActive = false;
    runMonthlyMoment(); return;
  }
  alertActive = true;
  showAlert(alertQueue.shift());
}

function showAlert(alert) {
  const { name, amount, type, platform, tier } = alert;
  const plat = platKey(platform);
  const pc   = PLAT_COLORS[plat];
  const cfg  = TIER_CONFIG[tier];

  stopRotation(); clearTimeout(alertTimeout);
  activePlat = plat;

  // Right info: "JUST GIFTED" with gift amount
  setBarInfo('JUST GIFTED', name.toUpperCase(), fmtAmount(amount, type), pc.edge, pc.edgeRgb, platLabel(platform), 'bar-plat plat-' + plat, false);

  document.getElementById('bar-wash').style.background =
    `linear-gradient(180deg, ${pc.wash} 0%, rgba(5,0,14,0) 100%)`;
  document.getElementById('bar-progress').style.background = pc.edge;

  if (tier === 1) {
    // T1: line sweep only, no hero expansion
    activateLines(plat, tier);
    alertTimeout = setTimeout(dismissAlert, cfg.duration);
    return;
  }

  // T2+: expand bar + hero text
  const heroName = document.getElementById('bar-hero-name');
  const heroAmt  = document.getElementById('bar-hero-amount');
  heroName.textContent = name.toUpperCase();
  heroAmt.textContent = fmtAmount(amount, type);
  heroAmt.style.color = pc.edge;
  // Stroke via 4 dark offsets, then bright platform glow
  heroAmt.style.textShadow = [
    // Drop shadow for depth (no hard outline — soft directional dark)
    '0 3px 10px rgba(0,0,0,0.98)',
    '0 6px 22px rgba(0,0,0,0.85)',
    // Platform color glow — inner tight, outer wide bloom
    `0 0 12px rgba(${pc.edgeRgb},1.0)`,
    `0 0 30px rgba(${pc.edgeRgb},0.85)`,
    `0 0 65px rgba(${pc.edgeRgb},0.55)`,
    `0 0 120px rgba(${pc.edgeRgb},0.25)`,
  ].join(', ');
  document.getElementById('gift-bar').classList.add('alert-active');

  // Activate lines — intensity scales with tier
  activateLines(plat, tier);
  if (cfg.pulseLines) startLinePulse(plat);

  // Particles + screen pulse
  emitParticles(tier, plat);
  triggerScreenPulse(plat, tier);

  alertTimeout = setTimeout(dismissAlert, cfg.duration);
}

function dismissAlert() {
  clearTimeout(alertTimeout);
  stopLinePulse(); deactivateLines();
  clearParticles();

  // Collapse hero
  document.getElementById('gift-bar').classList.remove('alert-active');
  runNextAlert();
}

/* ══ MONTHLY MOMENT — post-alert bar state ═══════════════ */
function runMonthlyMoment() {
  const monthly = leaderboard.monthly;
  if (!monthly) { resumeFromAlert(); return; }
  const plat = platKey(monthly.platform);
  const pc   = PLAT_COLORS[plat];
  setBarInfo('MONTHLY TOTAL', monthly.name.toUpperCase(), fmtAmount(monthly.amount, monthly.type), pc.edge, pc.edgeRgb, platLabel(monthly.platform), 'bar-plat plat-' + plat, true);
  document.getElementById('bar-wash').style.background = `linear-gradient(180deg,${pc.wash} 0%,rgba(5,0,14,0) 100%)`;
  // Subtle glow on lines during monthly moment
  const top = document.getElementById('line-top'), bot = document.getElementById('line-bot');
  top.style.background = bot.style.background = `rgba(${pc.edgeRgb},0.25)`;
  top.style.boxShadow  = bot.style.boxShadow  = `0 0 8px rgba(${pc.edgeRgb},0.4)`;
  clearTimeout(monthlyTimer);
  monthlyTimer = setTimeout(resumeFromAlert, CONFIG.MONTHLY_LINGER_MS);
}

function resumeFromAlert() {
  document.getElementById('bar-info-amount').classList.remove('monthly-shimmer');
  deactivateLines();
  if (activeSlots.length) showSlot(currentIdx);
  startRotation();
}

/* ══ GIFTR CMD ═══════════════════════════════════════════ */
function onGiftrCmd(data) {
  const cmd = String(data ?? '');
  if (cmd === 'auto') { pinned = false; if (!alertActive) startRotation(); }
  else if (cmd.startsWith('slot:')) {
    const key = cmd.slice(5);
    const idx = activeSlots.findIndex(s => s.key === key);
    if (idx >= 0) { pinned = true; stopRotation(); showSlot(idx); }
  }
}

/* ══ ABLY ════════════════════════════════════════════════ */
(function initAbly() {
  try {
    const client  = new Ably.Realtime({ key: CONFIG.ABLY_KEY });
    const channel = client.channels.get(CONFIG.ABLY_CHANNEL);
    const dot     = document.getElementById('status-dot');
    client.connection.on('connected',    () => { dot.className = 'connected';   });
    client.connection.on('disconnected', () => { dot.className = '';            });
    client.connection.on('connecting',   () => { dot.className = 'connecting';  });
    client.connection.once('connected',  () => channel.publish('cmd','requestLeaderboard').catch(()=>{}));
    channel.subscribe('giftr',      msg => onGiftrData(msg.data));
    channel.subscribe('gift-alert', msg => onGiftAlert(msg.data));
    channel.subscribe('giftr-cmd',  msg => onGiftrCmd(msg.data));
  } catch(e) { console.warn('[Ably] init failed:', e); }
})();
</script>
