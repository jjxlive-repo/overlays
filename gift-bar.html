  /* ── add points ── */
  /* ── addPts: type maps to boost category + injects platform energy ── */
  function addPts(base, plat, inputType, tickerLabel, username, noNotif){
    if(plat && plat !== 'other') setPlatMode(plat);
    const cat  = (inputType === 'like' || inputType === 'like_batch') ? 'likes'
               : (inputType === 'heart_me' || inputType === 'heart_me_first' || inputType === 'yt_sub' || inputType === 'tiktok_gift') ? 'gifts'
               : 'comments';
    const boostX  = _boostMult[cat] ?? 1;
    const surgeX  = (_surgeActive && _surgeType && _surgeType.match(inputType, plat, cat)) ? SURGE_MULTI : 1;
    const pts     = base * _intensityMult * boostX * surgeX;
    rawScore = Math.min(rawScore + pts, MAX_RAW);
    // Contribution ticker + visual effects
    if(pts > 0){
      const _tMap = { comment:'💬 comment', like:'👍 like', like_batch:'👍 likes',
        join:'🚪 join/follow', heart_me:'💝 Heart Me', heart_me_first:'✨ first Heart Me',
        yt_sub:'📹 YT sub', comment_match:'🎯 chat command' };
      const _lbl  = tickerLabel || _tMap[inputType] || inputType;
      const _pStr = pts < 1 ? '+'+pts.toFixed(1) : '+'+Math.round(pts);
      // Ripple at current fill edge — always
      const _pctNow = Math.min(100, Math.round((rawScore / MAX_RAW) * 100));
      _triggerRipple(_pctNow, pts);
      // Spawn platform-routed pill at fill edge (TT above bar, YT below)
      if (!noNotif) {
        const _notifPlat = plat === 'yt' ? 'yt' : 'tt';
        const _userHtml  = username
          ? `<span class="nt-user">@${username}</span>&nbsp;`
          : '';
        _spawnNotif(_notifPlat,
          `${_userHtml}<span class="nt-label">${_lbl}</span><span class="nt-pts">${_pStr}</span>`
        );
      }
    }

    // ── Platform energy injection for visual waveform ──
    const energy = Math.min(1, pts / 20);  // scale injection by points earned
    const spread = pts >= 20 ? 8 : pts >= 8 ? 6 : pts >= 3 ? 4 : 3;
    if(plat === 'tt'){
      // TikTok: inject on left side, big gifts scatter multiple spikes
      injectTT(Math.min(1, energy * 2.5), spread);
      if(pts >= 20) injectTT(Math.min(0.8, energy * 1.5), spread - 1); // second spike
    } else if(plat === 'yt'){
      // YouTube: inject on right side
      injectYT(Math.min(1, energy * 2.5), spread);
      if(pts >= 20) injectYT(Math.min(0.8, energy * 1.5), spread - 1);
    } else {
      // Neutral/other: inject on both sides at lower amplitude
      injectTT(Math.min(0.5, energy), Math.max(2, spread - 2));
      injectYT(Math.min(0.5, energy), Math.max(2, spread - 2));
    }

    if(rawScore >= MAX_RAW * 0.995 && !_bbFired && !_bbCooldown){
      _bbFired = true;
      if(typeof splatState !== 'undefined' && splatState === SPLAT_STATE.COUNTDOWN){
        // Milk filled during rescue → auto-save the run!
        splatEnterSaved();
        setTimeout(()=>{ rawScore=0; _bbFired=false; _bbCooldown=false; _mmUpdateStatus(0); }, 600);
      } else {
        // Fire immediately — explosion overlays fine on top of gift alerts
        fireMilkGoal();
      }
    }
  }

  /* ══ AUTO SURGE SYSTEM ══════════════════════════════════════════
     Fires every 60–90 s (randomized). Lasts 15 s with countdown timer.
     Each surge targets ONE type (TT comments, YT comments, joins, gifts, or all).
     Only that type gets ×SURGE_MULTI — everything else scores normally.
  ═══════════════════════════════════════════════════════════════ */

  function _scheduleAutoBoost(){
    if(_smartMode === 'manual') return;
    if(_surgeScheduled) return;          // already one in the pipe
    _surgeScheduled = true;
    const gap = SURGE_MIN_MS + Math.random() * (SURGE_MAX_MS - SURGE_MIN_MS);
    setTimeout(() => {
      _surgeScheduled = false;
      if(!_surgeActive && rawScore > 0) _fireAutoBoost();
      else _scheduleAutoBoost();         // missed window (no score yet), try again
    }, gap);
  }

  function _fireAutoBoost(){
    if(_surgeActive) return;
    _surgeActive = true;
    _surgeType   = SURGE_TYPES[Math.floor(Math.random() * SURGE_TYPES.length)];

    _showSurgeFlash(_surgeType);
    _playSurgeSound();
    giftBarEl?.classList.add('hm-surge-active'); // waveform goes white/bright

    _surgeTimer = setTimeout(() => {
      _surgeActive = false;
      _surgeType   = null;
      giftBarEl?.classList.remove('hm-surge-active');
      _hideSurgeFlash();
      _scheduleAutoBoost();              // queue the next surge
    }, SURGE_DURATION_MS + STREAM_DELAY_S * 1000);
  }

  /* ── Surge flash: shows type label + live countdown in boost pill (v3) ── */
  function _showSurgeFlash(st){
    const gb     = document.getElementById('gift-bar');
    const bPill  = document.getElementById('v3-boost-pill');
    const bpText = document.getElementById('v3bp-text');
    const bpTimer= document.getElementById('v3bp-timer');
    const barText= document.getElementById('gb-bar-text');
    if(gb) gb.classList.add('gb-surge-active');
    // Hide in-bar text — route surge to pill
    if(barText){ barText.classList.remove('visible','boost','surge','urgent'); barText.style.opacity = '0'; }
    let remaining = Math.round(SURGE_DURATION_MS / 1000) + STREAM_DELAY_S;
    function _updateSurgeText(){
      if(bpText)  bpText.innerHTML  = `⚡ <span class="v3bp-mult">2X</span> ${st.label}`;
      if(bpTimer) bpTimer.textContent = `${remaining}s · ${_currentPct}%`;
      if(bPill)   bPill.classList.add('visible');
    }
    _updateSurgeText();
    clearInterval(_surgeCountdown);
    _surgeCountdown = setInterval(() => {
      remaining--;
      if(remaining > 0) _updateSurgeText();
      else clearInterval(_surgeCountdown);
    }, 1000);
  }

  function _hideSurgeFlash(){
    clearInterval(_surgeCountdown);
    _surgeCountdown = null;
    const gb     = document.getElementById('gift-bar');
    const bPill  = document.getElementById('v3-boost-pill');
    const barText= document.getElementById('gb-bar-text');
    if(gb) gb.classList.remove('gb-surge-active');
    if(bPill) bPill.classList.remove('visible');
    // Restore bar text — next drawHype frame sets content + opacity naturally
    if(barText){ barText.style.opacity = ''; }
  }

  function _playSurgeSound(){
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      [[200,0.00],[300,0.07],[440,0.13],[600,0.19],[880,0.25]].forEach(([freq, delay]) => {
        const osc  = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.type = 'triangle'; osc.frequency.value = freq;
        const t = ctx.currentTime + delay;
        gain.gain.setValueAtTime(0, t);
        gain.gain.linearRampToValueAtTime(0.28, t + 0.04);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.32);
        osc.start(t); osc.stop(t + 0.33);
      });
      const buf  = ctx.createBuffer(1, Math.ceil(ctx.sampleRate * 0.45), ctx.sampleRate);
      const data = buf.getChannelData(0);
      for(let i = 0; i < data.length; i++) data[i] = (Math.random()*2-1) * (1 - i/data.length);
      const nSrc = ctx.createBufferSource(); nSrc.buffer = buf;
      const filt = ctx.createBiquadFilter(); filt.type = 'bandpass';
      filt.frequency.setValueAtTime(600, ctx.currentTime);
      filt.frequency.linearRampToValueAtTime(2400, ctx.currentTime + 0.45);
      filt.Q.value = 1.5;
      const nGain = ctx.createGain();
      nGain.gain.setValueAtTime(0.12, ctx.currentTime);
      nGain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.45);
      nSrc.connect(filt); filt.connect(nGain); nGain.connect(ctx.destination);
      nSrc.start(); nSrc.stop(ctx.currentTime + 0.46);
    } catch(e) {}
  }

  _scheduleAutoBoost(); // kick off auto surge on load

  /* ── Decay (3–5% per tick, pauses during cooldown) ── */
  setInterval(() => {
    if(!_bbCooldown){
      const rate = 0.03 + Math.random() * 0.02;
      rawScore = Math.max(0, rawScore - MAX_RAW * rate);
    }
  }, DECAY_TICK_MS);

  /* ── Publish hype % to dock every 500ms (only when it changes ≥1%) ── */
  // Dock no longer has its own local scoring — it depends on this for accuracy.
  let _lastPubPct = -1;
  setInterval(() => {
    const pct = Math.round((rawScore / MAX_RAW) * 100);
    if(Math.abs(pct - _lastPubPct) >= 1){
      _lastPubPct = pct;
      try { ablyChannel.publish('milk-pct', { pct }); } catch(e) {}
    }
  }, 500);

  /* ── Below-bar waveform helper ── */
  const SEG_GAP = 3;
  const SEG_W   = (HMW - (SEG_COUNT - 1) * SEG_GAP) / SEG_COUNT;

  function drawBar(x, h, colorBot, colorTop, glowColor, glowBlur){
    const grad = hmCtx.createLinearGradient(x, 0, x, h);
    grad.addColorStop(0, colorTop);
    grad.addColorStop(1, colorBot);
    hmCtx.fillStyle = grad;
    hmCtx.shadowColor = glowColor;
    hmCtx.shadowBlur  = glowBlur;
    hmCtx.beginPath();
    hmCtx.roundRect(x, 0, SEG_W, h, [0, 0, Math.min(3, SEG_W/2), Math.min(3, SEG_W/2)]);
    hmCtx.fill();
  }

  /* ── Combined rAF loop: full-width in-bar EQ (eCtx) + below-bar waveform (hmCtx) ── */
  const EQ_BW   = 4;
  const EQ_STEP = 7;
  const EQ_CENTER = Math.floor(EH / 2);   // 27 — bars grow up/down from here
  const ALL_COLS  = Math.floor(EW / EQ_STEP); // 154
  const _eqSeeds  = Array.from({length: ALL_COLS}, () => Math.random() * 100);
  const _barInfoEl = document.getElementById('bar-info');
  const _giftBarEl = document.getElementById('gift-bar');
  // Bar-info is fixed-width (300px) so wave center is constant: (1080 - 300) / 2 = 390px
  const _WAVE_CENTER = Math.round((EW - 300) / 2);
  if (_giftBarEl) _giftBarEl.style.setProperty('--wave-center', _WAVE_CENTER + 'px');

  (function drawHype(){
    const t     = Date.now() / 1000;
    const boost = boostActive;
    const amp   = hypeAmp();

    /* ── Decay v3 scalar platform energies ── */
    _v3ttE = Math.max(0, _v3ttE - 0.008);
    _v3ytE = Math.max(0, _v3ytE - 0.008);

    const fillFrac  = Math.min(1, rawScore / MAX_RAW);
    const fillXe    = Math.round(fillFrac * EW);
    const surgeAmp  = (_surgeActive || boost) ? 1.85 : 1.0;
    // Gifter slides live at the right edge — read actual width each frame so it adapts to content
    const gifterX   = _barInfoEl ? Math.max(0, EW - _barInfoEl.offsetWidth) : EW - 280;

    /* ── Full-width EQ bars on eCtx ── */
    eCtx.clearRect(0, 0, EW, EH);

    for(let i = 0; i < ALL_COLS; i++){
      const x     = i * EQ_STEP;
      const xGlob = (x + EQ_BW / 2) / EW;
      const inFill = x < fillXe;
      const idleSin = 0.30 + 0.26*Math.sin(t*2.2+xGlob*9)
                           + 0.12*Math.sin(t*3.7+xGlob*15);

      let ttH, ttA, ytH, ytA;
      let spike = 0, spIsRed = false;

      if(inFill){
        const ttReact = Math.min(1, _v3ttE * surgeAmp);
        const ytReact = Math.min(1, _v3ytE * surgeAmp);
        ttH = Math.max(2, idleSin * EQ_CENTER * 0.30 + ttReact * EQ_CENTER * 0.82);
        ytH = Math.max(2, idleSin * EQ_CENTER * 0.30 + ytReact * EQ_CENTER * 0.82);
        ttA = _surgeActive ? 0.88 + Math.random()*0.12
            : boost        ? 0.72 + ttReact * 0.22
            :                0.38 + ttReact * 0.57 + idleSin * 0.05;
        ytA = _surgeActive ? 0.82 + Math.random()*0.12
            : boost        ? 0.68 + ytReact * 0.22
            :                0.32 + ytReact * 0.57 + idleSin * 0.05;
      } else if (x < gifterX) {
        const sd   = _eqSeeds[i];
        // Traveling waves — spatially coherent so adjacent bars move together
        const flow = 0.50 + 0.30 * Math.sin(t * 1.3 - xGlob * 6.5)
                         + 0.14 * Math.sin(t * 2.0 + xGlob * 11.0 + sd * 0.35)
                         + 0.07 * Math.sin(t * 0.6 + xGlob * 3.5  + sd * 0.15);
        spike   = Math.max(0, Math.min(1, flow));
        spIsRed = sd < 0.5;
        ttH = Math.max(2, spike * EQ_CENTER * 0.82);
        ytH = ttH;
        ttA = Math.min(0.48, 0.10 + spike * 0.32);
        ytA = ttA;
      }

      // TT — grows UP from center
      if(ttH > 0.5){
        let ttCol;
        if(_surgeActive)      ttCol = `rgba(255,255,255,${ttA})`;
        else if(inFill)       ttCol = `rgba(105,201,208,${ttA})`;
        else if(spike > 0.75) ttCol = spIsRed ? `rgba(255,50,50,${ttA*0.35})` : `rgba(80,80,255,${ttA*0.35})`;
        else                  ttCol = `rgba(105,201,208,${ttA})`;
        eCtx.fillStyle = ttCol;
        eCtx.fillRect(x, EQ_CENTER - ttH, EQ_BW, ttH);
      }
      // YT — grows DOWN from center
      if(ytH > 0.5){
        let ytCol;
        if(_surgeActive)      ytCol = `rgba(255,200,200,${ytA})`;
        else if(inFill)       ytCol = `rgba(255,68,68,${ytA})`;
        else if(spike > 0.75) ytCol = spIsRed ? `rgba(255,50,50,${ytA*0.35})` : `rgba(80,80,255,${ytA*0.35})`;
        else                  ytCol = `rgba(105,201,208,${ytA})`;
        eCtx.fillStyle = ytCol;
        eCtx.fillRect(x, EQ_CENTER, EQ_BW, ytH);
      }
    }

    // Center hairline
    eCtx.fillStyle = 'rgba(255,255,255,0.16)';
    eCtx.fillRect(0, EQ_CENTER - 0.5, EW, 1);

    // Fill edge accent glow
    if(fillXe > 4){
      const edgeGrad = eCtx.createLinearGradient(fillXe - 8, 0, fillXe + 2, 0);
      edgeGrad.addColorStop(0, 'rgba(255,255,255,0)');
      edgeGrad.addColorStop(1, 'rgba(255,255,255,0.52)');
      eCtx.fillStyle = edgeGrad;
      eCtx.fillRect(fillXe - 8, 0, 10, EH);
    }

    /* ── Edge burst rings on top of EQ ── */
    for(let i = _v3EdgeBursts.length - 1; i >= 0; i--){
      const b = _v3EdgeBursts[i]; b.age++;
      if(b.age < 0) continue;
      if(b.age >= b.max){ _v3EdgeBursts.splice(i, 1); continue; }
      const p = b.age / b.max;
      const a = (1 - p) * b.intensity;
      const r = p * EH * 0.72;
      eCtx.beginPath(); eCtx.arc(b.x, EH / 2, r, 0, Math.PI * 2);
      eCtx.strokeStyle = b.col + (a * 0.9) + ')';
      eCtx.lineWidth = 3.2 * (1 - p * 0.5) + 0.3;
      eCtx.stroke();
      if(r > 6){
        eCtx.beginPath(); eCtx.arc(b.x, EH / 2, r * 0.48, 0, Math.PI * 2);
        eCtx.strokeStyle = b.col + (a * 0.38) + ')';
        eCtx.lineWidth = 1.3;
        eCtx.stroke();
      }
    }

    /* ── Below-bar waveform retired in v3 (EQ lives inside bar on eCtx) ── */

    /* ── Update CTA text / fill UI ── */
    const pct = Math.min(100, Math.round((rawScore / MAX_RAW) * 100));
    _mmUpdateStatus(pct);

    requestAnimationFrame(drawHype);
  })();

  /* ── Unique gifter tracker ── */
  const _milkGiftersSeen = new Set();

  function milkGiftPts(gifterKey, coins, dollars){
    const isNew = gifterKey && !_milkGiftersSeen.has(gifterKey);
    if(gifterKey) _milkGiftersSeen.add(gifterKey);
    const dollarVal = dollars > 0 ? dollars : (coins > 0 ? coins / 100 : 0);
    const sorted = [..._giftRanges].sort((a,b) => b.minD - a.minD);
    for(const tier of sorted){
      if(dollarVal >= tier.minD) return isNew ? tier.isNew : tier.rpt;
    }
    return isNew ? 20 : 3;
  }

  /* ── Ably subscriptions ── */
  ablyChannel.subscribe('milk-event', msg => {
    const d = msg?.data, type = d?.type, plat = d?.platform || 'other';
    if(!type) return;
    trackEvt(type, plat);
    const _who = d.gifterKey || d.username || null;
    switch(type){
      case 'comment': case 'comment_match':
        addPts(PTS[type] ?? 0.5, plat, type, null, _who); break;
      case 'join':
        addPts(PTS.join ?? 1, plat, 'join', null, _who);
        _fireEntryBanner(_currentPct);
        break;
      case 'like': {
        // Score every individual like — silently (no pill)
        addPts(PTS.like ?? 0.1, plat || 'tt', 'like', null, null, /*noNotif=*/true);
        // Per-user pill throttle: show pill every LIKE_PILL_EVERY likes per user
        const _likeKey = _who || '__anon__';
        _likePillCounts[_likeKey] = (_likePillCounts[_likeKey] || 0) + 1;
        if (_likePillCounts[_likeKey] % LIKE_PILL_EVERY === 0) {
          const _notifPlat = (plat === 'yt') ? 'yt' : 'tt';
          const _userHtml  = _who ? `<span class="nt-user">@${_who}</span>&nbsp;` : '';
          _spawnNotif(_notifPlat,
            `${_userHtml}<span class="nt-label">👍 ×${_likePillCounts[_likeKey]}</span>`
          );
        }
        break;
      }
      case 'like_batch':
        addPts(PTS.like_batch, plat, 'like_batch'); break;
      case 'yt_sub':
        addPts(PTS.yt_sub, 'yt', 'yt_sub', '📹 YT sub', _who); fireFirstFlash(); break;
      case 'heart_me':
        addPts(milkGiftPts(d.gifterKey, 1, 0), 'tt', 'heart_me', '💝 Heart Me', _who); break;
      case 'heart_me_first':
        if(d.gifterKey) _milkGiftersSeen.add(d.gifterKey);
        addPts(PTS.heart_me_first, 'tt', 'heart_me', '✨ first Heart Me', _who); fireFirstFlash(); break;
      case 'tiktok_gift': {
        const _gKey = d.giftName ? 'gift_' + d.giftName.toLowerCase().replace(/\s+/g,'_') : null;
        const _gPts = (_gKey && PTS[_gKey] != null) ? PTS[_gKey]
                    : milkGiftPts(d.gifterKey, d.coins || 0, 0);
        if(_instantSaveCoins > 0 && (d.coins||0) >= _instantSaveCoins &&
           typeof splatState !== 'undefined' && splatState === SPLAT_STATE.COUNTDOWN){
          _spawnNotif('tt', `⚡ ${d.giftName||'Gift'} — INSTANT SAVE!`);
          splatEnterSaved();
          setTimeout(()=>{ rawScore=0; _bbFired=false; _bbCooldown=false; _mmUpdateStatus(0); }, 600);
          break;
        }
        addPts(_gPts, 'tt', 'heart_me', `🎁 ${d.giftName||'gift'}`, _who);
        if(typeof fireGiftAnim === 'function') fireGiftAnim({
          name: _who || 'Anonymous', amount: d.coins || 0,
          type: 'tiktok_coins', platform: 'tiktok',
          giftTitle: d.giftName || '', giftLabel: d.giftName || '',
          contentImg: d.contentImg || null,
        });
        break;
      }
      case 'yt_superchat': {
        const _sPts = milkGiftPts(d.gifterKey, 0, d.dollars||0);
        if(_instantSaveDollars > 0 && (d.dollars||0) >= _instantSaveDollars &&
           typeof splatState !== 'undefined' && splatState === SPLAT_STATE.COUNTDOWN){
          _spawnNotif('yt', `⚡ $${d.dollars} Super Chat — INSTANT SAVE!`);
          splatEnterSaved();
          setTimeout(()=>{ rawScore=0; _bbFired=false; _bbCooldown=false; _mmUpdateStatus(0); }, 600);
          break;
        }
        addPts(_sPts, 'yt', 'heart_me', `💛 Super Chat $${d.dollars||0}`, _who);
        if(typeof fireGiftAnim === 'function') fireGiftAnim({
          name: _who || 'Anonymous', amount: d.dollars || 0,
          type: 'youtube_superchat', platform: 'youtube',
          giftTitle: 'Super Chat', giftLabel: `$${d.dollars || 0}`,
        });
        break;
      }
    }
  });

  // Manual boost from dock
  ablyChannel.subscribe('milk-boost', msg => {
    const d = msg?.data;
    if(!d) return;
    if(d.durSec === 0 || (d.mult != null && d.mult <= 1)){ _endBoost(false); return; }
    const type  = d.type  || 'comments';
    const mult  = Math.max(2, Math.min(10, d.mult  || 2));
    const durMs = Math.max(10, Math.min(120, d.durSec || 30)) * 1000;
    const cta   = d.cta   || (type === 'likes' ? 'LIKES & FOLLOWS' : type === 'gifts' ? 'GIFTS & SUBS' : 'COMMENTS & JOINS');
    const icon  = type === 'likes' ? '👍' : type === 'gifts' ? '🎁' : '💬';
    _triggerBoost(type, mult, durMs, cta, icon);
  });

  // Smart mode from dock
  ablyChannel.subscribe('milk-smart', msg => {
    const mode = msg?.data?.mode;
    if(!mode) return;
    _smartMode = mode;
    if(mode === 'auto' || mode === 'both') _scheduleAutoBoost();
  });

  ablyChannel.subscribe('milk-intensity', msg => {
    _intensityMult = Math.max(0, Math.min(3, msg.data?.mult ?? 1));
  });

  ablyChannel.subscribe('gift-bar-pos', msg => {
    const top = msg.data?.top;
    if(typeof top !== 'number') return;
    // #gift-bar itself
    const gb = document.getElementById('gift-bar');
    if(gb) gb.style.top = top + 'px';
    // #bar-lines — absolute sibling at same top
    const bl = document.getElementById('bar-lines');
    if(bl) bl.style.top = top + 'px';
    // #ep-passive — absolute sibling inside .ep-root at same top
    const ep = document.getElementById('ep-passive');
    if(ep) ep.style.top = top + 'px';
    // #ep-card — positioned bottom-up, sits 8px above bar top
    const ec = document.getElementById('ep-card');
    if(ec) ec.style.bottom = (1928 - top) + 'px';
  });

  ablyChannel.subscribe('mission-strip-config', msg => {
    const d = msg?.data;
    if(!d) return;
    const strip = document.getElementById('mission-strip');
    const txt   = document.getElementById('mission-strip-text');
    if(strip && typeof d.top === 'number') strip.style.top = d.top + 'px';
    if(txt   && typeof d.text === 'string' && d.text.trim()) txt.textContent = d.text;
  });

  ablyChannel.subscribe('milk-cta', msg => {
    const text = msg.data?.text || '';
    const el = document.getElementById('bb-cta-text');
    if(el) el.textContent = text || 'to Bean Boozled';
  });

  // Dock controls bait text + visibility
  ablyChannel.subscribe('milk-cta-config', msg => {
    const d = msg?.data;
    if(!d) return;
    if(d.baitText !== undefined) _mmBaitText = d.baitText || 'MILK METER 🫟';
    if(d.goalText !== undefined) _mmGoalText = d.goalText || 'LETS GOOO!!';
    if(d.forceVisible !== undefined) _mmForceVisible = !!d.forceVisible;
    if(d.visible    !== undefined) _mmGoalVisible  = !!d.visible;
    _mmUpdateStatus(Math.round((rawScore / MAX_RAW) * 100));
  });

  // Live scoring config
  ablyChannel.subscribe('milk-scoring-config', msg => {
    const d = msg?.data;
    if(!d) return;
    if(d.pts && typeof d.pts === 'object') Object.assign(PTS, d.pts);
    if(Array.isArray(d.ranges) && d.ranges.length && d.ranges[0]?.minD != null){
      _giftRanges = d.ranges.map(r => ({
        minD:  Number(r.minD)  || 0,
        maxD:  Number(r.maxD)  || 9999,
        rpt:   Number(r.rpt)   || 0,
        isNew: Number(r.isNew) || 0,
      }));
    }
    if(d.target != null && Number(d.target) > 0) MAX_RAW = Number(d.target);
    if(d.likeBatchSize != null && Number(d.likeBatchSize) >= 1){
      LIKE_BATCH_SIZE = Math.round(Number(d.likeBatchSize));
      _likeAccum = 0;
    }
    if(Array.isArray(d.cmds)) _milkCmds = d.cmds.filter(c => c.phrase?.trim());
    if(Array.isArray(d.specific)){
      d.specific.forEach(sg => {
        if(sg.name && sg.pts != null)
          PTS['gift_' + sg.name.toLowerCase().replace(/\s+/g,'_')] = Number(sg.pts);
      });
    }
    if(d.instantSaveCoins   != null) _instantSaveCoins   = Number(d.instantSaveCoins)   || 0;
    if(d.instantSaveDollars != null) _instantSaveDollars = Number(d.instantSaveDollars) || 0;
  });

  ablyChannel.subscribe('bb-reset', () => {
    rawScore    = 0;
    _bbFired    = false;
    _bbCooldown = false;
    _bbBan.classList.remove('bb-active');
  });

  // Reset milk on each rescue countdown
  window._milkResetForRescue = function(){
    rawScore    = 0;
    _bbFired    = false;
    _bbCooldown = false;
    _mmUpdateStatus(0);
  };

  // Show CTA on load — deferred so browser finishes parsing #mission-strip
  // (div lives after the script tag; setTimeout(0) lets DOM catch up)
  setTimeout(() => _mmUpdateStatus(0), 0);

})();
</script>


<div id="mission-strip">
  <span id="mission-strip-text">🫟 MILK METER — comment, join, or gift to fill it!</span>
  <span id="mission-strip-pct">0%</span>
</div>

<div id="entry-banner">
  <div id="entry-banner-inner">
    <span id="entry-banner-text">👋 Chat just hit 0% — jump in!</span>
  </div>
</div>

</body>
