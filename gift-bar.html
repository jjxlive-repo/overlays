<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, height=1920, initial-scale=1.0">
<title>Gift Bar + Splat Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Bebas+Neue&family=Boogaloo&family=DM+Sans:wght@700&display=swap" rel="stylesheet">
<script src="https://cdn.ably.com/lib/ably.min-2.js"></script>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 1080px; height: 1920px; overflow: hidden; background: transparent; }

/* ─── PARTICLE CANVAS (gift-bar gifts) ─── */
#particle-canvas {
  position: absolute; top: 0; left: 0;
  width: 1080px; height: 1920px;
  pointer-events: none; z-index: 50;
}

/* ─── SCREEN PULSE ─── */
#screen-pulse {
  position: absolute; inset: 0;
  pointer-events: none; z-index: 8;
  opacity: 0; transition: opacity 0.35s ease;
}

/* ══ GIFT BAR EDGE LINES ══ */
#bar-lines {
  position: absolute; top: 450px; left: 0;
  width: 1080px; height: 55px; pointer-events: none; z-index: 12;
}
#line-top, #line-bot {
  position: absolute; left: 0; right: 0; height: 1px;
  background: linear-gradient(to right, transparent 0%, transparent 30%,
    rgba(192,132,252,0.15) 55%, rgba(192,132,252,0.45) 80%, rgba(192,132,252,0.65) 100%);
  transition: background 0.9s ease, box-shadow 0.8s ease;
}
#line-top { top: 0; }
#line-bot { bottom: 0; }
#bar-lines.active #line-top,
#bar-lines.active #line-bot { animation: lineActivate 0.35s ease forwards; }
@keyframes lineActivate { from{opacity:0.10} to{opacity:1.00} }
#line-sweep-top, #line-sweep-bot {
  position: absolute; left: 0; right: 0; height: 1px; opacity: 0; pointer-events: none;
  background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.0) 30%,
    rgba(255,255,255,1.0) 50%, rgba(255,255,255,0.0) 70%, transparent 100%);
  background-size: 40% 100%;
}
#line-sweep-top { top: 0; }
#line-sweep-bot { bottom: 0; }
#bar-lines.active #line-sweep-top,
#bar-lines.active #line-sweep-bot { animation: lineSweep 1.1s ease-in-out var(--sweep-count, 2) forwards; }
@keyframes lineSweep {
  0%{background-position:-40% 0;opacity:0} 10%{opacity:1}
  90%{opacity:0.6} 100%{background-position:140% 0;opacity:0}
}
#line-sweep-bot { animation-delay: 0.08s; }

/* ══ GIFT BAR ══ */
#gift-bar {
  position: absolute; top: 450px; left: 0;
  width: 1080px; height: 55px; overflow: visible;
  opacity: 0; transition: opacity 0.6s ease; z-index: 10;
}
#gift-bar.visible { opacity: 1; }
#gift-bar.ep-passive-active { opacity: 1; }
#gift-bar.ep-passive-active #bar-bg {
  background: linear-gradient(to right, transparent 0%, rgba(20,4,40,0.12) 18%,
    rgba(20,4,40,0.44) 42%, rgba(59,7,100,0.74) 64%, rgba(10,10,28,0.82) 100%);
}
#gift-bar.ep-passive-active #bar-info,
#gift-bar.ep-passive-active #bar-hero { opacity: 0; }
#gift-bar.ep-passive-active #bar-border::before,
#gift-bar.ep-passive-active #bar-border::after {
  background: linear-gradient(to right,
    transparent 0%, transparent 18%,
    rgba(192,132,252,0.18) 36%,
    rgba(232,121,249,0.58) 68%,
    rgba(192,132,252,0.82) 100%);
}
#bar-bg-layer { position: absolute; inset: 0; overflow: hidden; }
#bar-bg {
  position: absolute; inset: 0;
  background: linear-gradient(to right, transparent 0%, rgba(5,0,14,0.03) 18%,
    rgba(5,0,14,0.26) 44%, rgba(5,0,14,0.68) 65%, rgba(5,0,14,0.76) 76%, rgba(5,0,14,0.76) 100%);
  transition: background 0.52s cubic-bezier(.34,1.56,.64,1);
}
#gift-bar.alert-active #bar-bg { background: rgba(5,0,14,0.76); }
#bar-wash { position: absolute; inset: 0; transition: background 0.9s ease; pointer-events: none; }
#bar-shimmer-flare {
  position: absolute; inset: 0; pointer-events: none; display: none;
}
@keyframes barFlareSweep {
  0%{background-position:-260% 0;opacity:0} 8%{opacity:1}
  50%{background-position:260% 0;opacity:0} 100%{background-position:260% 0;opacity:0}
}
/* Gradient border lines — transparent on left, opaque on right, matching bg */
#bar-border { --bc: 192,132,252; position: absolute; inset: 0; pointer-events: none; }
#bar-border::before,
#bar-border::after {
  content: '';
  position: absolute; left: 0; right: 0; height: 1px;
  background: linear-gradient(to right,
    transparent 0%, transparent 20%,
    rgba(var(--bc),0.12) 38%,
    rgba(var(--bc),0.50) 65%,
    rgba(var(--bc),0.82) 100%);
  transition: background 0.9s ease;
}
#bar-border::before { top: 0; }
#bar-border::after  { bottom: 0; }
#bar-progress {
  position: absolute; bottom: 0; left: 0;
  height: 2px; width: 0%; border-radius: 0 1px 1px 0; transition: background 0.9s ease;
}
#bar-hero {
  position: absolute; left: 0; top: 0; width: 720px; height: 55px; overflow: visible;
  display: flex; align-items: center; gap: 18px; padding: 0 20px 0 18px;
  opacity: 0; transform: translateX(-22px); pointer-events: none;
  transition: opacity 0.36s ease 0.08s, transform 0.46s cubic-bezier(.34,1.56,.64,1) 0.06s;
}
#gift-bar.alert-active #bar-hero { opacity: 1; transform: translateX(0); }
#bar-hero-name {
  font-family: 'Anton', sans-serif; font-size: 90px; line-height: 1;
  text-transform: uppercase; color: #fff; letter-spacing: 1px; white-space: nowrap;
  overflow: visible; flex-shrink: 1; min-width: 0;
  text-shadow: 0 3px 18px rgba(0,0,0,0.95), 0 0 40px rgba(255,255,255,0.06);
}
#bar-hero-amount {
  font-family: 'Bebas Neue', sans-serif; font-size: 58px; letter-spacing: 4px;
  white-space: nowrap; flex-shrink: 0; overflow: visible;
}
/* ══ GIFT BAR INFO (rotating carousel slot) ══ */
#bar-info {
  position: absolute; right: 0; top: 0; width: auto; min-width: 260px; height: 55px; overflow: hidden;
  background: rgba(5,0,14,0.76); border-left: 1px solid rgba(255,255,255,0.06);
  display: flex; flex-direction: column; justify-content: center; align-items: flex-end;
  padding: 9px 14px 2px 14px; gap: 1px; transition: opacity 0.28s ease;
}
#bar-info-top { display: flex; align-items: center; gap: 7px; }
#bar-slot-title {
  font-family: 'DM Sans', sans-serif; font-size: 10px; font-weight: 700;
  letter-spacing: 0.14em; text-transform: uppercase; color: rgba(255,255,255,0.55); white-space: nowrap;
}
#bar-info-bot { display: flex; align-items: baseline; gap: 9px; }
#bar-info-name {
  font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 2px; color: #fff;
  white-space: nowrap; flex-shrink: 0; text-shadow: 0 2px 8px rgba(0,0,0,0.9);
}
#bar-info-amount {
  font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 2px;
  white-space: nowrap; flex-shrink: 0; transition: color 0.6s ease;
  text-shadow: -1px -1px 0 rgba(0,0,0,0.95), 1px -1px 0 rgba(0,0,0,0.95),
               -1px 1px 0 rgba(0,0,0,0.95), 1px 1px 0 rgba(0,0,0,0.95);
}
#bar-info-amount.monthly-shimmer { background: rgba(192,132,252,0.14); animation: monthlyGlow 1.4s ease-in-out infinite; }
@keyframes monthlyGlow {
  0%,100%{box-shadow:0 0 6px rgba(192,132,252,0.25)} 50%{box-shadow:0 0 22px rgba(232,121,249,0.70),0 0 40px rgba(168,85,247,0.35)}
}
#bar-plat-badge {
  font-family: 'DM Sans', sans-serif; font-size: 9px; font-weight: 700;
  letter-spacing: 0.10em; text-transform: uppercase; padding: 2px 6px; border-radius: 4px; white-space: nowrap; flex-shrink: 0;
}
.plat-tiktok  { color:#69C9D0;background:rgba(105,201,208,0.16);border:1px solid rgba(105,201,208,0.30); }
.plat-youtube { color:#FF6B6B;background:rgba(255,80,80,0.16);  border:1px solid rgba(255,80,80,0.30);   }
.plat-direct, .plat-default { color:#C084FC;background:rgba(192,132,252,0.16);border:1px solid rgba(192,132,252,0.30); }

/* ══ GIFT BATTLE BAR — FIGHT NIGHT REDESIGN ══ */
#gift-battle-bar {
  position: absolute; inset: 0; z-index: 2; display: none; overflow: hidden;
  /* subtle inner glow on the whole bar */
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.08), inset 0 -1px 0 rgba(0,0,0,0.6);
}
#gift-battle-bar.active { display: block; }

/* ── YT fill: YouTube red, rich and deep, left → right ── */
#gbb-yt-fill {
  position: absolute; left: 0; top: 0; bottom: 0; width: 50%;
  background: linear-gradient(to right,
    #3d0000 0%,
    #8b0000 30%,
    #cc1010 65%,
    #e62020 100%);
  transition: width 1.2s cubic-bezier(.22,1,.36,1);
  overflow: hidden;
}
/* inner gloss strip — fight-night sheen on YT side */
#gbb-yt-fill::after {
  content: '';
  position: absolute; left: 0; right: 0; top: 0; height: 45%;
  background: linear-gradient(to bottom, rgba(255,255,255,0.07) 0%, transparent 100%);
  pointer-events: none;
}
/* ── TT fill: charcoal, right → left ── */
#gbb-tt-fill {
  position: absolute; right: 0; top: 0; bottom: 0; width: 50%;
  background: linear-gradient(to left,
    #0a0a0a 0%,
    #222222 35%,
    #383838 70%,
    #444444 100%);
  transition: width 1.2s cubic-bezier(.22,1,.36,1);
  overflow: hidden;
}
#gbb-tt-fill::after {
  content: '';
  position: absolute; left: 0; right: 0; top: 0; height: 45%;
  background: linear-gradient(to bottom, rgba(255,255,255,0.05) 0%, transparent 100%);
  pointer-events: none;
}

/* ── Platform identity logos — left/right anchored inside fills ── */
/* YT play-button SVG badge */
#gbb-yt-logo {
  position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
  display: flex; align-items: center; gap: 6px;
  pointer-events: none; z-index: 3; overflow: hidden;
}
#gbb-yt-logo svg { width: 22px; height: 16px; flex-shrink: 0; }
#gbb-yt-logo-text {
  font-family: 'Anton', sans-serif; font-size: 13px; letter-spacing: 2.5px;
  color: rgba(255,255,255,0.90); text-transform: uppercase; white-space: nowrap;
  text-shadow: 0 1px 6px rgba(0,0,0,0.8);
}
/* TT music-note badge */
#gbb-tt-logo {
  position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
  display: flex; align-items: center; gap: 6px; flex-direction: row-reverse;
  pointer-events: none; z-index: 3; overflow: hidden;
}
#gbb-tt-logo svg { width: 18px; height: 20px; flex-shrink: 0; }
#gbb-tt-logo-text {
  font-family: 'Anton', sans-serif; font-size: 13px; letter-spacing: 2.5px;
  color: rgba(255,255,255,0.90); text-transform: uppercase; white-space: nowrap;
  text-shadow: 0 1px 6px rgba(0,0,0,0.8);
}

/* ── Divider — the signature element: a hot white saber line with red glow ── */
#gbb-divider {
  position: absolute;
  /* starts at 50%; JS can override via left: calc(ytPct%) if desired */
  left: 50%; top: -4px; bottom: -4px;
  width: 3px;
  transform: translateX(-50%);
  background: #ffffff;
  box-shadow:
    0 0  6px 2px rgba(255,255,255,0.95),
    0 0 16px 4px rgba(255,60,60,0.75),
    0 0 36px 8px rgba(200,0,0,0.45);
  z-index: 5; pointer-events: none;
  transition: left 1.2s cubic-bezier(.22,1,.36,1);
  animation: gbbDividerBreath 2.4s ease-in-out infinite;
}
@keyframes gbbDividerBreath {
  0%,100% { box-shadow: 0 0 6px 2px rgba(255,255,255,0.95), 0 0 16px 4px rgba(255,60,60,0.75), 0 0 36px 8px rgba(200,0,0,0.40); }
  50%      { box-shadow: 0 0 8px 3px rgba(255,255,255,1.0),  0 0 24px 6px rgba(255,60,60,0.90), 0 0 52px 14px rgba(200,0,0,0.55); }
}
/* Surge flash when a gift tips the balance */
#gbb-divider.surge {
  animation: gbbDividerSurge 0.45s ease-out forwards, gbbDividerBreath 2.4s ease-in-out 0.5s infinite;
}
@keyframes gbbDividerSurge {
  0%  { box-shadow: 0 0 6px 2px #fff, 0 0 16px 4px rgba(255,60,60,0.75), 0 0 36px 8px rgba(200,0,0,0.4); }
  30% { box-shadow: 0 0 18px 8px #fff, 0 0 50px 18px rgba(255,80,80,1.0), 0 0 90px 28px rgba(200,0,0,0.7); width: 5px; }
  100%{ box-shadow: 0 0 6px 2px #fff, 0 0 16px 4px rgba(255,60,60,0.75), 0 0 36px 8px rgba(200,0,0,0.4); width: 3px; }
}

/* ── VS text at center, always on top ── */
#gbb-vs {
  position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%);
  font-family: 'Anton', sans-serif; font-size: 11px; letter-spacing: 3px;
  color: #fff; text-transform: uppercase;
  background: rgba(0,0,0,0.72); border: 1px solid rgba(255,255,255,0.15);
  padding: 1px 7px 1px 8px; border-radius: 3px;
  box-shadow: 0 0 14px rgba(0,0,0,0.9);
  z-index: 6; pointer-events: none; white-space: nowrap;
}

/* ── Percentage labels floating just inside each fill near the divider ── */
#gbb-yt-pct {
  position: absolute; right: calc(50% + 14px); top: 50%; transform: translateY(-50%);
  font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 1px;
  color: rgba(255,255,255,0.92); white-space: nowrap;
  text-shadow: 0 1px 8px rgba(0,0,0,0.95), 0 0 20px rgba(230,32,32,0.6);
  z-index: 4; pointer-events: none;
  transition: right 1.2s cubic-bezier(.22,1,.36,1);
}
#gbb-tt-pct {
  position: absolute; left: calc(50% + 14px); top: 50%; transform: translateY(-50%);
  font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 1px;
  color: rgba(255,255,255,0.92); white-space: nowrap;
  text-shadow: 0 1px 8px rgba(0,0,0,0.95), 0 0 20px rgba(255,255,255,0.25);
  z-index: 4; pointer-events: none;
  transition: left 1.2s cubic-bezier(.22,1,.36,1);
}

/* ── Content zone (keeps layout stable; timer moved to shelf) ── */
#gbb-content {
  position: absolute; left: 0; top: 0; bottom: 0; right: 265px; z-index: 3;
  pointer-events: none;
}
#gbb-mid {
  position: absolute; left: 50%; top: 0; bottom: 0;
  width: 120px; transform: translateX(-50%);
  display: flex; align-items: center; justify-content: center;
  pointer-events: none;
}
#gbb-mid::before, #gbb-mid::after { display: none; }

/* hide old dollar-amount spans — replaced by pct labels */
#gbb-yt-info, #gbb-tt-info { display: none; }
.gbb-plat-lbl { display: none; }
#gbb-yt-amt, #gbb-tt-amt { display: none; }

/* ── LIVE dot — stays inside the bar at center ── */
#gbb-timer-val {
  font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 700;
  letter-spacing: 0.22em; text-transform: uppercase;
  color: #ff6b6b; white-space: nowrap;
  background: rgba(0,0,0,0.50); padding: 2px 9px;
  border-radius: 20px; border: 1px solid rgba(255,80,80,0.18);
  transition: opacity 0.3s ease;
  animation: gbbLivePulse 1.8s ease-in-out infinite;
}
/* hide the in-bar chip when the shelf is active */
#gift-battle-bar.gbb-shelf-active #gbb-timer-val { opacity: 0; pointer-events: none; }
@keyframes gbbLivePulse { 0%,100%{opacity:1} 50%{opacity:0.32} }

/* ── TIMER SHELF — floats above the bar, drops into view for countdowns ── */
#gbb-timer-shelf {
  /* bar sits at top:450px; shelf is 28px tall, sits 4px above bar */
  position: absolute;
  left: 50%; top: 418px;
  transform: translateX(-50%) translateY(-6px);
  z-index: 15;
  pointer-events: none;

  /* collapsed/hidden by default */
  opacity: 0;
  transition: opacity 0.32s ease, transform 0.38s cubic-bezier(.34,1.4,.64,1);
}
#gbb-timer-shelf.visible {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* pill shape */
#gbb-shelf-pill {
  display: flex; align-items: center; gap: 8px;
  padding: 4px 14px 4px 12px;
  border-radius: 20px;
  background: rgba(6,0,10,0.88);
  border: 1px solid rgba(255,255,255,0.12);
  box-shadow:
    0 2px 16px rgba(0,0,0,0.75),
    0 0 0 1px rgba(255,255,255,0.04) inset;
  white-space: nowrap;
}
/* small clock icon dot */
#gbb-shelf-icon {
  width: 7px; height: 7px; border-radius: 50%;
  background: #ff4444;
  box-shadow: 0 0 6px 2px rgba(255,40,40,0.6);
  flex-shrink: 0;
  animation: gbbShelfDot 1.2s ease-in-out infinite;
}
@keyframes gbbShelfDot { 0%,100%{opacity:1} 50%{opacity:0.3} }

#gbb-shelf-val {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 20px; letter-spacing: 2px;
  color: #ffffff;
  text-shadow: 0 1px 6px rgba(0,0,0,0.9);
  transition: color 0.3s ease;
}
#gbb-shelf-val.gbb-warn  { color: #fbbf24; }
#gbb-shelf-val.gbb-danger{ color: #ef4444; animation: gbbShelfDanger 0.5s ease-in-out infinite; }
#gbb-shelf-val.gbb-ended { color: #fbbf24; font-size: 16px; letter-spacing: 1.5px; }
@keyframes gbbShelfDanger { 0%,100%{transform:scale(1)} 50%{transform:scale(1.10)} }

#gbb-shelf-label {
  font-family: 'DM Sans', sans-serif; font-size: 9px; font-weight: 700;
  letter-spacing: 0.22em; text-transform: uppercase;
  color: rgba(255,255,255,0.38);
}

/* danger state: pill border pulses red */
#gbb-timer-shelf.shelf-danger #gbb-shelf-pill {
  border-color: rgba(239,68,68,0.35);
  animation: gbbShelfPillDanger 0.5s ease-in-out infinite;
}
@keyframes gbbShelfPillDanger {
  0%,100%{box-shadow:0 2px 16px rgba(0,0,0,0.75),0 0 0 1px rgba(255,255,255,0.04) inset}
  50%    {box-shadow:0 2px 24px rgba(239,68,68,0.5),0 0 14px rgba(239,68,68,0.3),0 0 0 1px rgba(239,68,68,0.2) inset}
}
/* warn state: subtle amber glow */
#gbb-timer-shelf.shelf-warn #gbb-shelf-pill {
  border-color: rgba(251,191,36,0.25);
}

/* ── Shimmer for progress goal ── */
#gbb-goal-shimmer {
  position: absolute; inset: 0; pointer-events: none; opacity: 0; z-index: 7;
  background: linear-gradient(115deg, transparent 20%, rgba(255,255,255,0.22) 50%, transparent 80%);
  background-size: 200% 100%;
}
#gbb-goal-shimmer.active { opacity: 1; animation: gbbShimmer 1.0s ease-in-out infinite; }
@keyframes gbbShimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }

/* hide old watermark text (replaced by logo badges) */
.gbb-fill-wm { display: none; }

/* ── Center goal line (progress mode) ── */
#gbb-goal-line {
  position: absolute; left: 50%; top: 0; bottom: 0;
  width: 2px; transform: translateX(-50%);
  background: rgba(255,255,255,0.30);
  box-shadow: 0 0 8px rgba(255,255,255,0.55), 0 0 3px rgba(255,255,255,0.90);
  z-index: 2; pointer-events: none; display: none;
}
#gift-battle-bar.gbb-mode-progress #gbb-goal-line { display: block; }
#gift-battle-bar.gbb-mode-progress #gbb-timer-val {
  font-size: 11px; letter-spacing: 0.14em;
  background: rgba(0,0,0,0.52); color: rgba(255,255,255,0.85);
}

/* ── Battle-start announce ── */
#gbb-announce {
  position: absolute; inset: 0; z-index: 10; pointer-events: none;
  display: flex; align-items: center; justify-content: center; gap: 14px;
  opacity: 0;
}
#gbb-announce.show { animation: gbbAnnounceAnim 3.5s ease forwards; }
@keyframes gbbAnnounceAnim { 0%{opacity:0} 12%{opacity:1} 75%{opacity:1} 100%{opacity:0} }
.gbb-ann-logo {
  font-family: 'Anton', sans-serif; font-size: 13px; letter-spacing: 3px;
  text-transform: uppercase; padding: 2px 9px; border-radius: 3px; white-space: nowrap;
}
.gbb-ann-yt { color:#ff5555; background:rgba(220,0,0,0.20); border:1px solid rgba(255,50,50,0.45); }
.gbb-ann-tt { color:#e0e0e0; background:rgba(80,80,80,0.22); border:1px solid rgba(180,180,180,0.35); }
#gbb-ann-text {
  font-family: 'Anton', sans-serif; font-size: 14px; letter-spacing: 4px;
  color: #fff; text-shadow: 0 2px 12px rgba(0,0,0,0.95); text-transform: uppercase;
}

/* ── Gift pop layer ── */
#gbb-pop-layer {
  position: absolute; inset: 0; pointer-events: none; z-index: 8; overflow: hidden;
}
.gbb-pop-name {
  position: absolute; top: 50%; left: 50%;
  font-family: 'Anton', sans-serif; letter-spacing: 2px; color: #fff; white-space: nowrap;
  pointer-events: none; text-shadow: 0 2px 12px rgba(0,0,0,0.98);
  transform-origin: center center;
}
.gbb-pop-sm { font-size: 18px; }
.gbb-pop-md { font-size: 26px; }
.gbb-pop-lg { font-size: 34px; }
.gbb-pop-yt { color: #ff7070; animation: gbbPopYT 1.6s cubic-bezier(.34,1.56,.64,1) forwards; }
.gbb-pop-tt { color: #d0d0d0; animation: gbbPopTT 1.6s cubic-bezier(.34,1.56,.64,1) forwards; }
@keyframes gbbPopYT {
  0%   { opacity:0; transform:translate(-50%,-50%) scale(0.4); }
  25%  { opacity:1; transform:translate(-50%,-50%) scale(1.08); }
  65%  { opacity:1; transform:translate(-110%,-50%) scale(0.92); }
  100% { opacity:0; transform:translate(-155%,-50%) scale(0.72); }
}
@keyframes gbbPopTT {
  0%   { opacity:0; transform:translate(-50%,-50%) scale(0.4); }
  25%  { opacity:1; transform:translate(-50%,-50%) scale(1.08); }
  65%  { opacity:1; transform:translate(20%,-50%) scale(0.92); }
  100% { opacity:0; transform:translate(65%,-50%) scale(0.72); }
}
.gbb-pop-flash {
  position: absolute; bottom: 3px; left: 50%; transform: translateX(-50%);
  font-family: 'DM Sans', sans-serif; font-size: 9px; font-weight: 700;
  letter-spacing: 0.14em; text-transform: uppercase; color: rgba(255,255,255,0.80);
  white-space: nowrap; pointer-events: none;
  animation: gbbFlashFade 1.8s ease forwards;
}
@keyframes gbbFlashFade { 0%,12%{opacity:0} 22%,78%{opacity:1} 100%{opacity:0} }

/* ══ PROGRESS MODE — unified left-to-right fill ══ */

/* Hide battle-mode fills and VS chip in progress mode */
#gift-battle-bar.gbb-mode-progress #gbb-yt-fill,
#gift-battle-bar.gbb-mode-progress #gbb-tt-fill,
#gift-battle-bar.gbb-mode-progress #gbb-vs,
#gift-battle-bar.gbb-mode-progress #gbb-yt-pct,
#gift-battle-bar.gbb-mode-progress #gbb-tt-pct,
#gift-battle-bar.gbb-mode-progress #gbb-divider { display: none; }

/* Ghost track — the empty portion of the bar */
#gbb-prog-track {
  display: none;
  position: absolute; inset: 0;
  background: #111111;
  z-index: 1;
}
#gift-battle-bar.gbb-mode-progress #gbb-prog-track { display: block; }

/* Unified fill container — grows left to right */
#gbb-prog-fill {
  display: none;
  position: absolute; left: 0; top: 0; bottom: 0; width: 0%;
  z-index: 2; overflow: hidden;
  transition: width 1.3s cubic-bezier(.22,1,.36,1);
}
#gift-battle-bar.gbb-mode-progress #gbb-prog-fill { display: block; }

/* YT segment — sits at the left of the fill, width = ytPct of total fill */
#gbb-prog-yt-seg {
  position: absolute; left: 0; top: 0; bottom: 0; width: 50%;
  background: linear-gradient(to right, #3d0000, #8b0000, #cc1010, #e62020);
  transition: width 1.3s cubic-bezier(.22,1,.36,1);
}
#gbb-prog-yt-seg::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(to bottom, rgba(255,255,255,0.07) 0%, transparent 50%);
}

/* TT segment — sits immediately after YT, fills the rest of the fill */
#gbb-prog-tt-seg {
  position: absolute; right: 0; top: 0; bottom: 0; width: 50%;
  background: linear-gradient(to right, #2a2a2a, #3c3c3c, #464646);
  transition: width 1.3s cubic-bezier(.22,1,.36,1);
}
#gbb-prog-tt-seg::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(to bottom, rgba(255,255,255,0.05) 0%, transparent 50%);
}

/* Leading edge glow — the fill frontier, always at the right edge of #gbb-prog-fill */
#gbb-prog-edge {
  display: none;
  position: absolute; right: -2px; top: -4px; bottom: -4px; width: 3px;
  background: #ffffff;
  box-shadow:
    0 0 6px 2px rgba(255,255,255,0.95),
    0 0 18px 5px rgba(255,180,0,0.70),
    0 0 40px 10px rgba(220,120,0,0.45);
  z-index: 4; pointer-events: none;
  animation: gbbEdgeBreath 2.2s ease-in-out infinite;
}
#gift-battle-bar.gbb-mode-progress #gbb-prog-edge { display: block; }
@keyframes gbbEdgeBreath {
  0%,100% { box-shadow: 0 0 6px 2px rgba(255,255,255,0.95), 0 0 18px 5px rgba(255,180,0,0.65), 0 0 40px 10px rgba(220,120,0,0.40); }
  50%      { box-shadow: 0 0 9px 3px rgba(255,255,255,1.0),  0 0 28px 8px rgba(255,200,0,0.85), 0 0 60px 16px rgba(220,140,0,0.55); }
}
#gbb-prog-edge.surge {
  animation: gbbEdgeSurge 0.5s ease-out forwards, gbbEdgeBreath 2.2s ease-in-out 0.55s infinite;
}
@keyframes gbbEdgeSurge {
  0%  { box-shadow: 0 0 6px 2px #fff, 0 0 18px 5px rgba(255,180,0,0.7), 0 0 40px 10px rgba(220,120,0,0.4); }
  30% { box-shadow: 0 0 20px 9px #fff, 0 0 55px 20px rgba(255,220,0,1.0), 0 0 100px 30px rgba(220,160,0,0.7); width: 5px; }
  100%{ box-shadow: 0 0 6px 2px #fff, 0 0 18px 5px rgba(255,180,0,0.7), 0 0 40px 10px rgba(220,120,0,0.4); width: 3px; }
}

/* Contribution mini-pills — YT and TT share labels left of center */
#gbb-prog-contrib {
  display: none;
  position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
  z-index: 5; pointer-events: none;
  display: flex; align-items: center; gap: 6px;
}
#gift-battle-bar.gbb-mode-progress #gbb-prog-contrib { display: flex; }
.gbb-contrib-pill {
  display: flex; align-items: center; gap: 4px;
  background: rgba(0,0,0,0.55); border-radius: 10px;
  padding: 2px 7px 2px 5px;
  border: 1px solid rgba(255,255,255,0.08);
}
.gbb-contrib-dot {
  width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
}
.gbb-contrib-dot.yt { background: #e62020; box-shadow: 0 0 5px rgba(230,32,32,0.7); }
.gbb-contrib-dot.tt { background: #555555; box-shadow: 0 0 5px rgba(120,120,120,0.5); }
.gbb-contrib-pct {
  font-family: 'DM Sans', sans-serif; font-size: 10px; font-weight: 700;
  letter-spacing: 0.08em; color: rgba(255,255,255,0.80); white-space: nowrap;
}

/* Prize label — right-anchored, always visible, is the goal destination */
#gbb-prog-prize {
  display: none;
  position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
  z-index: 5; pointer-events: none;
  max-width: 380px; overflow: hidden;
  display: flex; align-items: center; gap: 8px;
}
#gift-battle-bar.gbb-mode-progress #gbb-prog-prize { display: flex; }
#gbb-prog-prize-icon {
  font-size: 18px; flex-shrink: 0; line-height: 1;
  filter: drop-shadow(0 0 8px rgba(255,200,0,0.6));
}
#gbb-prog-prize-text {
  font-family: 'Anton', sans-serif; font-size: 17px; letter-spacing: 2px;
  text-transform: uppercase; color: rgba(255,255,255,0.90); white-space: nowrap;
  text-shadow: 0 1px 8px rgba(0,0,0,0.95), 0 0 18px rgba(255,180,0,0.25);
  overflow: hidden; text-overflow: ellipsis;
}

/* ── GOAL HIT — DARE UNLOCKED sequence ── */
/* Full-bar flash overlay */
#gbb-prog-flash {
  display: none;
  position: absolute; inset: -4px; z-index: 20; pointer-events: none;
  background: #ffffff; opacity: 0; border-radius: 0;
}
#gift-battle-bar.gbb-mode-progress #gbb-prog-flash { display: block; }
#gbb-prog-flash.fire { animation: gbbFlashBlast 0.55s ease-out forwards; }
@keyframes gbbFlashBlast {
  0%   { opacity: 0; }
  18%  { opacity: 1; }
  100% { opacity: 0; }
}

/* Gold fill state when goal hit */
#gift-battle-bar.gbb-goal-hit #gbb-prog-fill {
  background: linear-gradient(to right, #78350f, #d97706, #fbbf24, #fde68a) !important;
  transition: background 0.4s ease;
}
#gift-battle-bar.gbb-goal-hit #gbb-prog-yt-seg,
#gift-battle-bar.gbb-goal-hit #gbb-prog-tt-seg { display: none; }

/* DARE UNLOCKED stamp — slams into center */
#gbb-prog-unlock {
  display: none;
  position: absolute; inset: 0; z-index: 18; pointer-events: none;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1px;
  opacity: 0;
}
#gift-battle-bar.gbb-mode-progress #gbb-prog-unlock { display: flex; }
#gbb-prog-unlock.stamp { animation: gbbUnlockStamp 4.5s cubic-bezier(.22,1,.36,1) forwards; }
@keyframes gbbUnlockStamp {
  0%   { opacity:0; transform:scale(2.4) rotate(-3deg); }
  12%  { opacity:1; transform:scale(0.94) rotate(0.5deg); }
  20%  { transform:scale(1.04) rotate(0deg); }
  30%  { transform:scale(1.0); opacity:1; }
  78%  { opacity:1; transform:scale(1.0); }
  100% { opacity:0; transform:scale(0.88); }
}
#gbb-unlock-headline {
  font-family: 'Anton', sans-serif; font-size: 28px; letter-spacing: 5px;
  text-transform: uppercase; color: #fbbf24;
  text-shadow:
    0 0 14px rgba(251,191,36,0.95),
    0 0 40px rgba(251,191,36,0.60),
    0 2px 0 rgba(0,0,0,1),
    0 4px 18px rgba(0,0,0,0.95);
  white-space: nowrap;
}
#gbb-unlock-prize {
  font-family: 'Bebas Neue', sans-serif; font-size: 16px; letter-spacing: 3px;
  text-transform: uppercase; color: rgba(255,255,255,0.88);
  text-shadow: 0 1px 8px rgba(0,0,0,0.95);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 500px;
}

/* Announce badge colors for progress mode */
#gift-battle-bar.gbb-mode-progress .gbb-ann-yt {
  color:#ff5555; background:rgba(220,0,0,0.20); border-color:rgba(255,50,50,0.45);
}
#gift-battle-bar.gbb-mode-progress .gbb-ann-tt {
  color:#e0e0e0; background:rgba(80,80,80,0.22); border-color:rgba(180,180,180,0.35);
}

/* Gift pop — rises from center */
.gbb-pop-prog { animation: gbbPopProg 2.0s ease-out forwards !important; }
.gbb-pop-yt.gbb-pop-prog { color:#ef4444 !important; text-shadow:0 0 22px rgba(239,68,68,0.95),0 2px 10px rgba(0,0,0,0.98) !important; }
.gbb-pop-tt.gbb-pop-prog { color:#d0d0d0 !important; text-shadow:0 0 22px rgba(200,200,200,0.8),0 2px 10px rgba(0,0,0,0.98) !important; }
@keyframes gbbPopProg {
  0%   { opacity:0; transform:translate(-50%,-50%) scale(0.3) rotate(-4deg); }
  22%  { opacity:1; transform:translate(-50%,-50%) scale(1.18) rotate(0deg); }
  55%  { opacity:1; transform:translate(-50%,-50%) scale(1.02); }
  100% { opacity:0; transform:translate(-50%,-60%) scale(0.82); }
}
.gbb-pop-yt .gbb-pop-flash-txt { color: #fca5a5; }
.gbb-pop-tt .gbb-pop-flash-txt { color: #d0d0d0; }

/* ══ TOP GIFTERS PANEL ══ */
#top-gifters-panel {
  position: absolute; left: 0; top: 505px; width: 1080px; z-index: 9;
  overflow: hidden; max-height: 0;
  transition: max-height 0.55s cubic-bezier(.34,1.12,.64,1);
  background: linear-gradient(180deg,rgba(15,4,32,0.97) 0%,rgba(25,6,48,0.94) 100%);
  border-bottom: 1px solid rgba(168,85,247,0.30);
  box-shadow: 0 8px 32px rgba(0,0,0,0.70);
}
#top-gifters-panel.open { max-height: 340px; }
#tgp-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 11px 22px 8px 22px;
  border-bottom: 1px solid rgba(168,85,247,0.18);
}
#tgp-title {
  font-family: 'Boogaloo', sans-serif; font-size: 20px; letter-spacing: 0.15em;
  color: #C084FC; text-transform: uppercase;
  text-shadow: 0 0 12px rgba(192,132,252,0.55);
}
#tgp-timeframe {
  font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 700;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: rgba(255,255,255,0.45); padding: 3px 10px;
  background: rgba(168,85,247,0.12); border: 1px solid rgba(168,85,247,0.25); border-radius: 20px;
}
#tgp-rows { display: flex; flex-direction: column; padding: 4px 0 8px; }
.tgp-row {
  display: flex; align-items: center; gap: 0; padding: 8px 22px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  transition: background 0.2s ease;
}
.tgp-row:last-child { border-bottom: none; }
.tgp-medal {
  font-size: 22px; width: 36px; flex-shrink: 0; text-align: center; line-height: 1;
}
.tgp-rank {
  font-family: 'Boogaloo', sans-serif; font-size: 22px; letter-spacing: 0.05em;
  color: rgba(255,255,255,0.35); width: 36px; flex-shrink: 0; text-align: center;
}
.tgp-name {
  font-family: 'Boogaloo', sans-serif; font-size: 26px; letter-spacing: 0.04em;
  color: #FAF5FF; flex: 1; white-space: nowrap; overflow: hidden;
  text-overflow: ellipsis; padding: 0 10px;
  text-shadow: 0 2px 8px rgba(0,0,0,0.80);
}
.tgp-row.rank-1 .tgp-name { color: #FDE68A; text-shadow: 0 0 14px rgba(253,211,77,0.55), 0 2px 8px rgba(0,0,0,0.80); }
.tgp-row.rank-2 .tgp-name { color: #E2E8F0; }
.tgp-row.rank-3 .tgp-name { color: #FDBA74; }
.tgp-amount {
  font-family: 'Boogaloo', sans-serif; font-size: 22px; letter-spacing: 0.04em;
  color: #A855F7; white-space: nowrap; flex-shrink: 0;

}
.tgp-plat {
  font-family: 'DM Sans', sans-serif; font-size: 10px; font-weight: 700;
  letter-spacing: 0.12em; text-transform: uppercase;
  padding: 2px 7px; border-radius: 4px; white-space: nowrap; flex-shrink: 0;
  margin-left: 10px;
}
.tgp-plat.plat-tiktok  { color:#69C9D0;background:rgba(105,201,208,0.16);border:1px solid rgba(105,201,208,0.30); }
.tgp-plat.plat-youtube { color:#FF6B6B;background:rgba(255,80,80,0.16);  border:1px solid rgba(255,80,80,0.30);   }
.tgp-plat.plat-direct,
.tgp-plat.plat-default { color:#C084FC;background:rgba(192,132,252,0.16);border:1px solid rgba(192,132,252,0.30); }
#bar-hero-action {
  position: absolute; top: 60px; left: 18px;
  font-family: 'DM Sans', sans-serif; font-size: 22px; font-weight: 700;
  letter-spacing: 0.13em; text-transform: uppercase; color: rgba(255,255,255,0.92);
  white-space: nowrap; opacity: 0; transform: translateY(10px); pointer-events: none;
  transition: opacity 0.32s ease 0.22s, transform 0.42s cubic-bezier(.34,1.56,.64,1) 0.20s;
  text-shadow: 0 2px 10px rgba(0,0,0,0.97), 0 0 18px rgba(var(--plat-rgb),0.55);
}
#gift-bar.alert-active #bar-hero-action { opacity:1; transform:translateY(0); }
#bar-hero-gift-img {
  height:78px;width:78px;object-fit:contain;flex-shrink:0;display:none;
  filter:drop-shadow(0 0 10px rgba(var(--plat-rgb),0.85));
  animation:heroGlowPulse 1.4s ease-in-out infinite; image-rendering:-webkit-optimize-contrast;
}
@keyframes heroGlowPulse {
  0%,100%{filter:drop-shadow(0 0 4px rgba(var(--plat-rgb),0.55)) drop-shadow(0 0 0px transparent)}
  50%    {filter:drop-shadow(0 0 18px rgba(var(--plat-rgb),1.0)) drop-shadow(0 0 38px rgba(var(--plat-rgb),0.60))}
}
#gift-bar.alert-active #bar-hero-name  { animation:heroGlowPulse 1.4s ease-in-out infinite; }
#gift-bar.alert-active #bar-hero-amount{ animation:heroGlowPulse 1.4s ease-in-out infinite 0.18s; }

/* ─── STATUS DOT ─── */
#status-dot {
  position: absolute; top: 456px; left: 8px;
  width: 6px; height: 6px; border-radius: 50%;
  background: #444; z-index: 30; transition: background 0.3s;
}
#status-dot.connected  { background:#3b82f6; box-shadow:0 0 5px rgba(59,130,246,0.7); }
#status-dot.connecting { background:#facc15; }

/* ══════════════════════════════════════════════════════════
   SPLAT OVERLAY
   All elements inside #splat-root.
   --splat-cy = vertical center Y of the splat zone (default 960px = canvas center).
   Updated via Ably "splat-pos" command from the dock.
══════════════════════════════════════════════════════════ */
#splat-root {
  --splat-cy: 960px;
  position: absolute; left: 0; top: 0;
  width: 1080px; height: 1920px;
  pointer-events: none; z-index: 20; overflow: hidden;
}

/* Ambient blobs */
.blob-layer { position:absolute;inset:0;pointer-events:none;opacity:0;transition:opacity 0.6s ease; }
.blob-layer.visible { opacity:1; }
.blob { position:absolute;border-radius:50%;filter:blur(2px); }

/* Glow ring */
#splat-glow-ring {
  position:absolute; left:540px; top:var(--splat-cy);
  transform:translate(-50%,-50%); width:900px; height:900px; border-radius:50%;
  background:radial-gradient(ellipse,rgba(168,85,247,0.15) 0%,transparent 70%);
  z-index:8; opacity:0;
  transition:opacity 0.6s ease, top 0.4s ease;
  animation:splatRingPulse 2s ease-in-out infinite;
}
#splat-glow-ring.visible { opacity:1; }
@keyframes splatRingPulse {
  0%,100%{transform:translate(-50%,-50%) scale(1)} 50%{transform:translate(-50%,-50%) scale(1.06)}
}

/* Splat background SVG */
#splat-bg {
  position:absolute; left:540px; top:var(--splat-cy);
  transform:translate(-50%,-50%); width:900px; height:280px;
  z-index:9; opacity:0;
  transition:opacity 0.5s ease, top 0.4s ease;
  filter:drop-shadow(0 0 40px rgba(168,85,247,0.6));
}
#splat-bg.visible { opacity:1; }

/* Panel (timer + banner) */
#splat-panel {
  position:absolute; left:540px; top:var(--splat-cy);
  transform:translate(-50%,calc(-50% + 40px)) scale(0.9);
  width:900px; display:flex; flex-direction:column; align-items:center; gap:24px;
  z-index:10; opacity:0; pointer-events:none;
  transition:opacity 0.5s cubic-bezier(.34,1.56,.64,1),
             transform 0.5s cubic-bezier(.34,1.56,.64,1),
             top 0.4s ease;
}
#splat-panel.visible { opacity:1; transform:translate(-50%,-50%) scale(1); }

/* Timer */
#splat-countdown-wrap { display:flex;flex-direction:column;align-items:center;gap:14px;width:100%; }
#splat-timer-number {
  font-family:'Boogaloo',cursive; font-size:200px; line-height:1; color:#FAF5FF;
  text-shadow:0 0 20px #A855F7,0 0 60px #7B2FBE,0 4px 0 rgba(0,0,0,0.4); letter-spacing:-6px;
}
#splat-timer-number.pulse-normal { animation:splatPulseNormal 1s ease-in-out infinite; }
#splat-timer-number.pulse-warn   { animation:splatPulseWarn 0.5s ease-in-out infinite; }
#splat-timer-number.pulse-danger { animation:splatPulseDanger 0.25s ease-in-out infinite; }
@keyframes splatPulseNormal { 0%,100%{transform:scale(1)} 50%{transform:scale(1.04)} }
@keyframes splatPulseWarn   { 0%,100%{transform:scale(1);color:#FAF5FF} 50%{transform:scale(1.08);color:#E879F9} }
@keyframes splatPulseDanger {
  0%,100%{transform:scale(1);color:#E879F9;text-shadow:0 0 20px #F43F5E,0 0 60px #F43F5E}
  50%    {transform:scale(1.14);color:#F43F5E;text-shadow:0 0 40px #F43F5E,0 0 100px #F43F5E}
}
#splat-countdown-label {
  font-family:'Boogaloo',cursive; font-size:42px; color:#FAF5FF;
  text-shadow:0 0 16px #A855F7,0 2px 0 rgba(0,0,0,0.5);
  text-align:center; letter-spacing:1px; padding:0 20px;
}
#splat-progress-track {
  width:800px; height:16px; background:rgba(255,255,255,0.12);
  border-radius:8px; overflow:hidden; box-shadow:0 0 12px rgba(168,85,247,0.4);
}
#splat-progress-fill {
  height:100%; background:linear-gradient(90deg,#7B2FBE,#E879F9,#C084FC);
  border-radius:8px; width:100%; transition:width 0.9s linear,background 0.3s ease;
}
#splat-progress-fill.danger { background:linear-gradient(90deg,#7F1D1D,#F43F5E,#FB7185); }

/* State banners */
#splat-state-banner {
  font-family:'Boogaloo',cursive; font-size:80px; color:#FAF5FF;
  text-align:center; letter-spacing:2px; padding:0 40px;
  text-shadow:0 0 30px #A855F7,0 4px 0 rgba(0,0,0,0.5);
}
#splat-state-banner.saved-text {
  color:#C084FC; text-shadow:0 0 40px #E879F9,0 0 80px #A855F7,0 4px 0 rgba(0,0,0,0.5);
  animation:splatSavedBounce 0.6s cubic-bezier(.34,1.56,.64,1) forwards;
}
#splat-state-banner.expired-text {
  color:#F43F5E; text-shadow:0 0 40px #F43F5E,0 0 80px #7F1D1D,0 4px 0 rgba(0,0,0,0.5);
  animation:splatExpiredShake 0.6s ease forwards;
}
@keyframes splatSavedBounce {
  0%{transform:scale(0.5) rotate(-6deg);opacity:0} 60%{transform:scale(1.15) rotate(2deg);opacity:1} 100%{transform:scale(1) rotate(0deg);opacity:1}
}
@keyframes splatExpiredShake {
  0%,100%{transform:translateX(0) scale(1)} 15%{transform:translateX(-18px) scale(1.05)}
  30%{transform:translateX(14px) scale(1.05)} 45%{transform:translateX(-10px)} 60%{transform:translateX(8px)} 75%{transform:translateX(-4px)}
}

/* Burst layer */
#splat-burst-layer { position:absolute;inset:0;pointer-events:none;z-index:25;overflow:hidden; }
.splat-particle { position:absolute;border-radius:50% 70% 50% 70% / 60% 50% 70% 50%;opacity:0;transform:scale(0); }

/* Crack/drip layer */
#splat-crack-layer { position:absolute;inset:0;pointer-events:none;z-index:22;opacity:0;transition:opacity 0.3s ease; }
#splat-crack-layer.visible { opacity:1; }
.drip { position:absolute;top:0;border-radius:0 0 50% 50%;opacity:0;transform-origin:top center; }

/* Idle bait widget — tracks splat center Y with smooth transition */
#idle-bait {
  position:absolute; z-index:10;
  left:40px; top:calc(var(--splat-cy) - 35px);
  transform:translateX(-30px) scale(0.92);
  width:215px; padding:9px 11px;
  display:flex; align-items:center; justify-content:flex-start; gap:8px;
  background:rgba(20,0,40,0.78); border:2px solid rgba(168,85,247,0.55);
  border-radius:10px; box-shadow:0 0 24px rgba(168,85,247,0.35),inset 0 0 20px rgba(59,7,100,0.4);
  opacity:0; pointer-events:none;
  transition:opacity 0.55s cubic-bezier(.4,0,.2,1),
             transform 0.55s cubic-bezier(.34,1.56,.64,1),
             top 0.4s ease;
}
#idle-bait.visible { opacity:1; transform:translateX(0) scale(1); animation:baitGlow 3s ease-in-out infinite; }
@keyframes baitGlow {
  0%,100%{box-shadow:0 0 24px rgba(168,85,247,0.35),inset 0 0 20px rgba(59,7,100,0.4)}
  50%    {box-shadow:0 0 55px rgba(168,85,247,0.7), inset 0 0 28px rgba(59,7,100,0.5)}
}
#bait-inner { display:flex;align-items:center;gap:8px;width:100%;transform-origin:center center; }
#idle-bait.visible #bait-inner { animation:baitWiggle 15s ease-in-out 2s infinite; }
@keyframes baitWiggle {
  0%,92%,100%{transform:rotate(0deg) scale(1)} 93%{transform:rotate(-5deg) scale(0.97)}
  94.5%{transform:rotate(6deg) scale(1.03)} 96%{transform:rotate(-4deg) scale(0.98)}
  97.5%{transform:rotate(4deg) scale(1.02)} 99%{transform:rotate(-1deg) scale(1)}
}
#bait-galaxy-img {
  width:45px;height:45px;object-fit:contain;flex-shrink:0;
  filter:drop-shadow(0 0 10px rgba(232,121,249,0.8)) drop-shadow(0 0 22px rgba(168,85,247,0.6));
  animation:baitFloat 2.6s ease-in-out infinite;
}
@keyframes baitFloat { 0%,100%{transform:translateY(0) scale(1)} 50%{transform:translateY(-3px) scale(1.04)} }
#bait-text { display:flex;flex-direction:column;align-items:flex-start;gap:1px; }
#bait-label-send {
  font-family:'Boogaloo',cursive; font-size:15px; color:rgba(192,132,252,0.95);
  letter-spacing:2px; text-transform:uppercase; text-shadow:0 0 12px rgba(168,85,247,0.6); line-height:1;
}
#bait-label-main {
  font-family:'Boogaloo',cursive; font-size:29px; line-height:1; color:#FAF5FF; letter-spacing:3px;
  text-shadow:0 0 16px rgba(232,121,249,0.95),0 0 36px rgba(168,85,247,0.75),0 3px 0 rgba(0,0,0,0.55);
  animation:baitTextGlow 3s ease-in-out infinite;
}
@keyframes baitTextGlow {
  0%,100%{text-shadow:0 0 16px rgba(232,121,249,0.9),0 0 36px rgba(168,85,247,0.7),0 3px 0 rgba(0,0,0,0.55)}
  50%    {text-shadow:0 0 28px rgba(232,121,249,1),0 0 60px rgba(168,85,247,0.9),0 3px 0 rgba(0,0,0,0.55)}
}
.bait-sparkle {
  position:absolute;border-radius:50%;background:#E879F9;opacity:0;pointer-events:none;
  animation:baitSparkle var(--dur) var(--del) ease-in-out infinite;
}
@keyframes baitSparkle { 0%,100%{opacity:0;transform:scale(0)} 50%{opacity:0.9;transform:scale(1)} }

/* ─── ANNOUNCE BOX ─── */
#announce-box {
  --ax: 540px; --ay: 200px;
  --aw: 800px; --afm: 76px; --afs: 40px; --apv: 24px; --aph: 44px;
  position: absolute; z-index: 15; pointer-events: none;
  /* clamp keeps box fully within 0–1080px canvas regardless of X position */
  left: clamp(calc(var(--aw) / 2), var(--ax), calc(1080px - var(--aw) / 2));
  top: var(--ay);
  transform: translate(-50%, calc(-50% + 18px)) scale(0.92);
  opacity: 0;
  transition: opacity 0.45s cubic-bezier(.34,1.56,.64,1),
              transform 0.45s cubic-bezier(.34,1.56,.64,1),
              left 0.38s ease, top 0.38s ease,
              width 0.25s ease;
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  padding: var(--apv) var(--aph);
  width: var(--aw); text-align: center;
  background: linear-gradient(160deg, rgba(14,0,38,0.93), rgba(6,0,20,0.90));
  border-radius: 22px;
  border: 2px solid rgba(168,85,247,0.75);
  box-shadow:
    0 0 0 1px rgba(168,85,247,0.12),
    0 0 35px rgba(168,85,247,0.50),
    0 0 90px rgba(168,85,247,0.22),
    inset 0 0 30px rgba(59,7,100,0.45);
  animation: announceGlow 3.2s ease-in-out infinite;
  overflow: hidden;
}
#announce-box.visible {
  opacity: 1;
  transform: translate(-50%, -50%) scale(1);
}
#announce-box::after {
  content: '';
  position: absolute; top: 0; left: -100%; width: 60%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(232,121,249,0.06), transparent);
  animation: announceSweep 5s ease-in-out 1s infinite;
  pointer-events: none;
}
@keyframes announceSweep { 0%{left:-100%} 60%,100%{left:160%} }
@keyframes announceGlow {
  0%,100% {
    box-shadow: 0 0 0 1px rgba(168,85,247,0.12), 0 0 35px rgba(168,85,247,0.50), 0 0 90px rgba(168,85,247,0.22), inset 0 0 30px rgba(59,7,100,0.45);
    border-color: rgba(168,85,247,0.75);
  }
  50% {
    box-shadow: 0 0 0 1px rgba(232,121,249,0.22), 0 0 60px rgba(232,121,249,0.70), 0 0 130px rgba(168,85,247,0.32), inset 0 0 45px rgba(59,7,100,0.55);
    border-color: rgba(232,121,249,0.95);
  }
}
#announce-live-badge {
  font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 700;
  letter-spacing: 0.20em; text-transform: uppercase;
  color: #F43F5E; background: rgba(244,63,94,0.14);
  border: 1px solid rgba(244,63,94,0.50); border-radius: 7px;
  padding: 3px 11px; display: inline-block; margin-bottom: 6px;
  animation: livePulse 1.8s ease-in-out infinite;
}
@keyframes livePulse { 0%,100%{opacity:1;color:#F43F5E} 50%{opacity:0.65;color:#FB7185} }
#announce-text {
  font-family: 'Boogaloo', cursive; font-size: var(--afm); line-height: 1.0;
  color: #FAF5FF; letter-spacing: 2px;
  white-space: normal; word-break: break-word; width: 100%;
  text-shadow: 0 0 26px rgba(168,85,247,0.95), 0 0 65px rgba(168,85,247,0.48), 0 4px 0 rgba(0,0,0,0.65);
  transition: font-size 0.25s ease;
}
#announce-sub {
  font-family: 'Boogaloo', cursive; font-size: var(--afs); line-height: 1.1;
  color: rgba(232,121,249,0.95); letter-spacing: 1px;
  white-space: normal; word-break: break-word; width: 100%;
  text-shadow: 0 0 16px rgba(232,121,249,0.75), 0 2px 0 rgba(0,0,0,0.55);
  max-height: 0; overflow: hidden;
  transition: max-height 0.3s ease, margin-top 0.3s ease, font-size 0.25s ease;
}
#announce-sub.has-text { max-height: 120px; margin-top: 2px; }

/* ══ EVENT PROMO SYSTEM ══ */
.ep-root {

  position: absolute;
  inset: 0;

  height: 1920px;
  pointer-events: none;
  z-index: 40;
  opacity: 0;
  transition: opacity 0.28s ease;
}
.ep-root.ep-active { opacity: 1; }
.ep-dim {
  position: absolute;
  inset: 0;
  opacity: 0;
  background:
    radial-gradient(circle at 50% 46%, rgba(168,85,247,0.34), transparent 34%),
    radial-gradient(circle at 50% 52%, rgba(232,121,249,0.18), transparent 48%),
    rgba(6,0,18,0.48);
  transition: opacity 0.32s ease;
}
.ep-root.ep-card-mode .ep-dim,
.ep-root.ep-paintball-mode .ep-dim { opacity: 1; }
.ep-passive {
  position: absolute;

  height: 55px;

  overflow: hidden;
  opacity: 0;
  border-radius: 0;
  border: 0;

    linear-gradient(to right, transparent 0%, rgba(59,7,100,0.16) 22%, rgba(59,7,100,0.70) 48%, rgba(5,0,14,0.84) 100%),
    radial-gradient(ellipse at 82% 50%, rgba(232,121,249,0.28), transparent 46%);

}
.ep-passive::before { left: 0; background: linear-gradient(to right, rgba(0,0,0,0), rgba(0,0,0,0)); }
.ep-passive::after { right: 0; background: linear-gradient(to right, transparent, rgba(5,0,14,0.92)); }

.ep-projectile {
  position: absolute;

  left: -140px;
  width: 96px;
  height: 96px;
  border-radius: 50%;
  background: radial-gradient(circle at 32% 25%, #FAF5FF 0 10%, #E879F9 18%, #A855F7 50%, #3B0764 100%);

}
.ep-root.ep-paintball-mode .ep-projectile { animation: epProjectile 0.7s cubic-bezier(.2,.8,.2,1) forwards; }
@keyframes epProjectile { to { left: 492px; top: 720px; transform: scale(0.6); opacity: 0; } }
@keyframes epImpactShake {
  0%,100% { transform: translate(0,0); }
  20% { transform: translate(-16px, 8px); }
  45% { transform: translate(14px, -10px); }
  70% { transform: translate(-7px, 4px); }
}
.ep-splat {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 620px;
  height: 500px;
  transform: translate(-50%, -50%) scale(0);
  opacity: 0;
  filter: drop-shadow(0 24px 46px rgba(0,0,0,0.62)) drop-shadow(0 0 46px rgba(168,85,247,0.70));
}
.ep-root.ep-paintball-mode .ep-splat { animation: epSplatPop 0.62s 0.64s cubic-bezier(.34,1.56,.64,1) forwards, epSplatClear 0.55s var(--ep-splat-clear-delay, 3s) ease forwards; }
@keyframes epSplatPop { to { opacity: 1; transform: translate(-50%, -50%) scale(1); } }
@keyframes epSplatClear { to { opacity: 0; transform: translate(-50%, -52%) scale(0.64); filter: blur(3px) drop-shadow(0 0 24px rgba(168,85,247,0.32)); } }
@keyframes epSplatExit { to { opacity: 0; transform: translate(-50%, -50%) scale(0.88); } }
.ep-splat::before {
  content: '';
  position: absolute;
  left: 96px;
  top: 88px;
  width: 430px;
  height: 300px;
  background:
    radial-gradient(circle at 32% 26%, rgba(255,255,255,0.86) 0 8%, rgba(245,208,254,0.78) 9% 15%, transparent 16%),
    radial-gradient(circle at 42% 40%, #F0ABFC 0 10%, #D946EF 24%, #A855F7 48%, #7E22CE 76%, #4C1D95 100%);
  border-radius: 61% 39% 54% 46% / 42% 58% 44% 56%;
}
.ep-splat::after {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 17% 47%, #A855F7 0 9%, transparent 10%),
    radial-gradient(circle at 24% 28%, #C084FC 0 6%, transparent 7%),
    radial-gradient(circle at 32% 78%, #9333EA 0 8%, transparent 9%),
    radial-gradient(circle at 49% 18%, #E879F9 0 9%, transparent 10%),
    radial-gradient(circle at 63% 27%, #A855F7 0 7%, transparent 8%),
    radial-gradient(circle at 76% 47%, #C084FC 0 10%, transparent 11%),
    radial-gradient(circle at 72% 75%, #8B5CF6 0 7%, transparent 8%),
    radial-gradient(ellipse at 51% 55%, #B145F8 0 32%, transparent 33%);
  opacity: 0.98;
  filter: drop-shadow(0 0 16px rgba(232,121,249,0.78));
}
.ep-splat-gloss {
  position: absolute;
  left: 188px;
  top: 118px;
  width: 150px;
  height: 58px;
  border-radius: 50%;
  background:
    radial-gradient(ellipse at 38% 42%, rgba(255,255,255,0.86), transparent 58%),
    radial-gradient(ellipse at 78% 28%, rgba(255,255,255,0.44), transparent 42%);
  opacity: 0;
  z-index: 2;
}
.ep-root.ep-paintball-mode .ep-splat-gloss { animation: epGloss 1.4s 1s ease-in-out infinite; }
@keyframes epGloss { 0%,100% { opacity: 0.24; transform: translateX(-20px); } 50% { opacity: 0.72; transform: translateX(28px); } }
.ep-droplets span,
.ep-drips span {
  position: absolute;
  display: block;
  background: #A855F7;
  box-shadow: 0 0 18px rgba(232,121,249,0.72);
}
.ep-droplets span { width: 30px; height: 24px; border-radius: 62% 38% 54% 46% / 45% 57% 43% 55%; left: 295px; top: 235px; opacity: 0; }
.ep-root.ep-paintball-mode .ep-droplets span { animation: epDroplet 0.72s 0.78s ease-out forwards; }
@keyframes epDroplet { to { opacity: 1; transform: translate(var(--dx), var(--dy)) scale(var(--s)); } }
.ep-drips span { top: 296px; width: 18px; height: 0; border-radius: 0 0 18px 18px; opacity: 0.82; transform-origin: top; }
.ep-root.ep-paintball-mode .ep-drips span { animation: epDrip 1s 0.9s ease-out forwards; }
@keyframes epDrip { to { height: var(--h); } }
.ep-splat-title,
.ep-splat-date {
  position: absolute;
  left: 70px;
  right: 70px;
  text-align: center;
  opacity: 0;
  color: #FAF5FF;
  text-shadow: 0 4px 18px rgba(0,0,0,0.94), 0 0 24px rgba(255,255,255,0.28);
}
.ep-splat-title { top: 162px; font-family: 'Anton', sans-serif; font-size: 52px; line-height: 0.95; text-transform: uppercase; z-index: 3; }
.ep-splat-date { top: 284px; font-family: 'Bebas Neue', sans-serif; font-size: 32px; letter-spacing: 3px; z-index: 3; }
.ep-root.ep-paintball-mode .ep-splat-title,
.ep-root.ep-paintball-mode .ep-splat-date { animation: epTextPop 0.42s 1.08s cubic-bezier(.34,1.56,.64,1) forwards; }
@keyframes epTextPop { from { transform: scale(0.55); } to { opacity: 1; transform: scale(1); } }

/* ══ HYPE METER — audio-reactive waveform ══ */
#hype-meter {
  position: absolute;
  top: 100%;          /* hangs below the gift bar into transparent stream space */
  left: 0; right: 0;
  height: 56px;       /* max segment height */
  pointer-events: none; z-index: 13;
  display: flex; gap: 3px; padding: 0 3px;
  align-items: flex-start; /* segments grow downward */
}
.hm-seg {
  flex: 1;
  min-height: 3px;
  border-radius: 2px 2px 4px 4px;
  /* height driven by rAF — no height transition */
  transition: background 0.25s ease, box-shadow 0.25s ease, opacity 0.25s ease;
  opacity: 0.9;
}
/* color states — JS applies via className, height via style.height */
.hm-seg.hm-floor {
  background: rgba(168,85,247,0.30);
  box-shadow: 0 0 5px rgba(168,85,247,0.22);
}
.hm-seg.hm-mid {
  background: rgba(192,132,252,0.82);
  box-shadow: 0 0 8px 1px rgba(192,132,252,0.55), 0 0 16px rgba(168,85,247,0.30);
}
.hm-seg.hm-hot {
  background: #E879F9;
  box-shadow: 0 0 12px 3px rgba(232,121,249,0.90), 0 0 28px rgba(168,85,247,0.55);
  opacity: 1;
}
.hm-seg.hm-surge {
  background: #fff;
  box-shadow: 0 0 14px 4px rgba(255,255,255,0.90), 0 0 30px rgba(232,121,249,0.85);
  opacity: 1;
}
/* ── TikTok mode (blue segments) ── */
#hype-meter.hm-tt .hm-seg.hm-floor { background: rgba(59,130,246,0.30);  box-shadow: 0 0 5px rgba(59,130,246,0.22); }
#hype-meter.hm-tt .hm-seg.hm-mid   { background: rgba(96,165,250,0.82);  box-shadow: 0 0 8px 1px rgba(96,165,250,0.55), 0 0 16px rgba(59,130,246,0.30); }
#hype-meter.hm-tt .hm-seg.hm-hot   { background: #60A5FA; box-shadow: 0 0 12px 3px rgba(96,165,250,0.90), 0 0 28px rgba(59,130,246,0.55); opacity:1; }
/* ── YouTube mode (red segments) ── */
#hype-meter.hm-yt .hm-seg.hm-floor { background: rgba(239,68,68,0.30);   box-shadow: 0 0 5px rgba(239,68,68,0.22); }
#hype-meter.hm-yt .hm-seg.hm-mid   { background: rgba(248,113,113,0.82); box-shadow: 0 0 8px 1px rgba(248,113,113,0.55), 0 0 16px rgba(239,68,68,0.30); }
#hype-meter.hm-yt .hm-seg.hm-hot   { background: #EF4444; box-shadow: 0 0 12px 3px rgba(239,68,68,0.90), 0 0 28px rgba(220,38,38,0.55); opacity:1; }
#gift-bar.hm-surge-active #bar-border::before,
#gift-bar.hm-surge-active #bar-border::after {
  animation: hmBorderSurge 0.14s ease-in-out infinite alternate;
}
@keyframes hmBorderSurge {
  from { background: linear-gradient(to right, transparent 0%, rgba(255,255,255,0.10) 30%, rgba(232,121,249,0.75) 70%, rgba(255,255,255,0.85) 100%); }
  to   { background: linear-gradient(to right, transparent 0%, rgba(232,121,249,0.25) 30%, rgba(255,255,255,0.65) 70%, rgba(232,121,249,1.0) 100%); }
}
/* ══ SURGE BANNER — single-line strip, slides UP from above the bar ══ */
#hm-surge-banner {
  position: absolute;
  top: 395px; left: 50%;   /* gift bar top (450) minus banner height (55) = 395 */
  /* hidden: at the gift bar's y-level, slides upward to reveal */
  transform: translateX(-50%) translateY(100%);
  opacity: 0;
  /* single-row strip, same height as gift bar */
  height: 55px;
  width: max-content;
  padding: 0 22px;
  white-space: nowrap;
  pointer-events: none; z-index: 14;
  /* electric border via spinning ::before + dark ::after */
  border-radius: 12px 12px 0 0;   /* rounded top, flat bottom flush with bar */
  overflow: hidden;
  display: flex; flex-direction: row; align-items: center; gap: 10px;
  transition: transform 0.38s cubic-bezier(.34,1.56,.64,1), opacity 0.22s ease;
}
#hm-surge-banner.visible {
  transform: translateX(-50%) translateY(0);
  opacity: 1;
}
/* spinning red↔blue electric border */
#hm-surge-banner::before {
  content: '';
  position: absolute;
  width: 400%; height: 400%;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%) rotate(0deg);
  background: conic-gradient(
    from 0deg,
    #ff1144 0deg, #ff77aa 55deg, transparent 95deg,
    #0077ff 160deg, #44aaff 215deg, transparent 255deg,
    #ff1144 320deg, transparent 360deg
  );
  animation: electricSpin 2s linear infinite;
  z-index: 0;
}
/* dark inner fill — 3px electric border visible around edge */
#hm-surge-banner::after {
  content: '';
  position: absolute;
  inset: 3px;
  background: rgba(4,0,16,0.97);
  border-radius: 9px 9px 0 0;
  z-index: 1;
}
@keyframes electricSpin { to { transform: translate(-50%, -50%) rotate(360deg); } }
#hm-surge-banner > * { position: relative; z-index: 2; }

/* ── text elements (all inline on one row) ── */
#hm-sb-headline {
  font-family: 'Anton', sans-serif; font-size: 26px; letter-spacing: 3px;
  color: #fff; line-height: 1;
}
.hm-sb-sep {
  font-size: 14px; color: rgba(255,255,255,0.35); font-weight: 300;
}
#hm-sb-cta {
  font-family: 'Anton', sans-serif; font-size: 22px; letter-spacing: 2px;
  color: #fff; text-transform: uppercase; line-height: 1;
}
#hm-sb-timer {
  font-family: 'Boogaloo', cursive; font-size: 26px; color: #fff; line-height: 1;
}
#hm-sb-unit {
  font-family: 'DM Sans', sans-serif; font-size: 11px; letter-spacing: 2px;
  color: rgba(255,255,255,0.5); text-transform: uppercase; margin-left: -4px;
}
#hm-first-gifter-flash {
  position: absolute; inset: 0; pointer-events: none; z-index: 14; opacity: 0;
  background: linear-gradient(to right, transparent 0%, rgba(255,215,0,0.05) 25%, rgba(255,215,0,0.16) 60%, rgba(255,215,0,0.26) 100%);
}
#hm-first-gifter-flash.fire { animation: hmFirstFlash 2.8s ease forwards; }
@keyframes hmFirstFlash {
  0%,100%{opacity:0} 10%,80%{opacity:1}
}

/* ══ COMMENT PROMPT — free-floating engagement CTA ══ */
#comment-prompt {
  --cpx: 540px; --cpy: 1620px; --cpw: 720px; --cpfm: 44px; --cpfs: 22px;
  position: absolute;
  left: clamp(calc(var(--cpw) / 2), var(--cpx), calc(1080px - var(--cpw) / 2));
  top: var(--cpy);
  transform: translate(-50%, -50%) scale(0.92);
  opacity: 0;
  width: var(--cpw);
  text-align: center;
  pointer-events: none; z-index: 16;
  transition: opacity 0.42s ease, transform 0.42s cubic-bezier(.34,1.56,.64,1),
              left 0.38s ease, top 0.38s ease;
  display: flex; flex-direction: column; align-items: center; gap: 5px;
  padding: 16px 30px 14px;
  background: linear-gradient(160deg, rgba(6,0,18,0.90), rgba(20,4,40,0.87));
  border-radius: 18px;
  border: 1px solid rgba(192,132,252,0.52);
  box-shadow: 0 0 28px rgba(168,85,247,0.32), 0 0 64px rgba(168,85,247,0.10),
              inset 0 0 22px rgba(59,7,100,0.32);
  animation: cpGlow 3.2s ease-in-out infinite;
  overflow: hidden;
}
#comment-prompt.visible { opacity: 1; transform: translate(-50%, -50%) scale(1); }
#comment-prompt::after {
  content: ''; position: absolute; top: 0; left: -100%; width: 55%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(192,132,252,0.04), transparent);
  animation: cpSweep 5.5s ease-in-out 1s infinite; pointer-events: none;
}
@keyframes cpSweep { 0%{left:-100%} 60%,100%{left:155%} }
@keyframes cpGlow {
  0%,100% { border-color: rgba(192,132,252,0.52); box-shadow: 0 0 28px rgba(168,85,247,0.32), 0 0 64px rgba(168,85,247,0.10), inset 0 0 22px rgba(59,7,100,0.32); }
  50%     { border-color: rgba(232,121,249,0.78); box-shadow: 0 0 46px rgba(232,121,249,0.52), 0 0 95px rgba(168,85,247,0.20), inset 0 0 32px rgba(59,7,100,0.42); }
}
#cp-eyebrow {
  font-family: 'DM Sans', sans-serif; font-size: 10px; font-weight: 700;
  letter-spacing: 0.24em; text-transform: uppercase; color: rgba(232,121,249,0.70);
  white-space: nowrap;
}
#cp-text {
  font-family: 'Boogaloo', cursive; font-size: var(--cpfm); line-height: 1.0;
  color: #FAF5FF; letter-spacing: 2px;
  white-space: normal; word-break: break-word; width: 100%;
  text-shadow: 0 0 24px rgba(168,85,247,0.88), 0 0 56px rgba(168,85,247,0.42), 0 3px 0 rgba(0,0,0,0.65);
  transition: font-size 0.25s ease;
}
#cp-sub {
  font-family: 'Boogaloo', cursive; font-size: var(--cpfs); line-height: 1.1;
  color: rgba(192,132,252,0.82); letter-spacing: 1px;
  white-space: normal; word-break: break-word; width: 100%;
  max-height: 0; overflow: hidden;
  transition: max-height 0.3s ease;
}
#cp-sub.has-text { max-height: 90px; }
#cp-dots { display: flex; gap: 5px; align-items: center; margin-top: 3px; }
.cp-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: rgba(192,132,252,0.28);
  transition: background 0.3s ease, transform 0.3s ease;
}
.cp-dot.active { background: #C084FC; transform: scale(1.5); }

/* ── Ably connection dot ── */
#conn-dot{position:fixed;top:12px;right:12px;width:12px;height:12px;border-radius:50%;background:#555;z-index:9999;transition:background .3s,box-shadow .3s;}
</style>
</head>

/* ══ GIFT BATTLE BAR ══ */
let gbbMode='off';
let gbbYtSpend=0,gbbTtSpend=0,gbbTtCoins=0,gbbGoalAmount=100;
let gbbTimerLeft=null;   // null = full live, number = seconds remaining
let gbbTimerInterval=null;
let gbbGoalHit=false;

function gbbFmt(usd){return'$'+usd.toFixed(2);}
function gbbFmtCoins(n){
  if(n>=1000000)return(n/1000000).toFixed(1).replace(/\.0$/,'')+'M coins';
  if(n>=10000)return(n/1000).toFixed(1).replace(/\.0$/,'')+'K coins';
  return n.toLocaleString()+' coins';
}

function gbbComputeSpend(amount,type){
  const n=Number(amount)||0;
  if(type==='tiktok_coins')return n*0.01;         // $0.01/coin viewer spend
  if(type==='youtube_jewels')return n*0.005;       // ~$0.005/jewel (matches tracker.html rate)
  if(type==='youtube_superchat'||type==='direct_donation'||type==='direct')return n;
  return 0;
}

function gbbTrackGift(data){
  if(gbbMode==='off')return;
  const plat=(data.platform||'').toLowerCase();
  const spend=gbbComputeSpend(data.amount,data.type);
  if(spend<=0)return;
  if(plat==='youtube')gbbYtSpend+=spend;
  else if(plat==='tiktok'){
    gbbTtSpend+=spend;
    // accumulate raw coins for display; non-coin gifts approximate via rate
    if(data.type==='tiktok_coins') gbbTtCoins+=(Number(data.amount)||0);
    else gbbTtCoins+=Math.round(spend/0.01);
  }
  gbbUpdateDisplay(true);
}

function gbbUpdateDisplay(triggerSurge){
  if(gbbMode==='off')return;
  const yt=gbbYtSpend,tt=gbbTtSpend;
  const ytFill=document.getElementById('gbb-yt-fill');
  const ttFill=document.getElementById('gbb-tt-fill');
  const ytAmt =document.getElementById('gbb-yt-amt');
  const ttAmt =document.getElementById('gbb-tt-amt');
  const timerEl=document.getElementById('gbb-timer-val');
  const divider=document.getElementById('gbb-divider');
  const ytPctEl=document.getElementById('gbb-yt-pct');
  const ttPctEl=document.getElementById('gbb-tt-pct');
  const shelf    =document.getElementById('gbb-timer-shelf');
  const shelfVal =document.getElementById('gbb-shelf-val');
  const bar      =document.getElementById('gift-battle-bar');
  function updateShelf(text,valClass,shelfClass){
    if(!shelf||!shelfVal)return;
    shelfVal.textContent=text; shelfVal.className=valClass||'';
    shelf.className=shelfClass?'visible '+shelfClass:'visible';
    bar&&bar.classList.add('gbb-shelf-active');
  }
  function hideShelf(){
    if(!shelf)return;
    shelf.className='';
    bar&&bar.classList.remove('gbb-shelf-active');
  }
  function updateSplit(ytPct){
    const ttPct=100-ytPct;
    ytFill.style.width=ytPct+'%'; ttFill.style.width=ttPct+'%';
    if(divider) divider.style.left=ytPct+'%';
    if(ytPctEl){ytPctEl.textContent=Math.round(ytPct)+'%';ytPctEl.style.right='calc('+(100-ytPct)+'% + 14px)';}
    if(ttPctEl){ttPctEl.textContent=Math.round(ttPct)+'%';ttPctEl.style.left='calc('+ytPct+'% + 14px)';}
    if(triggerSurge&&divider){divider.classList.remove('surge');void divider.offsetWidth;divider.classList.add('surge');}
  }
  if(gbbMode==='battle'){
    const total=(yt+tt)||0.001;
    updateSplit((yt/total)*100);
    ytAmt.textContent=gbbFmt(yt); ttAmt.textContent=gbbFmtCoins(gbbTtCoins);
    if(gbbTimerLeft===null){
      timerEl.textContent='● LIVE'; timerEl.className='gbb-live';
      hideShelf();
    }else if(gbbTimerLeft<=0){
      const winner=yt>tt?'▶ YT WINS':tt>yt?'TT WINS':'DRAW';
      timerEl.textContent=''; timerEl.className='';
      updateShelf(winner,'gbb-ended','shelf-ended');
    }else{
      const m=Math.floor(gbbTimerLeft/60),s=gbbTimerLeft%60;
      const timeStr=m+':'+String(s).padStart(2,'0');
      timerEl.textContent='● LIVE'; timerEl.className='gbb-live';
      updateShelf(timeStr, gbbTimerLeft<=10?'gbb-danger':gbbTimerLeft<=60?'gbb-warn':'', gbbTimerLeft<=10?'shelf-danger':gbbTimerLeft<=60?'shelf-warn':'');
    }
  }else if(gbbMode==='progress'){
    const goal=gbbGoalAmount||100;
    const totalSpend=yt+tt;
    const totalPct=Math.min(totalSpend/goal*100,100);
    // Unified fill width = total progress
    const progFill=document.getElementById('gbb-prog-fill');
    const progYtSeg=document.getElementById('gbb-prog-yt-seg');
    const progTtSeg=document.getElementById('gbb-prog-tt-seg');
    const progEdge=document.getElementById('gbb-prog-edge');
    const progYtPct=document.getElementById('gbb-prog-yt-pct');
    const progTtPct=document.getElementById('gbb-prog-tt-pct');
    if(progFill) progFill.style.width=totalPct+'%';
    // Inside the fill, YT takes its share of the filled region
    const ytShareOfFill=totalSpend>0?(yt/totalSpend)*100:50;
    const ttShareOfFill=100-ytShareOfFill;
    if(progYtSeg) progYtSeg.style.width=ytShareOfFill+'%';
    if(progTtSeg) progTtSeg.style.width=ttShareOfFill+'%';
    // Edge surge
    if(triggerSurge&&progEdge){progEdge.classList.remove('surge');void progEdge.offsetWidth;progEdge.classList.add('surge');}
    // Contribution pill labels (% of total spend each team did)
    if(progYtPct) progYtPct.textContent=totalSpend>0?Math.round(yt/totalSpend*100)+'%':'0%';
    if(progTtPct) progTtPct.textContent=totalSpend>0?Math.round(tt/totalSpend*100)+'%':'0%';
    ytAmt.textContent=gbbFmt(yt); ttAmt.textContent=gbbFmtCoins(gbbTtCoins);
    if(!gbbGoalHit&&totalSpend>=goal){
      gbbGoalHit=true;
      gbbFireDareUnlock();
      timerEl.textContent=''; timerEl.className='';
      updateShelf('DARE UNLOCKED','gbb-ended','shelf-ended');
    }else if(!gbbGoalHit){
      const rem=Math.max(0,goal-totalSpend);
      const pct=totalPct;
      timerEl.textContent='● LIVE'; timerEl.className='gbb-live';
      updateShelf('$'+rem.toFixed(0)+' to go', pct>=90?'gbb-danger':pct>=70?'gbb-warn':'', pct>=90?'shelf-danger':pct>=70?'shelf-warn':'');
    }
  }
}

function gbbFireDareUnlock(){
  const bar=document.getElementById('gift-battle-bar');
  const flash=document.getElementById('gbb-prog-flash');
  const stamp=document.getElementById('gbb-prog-unlock');
  const prizeName=document.getElementById('gbb-unlock-prize');
  const progFill=document.getElementById('gbb-prog-fill');
  // 1. fill to 100%
  if(progFill) progFill.style.width='100%';
  // 2. gold fill state
  bar&&bar.classList.add('gbb-goal-hit');
  // 3. screen flash
  if(flash){flash.classList.remove('fire');void flash.offsetWidth;flash.classList.add('fire');}
  // 4. stamp the prize name then DARE UNLOCKED
  if(prizeName) prizeName.textContent=gbbPrizeName||'';
  if(stamp){stamp.classList.remove('stamp');void stamp.offsetWidth;stamp.classList.add('stamp');}
  // 5. screen pulse
  const sp=document.getElementById('screen-pulse');
  [0,600,1200].forEach(d=>setTimeout(()=>{
    sp.style.boxShadow='inset 0 0 180px 80px rgba(251,191,36,0.45)';
    sp.style.opacity='1';
    setTimeout(()=>{sp.style.opacity='0';},700);
  },d));
  // 6. clean up after animation
  setTimeout(()=>{
    bar&&bar.classList.remove('gbb-goal-hit');
    if(stamp) stamp.classList.remove('stamp');
  },5000);
}

function gbbStartTimer(){
  gbbStopTimer();
  if(gbbTimerLeft===null||gbbTimerLeft<=0)return;
  gbbTimerInterval=setInterval(()=>{
    if(gbbTimerLeft>0){gbbTimerLeft--;gbbUpdateDisplay();}
    if(gbbTimerLeft<=0)gbbStopTimer();
  },1000);
}

function gbbStopTimer(){
  if(gbbTimerInterval){clearInterval(gbbTimerInterval);gbbTimerInterval=null;}
}

function gbbShowAnnounce(mode){
  const el=document.getElementById('gbb-announce');
  const txt=document.getElementById('gbb-ann-text');
  txt.textContent=mode==='progress'?'🎯 SHARED PROGRESS!':'⚔ GIFT BATTLE!';
  el.classList.remove('show');
  void el.offsetWidth; // force reflow to restart animation
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),3600);
}

function gbbGiftPop(data){
  if(gbbMode==='off')return;
  const plat=(data.platform||'').toLowerCase();
  const spend=gbbComputeSpend(data.amount,data.type);
  const tier=spend>=50?'lg':spend>=8?'md':'sm';
  const dir=plat==='youtube'?'yt':'tt';
  const isProgress=gbbMode==='progress';
  const layer=document.getElementById('gbb-pop-layer');
  // Name pop — battle shoots sideways, progress bursts and floats
  const nameEl=document.createElement('div');
  nameEl.className=`gbb-pop-name gbb-pop-${tier} gbb-pop-${dir}${isProgress?' gbb-pop-prog':''}`;
  nameEl.textContent=(data.name||'').toUpperCase();
  layer.appendChild(nameEl);
  // Flash text
  const flashEl=document.createElement('div');
  flashEl.className='gbb-pop-flash';
  flashEl.textContent=(data.name||'')+' sent '+fmtAmount(data.amount,data.type);
  layer.appendChild(flashEl);
  setTimeout(()=>{nameEl.remove();flashEl.remove();},2100);
}

let gbbPrizeName='';
function gbbHandleCmd(data){
  const{mode,timerSeconds,goalAmount,prizeName}=data||{};
  gbbPrizeName=prizeName||'';
  gbbStopTimer();
  const bar=document.getElementById('gift-battle-bar');
  if(!mode||mode==='off'){
    gbbMode='off';
    bar.classList.remove('active','gbb-mode-battle','gbb-mode-progress','gbb-shelf-active','gbb-goal-hit');
    document.getElementById('gbb-goal-shimmer').classList.remove('active');
    const offShelf=document.getElementById('gbb-timer-shelf');
    if(offShelf)offShelf.className='';
    const offPf=document.getElementById('gbb-prog-fill');
    if(offPf){offPf.style.width='0%';offPf.style.background='';}
    const offPu=document.getElementById('gbb-prog-unlock');
    if(offPu) offPu.classList.remove('stamp');
    return;
  }
  // Reset and activate
  gbbMode=mode;
  gbbYtSpend=0;gbbTtSpend=0;gbbTtCoins=0;gbbGoalHit=false;
  gbbGoalAmount=Number(goalAmount)||100;
  gbbTimerLeft=timerSeconds?Number(timerSeconds):null;
  document.getElementById('gbb-goal-shimmer').classList.remove('active');
  // Initial fills + divider reset
  const divEl=document.getElementById('gbb-divider');
  const ytPctEl2=document.getElementById('gbb-yt-pct');
  const ttPctEl2=document.getElementById('gbb-tt-pct');
  if(mode==='battle'){
    document.getElementById('gbb-yt-fill').style.width='50%';
    document.getElementById('gbb-tt-fill').style.width='50%';
    if(divEl){divEl.style.left='50%';divEl.classList.remove('surge');}
    if(ytPctEl2){ytPctEl2.textContent='50%';ytPctEl2.style.right='calc(50% + 14px)';}
    if(ttPctEl2){ttPctEl2.textContent='50%';ttPctEl2.style.left='calc(50% + 14px)';}
  }else{
    document.getElementById('gbb-yt-fill').style.width='0%';
    document.getElementById('gbb-tt-fill').style.width='0%';
    if(divEl){divEl.style.left='0%';divEl.classList.remove('surge');}
    if(ytPctEl2){ytPctEl2.textContent='0%';ytPctEl2.style.right='calc(100% + 14px)';}
    if(ttPctEl2){ttPctEl2.textContent='0%';ttPctEl2.style.left='calc(0% + 14px)';}
    // Reset progress mode elements
    const pf=document.getElementById('gbb-prog-fill');
    if(pf){pf.style.width='0%';pf.style.background='';}
    const pe=document.getElementById('gbb-prog-edge');
    if(pe) pe.classList.remove('surge');
    const pu=document.getElementById('gbb-prog-unlock');
    if(pu) pu.classList.remove('stamp');
    const pfl=document.getElementById('gbb-prog-flash');
    if(pfl) pfl.classList.remove('fire');
    bar.classList.remove('gbb-goal-hit');
    // Set prize text
    const pt=document.getElementById('gbb-prog-prize-text');
    if(pt) pt.textContent=(gbbPrizeName||'DARE').toUpperCase();
    const up=document.getElementById('gbb-unlock-prize');
    if(up) up.textContent=(gbbPrizeName||'').toUpperCase();
    // Reset contribution pills
    const pyp=document.getElementById('gbb-prog-yt-pct');
    const ptp=document.getElementById('gbb-prog-tt-pct');
    if(pyp) pyp.textContent='0%';
    if(ptp) ptp.textContent='0%';
    const pys=document.getElementById('gbb-prog-yt-seg');
    const pts=document.getElementById('gbb-prog-tt-seg');
    if(pys) pys.style.width='50%';
    if(pts) pts.style.width='50%';
  }
  bar.classList.remove('gbb-mode-battle','gbb-mode-progress');
  bar.classList.add('active','gbb-mode-'+mode);
  gbbUpdateDisplay();
  gbbShowAnnounce(mode);
  if(gbbTimerLeft!==null)gbbStartTimer();
}

const splatRoot=document.getElementById('splat-root'),splatPanel=document.getElementById('splat-panel'),splatBg=document.getElementById('splat-bg'),splatBlobLayer=document.getElementById('blob-layer'),splatGlowRing=document.getElementById('splat-glow-ring'),splatTimerNum=document.getElementById('splat-timer-number'),splatCountLabel=document.getElementById('splat-countdown-label'),splatProgFill=document.getElementById('splat-progress-fill'),splatBanner=document.getElementById('splat-state-banner'),splatBurstLayer=document.getElementById('splat-burst-layer'),splatCrackLayer=document.getElementById('splat-crack-layer'),splatCrackSvg=document.getElementById('splat-crack-svg'),splatCountWrap=document.getElementById('splat-countdown-wrap'),idleBait=document.getElementById('idle-bait');

/* Audio */
let audioCtx=null;
function ensureAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();}
function playSound(type){try{ensureAudio();const ctx=audioCtx,now=ctx.currentTime;if(type==='reset'){[0,0.12].forEach((delay,i)=>{const osc=ctx.createOscillator(),g=ctx.createGain();osc.connect(g);g.connect(ctx.destination);osc.type='sawtooth';osc.frequency.setValueAtTime(220*(i===0?1.5:1),now+delay);g.gain.setValueAtTime(0.3,now+delay);g.gain.exponentialRampToValueAtTime(0.001,now+delay+0.18);osc.start(now+delay);osc.stop(now+delay+0.2);});}else if(type==='save'){[0,0.10,0.22,0.36].forEach((delay,i)=>{const freq=880*[1,1.25,1.5,2][i],osc=ctx.createOscillator(),g=ctx.createGain();osc.connect(g);g.connect(ctx.destination);osc.type='sine';osc.frequency.setValueAtTime(freq,now+delay);g.gain.setValueAtTime(0.35,now+delay);g.gain.exponentialRampToValueAtTime(0.001,now+delay+0.4);osc.start(now+delay);osc.stop(now+delay+0.45);});}else if(type==='expire'){const osc=ctx.createOscillator(),g=ctx.createGain();osc.connect(g);g.connect(ctx.destination);osc.type='sawtooth';osc.frequency.setValueAtTime(220,now);osc.frequency.exponentialRampToValueAtTime(55,now+0.8);g.gain.setValueAtTime(0.4,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.9);osc.start(now);osc.stop(now+1.0);}}catch(e){}}

/* State machine */
const SPLAT_STATE={IDLE:'idle',COUNTDOWN:'countdown',SAVED:'saved',EXPIRED:'expired'};
let splatState=SPLAT_STATE.IDLE,splatTimeLeft=SPLAT_CONFIG.TIMER_SECONDS,splatTicker=null,splatLingerTimer=null;
let baitEnabled=true;
function splatShow(...els){els.forEach(e=>e.classList.add('visible'));}
function splatHide(...els){els.forEach(e=>e.classList.remove('visible'));}

function splatEnterIdle(){splatState=SPLAT_STATE.IDLE;clearInterval(splatTicker);clearTimeout(splatLingerTimer);splatHide(splatPanel,splatBg,splatBlobLayer,splatGlowRing,splatCrackLayer);splatTimerNum.className='';splatBanner.className='';splatProgFill.classList.remove('danger');splatBurstLayer.innerHTML='';splatCrackSvg.innerHTML='';splatCrackLayer.querySelectorAll('.drip').forEach(d=>d.remove());if(baitEnabled)splatShow(idleBait);}
function splatEnterCountdown(){splatState=SPLAT_STATE.COUNTDOWN;clearInterval(splatTicker);clearTimeout(splatLingerTimer);splatHide(idleBait);splatTimeLeft=SPLAT_CONFIG.TIMER_SECONDS;splatHide(splatCrackLayer);splatCrackSvg.innerHTML='';splatBurstLayer.innerHTML='';splatCrackLayer.querySelectorAll('.drip').forEach(d=>d.remove());splatBanner.className='';splatBanner.textContent='';splatCountWrap.style.display='flex';splatProgFill.classList.remove('danger');splatProgFill.style.transition='none';splatProgFill.style.width='100%';requestAnimationFrame(()=>{splatProgFill.style.transition='width 0.9s linear,background 0.3s ease';});splatUpdateDisplay();splatShow(splatPanel,splatBg,splatBlobLayer,splatGlowRing);playSound('reset');splatTicker=setInterval(()=>{splatTimeLeft--;splatUpdateDisplay();if(splatTimeLeft<=0)splatEnterExpired();},1000);}
function splatEnterSaved(){if(splatState!==SPLAT_STATE.COUNTDOWN)return;splatState=SPLAT_STATE.SAVED;clearInterval(splatTicker);playSound('save');splatCountWrap.style.display='none';splatBanner.textContent=SPLAT_CONFIG.COPY_SAVED;splatBanner.className='saved-text';splatTriggerBurst();splatLingerTimer=setTimeout(splatEnterIdle,SPLAT_CONFIG.SAVED_LINGER_MS);}
function splatEnterExpired(){splatState=SPLAT_STATE.EXPIRED;clearInterval(splatTicker);playSound('expire');splatTimerNum.textContent='0';splatTimerNum.className='pulse-danger';splatProgFill.style.width='0%';setTimeout(()=>{splatCountWrap.style.display='none';splatBanner.textContent=SPLAT_CONFIG.COPY_EXPIRED;splatBanner.className='expired-text';splatTriggerCrack();},300);splatLingerTimer=setTimeout(splatEnterIdle,SPLAT_CONFIG.EXPIRED_LINGER_MS);}

let eventPromoConfig=mergeEventPromoConfig();
let eventPromoHideTimer=null,eventPromoRevealTimer=null,eventPromoAutoTimer=null,eventPromoAutoIndex=0;
const eventPromoImageChunks={};
const eventPromoAutoModes=['fight-card'];

function mergeEventPromoConfig(cfg){
  const src=cfg&&typeof cfg==='object'?cfg:{};
  const durations={...DEFAULT_EVENT_PROMO_CONFIG.durations,...(src.durations||{})};
  if(durations.autoIntervalMs===600000)durations.autoIntervalMs=60000;
  if(durations.paintballMs===13000)durations.paintballMs=60000;
  if(durations.fightCardMs===10000)durations.fightCardMs=15000;
  durations.paintballSplatMs=Math.max(1200,Number(durations.paintballSplatMs)||DEFAULT_EVENT_PROMO_CONFIG.durations.paintballSplatMs);
  return {
    ...DEFAULT_EVENT_PROMO_CONFIG,
    ...src,
    players: DEFAULT_EVENT_PROMO_CONFIG.players.map((p,i)=>({...p,...((src.players&&src.players[i])||{})})),
    fun: {...DEFAULT_EVENT_PROMO_CONFIG.fun,...(src.fun||{})},
    fonts: {...DEFAULT_EVENT_PROMO_CONFIG.fonts,...(src.fonts||{})},
    durations
  };
}

function epText(id,value){const el=document.getElementById(id);if(el)el.textContent=value||'';}
function epInitials(name){return String(name||'?').trim().split(/\s+/).slice(0,2).map(s=>s[0]||'').join('').toUpperCase()||'?';}
function epEscape(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

function renderEventPromo(){
  const cfg=eventPromoConfig;
  const root=document.getElementById('event-promo-root');
  if(root&&cfg.fonts){
    root.style.setProperty('--ep-shelf-title',(Number(cfg.fonts.shelfTitlePx)||31)+'px');
    root.style.setProperty('--ep-team-label',(Number(cfg.fonts.teamLabelPx)||22)+'px');
    root.style.setProperty('--ep-player-name',(Number(cfg.fonts.playerNamePx)||22)+'px');
    root.style.setProperty('--ep-meta',(Number(cfg.fonts.metaPx)||17)+'px');
  }
  epText('ep-eyebrow',cfg.eyebrow);
  epText('ep-title',cfg.title);
  epText('ep-date-time',cfg.dateTime);
  epText('ep-tagline',cfg.tagline);
  epText('ep-gamers-label',cfg.teamGamersLabel);
  epText('ep-battlers-label',cfg.teamBattlersLabel);
  epText('ep-passive-text-a',(cfg.passiveText||'')+'   ');
  epText('ep-passive-text-b',(cfg.passiveText||'')+'   ');
  const splatTitle=document.querySelector('.ep-splat-title');
  const splatDate=document.querySelector('.ep-splat-date');
  if(splatTitle)splatTitle.textContent=cfg.title;
  if(splatDate)splatDate.textContent=cfg.dateTime;
  epText('ep-fun-eyebrow',cfg.fun?.eyebrow||'');
  epText('ep-fun-title',cfg.fun?.title||'');
  epText('ep-fun-subtitle',cfg.fun?.subtitle||'');
  const funImgWrap=document.getElementById('ep-fun-image-wrap');
  if(funImgWrap){
    const image=cfg.fun?.image||'';
    funImgWrap.classList.toggle('has-image',!!image);
    funImgWrap.innerHTML=image?`<img src="${epEscape(image)}" alt="">`:'';
  }
  cfg.players.forEach((player,i)=>{
    const el=document.getElementById('ep-player-'+i);
    if(!el)return;
    const name=player.name||DEFAULT_EVENT_PROMO_CONFIG.players[i]?.name||'Player';

    el.innerHTML=`<div class="ep-avatar">${image?`<img src="${epEscape(image)}" alt="">`:epInitials(name)}</div><div class="ep-player-name">${epEscape(name)}</div>`;
