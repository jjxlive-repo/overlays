<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gift Bar + Splat Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Bebas+Neue&family=Boogaloo&family=DM+Sans:wght@700&display=swap" rel="stylesheet">
<script src="https://cdn.ably.com/lib/ably.min-2.js"></script>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 1080px; height: 1920px; overflow: hidden; background: transparent; }

/* ─── PARTICLE CANVAS (gift-bar gifts) ─── */
#particle-canvas {
  position: absolute; top: 0; left: 0;
  width: 1080px; height: 1920px;
  pointer-events: none; z-index: 50;
}

/* ─── SCREEN PULSE ─── */
#screen-pulse {
  position: absolute; inset: 0;
  pointer-events: none; z-index: 8;
  opacity: 0; transition: opacity 0.35s ease;
}

/* ══ GIFT BAR EDGE LINES ══ */
#bar-lines {
  position: absolute; top: 450px; left: 0;
  width: 1080px; height: 55px; pointer-events: none; z-index: 12;
}
#line-top, #line-bot {
  position: absolute; left: 0; right: 0; height: 1px;
  background: linear-gradient(to right, transparent 0%, transparent 30%,
    rgba(192,132,252,0.15) 55%, rgba(192,132,252,0.45) 80%, rgba(192,132,252,0.65) 100%);
  transition: background 0.9s ease, box-shadow 0.8s ease;
}
#line-top { top: 0; }
#line-bot { bottom: 0; }
#bar-lines.active #line-top,
#bar-lines.active #line-bot { animation: lineActivate 0.35s ease forwards; }
@keyframes lineActivate { from{opacity:0.10} to{opacity:1.00} }
#line-sweep-top, #line-sweep-bot {
  position: absolute; left: 0; right: 0; height: 1px; opacity: 0; pointer-events: none;
  background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.0) 30%,
    rgba(255,255,255,1.0) 50%, rgba(255,255,255,0.0) 70%, transparent 100%);
  background-size: 40% 100%;
}
#line-sweep-top { top: 0; }
#line-sweep-bot { bottom: 0; }
#bar-lines.active #line-sweep-top,
#bar-lines.active #line-sweep-bot { animation: lineSweep 1.1s ease-in-out var(--sweep-count, 2) forwards; }
@keyframes lineSweep {
  0%{background-position:-40% 0;opacity:0} 10%{opacity:1}
  90%{opacity:0.6} 100%{background-position:140% 0;opacity:0}
}
#line-sweep-bot { animation-delay: 0.08s; }

/* ══ GIFT BAR ══ */
#gift-bar {
  position: absolute; top: 450px; left: 0;
  width: 1080px; height: 55px; overflow: visible;
  opacity: 0; transition: opacity 0.6s ease; z-index: 10;
}
#gift-bar.visible { opacity: 1; }
#bar-bg-layer { position: absolute; inset: 0; overflow: hidden; }
#bar-bg {
  position: absolute; inset: 0;
  background: linear-gradient(to right, transparent 0%, rgba(5,0,14,0.03) 18%,
    rgba(5,0,14,0.26) 44%, rgba(5,0,14,0.68) 65%, rgba(5,0,14,0.76) 76%, rgba(5,0,14,0.76) 100%);
  transition: background 0.52s cubic-bezier(.34,1.56,.64,1);
}
#gift-bar.alert-active #bar-bg { background: rgba(5,0,14,0.76); }
#bar-wash { position: absolute; inset: 0; transition: background 0.9s ease; pointer-events: none; }
#bar-shimmer-flare {
  position: absolute; inset: 0;
  background: linear-gradient(115deg, transparent 15%, rgba(255,255,255,0.18) 50%, transparent 85%);
  background-size: 260% 100%; background-position: -260% 0; pointer-events: none;
  animation: barFlareSweep 5s ease-in-out infinite;
}
@keyframes barFlareSweep {
  0%{background-position:-260% 0;opacity:0} 8%{opacity:1}
  50%{background-position:260% 0;opacity:0} 100%{background-position:260% 0;opacity:0}
}
/* Gradient border lines — transparent on left, opaque on right, matching bg */
#bar-border { --bc: 192,132,252; position: absolute; inset: 0; pointer-events: none; }
#bar-border::before,
#bar-border::after {
  content: '';
  position: absolute; left: 0; right: 0; height: 1px;
  background: linear-gradient(to right,
    transparent 0%, transparent 20%,
    rgba(var(--bc),0.12) 38%,
    rgba(var(--bc),0.50) 65%,
    rgba(var(--bc),0.82) 100%);
  transition: background 0.9s ease;
}
#bar-border::before { top: 0; }
#bar-border::after  { bottom: 0; }
#bar-progress {
  position: absolute; bottom: 0; left: 0;
  height: 2px; width: 0%; border-radius: 0 1px 1px 0; transition: background 0.9s ease;
}
#bar-hero {
  position: absolute; left: 0; top: 0; width: 720px; height: 55px; overflow: visible;
  display: flex; align-items: center; gap: 18px; padding: 0 20px 0 18px;
  opacity: 0; transform: translateX(-22px); pointer-events: none;
  transition: opacity 0.36s ease 0.08s, transform 0.46s cubic-bezier(.34,1.56,.64,1) 0.06s;
}
#gift-bar.alert-active #bar-hero { opacity: 1; transform: translateX(0); }
#bar-hero-name {
  font-family: 'Anton', sans-serif; font-size: 90px; line-height: 1;
  text-transform: uppercase; color: #fff; letter-spacing: 1px; white-space: nowrap;
  overflow: visible; flex-shrink: 1; min-width: 0;
  text-shadow: 0 3px 18px rgba(0,0,0,0.95), 0 0 40px rgba(255,255,255,0.06);
}
#bar-hero-amount {
  font-family: 'Bebas Neue', sans-serif; font-size: 58px; letter-spacing: 4px;
  white-space: nowrap; flex-shrink: 0; overflow: visible;
}
#bar-info {
  position: absolute; right: 0; top: 0; width: auto; min-width: 260px; height: 55px; overflow: hidden;
  background: rgba(5,0,14,0.76); border-left: 1px solid rgba(255,255,255,0.06);
  display: flex; flex-direction: column; justify-content: center; align-items: flex-end;
  padding: 9px 14px 2px 14px; gap: 1px; transition: opacity 0.28s ease;
}
#bar-info-top { display: flex; align-items: center; gap: 7px; }
#bar-slot-title {
  font-family: 'DM Sans', sans-serif; font-size: 10px; font-weight: 700;
  letter-spacing: 0.14em; text-transform: uppercase; color: rgba(255,255,255,0.55); white-space: nowrap;
}
#bar-info-bot { display: flex; align-items: baseline; gap: 9px; }
#bar-info-name {
  font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 2px; color: #fff;
  white-space: nowrap; flex-shrink: 0; text-shadow: 0 2px 8px rgba(0,0,0,0.9);
}
#bar-info-amount {
  font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 2px;
  white-space: nowrap; flex-shrink: 0; transition: color 0.6s ease;
  text-shadow: -1px -1px 0 rgba(0,0,0,0.95), 1px -1px 0 rgba(0,0,0,0.95),
               -1px 1px 0 rgba(0,0,0,0.95), 1px 1px 0 rgba(0,0,0,0.95);
}
#bar-info-amount.monthly-shimmer { background: rgba(192,132,252,0.14); animation: monthlyGlow 1.4s ease-in-out infinite; }
@keyframes monthlyGlow {
  0%,100%{box-shadow:0 0 6px rgba(192,132,252,0.25)} 50%{box-shadow:0 0 22px rgba(232,121,249,0.70),0 0 40px rgba(168,85,247,0.35)}
}
#bar-plat-badge {
  font-family: 'DM Sans', sans-serif; font-size: 9px; font-weight: 700;
  letter-spacing: 0.10em; text-transform: uppercase; padding: 2px 6px; border-radius: 4px; white-space: nowrap; flex-shrink: 0;
}
.plat-tiktok  { color:#69C9D0;background:rgba(105,201,208,0.16);border:1px solid rgba(105,201,208,0.30); }
.plat-youtube { color:#FF6B6B;background:rgba(255,80,80,0.16);  border:1px solid rgba(255,80,80,0.30);   }
.plat-direct, .plat-default { color:#C084FC;background:rgba(192,132,252,0.16);border:1px solid rgba(192,132,252,0.30); }
#bar-hero-action {
  position: absolute; top: 60px; left: 18px;
  font-family: 'DM Sans', sans-serif; font-size: 22px; font-weight: 700;
  letter-spacing: 0.13em; text-transform: uppercase; color: rgba(255,255,255,0.92);
  white-space: nowrap; opacity: 0; transform: translateY(10px); pointer-events: none;
  transition: opacity 0.32s ease 0.22s, transform 0.42s cubic-bezier(.34,1.56,.64,1) 0.20s;
  text-shadow: 0 2px 10px rgba(0,0,0,0.97), 0 0 18px rgba(var(--plat-rgb),0.55);
}
#gift-bar.alert-active #bar-hero-action { opacity:1; transform:translateY(0); }
#bar-hero-gift-img {
  height:78px;width:78px;object-fit:contain;flex-shrink:0;display:none;
  filter:drop-shadow(0 0 10px rgba(var(--plat-rgb),0.85));
  animation:heroGlowPulse 1.4s ease-in-out infinite; image-rendering:-webkit-optimize-contrast;
}
@keyframes heroGlowPulse {
  0%,100%{filter:drop-shadow(0 0 4px rgba(var(--plat-rgb),0.55)) drop-shadow(0 0 0px transparent)}
  50%    {filter:drop-shadow(0 0 18px rgba(var(--plat-rgb),1.0)) drop-shadow(0 0 38px rgba(var(--plat-rgb),0.60))}
}
#gift-bar.alert-active #bar-hero-name  { animation:heroGlowPulse 1.4s ease-in-out infinite; }
#gift-bar.alert-active #bar-hero-amount{ animation:heroGlowPulse 1.4s ease-in-out infinite 0.18s; }

/* ─── STATUS DOT ─── */
#status-dot {
  position: absolute; top: 456px; left: 8px;
  width: 6px; height: 6px; border-radius: 50%;
  background: #444; z-index: 30; transition: background 0.3s;
}
#status-dot.connected  { background:#22c55e; box-shadow:0 0 5px rgba(34,197,94,0.7); }
#status-dot.connecting { background:#eab308; }

/* ══════════════════════════════════════════════════════════
   SPLAT OVERLAY
   All elements inside #splat-root.
   --splat-cy = vertical center Y of the splat zone (default 960px = canvas center).
   Updated via Ably "splat-pos" command from the dock.
══════════════════════════════════════════════════════════ */
#splat-root {
  --splat-cy: 960px;
  position: absolute; left: 0; top: 0;
  width: 1080px; height: 1920px;
  pointer-events: none; z-index: 20; overflow: hidden;
}

/* Ambient blobs */
.blob-layer { position:absolute;inset:0;pointer-events:none;opacity:0;transition:opacity 0.6s ease; }
.blob-layer.visible { opacity:1; }
.blob { position:absolute;border-radius:50%;filter:blur(2px); }

/* Glow ring */
#splat-glow-ring {
  position:absolute; left:540px; top:var(--splat-cy);
  transform:translate(-50%,-50%); width:900px; height:900px; border-radius:50%;
  background:radial-gradient(ellipse,rgba(168,85,247,0.15) 0%,transparent 70%);
  z-index:8; opacity:0;
  transition:opacity 0.6s ease, top 0.4s ease;
  animation:splatRingPulse 2s ease-in-out infinite;
}
#splat-glow-ring.visible { opacity:1; }
@keyframes splatRingPulse {
  0%,100%{transform:translate(-50%,-50%) scale(1)} 50%{transform:translate(-50%,-50%) scale(1.06)}
}

/* Splat background SVG */
#splat-bg {
  position:absolute; left:540px; top:var(--splat-cy);
  transform:translate(-50%,-50%); width:900px; height:280px;
  z-index:9; opacity:0;
  transition:opacity 0.5s ease, top 0.4s ease;
  filter:drop-shadow(0 0 40px rgba(168,85,247,0.6));
}
#splat-bg.visible { opacity:1; }

/* Panel (timer + banner) */
#splat-panel {
  position:absolute; left:540px; top:var(--splat-cy);
  transform:translate(-50%,calc(-50% + 40px)) scale(0.9);
  width:900px; display:flex; flex-direction:column; align-items:center; gap:24px;
  z-index:10; opacity:0; pointer-events:none;
  transition:opacity 0.5s cubic-bezier(.34,1.56,.64,1),
             transform 0.5s cubic-bezier(.34,1.56,.64,1),
             top 0.4s ease;
}
#splat-panel.visible { opacity:1; transform:translate(-50%,-50%) scale(1); }

/* Timer */
#splat-countdown-wrap { display:flex;flex-direction:column;align-items:center;gap:14px;width:100%; }
#splat-timer-number {
  font-family:'Boogaloo',cursive; font-size:200px; line-height:1; color:#FAF5FF;
  text-shadow:0 0 20px #A855F7,0 0 60px #7B2FBE,0 4px 0 rgba(0,0,0,0.4); letter-spacing:-6px;
}
#splat-timer-number.pulse-normal { animation:splatPulseNormal 1s ease-in-out infinite; }
#splat-timer-number.pulse-warn   { animation:splatPulseWarn 0.5s ease-in-out infinite; }
#splat-timer-number.pulse-danger { animation:splatPulseDanger 0.25s ease-in-out infinite; }
@keyframes splatPulseNormal { 0%,100%{transform:scale(1)} 50%{transform:scale(1.04)} }
@keyframes splatPulseWarn   { 0%,100%{transform:scale(1);color:#FAF5FF} 50%{transform:scale(1.08);color:#E879F9} }
@keyframes splatPulseDanger {
  0%,100%{transform:scale(1);color:#E879F9;text-shadow:0 0 20px #F43F5E,0 0 60px #F43F5E}
  50%    {transform:scale(1.14);color:#F43F5E;text-shadow:0 0 40px #F43F5E,0 0 100px #F43F5E}
}
#splat-countdown-label {
  font-family:'Boogaloo',cursive; font-size:42px; color:#FAF5FF;
  text-shadow:0 0 16px #A855F7,0 2px 0 rgba(0,0,0,0.5);
  text-align:center; letter-spacing:1px; padding:0 20px;
}
#splat-progress-track {
  width:800px; height:16px; background:rgba(255,255,255,0.12);
  border-radius:8px; overflow:hidden; box-shadow:0 0 12px rgba(168,85,247,0.4);
}
#splat-progress-fill {
  height:100%; background:linear-gradient(90deg,#7B2FBE,#E879F9,#C084FC);
  border-radius:8px; width:100%; transition:width 0.9s linear,background 0.3s ease;
}
#splat-progress-fill.danger { background:linear-gradient(90deg,#7F1D1D,#F43F5E,#FB7185); }

/* State banners */
#splat-state-banner {
  font-family:'Boogaloo',cursive; font-size:80px; color:#FAF5FF;
  text-align:center; letter-spacing:2px; padding:0 40px;
  text-shadow:0 0 30px #A855F7,0 4px 0 rgba(0,0,0,0.5);
}
#splat-state-banner.saved-text {
  color:#C084FC; text-shadow:0 0 40px #E879F9,0 0 80px #A855F7,0 4px 0 rgba(0,0,0,0.5);
  animation:splatSavedBounce 0.6s cubic-bezier(.34,1.56,.64,1) forwards;
}
#splat-state-banner.expired-text {
  color:#F43F5E; text-shadow:0 0 40px #F43F5E,0 0 80px #7F1D1D,0 4px 0 rgba(0,0,0,0.5);
  animation:splatExpiredShake 0.6s ease forwards;
}
@keyframes splatSavedBounce {
  0%{transform:scale(0.5) rotate(-6deg);opacity:0} 60%{transform:scale(1.15) rotate(2deg);opacity:1} 100%{transform:scale(1) rotate(0deg);opacity:1}
}
@keyframes splatExpiredShake {
  0%,100%{transform:translateX(0) scale(1)} 15%{transform:translateX(-18px) scale(1.05)}
  30%{transform:translateX(14px) scale(1.05)} 45%{transform:translateX(-10px)} 60%{transform:translateX(8px)} 75%{transform:translateX(-4px)}
}

/* Burst layer */
#splat-burst-layer { position:absolute;inset:0;pointer-events:none;z-index:25;overflow:hidden; }
.splat-particle { position:absolute;border-radius:50% 70% 50% 70% / 60% 50% 70% 50%;opacity:0;transform:scale(0); }

/* Crack/drip layer */
#splat-crack-layer { position:absolute;inset:0;pointer-events:none;z-index:22;opacity:0;transition:opacity 0.3s ease; }
#splat-crack-layer.visible { opacity:1; }
.drip { position:absolute;top:0;border-radius:0 0 50% 50%;opacity:0;transform-origin:top center; }

/* Idle bait widget — tracks splat center Y with smooth transition */
#idle-bait {
  position:absolute; z-index:10;
  left:40px; top:calc(var(--splat-cy) - 35px);
  transform:translateX(-30px) scale(0.92);
  width:215px; padding:9px 11px;
  display:flex; align-items:center; justify-content:flex-start; gap:8px;
  background:rgba(20,0,40,0.78); border:2px solid rgba(168,85,247,0.55);
  border-radius:10px; box-shadow:0 0 24px rgba(168,85,247,0.35),inset 0 0 20px rgba(59,7,100,0.4);
  opacity:0; pointer-events:none;
  transition:opacity 0.55s cubic-bezier(.4,0,.2,1),
             transform 0.55s cubic-bezier(.34,1.56,.64,1),
             top 0.4s ease;
}
#idle-bait.visible { opacity:1; transform:translateX(0) scale(1); animation:baitGlow 3s ease-in-out infinite; }
@keyframes baitGlow {
  0%,100%{box-shadow:0 0 24px rgba(168,85,247,0.35),inset 0 0 20px rgba(59,7,100,0.4)}
  50%    {box-shadow:0 0 55px rgba(168,85,247,0.7), inset 0 0 28px rgba(59,7,100,0.5)}
}
#bait-inner { display:flex;align-items:center;gap:8px;width:100%;transform-origin:center center; }
#idle-bait.visible #bait-inner { animation:baitWiggle 15s ease-in-out 2s infinite; }
@keyframes baitWiggle {
  0%,92%,100%{transform:rotate(0deg) scale(1)} 93%{transform:rotate(-5deg) scale(0.97)}
  94.5%{transform:rotate(6deg) scale(1.03)} 96%{transform:rotate(-4deg) scale(0.98)}
  97.5%{transform:rotate(4deg) scale(1.02)} 99%{transform:rotate(-1deg) scale(1)}
}
#bait-galaxy-img {
  width:45px;height:45px;object-fit:contain;flex-shrink:0;
  filter:drop-shadow(0 0 10px rgba(232,121,249,0.8)) drop-shadow(0 0 22px rgba(168,85,247,0.6));
  animation:baitFloat 2.6s ease-in-out infinite;
}
@keyframes baitFloat { 0%,100%{transform:translateY(0) scale(1)} 50%{transform:translateY(-3px) scale(1.04)} }
#bait-text { display:flex;flex-direction:column;align-items:flex-start;gap:1px; }
#bait-label-send {
  font-family:'Boogaloo',cursive; font-size:15px; color:rgba(192,132,252,0.95);
  letter-spacing:2px; text-transform:uppercase; text-shadow:0 0 12px rgba(168,85,247,0.6); line-height:1;
}
#bait-label-main {
  font-family:'Boogaloo',cursive; font-size:29px; line-height:1; color:#FAF5FF; letter-spacing:3px;
  text-shadow:0 0 16px rgba(232,121,249,0.95),0 0 36px rgba(168,85,247,0.75),0 3px 0 rgba(0,0,0,0.55);
  animation:baitTextGlow 3s ease-in-out infinite;
}
@keyframes baitTextGlow {
  0%,100%{text-shadow:0 0 16px rgba(232,121,249,0.9),0 0 36px rgba(168,85,247,0.7),0 3px 0 rgba(0,0,0,0.55)}
  50%    {text-shadow:0 0 28px rgba(232,121,249,1),0 0 60px rgba(168,85,247,0.9),0 3px 0 rgba(0,0,0,0.55)}
}
.bait-sparkle {
  position:absolute;border-radius:50%;background:#E879F9;opacity:0;pointer-events:none;
  animation:baitSparkle var(--dur) var(--del) ease-in-out infinite;
}
@keyframes baitSparkle { 0%,100%{opacity:0;transform:scale(0)} 50%{opacity:0.9;transform:scale(1)} }

/* ─── ANNOUNCE BOX ─── */
#announce-box {
  --ax: 540px; --ay: 200px;
  --aw: 800px; --afm: 76px; --afs: 40px;
  position: absolute; z-index: 15; pointer-events: none;
  /* clamp keeps box fully within 0–1080px canvas regardless of X position */
  left: clamp(calc(var(--aw) / 2), var(--ax), calc(1080px - var(--aw) / 2));
  top: var(--ay);
  transform: translate(-50%, calc(-50% + 18px)) scale(0.92);
  opacity: 0;
  transition: opacity 0.45s cubic-bezier(.34,1.56,.64,1),
              transform 0.45s cubic-bezier(.34,1.56,.64,1),
              left 0.38s ease, top 0.38s ease,
              width 0.25s ease;
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  padding: 24px 44px 22px;
  width: var(--aw); text-align: center;
  background: linear-gradient(160deg, rgba(14,0,38,0.93), rgba(6,0,20,0.90));
  border-radius: 22px;
  border: 2px solid rgba(168,85,247,0.75);
  box-shadow:
    0 0 0 1px rgba(168,85,247,0.12),
    0 0 35px rgba(168,85,247,0.50),
    0 0 90px rgba(168,85,247,0.22),
    inset 0 0 30px rgba(59,7,100,0.45);
  animation: announceGlow 3.2s ease-in-out infinite;
  overflow: hidden;
}
#announce-box.visible {
  opacity: 1;
  transform: translate(-50%, -50%) scale(1);
}
#announce-box::after {
  content: '';
  position: absolute; top: 0; left: -100%; width: 60%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(232,121,249,0.06), transparent);
  animation: announceSweep 5s ease-in-out 1s infinite;
  pointer-events: none;
}
@keyframes announceSweep { 0%{left:-100%} 60%,100%{left:160%} }
@keyframes announceGlow {
  0%,100% {
    box-shadow: 0 0 0 1px rgba(168,85,247,0.12), 0 0 35px rgba(168,85,247,0.50), 0 0 90px rgba(168,85,247,0.22), inset 0 0 30px rgba(59,7,100,0.45);
    border-color: rgba(168,85,247,0.75);
  }
  50% {
    box-shadow: 0 0 0 1px rgba(232,121,249,0.22), 0 0 60px rgba(232,121,249,0.70), 0 0 130px rgba(168,85,247,0.32), inset 0 0 45px rgba(59,7,100,0.55);
    border-color: rgba(232,121,249,0.95);
  }
}
#announce-live-badge {
  font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 700;
  letter-spacing: 0.20em; text-transform: uppercase;
  color: #F43F5E; background: rgba(244,63,94,0.14);
  border: 1px solid rgba(244,63,94,0.50); border-radius: 7px;
  padding: 3px 11px; display: inline-block; margin-bottom: 6px;
  animation: livePulse 1.8s ease-in-out infinite;
}
@keyframes livePulse { 0%,100%{opacity:1;color:#F43F5E} 50%{opacity:0.65;color:#FB7185} }
#announce-text {
  font-family: 'Boogaloo', cursive; font-size: var(--afm); line-height: 1.0;
  color: #FAF5FF; letter-spacing: 2px;
  white-space: normal; word-break: break-word; width: 100%;

<script>
/* ══ CONFIG ══ */
const CONFIG = {
  ROTATE_MS: 5000, MONTHLY_LINGER_MS: 3500,
  ABLY_KEY: 'Y8e-eA.l0VHlg:aJXsEfu1Be4BYsAeATRMI3w30YAKSs_LyF3DPoesIz0',
  ABLY_CHANNEL: 'splat-overlay',
};
const SPLAT_CONFIG = {
  TIMER_SECONDS: 60, WARN_THRESHOLD: 20, DANGER_THRESHOLD: 10,
  COPY_COUNTDOWN: "⚠️ Galaxy/DONO to SAVE",
  COPY_SAVED: "💜 SAVED! !W", COPY_EXPIRED: "💀 RESET. GG.",
  SAVED_LINGER_MS: 5000, EXPIRED_LINGER_MS: 7000,
};
/* Overlay position presets — Y center in pixels on the 1920px canvas */
const SPLAT_POSITIONS = { top:280, upper:600, center:960, lower:1300, bottom:1640 };
let currentSplatPos = 'center';

/* ══ GIFT BAR: TIERS / PLATFORMS ══ */
const TIER_CONFIG = [
  null,
  { duration:5000,  particles:0,   sweeps:1, pulseLines:false },
  { duration:6500,  particles:30,  sweeps:2, pulseLines:false },
  { duration:7500,  particles:60,  sweeps:3, pulseLines:false },
  { duration:9000,  particles:120, sweeps:4, pulseLines:true  },
  { duration:11000, particles:200, sweeps:5, pulseLines:true  },
  { duration:13000, particles:350, sweeps:6, pulseLines:true  },
];
const SLOT_DEFS = [
  {key:'daily',  label:'Daily Top Gifter'  },{key:'weekly', label:'Weekly Top Gifter' },
  {key:'monthly',label:'Monthly Top Gifter'},{key:'youtube',label:'Top YouTube Gifter'},
  {key:'tiktok', label:'Top TikTok Gifter' },{key:'custom', label:'Featured Gifter'   },
];
const PLAT_COLORS = {
  tiktok:  {wash:'rgba(105,201,208,0.08)',edge:'#69C9D0',edgeRgb:'105,201,208',particles:['#69C9D0','#EE1D52','#fff','#ff80ab','#00eeff'],pulse:'rgba(105,201,208,0.24)'},
  youtube: {wash:'rgba(255,80,80,0.08)',  edge:'#FF6B6B',edgeRgb:'255,107,107',particles:['#FF6B6B','#FF0000','#fff','#ffcc00','#ff4444'],pulse:'rgba(255,80,80,0.24)'  },
  direct:  {wash:'rgba(192,132,252,0.08)',edge:'#C084FC',edgeRgb:'192,132,252',particles:['#C084FC','#E879F9','#fff','#A855F7','#FAF5FF'],pulse:'rgba(192,132,252,0.24)'},
  default: {wash:'rgba(192,132,252,0.08)',edge:'#C084FC',edgeRgb:'192,132,252',particles:['#C084FC','#E879F9','#fff','#A855F7','#FAF5FF'],pulse:'rgba(192,132,252,0.24)'},
};

/* ══ GIFT BAR STATE ══ */
let leaderboard={}, activeSlots=SLOT_DEFS.slice(0,5);
let currentIdx=0, rotateTimer=null, progressAnim=null;
let pinned=false, alertQueue=[], alertActive=false;
let alertTimeout=null, infoFadeTimer=null, monthlyTimer=null, activePlat='default';

/* ══ GIFT BAR UTILS ══ */
function fmtAmount(a,t){const n=Number(a)||0;if(t==='tiktok_coins')return n.toLocaleString()+' COINS';if(t==='youtube_jewels')return n.toLocaleString()+' JEWELS';if(t==='youtube_superchat'||t==='direct_donation')return '$'+(Number.isInteger(n)?n.toLocaleString():n.toFixed(2));return n.toLocaleString();}
function platKey(p){return['tiktok','youtube','direct'].includes(p)?p:'default';}
function platLabel(p){if(p==='tiktok')return'♪ TikTok';if(p==='youtube')return'▶ YouTube';if(p==='direct')return'💚 Direct';return'🎁 Gift';}
function getTier(a,t){const n=Number(a)||0;if(t==='tiktok_coins'||t==='youtube_jewels'){if(n<50)return 0;if(n<1000)return 1;if(n<5000)return 2;if(n<25000)return 3;if(n<100000)return 4;if(n<250000)return 5;return 6;}if(n<1)return 0;if(n<10)return 1;if(n<50)return 2;if(n<100)return 3;if(n<250)return 4;if(n<400)return 5;return 6;}

/* ══ GIFT BAR PARTICLES ══ */
const pCanvas=document.getElementById('particle-canvas'),pCtx=pCanvas.getContext('2d');
let pList=[],pRaf=null;
function emitParticles(tier,plat){const cfg=TIER_CONFIG[tier];if(!cfg||cfg.particles===0)return;const colors=PLAT_COLORS[plat].particles;for(let i=0;i<cfg.particles;i++){const a=Math.random()*Math.PI*2,sp=(3+Math.random()*tier*3.2)*(0.6+Math.random()*0.8);pList.push({x:200+Math.random()*680,y:455+Math.random()*20,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-1,color:colors[Math.floor(Math.random()*colors.length)],size:2+Math.random()*tier*1.5,life:0.7+Math.random()*0.3,decay:0.003+Math.random()*(0.007/Math.max(tier,1)),type:Math.random()<0.5?'rect':'circle',rot:Math.random()*Math.PI*2,rotV:(Math.random()-0.5)*0.12});}if(!pRaf)pTick();}
function pTick(){pCtx.clearRect(0,0,1080,1920);pList=pList.filter(p=>p.life>0.01);for(const p of pList){p.x+=p.vx;p.y+=p.vy;p.vy+=0.2;p.vx*=0.993;p.life-=p.decay;p.rot+=p.rotV;pCtx.save();pCtx.globalAlpha=Math.max(0,Math.min(1,p.life));pCtx.fillStyle=p.color;pCtx.translate(p.x,p.y);pCtx.rotate(p.rot);if(p.type==='rect'){pCtx.fillRect(-p.size*.5,-p.size,p.size,p.size*2);}else{pCtx.beginPath();pCtx.arc(0,0,p.size/2,0,Math.PI*2);pCtx.fill();}pCtx.restore();}pCtx.globalAlpha=1;pRaf=pList.length?requestAnimationFrame(pTick):null;}
function clearParticles(){pList=[];if(pRaf){cancelAnimationFrame(pRaf);pRaf=null;}pCtx.clearRect(0,0,1080,1920);}

/* ══ GIFT BAR SCREEN PULSE ══ */
function triggerScreenPulse(plat,tier){if(tier<4)return;const pc=PLAT_COLORS[plat],sp=document.getElementById('screen-pulse'),sz=(tier-3)*65;function pulse(d){setTimeout(()=>{sp.style.boxShadow=`inset 0 0 ${sz}px ${sz*.55}px ${pc.pulse}`;sp.style.opacity='1';setTimeout(()=>{sp.style.opacity='0';},700);},d);}pulse(0);if(tier>=5)pulse(1300);if(tier>=6)pulse(2500);}

/* ══ GIFT BAR EDGE LINES ══ */
function activateLines(plat,tier){const pc=PLAT_COLORS[plat],rgb=pc.edgeRgb,lines=document.getElementById('bar-lines'),top=document.getElementById('line-top'),bot=document.getElementById('line-bot'),sweepCount=TIER_CONFIG[tier]?.sweeps??2;const glow=tier>=4?`0 0 ${6+tier*3}px rgba(${rgb},0.9),0 0 ${14+tier*6}px rgba(${rgb},0.5)`:`0 0 6px rgba(${rgb},0.7)`;top.style.background=bot.style.background=`rgba(${rgb},1)`;top.style.boxShadow=bot.style.boxShadow=glow;lines.style.setProperty('--sweep-count',sweepCount);lines.classList.remove('active');void lines.offsetWidth;lines.classList.add('active');}
function deactivateLines(){const lines=document.getElementById('bar-lines'),top=document.getElementById('line-top'),bot=document.getElementById('line-bot');lines.classList.remove('active');top.style.background=bot.style.background='rgba(192,132,252,0.10)';top.style.boxShadow=bot.style.boxShadow='none';}
let linePulseInterval=null;
function startLinePulse(plat){stopLinePulse();const pc=PLAT_COLORS[plat],rgb=pc.edgeRgb,top=document.getElementById('line-top'),bot=document.getElementById('line-bot');let bright=true;linePulseInterval=setInterval(()=>{const glow=bright?`0 0 18px rgba(${rgb},1),0 0 40px rgba(${rgb},0.7)`:`0 0 6px rgba(${rgb},0.6)`;top.style.boxShadow=bot.style.boxShadow=glow;bright=!bright;},500);}
function stopLinePulse(){if(linePulseInterval){clearInterval(linePulseInterval);linePulseInterval=null;}}

/* ══ GIFT BAR PROGRESS LINE ══ */
function startProgress(ms){if(progressAnim){cancelAnimationFrame(progressAnim);progressAnim=null;}const bar=document.getElementById('bar-progress'),start=performance.now();bar.style.width='0%';function tick(now){const pct=Math.min(100,((now-start)/ms)*100);bar.style.width=pct+'%';progressAnim=pct<100?requestAnimationFrame(tick):null;}progressAnim=requestAnimationFrame(tick);}

/* ══ GIFT BAR INFO ══ */
function setBarInfo(title,name,amtText,amtColor,amtRgb,platText,platClass,monthly){const info=document.getElementById('bar-info');clearTimeout(infoFadeTimer);info.style.opacity='0';infoFadeTimer=setTimeout(()=>{document.getElementById('bar-slot-title').textContent=title;document.getElementById('bar-info-name').textContent=name;const amtEl=document.getElementById('bar-info-amount');amtEl.textContent=amtText;amtEl.style.color=amtColor;amtEl.style.textShadow=['-1px -1px 0 rgba(0,0,0,0.95)','1px -1px 0 rgba(0,0,0,0.95)','-1px 1px 0 rgba(0,0,0,0.95)','1px 1px 0 rgba(0,0,0,0.95)',`0 0 14px rgba(${amtRgb},0.55)`].join(', ');amtEl.classList.toggle('monthly-shimmer',!!monthly);const badge=document.getElementById('bar-plat-badge');badge.textContent=platText;badge.className='bar-plat '+platClass;info.style.opacity='1';},240);}

/* ══ GIFT BAR SLOT DISPLAY ══ */
function showSlot(idx){if(!activeSlots.length)return;currentIdx=((idx%activeSlots.length)+activeSlots.length)%activeSlots.length;const slotDef=activeSlots[currentIdx],entry=leaderboard[slotDef.key]??null,plat=entry?platKey(entry.platform):'default',pc=PLAT_COLORS[plat];activePlat=plat;setBarInfo(slotDef.label.toUpperCase(),entry?.name?entry.name.toUpperCase():'—',entry?fmtAmount(entry.amount,entry.type):'',pc.edge,pc.edgeRgb,platLabel(entry?.platform),'bar-plat plat-'+plat,false);document.getElementById('bar-wash').style.background=`linear-gradient(180deg,${pc.wash} 0%,rgba(5,0,14,0) 100%)`;document.getElementById('bar-progress').style.background=pc.edge;const lineGrad=`linear-gradient(to right,transparent 0%,transparent 28%,rgba(${pc.edgeRgb},0.12) 50%,rgba(${pc.edgeRgb},0.40) 78%,rgba(${pc.edgeRgb},0.65) 100%)`;document.getElementById('line-top').style.background=document.getElementById('line-bot').style.background=lineGrad;document.getElementById('bar-bg').style.background=`linear-gradient(to right,transparent 0%,rgba(5,0,14,0.03) 18%,rgba(${pc.edgeRgb},0.03) 40%,rgba(5,0,14,0.26) 44%,rgba(5,0,14,0.68) 65%,rgba(5,0,14,0.76) 76%,rgba(5,0,14,0.76) 100%)`;document.getElementById('bar-border').style.setProperty('--bc',pc.edgeRgb);startProgress(CONFIG.ROTATE_MS);}

/* ══ GIFT BAR ROTATION ══ */
function startRotation(){stopRotation();if(!activeSlots.length)return;rotateTimer=setInterval(()=>{if(!pinned&&!alertActive)showSlot(currentIdx+1);},CONFIG.ROTATE_MS);}
function stopRotation(){if(rotateTimer){clearInterval(rotateTimer);rotateTimer=null;}if(progressAnim){cancelAnimationFrame(progressAnim);progressAnim=null;}}

/* ══ GIFT BAR GIFTR DATA ══ */
function onGiftrData(data){leaderboard={};let hasAny=false;SLOT_DEFS.forEach(d=>{if(data[d.key]){leaderboard[d.key]=data[d.key];hasAny=true;}});const enabled=Array.isArray(data.enabledSlots)?data.enabledSlots:['daily','weekly','monthly','youtube','tiktok'];activeSlots=SLOT_DEFS.filter(d=>d.key==='custom'?!!data.custom:enabled.includes(d.key));const bar=document.getElementById('gift-bar');if(!hasAny||!activeSlots.length){bar.classList.remove('visible');stopRotation();return;}bar.classList.add('visible');if(currentIdx>=activeSlots.length)currentIdx=0;if(!alertActive){showSlot(currentIdx);startRotation();}}

/* ══ GIFT BAR ALERT SYSTEM ══ */
let _lastAlertKey=null,_lastAlertTime=0;
function onGiftAlert(data){const tier=getTier(data.amount,data.type);if(tier===0)return;const key=`${(data.name||'').toLowerCase()}|${data.amount}|${data.type}`,now=Date.now();if(key===_lastAlertKey&&now-_lastAlertTime<4000)return;_lastAlertKey=key;_lastAlertTime=now;alertQueue.push({...data,tier});if(!alertActive)runNextAlert();}
function runNextAlert(){if(!alertQueue.length){alertActive=false;runMonthlyMoment();return;}alertActive=true;showAlert(alertQueue.shift());}
function showAlert(alert){const{name,amount,type,platform,tier}=alert,plat=platKey(platform),pc=PLAT_COLORS[plat],cfg=TIER_CONFIG[tier];stopRotation();clearTimeout(alertTimeout);activePlat=plat;setBarInfo('JUST GIFTED',name.toUpperCase(),fmtAmount(amount,type),pc.edge,pc.edgeRgb,platLabel(platform),'bar-plat plat-'+plat,false);document.getElementById('bar-wash').style.background=`linear-gradient(180deg,${pc.wash} 0%,rgba(5,0,14,0) 100%)`;document.getElementById('bar-progress').style.background=pc.edge;document.getElementById('bar-border').style.setProperty('--bc',pc.edgeRgb);if(tier===1){activateLines(plat,tier);alertTimeout=setTimeout(dismissAlert,cfg.duration);return;}const heroName=document.getElementById('bar-hero-name'),heroAmt=document.getElementById('bar-hero-amount');heroName.textContent=name.toUpperCase();heroAmt.textContent=fmtAmount(amount,type);heroAmt.style.color=pc.edge;heroAmt.style.textShadow=['0 3px 10px rgba(0,0,0,0.98)','0 6px 22px rgba(0,0,0,0.85)',`0 0 12px rgba(${pc.edgeRgb},1.0)`,`0 0 30px rgba(${pc.edgeRgb},0.85)`,`0 0 65px rgba(${pc.edgeRgb},0.55)`,`0 0 120px rgba(${pc.edgeRgb},0.25)`].join(', ');const heroImg=document.getElementById('bar-hero-gift-img');if(alert.contentImg){heroImg.src=alert.contentImg;heroImg.style.display='block';}else{heroImg.style.display='none';}document.getElementById('gift-bar').style.setProperty('--plat-rgb',pc.edgeRgb);document.getElementById('bar-hero-action').textContent=name.toUpperCase()+' JUST SENT '+fmtAmount(amount,type)+'!';document.getElementById('gift-bar').classList.add('alert-active');activateLines(plat,tier);if(cfg.pulseLines)startLinePulse(plat);emitParticles(tier,plat);triggerScreenPulse(plat,tier);alertTimeout=setTimeout(dismissAlert,cfg.duration);}
function dismissAlert(){clearTimeout(alertTimeout);stopLinePulse();deactivateLines();clearParticles();document.getElementById('gift-bar').classList.remove('alert-active');document.getElementById('bar-hero-action').textContent='';const _img=document.getElementById('bar-hero-gift-img');_img.style.display='none';_img.src='';runNextAlert();}

/* ══ GIFT BAR MONTHLY MOMENT ══ */
function runMonthlyMoment(){const monthly=leaderboard.monthly;if(!monthly){resumeFromAlert();return;}const plat=platKey(monthly.platform),pc=PLAT_COLORS[plat];setBarInfo('MONTHLY TOTAL',monthly.name.toUpperCase(),fmtAmount(monthly.amount,monthly.type),pc.edge,pc.edgeRgb,platLabel(monthly.platform),'bar-plat plat-'+plat,true);document.getElementById('bar-wash').style.background=`linear-gradient(180deg,${pc.wash} 0%,rgba(5,0,14,0) 100%)`;const top=document.getElementById('line-top'),bot=document.getElementById('line-bot');top.style.background=bot.style.background=`rgba(${pc.edgeRgb},0.25)`;top.style.boxShadow=bot.style.boxShadow=`0 0 8px rgba(${pc.edgeRgb},0.4)`;clearTimeout(monthlyTimer);monthlyTimer=setTimeout(resumeFromAlert,CONFIG.MONTHLY_LINGER_MS);}
function resumeFromAlert(){document.getElementById('bar-info-amount').classList.remove('monthly-shimmer');deactivateLines();if(activeSlots.length)showSlot(currentIdx);startRotation();}

/* ══ GIFT BAR GIFTR CMD ══ */
function onGiftrCmd(data){const cmd=String(data??'');if(cmd==='auto'){pinned=false;if(!alertActive)startRotation();}else if(cmd.startsWith('slot:')){const key=cmd.slice(5),idx=activeSlots.findIndex(s=>s.key===key);if(idx>=0){pinned=true;stopRotation();showSlot(idx);}}}

/* ══════════════════════════════════════════════════
   SPLAT OVERLAY JS
══════════════════════════════════════════════════ */
function addSplatStyle(css){const s=document.createElement('style');s.textContent=css;document.head.appendChild(s);}

/* DOM refs */
const splatRoot=document.getElementById('splat-root'),splatPanel=document.getElementById('splat-panel'),splatBg=document.getElementById('splat-bg'),splatBlobLayer=document.getElementById('blob-layer'),splatGlowRing=document.getElementById('splat-glow-ring'),splatTimerNum=document.getElementById('splat-timer-number'),splatCountLabel=document.getElementById('splat-countdown-label'),splatProgFill=document.getElementById('splat-progress-fill'),splatBanner=document.getElementById('splat-state-banner'),splatBurstLayer=document.getElementById('splat-burst-layer'),splatCrackLayer=document.getElementById('splat-crack-layer'),splatCrackSvg=document.getElementById('splat-crack-svg'),splatCountWrap=document.getElementById('splat-countdown-wrap'),idleBait=document.getElementById('idle-bait');
splatCountLabel.textContent=SPLAT_CONFIG.COPY_COUNTDOWN;

/* Sparkles */
[{size:5,top:"12%",left:"8%",dur:"2.1s",del:"0s"},{size:4,top:"80%",left:"14%",dur:"2.8s",del:"0.4s"},{size:6,top:"20%",left:"90%",dur:"2.4s",del:"0.9s"},{size:3,top:"70%",left:"82%",dur:"1.9s",del:"1.3s"},{size:4,top:"50%",left:"4%",dur:"3.1s",del:"0.6s"},{size:5,top:"88%",left:"55%",dur:"2.2s",del:"1.8s"}].forEach(s=>{const el=document.createElement('div');el.className='bait-sparkle';el.style.cssText=`width:${s.size}px;height:${s.size}px;top:${s.top};left:${s.left};--dur:${s.dur};--del:${s.del};`;idleBait.appendChild(el);});

/* Ambient blobs */
[{w:300,h:240,x:54,y:672,c:"#7B2FBE",o:0.22,d:8},{w:240,h:180,x:702,y:1056,c:"#A855F7",o:0.18,d:11},{w:160,h:130,x:432,y:288,c:"#9333EA",o:0.14,d:7},{w:110,h:90,x:108,y:1152,c:"#C084FC",o:0.16,d:9},{w:140,h:100,x:756,y:480,c:"#6D28D9",o:0.14,d:13}].forEach((b,i)=>{const el=document.createElement('div');el.className='blob';el.style.cssText=`width:${b.w}px;height:${b.h}px;left:${b.x}px;top:${b.y}px;background:radial-gradient(ellipse,${b.c} 0%,transparent 70%);opacity:${b.o};animation:splatBlobDrift${i} ${b.d}s ease-in-out infinite alternate;`;splatBlobLayer.appendChild(el);const dx=(i%2===0?1:-1)*25,dy=(i%3===0?-1:1)*18,dr=(i%2===0?3:-3);addSplatStyle(`@keyframes splatBlobDrift${i}{from{transform:translate(0,0) scale(1) rotate(0deg)}to{transform:translate(${dx}px,${dy}px) scale(1.08) rotate(${dr}deg)}}`);});

/* Audio */
let audioCtx=null;
function ensureAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();}
function playSound(type){try{ensureAudio();const ctx=audioCtx,now=ctx.currentTime;if(type==='reset'){[0,0.12].forEach((delay,i)=>{const osc=ctx.createOscillator(),g=ctx.createGain();osc.connect(g);g.connect(ctx.destination);osc.type='sawtooth';osc.frequency.setValueAtTime(220*(i===0?1.5:1),now+delay);g.gain.setValueAtTime(0.3,now+delay);g.gain.exponentialRampToValueAtTime(0.001,now+delay+0.18);osc.start(now+delay);osc.stop(now+delay+0.2);});}else if(type==='save'){[0,0.10,0.22,0.36].forEach((delay,i)=>{const freq=880*[1,1.25,1.5,2][i],osc=ctx.createOscillator(),g=ctx.createGain();osc.connect(g);g.connect(ctx.destination);osc.type='sine';osc.frequency.setValueAtTime(freq,now+delay);g.gain.setValueAtTime(0.35,now+delay);g.gain.exponentialRampToValueAtTime(0.001,now+delay+0.4);osc.start(now+delay);osc.stop(now+delay+0.45);});}else if(type==='expire'){const osc=ctx.createOscillator(),g=ctx.createGain();osc.connect(g);g.connect(ctx.destination);osc.type='sawtooth';osc.frequency.setValueAtTime(220,now);osc.frequency.exponentialRampToValueAtTime(55,now+0.8);g.gain.setValueAtTime(0.4,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.9);osc.start(now);osc.stop(now+1.0);}}catch(e){}}

/* State machine */
const SPLAT_STATE={IDLE:'idle',COUNTDOWN:'countdown',SAVED:'saved',EXPIRED:'expired'};
let splatState=SPLAT_STATE.IDLE,splatTimeLeft=SPLAT_CONFIG.TIMER_SECONDS,splatTicker=null,splatLingerTimer=null;
let baitEnabled=true;
function splatShow(...els){els.forEach(e=>e.classList.add('visible'));}
function splatHide(...els){els.forEach(e=>e.classList.remove('visible'));}

function splatEnterIdle(){splatState=SPLAT_STATE.IDLE;clearInterval(splatTicker);clearTimeout(splatLingerTimer);splatHide(splatPanel,splatBg,splatBlobLayer,splatGlowRing,splatCrackLayer);splatTimerNum.className='';splatBanner.className='';splatProgFill.classList.remove('danger');splatBurstLayer.innerHTML='';splatCrackSvg.innerHTML='';splatCrackLayer.querySelectorAll('.drip').forEach(d=>d.remove());if(baitEnabled)splatShow(idleBait);}
function splatEnterCountdown(){splatState=SPLAT_STATE.COUNTDOWN;clearInterval(splatTicker);clearTimeout(splatLingerTimer);splatHide(idleBait);splatTimeLeft=SPLAT_CONFIG.TIMER_SECONDS;splatHide(splatCrackLayer);splatCrackSvg.innerHTML='';splatBurstLayer.innerHTML='';splatCrackLayer.querySelectorAll('.drip').forEach(d=>d.remove());splatBanner.className='';splatBanner.textContent='';splatCountWrap.style.display='flex';splatProgFill.classList.remove('danger');splatProgFill.style.transition='none';splatProgFill.style.width='100%';requestAnimationFrame(()=>{splatProgFill.style.transition='width 0.9s linear,background 0.3s ease';});splatUpdateDisplay();splatShow(splatPanel,splatBg,splatBlobLayer,splatGlowRing);playSound('reset');splatTicker=setInterval(()=>{splatTimeLeft--;splatUpdateDisplay();if(splatTimeLeft<=0)splatEnterExpired();},1000);}
function splatEnterSaved(){if(splatState!==SPLAT_STATE.COUNTDOWN)return;splatState=SPLAT_STATE.SAVED;clearInterval(splatTicker);playSound('save');splatCountWrap.style.display='none';splatBanner.textContent=SPLAT_CONFIG.COPY_SAVED;splatBanner.className='saved-text';splatTriggerBurst();splatLingerTimer=setTimeout(splatEnterIdle,SPLAT_CONFIG.SAVED_LINGER_MS);}
function splatEnterExpired(){splatState=SPLAT_STATE.EXPIRED;clearInterval(splatTicker);playSound('expire');splatTimerNum.textContent='0';splatTimerNum.className='pulse-danger';splatProgFill.style.width='0%';setTimeout(()=>{splatCountWrap.style.display='none';splatBanner.textContent=SPLAT_CONFIG.COPY_EXPIRED;splatBanner.className='expired-text';splatTriggerCrack();},300);splatLingerTimer=setTimeout(splatEnterIdle,SPLAT_CONFIG.EXPIRED_LINGER_MS);}
function splatUpdateDisplay(){const pct=splatTimeLeft/SPLAT_CONFIG.TIMER_SECONDS;splatTimerNum.textContent=splatTimeLeft;splatProgFill.style.width=(pct*100)+'%';splatTimerNum.classList.remove('pulse-normal','pulse-warn','pulse-danger');if(splatTimeLeft<=SPLAT_CONFIG.DANGER_THRESHOLD){splatTimerNum.classList.add('pulse-danger');splatProgFill.classList.add('danger');}else if(splatTimeLeft<=SPLAT_CONFIG.WARN_THRESHOLD){splatTimerNum.classList.add('pulse-warn');}else{splatTimerNum.classList.add('pulse-normal');}}

/* Burst (save) */
function splatTriggerBurst(){const colors=['#A855F7','#C084FC','#E879F9','#7B2FBE','#DDD6FE','#FBBF24'],cy=SPLAT_POSITIONS[currentSplatPos]||960,cx=540;for(let i=0;i<28;i++){const el=document.createElement('div');el.className='splat-particle';const sz=16+Math.random()*60,ang=(i/28)*360+Math.random()*20,r=80+Math.random()*260,dx=Math.cos(ang*Math.PI/180)*r,dy=Math.sin(ang*Math.PI/180)*r,col=colors[i%colors.length],dur=0.5+Math.random()*0.5,del=Math.random()*0.15,rot=Math.random()*360;el.style.cssText=`width:${sz}px;height:${sz*(0.6+Math.random()*0.6)}px;left:${cx-sz/2}px;top:${cy-sz/2}px;background:radial-gradient(ellipse at 35% 35%,${col},${col}99);border-radius:50% 70% 50% 70% / 60% 50% 70% 50%;box-shadow:0 0 ${sz*0.4}px ${col}88;animation:splatBurst${i} ${dur}s ${del}s cubic-bezier(.2,.8,.4,1) forwards;`;addSplatStyle(`@keyframes splatBurst${i}{0%{opacity:1;transform:translate(0,0) scale(0) rotate(0deg)}40%{opacity:1}100%{opacity:0;transform:translate(${dx}px,${dy}px) scale(1) rotate(${rot}deg)}}`);splatBurstLayer.appendChild(el);}splatBg.style.filter='drop-shadow(0 0 80px rgba(232,121,249,1)) drop-shadow(0 0 160px rgba(168,85,247,0.8))';setTimeout(()=>{splatBg.style.filter='drop-shadow(0 0 40px rgba(168,85,247,0.6))';},600);}

/* Crack + drips (expire) */
function splatTriggerCrack(){splatShow(splatCrackLayer);const cy=SPLAT_POSITIONS[currentSplatPos]||960,cx=540;const crackPaths=[[[cx,cy],[cx-120,cy-280],[cx-180,cy-500],[cx-110,cy-720]],[[cx,cy],[cx+130,cy-260],[cx+200,cy-470],[cx+130,cy-680]],[[cx,cy],[cx-50,cy-420],[cx-30,cy-680],[cx-90,cy-900]],[[cx,cy],[cx+40,cy-370],[cx+60,cy-600],[cx+20,cy-830]],[[cx,cy],[cx-240,cy-180],[cx-380,cy-260],[cx-500,cy-240]],[[cx,cy],[cx+260,cy-160],[cx+400,cy-230],[cx+520,cy-210]],[[cx,cy],[cx-100,cy-130],[cx-280,cy-100],[cx-420,cy-170]],[[cx,cy],[cx+110,cy-120],[cx+300,cy-90],[cx+450,cy-155]]];crackPaths.forEach((pts,idx)=>{const path=document.createElementNS('http://www.w3.org/2000/svg','path');let d=`M ${pts[0][0]} ${pts[0][1]}`;pts.slice(1).forEach(p=>{d+=` L ${p[0]} ${p[1]}`;});path.setAttribute('d',d);path.setAttribute('stroke','#F43F5E');path.setAttribute('stroke-width',String(Math.max(1.5,4-idx*0.35)));path.setAttribute('fill','none');path.setAttribute('opacity','0.85');const len=1400;path.style.strokeDasharray=len;path.style.strokeDashoffset=len;path.style.transition=`stroke-dashoffset ${0.4+idx*0.06}s ${idx*0.04}s ease-out`;splatCrackSvg.appendChild(path);requestAnimationFrame(()=>requestAnimationFrame(()=>{path.style.strokeDashoffset='0';}));});[60,180,300,420,540,660,780,900,1020].forEach((x,i)=>{const drip=document.createElement('div');drip.className='drip';const h=80+Math.random()*200,w=8+Math.random()*14;drip.style.cssText=`left:${x}px;height:${h}px;width:${w}px;background:linear-gradient(180deg,#F43F5E,#7F1D1D);animation:splatDripDown ${0.6+Math.random()*0.4}s ${0.2+i*0.07}s ease-in forwards;`;splatCrackLayer.appendChild(drip);});addSplatStyle(`@keyframes splatDripDown{0%{opacity:0;transform:scaleY(0);transform-origin:top}30%{opacity:0.9}100%{opacity:0.7;transform:scaleY(1);transform-origin:top}}`);const flashEl=document.createElement('div');flashEl.style.cssText=`position:absolute;inset:0;z-index:30;pointer-events:none;background:radial-gradient(ellipse at center,transparent 30%,rgba(244,63,94,0.4) 100%);animation:splatVignFade 1.5s ease forwards;`;addSplatStyle(`@keyframes splatVignFade{0%{opacity:0}20%{opacity:1}100%{opacity:0}}`);splatCrackLayer.appendChild(flashEl);setTimeout(()=>flashEl.remove(),1600);}

/* Position control — called by Ably splat-pos message */
function setSplatPosition(pos){if(!SPLAT_POSITIONS[pos])return;currentSplatPos=pos;splatRoot.style.setProperty('--splat-cy',SPLAT_POSITIONS[pos]+'px');}

/* ══ ABLY — UNIFIED INIT ══ */
(function initAbly(){
  try{
    const client=new Ably.Realtime({key:CONFIG.ABLY_KEY});
    const channel=client.channels.get(CONFIG.ABLY_CHANNEL);
    const dot=document.getElementById('status-dot');
    client.connection.on('connected',   ()=>{dot.className='connected';});
    client.connection.on('disconnected',()=>{dot.className='';});
    client.connection.on('connecting',  ()=>{dot.className='connecting';});
    client.connection.once('connected', ()=>channel.publish('cmd','requestLeaderboard').catch(()=>{}));
    /* Gift bar */
    channel.subscribe('giftr',      msg=>onGiftrData(msg.data));
    channel.subscribe('gift-alert', msg=>onGiftAlert(msg.data));
    channel.subscribe('giftr-cmd',  msg=>onGiftrCmd(msg.data));
    /* Splat */
    channel.subscribe('cmd', msg=>{
      const cmd=msg.data;
      if     (cmd==='reset') splatEnterCountdown();
      else if(cmd==='save' ){if(splatState===SPLAT_STATE.COUNTDOWN)splatEnterSaved();}
      else if(cmd==='idle' ) splatEnterIdle();
    });
    channel.subscribe('splat-pos',  msg=>setSplatPosition(msg.data));
    /* Bait widget content — {img, top, main, visible} any field optional */
    channel.subscribe('splat-bait', msg=>{
      const d=msg.data||{};
      if(d.img     !== undefined) document.getElementById('bait-galaxy-img').src        = d.img;
      if(d.top     !== undefined) document.getElementById('bait-label-send').textContent = d.top;
      if(d.main    !== undefined) document.getElementById('bait-label-main').textContent = d.main;
      if(d.visible !== undefined){
        baitEnabled=!!d.visible;
        if(splatState===SPLAT_STATE.IDLE){
          if(baitEnabled) splatShow(idleBait); else splatHide(idleBait);
        }
      }
    });
    /* Announce box — {text, badge, sub, x, y, size, visible} any field optional */
    const ANNOUNCE_X={left:160, center:540, right:920};
    const ANNOUNCE_Y={top:130, upper:400, center:750, lower:1250, bottom:1770};
    const ANNOUNCE_SIZES={
      xs: {w:360, fm:38,  fs:20},
      sm: {w:500, fm:50,  fs:26},
      md: {w:640, fm:62,  fs:33},
      lg: {w:800, fm:76,  fs:40},
      xl: {w:920, fm:90,  fs:48},
      xxl:{w:1040,fm:106, fs:56},
    };
    const announceBox=document.getElementById('announce-box');
    channel.subscribe('announce', msg=>{
      const d=msg.data||{};
      if(d.text   !== undefined) document.getElementById('announce-text').textContent=d.text;
      if(d.badge  !== undefined) document.getElementById('announce-live-badge').textContent=d.badge;
      if(d.sub    !== undefined){
        const subEl=document.getElementById('announce-sub');
        subEl.textContent=d.sub;
        subEl.classList.toggle('has-text',!!d.sub);
      }
      if(d.size !== undefined){
        const s=ANNOUNCE_SIZES[d.size]||ANNOUNCE_SIZES.lg;
        announceBox.style.setProperty('--aw', s.w+'px');
        announceBox.style.setProperty('--afm', s.fm+'px');
        announceBox.style.setProperty('--afs', s.fs+'px');
      }
      if(d.x !== undefined){
        const px=ANNOUNCE_X[d.x]??parseInt(d.x)??540;
        announceBox.style.setProperty('--ax', px+'px');
      }
      if(d.y !== undefined){
        const py=ANNOUNCE_Y[d.y]??parseInt(d.y)??130;
        announceBox.style.setProperty('--ay', py+'px');
      }
      if(d.visible !== undefined) announceBox.classList.toggle('visible',!!d.visible);
    });
  }catch(e){console.warn('[Ably] init failed:',e);}
})();

splatEnterIdle();
</script>
