<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gift Bar + Splat Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Bebas+Neue&family=Boogaloo&family=DM+Sans:wght@700&display=swap" rel="stylesheet">
<script src="https://cdn.ably.com/lib/ably.min-2.js"></script>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 1080px; height: 1920px; overflow: hidden; background: transparent; }

/* ─── PARTICLE CANVAS (gift-bar gifts) ─── */
#particle-canvas {
  position: absolute; top: 0; left: 0;
  width: 1080px; height: 1920px;
  pointer-events: none; z-index: 50;
}

/* ─── SCREEN PULSE ─── */
#screen-pulse {
  position: absolute; inset: 0;
  pointer-events: none; z-index: 8;
  opacity: 0; transition: opacity 0.35s ease;
}

/* ══ GIFT BAR EDGE LINES ══ */
#bar-lines {
  position: absolute; top: 450px; left: 0;
  width: 1080px; height: 55px; pointer-events: none; z-index: 12;
}
#line-top, #line-bot {
  position: absolute; left: 0; right: 0; height: 1px;
  background: linear-gradient(to right, transparent 0%, transparent 30%,
    rgba(192,132,252,0.15) 55%, rgba(192,132,252,0.45) 80%, rgba(192,132,252,0.65) 100%);
  transition: background 0.9s ease, box-shadow 0.8s ease;
}
#line-top { top: 0; }
#line-bot { bottom: 0; }
#bar-lines.active #line-top,
#bar-lines.active #line-bot { animation: lineActivate 0.35s ease forwards; }
@keyframes lineActivate { from{opacity:0.10} to{opacity:1.00} }
#line-sweep-top, #line-sweep-bot {
  position: absolute; left: 0; right: 0; height: 1px; opacity: 0; pointer-events: none;
  background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.0) 30%,
    rgba(255,255,255,1.0) 50%, rgba(255,255,255,0.0) 70%, transparent 100%);
  background-size: 40% 100%;
}
#line-sweep-top { top: 0; }
#line-sweep-bot { bottom: 0; }
#bar-lines.active #line-sweep-top,
#bar-lines.active #line-sweep-bot { animation: lineSweep 1.1s ease-in-out var(--sweep-count, 2) forwards; }
@keyframes lineSweep {
  0%{background-position:-40% 0;opacity:0} 10%{opacity:1}
  90%{opacity:0.6} 100%{background-position:140% 0;opacity:0}
}
#line-sweep-bot { animation-delay: 0.08s; }

/* ══ GIFT BAR ══ */
#gift-bar {
  position: absolute; top: 450px; left: 0;
  width: 1080px; height: 55px; overflow: visible;
  opacity: 0; transition: opacity 0.6s ease; z-index: 10;
}
#gift-bar.visible { opacity: 1; }
#gift-bar.ep-passive-active { opacity: 1; }
#gift-bar.ep-passive-active #bar-bg {
  background: linear-gradient(to right, transparent 0%, rgba(20,4,40,0.12) 18%,
    rgba(20,4,40,0.44) 42%, rgba(59,7,100,0.74) 64%, rgba(10,10,28,0.82) 100%);
}
#gift-bar.ep-passive-active #bar-info,
#gift-bar.ep-passive-active #bar-hero { opacity: 0; }
#gift-bar.ep-passive-active #bar-border::before,
#gift-bar.ep-passive-active #bar-border::after {
  background: linear-gradient(to right,
    transparent 0%, transparent 18%,
    rgba(192,132,252,0.18) 36%,
    rgba(232,121,249,0.58) 68%,
    rgba(192,132,252,0.82) 100%);
}
#bar-bg-layer { position: absolute; inset: 0; overflow: hidden; }
#bar-bg {
  position: absolute; inset: 0;
  background: linear-gradient(to right, transparent 0%, rgba(5,0,14,0.03) 18%,
    rgba(5,0,14,0.26) 44%, rgba(5,0,14,0.68) 65%, rgba(5,0,14,0.76) 76%, rgba(5,0,14,0.76) 100%);
  transition: background 0.52s cubic-bezier(.34,1.56,.64,1);
}
#gift-bar.alert-active #bar-bg { background: rgba(5,0,14,0.76); }
#bar-wash { position: absolute; inset: 0; transition: background 0.9s ease; pointer-events: none; }
#bar-shimmer-flare {
  position: absolute; inset: 0; pointer-events: none; display: none;
}
@keyframes barFlareSweep {
  0%{background-position:-260% 0;opacity:0} 8%{opacity:1}
  50%{background-position:260% 0;opacity:0} 100%{background-position:260% 0;opacity:0}
}
/* Gradient border lines — transparent on left, opaque on right, matching bg */
#bar-border { --bc: 192,132,252; position: absolute; inset: 0; pointer-events: none; }
#bar-border::before,
#bar-border::after {
  content: '';
  position: absolute; left: 0; right: 0; height: 1px;
  background: linear-gradient(to right,
    transparent 0%, transparent 20%,
    rgba(var(--bc),0.12) 38%,
    rgba(var(--bc),0.50) 65%,
    rgba(var(--bc),0.82) 100%);
  transition: background 0.9s ease;
}
#bar-border::before { top: 0; }
#bar-border::after  { bottom: 0; }
#bar-progress {
  position: absolute; bottom: 0; left: 0;
  height: 2px; width: 0%; border-radius: 0 1px 1px 0; transition: background 0.9s ease;
}
#bar-hero {
  position: absolute; left: 0; top: 0; width: 720px; height: 55px; overflow: visible;
  display: flex; align-items: center; gap: 18px; padding: 0 20px 0 18px;
  opacity: 0; transform: translateX(-22px); pointer-events: none;
  transition: opacity 0.36s ease 0.08s, transform 0.46s cubic-bezier(.34,1.56,.64,1) 0.06s;
}
#gift-bar.alert-active #bar-hero { opacity: 1; transform: translateX(0); }
#bar-hero-name {
  font-family: 'Anton', sans-serif; font-size: 90px; line-height: 1;
  text-transform: uppercase; color: #fff; letter-spacing: 1px; white-space: nowrap;
  overflow: visible; flex-shrink: 1; min-width: 0;
  text-shadow: 0 3px 18px rgba(0,0,0,0.95), 0 0 40px rgba(255,255,255,0.06);
}
#bar-hero-amount {
  font-family: 'Bebas Neue', sans-serif; font-size: 58px; letter-spacing: 4px;
  white-space: nowrap; flex-shrink: 0; overflow: visible;
}
/* ══ GIFT BAR INFO (rotating carousel slot) ══ */
#bar-info {
  position: absolute; right: 0; top: 0; width: auto; min-width: 260px; height: 55px; overflow: hidden;
  background: rgba(5,0,14,0.76); border-left: 1px solid rgba(255,255,255,0.06);
  display: flex; flex-direction: column; justify-content: center; align-items: flex-end;
  padding: 9px 14px 2px 14px; gap: 1px; transition: opacity 0.28s ease;
}
#bar-info-top { display: flex; align-items: center; gap: 7px; }
#bar-slot-title {
  font-family: 'DM Sans', sans-serif; font-size: 10px; font-weight: 700;
  letter-spacing: 0.14em; text-transform: uppercase; color: rgba(255,255,255,0.55); white-space: nowrap;
}
#bar-info-bot { display: flex; align-items: baseline; gap: 9px; }
#bar-info-name {
  font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 2px; color: #fff;
  white-space: nowrap; flex-shrink: 0; text-shadow: 0 2px 8px rgba(0,0,0,0.9);
}
#bar-info-amount {
  font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 2px;
  white-space: nowrap; flex-shrink: 0; transition: color 0.6s ease;
  text-shadow: -1px -1px 0 rgba(0,0,0,0.95), 1px -1px 0 rgba(0,0,0,0.95),
               -1px 1px 0 rgba(0,0,0,0.95), 1px 1px 0 rgba(0,0,0,0.95);
}
#bar-info-amount.monthly-shimmer { background: rgba(192,132,252,0.14); animation: monthlyGlow 1.4s ease-in-out infinite; }
@keyframes monthlyGlow {
  0%,100%{box-shadow:0 0 6px rgba(192,132,252,0.25)} 50%{box-shadow:0 0 22px rgba(232,121,249,0.70),0 0 40px rgba(168,85,247,0.35)}
}
#bar-plat-badge {
  font-family: 'DM Sans', sans-serif; font-size: 9px; font-weight: 700;
  letter-spacing: 0.10em; text-transform: uppercase; padding: 2px 6px; border-radius: 4px; white-space: nowrap; flex-shrink: 0;
}
.plat-tiktok  { color:#69C9D0;background:rgba(105,201,208,0.16);border:1px solid rgba(105,201,208,0.30); }
.plat-youtube { color:#FF6B6B;background:rgba(255,80,80,0.16);  border:1px solid rgba(255,80,80,0.30);   }
.plat-direct, .plat-default { color:#C084FC;background:rgba(192,132,252,0.16);border:1px solid rgba(192,132,252,0.30); }

/* ══ GIFT BATTLE BAR ══ */
#gift-battle-bar {
  position: absolute; inset: 0; z-index: 2; display: none; overflow: hidden;
}
#gift-battle-bar.active { display: block; }
/* YouTube fill — red from left */
#gbb-yt-fill {
  position: absolute; left: 0; top: 0; bottom: 0; width: 50%;
  background: linear-gradient(to right, #7f1d1d, #dc2626, #ef4444);
  transition: width 1.1s cubic-bezier(.4,0,.2,1); overflow: hidden;
}
/* TikTok fill — dark from right */
#gbb-tt-fill {
  position: absolute; right: 0; top: 0; bottom: 0; width: 50%;
  background: linear-gradient(to left, #0c0c1a, #16213e, #1a1a40);
  transition: width 1.1s cubic-bezier(.4,0,.2,1); overflow: hidden;
}
/* Shimmer — activates when shared-progress goal is hit */
#gbb-goal-shimmer {
  position: absolute; inset: 0; pointer-events: none; opacity: 0; z-index: 1;
  background: linear-gradient(115deg, transparent 20%, rgba(255,255,255,0.30) 50%, transparent 80%);
  background-size: 200% 100%;
}
#gbb-goal-shimmer.active { opacity: 1; animation: gbbShimmer 1.0s ease-in-out infinite; }
@keyframes gbbShimmer {
  0%   { background-position: -200% 0; }
  100% { background-position:  200% 0; }
}
/* Background logo watermarks — clipped inside their fill div so they never overflow */
.gbb-fill-wm {
  position: absolute; top: 50%; transform: translateY(-50%);
  font-family: 'Anton', sans-serif; font-size: 18px; letter-spacing: 3px;
  color: rgba(255,255,255,0.22); pointer-events: none; white-space: nowrap;
}
#gbb-yt-fill .gbb-fill-wm { right: 10px; }
#gbb-tt-fill .gbb-fill-wm { left: 10px; }
/* Main content area — stops before carousel.
   Uses absolute sub-layout so #gbb-mid is ALWAYS at 50% of this zone. */
#gbb-content {
  position: absolute; left: 0; top: 0; bottom: 0; right: 265px; z-index: 3;
}
/* Timer: pinned to the exact horizontal center of the content zone */
#gbb-mid {
  position: absolute; left: 50%; top: 0; bottom: 0;
  width: 120px; transform: translateX(-50%);
  display: flex; align-items: center; justify-content: center;
}
#gbb-mid::before, #gbb-mid::after {
  content: ''; position: absolute; top: 18%; bottom: 18%;
  width: 1px; background: rgba(255,255,255,0.15);
}
#gbb-mid::before { left: 0; }
#gbb-mid::after  { right: 0; }
/* YT info: left half, right-aligned toward timer */
#gbb-yt-info {
  position: absolute; left: 0; top: 0; bottom: 0; right: calc(50% + 60px);
  display: flex; align-items: center; justify-content: flex-end; gap: 7px;
  padding: 0 14px 0 12px; overflow: hidden;
}
/* TT info: right half, left-aligned away from timer */
#gbb-tt-info {
  position: absolute; left: calc(50% + 60px); top: 0; right: 0; bottom: 0;
  display: flex; align-items: center; justify-content: flex-start; gap: 7px;
  padding: 0 12px 0 14px; overflow: hidden;
}
.gbb-plat-lbl {
  font-family: 'DM Sans', sans-serif; font-size: 10px; font-weight: 700;
  letter-spacing: 0.10em; text-transform: uppercase; white-space: nowrap;
  opacity: 0.82; flex-shrink: 0;
}
#gbb-yt-lbl { color: #fca5a5; }
#gbb-tt-lbl { color: #93c5fd; }
#gbb-yt-amt, #gbb-tt-amt {
  font-family: 'Boogaloo', sans-serif; font-size: 19px; letter-spacing: 0.03em;
  color: rgba(255,255,255,0.58); white-space: nowrap; flex-shrink: 0;
  text-shadow: 0 1px 5px rgba(0,0,0,0.90);
}
/* Timer — normal, warn (last 60s), danger (last 10s), live, ended */
#gbb-timer-val {
  font-family: 'Boogaloo', sans-serif; font-size: 20px; letter-spacing: 0.06em;
  color: rgba(255,255,255,0.95); white-space: nowrap;
  background: rgba(0,0,0,0.42); padding: 2px 10px; border-radius: 20px;
  text-shadow: 0 1px 4px rgba(0,0,0,0.9);
  transition: font-size 0.3s ease, color 0.4s ease;
}
#gbb-timer-val.gbb-live {
  font-size: 10px; letter-spacing: 0.18em; color: #f87171;
  animation: gbbLivePulse 1.6s ease-in-out infinite;
}
#gbb-timer-val.gbb-warn {
  color: #fbbf24; font-size: 22px;
  animation: gbbTimerWarn 1.2s ease-in-out infinite;
}
#gbb-timer-val.gbb-danger {
  color: #ef4444; font-size: 26px; background: rgba(239,68,68,0.15);
  animation: gbbTimerDanger 0.5s ease-in-out infinite;
}
#gbb-timer-val.gbb-ended {
  font-size: 13px; letter-spacing: 0.08em; color: #fbbf24; padding: 2px 8px;
}
@keyframes gbbLivePulse   { 0%,100%{opacity:1} 50%{opacity:0.42} }
@keyframes gbbTimerWarn   { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.8;transform:scale(1.06)} }
@keyframes gbbTimerDanger { 0%,100%{opacity:1;transform:scale(1);text-shadow:0 0 14px rgba(239,68,68,0.9)} 50%{opacity:0.6;transform:scale(1.12);text-shadow:0 0 28px rgba(239,68,68,1.0),0 0 50px rgba(239,68,68,0.6)} }
/* Battle-start announce banner */
#gbb-announce {
  position: absolute; inset: 0; z-index: 10; pointer-events: none;
  display: flex; align-items: center; justify-content: center; gap: 16px;
  opacity: 0;
}
#gbb-announce.show { animation: gbbAnnounceAnim 3.5s ease forwards; }
@keyframes gbbAnnounceAnim {
  0%  { opacity:0; } 12%{ opacity:1; } 75%{ opacity:1; } 100%{ opacity:0; }
}
.gbb-ann-logo {
  font-family: 'Anton', sans-serif; font-size: 14px; letter-spacing: 2px;
  text-transform: uppercase; padding: 3px 9px; border-radius: 4px; white-space: nowrap;
}
.gbb-ann-yt { color:#ef4444; background:rgba(239,68,68,0.18); border:1px solid rgba(239,68,68,0.40); }
.gbb-ann-tt { color:#93c5fd; background:rgba(147,197,253,0.18); border:1px solid rgba(147,197,253,0.40); }
#gbb-ann-text {
  font-family: 'Boogaloo', sans-serif; font-size: 17px; letter-spacing: 0.12em;
  color: #fff; text-shadow: 0 2px 8px rgba(0,0,0,0.95); text-transform: uppercase;
}
/* Gift pop animation layer */
#gbb-pop-layer {
  position: absolute; inset: 0; pointer-events: none; z-index: 8; overflow: hidden;
}
.gbb-pop-name {
  position: absolute; top: 50%; left: 50%;
  font-family: 'Anton', sans-serif; letter-spacing: 2px; color: #fff; white-space: nowrap;
  pointer-events: none; text-shadow: 0 2px 12px rgba(0,0,0,0.98), 0 0 6px rgba(0,0,0,0.8);
  transform-origin: center center;
}
.gbb-pop-sm { font-size: 20px; }
.gbb-pop-md { font-size: 28px; }
.gbb-pop-lg { font-size: 36px; }
.gbb-pop-yt { animation: gbbPopYT 1.6s cubic-bezier(.34,1.56,.64,1) forwards; }
.gbb-pop-tt { animation: gbbPopTT 1.6s cubic-bezier(.34,1.56,.64,1) forwards; }
@keyframes gbbPopYT {
  0%   { opacity:0; transform:translate(-50%,-50%) scale(0.4); }
  25%  { opacity:1; transform:translate(-50%,-50%) scale(1.05); }
  65%  { opacity:1; transform:translate(-120%,-50%) scale(0.9); }
  100% { opacity:0; transform:translate(-160%,-50%) scale(0.7); }
}
@keyframes gbbPopTT {
  0%   { opacity:0; transform:translate(-50%,-50%) scale(0.4); }
  25%  { opacity:1; transform:translate(-50%,-50%) scale(1.05); }
  65%  { opacity:1; transform:translate(30%,-50%) scale(0.9); }
  100% { opacity:0; transform:translate(70%,-50%) scale(0.7); }
}
.gbb-pop-flash {
  position: absolute; bottom: 3px; left: 50%; transform: translateX(-50%);
  font-family: 'DM Sans', sans-serif; font-size: 9px; font-weight: 700;
  letter-spacing: 0.14em; text-transform: uppercase; color: rgba(255,255,255,0.85);
  white-space: nowrap; pointer-events: none;
  animation: gbbFlashFade 1.8s ease forwards;
}
@keyframes gbbFlashFade { 0%,12%{opacity:0} 22%,78%{opacity:1} 100%{opacity:0} }

/* ── SHARED PROGRESS MODE overrides ──────────────────────── */
/* Fills: warm amber (YT) and cyan (TT) instead of red/dark */
#gift-battle-bar.gbb-mode-progress #gbb-yt-fill {
  background: linear-gradient(to right, #78350f, #d97706, #fbbf24);
}
#gift-battle-bar.gbb-mode-progress #gbb-tt-fill {
  background: linear-gradient(to left, #164e63, #0891b2, #22d3ee);
}
/* Platform color shifts for labels and watermarks */
#gift-battle-bar.gbb-mode-progress #gbb-yt-lbl { color: #fde68a; }
#gift-battle-bar.gbb-mode-progress #gbb-tt-lbl { color: #67e8f9; }
#gift-battle-bar.gbb-mode-progress #gbb-yt-fill .gbb-fill-wm { color: rgba(255,255,255,0.18); }
#gift-battle-bar.gbb-mode-progress #gbb-tt-fill .gbb-fill-wm { color: rgba(255,255,255,0.18); }
/* Announce badge colors for progress mode */
#gift-battle-bar.gbb-mode-progress .gbb-ann-yt {
  color:#fbbf24; background:rgba(251,191,36,0.16); border-color:rgba(251,191,36,0.40);
}
#gift-battle-bar.gbb-mode-progress .gbb-ann-tt {
  color:#22d3ee; background:rgba(34,211,238,0.16); border-color:rgba(34,211,238,0.40);
}
/* Center goal line — visible marker where fills converge */
#gbb-goal-line {
  position: absolute; left: 50%; top: 0; bottom: 0;
  width: 2px; transform: translateX(-50%);
  background: rgba(255,255,255,0.28);
  box-shadow: 0 0 8px rgba(255,255,255,0.55), 0 0 3px rgba(255,255,255,0.90);
  z-index: 2; pointer-events: none; display: none;
}
#gift-battle-bar.gbb-mode-progress #gbb-goal-line { display: block; }
/* "to go" center label uses softer style in progress mode */
#gift-battle-bar.gbb-mode-progress #gbb-timer-val {
  font-size: 13px; letter-spacing: 0.08em; background: rgba(0,0,0,0.48);
  color: rgba(255,255,255,0.90);
}
/* Progress pop: platform-colored central burst, no sideways fly */
.gbb-pop-prog {
  animation: gbbPopProg 2.0s ease-out forwards !important;
}
.gbb-pop-yt.gbb-pop-prog {
  color: #fbbf24 !important;
  text-shadow: 0 0 22px rgba(251,191,36,0.95), 0 2px 10px rgba(0,0,0,0.98) !important;
}
.gbb-pop-tt.gbb-pop-prog {
  color: #22d3ee !important;
  text-shadow: 0 0 22px rgba(34,211,238,0.95), 0 2px 10px rgba(0,0,0,0.98) !important;
}
@keyframes gbbPopProg {
  0%   { opacity:0; transform:translate(-50%,-50%) scale(0.3) rotate(-4deg); }
  22%  { opacity:1; transform:translate(-50%,-50%) scale(1.18) rotate(0deg); }
  55%  { opacity:1; transform:translate(-50%,-50%) scale(1.02); }
  100% { opacity:0; transform:translate(-50%,-56%) scale(0.82); }
}
/* Progress flash text uses platform color tint */
.gbb-pop-yt .gbb-pop-flash-txt { color: #fde68a; }
.gbb-pop-tt .gbb-pop-flash-txt { color: #67e8f9; }

/* ══ TOP GIFTERS PANEL ══ */
#top-gifters-panel {
  position: absolute; left: 0; top: 505px; width: 1080px; z-index: 9;
  overflow: hidden; max-height: 0;
  transition: max-height 0.55s cubic-bezier(.34,1.12,.64,1);
  background: linear-gradient(180deg,rgba(15,4,32,0.97) 0%,rgba(25,6,48,0.94) 100%);
  border-bottom: 1px solid rgba(168,85,247,0.30);
  box-shadow: 0 8px 32px rgba(0,0,0,0.70);
}
#top-gifters-panel.open { max-height: 340px; }
#tgp-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 11px 22px 8px 22px;
  border-bottom: 1px solid rgba(168,85,247,0.18);
}
#tgp-title {
  font-family: 'Boogaloo', sans-serif; font-size: 20px; letter-spacing: 0.15em;
  color: #C084FC; text-transform: uppercase;
  text-shadow: 0 0 12px rgba(192,132,252,0.55);
}
#tgp-timeframe {
  font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 700;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: rgba(255,255,255,0.45); padding: 3px 10px;
  background: rgba(168,85,247,0.12); border: 1px solid rgba(168,85,247,0.25); border-radius: 20px;
}
#tgp-rows { display: flex; flex-direction: column; padding: 4px 0 8px; }
.tgp-row {
  display: flex; align-items: center; gap: 0; padding: 8px 22px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  transition: background 0.2s ease;
}
.tgp-row:last-child { border-bottom: none; }
.tgp-medal {
  font-size: 22px; width: 36px; flex-shrink: 0; text-align: center; line-height: 1;
}
.tgp-rank {
  font-family: 'Boogaloo', sans-serif; font-size: 22px; letter-spacing: 0.05em;
  color: rgba(255,255,255,0.35); width: 36px; flex-shrink: 0; text-align: center;
}
.tgp-name {
  font-family: 'Boogaloo', sans-serif; font-size: 26px; letter-spacing: 0.04em;
  color: #FAF5FF; flex: 1; white-space: nowrap; overflow: hidden;
  text-overflow: ellipsis; padding: 0 10px;
  text-shadow: 0 2px 8px rgba(0,0,0,0.80);
}
.tgp-row.rank-1 .tgp-name { color: #FDE68A; text-shadow: 0 0 14px rgba(253,211,77,0.55), 0 2px 8px rgba(0,0,0,0.80); }

.tgp-plat.plat-default { color:#C084FC;background:rgba(192,132,252,0.16);border:1px solid rgba(192,132,252,0.30); }
#bar-hero-action {

/* ─── STATUS DOT ─── */
#status-dot {
  position: absolute; top: 456px; left: 8px;
  width: 6px; height: 6px; border-radius: 50%;
  background: #444; z-index: 30; transition: background 0.3s;

#status-dot.connected  { background:#22c55e; box-shadow:0 0 5px rgba(34,197,94,0.7); }
#status-dot.connecting { background:#eab308; }

/* ══════════════════════════════════════════════════════════
   SPLAT OVERLAY
   All elements inside #splat-root.
   --splat-cy = vertical center Y of the splat zone (default 960px = canvas center).
   Updated via Ably "splat-pos" command from the dock.
══════════════════════════════════════════════════════════ */
#splat-root {
  --splat-cy: 960px;
  position: absolute; left: 0; top: 0;
  width: 1080px; height: 1920px;
  pointer-events: none; z-index: 20; overflow: hidden;
}

/* Ambient blobs */
.blob-layer { position:absolute;inset:0;pointer-events:none;opacity:0;transition:opacity 0.6s ease; }
.blob-layer.visible { opacity:1; }
.blob { position:absolute;border-radius:50%;filter:blur(2px); }

/* Glow ring */
#splat-glow-ring {
  position:absolute; left:540px; top:var(--splat-cy);
  transform:translate(-50%,-50%); width:900px; height:900px; border-radius:50%;
  background:radial-gradient(ellipse,rgba(168,85,247,0.15) 0%,transparent 70%);
  z-index:8; opacity:0;
  transition:opacity 0.6s ease, top 0.4s ease;
  animation:splatRingPulse 2s ease-in-out infinite;
}
#splat-glow-ring.visible { opacity:1; }
@keyframes splatRingPulse {
  0%,100%{transform:translate(-50%,-50%) scale(1)} 50%{transform:translate(-50%,-50%) scale(1.06)}
}

/* Splat background SVG */
#splat-bg {
  position:absolute; left:540px; top:var(--splat-cy);
  transform:translate(-50%,-50%); width:900px; height:280px;
  z-index:9; opacity:0;
  transition:opacity 0.5s ease, top 0.4s ease;
  filter:drop-shadow(0 0 40px rgba(168,85,247,0.6));
}
#splat-bg.visible { opacity:1; }

/* Panel (timer + banner) */
#splat-panel {
  position:absolute; left:540px; top:var(--splat-cy);
  transform:translate(-50%,calc(-50% + 40px)) scale(0.9);
  width:900px; display:flex; flex-direction:column; align-items:center; gap:24px;
  z-index:10; opacity:0; pointer-events:none;
  transition:opacity 0.5s cubic-bezier(.34,1.56,.64,1),
             transform 0.5s cubic-bezier(.34,1.56,.64,1),
             top 0.4s ease;
}
#splat-panel.visible { opacity:1; transform:translate(-50%,-50%) scale(1); }

/* Timer */
#splat-countdown-wrap { display:flex;flex-direction:column;align-items:center;gap:14px;width:100%; }
#splat-timer-number {
  font-family:'Boogaloo',cursive; font-size:200px; line-height:1; color:#FAF5FF;
  text-shadow:0 0 20px #A855F7,0 0 60px #7B2FBE,0 4px 0 rgba(0,0,0,0.4); letter-spacing:-6px;
}
#splat-timer-number.pulse-normal { animation:splatPulseNormal 1s ease-in-out infinite; }
#splat-timer-number.pulse-warn   { animation:splatPulseWarn 0.5s ease-in-out infinite; }
#splat-timer-number.pulse-danger { animation:splatPulseDanger 0.25s ease-in-out infinite; }
@keyframes splatPulseNormal { 0%,100%{transform:scale(1)} 50%{transform:scale(1.04)} }
@keyframes splatPulseWarn   { 0%,100%{transform:scale(1);color:#FAF5FF} 50%{transform:scale(1.08);color:#E879F9} }
@keyframes splatPulseDanger {
  0%,100%{transform:scale(1);color:#E879F9;text-shadow:0 0 20px #F43F5E,0 0 60px #F43F5E}
  50%    {transform:scale(1.14);color:#F43F5E;text-shadow:0 0 40px #F43F5E,0 0 100px #F43F5E}
}
#splat-countdown-label {
  font-family:'Boogaloo',cursive; font-size:42px; color:#FAF5FF;
  text-shadow:0 0 16px #A855F7,0 2px 0 rgba(0,0,0,0.5);
  text-align:center; letter-spacing:1px; padding:0 20px;
}
#splat-progress-track {
  width:800px; height:16px; background:rgba(255,255,255,0.12);
  border-radius:8px; overflow:hidden; box-shadow:0 0 12px rgba(168,85,247,0.4);
}
#splat-progress-fill {
  height:100%; background:linear-gradient(90deg,#7B2FBE,#E879F9,#C084FC);
  border-radius:8px; width:100%; transition:width 0.9s linear,background 0.3s ease;
}
#splat-progress-fill.danger { background:linear-gradient(90deg,#7F1D1D,#F43F5E,#FB7185); }

/* State banners */
#splat-state-banner {
  font-family:'Boogaloo',cursive; font-size:80px; color:#FAF5FF;
  text-align:center; letter-spacing:2px; padding:0 40px;
  text-shadow:0 0 30px #A855F7,0 4px 0 rgba(0,0,0,0.5);
}
#splat-state-banner.saved-text {
  color:#C084FC; text-shadow:0 0 40px #E879F9,0 0 80px #A855F7,0 4px 0 rgba(0,0,0,0.5);
  animation:splatSavedBounce 0.6s cubic-bezier(.34,1.56,.64,1) forwards;
}
#splat-state-banner.expired-text {
  color:#F43F5E; text-shadow:0 0 40px #F43F5E,0 0 80px #7F1D1D,0 4px 0 rgba(0,0,0,0.5);
  animation:splatExpiredShake 0.6s ease forwards;
}
@keyframes splatSavedBounce {
  0%{transform:scale(0.5) rotate(-6deg);opacity:0} 60%{transform:scale(1.15) rotate(2deg);opacity:1} 100%{transform:scale(1) rotate(0deg);opacity:1}
}
@keyframes splatExpiredShake {
  0%,100%{transform:translateX(0) scale(1)} 15%{transform:translateX(-18px) scale(1.05)}
  30%{transform:translateX(14px) scale(1.05)} 45%{transform:translateX(-10px)} 60%{transform:translateX(8px)} 75%{transform:translateX(-4px)}
}

/* Burst layer */
#splat-burst-layer { position:absolute;inset:0;pointer-events:none;z-index:25;overflow:hidden; }
.splat-particle { position:absolute;border-radius:50% 70% 50% 70% / 60% 50% 70% 50%;opacity:0;transform:scale(0); }

/* Crack/drip layer */
#splat-crack-layer { position:absolute;inset:0;pointer-events:none;z-index:22;opacity:0;transition:opacity 0.3s ease; }
#splat-crack-layer.visible { opacity:1; }
.drip { position:absolute;top:0;border-radius:0 0 50% 50%;opacity:0;transform-origin:top center; }

/* Idle bait widget — tracks splat center Y with smooth transition */
#idle-bait {
  position:absolute; z-index:10;
  left:40px; top:calc(var(--splat-cy) - 35px);
  transform:translateX(-30px) scale(0.92);
  width:215px; padding:9px 11px;
  display:flex; align-items:center; justify-content:flex-start; gap:8px;
  background:rgba(20,0,40,0.78); border:2px solid rgba(168,85,247,0.55);
  border-radius:10px; box-shadow:0 0 24px rgba(168,85,247,0.35),inset 0 0 20px rgba(59,7,100,0.4);
  opacity:0; pointer-events:none;
  transition:opacity 0.55s cubic-bezier(.4,0,.2,1),
             transform 0.55s cubic-bezier(.34,1.56,.64,1),
             top 0.4s ease;
}
#idle-bait.visible { opacity:1; transform:translateX(0) scale(1); animation:baitGlow 3s ease-in-out infinite; }
@keyframes baitGlow {
  0%,100%{box-shadow:0 0 24px rgba(168,85,247,0.35),inset 0 0 20px rgba(59,7,100,0.4)}
  50%    {box-shadow:0 0 55px rgba(168,85,247,0.7), inset 0 0 28px rgba(59,7,100,0.5)}
}
#bait-inner { display:flex;align-items:center;gap:8px;width:100%;transform-origin:center center; }
#idle-bait.visible #bait-inner { animation:baitWiggle 15s ease-in-out 2s infinite; }
@keyframes baitWiggle {
  0%,92%,100%{transform:rotate(0deg) scale(1)} 93%{transform:rotate(-5deg) scale(0.97)}
  94.5%{transform:rotate(6deg) scale(1.03)} 96%{transform:rotate(-4deg) scale(0.98)}
  97.5%{transform:rotate(4deg) scale(1.02)} 99%{transform:rotate(-1deg) scale(1)}
}
#bait-galaxy-img {
  width:45px;height:45px;object-fit:contain;flex-shrink:0;
  filter:drop-shadow(0 0 10px rgba(232,121,249,0.8)) drop-shadow(0 0 22px rgba(168,85,247,0.6));
  animation:baitFloat 2.6s ease-in-out infinite;
}
@keyframes baitFloat { 0%,100%{transform:translateY(0) scale(1)} 50%{transform:translateY(-3px) scale(1.04)} }
#bait-text { display:flex;flex-direction:column;align-items:flex-start;gap:1px; }
#bait-label-send {
  font-family:'Boogaloo',cursive; font-size:15px; color:rgba(192,132,252,0.95);
  letter-spacing:2px; text-transform:uppercase; text-shadow:0 0 12px rgba(168,85,247,0.6); line-height:1;
}
#bait-label-main {
  font-family:'Boogaloo',cursive; font-size:29px; line-height:1; color:#FAF5FF; letter-spacing:3px;
  text-shadow:0 0 16px rgba(232,121,249,0.95),0 0 36px rgba(168,85,247,0.75),0 3px 0 rgba(0,0,0,0.55);
  animation:baitTextGlow 3s ease-in-out infinite;
}
@keyframes baitTextGlow {
  0%,100%{text-shadow:0 0 16px rgba(232,121,249,0.9),0 0 36px rgba(168,85,247,0.7),0 3px 0 rgba(0,0,0,0.55)}
  50%    {text-shadow:0 0 28px rgba(232,121,249,1),0 0 60px rgba(168,85,247,0.9),0 3px 0 rgba(0,0,0,0.55)}
}
.bait-sparkle {
  position:absolute;border-radius:50%;background:#E879F9;opacity:0;pointer-events:none;
  animation:baitSparkle var(--dur) var(--del) ease-in-out infinite;
}
@keyframes baitSparkle { 0%,100%{opacity:0;transform:scale(0)} 50%{opacity:0.9;transform:scale(1)} }

/* ─── ANNOUNCE BOX ─── */
#announce-box {
  --ax: 540px; --ay: 200px;
  --aw: 800px; --afm: 76px; --afs: 40px; --apv: 24px; --aph: 44px;
  position: absolute; z-index: 15; pointer-events: none;
  /* clamp keeps box fully within 0–1080px canvas regardless of X position */
  left: clamp(calc(var(--aw) / 2), var(--ax), calc(1080px - var(--aw) / 2));
  top: var(--ay);
  transform: translate(-50%, calc(-50% + 18px)) scale(0.92);
  opacity: 0;
  transition: opacity 0.45s cubic-bezier(.34,1.56,.64,1),
              transform 0.45s cubic-bezier(.34,1.56,.64,1),
              left 0.38s ease, top 0.38s ease,
              width 0.25s ease;
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  padding: var(--apv) var(--aph);
  width: var(--aw); text-align: center;
  background: linear-gradient(160deg, rgba(14,0,38,0.93), rgba(6,0,20,0.90));
  border-radius: 22px;
  border: 2px solid rgba(168,85,247,0.75);
  box-shadow:
    0 0 0 1px rgba(168,85,247,0.12),
    0 0 35px rgba(168,85,247,0.50),
    0 0 90px rgba(168,85,247,0.22),
    inset 0 0 30px rgba(59,7,100,0.45);
  animation: announceGlow 3.2s ease-in-out infinite;
  overflow: hidden;
}
#announce-box.visible {
  opacity: 1;
  transform: translate(-50%, -50%) scale(1);
}
#announce-box::after {
  content: '';
  position: absolute; top: 0; left: -100%; width: 60%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(232,121,249,0.06), transparent);
  animation: announceSweep 5s ease-in-out 1s infinite;
  pointer-events: none;
}
@keyframes announceSweep { 0%{left:-100%} 60%,100%{left:160%} }
@keyframes announceGlow {
  0%,100% {
    box-shadow: 0 0 0 1px rgba(168,85,247,0.12), 0 0 35px rgba(168,85,247,0.50), 0 0 90px rgba(168,85,247,0.22), inset 0 0 30px rgba(59,7,100,0.45);
    border-color: rgba(168,85,247,0.75);
  }
  50% {
    box-shadow: 0 0 0 1px rgba(232,121,249,0.22), 0 0 60px rgba(232,121,249,0.70), 0 0 130px rgba(168,85,247,0.32), inset 0 0 45px rgba(59,7,100,0.55);
    border-color: rgba(232,121,249,0.95);
  }
}
#announce-live-badge {
  font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 700;
  letter-spacing: 0.20em; text-transform: uppercase;
  color: #F43F5E; background: rgba(244,63,94,0.14);
  border: 1px solid rgba(244,63,94,0.50); border-radius: 7px;
  padding: 3px 11px; display: inline-block; margin-bottom: 6px;
  animation: livePulse 1.8s ease-in-out infinite;
}
@keyframes livePulse { 0%,100%{opacity:1;color:#F43F5E} 50%{opacity:0.65;color:#FB7185} }
#announce-text {
  font-family: 'Boogaloo', cursive; font-size: var(--afm); line-height: 1.0;
  color: #FAF5FF; letter-spacing: 2px;
  white-space: normal; word-break: break-word; width: 100%;
  text-shadow: 0 0 26px rgba(168,85,247,0.95), 0 0 65px rgba(168,85,247,0.48), 0 4px 0 rgba(0,0,0,0.65);
  transition: font-size 0.25s ease;
}
#announce-sub {
  font-family: 'Boogaloo', cursive; font-size: var(--afs); line-height: 1.1;
  color: rgba(232,121,249,0.95); letter-spacing: 1px;
  white-space: normal; word-break: break-word; width: 100%;
  text-shadow: 0 0 16px rgba(232,121,249,0.75), 0 2px 0 rgba(0,0,0,0.55);
  max-height: 0; overflow: hidden;
  transition: max-height 0.3s ease, margin-top 0.3s ease, font-size 0.25s ease;
}
#announce-sub.has-text { max-height: 120px; margin-top: 2px; }

/* ══ EVENT PROMO SYSTEM ══ */
.ep-root {
  --ep-shelf-title: 31px;
  --ep-team-label: 22px;
  --ep-player-name: 22px;
  --ep-meta: 17px;
  position: absolute;
  inset: 0;
  width: 1080px;
  height: 1920px;
  pointer-events: none;
  z-index: 40;
  opacity: 0;
  transition: opacity 0.28s ease;
}
.ep-root.ep-active { opacity: 1; }
.ep-dim {
  position: absolute;
  inset: 0;
  opacity: 0;
  background:
    radial-gradient(circle at 50% 46%, rgba(168,85,247,0.34), transparent 34%),
    radial-gradient(circle at 50% 52%, rgba(232,121,249,0.18), transparent 48%),
    rgba(6,0,18,0.48);
  transition: opacity 0.32s ease;
}
.ep-root.ep-card-mode .ep-dim,
.ep-root.ep-paintball-mode .ep-dim { opacity: 1; }
.ep-passive {
  position: absolute;
  top: 450px;
  left: 0;
  width: 1080px;
  height: 55px;
  transform: translateX(36px);
  overflow: hidden;
  opacity: 0;
  border-radius: 0;
  border: 0;
  background:
    linear-gradient(to right, transparent 0%, rgba(59,7,100,0.16) 22%, rgba(59,7,100,0.70) 48%, rgba(5,0,14,0.84) 100%),
    radial-gradient(ellipse at 82% 50%, rgba(232,121,249,0.28), transparent 46%);
  box-shadow: none;
  transition: opacity 0.34s ease, transform 0.46s cubic-bezier(.34,1.56,.64,1);
}
.ep-passive::before,
.ep-passive::after {
  content: '';
  position: absolute;
  top: 0;
  bottom: 0;
  width: 190px;
  z-index: 2;
  pointer-events: none;
}
.ep-passive::before { left: 0; background: linear-gradient(to right, rgba(0,0,0,0), rgba(0,0,0,0)); }
.ep-passive::after { right: 0; background: linear-gradient(to right, transparent, rgba(5,0,14,0.92)); }
.ep-root.ep-passive-mode .ep-passive { opacity: 1; transform: translateX(0); }
.ep-root.ep-gift-alert .ep-passive { opacity: 0.16; }
.ep-passive-track {
  display: flex;
  align-items: center;
  gap: 56px;
  width: max-content;
  height: 100%;
  padding-left: 120px;
  animation: epTicker 24s linear infinite;
}
.ep-passive-track span {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 31px;
  letter-spacing: 2.6px;
  color: #FAF5FF;
  white-space: nowrap;
  text-shadow: 0 2px 8px rgba(0,0,0,0.96), 0 0 10px rgba(192,132,252,0.68);
}
@keyframes epTicker { from { transform: translateX(0); } to { transform: translateX(-50%); } }
.ep-card {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 880px;
  min-height: 900px;
  transform: translate(-50%, -50%) scale(0.9);
  opacity: 0;
  padding: 54px 50px 48px;
  border-radius: 34px;
  border: 2px solid rgba(232,121,249,0.58);
  background:
    linear-gradient(145deg, rgba(12,2,34,0.96), rgba(59,7,100,0.94) 54%, rgba(8,5,30,0.96)),
    radial-gradient(circle at 50% 0%, rgba(232,121,249,0.42), transparent 44%);
  box-shadow: 0 32px 90px rgba(0,0,0,0.72), 0 0 70px rgba(168,85,247,0.45);
  overflow: hidden;
  z-index: 4;
}
.ep-card::after {
  content: '';
  position: absolute;
  inset: 0;
  transform: translateX(-120%) skewX(-14deg);
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.26), transparent);
}
.ep-root.ep-card-mode .ep-card,
.ep-root.ep-paintball-mode.ep-reveal-card .ep-card { animation: epCardIn 0.72s cubic-bezier(.34,1.56,.64,1) forwards; }
.ep-root.ep-card-mode .ep-card::after,
.ep-root.ep-paintball-mode.ep-reveal-card .ep-card::after { animation: epSweep 1.1s 0.9s ease-out forwards; }
@keyframes epCardIn { to { opacity: 1; transform: translate(-50%, -50%) scale(1); } }
@keyframes epSweep { to { transform: translateX(130%) skewX(-14deg); } }
.ep-eyebrow,
.ep-date-time,
.ep-tagline {
  font-family: 'DM Sans', sans-serif;
  font-weight: 700;
  text-align: center;
  letter-spacing: 0.18em;
  text-transform: uppercase;
}
.ep-eyebrow { font-size: 28px; color: #E879F9; }
.ep-title {
  margin-top: 8px;
  font-family: 'Anton', sans-serif;
  font-size: 100px;
  line-height: 0.95;
  text-align: center;
  text-transform: uppercase;
  color: #FAF5FF;
  text-shadow: 0 5px 22px rgba(0,0,0,0.95), 0 0 34px rgba(232,121,249,0.78);
}
.ep-matchup {
  display: grid;
  grid-template-columns: 1fr 116px 1fr;
  gap: 24px;
  align-items: center;
  margin: 52px 0 40px;
}
.ep-team { opacity: 0; }
.ep-root.ep-card-mode .ep-team-gamers,
.ep-root.ep-paintball-mode.ep-reveal-card .ep-team-gamers { animation: epTeamLeft 0.62s 0.16s cubic-bezier(.34,1.56,.64,1) forwards; }
.ep-root.ep-card-mode .ep-team-battlers,
.ep-root.ep-paintball-mode.ep-reveal-card .ep-team-battlers { animation: epTeamRight 0.62s 0.24s cubic-bezier(.34,1.56,.64,1) forwards; }
@keyframes epTeamLeft { from { opacity: 0; transform: translateX(-120px); } to { opacity: 1; transform: translateX(0); } }
@keyframes epTeamRight { from { opacity: 0; transform: translateX(120px); } to { opacity: 1; transform: translateX(0); } }
.ep-team-label {
  margin-bottom: 18px;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 42px;
  letter-spacing: 3px;
  text-align: center;

let gbbMode='off';
let gbbYtSpend=0,gbbTtSpend=0,gbbTtCoins=0,gbbGoalAmount=100;
let gbbTimerLeft=null;   // null = full live, number = seconds remaining
let gbbTimerInterval=null;
let gbbGoalHit=false;

function gbbFmt(usd){return'$'+usd.toFixed(2);}
function gbbFmtCoins(n){
  if(n>=1000000)return(n/1000000).toFixed(1).replace(/\.0$/,'')+'M coins';
  if(n>=10000)return(n/1000).toFixed(1).replace(/\.0$/,'')+'K coins';
  return n.toLocaleString()+' coins';
}

function gbbComputeSpend(amount,type){
  const n=Number(amount)||0;
  if(type==='tiktok_coins')return n*0.01;         // $0.01/coin viewer spend
  if(type==='youtube_jewels')return n*0.05;        // ~$0.05/jewel
  if(type==='youtube_superchat'||type==='direct_donation'||type==='direct')return n;
  return 0;
}

function gbbTrackGift(data){
  if(gbbMode==='off')return;
  const plat=(data.platform||'').toLowerCase();
  const spend=gbbComputeSpend(data.amount,data.type);
  if(spend<=0)return;
  if(plat==='youtube')gbbYtSpend+=spend;
  else if(plat==='tiktok'){
    gbbTtSpend+=spend;
    // accumulate raw coins for display; non-coin gifts approximate via rate
    if(data.type==='tiktok_coins') gbbTtCoins+=(Number(data.amount)||0);
    else gbbTtCoins+=Math.round(spend/0.01);
  }
  gbbUpdateDisplay();
}

function gbbUpdateDisplay(){
  if(gbbMode==='off')return;
  const yt=gbbYtSpend,tt=gbbTtSpend;
  const ytFill=document.getElementById('gbb-yt-fill');
  const ttFill=document.getElementById('gbb-tt-fill');
  const ytAmt =document.getElementById('gbb-yt-amt');
  const ttAmt =document.getElementById('gbb-tt-amt');
  const timerEl=document.getElementById('gbb-timer-val');
  if(gbbMode==='battle'){
    const total=(yt+tt)||0.001;
    const ytPct=(yt/total)*100;
    ytFill.style.width=ytPct+'%';
    ttFill.style.width=(100-ytPct)+'%';
    ytAmt.textContent=gbbFmt(yt);
    ttAmt.textContent=gbbFmtCoins(gbbTtCoins);
    if(gbbTimerLeft===null){
      timerEl.textContent='● LIVE';timerEl.className='gbb-live';
    }else if(gbbTimerLeft<=0){
      const winner=yt>tt?'▶ YT WINS!':tt>yt?'♪ TT WINS!':'🤝 DRAW!';
      timerEl.textContent=winner;timerEl.className='gbb-ended';
    }else{
      const m=Math.floor(gbbTimerLeft/60),s=gbbTimerLeft%60;
      timerEl.textContent=m+':'+String(s).padStart(2,'0');
      timerEl.className=gbbTimerLeft<=10?'gbb-danger':gbbTimerLeft<=60?'gbb-warn':'';
    }
  }else if(gbbMode==='progress'){
    const goal=gbbGoalAmount||100;
    const ytPct=Math.min((yt/goal)*100,100);
    const ttPct=Math.min((tt/goal)*100,100);
    ytFill.style.width=ytPct+'%';
    ttFill.style.width=ttPct+'%';
    ytAmt.textContent=gbbFmt(yt);
    ttAmt.textContent=gbbFmtCoins(gbbTtCoins);
    if(!gbbGoalHit&&(yt+tt)>=goal){
      gbbGoalHit=true;
      document.getElementById('gbb-goal-shimmer').classList.add('active');
      timerEl.textContent='🎯 GOAL!';timerEl.className='gbb-ended';
    }else if(!gbbGoalHit){
      const rem=Math.max(0,goal-yt-tt);
      const pct=(yt+tt)/goal*100;
      timerEl.textContent='$'+rem.toFixed(0)+' to go';
      timerEl.className=pct>=90?'gbb-danger':pct>=70?'gbb-warn':'';
    }
  }
}

function gbbStartTimer(){
  gbbStopTimer();
  if(gbbTimerLeft===null||gbbTimerLeft<=0)return;
  gbbTimerInterval=setInterval(()=>{
    if(gbbTimerLeft>0){gbbTimerLeft--;gbbUpdateDisplay();}
    if(gbbTimerLeft<=0)gbbStopTimer();
  },1000);
}

function gbbStopTimer(){
  if(gbbTimerInterval){clearInterval(gbbTimerInterval);gbbTimerInterval=null;}
}

function gbbShowAnnounce(mode){
  const el=document.getElementById('gbb-announce');
  const txt=document.getElementById('gbb-ann-text');
  txt.textContent=mode==='progress'?'🎯 SHARED PROGRESS!':'⚔ GIFT BATTLE!';
  el.classList.remove('show');
  void el.offsetWidth; // force reflow to restart animation
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),3600);
}

function gbbGiftPop(data){
  if(gbbMode==='off')return;
  const plat=(data.platform||'').toLowerCase();
  const spend=gbbComputeSpend(data.amount,data.type);
  const tier=spend>=50?'lg':spend>=8?'md':'sm';
  const dir=plat==='youtube'?'yt':'tt';
  const isProgress=gbbMode==='progress';
  const layer=document.getElementById('gbb-pop-layer');
  // Name pop — battle shoots sideways, progress bursts and floats
  const nameEl=document.createElement('div');
  nameEl.className=`gbb-pop-name gbb-pop-${tier} gbb-pop-${dir}${isProgress?' gbb-pop-prog':''}`;
  nameEl.textContent=(data.name||'').toUpperCase();
  layer.appendChild(nameEl);
  // Flash text
  const flashEl=document.createElement('div');
  flashEl.className='gbb-pop-flash';
  flashEl.textContent=(data.name||'')+' sent '+fmtAmount(data.amount,data.type);
  layer.appendChild(flashEl);
  setTimeout(()=>{nameEl.remove();flashEl.remove();},2100);
}

function gbbHandleCmd(data){
  const{mode,timerSeconds,goalAmount}=data||{};
  gbbStopTimer();
  const bar=document.getElementById('gift-battle-bar');
  if(!mode||mode==='off'){
    gbbMode='off';
    bar.classList.remove('active','gbb-mode-battle','gbb-mode-progress');
    document.getElementById('gbb-goal-shimmer').classList.remove('active');
    return;
  }
  // Reset and activate
  gbbMode=mode;
  gbbYtSpend=0;gbbTtSpend=0;gbbTtCoins=0;gbbGoalHit=false;
  gbbGoalAmount=Number(goalAmount)||100;
  gbbTimerLeft=timerSeconds?Number(timerSeconds):null;
  document.getElementById('gbb-goal-shimmer').classList.remove('active');
  // Initial fills
  if(mode==='battle'){
    document.getElementById('gbb-yt-fill').style.width='50%';
    document.getElementById('gbb-tt-fill').style.width='50%';
  }else{
    document.getElementById('gbb-yt-fill').style.width='0%';
    document.getElementById('gbb-tt-fill').style.width='0%';
  }
  bar.classList.remove('gbb-mode-battle','gbb-mode-progress');
  bar.classList.add('active','gbb-mode-'+mode);
  gbbUpdateDisplay();
  gbbShowAnnounce(mode);
  if(gbbTimerLeft!==null)gbbStartTimer();
}

  const splatDate=document.querySelector('.ep-splat-date');
  if(splatTitle)splatTitle.textContent=cfg.title;
  if(splatDate)splatDate.textContent=cfg.dateTime;
  epText('ep-fun-eyebrow',cfg.fun?.eyebrow||'');
  epText('ep-fun-title',cfg.fun?.title||'');
  epText('ep-fun-subtitle',cfg.fun?.subtitle||'');
  const funImgWrap=document.getElementById('ep-fun-image-wrap');
  if(funImgWrap){
    const image=cfg.fun?.image||'';
    funImgWrap.classList.toggle('has-image',!!image);
    funImgWrap.innerHTML=image?`<img src="${epEscape(image)}" alt="">`:'';
  }
  cfg.players.forEach((player,i)=>{
    const el=document.getElementById('ep-player-'+i);
    if(!el)return;
    const name=player.name||DEFAULT_EVENT_PROMO_CONFIG.players[i]?.name||'Player';
    const image=player.image||'';
    el.innerHTML=`<div class="ep-avatar">${image?`<img src="${epEscape(image)}" alt="">`:epInitials(name)}</div><div class="ep-player-name">${epEscape(name)}</div>`;
  });
}

function buildEventPromoPaint(){
  const drops=document.getElementById('ep-droplets');
  const drips=document.getElementById('ep-drips');
  if(drops&&!drops.children.length){
    for(let i=0;i<18;i++){
      const span=document.createElement('span');
      const angle=(i/18)*Math.PI*2;
      const radius=170+Math.random()*130;
      span.style.setProperty('--dx',Math.cos(angle)*radius+'px');
      span.style.setProperty('--dy',Math.sin(angle)*radius+'px');
      span.style.setProperty('--s',(0.55+Math.random()*1.0).toFixed(2));
      drops.appendChild(span);
    }
  }
  if(drips&&!drips.children.length){
    [210,265,320,382,438].forEach((left,i)=>{
      const span=document.createElement('span');
      span.style.left=left+'px';
      span.style.setProperty('--h',(76+i*18)+'px');
      drips.appendChild(span);
    });
  }
}

function hideEventPromo(){
  const root=document.getElementById('event-promo-root');
  if(!root)return;
  clearTimeout(eventPromoHideTimer);
  clearTimeout(eventPromoRevealTimer);
  if((root.classList.contains('ep-card-mode')||root.classList.contains('ep-fun-mode'))&&!root.classList.contains('ep-card-hiding')){
    root.classList.add('ep-card-hiding');
    setTimeout(()=>{
      root.classList.remove('ep-active','ep-passive-mode','ep-card-mode','ep-fun-mode','ep-paintball-mode','ep-reveal-card','ep-card-hiding');
      document.getElementById('gift-bar')?.classList.remove('ep-passive-active');
      root.setAttribute('aria-hidden','true');
    },430);
    return;
  }
  root.classList.remove('ep-active','ep-passive-mode','ep-card-mode','ep-fun-mode','ep-paintball-mode','ep-reveal-card','ep-card-hiding');
  document.getElementById('gift-bar')?.classList.remove('ep-passive-active');
  root.setAttribute('aria-hidden','true');
}

function eventPromoShowOverlay(mode,durationMs){
  const cfg=eventPromoConfig=mergeEventPromoConfig(eventPromoConfig);
  if(!cfg.enabled)return hideEventPromo();
  const root=document.getElementById('event-promo-root');
  if(!root)return;
  renderEventPromo();
  buildEventPromoPaint();
  clearTimeout(eventPromoHideTimer);
  clearTimeout(eventPromoRevealTimer);
  document.getElementById('gift-bar')?.classList.remove('ep-passive-active');
  root.classList.remove('ep-active','ep-passive-mode','ep-card-mode','ep-fun-mode','ep-paintball-mode','ep-reveal-card','ep-card-hiding');
  void root.offsetWidth;
  const safeMode=mode==='paintball'||mode==='fight-card'||mode==='fun-drawer'||mode==='passive'?mode:'passive';
  const durations=cfg.durations||DEFAULT_EVENT_PROMO_CONFIG.durations;
  const ms=Number(durationMs)||durations[safeMode==='fight-card'?'fightCardMs':safeMode==='paintball'?'paintballMs':safeMode==='fun-drawer'?'fightCardMs':'passiveMs']||15000;
  const splatMs=Math.min(Math.max(1200,Number(durations.paintballSplatMs)||3000),Math.max(1200,ms-900));
  root.style.setProperty('--ep-exit-delay',Math.max(1,ms-900)+'ms');
  root.style.setProperty('--ep-splat-clear-delay',splatMs+'ms');
  root.classList.add('ep-active',safeMode==='fight-card'?'ep-card-mode':safeMode==='fun-drawer'?'ep-fun-mode':safeMode==='paintball'?'ep-paintball-mode':'ep-passive-mode');
  if(safeMode==='passive')document.getElementById('gift-bar')?.classList.add('ep-passive-active');
  root.setAttribute('aria-hidden','false');
  if(safeMode==='paintball')eventPromoRevealTimer=setTimeout(()=>root.classList.add('ep-reveal-card'),splatMs);
  eventPromoHideTimer=setTimeout(hideEventPromo,ms);
}

function setEventPromoConfig(config){
  const incoming=mergeEventPromoConfig(config);
  incoming.players=incoming.players.map((player,i)=>({
    ...player,
    image: player.image || eventPromoConfig.players?.[i]?.image || ''
  }));
  incoming.fun={
    ...incoming.fun,
    image: incoming.fun?.image || eventPromoConfig.fun?.image || ''
  };
  eventPromoConfig=incoming;
  renderEventPromo();
}

function setEventPromoPlayerImage(index,image){
  if(index==='fun'){setEventPromoFunImage(image);return;}
  const i=Number(index);
  if(!Number.isInteger(i)||i<0||i>3||!image)return;
  eventPromoConfig=mergeEventPromoConfig(eventPromoConfig);
  eventPromoConfig.players[i].image=image;
  renderEventPromo();
}

function setEventPromoFunImage(image){
  if(!image)return;
  eventPromoConfig=mergeEventPromoConfig(eventPromoConfig);
  eventPromoConfig.fun.image=image;
  renderEventPromo();
}

function handleEventPromoImageChunk(d){
  if(d.index==='fun'){
    const total=Number(d.total),part=Number(d.part);
    if(!d.id||!Number.isInteger(total)||!Number.isInteger(part)||part<0||part>=total)return;
    const key=d.id+':fun';
    if(!eventPromoImageChunks[key])eventPromoImageChunks[key]={parts:new Array(total),total,index:'fun'};
    eventPromoImageChunks[key].parts[part]=d.chunk||'';
    if(eventPromoImageChunks[key].parts.filter(v=>v!==undefined).length===total){
      setEventPromoFunImage(eventPromoImageChunks[key].parts.join(''));
      delete eventPromoImageChunks[key];
    }
    return;
  }
  const i=Number(d.index);
  const total=Number(d.total);
  const part=Number(d.part);
  if(!d.id||!Number.isInteger(i)||i<0||i>3||!Number.isInteger(total)||!Number.isInteger(part)||part<0||part>=total)return;
  const key=d.id+':'+i;
  if(!eventPromoImageChunks[key])eventPromoImageChunks[key]={parts:new Array(total),total,index:i};
  eventPromoImageChunks[key].parts[part]=d.chunk||'';
  if(eventPromoImageChunks[key].parts.filter(v=>v!==undefined).length===total){
    setEventPromoPlayerImage(i,eventPromoImageChunks[key].parts.join(''));
    delete eventPromoImageChunks[key];
  }
}

function handleEventPromoMessage(data){
  const d=data||{};
  if(d.type==='event-promo-config')setEventPromoConfig(d.config);
  else if(d.type==='event-promo-show')eventPromoShowOverlay(d.mode,d.durationMs);
  else if(d.type==='event-promo-hide')hideEventPromo();
  else if(d.type==='event-promo-auto')setEventPromoAuto(!!d.enabled,d.intervalMs);
  else if(d.type==='event-promo-image')setEventPromoPlayerImage(d.index,d.image);
  else if(d.type==='event-promo-image-chunk')handleEventPromoImageChunk(d);
}

function setEventPromoAuto(enabled,intervalMs){
  if(eventPromoAutoTimer){clearInterval(eventPromoAutoTimer);eventPromoAutoTimer=null;}
  if(!enabled)return;
  const ms=Math.max(10000,Number(intervalMs)||eventPromoConfig.durations.autoIntervalMs||600000);
  eventPromoAutoIndex=0;
  eventPromoShowOverlay(eventPromoAutoModes[eventPromoAutoIndex],undefined);
  eventPromoAutoTimer=setInterval(()=>{
    eventPromoAutoIndex=(eventPromoAutoIndex+1)%eventPromoAutoModes.length;
    eventPromoShowOverlay(eventPromoAutoModes[eventPromoAutoIndex],undefined);
  },ms);
}

function eventPromoSetGiftAlertActive(active){
  const root=document.getElementById('event-promo-root');
  if(root)root.classList.toggle('ep-gift-alert',!!active);
}

window.setEventPromoConfig=setEventPromoConfig;
window.showEventPromo=(mode,durationMs)=>eventPromoShowOverlay(mode,durationMs);
window.hideEventPromo=hideEventPromo;
renderEventPromo();

/* ══ ABLY — UNIFIED INIT ══ */
(function initAbly(){
  try{
    const client=new Ably.Realtime({key:CONFIG.ABLY_KEY});
    const channel=client.channels.get(CONFIG.ABLY_CHANNEL);
    const dot=document.getElementById('status-dot');
    client.connection.on('connected',   ()=>{dot.className='connected';});
    client.connection.on('disconnected',()=>{dot.className='';});
    client.connection.on('connecting',  ()=>{dot.className='connecting';});
    client.connection.once('connected', ()=>channel.publish('cmd','requestLeaderboard').catch(()=>{}));
    /* Gift bar */
    channel.subscribe('giftr',        msg=>onGiftrData(msg.data));
    channel.subscribe('giftr-cmd',    msg=>onGiftrCmd(msg.data));
    channel.subscribe('gift-alert', msg=>{
      try { gbbTrackGift(msg.data); } catch(e){ console.warn('[gbb] gbbTrackGift err',e); }
      if(gbbMode!=='off'){
        try { gbbGiftPop(msg.data); } catch(e){ console.warn('[gbb] gbbGiftPop err',e); }
      } else {
        try { onGiftAlert(msg.data); } catch(e){ console.warn('[gbb] onGiftAlert err',e); }
      }
    });
    channel.subscribe('top-gifters',  msg=>renderTopGifters(msg.data));
    channel.subscribe('gift-battle-cmd', msg=>gbbHandleCmd(msg.data));
    channel.subscribe('event-promo', msg=>handleEventPromoMessage(msg.data));
    /* Splat */
    channel.subscribe('cmd', msg=>{
      const cmd=msg.data;
      if(cmd&&typeof cmd==='object'&&String(cmd.type||'').indexOf('event-promo-')===0){handleEventPromoMessage(cmd);return;}
      if     (cmd==='reset') splatEnterCountdown();
      else if(cmd==='save' ){if(splatState===SPLAT_STATE.COUNTDOWN)splatEnterSaved();}
      else if(cmd==='idle' ) splatEnterIdle();
    });
    channel.subscribe('splat-pos',  msg=>setSplatPosition(msg.data));
    /* Bait widget content — {img, top, main, visible} any field optional */
    channel.subscribe('splat-bait', msg=>{
      const d=msg.data||{};
      if(d.img     !== undefined) document.getElementById('bait-galaxy-img').src        = d.img;
      if(d.top     !== undefined) document.getElementById('bait-label-send').textContent = d.top;
      if(d.main    !== undefined) document.getElementById('bait-label-main').textContent = d.main;
      if(d.visible !== undefined){
        baitEnabled=!!d.visible;
        if(splatState===SPLAT_STATE.IDLE){
          if(baitEnabled) splatShow(idleBait); else splatHide(idleBait);
        }
      }
    });
    /* Announce box — {text, badge, sub, x, y, size, visible} any field optional */
    const ANNOUNCE_X={left:160, center:540, right:920};
    const ANNOUNCE_Y={top:130, upper:400, center:750, lower:1250, bottom:1770};
    const ANNOUNCE_SIZES={
      micro:{w:160, fm:18,  fs:10, apv:'6px',  aph:'12px'},
      xxs:  {w:260, fm:28,  fs:15, apv:'10px', aph:'18px'},
      xs:   {w:360, fm:38,  fs:20, apv:'14px', aph:'26px'},
      sm:   {w:500, fm:50,  fs:26, apv:'18px', aph:'34px'},
      md:   {w:640, fm:62,  fs:33, apv:'20px', aph:'38px'},
      lg:   {w:800, fm:76,  fs:40, apv:'24px', aph:'44px'},
      xl:   {w:920, fm:90,  fs:48, apv:'26px', aph:'46px'},
      xxl:  {w:1040,fm:106, fs:56, apv:'28px', aph:'50px'},
    };
    const announceBox=document.getElementById('announce-box');
    channel.subscribe('announce', msg=>{
      const d=msg.data||{};
      if(d.text   !== undefined) document.getElementById('announce-text').textContent=d.text;
      if(d.badge  !== undefined) document.getElementById('announce-live-badge').textContent=d.badge;
      if(d.sub    !== undefined){
        const subEl=document.getElementById('announce-sub');
        subEl.textContent=d.sub;
        subEl.classList.toggle('has-text',!!d.sub);
      }
      if(d.size !== undefined){
        const s=ANNOUNCE_SIZES[d.size]||ANNOUNCE_SIZES.lg;
        announceBox.style.setProperty('--aw',  s.w+'px');
        announceBox.style.setProperty('--afm', s.fm+'px');
        announceBox.style.setProperty('--afs', s.fs+'px');
        announceBox.style.setProperty('--apv', s.apv);
        announceBox.style.setProperty('--aph', s.aph);
      }
      if(d.x !== undefined){
        const px=ANNOUNCE_X[d.x]??parseInt(d.x)??540;
        announceBox.style.setProperty('--ax', px+'px');
      }
      if(d.y !== undefined){
        const py=ANNOUNCE_Y[d.y]??parseInt(d.y)??130;
        announceBox.style.setProperty('--ay', py+'px');
      }
      if(d.visible !== undefined) announceBox.classList.toggle('visible',!!d.visible);
    });
  }catch(e){console.warn('[Ably] init failed:',e);}
})();

splatEnterIdle();
</script>
