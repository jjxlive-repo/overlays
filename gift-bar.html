}

function buildEventPromoPaint(){
  const drops=document.getElementById('ep-droplets');
  const drips=document.getElementById('ep-drips');
  if(drops&&!drops.children.length){
    for(let i=0;i<18;i++){
      const span=document.createElement('span');
      const angle=(i/18)*Math.PI*2;
      const radius=170+Math.random()*130;
      span.style.setProperty('--dx',Math.cos(angle)*radius+'px');
      span.style.setProperty('--dy',Math.sin(angle)*radius+'px');
      span.style.setProperty('--s',(0.55+Math.random()*1.0).toFixed(2));
      drops.appendChild(span);
    }
  }
  if(drips&&!drips.children.length){
    [210,265,320,382,438].forEach((left,i)=>{
      const span=document.createElement('span');
      span.style.left=left+'px';
      span.style.setProperty('--h',(76+i*18)+'px');
      drips.appendChild(span);
    });
  }
}

function hideEventPromo(){
  const root=document.getElementById('event-promo-root');
  if(!root)return;
  clearTimeout(eventPromoHideTimer);
  clearTimeout(eventPromoRevealTimer);
  if((root.classList.contains('ep-card-mode')||root.classList.contains('ep-fun-mode'))&&!root.classList.contains('ep-card-hiding')){
    root.classList.add('ep-card-hiding');
    setTimeout(()=>{
      root.classList.remove('ep-active','ep-passive-mode','ep-card-mode','ep-fun-mode','ep-paintball-mode','ep-reveal-card','ep-card-hiding');
      document.getElementById('gift-bar')?.classList.remove('ep-passive-active');
      root.setAttribute('aria-hidden','true');
    },430);
    return;
  }
  root.classList.remove('ep-active','ep-passive-mode','ep-card-mode','ep-fun-mode','ep-paintball-mode','ep-reveal-card','ep-card-hiding');
  document.getElementById('gift-bar')?.classList.remove('ep-passive-active');
  root.setAttribute('aria-hidden','true');
}

function eventPromoShowOverlay(mode,durationMs){
  const cfg=eventPromoConfig=mergeEventPromoConfig(eventPromoConfig);
  console.log('[EP] showOverlay mode='+mode+' enabled='+cfg.enabled+' players='+JSON.stringify(cfg.players?.map(p=>p.name)));
  if(!cfg.enabled){console.warn('[EP] blocked: cfg.enabled is false');return hideEventPromo();}
  const root=document.getElementById('event-promo-root');
  if(!root){console.error('[EP] event-promo-root not found');return;}
  renderEventPromo();
  buildEventPromoPaint();
  clearTimeout(eventPromoHideTimer);
  clearTimeout(eventPromoRevealTimer);
  document.getElementById('gift-bar')?.classList.remove('ep-passive-active');
  root.classList.remove('ep-active','ep-passive-mode','ep-card-mode','ep-fun-mode','ep-paintball-mode','ep-reveal-card','ep-card-hiding');
  void root.offsetWidth;
  const safeMode=mode==='paintball'||mode==='fight-card'||mode==='fun-drawer'||mode==='passive'?mode:'passive';
  const durations=cfg.durations||DEFAULT_EVENT_PROMO_CONFIG.durations;
  const ms=Number(durationMs)||durations[safeMode==='fight-card'?'fightCardMs':safeMode==='paintball'?'paintballMs':safeMode==='fun-drawer'?'fightCardMs':'passiveMs']||15000;
  const splatMs=Math.min(Math.max(1200,Number(durations.paintballSplatMs)||3000),Math.max(1200,ms-900));
  root.style.setProperty('--ep-exit-delay',Math.max(1,ms-900)+'ms');
  root.style.setProperty('--ep-splat-clear-delay',splatMs+'ms');
  root.classList.add('ep-active',safeMode==='fight-card'?'ep-card-mode':safeMode==='fun-drawer'?'ep-fun-mode':safeMode==='paintball'?'ep-paintball-mode':'ep-passive-mode');
  if(safeMode==='passive')document.getElementById('gift-bar')?.classList.add('ep-passive-active');
  root.setAttribute('aria-hidden','false');
  if(safeMode==='paintball')eventPromoRevealTimer=setTimeout(()=>root.classList.add('ep-reveal-card'),splatMs);
  eventPromoHideTimer=setTimeout(hideEventPromo,ms);
}

function setEventPromoConfig(config){
  console.log('[event-promo] config received, players:', JSON.stringify((config&&config.players||[]).map(p=>p.name)));
  const incoming=mergeEventPromoConfig(config);
  incoming.players=incoming.players.map((player,i)=>({
    ...player,
    image: player.image || eventPromoConfig.players?.[i]?.image || ''
  }));
  incoming.fun={
    ...incoming.fun,
    image: incoming.fun?.image || eventPromoConfig.fun?.image || ''
  };
  eventPromoConfig=incoming;
  renderEventPromo();
}

function setEventPromoPlayerImage(index,image){
  if(index==='fun'){setEventPromoFunImage(image);return;}
  const i=Number(index);
  if(!Number.isInteger(i)||i<0||i>3||!image)return;
  eventPromoConfig=mergeEventPromoConfig(eventPromoConfig);
  eventPromoConfig.players[i].image=image;
  renderEventPromo();
}

function setEventPromoFunImage(image){
  if(!image)return;
  eventPromoConfig=mergeEventPromoConfig(eventPromoConfig);
  eventPromoConfig.fun.image=image;
  renderEventPromo();
}


function handleEventPromoImageChunk(d){
  const total=Number(d.total),part=Number(d.part);
  if(!d.id||!Number.isInteger(total)||!Number.isInteger(part)||part<0||part>=total)return;
  if(d.index==='fun'){
    const key=d.id+':fun';
    if(!eventPromoImageChunks[key])eventPromoImageChunks[key]={parts:new Array(total),total,index:'fun'};
    eventPromoImageChunks[key].parts[part]=d.chunk||'';
    if(eventPromoImageChunks[key].parts.filter(v=>v!==undefined).length===total){
      setEventPromoFunImage(eventPromoImageChunks[key].parts.join(''));
      delete eventPromoImageChunks[key];
    }
    return;
  }
  const i=Number(d.index);
  if(!Number.isInteger(i)||i<0||i>3)return;
  const key=d.id+':'+i;
  if(!eventPromoImageChunks[key])eventPromoImageChunks[key]={parts:new Array(total),total,index:i};
  eventPromoImageChunks[key].parts[part]=d.chunk||'';
  if(eventPromoImageChunks[key].parts.filter(v=>v!==undefined).length===total){
    setEventPromoPlayerImage(i,eventPromoImageChunks[key].parts.join(''));
    delete eventPromoImageChunks[key];
  }
}

function startEventPromoAuto(intervalMs){
  stopEventPromoAuto();
  const ms=Math.max(10000,Number(intervalMs)||60000);
  eventPromoAutoTimer=setInterval(()=>{
    const mode=eventPromoAutoModes[eventPromoAutoIndex%eventPromoAutoModes.length];
    eventPromoAutoIndex++;
    eventPromoShowOverlay(mode);
  },ms);
}
function stopEventPromoAuto(){
  if(eventPromoAutoTimer){clearInterval(eventPromoAutoTimer);eventPromoAutoTimer=null;}
}

let _cpRotateTimer=null,_cpPresets=[];
function handleAnnounce(data){
  const box=document.getElementById('announce-box');
  if(!box)return;
  if(typeof data.visible==='boolean'){box.classList.toggle('visible',data.visible);return;}
  if(data.text!==undefined){const el=document.getElementById('announce-text');if(el)el.textContent=data.text||'';}
  if(data.sub!==undefined){const el=document.getElementById('announce-sub');if(el){el.textContent=data.sub||'';el.classList.toggle('has-text',!!data.sub);}}
  if(data.badge!==undefined){const el=document.getElementById('announce-live-badge');if(el)el.textContent=data.badge||'● LIVE';}
  const sizeMap={micro:'34px',xxs:'42px',xs:'52px',sm:'62px',md:'70px',lg:'76px',xl:'92px',xxl:'112px'};
  const sizeMapSub={micro:'20px',xxs:'24px',xs:'28px',sm:'32px',md:'36px',lg:'40px',xl:'48px',xxl:'58px'};
  const widthMap={micro:'300px',xxs:'360px',xs:'440px',sm:'540px',md:'660px',lg:'800px',xl:'860px',xxl:'920px'};
  if(data.size&&sizeMap[data.size]){
    box.style.setProperty('--afm',sizeMap[data.size]);
    box.style.setProperty('--afs',sizeMapSub[data.size]);
    box.style.setProperty('--aw',widthMap[data.size]);
  }
  const xMap={left:'12%',center:'50%',right:'88%'};
  if(data.x&&xMap[data.x])box.style.setProperty('--ax',xMap[data.x]);
  const yMap={top:'200px',upper:'480px',center:'960px',lower:'1440px',bottom:'1700px'};
  if(data.y&&yMap[data.y])box.style.setProperty('--ay',yMap[data.y]);
  if(data.text)box.classList.add('visible');
}

/* ══ COMMENT PROMPT HANDLER ══ */
function handleCommentPrompt(data){
  const box=document.getElementById('comment-prompt');
  if(!box)return;
  if(typeof data.visible==='boolean'){
    box.classList.toggle('visible',data.visible);
    if(!data.visible&&_cpRotateTimer){clearInterval(_cpRotateTimer);_cpRotateTimer=null;}
    return;
  }
  if(data.text!==undefined){const el=document.getElementById('cp-text');if(el)el.textContent=data.text||'';}
  if(data.sub!==undefined){const el=document.getElementById('cp-sub');if(el){el.textContent=data.sub||'';el.classList.toggle('has-text',!!data.sub);}}
  const cpSizeMap={xs:'32px',sm:'38px',md:'44px',lg:'52px',xl:'62px'};
  const cpSizeMapSub={xs:'16px',sm:'18px',md:'22px',lg:'26px',xl:'32px'};
  if(data.size&&cpSizeMap[data.size]){box.style.setProperty('--cpfm',cpSizeMap[data.size]);box.style.setProperty('--cpfs',cpSizeMapSub[data.size]);}
  const xMap={left:'20%',center:'50%',right:'80%'};
  if(data.x&&xMap[data.x])box.style.left=xMap[data.x];
  const yMap={top:'15%',upper:'30%',center:'50%',lower:'70%',bottom:'85%'};
  if(data.y&&yMap[data.y])box.style.top=yMap[data.y];
  if(data.presets&&data.presets.length){
    _cpPresets=data.presets;
    if(_cpRotateTimer)clearInterval(_cpRotateTimer);
    let idx=0;
    _cpRotateTimer=setInterval(()=>{
      idx=(idx+1)%_cpPresets.length;
      const p=_cpPresets[idx];
      const textEl=document.getElementById('cp-text');
      const subEl=document.getElementById('cp-sub');
      if(textEl)textEl.textContent=p.text||'';
      if(subEl){subEl.textContent=p.sub||'';subEl.classList.toggle('has-text',!!p.sub);}
    },data.rotateMs||30000);
  }
  if(data.text)box.classList.add('visible');
}

   Visual: 20 segments hanging below the gift bar, heights driven
   by Web Audio API frequency analysis at 60fps via rAF.
   Hype score (from engagement events) controls amplitude + color.
   Fallback: animated sine wave if mic permission denied.

   Event weights:
     join          +1    like_batch    +1    comment_match +3
     heart_me      +15   heart_me_first +50  yt_sub        +40
   Decay: −3.5% MAX_RAW per 10 s
   Surge: random 60–90 s, 5 s duration, 2× all points
══════════════════════════════════════════════════════════════════ */
(function initHypeMeter(){

  /* ── tunables ── */
  const SEG_COUNT      = 20;
  const MAX_H          = 52;        // px — tallest segment
  const MIN_H          = 3;         // px — always-visible floor
  const FLOOR_PCT      = 30;        // log-scale display floor %
  const K              = 0.08;
  const MAX_RAW        = 200;
  const DECAY_RATE     = 0.035;
  const DECAY_TICK_MS  = 10_000;
  const SURGE_MIN_MS   = 60_000;    // min gap between surges
  const SURGE_MAX_MS   = 90_000;
  const SURGE_MULTI    = 2;
  const AUDIO_SMOOTH   = 0.78;
  const PLAT_DECAY_MS  = 8_000;     // colour returns to purple after this
  const BIN_START      = 2;
  const BIN_END        = 28;

  const PTS = {
    comment:0.5, join:1, like_batch:1, comment_match:3,
    heart_me:15, heart_me_first:50, yt_sub:40,
  };

  /* ── state ── */
  let rawScore       = 0;
  let surgeActive    = false;
  let surgeTimer     = null;
  let _intensityMult = 1.0;   // controlled by dock intensity slider
  let _hypeCTA       = '';
  let _hypeFired     = false;

  /* ── platform colour mode ── */
  let _platMode  = 'neutral'; // 'tt' | 'yt' | 'neutral'
  let _platTimer = null;

  /* ── 30-second event window for intelligent surge decisions ── */
  const _evtWin = [];  // { time, type, plat }

  /* ── audio state ── */
  let analyser   = null;
  let freqData   = null;
  let smoothed   = new Float32Array(SEG_COUNT).fill(0);
  let audioReady = false;
  let fallbackT  = 0;

  /* ── WS audio relay — receives freq data from dock via localhost:9001 ── */
  let _wsFreqData = null;
  let _wsFreqAge  = 0;
  (function connectAudioRelay(){
    try {
      const ws = new WebSocket('ws://localhost:9001');
      ws.binaryType = 'arraybuffer';
      ws.onmessage  = e => { _wsFreqData = new Uint8Array(e.data); _wsFreqAge = Date.now(); };
      ws.onclose    = () => setTimeout(connectAudioRelay, 5000);
      ws.onerror    = () => {};
    } catch(e) {}
  })();

  /* ── DOM ── */
  const meterEl    = document.getElementById('hype-meter');
  const surgeBanner= document.getElementById('hm-surge-banner');
  const sbCta      = document.getElementById('hm-sb-cta');
  const sbTimer    = document.getElementById('hm-sb-timer');
  const firstFlash = document.getElementById('hm-first-gifter-flash');
  const giftBarEl  = document.getElementById('gift-bar');

  /* ── build segments ── */
  const segs = [];
  for(let i = 0; i < SEG_COUNT; i++){
    const d = document.createElement('div');
    d.className = 'hm-seg hm-floor';
    d.style.height = MIN_H + 'px';
    meterEl.appendChild(d);
    segs.push(d);
  }

  /* ── log-scale: raw score → 0-1 amplitude ── */
  /* ── log-scale: raw score → 0-1 display amplitude ── */
  function hypeAmp(){
    const pct = FLOOR_PCT + (100 - FLOOR_PCT) *
      Math.log1p((rawScore / MAX_RAW) * (Math.E - 1));
    return Math.min(1, pct / 100);
  }

  /* ── frequency bins → normalised per-segment amplitudes ── */
  function getFreqNorm(){
    const out = new Float32Array(SEG_COUNT);
    const src = (_wsFreqData && Date.now() - _wsFreqAge < 300) ? _wsFreqData
               : (audioReady && analyser)
                 ? (analyser.getByteFrequencyData(freqData), freqData)
                 : null;
    if(src){
      const binRange = BIN_END - BIN_START;
      for(let i = 0; i < SEG_COUNT; i++){
        const b0 = Math.floor(BIN_START + (i / SEG_COUNT) * binRange);
        const b1 = Math.floor(BIN_START + ((i + 1) / SEG_COUNT) * binRange);
        let sum = 0, cnt = 0;
        for(let b = b0; b <= b1 && b < src.length; b++){ sum += src[b]; cnt++; }
        out[i] = cnt > 0 ? (sum / cnt) / 255 : 0;
      }
    } else {
      const t = Date.now() / 1000;
      for(let i = 0; i < SEG_COUNT; i++)
        out[i] = 0.14 + 0.07 * Math.sin(t * 1.8 + i * 0.45);
    }
    return out;
  }

  /* ── 30-second event window tracker ── */
  function trackEvt(type, plat){
    _evtWin.push({ time: Date.now(), type, plat });
    if(_evtWin.length > 300) _evtWin.shift();
  }

  /* ── platform colour mode ── */
  function setPlatMode(mode){
    _platMode = mode;
    meterEl.className = mode === 'tt' ? 'hm-tt' : mode === 'yt' ? 'hm-yt' : '';
    clearTimeout(_platTimer);
    if(mode !== 'neutral')
      _platTimer = setTimeout(() => { _platMode = 'neutral'; meterEl.className = ''; }, PLAT_DECAY_MS);
  }

  /* ── pick surge duration + CTA based on current energy ── */
  function pickSurge(){
    const pct = rawScore / MAX_RAW;
    const now = Date.now();
    const win  = _evtWin.filter(e => now - e.time < 30_000);
    const joins  = win.filter(e => e.type === 'join').length;
    const ytSubs = win.filter(e => e.type === 'yt_sub').length;

    let durMs;
    if(pct > 0.8)      durMs = (10 + Math.random() * 5)  * 1000;
    else if(pct > 0.5) durMs = (20 + Math.random() * 15) * 1000;
    else               durMs = (45 + Math.random() * 15) * 1000;

    let cta;
    if(ytSubs > 2)     cta = 'YOUTUBE SUBS';
    else if(joins > 5) cta = 'JOINS & FOLLOWS';
    else               cta = 'COMMENTS & LIKES';

    return { durMs, cta };
  }

  /* ── surge banner show/hide ── */
  function showSurge(){
    if(surgeActive) return;
    surgeActive = true;
    giftBarEl?.classList.add('hm-surge-active');
    const { durMs, cta } = pickSurge();
    _hypeCTA = cta;
    if(sbCta) sbCta.textContent = cta;
    let remaining = Math.round(durMs / 1000);
    if(sbTimer) sbTimer.textContent = remaining;
    surgeBanner?.classList.add('visible');
    surgeTimer = setInterval(() => {
      remaining--;
      if(sbTimer) sbTimer.textContent = Math.max(0, remaining);
      if(remaining <= 0) hideSurge();
    }, 1000);
  }

  function hideSurge(){
    if(!surgeActive) return;
    surgeActive = false;
    clearInterval(surgeTimer);
    surgeTimer = null;
    surgeBanner?.classList.remove('visible');
    giftBarEl?.classList.remove('hm-surge-active');
    _scheduleSurge(); // reschedule next surge after 60-90 s
  }

  /* ── first gifter flash ── */
  function fireFirstFlash(){
    if(!firstFlash) return;
    firstFlash.classList.add('active');
    setTimeout(() => firstFlash.classList.remove('active'), 2000);
  }

  /* ══════════════════════════════════════════════════════════════════
     BEAN BOOZLED — fires when hype meter hits 100%
  ══════════════════════════════════════════════════════════════════ */
  let _bbFired    = false;
  let _bbCooldown = false;

  // Inject BB styles
  const _bbSty = document.createElement('style');
  _bbSty.textContent = `
    #bb-indicator {
      position: absolute;
      left: 50%; transform: translateX(-50%);
      width: 760px; height: 38px;
      display: flex; align-items: center; gap: 10px;
      pointer-events: none; z-index: 13;
      top: 516px;
    }
    #bb-icon { font-size: 20px; flex-shrink: 0; }
    #bb-track {
      flex: 1; height: 10px;
      background: rgba(255,255,255,0.09);
      border-radius: 5px; overflow: hidden;
      border: 1px solid rgba(255,255,255,0.14);
    }
    #bb-fill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg,#a21caf,#e879f9,#f43f5e);
      border-radius: 5px; transition: width 0.5s ease;
      box-shadow: 0 0 8px rgba(232,121,249,0.55);
    }
    #bb-label {
      font-family:'Boogaloo',sans-serif; font-size:15px;
      color:#e879f9; min-width:34px; text-align:right; flex-shrink:0;
    }
    #bb-cta-text {
      font-family:'Boogaloo',sans-serif; font-size:18px;
      color:rgba(255,255,255,0.75); white-space:nowrap;
      flex-shrink:0; letter-spacing:0.04em;
    }
    #bb-banner {
      position: absolute; top:50%; left:50%;
      transform: translate(-50%,-50%) scale(0.55);
      opacity: 0; pointer-events: none; z-index: 50;
      text-align: center;
      transition: opacity 0.28s ease, transform 0.42s cubic-bezier(.34,1.56,.64,1);
    }
    #bb-banner.bb-active { opacity:1; transform:translate(-50%,-50%) scale(1); }
    #bb-banner-inner {
      background: radial-gradient(ellipse at center,#3b0764 0%,#0f0020 75%);
      border: 3px solid #e879f9; border-radius: 28px;
      padding: 44px 70px;
      box-shadow: 0 0 70px rgba(232,121,249,0.75), 0 0 140px rgba(168,85,247,0.4);
    }
    #bb-banner-emoji { font-size:84px; display:block;
      animation: bbBounce 0.45s ease infinite alternate; }
    @keyframes bbBounce { from{transform:scale(1)} to{transform:scale(1.15) rotate(-6deg)} }
    #bb-banner-text {
      font-family:'Boogaloo',sans-serif; font-size:78px; line-height:1.1;
      color:#e879f9; letter-spacing:0.04em;
      text-shadow:0 0 30px rgba(232,121,249,0.9),0 0 60px rgba(168,85,247,0.5);
    }
    #bb-banner-sub {
      font-family:'DM Sans',sans-serif; font-size:26px;
      color:rgba(255,255,255,0.82); margin-top:10px;
    }
    @keyframes bbFlash {
      0%{opacity:0} 12%{opacity:0.65} 40%{opacity:0.25} 65%{opacity:0.5} 100%{opacity:0}
    }
  `;
  document.head.appendChild(_bbSty);

  // Inject BB HTML elements
  const _bbInd = document.createElement('div');
  _bbInd.id = 'bb-indicator';
  _bbInd.innerHTML =
    '<span id="bb-icon">🫘</span>' +
    '<div id="bb-track"><div id="bb-fill"></div></div>' +
    '<span id="bb-label">0%</span>' +
    '<span id="bb-cta-text">to Bean Boozled</span>';
  document.body.appendChild(_bbInd);

  const _bbBan = document.createElement('div');
  _bbBan.id = 'bb-banner';
  _bbBan.innerHTML =
    '<div id="bb-banner-inner">' +
    '<span id="bb-banner-emoji">🫘</span>' +
    '<div id="bb-banner-text">BEAN BOOZLED!</div>' +
    '<div id="bb-banner-sub">JJ HAS TO EAT ONE 💀</div>' +
    '</div>';
  document.body.appendChild(_bbBan);

  function fireBeanBoozled(){
    if(_bbCooldown) return;
    _bbCooldown = true;
    _bbBan.classList.add('bb-active');

    // Full-screen flash
    const fl = document.createElement('div');
    fl.style.cssText = 'position:fixed;inset:0;background:#e879f9;z-index:49;pointer-events:none;animation:bbFlash 0.85s ease forwards;';
    document.body.appendChild(fl);
    setTimeout(() => fl.remove(), 900);

    // Notify dock
    try { ablyChannel.publish('bean-boozled', { fired: true, ts: Date.now() }); } catch(e) {}

    // Auto-reset after 5 s
    setTimeout(() => {
      _bbBan.classList.remove('bb-active');
      rawScore   = 0;
      _bbFired   = false;
      _bbCooldown = false;
    }, 5000);
  }

  /* ── add points ── */
  function addPts(base, plat){
    if(plat && plat !== 'other') setPlatMode(plat);
    const pts = base * _intensityMult;
    rawScore = Math.min(rawScore + (surgeActive ? pts * SURGE_MULTI : pts), MAX_RAW);
    if(rawScore >= MAX_RAW && !_bbFired){
      _bbFired = true;
      fireBeanBoozled();
    }
  }

  /* ── surge scheduler: fires every 60-90 s if chat is alive (rawScore > 0) ── */
  function _scheduleSurge(){
    const gap = SURGE_MIN_MS + Math.random() * (SURGE_MAX_MS - SURGE_MIN_MS);
    setTimeout(() => {
      if(!surgeActive && rawScore > 0) showSurge();
      else _scheduleSurge(); // no activity yet — check again after another gap
    }, gap);
  }
  _scheduleSurge(); // kick off on load

  /* ── decay (pause during BB cooldown so meter doesn't drain mid-banner) ── */
  setInterval(() => {
    if(!_bbCooldown) rawScore = Math.max(0, rawScore - MAX_RAW * DECAY_RATE);
  }, DECAY_TICK_MS);

  /* ── publish hype % to Ably so dock can mirror it ── */
  let _lastPubPct = -1;
  setInterval(() => {
    const pct = Math.round((rawScore / MAX_RAW) * 100);
    if(Math.abs(pct - _lastPubPct) >= 2){
      _lastPubPct = pct;
      try { ablyChannel.publish('hype-pct', { pct }); } catch(e) {}
    }
  }, 2000);

  /* ── RAF render loop ── */
  (function drawHype(){
    const amp  = hypeAmp();
    const freq = getFreqNorm();

    for(let i = 0; i < SEG_COUNT; i++){
      const seg = segs[i];
      smoothed[i] = smoothed[i] * AUDIO_SMOOTH + freq[i] * (1 - AUDIO_SMOOTH);
      const combined = Math.max(amp * 0.6 + smoothed[i] * 0.4, smoothed[i] * 0.35);
      seg.style.height = (MIN_H + (MAX_H - MIN_H) * Math.min(1, combined)) + 'px';
      const pct = rawScore / MAX_RAW;
      const burst = surgeActive ? ' hm-surge' : '';
      seg.className = 'hm-seg ' + (pct > 0.75 ? 'hm-hot' + burst : pct > 0.35 ? 'hm-mid' : 'hm-floor');
    }

    // Update BB bar
    const pct = Math.min(100, Math.round((rawScore / MAX_RAW) * 100));
    const bbF = document.getElementById('bb-fill');
    const bbL = document.getElementById('bb-label');
    if(bbF) bbF.style.width  = pct + '%';
    if(bbL) bbL.textContent  = pct + '%';

    requestAnimationFrame(drawHype);
  })();

  /* ── Ably subscriptions ── */
  ablyChannel.subscribe('hype-event', msg => {
    const d = msg?.data, type = d?.type, plat = d?.platform || 'other';
    if(!type) return;
    trackEvt(type, plat);
    switch(type){
      case 'comment': case 'join': case 'like_batch': case 'comment_match':
        addPts(PTS[type] ?? 0.5, plat); break;
      case 'heart_me':       addPts(PTS.heart_me,        plat); break;
      case 'heart_me_first': addPts(PTS.heart_me_first,  plat); fireFirstFlash(); break;
      case 'yt_sub':         addPts(PTS.yt_sub,          'yt'); fireFirstFlash(); break;
    }
  });

  ablyChannel.subscribe('hype-intensity', msg => {
    _intensityMult = Math.max(0, Math.min(3, msg.data?.mult ?? 1));
  });

  ablyChannel.subscribe('gift-bar-pos', msg => {
    const top = msg.data?.top;
    if(typeof top !== 'number') return;
    const gb  = document.getElementById('gift-bar');
    const ban = document.getElementById('hm-surge-banner');
    const bbi = document.getElementById('bb-indicator');
    if(gb)  gb.style.top  = top + 'px';
    if(ban) ban.style.top = (top - 55) + 'px';
    if(bbi) bbi.style.top = (top + 66) + 'px';
  });

  // CTA text driven by dock's "Hype Meter CTA" input
  ablyChannel.subscribe('hype-cta', msg => {
    const text = msg.data?.text || '';
    const el = document.getElementById('bb-cta-text');
    if(el) el.textContent = text || 'to Bean Boozled';
  });

  // Allow dock to manually reset bean boozled meter
  ablyChannel.subscribe('bb-reset', () => {
    rawScore    = 0;
    _bbFired    = false;
    _bbCooldown = false;
    _bbBan.classList.remove('bb-active');
  });

})();
</script>
