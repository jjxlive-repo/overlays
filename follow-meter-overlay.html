<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>FOLLOW METER — Overlay</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1080px;
    height: 1920px;
    background: transparent;
    overflow: hidden;
    font-family: 'Fredoka', 'DM Sans', sans-serif;
  }
  #conn-dot {
    display: none;
    position: fixed; top: 12px; right: 12px;
    width: 12px; height: 12px; border-radius: 50%;
    background: #555; z-index: 9999;
  }

  /* ── METER PILL ───────────────────────────────────────────────── */
  #meter {
    position: fixed; left: 50%; top: 60px;
    transform-origin: top center;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    opacity: 0; transition: opacity .35s ease;
    z-index: 20;
  }
  #meter.show { opacity: 1; }
  #meter-pill {
    display: flex; align-items: center; gap: 10px;
    background: linear-gradient(135deg, rgba(20,10,30,0.88), rgba(10,5,20,0.88));
    border: 2px solid rgba(255,255,255,0.18);
    border-radius: 999px;
    padding: 10px 26px;
    box-shadow: 0 6px 24px rgba(0,0,0,0.4);
  }
  #meter-label {
    font-weight: 700; font-size: 22px; letter-spacing: .06em;
    color: #fff; text-transform: uppercase;
  }
  #meter-count {
    font-weight: 700; font-size: 30px; color: #FDE047;
    text-shadow: 0 0 12px rgba(253,224,71,0.6);
  }
  #meter-sub {
    font-size: 15px; color: rgba(255,255,255,0.65); font-weight: 600;
  }
  #meter-track {
    width: 260px; height: 10px; border-radius: 6px;
    background: rgba(255,255,255,0.14); overflow: hidden;
    border: 1px solid rgba(255,255,255,0.15);
  }
  #meter-fill {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, #38BDF8, #FDE047);
    transition: width .4s ease;
  }

  /* ── ALERT STAGE — fills the entire 1080×1920 canvas so the gif can be
     as large as the art actually is, instead of being boxed into a small
     fixed-size tile. Media takes all the space not used by the text band. */
  #alert-pos {
    position: fixed; left: 0; top: 0; width: 1080px; height: 1920px;
    z-index: 30; pointer-events: none;
  }
  #alert-stage {
    width: 100%; height: 100%;
    box-sizing: border-box;
    padding: 60px 30px;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px;
    opacity: 0;
    transform: scale(0.92);
    transform-origin: center;
    transition: opacity .28s ease, transform .28s ease;
  }
  #alert-stage.show {
    opacity: 1; transform: scale(1);
  }
  #alert-media-wrap {
    width: 100%;
    flex: 1 1 auto;
    min-height: 0;
    display: flex; align-items: center; justify-content: center;
  }
  #alert-media-wrap img, #alert-media-wrap video, #alert-media-wrap canvas {
    max-width: 100%; max-height: 100%;
    object-fit: contain;
    display: block;
    filter: drop-shadow(0 10px 30px rgba(0,0,0,0.55));
  }
  #alert-text {
    max-width: 820px;
    text-align: center;
    font-weight: 700; font-size: 44px; line-height: 1.2;
    color: #fff;
    padding: 12px 34px;
    border-radius: 18px;
    background: rgba(10,10,16,0.55);
    border: 2px solid rgba(255,255,255,0.2);
    text-shadow: 0 2px 8px rgba(0,0,0,0.5);
  }
  #alert-text.tiktok { border-color: rgba(56,189,248,0.7); }
  #alert-text.youtube { border-color: rgba(248,113,113,0.7); }
  #alert-text.milestone {
    border-color: rgba(253,224,71,0.85);
    background: rgba(40,30,0,0.55);
    color: #FDE047;
  }
</style>
</head>
<body>
<div id="conn-dot"></div>

<div id="meter">
  <div id="meter-pill">
    <span id="meter-label">FOLLOWERS</span>
    <span id="meter-count">0</span>
    <span id="meter-sub">· 10 to milestone</span>
  </div>
  <div id="meter-track"><div id="meter-fill"></div></div>
</div>

<div id="alert-pos">
  <div id="alert-stage">
    <div id="alert-media-wrap"></div>
    <div id="alert-text"></div>
  </div>
</div>

<audio id="alert-audio"></audio>

<script src="https://cdn.ably.com/lib/ably.min-2.js"></script>
<script>
// ═══════════════════════════════════════════════════════════════════
// CONFIG / CONSTANTS
// ═══════════════════════════════════════════════════════════════════
const ABLY_KEY = 'Y8e-eA.l0VHlg:aJXsEfu1Be4BYsAeATRMI3w30YAKSs_LyF3DPoesIz0';
const ABLY_CH  = 'splat-overlay';

const FM_LS_COUNT   = 'followMeter.count.v1';
const FM_LS_CONFIG  = 'followMeter.config.v1';
const FM_LS_ASSETS  = 'followMeter.assets.v1';
const FM_LS_MSG     = 'followMeter.msg';
const FM_BC_NAME    = 'follow-meter-control';

const SLOTS = ['tiktok_follow', 'youtube_follow', 'youtube_sub', 'milestone'];

const DEFAULT_CONFIG = {
  milestoneEvery: 10,
  meter: { label: 'FOLLOWERS', x: 0, y: 0, scale: 1, visible: true },
  alertDurationSec: 4.5,
  // Each alert type gets its own position/scale — a milestone banner and a
  // tiny follow ping don't belong in the same spot.
  alerts: {
    tiktok_follow:  { x: 0, y: 0, scale: 1 },
    youtube_follow: { x: 0, y: 0, scale: 1 },
    youtube_sub:    { x: 0, y: 0, scale: 1 },
    milestone:      { x: 0, y: 0, scale: 1 },
  },
  texts: {
    tiktok_follow:  '{username} followed on TikTok!',
    youtube_follow: '{username} followed on YouTube!',
    youtube_sub:    '{username} subscribed on YouTube!',
    milestone:      '{count} FOLLOWERS! 🎉',
  },
};

function deepMerge(base, extra) {
  if (extra === null || typeof extra !== 'object' || Array.isArray(extra)) return base;
  const out = Array.isArray(base) ? base.slice() : Object.assign({}, base);
  for (const k of Object.keys(extra)) {
    const bv = out[k], ev = extra[k];
    if (bv && ev && typeof bv === 'object' && typeof ev === 'object' && !Array.isArray(bv) && !Array.isArray(ev)) out[k] = deepMerge(bv, ev);
    else if (ev !== undefined) out[k] = ev;
  }
  return out;
}
const clone = o => JSON.parse(JSON.stringify(o));

let CFG = clone(DEFAULT_CONFIG);
try { const s = JSON.parse(localStorage.getItem(FM_LS_CONFIG) || 'null'); if (s) CFG = deepMerge(CFG, s); } catch (e) {}

let ASSETS = {}; // slot -> { gif:{mime,dataURL}, audio:{mime,dataURL} }
try { ASSETS = JSON.parse(localStorage.getItem(FM_LS_ASSETS) || '{}'); } catch (e) {}

let count = 0;
try { count = parseInt(localStorage.getItem(FM_LS_COUNT)) || 0; } catch (e) {}

let OVERLAY_ENABLED = false;
document.body.style.display = 'none';

// Mirror mode: a lightweight, muted, always-visible copy embedded as an iframe
// inside follow-meter-control.html so position/scale changes can be seen live
// while tuning — no Ably connection (so it can't double-process real follows
// or make noise), driven purely by the same BroadcastChannel/localStorage
// commands the control page already sends. See connectAbly() below.
const MIRROR = new URLSearchParams(location.search).get('mirror') === '1';

// ═══════════════════════════════════════════════════════════════════
// RENDER: meter
// ═══════════════════════════════════════════════════════════════════
function applyMeterLayout() {
  const el = document.getElementById('meter');
  const m = CFG.meter;
  el.style.transform = `translateX(calc(-50% + ${m.x}px)) translateY(${m.y}px) scale(${m.scale})`;
  el.classList.toggle('show', OVERLAY_ENABLED && m.visible !== false);
  document.getElementById('meter-label').textContent = m.label || 'FOLLOWERS';
}
function applyAlertLayoutFor(slot) {
  const el = document.getElementById('alert-pos');
  const a = (CFG.alerts && CFG.alerts[slot]) || { x: 0, y: 0, scale: 1 };
  el.style.transform = `translate(${a.x}px, ${a.y}px) scale(${a.scale})`;
}
function renderMeter() {
  const every = Math.max(1, CFG.milestoneEvery || 10);
  const rem = count % every === 0 ? every : every - (count % every);
  document.getElementById('meter-count').textContent = count.toLocaleString();
  document.getElementById('meter-sub').textContent = `· ${rem} to milestone`;
  const pct = Math.round(((every - rem) / every) * 100);
  document.getElementById('meter-fill').style.width = pct + '%';
  try { localStorage.setItem(FM_LS_COUNT, String(count)); } catch (e) {}
}

// ═══════════════════════════════════════════════════════════════════
// GIF DECODER/PLAYER — a native <img> plays an animated GIF's built-in loop
// count forever; browsers give no way to override that. So a GIF asset is
// decoded by hand here and played frame-by-frame on a canvas, stopping after
// one pass (frozen on the last frame) instead of looping. No external
// library: a dependency fetched at stream time is a single point of failure
// this overlay can't afford. Standard GIF87a/89a + LZW, nothing exotic.
// ═══════════════════════════════════════════════════════════════════
function fmParseGIF(buffer) {
  const data = new Uint8Array(buffer);
  let pos = 6; // skip "GIF87a"/"GIF89a" signature
  function u8() { return data[pos++]; }
  function u16() { const v = data[pos] | (data[pos + 1] << 8); pos += 2; return v; }
  function readSubBlocks() {
    const bytes = [];
    let size;
    while ((size = u8()) !== 0) { for (let i = 0; i < size; i++) bytes.push(u8()); }
    return bytes;
  }
  function readColorTable(count) {
    const table = [];
    for (let i = 0; i < count; i++) table.push([u8(), u8(), u8()]);
    return table;
  }
  const width = u16(), height = u16();
  const packed = u8();
  const gctFlag = !!(packed & 0x80);
  const gctSize = gctFlag ? (2 << (packed & 0x07)) : 0;
  u8(); u8(); // bg color index, pixel aspect ratio — unused
  const gct = gctFlag ? readColorTable(gctSize) : null;
  const frames = [];
  let gceDelay = 10, gceDisposal = 0, gceTransparentFlag = false, gceTransparentIndex = -1;
  while (pos < data.length) {
    const blockType = u8();
    if (blockType === 0x21) { // extension
      const label = u8();
      if (label === 0xF9) { // graphic control extension
        u8(); // block size (always 4)
        const p = u8();
        gceDisposal = (p >> 2) & 0x07;
        gceTransparentFlag = !!(p & 0x01);
        gceDelay = u16();
        gceTransparentIndex = u8();
        u8(); // terminator
      } else {
        readSubBlocks(); // comment / plain text / application extension — not needed
      }
    } else if (blockType === 0x2C) { // image descriptor
      const left = u16(), top = u16(), w = u16(), h = u16();
      const p = u8();
      const lctFlag = !!(p & 0x80);
      const lctSize = lctFlag ? (2 << (p & 0x07)) : 0;
      const lct = lctFlag ? readColorTable(lctSize) : null;
      const minCodeSize = u8();
      const lzwBytes = readSubBlocks();
      const indices = fmDecodeLZW(lzwBytes, minCodeSize, w * h);
      frames.push({
        left, top, width: w, height: h, colorTable: lct || gct, indices,
        delay: gceDelay * 10, // centiseconds → ms
        disposal: gceDisposal,
        transparentIndex: gceTransparentFlag ? gceTransparentIndex : -1,
      });
      gceDelay = 10; gceDisposal = 0; gceTransparentFlag = false; gceTransparentIndex = -1;
    } else {
      break; // trailer (0x3B) or corrupt data — stop either way
    }
  }
  return { width, height, gct, frames };
}
function fmDecodeLZW(bytes, minCodeSize, pixelCount) {
  const clearCode = 1 << minCodeSize;
  const endCode = clearCode + 1;
  let codeSize, dict, nextCode;
  function resetDict() {
    dict = [];
    for (let i = 0; i < clearCode; i++) dict[i] = [i];
    nextCode = endCode + 1;
    codeSize = minCodeSize + 1;
  }
  resetDict();
  let bitBuffer = 0, bitCount = 0, bytePos = 0;
  function readCode() {
    while (bitCount < codeSize) {
      if (bytePos >= bytes.length) return endCode;
      bitBuffer |= (bytes[bytePos++] << bitCount);
      bitCount += 8;
    }
    const code = bitBuffer & ((1 << codeSize) - 1);
    bitBuffer >>= codeSize;
    bitCount -= codeSize;
    return code;
  }
  const output = [];
  let prev = null;
  let code = readCode();
  while (code !== endCode && output.length < pixelCount + 8) {
    if (code === clearCode) {
      resetDict(); prev = null;
      code = readCode();
      if (code === endCode) break;
      output.push(...dict[code]); prev = dict[code];
      code = readCode();
      continue;
    }
    let entry;
    if (code < dict.length && dict[code]) entry = dict[code];
    else if (code === nextCode && prev) entry = prev.concat([prev[0]]);
    else break; // corrupt stream
    output.push(...entry);
    if (prev) {
      dict[nextCode] = prev.concat([entry[0]]);
      nextCode++;
      if (nextCode >= (1 << codeSize) && codeSize < 12) codeSize++;
    }
    prev = entry;
    code = readCode();
  }
  return output.slice(0, pixelCount);
}
// Plays every frame exactly once onto `canvas`, honoring each frame's own
// disposal method, then freezes on the last frame (the final frame's own
// disposal is skipped so it doesn't clear itself right after finishing).
// Returns a stop() to cancel a still-running player early.
function fmPlayGifOnce(canvas, gif) {
  const w = gif.width, h = gif.height;
  canvas.width = w; canvas.height = h;
  const ctx = canvas.getContext('2d');
  const back = document.createElement('canvas');
  back.width = w; back.height = h;
  const bctx = back.getContext('2d');
  let i = 0, stopped = false, prevSnapshot = null;
  function drawFrameToBack(frame) {
    const imgData = bctx.createImageData(frame.width, frame.height);
    const ct = frame.colorTable || [];
    for (let p = 0; p < frame.indices.length; p++) {
      const idx = frame.indices[p];
      const rgb = ct[idx] || [0, 0, 0];
      const o = p * 4;
      if (idx === frame.transparentIndex) imgData.data[o + 3] = 0;
      else { imgData.data[o] = rgb[0]; imgData.data[o + 1] = rgb[1]; imgData.data[o + 2] = rgb[2]; imgData.data[o + 3] = 255; }
    }
    const tmp = document.createElement('canvas');
    tmp.width = frame.width; tmp.height = frame.height;
    tmp.getContext('2d').putImageData(imgData, 0, 0);
    bctx.drawImage(tmp, frame.left, frame.top); // source-over: alpha=0 pixels leave the backbuffer as-is
  }
  function renderFrame() {
    if (stopped || i >= gif.frames.length) return;
    const frame = gif.frames[i];
    if (frame.disposal === 3 && prevSnapshot === null) prevSnapshot = bctx.getImageData(0, 0, w, h);
    drawFrameToBack(frame);
    ctx.clearRect(0, 0, w, h);
    ctx.drawImage(back, 0, 0);
    i++;
    const isLast = i >= gif.frames.length;
    setTimeout(() => {
      if (!isLast) {
        if (frame.disposal === 2) bctx.clearRect(frame.left, frame.top, frame.width, frame.height);
        else if (frame.disposal === 3 && prevSnapshot) { bctx.putImageData(prevSnapshot, 0, 0); prevSnapshot = null; }
      }
      renderFrame();
    }, Math.max(20, frame.delay || 100));
  }
  renderFrame();
  return () => { stopped = true; };
}

// ═══════════════════════════════════════════════════════════════════
// ALERT QUEUE
// ═══════════════════════════════════════════════════════════════════
let queue = [];
let processing = false;
let _currentGifStop = null; // cancels a still-playing GIF when the alert changes

function fillTemplate(tmpl, vars) {
  return String(tmpl || '')
    .replace(/\{username\}/g, vars.username || 'someone')
    .replace(/\{count\}/g, (vars.count != null ? vars.count : count).toLocaleString());
}

function enqueueAlert(slot, username) {
  if (!SLOTS.includes(slot)) return;
  queue.push({ slot, username: username || '' });
  processQueue();
}

function processQueue() {
  if (processing || !queue.length || !OVERLAY_ENABLED) return;
  processing = true;
  const item = queue.shift();
  showAlert(item, () => { processing = false; processQueue(); });
}

function showAlert(item, done) {
  const wrap  = document.getElementById('alert-media-wrap');
  const stage = document.getElementById('alert-stage');
  const txt   = document.getElementById('alert-text');
  const asset = ASSETS[item.slot] || {};
  const platformClass = item.slot === 'milestone' ? 'milestone' : (item.slot === 'tiktok_follow' ? 'tiktok' : 'youtube');

  if (_currentGifStop) { _currentGifStop(); _currentGifStop = null; }
  wrap.innerHTML = '';
  if (asset.gif && asset.gif.dataURL) {
    const mime = asset.gif.mime || '';
    if (mime.startsWith('video/')) {
      const v = document.createElement('video');
      v.src = asset.gif.dataURL;
      v.autoplay = true;
      v.playsInline = true;
      v.muted = false;
      v.loop = false; // play once, freeze on last frame — never restart
      wrap.appendChild(v);
    } else if (mime === 'image/gif') {
      // A plain <img> plays a GIF's own baked-in loop count forever with no
      // way to override it, so decode it ourselves and play it once on a canvas.
      const canvas = document.createElement('canvas');
      wrap.appendChild(canvas);
      const gifDataURL = asset.gif.dataURL;
      fetch(gifDataURL).then(r => r.arrayBuffer()).then(buf => {
        if (canvas !== wrap.firstChild) return; // a newer alert already replaced this one
        const gif = fmParseGIF(buf);
        if (gif.frames.length) _currentGifStop = fmPlayGifOnce(canvas, gif);
      }).catch(() => {
        // Corrupt/unsupported GIF — fall back to a plain (looping) <img> rather than showing nothing.
        if (canvas !== wrap.firstChild) return;
        const img = document.createElement('img');
        img.src = gifDataURL;
        wrap.innerHTML = '';
        wrap.appendChild(img);
      });
    } else {
      const img = document.createElement('img');
      img.src = asset.gif.dataURL;
      wrap.appendChild(img);
    }
  }

  txt.className = platformClass;
  txt.textContent = fillTemplate(CFG.texts[item.slot], { username: item.username, count });

  if (!MIRROR) {
    const audioEl = document.getElementById('alert-audio');
    audioEl.pause();
    if (asset.audio && asset.audio.dataURL) {
      audioEl.src = asset.audio.dataURL;
      audioEl.currentTime = 0;
      audioEl.play().catch(() => {});
    } else {
      audioEl.removeAttribute('src');
    }
  }

  applyAlertLayoutFor(item.slot);
  stage.classList.add('show');

  if (MIRROR) {
    // Pinned preview: stays on screen (silently) so position/scale nudges are
    // visible without a 4.5s countdown running out mid-adjustment. The next
    // preview just replaces it in place.
    done();
    return;
  }

  const durMs = Math.max(1000, (CFG.alertDurationSec || 4.5) * 1000);
  clearTimeout(showAlert._t);
  showAlert._t = setTimeout(() => {
    stage.classList.remove('show');
    setTimeout(() => { wrap.innerHTML = ''; done(); }, 300);
  }, durMs);
}

// ═══════════════════════════════════════════════════════════════════
// EVENT HANDLING — a follow/sub bumps the combined counter and fires
// its individual alert; crossing a multiple of milestoneEvery queues
// the milestone alert right after it.
// ═══════════════════════════════════════════════════════════════════
function handleFollowEvent(slot, username) {
  if (!OVERLAY_ENABLED) return;
  count++;
  renderMeter();
  enqueueAlert(slot, username);
  const every = Math.max(1, CFG.milestoneEvery || 10);
  if (count % every === 0) enqueueAlert('milestone', username);
}

function resetCount() {
  count = 0;
  renderMeter();
}

// ═══════════════════════════════════════════════════════════════════
// COMMS — BroadcastChannel + localStorage (local, instant, handles big
// gif/audio dataURLs) mirrored by Ably (remote/small messages only).
// Same three-transport pattern used by feed-jamie-control.html.
// ═══════════════════════════════════════════════════════════════════
let bc = null;
try {
  bc = new BroadcastChannel(FM_BC_NAME);
  bc.onmessage = e => handleCmd(e.data);
} catch (e) {}
window.addEventListener('storage', e => {
  if (e.key === FM_LS_MSG && e.newValue) {
    try { const w = JSON.parse(e.newValue); if (w.p) handleCmd(w.p); } catch (err) {}
  }
});

const seenMids = new Set();
function handleCmd(msg) {
  if (!msg || typeof msg !== 'object') return;
  if (msg._mid) { if (seenMids.has(msg._mid)) return; seenMids.add(msg._mid); if (seenMids.size > 200) seenMids.clear(); }
  switch (msg.cmd) {
    case 'CONFIG_UPDATE':
      CFG = deepMerge(CFG, msg.data || {});
      // Alert x/y/scale is applied per-slot at show time (applyAlertLayoutFor),
      // not globally here — each alert type has its own position now.
      applyMeterLayout(); renderMeter();
      break;
    case 'ASSET_UPDATE': {
      // Only reaches here via BroadcastChannel/localStorage — i.e. control and
      // overlay open in the SAME browser profile (local preview/testing). The real
      // OBS/TikTok Studio browser source is a separate, isolated browser engine with
      // its own storage, so production asset delivery rides the chunked Ably
      // transfer below instead (see 'follow-meter-assets' channel).
      applyAssetUpdate(msg.data || {});
      break;
    }
    case 'TEST_FIRE':
      handleFollowEvent(msg.data.slot, msg.data.username || 'TestViewer');
      break;
    case 'RESET_COUNT':
      resetCount();
      break;
  }
}
function applyAssetUpdate({ slot, kind, mime, dataURL }) {
  if (!SLOTS.includes(slot) || (kind !== 'gif' && kind !== 'audio')) return;
  if (!ASSETS[slot]) ASSETS[slot] = {};
  if (dataURL) ASSETS[slot][kind] = { mime, dataURL }; else delete ASSETS[slot][kind];
  try { localStorage.setItem(FM_LS_ASSETS, JSON.stringify(ASSETS)); } catch (e) {}
}

// ═══════════════════════════════════════════════════════════════════
// CHUNKED ASSET TRANSFER — gif/audio dataURLs are too large for one Ably
// message and localStorage doesn't cross browser engines (control page vs.
// TikTok Studio/OBS's isolated browser source), so this is the real delivery
// path in production. Chunks are re-assembled by assetId, then persisted to
// this overlay's own localStorage so a reload doesn't need a re-transfer.
// ═══════════════════════════════════════════════════════════════════
const assetChunkBuffers = new Map(); // assetId -> { slot, kind, mime, total, parts: Map(idx->str) }
function handleAssetChunk(d) {
  if (!d || !d.assetId) return;
  if (d.clear) { applyAssetUpdate({ slot: d.slot, kind: d.kind, dataURL: null }); return; }
  if (!SLOTS.includes(d.slot) || (d.kind !== 'gif' && d.kind !== 'audio')) return;
  let buf = assetChunkBuffers.get(d.assetId);
  if (!buf) { buf = { slot: d.slot, kind: d.kind, mime: d.mime, total: d.total, parts: new Map() }; assetChunkBuffers.set(d.assetId, buf); }
  buf.parts.set(d.idx, d.chunk);
  if (buf.parts.size < buf.total) return;
  let dataURL = '';
  for (let i = 0; i < buf.total; i++) dataURL += buf.parts.get(i) || '';
  assetChunkBuffers.delete(d.assetId);
  applyAssetUpdate({ slot: buf.slot, kind: buf.kind, mime: buf.mime, dataURL });
}

// ═══════════════════════════════════════════════════════════════════
// ABLY — toggle channel (always attached) + chat/config channels
// (attached only while enabled), same pattern as new-here-overlay.html.
// ═══════════════════════════════════════════════════════════════════
let _fmAttached = false;
function connectAbly() {
  const client = new Ably.Realtime({ key: ABLY_KEY });
  const ch           = client.channels.get(ABLY_CH);
  const chatChannel  = client.channels.get('splat-chat');
  const assetsChannel = client.channels.get('follow-meter-assets');

  function attachMain() {
    OVERLAY_ENABLED = true;
    document.body.style.display = 'block';
    applyMeterLayout(); renderMeter();
    if (_fmAttached) return;
    _fmAttached = true;
    ch.attach().catch(() => {});
    chatChannel.attach().catch(() => {});
    assetsChannel.attach().catch(() => {});
    // In case this is a fresh load/cleared cache and the control page is still
    // open with assets assigned, ask it to re-send everything it has.
    assetsChannel.publish('resend-request', {}).catch(() => {});
  }
  function detachMain() {
    OVERLAY_ENABLED = false;
    document.body.style.display = 'none';
    _fmAttached = false;
    ch.detach().catch(() => {});
    chatChannel.detach().catch(() => {});
    assetsChannel.detach().catch(() => {});
  }

  assetsChannel.subscribe('chunk', msg => handleAssetChunk(msg.data));

  const toggleCh = client.channels.get('follow-meter-toggle');
  toggleCh.subscribe('set', msg => {
    if (msg.data && msg.data.enabled) attachMain(); else detachMain();
  });
  toggleCh.publish('request', {}).catch(() => {});

  // Real follow/sub traffic rides the 'milk-event' the dock already publishes for
  // the hype meter — zero extra Ably messages. 'follow' is a dedicated, unambiguous
  // signal (added alongside the existing 'join' event so nothing else breaks) that
  // fires only on a genuine TikTok/YouTube follow, never a room-join/viewer-enter.
  chatChannel.subscribe('milk-event', msg => {
    if (!OVERLAY_ENABLED) return;
    const d = msg.data || {};
    if (d.type === 'follow' && d.username) {
      const slot = d.platform === 'tt' ? 'tiktok_follow' : 'youtube_follow';
      handleFollowEvent(slot, d.username);
    } else if (d.type === 'yt_sub' && d.username) {
      handleFollowEvent('youtube_sub', d.username);
    }
  });

  ch.subscribe('follow-meter-cmd', msg => handleCmd(msg.data));
}

if (MIRROR) {
  // No Ably here — the mirror must never process real follows/subs a second
  // time or make sound. It's driven entirely by the BroadcastChannel/
  // localStorage listeners above, which follow-meter-control.html already
  // sends CONFIG_UPDATE/ASSET_UPDATE/TEST_FIRE over regardless of Ably.
  OVERLAY_ENABLED = true;
  document.body.style.display = 'block';
  applyMeterLayout();
} else {
  connectAbly();
}

renderMeter();
</script>
</body>
</html>
